body:
  text: 䟽卷第二之五經云秘密主彼如是捨無我等者鈔云䟽捨無我心主等者捨者離義無我者謂前刧離倒時有法執當心故以五喻逹諸法即空遣彼法倒𨿽遣其有仍滯空相今第二劫以六喻𭔹治前劫即空既有去空亡𭤧順不可得空故文私云覺𮏑師意第二劫是他緣心一重未見二重淺𭰹故今經文合前真入法空悟唯識性義故云故經云秘密主等不置者字也宗家御意於第二劫中有他緣覺心二心前復次大乗行無緣乗心等文證第六住心又今彼如是捨無我等文證第七住心也故知今經文更𤗊釋成覺心乗義也更𤗊𦀇文作釋時不置者字䟽前後例多故字又属上叚也問案文起盡初大乗行無緣乗心法無我性者惣標何以故以下別如是知自心性下惣結也於別中依何以故徵問設釋中初舉古昔菩薩修行成三界唯心義後明此唯心者捨初刧即空無我而成緣生中道即心無我性也故云彼如是等非指上義乎故䟽釋中初摽第二重法無我性釋二叚文畢云更作一轉開明倍勝於前劫指第二劫望初刧云一轉定知非有二心勝劣也故六無畏中法無我無畏存他緣覺心未開二重淺𭰹乎又䟽下舉寳珠譬喻示修行次第出三重之心盡三刧之㫖然第二重但举無緣乗無示覺心又䟽第三舉十六重阿闍梨時證𡧤然阿闍梨後舉覺心不生阿闍梨不出無緣乗心𭓧知無緣覺心一重心非二種心也是以安然教時義第二難大師意云經中觀蘊阿頼耶乃至心主自在覺自心本不生越二刧行文義釋以為一種阿闍梨亦攝諸經八識三性三無性等此法相宗所用經論而海和尚以觀蘊阿頼耶等名無緣大乗心攝法相宗以心主自在覺自心本不生等名覺心不生攝三論宗文加之又住心淺𭰹專可任惑智勝劣然智品同法無我觀解惑品又細執一種也若惑智無勝劣誰信住心淺𭰹耶復大師所成色即是空諸法亦尒之義不超他緣大乗之談他緣乗又言如幻依他即圎成空理故若尒於一文一義之中何開覺心不生之重哉如何宗家依大日經菩提心論立十住心非無起盡也其中於第二刧開二心經䟽起盡明鏡也謂他緣心文觀蘊阿頼耶知自性等明業種生有為識是則法相所明真異熟識也故䟽云知自性者明蘊阿頼耶別緣起畧抄意蕳異性宗事理通融具分頼耶而明一分生頼耶故云別緣起也故法藏章云若依始教於阿頼耶但得一分生之義以於真理未能融通文法相云始教次覺心乗文心主自在覺自心本不生明如來藏真識也此宗以無為真理為第八故云心本不生又此心理與七轉心和合非一非異故云心主自在也故嘉祥勝鬘寳崛云佛性與六七心和合生時不可真外求外求真故言不異而盡真顕故言非不異亦可在緣常靜故言非不異文私云佛性者第八真識也六七者七轉識也又有經云是故七識有生有如來藏者不生不文如來藏者第八識也故知今叚意不生不真識類池水性淨也既有為無為識躰玄隔寧無二心勝劣乎是一又他緣文明蘊頼耶義云即楞伽解𭰹密經八識三性三無性皆是此意文是則法相所依經也覺心叚釋彼義畢如勝寳性佛性論中廣明文即是三論宗家經論也是二又上文觀察阿那𭰹細之識文專當𭰹密經中阿那識甚𭰹細之文又下文中云此心本不生即是漸入阿字門文是順大乗玄云諸法本從無生皆歸阿字一無生之文也是三又前無緣心𨿽空境界尚存能證之心智既遣境遺智所以如滯有無又許有為智躰故心不免㝵今覺心乗境智皆己何智滯有無自心即如寧心有㝵乎既悟境智俱真空而然不生故立覺心不生稱也朝譽是四又法相宗許佛智無常故慈㤙三身章云佛受用身既墮法數生者皆是一向記故不可是本性常許從因生是常者比量故文受用者報身也三論意法報疑然不曾見生嘉祥義䟽云報佛壽量有始無終乃至初證佛果是故有始一證已後湛然不故無有盡文是五依如是文理定知經䟽起盡可有二心淺𭰹也但至難者經䟽了蕳不可然其故二叚文各有標釋惣合成標釋等義耶所以二叚各惣初置秘密主言又各別初存何以故句故䟽中二叚文各別𤗊釋若尒覺心文義既全別何𦤺二心無別難乎次彼如是者彼者指覺心乗行者也捨無我者今此心捨他緣心法無我故云尒也意云如彼他緣乗行人捨即空法無我觀即心法無我覺心行人捨蘊頼耶無我證覺心不生無我故云彼如是也又一轉開明者應有多意二心𨿽異第二一刧故且云一轉也非無二心淺𭰹矣又云他緣心既勝初刧覺心更勝故云倍勝也又云於第二刧中二心相望覺心勝他緣故云一轉成覺心別重也他緣半刧云前刧例如望前二刧中一道心耳六無畏文者開合隨冝彼法無我義同故𨿽立一種無畏非不存二心別例如第二第三刧同𨿽所知障有細異矣又如𡧤然智法無我為第二刧所離矣又寳珠譬文并𭰹行阿闍梨者舉一顕一或又開合隨冝欤故寳珠譬三重心中不示𡧤然十六重中彼為一重故知出沒隨冝欤復十六重中前六重是六無畏也然六無畏第五無緣覺心俱舉故舉他緣攝覺心也若安然不分二心淺𭰹唯為法相一重三論宗是三刧不攝法門欤如何恐不合䟽意者欤又至惑智俱一重者法門廢立非一三刧相望時𨿽惑智同為一種住心𭔹弁日非断證是無二重例如麁執中或分三種三或別人法二執惑重數也又如法無我觀𨿽同即空即心勝劣遙異智淺𭰹也彼既尒也此何不尒耶事理觀門異故又諸法亦尒言獨覺心之談永超他緣也其故法相家遣相證性觀門前都𨿽遣依他之假相能觀正智尚留真空外存躰既有為無為各別境智不混豈會諸法亦尒之詞乎覺心乗起實智見中道理時法皆歸真空自心即如也何物不尒故云諸法亦尒也故大師敘覺心云悟心性之不生知境智之不異文仍無過問猶不明安然等義非無其理所以何者䟽第三云如觀蘊阿頼耶覺自心本不生即攝諸經八識三性三無性義文若尒何以楞伽等八識三性等成他緣義以寳性勝等義證覺心義為勝劣二心明證乎又䟽文起盡未必見二重所以彼如是者彼指上所舉法猶如彼出世間心及彼離順八心何指未舉之法乎故知彼法無我者捨初刧無我也為言加之他緣心中道觀初刧有空觀非盡理今照空有不二故云不滯有無等也又第八識是種子識能成流轉還故云心王自在䟽云所為妙業隨意能成也又心本不生者識相識性唯識中識性邊云尒故上文云真入法空悟唯識性即此意也故知他緣覺心文言雖異義理是一依之第三刧釋云前刧悟法唯心心外無法今觀此心即是如來自然智乃至文若如所立法唯心是他緣心觀門真識常住義覺心乗智分者與第二第三刧淺𭰹何異耶故䟽第三立三種幻中第二刧但名即心幻又法唯心意哉如何二心勝劣如先成矣所以𭰹密唯識勝寳性等經論性相二宗依㨿顕密一同之掟搉實二宗之理也䟽家慿非無所由宗家釋義甚有𭰹意者欤是以唯識論第三大乗阿毘逹磨經云無始時來界一切法等依由此有諸趣及𣵀槃證得云云論釋云界是因義即種子識無始時來展轉相續親生諸法故名為因文又寳性論第四同經云無始世來性作諸法依止依性有諸道及證𣵀槃果云云論釋云所言性者聖者勝經言世尊如來如來藏者是法界藏乃至自性清淨法身藏自性清淨如來藏文依此等意宗家釋他緣乗云楞伽𭰹密等經瑜伽唯識等論乃至法相大乗以此為宗文䟽家敘覺心乗云如勝寳性佛性論中廣明文但至䟽第三釋者或云楞伽八識攝論三性是三論宗所依何不解其義乎故云即攝八識三性等意䟽第二且他緣乗故至第三卷顕示三論家亦談八識三性也朝譽義或云即攝諸八識者第六住心也即攝三無性者第七住心也實範義私云第二卷云楞伽𭰹密等第三卷云諸經上但舉相宗所依經今云諸經故通性相二宗經八識三性欤故大師云他緣覺心但示八心文若二心同依楞伽𭰹密則違䟽家及宗家二宗所依經論別舉故或又上雖舉他緣覺心下且他緣云八識三無性也何分八識三無性成二宗義三無性專出𭰹密唯識故又他緣乗意雖空有不二三性終別即滯有無雖理智平等心境不混豈無𦊱㝵乎或云三論家雖煩𢙉性空即真理未云真如緣起云云今謂嘉祥釋既佛性與心真和合不一不異云云又淨影釋云染淨諸法真共起單真不生唯不成文此等釋同法藏真如緣起文故彼釋云唯真不生但不成真和合𭤧有緣起文文義是同豈不談真如緣起乎故知有為即無為無為即有為不思議常不思議無常故云不滯有無心無𦊱㝵所為妙業隨意能成也依之大乗玄二智義云真故無有雖無而有即是不動真際而建立諸法俗故無無雖有而無是不壞假名而實相乃至以真際然諸法故不滯於無諸法然實相即不累於有不累於有故不常不滯於無故非断即中道也文今不滯有無等釋非依此文乎又彼言隨冝如是言已未所以今彼者待此他緣心指覺心云彼如是也例如𭔹今大乗行云如彼徃昔等矣又至第三刧文釋者唯心言雖同事理心異故又自然智心不生文似同意是異覺心乗雖許真和合終真存故䟽云波浪盡時水性非無取意嘉祥釋云真和合𭤧起染淨乃至而盡真顕故言非不異文故知心本生但佛性理也一道心非但心理不生根塵等諸法皆尒也故彼具釋云今觀此心即是如來自然智乃至以心如是故諸法亦如是根塵皆入阿字門故曰離於根境文漸入阿字皆入阿字可思之心主即心王也等者今此文中有二初釋心主自在文後心王猶如下釋覺自心本不生句也以不滯有無等者光明山義云前無緣乗心雖空境界尚存能證之心智故猶如滯有無又許有為智躰故心不免㝵今至覺心乗境智皆亡何智滯有無自心即如寧心有㝵乎既悟境智俱真空而凝然不生此心本真空之義更立覺心之別重也云云疑云上他緣乗中以有空不二觀解有空未盡觀門故釋云非但見有不明復見空未盡今以如幻等門照有空不二文故知指上空有不二𮗚云不滯有無等故云故云等也若尒何為別重耶况復如所成者第三刧𮗚解也故下文云前刧悟法唯心今観此心以心實相智覺心實相取意依此文第二刧是三界唯心之観解未及自心即如重若不尒者與第三刧境智俱實相談何異乎私云望第三刧時雖云唯法唯心一重於第二刧內細論日非無淺𭰹事理心異心本不生義唯局覺心故心躰自如義與他緣異故宗家以菩提心論心躰自如不見心身之文證此心矣但至難者覺心乗雖心躰自如未談心外影像自如故云漸入阿字未云皆入阿字故下第三刧釋云以心如是故諸法亦如是根塵皆入阿字門影像不出常𡧤光文又雖遣初刧有空観云空有不二智有為理無為故非滯有無也尋云覺心乗意談真如緣起義耶木𢟷義云雖談諸法即真理未必云真如即法欤彼宗釋中不云真如緣起欤故智論云有為法實相即是無為無為相者即非有為文可思之云云私云今文云所為妙業隨意能成故云心王自在文又嘉祥釋云真和合𭤧起染淨乃至亦可在緣常靜文既云隨意能成非真如成法耶又云在緣常靜雖隨緣不告自性常義也又至智論文者彼論次下云無為有相者即是有為文仍無失更作一轉開明等者有多意如先成矣心王猶如池水性本清淨等者或云心王者第八識心数者七轉識也下水波喻准楞伽藏海識浪之文故七轉云心数是性相分岐故或云心王者八識心王也心数者貪等也釋論云不壞相有八文八識俱云常住也私云七轉云心数者王数雜乱實二宗無證文故又八識俱常住者違楞伽等文故又違嘉祥等釋故釋論攝相歸性意也故勝𦀇云自性清淨心而有染汙難可了知文又云如來藏者是法界藏法身藏出世間藏自性清淨而客塵煩惱上煩惱所染不思議如來境界文私云心王者如來藏即自性清淨心也即是第八真識真如佛性也心数客塵者客塵煩惱等也即七轉相應貪等煩惱也又准下文者亦有境界風無塵染前後兩叚影略㸦顕矣意云第八識本覺心水依境風動是所緣縛也数塵被染即相應縛也自性清淨心依相應所緣二縛而成七轉心猶如依風塵成濁波風成波塵成濁心数即非七轉識也故知第八本來清淨故譬之池水本淨七轉離垢清淨故喻之客塵清淨七轉離垢清淨即歸第八自性清淨無別躰故云證此性淨時覺心本不生也故大師敘此心云心王自在得本性之水心数客塵息動濁之波文譬如大海波浪乃至常無生者覺心抄云有云心性喻水性心数喻波浪也有云心王有相性性喻水相譬波心数類客塵故云心王亦復如是等云云私云二義俱不會䟽文及大師釋也如先成矣道範抄云𤗊心王猶如池水乃至以前後際断故之文為一叚同為心王自在覺自心本不生之釋恐失䟽起盡壞惣別二叚何以故已下𤗊經別文䟽作釋依無者字經文䟽釋欤所謂何以故至不可得故是𤗊𦀇文也故具文云何以故秘密主心前後際不可得故文若今文非𤗊𦀇者但釋前後文有不釋此文之過䟽釋中有譬合譬可知合中心王亦復如是者合上海水無前後際以前後際断者先釋心王離起也雖復遇境界風從緣起者第八真識緣六塵成七轉心義也合上波浪以從緣起故即是先無後無文也譬中但舉識浪合中偏境風㸦顕而譬合周𬾨矣故知以七轉識類波浪也而心性常無生者合上而水性以下文第八心躰隨境界緣轉作七轉心心性常𡧤如水隨風作波濕性不失也為言是故寳窟下卷嘉祥云又云如楞伽藏識海常住境界風所轉種種諸識浪騰躍而轉生如海水起波浪非異非不異佛性亦尒心俱和合亦非異非不異如是一切故知真和合方起染淨乃至佛性與六七心和合生時不可真外求𭑭𭑭外求真故言不異而盡真顕故言非不異亦可在緣常靜故言非不異文佛性乃至故言不異文自當䟽大海波浪乃至先無後無文合亦尒也是則明真和合水波不離義也而盡真顕以下又似䟽而水性不尒以下文合文亦尒也斯則明盡真顕波水存義也但正釋順譬亦可釋會合耳又法藏釋云云如來藏者不在阿梨耶中是故七識有生有如來藏者不生不解云此中唯生是七識唯不生是如來藏二義既分遂使梨耶無別自躰故云不在中此不一義非謂不和合何以故此中如來藏不生即七識之不生故與自生不一也七識生即如來藏不生故與自不生亦不一也文此終教作此釋欤仍證矣覺此心本不生即是漸入阿字者大智論第八云行羅𡰱菩薩聞是阿字即時入一切法初不生文大乗玄二諦義嘉祥云諸法本從無生皆以阿字為本是即諸法皆歸阿字一無生門故云卌二字皆歸阿字也文私案玄云皆歸䟽云漸入若本宗以阿字一無生門為𭫸若密宗還是入佛初門故云漸入欤故上文云心王自在即是淨菩提心文又大師二教論云中観等𡧤絕離以為宗𭫸論主自断入道初門畧抄問住心論釋第八心云於諸顕教是究竟理智法身望真言門是則初門文既第八心又初門何云皆入耶相望不定於阿字不生義𭔹第七但心本不生第八根塵亦入阿字不生故云皆入若望真言猶是應漸入義欤塵沙上煩惱等者第二刧細執唯法執所知障故云塵沙等也故起信論云過恒沙等上煩惱依無明起差別我見愛染煩惱依無明起差別文此中恒沙者法執所知障也故天台釋云故所知障於事理障理智者是無明惑障事智者是塵沙惑文此中無為生死等者勝云有為生死無為生死云云又上文云有二種死何等為二謂分叚死不思議變易死分叚死者謂偽眾生不思議變易死者謂阿羅漢辟支佛大力菩薩意生身文又云如取緣有漏業因而生三有如是無明住地緣無漏業因生阿羅漢辟支佛大力菩薩三種意生身云云寳性論第三云住無漏界中聲聞辟支佛得大力自在菩薩為證如來㓛德法身第一彼岸有四種障何等為四一者緣相一者因相三生相四壞相緣相者謂無明住地即此無明住地與行作緣如無明緣行無明住地緣亦如是故因相者謂無明住地緣行即此無明住地緣為因如行緣識無漏業緣亦如是故生相者謂無明住地緣依無漏業因生三種意生身如四種取緣依有漏業因而生三界三種意生身生亦如是故壞相者謂三種意生身緣不可思議變易死如依生緣故有老死三種意生身緣不可思議變易死亦如是故文佛性論第二云出三界外有三種聖人謂聲聞獨覺大力菩薩住無𣴑界有四種𭜨障由此四𭜨障故不得如來法身四種㓛德波羅蜜四𭜨障者乃至一𭤧便生死者是無明住地䏻生新無𣴑業譬如無明生行乃至二因緣生死者是無明住地所生無𣴑業是業名為因緣生死譬如無明所生行乃至三有有生死者是無明住地為𭤧便無流業為因三種聖人是意所生身譬如四取為緣有漏業為因三界內生身乃至無有生死者是三聖意生㝡後為緣是不可思議難退墮譬如生為緣老死等為過失文私云無為生死者變易生死也故嘉祥寳窟下云分叚名曰有為變易名曰無為乃至對𭔹界內有為名界外為無為然實是有為文止𮗚第六云無為生死即無為而生死以無為為名也文因緣生壞等者因緣變易能感業煩惱生壞所感生死果躰也佛性論曰四𭜨障寳性論云四種障如文可知耳問勝寳性等無為生死義證何義耶光明山義云謂覺真如不生時知此真心所反之法變易生死因緣所生皆生法也今且明秘宗義故此中彼法不詳耳或又勝所無為生死者實是界外變易身也如彼𦀇寳窟下釋然出此文成覺心之義者論釋覺心不生云雖復遇境界風隨緣起而心性常無生覺此心本不生即是漸入阿字門文為成此義次勝無為生死矣此心云凢三論意真心念雜起見心性不生者至界外變易位𭤧始此智界內分叚生之中惠解麁淺故雖聞其理未預證見之分故覺心不生之心於變易分齊談之所以取勝變易生死七識生如來藏識不生不之為此宗所依也寳性論等中三種意生身為所依即此意耳云云然上來原始要終者或云愚童持齊云始故下文中世間八心云一毫善故覺心云終第二刧滿故又義云第二心乃至第九心云始終欤又義云第一乃至第九云始終故大師釋云九種心藥拂外塵而迷文異生羊又云心藥豈不許一毫善乎又云𭔹治心外之垢非九種心拂外塵之義乎又大師釋云九種住心無自性轉𭰹轉妙皆是因文非依今轉妙轉𭰹文乎問大師釋異生羊云一向行𢙣行不修微少善文又密嚴院釋云異生羊躭𢙣器愚童持齊修善始文如何第一心有知過義故云心藥也又釋論云謂雖未得十信之位而以本熏習之力故即自心中猒生死苦求𣵀槃樂文此意也但至難者本熏習力雖知過未及始覺修善又非必改故云尒也超度人法有無二障者唯識章云由無始來執我法為有撥事理為空故此観中遣者空観𭔹破有執存者有観𭔹遣空執文私云准此文者人法二障執我法遍計為有撥事依他理圎成為無此人法二執執有無故云尒也以空有観遣有空執故云超度也又撲揚釋云實虵為我實繩為法文實虵實繩𨿽遍計所執且隨繩虵有無云人法有無二障欤或又我法二種俱情有理無法故云尒欤尚未開此心中秘密等者有多意或云但第八心云秘密不思議事也覺心一道續生次第可尒故從此已後𭤧乃之云云此意欤故下文中壽量長遠名為秘密云云大師以此文證第八心故又云名秘密一乗云云又法華云如來秘密神通之力文又云諸佛如來秘密之藏文故知第八住心也又云唯第十心也既云心中秘密故寳鑰云心外礦垢於是悉盡荼𤴶嚴是時漸開云云理秘密義雖通顕一乗事理俱密義唯在密宗故云心中秘密也故從此已後𭤧乃之下復次真言行修行菩薩行等文大師此文證第十心故又義云通八九十三種心也顕密雖異理秘密義同故所謂理秘密是意地観門故云心中秘密也復非無文證故大師釋云一念心中即具三諦文又䟽第三云復次眾生一念心中有如來壽量長遠之身𡧤光海會乃至不退諸菩薩亦復不能知文第八心之心中秘密義也又䟽第二云又此菩薩能於畢竟淨心中乃至供諸善知識詢求正法乃至由此因緣復名秘密文此文似善哉遇知識云秘密是第九心中秘密義也䟽第一云此三句義中悉攝一切佛法秘密神通力之事文大師釋云金剛一宮排內庫而授寳文此第十心中秘密義也又內外相𭔹非一或他緣已前云外覺心已後云內䟽第三云即是無緣乗心法無我性於心外有無影像智都無所得文又寳鑰釋第六住心云但心外之迷無開秘藏之寳文或覺心前云外一道後云內今文是也或一道前云外極無後云內守護經開題云空性等空融境智而知一實然猶心外影未開㽵嚴之寳文或九種云外第十云內如先成矣䟽云次生極無自性心如灰水瑩栻使極光淨大師云心外礦垢悉盡云云寳珠瑩栻使極淨云尒也極淨悉盡義也尒時生於佛家名置在高幢兩種種寳文大師茶㽵嚴漸開云云私云三宗理秘密同慈覺智證等義也大師本願御意理秘又天地玄隔具如即身義抄然三義中第三為勝然上來原始要終云云既於上來論始終故若未明故㔫可在從此以後𭤧乃之文中矣但大師釋䟽家宗家影略㸦顕欤常情各翫先習等者如常顕乗云常情及先習也微妙者真言也今迂迴行者作如此欤真言門修行菩薩行等者䟽釋云先歎其㓛德耳文私案准䟽二釋經文可有二點也依初釋云真言門修菩薩行之菩薩今教菩薩也無量無数那由多刧積集無量功德智惠餘教菩薩行也具修諸行真言行也無量智惠𭤧便指前顕福智也皆悉成就今教菩薩成就也且釋配當者如餘教中乃至至者釋中無量無数乃至㓛德智惠也今此教乃至心門釋復次乃至諸菩薩也謂今此教句釋真言門文直以下釋修行菩薩行句諸菩薩句釋全同矣次若見此心明道時者釋具修諸行也云此菩薩淨菩提心名初法明道文䟽第一云法明者以覺心本不生際其心淨住生大惠光明普照無量法性見諸佛所行之道故云法明道也文准此文普照無量法性見諸佛所行之道故云具修諸行也淨菩提心法明道名異義同故次諸菩薩乃至福惠釋無量㓛德智惠𭤧便也自然具足釋皆悉成就也依後釋云無量多刧積集無量福智具修諸行顕菩薩德行也無量智惠指前福智也𭤧便指前諸行也餘如先又釋配者䟽真言行者初入淨菩提心釋真言門乃至諸菩薩又於無数阿僧刧釋無量乃至多刧次具修普賢修行釋具修諸行次滿足大悲𭤧便釋積集乃至智惠次然此等下二句配無量等二句矣問今此文為歎第八九十三種住心㓛德將如何重譽義云第二刧覺心不生畢次文云真言門修行菩薩行故秘密外有一道極無不許也今以一道極無二心雖唯開真言行隱不顕教所談以實言之顕教亦有故大師之開為第八九二心云云私云此心三心俱真言行故同歎也為言𨗴僧都義云從此下是修真言行義而明此淨菩提心門義即一道𭫸無是也若㨿大師御心從此下三箇住心也然本文者惣標彼三重住心之所作妙行也文私云此義又三心俱歎也但八九正顕行修密行也為言前義八九正密行顕行故與前義別矣道範義云今真言門菩薩者唯第十心真言行菩薩也然前二刧中雖有顕密二人望第十心踈遠故顕為表密為裏此第三刧雖有三箇心隣第十執盡處故密為表顕為裏明之也云云私云此義意但歎第十心德也覺心義云此中有三心八九通顕密第十唯密也若真言行者住心八九則三心俱歎之若指如常佛華法華者但可歎第十也云云私云此義意通𡱈雙存矣疑云所謂空性以下別文但如常淺略八九住心大師證淺略義故若尒歎德句正歎如常佛華法華可歎秘密乎故知上諸義皆不會文理如何上所舉古德義皆有其理取捨任意矣私云於此文䟽家作二釋先釋意文舉顕乗僧之㓛德示真言行者之頓成也故䟽意云此教餘教相𭔹而明此教菩薩直以真言為乗見心明道時餘教菩薩僧福智自然具足義也故䟽云歎入真言門㓛德竟文又大師寳鑰下第十心此文釋云此歎初入真言菩薩㓛德文故知歎德雖𡱈第十所𭔹餘教中有八九故今刧通三種心也又復次釋意今一叚文唯𡱈第十無雜舉顕乗無量那由他刧者真言行者所度執也或真言行者自證滿已果後化他僧故也故復次釋法譬各置雖未言顕真言行者終可𦀇刧数也故知二義雖異俱唯歎真言行者德也難云凢䟽意三刧顕乗為本十地密宗為要大師十住心又此意也若如所立者第三刧唯密行非顕乗耶於第三刧中有三箇住心惣標句但真言行別釋文明如常八九也大師三種住心證分明故所謂為歎真言行德舉所𭔹顕乗也所謂已下別委釋成所𭔹顕乗義顕八九淺𭰹也所謂中惣標句所𭔹顕乗三乗一乗中未聞何教故今別釋顕佛華法華二種一乗也是正釋意作會釋矣復次釋意則所謂者復次義也非別釋上文上文明第十所謂以下八九文三叚各別也故䟽釋彼文云行者復次何法入此門耶文第八心又行者得如是㣲細惠時等文第九心也例如釋論中本所謂如來在世文釋復次如來在世耳但真言行者雖可居三刧後初舉者第三刧是隣第十心同真言初門故第三刧初殊歎真言行者德為令佛華法華見聞者於秘密生信樂尊重心也故䟽云欲令見聞者信樂尊重故先歎其㓛德竟文故知文雖在始意居三刧後故無過問若尒他緣覺心真諦廢詮第一義離言又同真言初門何於第二刧初無此句乎真言立教有二意橫二教𭔹弁竪十住心續生也十住心轉生迂廻行者從顕一乗必廻入真言也三盡處故例如彼華嚴宗中廻小入大廻三入一也故香象釋云謂諸二乗以根鈍故要先廻入共教大乗捨二乗名得菩薩稱然後𭤧入此普賢法文私云三乗云共教一乗云普法也今又然也他緣覺心廻入顕一乗然後入真言也故大師秘密釋云二乗人蒙諸佛警誘故起他緣大乗心他緣大乗人願㝡勝果故起覺心不生心覺心不生人無自性故起一道如實心一道如實人蒙諸佛驚覺故極無自性心極無自性人願究竟㝡勝金剛心故秘密㽵嚴心文次二教𭔹弁橫以四箇大乗果極望真言為初門也依此意三乗教又直入真言歟例如彼華嚴清凉大師釋云或有從小直入一乗云云故般若寺䟽抄第一云除第十心前皆入真言門菩薩三昧門文又大師云諸教絕離密藏本分取意今意初義故第三刧初歎真言行也八九雖異第三一刧攝故第八初先歎第十也又義云於真言行有淺畧𭰹秘二義𭰹秘行下十地文是也故准金剛頂十六大生云云又從初地入金剛寳藏云云即三密行也又於淺畧一心行有顕密顕各各自乗為極密遠期秘密荘嚴如次惣句中餘教此教類舟車神通是也所謂已下文雙釋顕密二義十住心中淺畧亦有二義故大師此文證八九心也故䟽中釋第八第九文云行者非真言行者乎故知淺畧門顕密雖異俱一心觀解非𭰹秘三密行故云淺略耳欲明超第三刧之心等者於今經文有二意謂或八九十三心皆為欲顕超第三刧之心也或三心中遅速相𭔹歎密行菩薩德而為欲令未來見聞者生信重心故先歎其德也為言或終一句被上文彼又𡱈第十心矣或上下皆通三心欤問見聞者應是當機一眾何云未來機乎今此會中無正被教因人故未來人也故聖位云汝等將來於無量世界乃至若見若聞悉地三昧㓛德智惠頓集成就文彼既指將來機云若見若聞今又可然耳如餘教中菩薩行於𭤧便𭔹治道等者䟽第一云如餘乗菩薩志求無上菩提種種勤苦不惜身命無数阿僧刧或有成佛或不成佛者今此真言門菩薩若能不虧法則𭤧便修行乃至於此生中見無盡㽵嚴加持境界非但現前而已若欲超佛地即同大日如來亦可也文又五秘密云若於顕教修行者久三大無数刧然後證成無上菩提於其中間十進九退乃至若依毘那自受用身所內證自覺聖智法乃至則於現生遇逢荼羅阿闍梨得入茶羅為具足羯磨乃至應時集得身中一大阿僧刧所集福德智惠則為生在佛家文雜問云問真言行人不依餘乗三密滿行此生成道者不厯十地等位耶皆之矣問若十地何言不厯刧数雖經十地而不相似餘教菩薩種種苦行不惜身命如是𦀇𢟍阿僧刧或有成佛或不成佛若以義非無厯刧之義文智論第卅八云有菩薩初意初雖心好後雜諸𢙣時時生念我求佛道以諸功德廻向阿耨多羅三三菩提是人久久無量阿僧祇刧或至或不至文私云䟽文依此論文心歟朝譽義云顕教菩薩𦀇阿僧刧之後證二空真如中道此即𡧤然界心他緣大乗覺心不生所證也若今宗菩薩以真言為所乗入菩薩十信位之後極速人一生證淨菩提心但顕教菩薩無量刧證真如與秘密教菩薩一生入淨菩提心同是初地位也故云至到之處雖則無異而所乗法有殊也云云又此人以五秘密中一僧福智得初地成地前一刧地上二刧義也又或云五秘密文顕教者他緣覺心也彼宗三僧故私云䟽及顕教𭔹治道者通三乗一乗𭔹秘宗故又譬中舟車神通同度五百由旬到初地寳所故度五百由旬舟車豈唯三乗耶故五百由旬出法華宁又大師第九心釋云歸路五百由旬此心即都亭文准此文今𭔹治道設雖𡱈八九心不可云唯六七心也但至五秘文者一僧福智者度第三刧所得福智也故指第三刧云一刧例如䟽云復越一刧住此地云云又久三大刧者大日所時分三僧也非三乗教所三也彼三大第二刧摂故又義餘教𭔹治道者但指天台華嚴也謂第三刧有三心中顕密相𭔹明遲速也既云舟車神通至到一處第二刧三乗何不度極細而到初地寳所乎就中五百由旬譬專法華華嚴所用也况復大師釋今文云問今無数刧者三刧之中何刧是第三刧也文此等文理實以分明者欤問無量僧全非一乗時或至不至釋偏是三乗談尒何顕密相𭔹時設雖一乗何不属僧告成三大為限釋無異論欤况法華云我於無量阿僧刧等文次釋又自乗云得至望密云不至欤文點云或有得至菩提或不至人也又依前義或至是一乗或不至三乗第二刧故又或云五百由旬中三百由旬度三界義二百由旬度二乗菩薩之義寳處是一乗也廻三入一機云至到一處欤若尒僧𭔹治道是唯三乗也故第二刧終由是𭔹治心外之垢云云此意矣故知今餘教者但初二刧二乗菩薩乗也顕密差別義寳生房云問真言地前地上橫竪義如何依十住心論者前九種住心皆是因皆是地前也第十即果即地上也竪論次第淺𭰹皆是真言地前行相也橫觀智智平等即地上行相也文私云今此橫竪義住心論淺略𭰹秘二義也竪義通顕密橫義唯真言不共談也智智平等無淺𭰹故皆真言十地具德不論地前欤故䟽第三云又令普現隨類身而言悉現如來身者乃至行者如此解時觀毗那與畜生等尊其心平等無勝劣之想輙從一門而入皆見心王是故作佛事也文菩提心論云瑜伽中諸菩薩皆同大毘那佛身文大師釋云若𭰹開㽵嚴秘藏則地獄天堂二乗一乗皆是自心佛之名字焉捨焉取文于栗多抄第六信證僧正云真言所立三重執於地前論之地上無之大小二機初心時一時頓断故也文私云准此者三惣云一刧一等故初心時頓断三故大師云頓越三入心真文心真者初地淨菩提心也以舟車涉者後漢書曰涉懸度注云草行曰山行曰䟦水行曰涉云云私云准此文舟行云涉舩浮水故車行曰車行陸故得逹五百由旬者法華第三云譬如五百由旬險難𢙣道曠絕無人怖畏之處若有多眾欲過此道至寳處我等疲極今欲退還導師𭤧便過三百由旬化作一城可隨意所作取意又玄義第一百喻五百由旬譬顕一乗勝於三乗也或云五百由旬是表三界二乗也三百由旬化城者越三界住二乗果也過二百由旬到寳處是改二乗心入一乗義也天台嘉祥等釋可見及至到之處雖則無異者或云以開會意云至到無異也故䟽第一云究竟同歸本無異徹文又云舟車神通是迂廻直徃二機也迂廻機又入真言故二機同得淨菩提心寳故云至到一處也故下文云而獲寳終無異路文又云舟車神通所得寳一心三密雖異同初地位故云至到一處也謂淨菩提心有表顕乗極果𭔃當密宗情故大師言所乗各異所治亦異文又世尊所以先廣等者覺心義云餘教此教相𭔹釋意結成也如上諸心相者指覺心不生以上住心也云云一道極無属真言行故况復彼二心文既在下何云如上乎有人云諸心相者上三刧也如是境界者彼各各極位也真言三刧共行之時見彼如情淺略他緣覺心等各留自乗極果真言行者過彼道故彼未到處想已到不可稽留教誡也是地前三刧六無畏位𭄿誡也云云私云後義為勝九種心皆顕行故若能𭔃齊何但𡱈八九矣但文在後者別雖在後而在所𭔹惣標何不云如上乎又文雖安後意在上故大師引證即此意矣或又但第三刧之心云諸心相欤意云謂如常途八九證此心為佛也真言行菩薩悮此心謂極勿稽留為言但廣者約義非文也揔標有三心別八九故為教真言門等者教者教誡也為教二字但被諸観行人讀之為教誡真言行人也為言或又教字使令義也為教二字遠及下中路稽留讀之意云為令真言行人若行至如是境界須明識不得未到謂到中路稽留也為言中路稽留者法華中五百由旬中途搆化城令二乗留滯今文見顕乗稽留𭄿誡真言行者也隨義轉用矣謂淨菩提心至到之處若望顕教雖是寳處於真言是中途故云中路稽留也若行至如是境界時者至初地菩提心境界之義也又義𮗚行人徃至淨菩提心境界時勿三百由旬中路稽留為言又義中川實範點本云則須明識不得云云不得二字属上句不被下句矣依此意今一莭文惣結前叚非𭄿誡也未到下文結餘教菩薩也此義麁劣也不得是被下句辞字也何指法乎復次如輪王太子等者光明山義云顕教菩薩心已後一阿僧登初地故阿僧刧間於無量有情所行布施修忍辱如是無数刧間一一事具殖福智資粮所以如習眾密教菩薩心已後極速乃至一生入淨菩提心所時分甚短促故於無量有情所不能行布施愛語等是以䟽云未於阿僧刧具𬾨普賢行滿足大悲𭤧便如輪王太子未習眾是即心已後時莭短故類輪王太子也然此菩薩頓如來㓛德皆已成就入淨菩提心而證毗那具無量㓛德之法身故云云有人云若通論淨菩提心次位則在初地及地前然真言行者淨菩提心正位在初地故實證位歎其德也文中雖未於無数刧等者望二地已上大悲行云未具也但此未言𭔹顕行無数刧云未也且論真言行有三義一云㝡初心即橫得無邊行果無別次第行是頓機也二云頓修諸行得德是超機也三云次第修諸行證佛位即漸機也此三重中實證只頓機後二為果後化他也云云覺心義云此有二義一自證頓滿化他久遠也故譬云未能遍習眾統御四列等合云未於乃至滿足大悲𭤧便也二執云無量刧也又法譬相𭔹眾相𬾨足等文無合法無数阿僧刧文無譬法譬㸦顕餘文易知云云私案眾相具足等二句是太子德用故合淨菩提心無数僧句属遍習眾時無別躰依法而立故滿足大悲等利他𭤧便故合統御四列也又䟽第三云復次初入淨菩提心門見法明道如識種子歌羅羅時前七地以來為大悲行之所𭇥如在胎藏無功用以去漸學如來𭤧便如嬰童已生習諸伎至如來一切智地如伎已成施于從政故名大悲台藏生也文此釋因根二句在台藏中今文三句皆在台外取譬隨冝欤問初地自證滿二地以上化他義不可然其故以譬意案初地證理理性無隔故雖頓成眾德未實修彼行何顕果德耶例如彼一乗宗有頓悟漸修二門也故䟽第一云當知行人則是位同大覺也以其自覺心故便得佛名然非究竟妙覺大牟尼位文又第三云謂初淨菩提心時見此荼羅已遍法界第二住又逾廣逾𭰹作十轉開明乃至第十一地而後所見圎極文又云就秘密中又漸次轉𭰹乃至佛為十地般若則九地非其境界唯大毘那得名究竟阿闍梨也文又云以此中道正觀離有為無為界極無自性心生即是心佛顕現故曰正等覺句以𭰹修觀察故如入大海漸次轉𭰹乃至毗那以上上智觀𭤧能盡其源底故曰漸次大乗生句文依此等文非初地自證極也如何今宗意初地位開如實知自心之悟云究竟即心成佛又名菩提實義也既自證初地極何更修二地行而云到果乎彼華嚴尚云十信終心得究竟果何况事理俱密教即事而真談乎故今開題云若有善男子善女人入此門則三大僧越一念之阿字無量福智具三密之金剛八塵勞変為醍醐五蘊忽為佛惠文私云此釋依今文意欤一念阿字者初地淨菩提心也三密金剛者初地金剛寳藏也醍醐者醍醐妙果也佛惠者第十一地一切智智也意初地一念阿字菩提心位成一切智智醍醐妙果也為言秘藏記云是密教所謂橫義也初地與十地無高下故文又古德義寳生御房云真言秘教證初地時同究竟妙覺大日位更無淺𭰹差別故云從初地得入金剛寳藏也文但至難者開二地以上淺𭰹者實證雖初地滿為令人知㓛德品数假例如天台判法在一心必次第華嚴釋同時讀時前後云云或又王子誕生時眾相𬾨足是自證位也謂之菩提實義統御四列制断刑賞又果後𭤧便謂之成佛外迹也或又六大無㝵故一念延多刧三密加持故刧海攝半時也故䟽第九云如初心時一切㓛德即與如來等從此已後無量阿僧祇刧於一念中恒修勝進轉𭰹轉廣不可思議名為秘密藏中無作㓛德文無失又如王子乃至作大歸依者此釋天人世間之所歸依文也有人云是歎淨菩提心外用㓛德也云云私云已上文明菩提實義故云無量㓛德皆悉成就䟽云即是毗那具躰法身文依之䟽第六云次有二偈明菩提實義我覺本不生者謂覺自心從本以來不生即是成佛而實無覺無成也云云私云謂覺乃至不生者如實知自心義也即是成佛者云究竟即身成佛也此文有二意謂本覺始覺成佛也文點云覺知自心是不生也始覺義也別本即身義云如實知自心云究竟即身成佛也取意又點云覺者自心也本來不生也覺自心者釋我覺即本有心月輪也從本以來不生者釋本不生即本有阿字也即身義云究竟即身成佛者本有心月輪中觀本有阿字取意是本覺成佛義也可思之兆𢈎者兆民欤孝云吕刑云一人有慶兆民頼之十億謂兆言天子有善德民頼其福云云又如王子已下文明成佛外迹也故云天人世間之所歸依乃至釋提桓因等親近敬礼文䟽云天人世間作大歸依若彼成佛我當奉吉祥草若此成佛時我當請轉法輪取意抄智論云佛至樹下時釋提桓因奉上好草乃至梵天王請轉法輪文䟽主智度應化成道之成今成佛外迹也例如上文釋成佛以智度以如實知等文成自證成佛之義矣又如以般若證一生二生成佛耳依之䟽第六云初有二偈明成佛之外迹謂我初㘴道場以此一躰速疾力三昧降伏天魔軍眾我將證菩提汝之㔟力何䏻留㝵耶尒時大梵天等八部眾生徒見伏魔之外迹是故有名稱生号為大勤勇者取意私云文義既相順理豈違肖乎若常途諸論所明等者光明山義云付第三刧行言復次秘密主真言門修行菩薩至天人世間之所歸依者是惣先歎真言行之㓛德也此即歎初地已上㓛德也淨菩提心初地者處處釋分明耳今真言行初地者付實行為言若依教門八地為真言門也言出過一切聲聞辟支佛地已下第三刧行謂八地已上行也七地已前讓第二刧故八地已上断極細執位云第三刧行也今䟽若常途諸論所明以下即釋出過一切聲聞等文也證此心者淨菩提心之證位也即第八地是也初地所觀空心至八地而證故指此地云淨菩提心證位故䟽第六釋八地云入此地時得度空性彼岸文然顕教心用此位為佛果所以知然者法華佛智云諸佛智惠甚𭰹無量其智惠門難解難入一切聲聞辟支佛所不能知文顕教至極不如法華彼佛智云一切聲聞辟支佛所不䏻知此即當今所出過一切聲聞之第八地故䟽云常途諸論以此為佛也又䟽第六云菩薩至第八地時於心之實際而初證之故顕教心指此時云佛果也云云有人云凢第三刧文地前初地間雜然八九二心時地前也真言行者第三刧盡處第四断位時初地也厯文留意耳又今釋行者得此心時乃至是故此事名為秘密者第三刧雖有一道等三人以真言行人為面故作是云秘密也真言行者地前一道心時即見法華常在本地身故密行者名秘密也云云私云第八住心配位或過或不足八地及地前義非理八九極果𭔃同初地淨菩提心情義故大師釋一道心云云何菩提謂如實知自心乃至秘密主此菩薩淨菩提心門名初法明道釋云謂無相空相及非青非黃等言并是明法身真如一道無為之真理佛此名初法明道智度名入佛道初門言佛道者指金剛界大日荼羅佛於諸顕教是究竟理智法身望真言門是則初門文此釋意第三刧中一道心無間断雖地前解證理是初地也何退偏云地前或進云第八地耶又大師釋極無自性心云是因是心望前顕教極果於後秘心初心初心時便成正覺冝其然也䟽云心實際亦復不可得故曰極無自性心生也此心望前二刧猶蓮華盛敷若望後二心即是果復成種故曰如是初心佛成佛因等云云此又第九心無間道地前解道初地也又䟽第三釋一切法自性平等無畏云即是真言行者空無垢菩提心也文又云第六無畏於平等心中修荼羅行離垢地以去各於自地𮗚心中修荼羅行文此又八九二心俱在初地證也第六無畏二心合故且料蕳今文者又如王子以下文明成佛外迹中有八九十三心也又如至歸依者正明真言菩提心外迹德也若常途至佛地也者釋出過等二句明一道極無佛即真言外迹成佛義也諸論地論法華論中論智度等也法華中明佛智非二乗所知華嚴云二乗如聾如故云出過二乗地也今文惣明八九也以行者至名為秘密者別明第八心壽量長遠法華故前三乗今一乗中蕳迹門也又此至後名秘密者別明第九心供知識是善戝訪知識義即華嚴故此中行者及菩薩者顕行人也例如初刧中學大乗人云然彼行者也又如云秘鍵云行人是七問既云此菩薩可真言行者故䟽第七云此瑜伽者能不起于座悉至如是諸佛會中亦能次第絢求諸善知識故云初地菩薩化滿百佛国也文此文同今釋既云此瑜伽者寧顕行人耶顕行同義指前行者云此菩薩也又瑜伽者未必密人順理外人云修瑜伽行者矣若尒指華嚴人何失况上文云餘如華嚴分明者欤或真言行人也今文悉密為本顕為末明之故前二刧中至辟支佛地也者通結一道極無也此中秘密一乗者理秘密一乗也非金剛一乗也是事理俱密故已上釋所謂出過聲聞辟支佛地文畢時大威德下釋釋提桓因等句猶歎淨菩提心外迹㓛德也問二心同初地八九淺𭰹難弁依之或義云一道地前極無地上義成如何断惑證理二位俱雖同位無間位一道勝解道極無故無間解次第為淺𭰹欤或同雖断極細無勝劣觀智有淺𭰹故尒也例如三昧分異漏盡即同也重意云以實言之二心同断地前證理地上故二心地前者断也二心地上者證理也一道地前極無地上者一心断一心㨿證理也斯乃三義相成非相違矣又問云八九名秘密一乗何云理秘密乎依之天台釋中云一念凢心已有理性三密相海一塵報色同在本理毗那𭤧乃名為三無差別文又華嚴卅九云又入如來秘密處所謂身秘密語秘密心秘密時非時思量秘密乃至得菩提行秘密如是等皆如實知文同䟽云初三即惣顕三密文此等文豈非明三秘密義乎天台釋僅雖云三密不正明其行相故慈覺釋云雖粗明印𭑕真言事相而支分不具未盡佛智文華嚴文又准之知矣或又華嚴文諸法皆秘密時三業又得此名未必我教秘密之義矣即知釋迦牟𡰱淨土不毀等者抄第三云以行者直以真言為乗超入淨菩提心得見心明道故得此心時即知釋迦牟𡰱淨土不毀等此一叚䟽全法華欲顕此刧真實超過二乗之地證不退地彰之秘密文䟽第三云復次眾生一念心中有如來壽量長遠之身𡧤光海會乃至不退諸菩薩亦復不能知當知此法復難信故法華中補處三請如來四誡然後演今此具有修入𭤧便乃至一生可成文又云今此中妙法蓮華荼羅義毘那本地常心即是華臺具躰四佛四菩薩醍醐果德如眾實俱成文私云於今文有二意准第三前文者第八住心也故大師此文證一道心矣准後文者又第十心也法華荼羅華臺具躰故故法華儀䡄云我今依於大教王遍如來成道法若能依此勝義修現世得成無上覺文大師即身義以此文證即身成佛義也壽量長遠本地之身可思之又䟽第七云此是法王秘寳不示𤰞賤之人如釋迦出世卌餘年因舎利弗等慇懃三請𭤧為略妙法蓮華義今此本地之身又是妙法蓮華㝡𭰹秘處故壽量品云常在霊鷲山及餘諸住處乃至我淨土不而眾見燒盡即此宗瑜伽之意耳文私云此釋又通淺𭰹二意唯前可知耳重意云天台意以久遠實成為極今宗以菩提實義為要不改九界迷情而本地常身也又本地常心何指久遠成覺耶故䟽第六釋菩提實義云謂覺自心從本以來不生即是成佛而實無覺無成也文於法華法有重重習依事相更問又於本地身三身分別者天台釋云此品詮量通名三身若從別意正在報身文文意顕矣又大師釋此文云證此理佛亦名常𡧤光土毗那文又心境絕泯常𡧤土文此釋云理智法身𡧤光土也又云於顕教是究竟理智法身望真言門是則初門文法華本地身今教淨菩提心位也為言䟽第七云今此本地身又是妙法蓮華㝡𭰹秘處文又第三云如來壽量長遠之身𡧤光海會文此意二本地身全同欤但法身𡧤光義鑰䟽雖同本地身意鑰䟽是異矣又天台釋云常在霊鷲山此謂實報圡也文妙樂釋云㨿常在之言即属自受用土若准頌文寳㽵嚴言即本時他也文此意今本地身云報身實報圡也上行等諸菩薩等者法華從地涌出品出檢可見修𭔹治道等者補處勒等也第三卷不退諸菩薩是也法華第五云我於此眾中乃不識一人文准此文法華中迹門属𭤧便𭔹治道本門摂秘密神通乗欤故大師開題云又㨿大日𦀇顕秘密妙法蓮華義毘那本地常心文䟽第三文如先是𭰹秘意也又依淺略本迹二門同為𭤧便𭔹治道於餘教𭔹治中既開𭔹治秘密也故法華壽量品云如來秘密神通之力文智證釋云迹門修生有𭔹治道本門本有無𭔹治道文若又准前惣後惣結但以三乗教可云𭔹治道於法華迹門猶生驚疑故前文云或不至者指此類欤未至寳處故
