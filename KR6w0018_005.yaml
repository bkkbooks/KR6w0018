body:
  text: 疏卷第一之五爾時執金剛等者自下正宗分也開題云準餘經作三假者自初如是我聞至千牙種生起二十五行十二字之經是初序分也自爾時執金剛祕密主於彼衆會中至世出世持誦品訖二十九品餘之經是第二正分也第三十一囑纍品是第三流通分也矣別本云今此經具約三部而釋初如是等序分者當身密即佛部示身無盡藏故次爾時世尊至囑纍終是語密即蓮花部現語無盡藏故信受等文是意密即金剛部示意無盡藏故云云是約三部三密分三假矣般若寺鈔云大日經六卷後一卷中供養次第法合為七卷三十一品初入真言門住心品為序分最後一品為流通分中間二十九品為正分矣如來自證之智等者疏上文云然此自證三菩提乃至若離如來威神之力則雖十地菩薩尚非其境界矣此意以如來神力非不自證境界耶或云上釋意大日以神力現加持世界瑞相而令生衆會之疑心依彼疑問此大日經自證法也今釋正證境界設以神力不可示人也故下舉喻示彼旨與證異故無惑矣云云或云雖所無遺無令取證之言故云云二義意同私云本地無相自證唯自利境界故以神力不可示人言斷心境故前云今經教主加持身示現瑞相故外用迹也為言所以中台加持身現竒瑞令生衆會疑依彼疑今經疏第四云如來妙嚴之相法爾無非造作所成故不以外寶為飾乃至十住諸菩薩猶因羕佛神力見加持身其於常寂之躰如在羅縠矣私云此文加持身者中台身今經教主成佛外迹是也常寂之體者自證位也菩提實義是也不生即是成佛故云法爾所成也問下以象迹雷雨兩喻顯以迹知本之義斯則非示以加持世界之竒瑞推本地內證之法耶况皆用者所現三身非一故歟答本末隨冝自證位無法故生加持身而為今經先現瑞故以加持世界條末知自性會宗本也謂能所現俱望自證之加持故云皆外用加持中四身法別故非無本末也故抄云本者如來三業也末者所現之相也矣經具緣品云此第一實際以加持力故為度於世間而以文字矣疏釋云釋通世諦明起教所由矣今自證者指此第一實際也問今舉二譬有何故耶答或云象在地表定龍在空表智即兩部自證智也云云或云象喻表色身雷譬示法故云云懷山襄陵者滔抄云尚書云帝曰咨四嶽湯湯洪水方割蕩蕩懷山襄陵浩浩滔天懷包也襄上也五帝本記云蕩鴻水滔天浩浩懷山襄陵孔安國云懷包襄上云云曲成佛身者抄云周易繫辭云範圍天地之化而不過曲成万物而不遺曲成者乘變應物不係一方也以况智德應物無滯故曰曲成也矣本末因緣等者或云本者如來內證智即實境界也未者加持應化是照俗之權也此則即本之末即末之本故云究竟無得也云云或云如來普衆生種熟本末因緣究竟無得不謬之意也疏第四云傳法人當善識根緣又知法門分齊應病授藥應先住瑜伽觀彼本末因緣矣可思之或云本末但約機實行久已本末異故云云此等義意或約法或約機或通機教皆於自證位而令今經也今謂加持身中有四身故若約法知自性身云本三身云末若約人則自性會衆云本久已故加持世界機云末實行故今教觀此本末因緣現瑞無障得故云究竟無得也此本末人法皆俗諦門故云照俗之權自證位實之境界為第一實際故經中云得一切智智是也佛與金剛手問答彼因緣即今經也然如古義者得一切智智位云今經會耶若許違經現文又背疏釋疏云如是自證之境者無言觀者無見不同手中菴羅果可轉授他人也矣釋云自證是證境界非儀式耳問具緣品云真言相如是常依於二諦矣自證位又非有法耶又大師釋中真諦詮第一義離言自性身以如義彼為密藏也取意但者無言者且於自證位有證及義若約證邊是無師自悟故云無言若據邊非無也猶如被疵者不改其體受苦相如何答若顯若密法皆依世諦門也釋通世諦明起教所由即此意矣但二諦法者疏釋云若能解此世諦時自當通達第一義諦故云二諦法也矣意依世諦法而達第一義諦故云二諦法也為言大師釋顯真諦而為真言俗諦故又喻是顯與證異非謂證位即矣疏第十四云如師子王在深窟中安住不動有時出窟頻申𭑣動佛亦如是若非如來加持神力則微妙寂絶不可得示現略抄又當卷上文云出居外朝制斷刑賞矣此等釋無爭𭑣迅示現是加持身作能而非本地內證位也照俗之權等者抄云照俗之權者即後得智也實之境界正體智之意也意云如來所現加持之迹尚如是爾自證真實之境當復云何矣若法不然等者意云若法之以迹知本不然則有以迹知象以雨知龍等以微迹可推尋其體耶然我已悉見外用迹雖知有自證智未知此智從何得之也為言是衆會之疑心也金剛手代此疑心而作此問也而問佛言等者今此四字釋經白佛言三字歟已上惣釋上所條問生起之意也次下梵本云至得明了別釋如來應供正遍知得一切智智之文也云何如來應供正遍知者問佛有十何但舉三耶答法華序品舉三嘉祥義疏第二釋云略三則存彼國之稱如來為人應供為斷正遍知為智人具智斷在義略圓故矣今又可準彼矣彼國稱者天竺語也故經云多𨹔阿伽度阿羅訶三𦴭三佛𨹔矣梵云但他揭多者法華如上出大品并智論云多𨹔阿伽𨹔皆如來梵也玄𮚌第二云多𨹔如義阿伽度來義阿羅訶應義三正義𦴭等義又三正義佛𨹔覺義即是如來應正等覺十之中初三也矣如諸佛乘如實道等者問今教主本覺法然佛何論來去義耶答疏第十九云此自證境界出過語言道以知自證非可宣而授與人住如斯智故得如來名也又如佛之理自然而證知名為如來文抄第十云謂自證境界出過語言之道名之為如住如斯理名之為來又如佛之理如也自然而證來也文當知法然如佛之理是乘如實道之義自然本覺即來成正覺之意也又自證境言斷是如義住知此理之智即來義也非同顯乘如來義耳問金剛頂開題云各各衆生修如實道去成正覺來化衆生故名如來文何答彼且約行者顯得邊云如去依果後方便云如來也故祕藏記云如去謂自凡位修行成正覺也乘如而行故曰如去如來謂成佛以後悲願力故𡸁化也乘如來故曰如來文疏明法然成佛故云諸佛來成等大師釋述修生成佛故云衆生去成等可悉之或舉顯家修生成佛類今本有成佛也或舉化他成道擬自證成佛也故云如諸佛乃至今佛等矣又金光明疏云法身如來道前無變異曰如道後顯曰來應身如來乘如實道曰如來成正覺曰來化身如來者化身化人不過時不待時曰如八相趣果曰來文準此約三身釋如來義今疏文當於報身歟又隨宜可判耳一切諸佛等者疏第十九云又如諸佛所行之道自然證處我亦如是而去故名如去也私云自然證處者即𣵀槃安樂處也抄云謂一切衆生皆有安樂性欲令去至𣵀槃安樂處故文釋論具四義者智論第二云問曰婆伽婆正有此一名更無餘名答曰佛㓛德無量名亦無量此名取其大者以人多識故復有異名名多𨹔阿伽𨹔等云何名多𨹔阿伽𨹔如法相解如法相如諸佛安隱道來佛如是來更不去後有中是故名多𨹔阿伽𨹔文同論疏第二惠影云多𨹔阿伽度此正明義合三如來如去如等義臨文當文私云論疏各三義今何云四義矣今疏中如來如知如去如四義出之論中有如釋中有如去論釋合論有四義歟論更不去後有中者別義歟可尋之阿闍梨意等者抄云又去是自利是利他故存如文問大師釋中皆以如來為利他今何存如義耶答凡四義中如去如知是自利如來如即利他也準大師釋如來果後𡸁化故加持世界利他如是如實相故如義自證即自性會然今教主云如來順古也為言又法身知而應化知而不故如知義通顯如局密歟或云梵言𭇥四義之中譯者存意不同而各取一義兩義各別所以今譯者略取二義欲顯自利利他意也然順古題如來一義也更解云如去如來約身業分自他如知如約語意別自他也阿羅訶者等者此釋經應供文也抄云謂羅字是塵義塵即煩惱故訶是風輪即降伏即害也謂是以永害煩惱𮚆故文問抄釋雖順囉字相阿字似無用疏釋煩惱義違無塵如何答不達八轉聲梵輒難定嘉祥義疏第一云雜心羅漢以為無著故經阿羅訶亦云無著文可思之釋論謂之等者智論第二云云何名阿羅訶阿羅名𮚆訶名殺是名殺𮚆如偈佛以忍為鎧精進為鋼鉀持戒為大象禪定為良弓智惠為好箭外破魔王軍內煩惱𮚆是名阿羅訶復次阿名不訶名生是名不生佛心種子後世田中不生無明粳故復次阿羅訶名應受供養佛諸結使除盡得一切智惠故應受一切天地衆生供養以是故佛名阿羅訶文此中不舉事破魔王是於衆生有無畏義歟又內煩惱又若約一無明義有衆生同斷義故令衆生生善心故有無畏義歟謂佛心種子等者佛心諸惑斷盡故又不受生死有漏果報猶如粳米田中更不生也煩惱譬粳生死有漏類田中也穀皮是粳也嘉祥義疏云阿羅漢是外國語以三義訓之一者殺𮚆以智惠刃殺煩惱𮚆此約離因患就現在論也二者不生以煩惱粳故後世田中更不復生此約離果患就未來論也三者應供具足智斷應受供養謂內應真理故外應供養文此三義同今疏也三藐名正等者智論第二云云何名三𦴭三佛𨹔三𦴭名正遍佛名知是言正遍知一切法問曰云何正遍知答曰復次知一切法實不壞相不增不減云何名不壞相心行處言語道斷過諸法如𣵀槃相不動以是故名三𦾜三佛𨹔文釋論云若有人等者智論第二十一云問曰云何念佛答曰行者一心念佛得如實智惠大慈大悲成就是故言無錯謬麁細多少皆是實故名多𨹔阿伽度亦如過去未來現在十方諸佛於衆生中起大悲心行六波羅蜜得諸法相來至阿耨菩提中此佛亦如是是名多𨹔阿伽度如三世十方諸佛去至𣵀槃此佛亦如是去以是故亦名多𨹔阿伽度有如是㓛德故應受一切諸天世人最上供養是故名阿羅訶若有人言何以故云云已下全同私案此論釋如來應供正遍知三名展轉受前為因而釋後名也釋阿羅訶如是㓛德者前阿伽度三義也此德為因成應供義也若有人言下以前應供為因成正遍知義也或疑云但佛如實如來如去故如是㓛德文即前阿伽度中三義也應受最上供養耶智論正文無耶字疏中加歟可撿唐本以佛下通難而釋正遍知義也意佛受最上供養是得正遍智惠故為言又準此文但有三義何疏中云釋論具𭇥四義耶謂智度中如實智惠等義𭇥如知義歟故疏云如法實相知已亦如實相云云或餘文中四義歟論中多𨹔阿伽度者今經怛他揭多也餘二名同矣然此宗中佛𨹔名覺等者覺有開敷義知不爾歟問遍覺遍知其義同遍知何不譬開敷蓮故大師釋云覺知義相涉故文况佛地論云能自開覺能開覺一切有情如夢覺如蓮華開故名一切智者文此文同今文若爾覺義何但密義耶答覺有開覺開敷二義開覺義雖通顯開敷義局密歟心蓮開敷名佛故云亦能開敷一切衆生即此意矣又蓮華有當體譬喻譬雖通顯體唯密故疏第十九云觀於自心八蓮華此花不從餘處生即從意生意即是華無二無別也文又雖覺知相涉寬狹別故釋論中覺十義中有覺知二義故又義南方是諸佛灌頂方覺是當開敷覺華義故佛𨹔名覺為密乘談歟又般若寺抄釋此文云如常所言三覺義也文私云亦能下覺他義已上自覺義二利具足即覺行圓滿義也梵云薩婆若那等者智證大師疏抄云梵云薩婆若那即是一切智智有本云薩婆若若那或本停若重字也唐本云若那若那今案言薩婆者是一切也若那若那是智智也若存一若那者智智之義不成又云釋論云薩婆若多者即一切智疑云一切之言彼此不異至於智言梵語似異其意如何阿闍梨云梵語之中讀那若為多例如此間音相似者涉而用之文即心義云薩般若者古云薩云具云薩婆枳曩云一切智智文即身章云薩婆若云一切智正體智薩云若云一切種智後得智取意準此等釋若那或智智或但智經論各顯一義若那若多雖似異一種梵語故良賁釋云大品以若一字通名智惠以般助若若名惠以那助若若名智般若云惠闍那云智而亦惠處智智處惠文準此釋若一字猶具智惠二義若那何無智智義又云一切智智者此有二智一切智者即證如智下言智者一切種智後得智文準此釋但云智𭇥二智智智者開二智開合不同唯是若那梵名也又薩婆若云一切智薩云若云一切種智若一字𭇥二智也故今經云一切智智論又可云一切智智也故般若經等中一切智智文釋論云等者智論第二十七云復次薩婆若多者薩婆𥘿言一切若𥘿言智多𥘿言相一切如先名色等諸法佛知是一切法一相異相漏相非漏相作相非作相等一切法各各相各各力各各因緣各各果報各各性各各得各各失一切智惠力故一切世一切種盡遍解知以是故文一切如先者同卷上云問曰何等是一切智所知一切答曰復有一切法所謂名色復次一切法所謂色無色可見不可見有𭔹無𭔹有漏無漏有為無為如是等無量二法門攝一切法復次一切法所謂善法不善法無記法如是等無量三法門攝一切法復次一切法所謂過去法未來法現在法非過去未來現在法如是等無量四法門攝一切法復次一切法所謂色法心法心數法心不相應諸行法無為法如是等無量五法門攝一切法復次一切法所謂五衆及無為如是等無量六法門攝一切法七八九十等諸法門復次一切法所謂有法無法空法實法所緣法能緣法聚法散法等如是等種種無量阿僧法門所攝諸法以是無得智惠盡遍知上諸法名為一切智一切種智文私案疏中前後文合論取意略抄準論文名色等二三四五六等一切智所知諸法數也一相異相等一切智所知行相也謂今智正知二法乃至無量法一相等及各各相各各力等也木幡義云上二三四五六等舉能攝名數是一切下釋所攝法體故上云攝一切法今云是一切法耳一切謂名色等者智證大師抄云一切謂名色等阿闍梨云謂一字㔟至各各失也文意一字廣被之義歟天台釋云究竟非二故名為一其性廣博故名為切文問名色二法云何攝一切耶答智禮要云今以色心二法取盡故大論云一切世間中唯有名與色文故知名者名心法以色心盡一切法也問疏第七云復次世尊於法自在或以一字攝菩提心等種種一法門或以二字攝止觀等種種二法門乃至無量字攝無量法門文此既從一至無量今何不舉一法門耶答今舉所知一切法故一非一切故彼顯於法自在義故或此二三等各攝諸法盡彼一二等未盡諸法菩提心止觀等唯淨法故又問智度一切智是二乘智歟故論云一切智是聲聞辟支佛事道智是諸菩薩事一切種智是佛事文若爾何今證佛智耶答彼論云復次聲聞辟支佛雖於別相有分而不能盡知故相受名佛一切種智皆是真實聲聞辟支佛但有名字一切智文疏第七云又大論明薩婆若有三種名一切智與二乘共道種智與菩薩共一切種智是佛不共法此三智其實一心中得為分別令人易解故作三種名文故知佛有三智中一切智共二乘也然非無淺深故今文是明佛智故無失今謂一切智智等者或云此心非簡釋論釋智智重點之義也非但以一切種等者釋論一切智惠力故意也今案非但以一切種等顯今經一切智勝論一切智也彼一切種唯名所知諸法一智知一切故故花嚴師釋華嚴經一切智云窮達一切法圓照一切境名一切智也文故知論一切智依主立名經一切智持業得稱故能知之智亦無量故云以一切種知一切法也故即身義云一切智智者一切佛各具剎塵智故名一切智智不同顯家一智以對一切得此名略抄亦知已下釋次智字是智中之智義也前智知諸法差別事相後智知諸法平等理性也即正後二智行相歟問智中之智釋未必二智義歟又新仁王經疏云切智智者此有二智一切智者即證如智下言智者一切種智後得智也文違此釋矣又大師釋未必二智又正後如次知事理顯乘盛談何為今宗規摸耶答智智兩言二智配釋隨冝安立寶師𣵀槃疏云由闍那俗智能顯實智故文準此今釋勝歟大師釋智智各通二智故不別配歟彼顯家性宗猶二智互照真俗境况今宗耶二智各知事理法故諸義無違耳但至同顯乘者既云非但以一切種若後得若正智皆能知智無量故永異顯矣顯家正智證一切法如故云一切智後智緣一切法故云一切種智也又智中之智者一切智言同論故云爾實非顯也問能知一多勝劣可然所知事理又有淺深耶答彼緣起法事理此六大本有事理也彼所生末也此能生本也又密事理性之處性相故又彼一心真理此六大法性故如是自證之境等者自證之境者指經中得一切智智也云今謂一切智智是也謂彼位如義語不談故云者無言一一心不緣故云觀者無見謂之法身自證之密宗玄底故疏上文云然此自證三菩提言語盡竟心行亦寂文又大師釋云五居足斷十慮手亡文問既云者非無如義所行者正證位不依他言故云爾非謂自證位絶言歟觀夫顯乘以一心為理故實證時無色無言也真言以六大為理故自證位三密𭓩然也既具三密何云無言無見又五言十心悉何有自證耶答凡大日如來住加持身𡚒迅示現時金剛手致得一切智智問是則課加持身疑本地事故疏又約加持身云者觀者指自證位故云無言無見也彼自證位無師自悟故在本地身不以言語可授人也次舉喻即此意也然在加持身為自受法樂彼自證之境也故疏第十二云如飲水者冷熱自知尚不可為不飲人况如來境耶然佛以加持力故此不可文又第六若是自然之惠則非修學可得亦不可授人如內證天甘露味假令種種方便為未嘗者之終不解然佛大方便力以無相法身作種種名相加持令諸衆生以因果法證得非因非果法文既云佛以加持力不可又云以無相法身作名相定知本地無相位無言語明者歟况後文歎方便智明俗諦法義第一義諦本地自證位無法義決定矣又至一心三密難者顯家以一心為極故法身雖無形自證成道自受用為本彼身無非無身口等若爾今法身雖具三密自證位無何失加持身猶現瑞時不法歟几廣案自宗意有相無相重重略作四重釋初淺略釋情無相謂九種迷情妄假相故經云非青非黃等是也此同顯家百非洞遣果性不可故大師雖同天台非無淺深彼四言不及故此如義破執故後於表德顯實中有三初有相有相自性法身為劣惠所五部三密等䡄則也經云於當來世時劣惠諸衆生唯依於有相隨順是法文次無相有相謂被勝惠所舉足下足皆是密舌相所轉皆是真言等也大師釋云若入字門悉離一切相離相之相無相不具文又經第七卷云甚深無相法劣惠所不堪為應彼等故兼存有相文此文無相證今重有相證前重也後無相無相謂祕中深祕自證勝劣二機不及言心兩種俱絶然理智𭓩然非都無故自有理智覺本不生云自證三菩提也疏第十九云當知此空是自證之理也想既空無所有名亦如是文私云想者一一心名者如義語也又云於究竟自證不思議空法之中而具一切㓛德由自然智加持此字門故生無量語文自證空法中自有理智覺不生故云而具一切㓛德此德皆無想故云空法也瑜經云我本無有言但為利益文我本無有言者本地自證位也疏云自證之理是也但為利益者被勝劣二機有相無相教意疏依自然智加持生無量語是也又不思議疏下云一祕釋者毗那佛本不生故二祕密中祕釋者阿字自本不生故三祕祕中祕釋者本不生理自有理智自覺本不生故云云以此文如次證表德三重矣大師釋非九種心量所緣一一心所緣又非一一心所緣不二心所證而已文私云以前二句證前三重以後兩句證第四重耳菴摩勒果者智證抄云唐土有賣菴之果者其形如本國復梨淨名疏中云有似捺而非捺其義似當是私謂也云云注浴像經云菴羅果者沼法師云此云甘子子小此是余甘子是也奧法師云此云酢味似桃之也浮草也云云定光授決者大論第四云釋迦文佛從過去釋迦文佛至罽那尸棄佛為初阿僧企是中菩薩永離女人身從罽那尸棄佛至燃燈佛為二阿僧企是中菩薩以七枚青蓮華供養燃燈佛敷鹿皮衣布髮掩泥是時燃燈佛便授其記汝當來世作佛名釋迦牟尼從燃燈佛至毗婆尸佛為第三僧企文同第九云燃燈佛名定光佛也私云依此文定光授決者釋迦菩薩供佛第二僧時燃燈佛授記也義釋第八引不思議境界經云普賢菩薩告德藏菩薩云世尊初從燃燈佛所得受記已即便入於如來不思議境界三昧常無功用自然應現無量佛事文金剛般若經云燃燈佛與我授記作如是言汝於來世當得作佛釋迦牟尼文惠影疏第二云燃燈佛者是定光佛文問意言云何等者且以一假文配經文云何乃至自覺之惠者釋云何乃至得一切智智之文也云何乃至一切智智者釋彼得乃至一切智智文也依此釋經文云何兩字可流彼得句所謂安立無量乘者釋或聲聞乘道乃至摩睺羅伽法之文也示現無量身者釋若有衆生乃至非人等身之文也各各乃至解味者釋各各乃至解味之文也此妙已下二句㧾結問意問經云如來釋云我等能化所化相違又所問通內證外用結何唯云方便耶答或云問佛得是問可令行者得之故又問佛得專為行者之故云云或云依經意作釋也云云私云經釋影略佛生互顯也又我等者舉金剛手菩薩界等取二乘六道九界衆生自心品即佛界一切智智故故上釋云即是衆生自心品即是一切智智文又下釋云一切衆生色心實相即是如來平等智身文故經釋無違又衆會疑心專現瑞故雖有二問就正云方便也或於方便有向上向下故二俱結之向上自證向下化他又義今問意言已下但釋彼得以下文歟以上經文上既牒釋故妙方便之結專同經方便之文故下釋方便道合龍樹般若方便文可思之或又經二句如次約如來及衆會歟彼者指衆會待如來故疏舉上問云得此一切智智可思之毗婆沙有五道者彼論第百一有此也智證大師五道六道決五道為正云云今疏中未判正不但準三十六俱胝衆生趣五道為正歟疏下文中三十六俱胝不開修羅故抄中開修羅違疏故智論云小乘三藏唯五道不六道摩訶衍中六道如法華見六趣文今釋同論矣指事云小五大六文云云三十六俱胝衆生趣者疏第十一云如大乘中欲界有三十六處謂寒熱地獄各八共成十六也又四大州此四州又各有二隨州合十二州并前二十八及六欲天并傍生鬼合三十六文抄第二云三十六俱胝者起信疏云三界五趣共三十五處所謂三塗四州六欲天此界十三處并色界十八天處無色界四天處如是三十五處生死輪轉今開修羅即三十六文今三十六處疏意局欲界抄通三界準廣五道似可通三界矣欲名信喜好樂者欲者希望為性信者心淨為性喜是希求義也玉篇云樂也心淨希求為欲即善欲也唯識論釋信云深忍樂欲心淨為性文今釋欲云信喜好樂信欲樂相順可知矣問孫𨹔好五欲等非善欲何答通三性中今且約善欲作釋歟得道人所好皆善欲故性名積習等者抄云由本性故能積薰習之相漸生欲樂順性起業即當本性住也性先有欲得因緣而生譬如先有瘡得觸因緣然後血出或時從欲為性者欲數數希望不捨遂成其性即習所成也文準法相等釋義法爾無漏種子云本性住此種子依有漏聞薰等力所薰增云習所成也然今性欲是染心故性名染心文何云本性住等耶謂今性欲又樂欲一切智智故但取善性歟云信喜好樂即此意也但染心者抄云言染心者非惟不善有覆名染但約耽著其事名染具通三性文或云性自性習串習若人生慳貪家串習慳貪行等此習積而成貪性內成貪性故外行貪欲相從性生者性顯外云相即欲也故云欲隨性作也云云性名染心等者抄云辨性不同謂性有淨染利鈍今明染心事謂事業即染心為業欲名隨緣起者通染淨緣謂𢙣欲衆生隨邪教常入𢙣故鈍善欲衆生隨善友等樂道修助道法故利或可言染心者具通三性文依此釋善心作事可訓又事是躰義染心為躰也是事釋論中具明者智論第二十四有今性名積習乃至隨緣起之文同但性名染心為事云云異今文矣又論下文云隨所著生欲隨欲染心隨深心趣向云云染深相違可撿論疏勝本耳龍樹云般若等者智論第一百云般若波羅蜜中雖有方便方便雖有般若而隨多受名般若與方便本躰是一以所用小異故別譬如金師以巧方便故以金作種種異物雖皆是金而各異名文私案智論中以權實二智類金物今以智乘譬金物隨義轉用歟或又論以般若方便為異物更以理為本躰歟今云真金智躰又轉用歟又嘉祥釋般若為躰又智論次上文云般若波羅蜜躰云云或以此內證外用同彼權實二智歟復次此中問意等者凡於金剛手疑問有二意謂前釋意種種方便道無量乘無量身為加持世界事今釋心以彼即為自性會事問疑問起專舉所現事可疑之况隨種種趣等文指實行之言非加持世界何有此儀耶就中大師引今文成如常人天乘等義何答疑問雖依現瑞金剛手惟忖以加持世界種種身推知自性土各三密之儀豫述彼意歟故上釋云普見加持世界唯平等法門即知如來將演遍一切乘自身成佛之教故下文所問乘此而生也文既云遍一切乘非無量乘義三重聖衆雖非教主各自證法門故云隨種種性欲又外院中六道四生羅列故云隨種種趣也此等皆自性所成眷屬非實行歟或又指未來機歟或現佛身等者從法門身現羯磨身歟大師釋中證如常是隨義轉用疏意加持世界猶真言道故况住心論中今文證深祕義耳或又寶鑰住心論如次依疏家正釋復次意歟宣真言道者開會意歟又解云前釋約加持世界正時云如此事復云何而得也今釋發起未來流通四重壇故問也具緣品所七日作壇等事是也即是發起大悲胎藏曼荼羅也者此意矣於薩婆若平等心地者法佛平等心地也謂如來一切智性同一味故云平等此智性是曼荼所依故云地也從此心地現四重聖衆故云畫作諸佛等也畫作者現作義也故疏第三云然以如來加持故從佛菩提自證之德現八中胎藏身從金剛密現第一重金剛手等諸內眷屬從大悲万行現第二重摩訶薩諸大眷屬從普門方便現第三重一切衆生喜見隨類之身文問若爾今四重壇具緣所所發起𭦟荼歟答不爾彼開發衆生心地之荼故此如來心地之𭦟荼故為欲明未發起衆生荼故先明已發起諸佛圓壇也故次下釋云佛從平等心地開發無盡莊嚴大𭦟荼羅已今經自性會四重壇也還用開發衆生平等心地無盡莊嚴藏大𭦟荼羅文具緣品所等未來流通壇也問何以具緣品所知衆生心地荼耶答經文分明故具緣品云爾時薄伽梵告持金剛惠常當於此夜而作荼羅文疏第五云謂於第七夜中使法事都畢也初入夜分即當盡諸位安置諸供養具明相未出已前使撥遣竟文斯乃末代傳法阿闍梨作內道場儀式也故知未來流通荼也又經云內心妙白蓮胎藏正均等藏中造一切悲生荼羅文疏云內心妙白蓮者此是衆生本心妙法芬𨹔利花祕密幖幟此蓮華臺是實相自然智惠蓮華是大悲方便也正以此藏為大悲胎藏荼羅之躰其餘三重是從此自證㓛德流出諸善知識入法界門耳此是如來祕傳之法不可形於翰墨故𭔃在圖像以示行人若得深意者自當默而識之文既云衆生本心以衆生心地荼𭔃𠷰像而非示行人耶又準此釋者畫作諸佛菩薩等者直指具緣品所歟𭔃在圖像云畫作故但前義為勝果地荼故問今佛菩薩等相配四重壇方如何答第十四云又此荼羅一一分位各有種子用摽記彼差別法界之門隨彼四重分位從佛出者即是佛之幖幟或從菩薩分位而出或從二乘分位而出或從天龍八部分位而出當知階降差別各各表知種子不同也文準此文諸佛菩薩二乘八部如次似為四重矣又疏第七云謂中胎藏毗那第二院觀音金剛手次院文殊等四菩薩外院釋迦牟尼及所舉本尊等文準此釋常三重壇加中臺等為四重歟既第一重觀音金剛手等云第二院故知以中臺八為第一重也文殊院等第二重四菩薩為第三重第三重外院及釋迦牟尼為第四重也故知三重荼羅加中院為四重壇也三重約能圍繞聖衆四重能所合論也當知今文諸佛者第一重中臺八四佛四菩薩即一毗那醍醐果德故云諸佛也故疏第三云從咽以上至如來頂相四智四三昧果德佛身文次菩薩者三重中第一第二重三點眷屬四大菩薩也四重中第二第三重也故疏第三云自臍以上至咽出現無量十住諸菩薩此中自有二重從心以下諸大眷屬從心以上諸內眷屬略抄內大俱云諸菩薩故今菩薩攝也二乘八部者三重壇中第三重四重圓中第四也二乘者釋迦院中舉伴顯主彼院中有阿難須菩提目連迦等故八部者外院所列八部衆故故知非如次為四重耳又義三重但加八為四重歟疏第二十云此八即是大悲胎藏第一重也文若爾四重皆約能圍繞伴歟依此意諸佛者但四佛四菩薩歟大師釋云大日即心王餘尊即心數文可思之或第七釋猶同此歟唯舉中臺次云第二院觀音以八為第一重歟抄第六云第一重有三謂中臺鬢𦯕八也文準此釋第一重隨冝可取矣又約支分生荼三重四重是開合不同無尊加減也疏第五云且如是上文所從大日如來臍以下光明是此第三重位自臍以上至咽所出光明為第二重位自咽以上乃至於頂相之光為第一位文又第十五云如前所以身四分作四重荼羅位文私云前所者指第三卷支分出現文也疏第三云今約佛身上中下躰分之自臍以下現生身釋迦其眷屬不同自臍以上至咽出現十住諸菩薩然此中自有二重從心已下諸大眷屬從心已上諸內眷屬從咽以上至頂相出現四智四三昧果德佛身取意當知或約上中下三分為三重壇或約身四分為四重圓中分開二重故又廣澤胎要抄云前後四重左右三重云云上方遍知院第一重釋迦院第二重文殊院第三重外部第四重下方五大院第一重空藏院第二重悉地院第三重外部第四重故云前後四重也左方金剛手院第一重除蓋障院第二重外部第三重右方觀音院第一重地藏院第二重外部第三重故云㔫右三重也此乃依現圖荼羅也又依經疏意中臺八外上方遍知院下方五大院左方金剛手院右方觀音院為第一重也第二重上方文殊院下方空藏院左方除蓋障院右方地藏院也第三重上方釋迦院四方外金剛部衆等也現圖壇釋迦為第二文殊為第三與經疏異真奧僧都胎藏記云上方遍智下方不動等右方觀自在左方金剛手名第一重院第三妙吉祥今言第三從中向外當第三故密云第三本經及儀䡄又疏中皆云第二也然圖中在第三也北方地藏尊南方除蓋障西方空藏及悉地眷屬為第二重院然悉地會有論之以釋迦院及護世天等為第三重也四方大護圖中闕之可在第一重內二守護門可在四方之內門也然古記中判三重所攝尊位不定又與圖中有合不合皆任意端邪正難辨取意又準此記悉地院第二重攝也覺超僧都胎藏生起之悉地會諸師不必為別會也空藏會之中開出此會云云此又為空藏會攝故知第二重攝矣又般若寺石山兩德判現圖胎藏諸尊位中第一重如先以文殊地藏除蓋障悉地為第二重第一重觀音院次舉釋迦空藏二院尊不云何重其次摽第二重舉文殊院等尊以彼二院似屬第二重矣前後四重中以第二屬第一為三重歟且如有人等者或云前自性圓壇謂從如來心地開發無盡藏故今加持世界壇謂為開發衆生心地壇故而𡸁應迹外現荼故故或現佛身者受用變化二身也韋𨹔梵志及非人身者五通神仙天龍八部等也即等流身也私云此文重委釋前四重壇也今大悲胎藏者即前平等心地謂菩提自證德乃至普門方便等法門身即本地自證位也現者現作義即畫作也韋𨹔等是第四重五通神仙等或現佛身者八中胎藏身第一重也乃至者第一第二重內大眷屬也故疏第三云如先斯則加持壇自性會本地自證位無法故但行者精勤等者舉未來流通事非謂會座有實行歟疏第十四釋𨹔羅隨佛菩薩二乘八部四重分位而出畢又云欲為普利一切衆生故流傳演布普為一切未來衆生亦為利益諸大衆會故請佛演也文此文明鏡歟又上外現荼者指自性會從法門身現羯磨身歟即從大悲胎藏者大悲胎藏者一切智性如來種子故下文云大悲荼羅一切種子之所出生文一切種子者一切智性自證法門也或云以大悲胎藏為所生四重壇恐誤歟委言之胎藏種子為因智門五義為緣生四重圓壇也故經具緣品云修真言行大悲胎藏生大荼羅王文疏第六云法界不思議色絯而言之不過五字如來以普門善巧圖作悲生荼文經約衆生因生義疏就如來明緣生義生佛影略經疏互顯因緣具足大論因是識大一切智性故緣即五大智門五字故細談互具六大無障無得也一切智性者經彼得一切智智自證位也即是如實知自心故疏上釋云所謂衆生自心品即是一切智智文今云平等心地即此也現韋𨹔梵志形者抄云韋𨹔此云明即外道四明也聲因醫內等梵志者梵者淨也謂以淨行為志名為梵志形即身形謂從荼羅第四重內現此梵志之身為瞿曇仙等真言瞿曇梵語具足應云喬答摩此曰𬉹種文準此釋所現身加持世界知識也今謂自性會第四重聖衆皆住自證三昧而各真言普通真言藏品等所未代衆生傳持彼所而行依彼行同本尊故云精勤不久等也或久或近準知矣久近頓證漸次二類歟或依宿緣有無有久近歟更轉方便等者前云即是普入今何云更轉方便耶私案機有四類或修一門得一門果畢更轉入普門也或依一門行得一門果即得普果故或解一門即普門而行故或行普因得普果故故知前後約機不同歟或又前一門修行人不入餘一門直入普果故云即非不轉歟或今文又悟仙身即大日故云轉非轉捨歟故疏下釋云行者如是解時觀毗那與鬼畜等其心平等無勝劣之相彼從一門而入皆見心王文故無相違矣又智證大師抄云阿闍梨云那成瞿曇仙身雖不無淺深若無淺深者尚不可轉仙身何故言轉答約佛智元無別隨人機有差別若不隨人機故者如天台山決答中具四教四土耶答前者未之時約機情也今至此經仙人即大日尊時除大日外更無仙身故非如天台山答具四教也文此又同下疏釋矣隨類形聲等者形者仙身乃至非人身也聲者種種乘也此中形密聲真言也無非毒鼓因緣者抄云𣵀槃經如來性品云譬如有人以雜毒藥用塗大鼓於衆人中繫之發聲雖無心欲聞聞之皆死唯除一人不橫死者鼓合𣵀槃死喻惑不橫死者喻一闡提此况曼𨹔羅所現之身所之乘雖四重差別無量若隨此趣入者無不能惑無不能至𣵀槃故以相况耳文私案種種乘雖異諸乘融會皆開心實相門故云無非毒鼓因緣又云皆同一味也故疏第七云就此經宗則五種三昧皆是開心實相門不同餘教以心性之旨未明故不相融會也略抄又第六云所以然者等者或云此釋成如是一切智智同一味之所以也謂所化一切衆生色心實相從本際以來常是毗那平等智身故以應之能化無量乘字真金之智躰心王大海之一味也云云私案皆同一味之義不局種種乘又可通種種身故疏第六云三重𨹔羅所示種種類形皆是一種法門身是故悉名為佛文又云了知種種三昧道同歸一躰皆是佛乘文法門身者即字門也又義上畫作圓壇即具緣品所荼彼開發衆生本心荼然今釋果地荼義故會彼此相違故云衆生色心實相如來平等智身也色者色薀心者四薀是衆生有漏五薀也智者識大身者五大即諸佛無漏六大也現覺諸法本初不生故衆生五薀即六大法身躰色薀即五大四薀即識大故疏第六釋菩提實義云謂覺自心從本以來不生即是成佛而實無覺無成也文妙感妙應不出字門良有以哉佛從平等心地等者私案佛已開發荼是自性會圓壇今經會衆生心地壇所發起荼具緣品所未來𭤩通之壇也妙感衆生心地妙應諸佛心地所生方便諸佛衆生所開發四重圓壇也諸佛荼應緣衆生心地感因因及緣所生果皆字門故云皆同一味也問疏第二十云若如來但住自證之法則不能度人故漸次流出漸入第一院次至第二院次至第三院雖作如此流出亦不離普門之身其八部之衆皆是普現色身之境界也若就情機而則三壇從深至淺乃至世天真言義淺但是應身方便未究竟也若開實性即世天真言與大日如來何相異耶從如來則從深至淺從內漸外而成三重壇從衆生則從淺至深從外漸內而成三重壇也文此釋心於法然荼若依如來從本𡸁迹若約衆生從因至果若爾何云開發諸佛壇已還令開發衆生圓耶答彼釋於法然荼或有如來果地之從本𡸁迹或有行者因中之從因至果以行者所修善𭔃𭦟荼羅而攝三重分位也今意諸佛既修顯更令衆生開發故彼此意殊歟問前云衆生色心即如來智身何云諸佛衆生荼向上向下殊耶又諸佛壇無從因至果義衆生圓無從果向因義耶答疏第二十云若就未成果時觀之此則差次淺深今以如來平等惠觀從因至果但是如來一身一智行耳文準此釋從因至果又如來一身一智行故於果地有此義歟準衆生又約本覺門可有從果向因義歟問疏第三云若自本𡸁迹則從中臺一一門各流出第一重種種門從第一重一一門各流出第二重種種門從第二重一一門各流出第三重種種門若行因至果則第三重之所攝成就能通第二重第二重之所攝成就能通第一重第一重之所引攝成就能見中胎藏文此又行因至果唯在衆生云攝成就故從本𡸁迹唯佛耶答彼又如來住自證法無衆生蒙益故從自證位現四重壇也於彼壇為顯果德無得且作上下二門也行因至果全非實行入義若實行第三重依攝可進第三重何入第二重耶故知且反從本𡸁迹第三重聖衆假互攝入第二重也第二第一等又爾也問若爾果地圓壇無實類耶若云無者何云輪圓具足耶若云有者大師釋云皆是從果向因之人非從因至果之人文如何答若約十界躰實類有依法本不生邊六道四生皆到於實際人故若依十界相無約遍計分別邊長夜受苦人故故大師釋云迷悟在己無執而到文迷悟不同唯所執有無耳問或云不動九界迷情悉同等流法身云云非挫所執耶答既云迷情依他妄法也所執當情現無法故衆生平等心地者衆生八辨團生大𨹔羅王故云地所生四重一切智智形聲同一味故云平等平等之心地故云平等心地也故先德釋云恆沙之性德具一心本源荼莊嚴在八辨團云云大悲胎藏祕密方便者前明所生四重圓壇故云大悲胎藏𨹔羅今明能生五大故云祕密方便也或云大悲胎藏者所生圓壇祕密方便者能生因緣也文點云為欲發起大悲胎藏祕密方便故云云私云大悲胎藏者一切智性種子即因也種子是胎藏義故祕密方便一切智門五義即緣也意云為欲發悲藏種子之祕密方便五義之故為言或又為欲發起胎藏種子因之五義方便緣故為言種顯果待緣故四重圓壇為果也又云大悲胎藏者內證圓壇內證故云胎藏為利生本故云大悲也祕密方便者加持圓壇外迹故云方便異顯乘故云祕密矣所謂內證圓壇於一切智地建立一種法門身也外迹圓壇住神力加持建立三重𨹔羅種種類形也疏第六云三重荼羅所示種種類形皆是如來一種法門身是故悉名為佛文內證外用雖異皆是六大所生故意云為欲發起大悲胎藏與祕密方便故五喻也為言所謂空地水火風也者私云經文如疏釋次第亂可讀之歟但空初舉者依正二報五輪影略互顯歟依舉空正舉四大也故第五卷云真言者圓壇先置於自躰自足而至臍成大金剛輪從此而至心當思惟水輪水輪上火輪火輪上風輪文即身義云圓壇空金剛輪地也疏家次第順此次第矣又經第一列五佛中東南北西次第也今經次第同彼次第也下文五字次第如常具緣品云我覺本不生等頌次第也故知三次第今經出凡厥六大無得常瑜伽故列次第無一準例如真門雜亂住矣如此即是毗婆沙義者所牒經中以一切智智類空何指彼云毗婆沙義耶私案可讀文點如此即是毗婆沙義空無過無德今如來等云空無過無德者問起信論中云空妄法俱舍論中云空無為故知空有過德二義何云無過無德耶答婆沙云空者無為空界者有為文準此文者今空者空界色歟故經云空界文非空無為歟但起信論文者彼性宗意何同婆沙義耶此中相况有三義等者指事云空有三義文釋此三句自有二畨文云云私云三義者經三句歟云釋此三句故此目近詞也經三句者離一切分別無分別無無分別文此三句即三義故或云疏三義歟疏云有三義故或經三句疏三義同歟故疏言此中相况有三義故三義逆次配之離一切分別者離妄執分別故云無分別經無分別者離分別度量故無邊際義也無無分別者離細分別故畢竟淨義也或又經簡略故舉無分別一義疏廣博故顯餘義歟二番文者空有二重釋故或云前約實智釋後約權智解也私云上約分喻也謂空無過無德佛智離過成德故下釋約全喻也謂空佛智同具離相成辦二義故又義前空界後大故所以重言等者抄云應長聲讀之應云劫跛劫跛夜帝劫跛者分別也夜帝之言即是更義謂分別之上更生分別也此即於麁分別上更生細分別是以疏例云如尋伺等文私云釋意劫跛者經離一切分別之分別也即麁分別也劫跛夜帝者經無分別之分別也即細分別也如次配尋伺矣意云於空離青黃等麁分別云離分別遣質得無質得等細分別云無分別遣能遣空病云無無分別也為言離與無云空病歟此則次第展轉遣之矣智證大師抄云離一切句是㧾舉也分別梵云劫跛是麁分別無分別梵云劫跛夜帝此細分別疏云無妄執分別故無分別亦無也故今以分別與無分別為所斥也文般若抄云梵劫跛是分別心也次劫跛夜帝者此無分別也文私云此釋意夜帝者無義也故知次云無分別者第三無無分別之無分別也第二不舉者同離一切分別故歟然則分別之上更生分別義者如次釋經無分別無無分別文也但細分別名無分別者望麁分別故例如釋論應不應矣意云離一切分別故句無麁分別無分別也類尋也又無細分別無無分別喻伺也也為言但牒句作別句釋者分別言同故歟又夜帝更梵名直可安劫跛上既不爾存下是應無也例如尋伺等者唯識論第七云尋謂尋求令心忩於意言境麁轉為性伺謂伺察令心忩於意言境細轉為性並用思惠一分為躰於意言境不深推度及深推度麁細發言文淺推度麁轉云略觀深推度細轉云諦察歟淺深推度即麁細分別義何為例證眼識意識又爾今分別無分別者一聚相應法多中且舉麁細異王數例餘心所等歟猶如云異生羝羊羝羊亦雖異生其中最劣為喻故又妄執分別未必與尋伺俱起尋伺非定相應法故二禪已上無尋伺故欲界煩惱心未發言時不有尋伺故又今分別是妄執分別五識非執相應識護法意然今宗八識皆執相應故同安惠義歟問尋伺躰類既同可一時俱起何略觀諦察別時耶故俱舍論云尋是麁因伺是細因故於一心俱有作用文何答其性既麁細異何俱起矣故經部并大乘意不俱起也故唯識論云四中尋伺定不相應躰類是同麁細異故文但俱舍釋薩婆多一義歟問尋伺與何識相應耶答唯識論中有二師義有義尋伺且五識俱文又云有義尋伺唯意識俱文俱舍云謂眼等識有二種因故與尋伺恆相應也文雖有二義唯意識俱護法正義歟又大論中尋求分別伺察分別等七分別十五種意不共業云云任意取捨矣無分別亦無分別者或本亦字下但有一無字今本同經上以無妄執分別故釋經離一切分別也次下二句如次釋經下二句也若依或本者經望麁分別云無分別釋細分別故云分別歟或又初無字被二句讀之古本無分別亦無也文智證所欖本同之以無妄執分別者麁分別也無分別亦無也者遣細分別也又如空離種種顯形色相等者此釋約太歟空界色顯色所攝故或又破執談歟自宗實義於空大論顯形故若爾太猶可有顯形矣此中又有三義離顯形是畢竟淨義合法離相無造作是無分別義也故法云無分別起作而能𭇥容等無邊際義合法於無量度門等也天人阿修羅依者問一切智智為十界依何舉三道耶答天在空故表真諦人在地故表俗諦修羅於空地自在故表非空非有中道也是則一切智地一心上建立三諦之義也此三諦猶如面上三目伊字三點矣故天台釋云心性不動假立中名亡泯三千假立空稱雖亡而存假立假文今準平等心中不動是中三重荼羅種種類形是假同一種法門身即空也一切智地等者且合譬者一切智地合大地大悲荼合百衆藥等一切種子合皆從大地種子即一切智地故之所出生合而生即此諸乘合根芽等根芽等草木藂林之德諸乘又普現色身之用故無量事業等合一切衆生等法舉所作事業譬示能作衆生故於生死𣵀槃其心平等合而養育之乃至無有勞倦養育恩德是𣵀槃也世間勞倦即生死也或其心平等合增之不喜減之不憂八風不動合深廣下二句或合增之已下四句歟世間八風者起信論云利𮕱毀譽稱譏苦樂文同疏云戝榮潤已耗侵凌故云利𮕱超過以毀越德而歎故名毀譽依實德讃名稱依實過論名譏逼迫侵形名苦心神適恱名樂文即此惠光亦無所依者煩惱云所依惑智起故上緣待者此也煩惱是智起緣緣又待煩惱起故云緣待矣煩惱薪盡故智火隨之意合譬中然後隨句矣釋論中云始覺隨無此意矣一切智火等者以智火合世火聖者異生合貴賤平等有之合同用凡聖智力漏無漏雖異皆有智力故云平等相宗立無性歟若不爾何譬貴賤同用矣或又平等有之約本有智躰故云火令諸行人等約修生智用故譬云照明行人合迷惑者令見合作照明如實道合正路餘可知矣譬中成就者俱舍云火能作熟業文二釋中今釋約利他釋智火故云令諸行人等前正釋約自利釋智火故云我當等也見如實道亦分有異生持齊等有淨菩提心少分增明義故如實知自心有十重故大澄廓等者此下四句合法中令證𣵀槃清涼法性文自在旋轉等二句合法中無障得力歟此中開榮增長者俱舍云風能作長業文滌除一切障蓋煩惱者準下除一切蓋障三昧者五蓋障煩惱歟蓋障煩惱故又準五蓋障中有煩惱障今取五中之一歟况準唯識等云煩惱障能障𣵀槃今又障𣵀槃故但煩惱障歟就中譬惱衆生釋專彼論此皆擾惱有情身心名煩惱障之文又下文舉無明是所知障故又五蓋障隨一有所知障故唯識論無明住地為所知障故故知一切蓋障通五蓋句煩惱無明彼中第一第五故又準理趣經一切蓋障及煩惱障文障蓋與煩惱歟五蓋障初地所斷今如來惠風所除煩惱中可盡一切惑歟故水大中云如來智若躰無煩惱火大文云一切論煩惱此等寧但局煩惱障耶但於障𣵀槃者唯識云理實俱能通障二果文所知又障𣵀槃故今煩惱有所知何失况彼二障是第二功所度少分第三劫所度猶云於業煩惱解况第二劫所知乎從高起下等者高下合法中法界世間多所饒益合利益群生能潤草木合潤諸等持而生華果合生助道法等二句而生花合生助道而生果合成大果實也又多所饒益合利益二字以草木合群生歟法譬𦂶文示之歟洗諸滓穢等二句逆次合獲得清涼定等二句餘可知矣又躰無煩惱至無濁三句初約本覺躰淨義次約始覺斷障義後約始本無二義如次自然智一切智無得智此中本性清潔者或云火燒塵垢令同自躰為淨風吹去塵穢令遠離為淨水不失其躰令清淨為淨故知淨除言雖同其義是別矣又火護摩義風辟除義水灌頂義也云云此五喻即是發起等者前釋明五大直發起四重圓壇之義今釋示發起荼羅能生衆緣之五字義也下文五字者經第三卷悉地出現品所五字𨹔羅等歟又如世間種子等者上顯五大即五字義故云字為地等今明此五字五大為三句之緣智性因妙果究竟故或上始覺下明五緣不闕之義或又今文雙結前兩釋而示若五大若五字具足至果之義也般若寺抄云意以此五大緣生長如來法性身譬如地水火風空為緣世間草木及万物得生長故以此為譬故胎藏䡄初以五大觀為旨耳也文私云此五大者一切智門五字義即能生緣也如來法性身者四種法身即四重圓壇即是所生四三世間也疏中一切智性如來種子者𨹔羅能生因六大中識大前云平等心地是也故上釋云復次以種種法界色疏六云法界色不過五字即緣也染無垢菩提心今釋一切智性也即因也成大悲荼羅故文四重圓壇也問疏第十四云此平等法界性種子即是如來一切智地之所生長文性種既所生何今為能生因耶答次上文云次生法界性種子即是一切有情平等種子也文意衆生平等心地種子依如來一切智地之所生長也感應因緣使然故故結云但因緣和合而有生長文故疏又云由此種子從法界性生能生法界故名法界生種子文能生法界者四重法界圓壇也今此因者約能生法界義歟問云五字是四𭦟隨一也何云能生六大耶答大師開題云六字能生四所生取意又住心論中上舉六字四畢能所無得六丈夫文又密嚴院抄云四種荼羅有二種一者六大無相不二之位直名四種荼羅次所生四種荼羅也文又云能生法界躰性之位有三密四謂等六大是也文今案云性佛性然故雖六大能造四所生法爾瑜伽故無能所而能所誰為其本故四六大互得其名歟又義十住心論等六字別舉是為顯六大法身不二位六大法身能生四所生故先德釋四外立法界荼故又五種法身意歟又義以六字顯六大故云能造非六字即能造歟法界攝故故大師釋五大種子云見此間火字字即如知火躰為生覺因故云種子文私案今宗儀䡄本經等中云種子在賴耶識中今以覺因云種等為種名言種子之意歟唯識第八云一名言習氣謂有為法各別親種名言有二一表義名言即能詮義音聲差別二顯境名言即能了境心心所法隨二名言所薰成種作有為法各別因緣文準此今又依二種名言所顯法然種云薰成今宗有為無為諸法皆法然故種子義又通為無為歟不同相宗本有新薰皆有為矣故經云生住等諸法常恆如是生文可思之問今宗器界觀等五字變成五大道場觀種子三形尊形次第轉成義未見了因種耶答彼文何名言種子義又本地自證位六大四性然故不可有轉成義加持瑜伽壇隨緣無得故論種三轉成義斯則三身互具故為利生隨隱顯而言轉成義也又五字變成五輪假五大非實故故知四大六大能造之名言種子義顯密雖同無常常住義顯密大異勿令相耳或人義云六大位有四青黃等大方圓等三等法大日寶幢等羯磨也此位四同攝於六大而為能生自餘心數諸尊大三法羯皆屬四而為所生也云云今謂不爾隨在何人法堅濕等邊能生六大也青黃方圓等邊所生四也此等能所造法顯三乘小乘云有為無常一乘攝相歸性云常住今宗談無盡莊嚴本具故能造堅濕等是法爾法然之躰所造顯形等又性佛性然之相也獨一法界加持相者具緣品疏云今普現隨類身而悉現如來身者明本迹不思議加持不二豈欲令獨一法界作種種形耶文又當卷上釋云能以遍一切處真金智躰造種種乘文今準獨一法界者唯一佛身佛乘也加持相者種種身種種乘也以獨一法界真金作種種乘故云爾也金剛手以下釋問來由故為問釋以上五喻釋也必知將如是法門等者般若寺抄云意先五大合生薩般若種子能成就菩提妙果此會諸菩薩令生疑也即疑云如是生立薩般若種子以何為因以何為根以何為究竟言即佛云菩提為因大悲為根方便為究竟文私云如是法門者一切智智法門下指如是智惠是也意云金剛手觀知如來加持相所惟忖知佛將一切智智法門故自先喻顯其五喻功德而發起大會生解之機也然後問佛如是一切智智以何為因乃至云何為究竟耶為言例如𣃥勒等者或云勒等疑如今經大會生解之機疑文殊發揮同此會金剛手之惟忖釋尊實相類大日答動犱之徒離疑似此坐當機散疑矣云云或云以金剛手類勒大日同釋迦矣即時憤憤悱悱者抄云言憤憤悱悱者子曰不憤不啓不悱不蕟鄭曰孔子與人言必待其人心憤憤口悱悱乃後啓蕟為之文為道場所得法等者法華經序品云佛坐道場所得妙法為欲此為當授記文義疏第二云佛坐道場所得妙法者謂一乘果也為當授記明一乘因也又佛坐道場明顯一也為當授記為破三也文文殊發揮者抄云發謂發明揮謂揮揚即文殊發揮為遣𣃥勒之疑文法華序品云我見燈明佛本光瑞如此以是知今佛欲法華經文如來以實相者又方便品云我以相嚴身光明照世間無量衆所尊為實相文義疏第四云四明為人實相定諸法則知自住大乘亦令他住大乘也文私云前序品我者文殊也後品我釋尊我也譬如春陽等者此有二義或前例證此譬也從得離疑句還例如文讀之若爾今經譬依若無機人等釋今經會座有實行歟答容有之義也非有實行或云有實行也又義從發起深益還例如讀之即例證中譬也故抄云無機即闡提五千之輩雖遇靈山法華際會由無佛種性故而不能發起深固大菩提願二利之益文私云此等例證一分相似歟其故彼此二經問答三聖二聖雖異大日釋迦現瑞金手彌勒疑問相同文殊指名躰釋迦演擬大日廣也然彼文殊答是序分也此大日答即正宗也又彼依身子問此依金手疑直故非全同耳凡作如此儀式是為未來衆生也故下釋云亦為未來弟子明此囑耳文春陽之始等者抄云禮記月令云春之月天氣下降地氣上騰天地和同草木萠動季春之月生氣漸盛陽氣發泄又易曰天地解而雷雨作雷雨作百果草木皆甲坼雷風者隂陽相勃出聲之謂也𭩮傳云隂陽相薄感而為雷風者氣也又雷即風也積風成雷鼓動者易曰雷以鼓之風以動之雨以潤之莩者苞中白皮殼即甲也此上皆喻動執之徒得離疑略抄御本記云建治元年五月比於高野山傳法院以傳法會談義之次草畢同七月比於醍醐寺中性院他人令清書畢自拭老眼加點畢若九牛一毛合佛意者願以彼功德為九品往生因矣披覽人必可令訪菩提矣金剛佛子賴瑜生年五十𭠍
