body:
  text: 䟽卷第三之一䟽猶是前心相句者前九句問中第四諸心相句故云前心相句也第二卷中以六十心及三劫文畢今更又故云猶是也問前六十心所度心今六無畏䏻度淨心何染淨異耶又三刧文通心相及殊異故䟽第二云亦是諸心相及心殊異也文今何但心相耶心相句意廣通染淨及顕密心相故隨冝可得文義也又今但心相𭇥多意或云舉心相顕殊異欤或云今心相通二句前心相𡱈一句欤問同云心相何有寛狹乎惣別異故故釋今品畢結云已淨菩提心諸心相竟文此釋意住心品所文皆諸心相可通修行句心續生等句故又云心相通顕密心殊異瑜伽行者心今六無畏文但所𭔃齊如常心故不殊異心欤問若尒三劫又如常何殊異耶第三劫明真言行者故故云復次真言門等文問若尒今又釋第六無畏云即是真言行者等文如何彼文此䟽釋欤或彼第三劫此前五無畏㸦顕欤又問今中金剛手更問何前心相句耶觀義云今重驚前問故本云前矣若但言今問者恐有人犱九句外故云云䟽第一云或轉生疑問以盡支𣴑文准例可知矣既聞此教等者金剛手所聞文異義不問云云觀義云通指三劫十地文也題入真言門住心品故又大師以三劫文證真言行者心相續義故又請問六無畏故實義云復次真言門修行菩薩行等第三劫文也故䟽釋云此教諸菩薩則不如是直以真言為乗超入淨菩提心門文淨菩提心者初地也即上菩薩地義也故云超入又云十地文復越一劫住此地文指此文也私云通二文也此教諸菩薩直乗真言門者指真言門修行菩薩行文也上菩薩地者指住此地文也且依本文上闕上地文下無直乗真言行文故二文合義理圎𬾨耳又義諸義皆非理九句問皆三劫未前問也何云聞彼乎故知九句問前此菩薩淨菩提心門等文也或又金剛手知佛而問欤或又六十心三劫雖此問猶未盡故以前為重問因欤此菩薩行道時等者今此菩薩是一生二生二類中二生成佛小機欤故上文直乗真言門上菩薩地文䟽第一大品云或有菩薩初心時即上菩薩位得不退轉或有初心時即得無上菩提便轉法輪文大師問中以即上菩薩位文證二生成佛以即得菩提文成一生成佛故云二生成佛機耳問三劫六無畏是義門雖異法躰是一然䟽三劫釋云若一生度此三犱即一生成佛文若尒三劫既大機一生成佛人六無畏何取二生類耶是以𨗴僧都記云此教菩薩直乗真言門上菩薩地者是指入真言門頓入者也上䟽文云唯一行一道而成正覺者即此人也又菩提心論云從凢入佛位者即是三摩地者是人也謂此直徃菩薩初入真言教修學此教門終極佛果以前中間有幾許無畏安穩利益處問也云云如何凢於真言機利鈍二機分或云頓漸二機或云大機小機或云一生成佛二生成佛或云即身成佛即身成菩薩或云聞時證漸次證也然今中專明鈍機得無畏顕利根解𭰹密故䟽釋明鈍所𭔃齊成淺𭰹二義耳故當卷下釋具緣品云然以解二種義得阿闍梨名所謂淺畧𭰹奥分二若𮗚前人未有𭰹解之機則順常途隨文為釋若已成就利根智惠則當演暢𭰹密而教授之文准此文今文為鈍機順常途作釋家為利根示𭰹密也斯則利鈍雖異俱以真言菩薩二類也且出其證䟽第六云而諸眾生有漸入者有頓入者然其所趣畢竟同歸文是一又第八云若人於秘密藏中受灌頂位乃至一生中或成正覺文此文乃至者顕漸機十六生成佛也是二又大師金剛頂畧釋云若能受持思修不三大劫十六生乃至現生證如來大覺位文此文又十六大生者二生成佛現生者一生成佛也是三又理趣開題云若能受持思修不三大劫十六生乃至現生證如來犱金剛位文文義同前是四別本即身義云問大機小機共修此教者二共即身成佛乃至今宗意可云大機即身成佛小機者後十六生成佛乃至云修此三昧者現證佛菩提此即大機即身成佛之證文若有眾生遇此教晝夜四時精進修現世證得歡喜地後十六生成正覺此即小機成佛之證文也文是五秘藏記云真言菩薩或十六三昧一一次第證或與得一三昧共十六同時證乃至十六頓證之義也文是六雜問云大品般若云或有菩薩初心時即上菩薩位得不退轉又金剛頂云乃至現世證得歡喜地後十六生成正覺是云此生即上菩薩位之證文也又大品云或有菩薩初心時即得無上菩提便轉法輪乃至又菩提心論云真言法中即身成佛故乃至此云即身成佛之義證文也文是七又云今何云一生二生成道𭔹三密相應如修行或即身超十地至一生補處位或一生入佛位是秘密乗力耳其誠證何𭔹金剛頂修此三昧者現證佛菩提乃至論云能從凢入佛位者乃至是即身成佛證也乃至子云如法行者即得初地速成佛果阿耨菩提論云復修瑜伽勝上法超十地菩薩境界依如是等文立即身一生補處而已是八私云依諸文真言機既分大小利鈍若尒何以即上菩薩位人為從凢入佛人耶但至上文者一生二生同望顕乗人不捨身故同云即身成佛又云一生成佛也故上具文云即一生成佛何論時分耶文𭔹顕乗經三十六生一生俱以不三故云一生耳或三劫舉大機無畏明小機影略㸦顕欤佛還復前三劫等者鈔第四云謂佛此六無畏意明從淺至𭰹從凢向聖階降位次悟證不同也文意云付三劫作𭅒降位所以三賢十地六無畏也為言問三劫六無畏法躰無寛狡如何三六是開合不同法躰無寛狹欤故䟽第二云統論三劫始終作寳珠譬喻乃至諸佛菩薩乆已證知親從一毫之善自大菩提道乃至𭤧便誘進令受三歸文既統論三劫始終時順世八心一毫善為始寧非善無畏乎况令受三歸文全同漸受三歸故故大䟽抄第一云即此於前三劫中亦更出六無畏也文又云有寛狹也彼但出世心此通順世故所謂作𭅒降者弁法躰寛狹也旦今所則世出世異故云𭅒順世劣心故云降也但三劫者舉勝三劫顕劣八心也具可云前八心三劫作𭅒降耳又第二文者欲明三劫始終出世心先示淨心㝡初順世心也例如欲明順世心先明違理心矣况復准抄善無畏釋十信已前十信猶有劫內外論况信前乎又抄釋𭅒降云階降位次悟證不同不有寛狹而𭔹明者𭔹是也又大䟽抄第一云問然以此六無畏相配三劫何各每三劫有二無畏如次相配耳文此釋未詳上文中配十住心時以三四配唯薀業也又上文中十住心配三劫時云出世心中此唯薀無我與業因種二住心為初僧也文又舉六七住心畢釋云以上二住心為越二劫瑜行論文尒云也文前後悉相違顕義門多端欤私云六無畏中前四初劫搹第五六如次第二三劫也至此六處如得生者大䟽抄云言諸眾生至六處生解故云蘓息無畏也文此六無畏處行者蘓生處故云至六處得生也問既云生許還作眾生義耶望本有無垢生始覺修生後顕故云生非許還作眾生義耳䟽善義通於淺𭰹者有二意一者善是淨通名六無畏皆善心淺𭰹階位故云通於淺𭰹也今惣即別名名十善故云今此中意明十善業道也二者善者初無畏別稱此中有淺略𭰹秘能所𭔃齊故云義通淺𭰹也二義中前義為勝五無畏此釋無故或後義為善舉初顕後故又順下釋故䟽云得阿闍梨名淺畧𭰹奥分二云云六無畏即六重阿闍梨故後得順世八心也等者謂有二義一者順世八心者外八心漸受三歸者內三歸也上句終置也送句顕內外別矣䟽第二云諸善知識見世間八心萠動即如彼相者遇便識寳諸佛菩薩乆已證知𭤧便誘進令受三歸譬如収彼頑石置在家中取意畧抄私云善知識者上代五通仙人也世間八心者外八心也佛菩薩者如名三歸者內三歸也斯則從外八心入內八心義也又八心三歸皆通持齊無畏二心也但准第二卷譬似八心三歸如次當二三心矣此中言三歸戒者十善受三歸時戒故云尒也凢於戒有三歸得羯摩得也謂聲聞七眾戒中比丘比丘尼具戒作羯摩時戒也叉摩那等五種戒三歸得也但今十善戒非彼七眾戒搹也若尒誰人所受耶謂灌頂文云十善戒通五種隨其廣狹有淺𭰹耳文此五種者人天二乗菩薩也學處品䟽釋住心論二等可見之矣前七眾者比丘比丘尼叉摩那沙沙尼優婆塞優婆夷也二者八心三歸同於內明之上標下釋故但也字顕標釋不𮦀欤或本無此字矣䟽第二云時善知識告言乃至如佛所眾生以慳貪故現世有種種憂苦命終以此因緣墮𢙣趣中以心離慳貪故現世安樂有大名稱命終生天後得𣵀槃是故汝今更應以勝上心受八齊法乃至文又准此文者前善知識者又內知識欤又舉外八心得益但云命終生天不云後至𣵀槃故問一受三歸力可感無量生耶若許尒者一因多果理可然耶若不許者遠得𣵀槃解果世間人天果報何有所𡱈乎一業一生是薩婆多一義也大乗實談何同彼義乎小乗猶有一興供千反生天後證𣵀槃之况大乗談乎若又有部義會文者俱舎論并光記作二釋光第十七云由一業但感一生餘六因茲展轉別造顕由初力故言一施文又云由一施食起多思願感人天別剎那不同就有前後所施食故一言㨿能施思實多故非一業能多生文𦀇若如實知我當得身無畏者問我是四㒹例第四身即四念住第一若知我者應離法扼縛若得身無畏者觀不淨也故光記第廿三云觀身不淨治彼淨倒觀受是苦治彼樂倒觀心無常治彼常倒觀法無我治彼我倒文如何四念住觀有惣別雜不雜觀謂惣相念住時唯惣觀所緣身等四境修四行相中空非我行相通四境故云知我得身無畏也光記云彼觀行者居緣惣雜法念住中唯惣觀身等四境修四行相觀諸有為皆非常性觀諸有漏皆是苦性觀一切法空非我性文又別相念住中雜緣法念住中或無我觀通身也故光云四中前三一一別觀唯不離緣第四所緣通雜不雜若觀唯法名不雜緣於身等四或二合視或三合視或四惣視二二合觀有六三三合觀有四四合觀有一惣有十一名雜緣法通名法故文但惣別念住異者光云唯惣緣四名此所修前雜非唯故與𭅒別文私云別相通雜不雜惣相唯雜也雖四惣緣通惣別惣相唯惣緣四故異別相二三惣緣耳又義云身無畏者通四境惣稱非隨一欤我又包四倒通号四倒同計故云我故䟽釋云得離不觀我性四種㒹倒於身諸扼縛得蘓息處文問四念住中餘三心法何云身乎䟽十二云六識身文身有躰依聚之義故通心也如俱舎云六識身也且第一二無畏配住心者般若寺抄意第一二如次第二三住心也云云私云善無畏舉十善五戒云生人天中故可通二三住心也身無畏是四念住觀門聲聞七𭤧便故第四住心也又身無畏世間心非無其證䟽第七云如行者住有相瑜伽則名是世間三昧文此文外道護戒生天云世間三昧然䟽第三釋身無畏云第二無畏於有相觀中修荼羅行文既云有相觀即非有相瑜伽乎故知第三住心也身無畏者今此無畏異前後所害立名欤謂於身諸扼縛文同於我之扼縛文故或又身言通能所𡧱欤謂觀身不淨等治身常等倒故見此身卅六物者抄第四云𣵀槃聖行品云善男子菩薩摩訶薩聖行者觀察是身從頭至足其中唯有髮毛爪齒不淨垢穢皮肉骨脾腎心肺膽腸胃生𤎼二臟大小便利涕目淚肪膏𦛁膜骨髓膿血腦諸脉是故頌云髮毛爪齒及塵垢皮肉筋骨肪膏腦膜骨髓膿血腦脉諸脉是名三十六物行者應當速求猒離文私記第十二云卅六物一髮二毛三爪四齒五皮六肉七骨八髓九十脉十一脾十二腎十三心十四肝十五肺十六大腸十七小腸十八𦝩十九胞廿尿廿一屎廿二垢廿三汗廿四淚廿五結𦡲廿六涕廿七唾廿八膿廿九血卅黃痮卅一白痮卅二肪卅三𦚻卅四腦卅五卅六精也文五種不淨者抄云言五種不淨者一種子不淨謂𭣄父母精血業因識以成身分故二住處不淨於父母胎中生臟之下𤎼臟之上故三自躰不淨三十六以成身故四自相不淨亦名外相不淨九孔常𣴑眼出眵淚耳出𦀽矃鼻中流洟口出涎唾大小便道常出不淨五究竟不淨氣絕已後胮脹爛臰如是不淨甚成可𢙣此上是身念處觀文次復觀受心法等者抄云次受心法即是受心法念處觀也應觀受是苦觀心無常觀法無我如是觀時離我性四倒謂觀身不淨得離淨倒乃至觀法無我得離我倒故下結云於身之扼縛得息處也文眾相現前等者所𭔃齊或云不生貪愛或云離我性皆是情義然相現即表德謂既表大異何令相同乎恐以第三能𭔃齊於瑜伽境不生愛義可同此如何謂表雖異義理終同三昧現前是犱制伏故欤又下文以顕𭰹位配密淺位欤故伏𭔃断也私案今䟽多存乱逹謂以下不生愛慢一句安今眾相現前時下讀之所謂於瑜伽境界乃至心不可得文全同於隂界中乃至我不可得之言又不生愛齊前不生貪愛故若不尒者違文理故先違文者䟽第一云復次如聲聞人初觀隂界入時求我皆不可得真言菩薩亦如是初觀隂界入時求心皆不可得畧抄准此文第二無畏以身不可得可齊我不可得也又第四以鏡像水月同十緣生句第五以心得自在之用齊心王自在等也又違理者我不可得断位不生貪愛是伏位也能𭔃齊又可同耳若廻文者文義相順能所無違矣𦀇若於取蘊所集我身者鈔云蘊者積聚而為躰故取謂犱取凢夫犱取以為我故身者依止我所依故文意云身者指取蘊此五蘊是我所依故為言唯識論云躰依聚義惣名身文三義中今取依義云身也或云身者躰義躰云身故我即身也何還指蘊耶私云身者聚集義即指上取蘊所集故次下釋云何况此積集中而有我耶文又云於隂界入中種種分拆推求我不可得文既兩處俱但云我不云我身故知身名所依五薀聚集也問上舉取薀我身下云捨自色像色像如次指上取薀我身也若尒我即身也何我是積集上計故取薀所集我及身為言此中分折身断我故云捨自色像也捨未必断故光云断捨義別文取薀者光記第一云此取薀亦名為薀薀從取生故名取薀從因為名煩惱名取能犱取故薀於取薀能生取故名取薀略抄捨自色像觀者鈔云言捨自色像觀者自色薀也像即我也雙離稱捨文種種分拆推求等者問分拆三科観薀無性亦是拆法空何但云唯薀無我耶雖分拆推求非空極微色法剎那心法躰故俱舎云三世實有法躰恒有文故知今此分拆為遣我故云分拆推求我不可得也若尒何同法無畏空極微剎那躰拆法空乎䟽第二釋𡧤然界云乃至分分破拆之至於隣亦不可得文又或釋云数存隣論破隣云云数論如次毘曇成實也䟽中𡧤然同成實故證耳又觀薀無性亦為我非無性空義欤故䟽第二云聲聞中雖此五喻而意明無我今此中五喻意明諸薀性空文此中以聲聞成今無畏意也又今薀無性者菩提心論云知四大五隂畢竟磨𭰹起猒離破眾生犱文眾生犱者即人犱也問𨐫若無樹者影由何生文若言蘊不空我者法𨐫不齊乎若言樹有影者有世間相違過耶以積集離散且類樹無欤又𨐫取少分故無過又𡧤然界雖大乗樹空觀属小乗欤嘉祥二諦章下云小乗人拆色空觀大乗人即色空觀小乗人拆色空大乗人色本性空文私案大小合有四重謂小乗有二毘曇拆法空我成實破極微空法大乗又二相宗見諸法如幻空法性宗觀諸法不生空法起信論云以五隂法自性不生本來𣵀槃故文前二拆法空後二躰法空也如上所乃至證湛𡧤等者云謂如是解唯薀無我根境界淹留修行業煩𢙉株机無明種子生十二因緣離建立宗等如是湛𡧤一切外道所不能知先佛宣離一切過文䟽第二釋之一切分叚中等者鈔云一分一叚名為分叚所謂從緣生法待因緣成必有分叚𭅒別之相上䟽云即是摩訶般若中厯法廣明者是也如於隂界入分拆求心不可得當知六度行乃至一切惣持三昧門中種種求心亦不可得等由此觀故所有一切我愛等皆永不生故云一切分叚中等也文𦀇若害蘊住法𣝴緣者此中薀者指前無畏云唯薀故又今釋云心住薀中是也害者舉今無畏用住法𣝴緣者顕今無畏躰所謂法者法空觀解即十緣生句觀也故釋云諸薀即空又云法謂十緣生句也大䟽抄云離違順八心終無畏門息處即十緣生句也文此法空觀解猶偏真理故云攀緣也故䟽第二釋此心云由偏真理作此平等觀耳文於法得息處者今此於法者釋住法也是能害十緣生句法也問上文云於所害我得息今何云能害耶得息隨冝今文同第五無畏釋二句如次配下文上法所害下法無我能治也前文同第六無畏釋未必一同欤尒時幻𤆍等者初劫文云秘密主彼出世間心住薀中有如是惠隨生若於薀等起離著當觀察聚沫浮泡芭蕉陽炎幻等而得解謂薀處界諸犱能犱皆離法性如是證𡧤然界是名出世間心秘密主彼離違順八心相續業煩惱網是超越一劫瑜行文䟽第二云如前所種子根疱等及歸依三寳為人天乗行齊絕善法皆名順世八心若三乗初道意迄至業煩惱根本無明種子生十二因緣名違世八心乃至大乗行者了逹諸薀性空故於一切法都無所取亦無所捨雙離違順八心我薀兩倒二種業煩𢙉䋄是名超越一劫瑜行文私云准上文今幻炎等者逆次舉二喻等上三喻欤又准釋法謂十緣生句十喻中順次舉初二等餘八欤二義中前為勝今釋文全同初劫文故又十喻但𡱈第三劫云𭰹修故又初劫中應無乹闥婆城喻故又聚沫芭蕉十喻中無故但十喻者言惣故例如指第二劫六喻云前十喻耳問䟽第二以𡧤然界同成實然彼論中乹城喻又䟽第七云若以十緣三句觀諸薀無性無生即是菩薩三昧文同今能𭔃齊云無性無生似釋𡧤然界菩薩如何𠃵城顕躰法空故初劫拆法空不可用之但至成實論者嘉祥法華義䟽云三藏中所以不捷城者為三藏不一切法平等本性𡧤乃至而成實論亦有此喻者菩薩藏中𨐫就小乗法中釋文今𡧤然雖但大乗猶是拆法空故同小乗義欤又第七釋者𭔹佛地三昧云菩薩三昧可通第二三劫菩薩也問智論第六云復一切聲聞法中無揵闥婆城喻有種種無常𨐫喻色如聚沫受如泡想如野馬行如芭蕉識如幻文第三喻與今相違如何舉能迷顕所迷欤或野馬者遊絲也陽炎遊絲相似故論㸦舉欤委至下可弁耳問今此無畏十住心中當何心耶先哲異義不同云云般若僧正義云第三四無畏如次四五住心云云信證僧正義同之濟𨗴僧都義第六住心也朝譽上人義云第五住心云云私云兩僧正雖可依用躭違䟽家及宗家釋大師以湛𡧤䟽文證唯薀業何以證𡧤然界云第五住心耶又大師舉十𮈣眾毛云云何以毛目為𮈣領乎又濟𨗴義亦非理初二劫大別故又朝譽義違漸過二乗境界文大小大異以劣勝乎然終義為勝欤䟽云行者未過此劫與辟支佛位齊文又云合論一僧劫文但至過二乗文者今菩薩同極上利根人過中下類故云尒故義釋云證𡧤然界𭰹位緣覺云云又大小雖異偏真理同故相矣又䟽第七云若了知唯薀無我乃至證𡧤然界時當我人眾生壽者本不生故明種種法門以五喻觀察性空時當諸薀本不生故明種種法門文准此文似緣覺云𡧤然界欤然此人無我故異法無畏耳又義釋第五十卷本未釋緣覺真言云縛是語言道断義以辟支佛智惠𭰹利見一切集法皆是法故名為證𡧤然界住此三昧時觀諸法如炎相無宣名曰極語言三昧文准此文䟽第七卷文亦𡧤然界名緣覺欤或又義釋指湛𡧤云𡧤然界欤十四本同密抄云若業乃至三障盡時名證𡧤然界文又准一切集法皆是法并諸法如𣵀槃相文緣覺亦断一分法犱欤此觀門是法犱能治故故起信論云以五隂法自性不生本來𣵀槃文故知緣覺智惠𭰹利故亦断法犱同𡧤然菩薩悟故云證𡧤然界也䟽第二釋𡧤然界菩薩云行者未過此劫與辟支佛位齊時名為極無言處文但第七卷釋者我人不生唯薀諸薀不生釋𡧤然故無違故知兩僧正俱以第四無畏為業心合義釋等意矣問緣覺断法犱於今宗依安在乎䟽第二釋𡧤然菩薩云然所觀人法俱空與成實諸宗未甚懸絕文嘉祥釋云成實具明二空文又第七云辟支佛智惠𭰹利故能以惣別之相𭰹觀察之見一切集法皆是法此與聲聞異也文此中能觀行相惣別相者惣觀是通聲聞遣人我行相故別觀𡱈緣覺断法犱觀門故觀集法是法即是也應知於諸法犱惣相云我犱別相云法犱故從彼能觀行相又云惣別之相也又住心論五今䟽文畢合同性習氣者不染無知當大乗所知障當知依此等文利根緣覺断法犱同然菩薩也又嘉祥三論玄云於小乗內自分三品一者俱不得二空如犢子部乃至下根人也二者薩衛之流俱得人空不得法空為次根人也三譬喻訶梨之𣴑具得二空為上根人也文准此釋漸過二乗境界者同𡧤然上根人過中下二類故云也又密抄釋又緣覺法犱断位云證𡧤然界也故次下釋云即初劫滿也文若人犱断位何云滿矣又義𡧤然菩薩是偏真理故小乗也法犱断大乗行故大乗別住心不立又偏真故非大乗大乗行故非小乗偏難指属故立一種無畏也宗家䟽家皆有由耳又義十住心專依大日菩提心論立之然中因別意趣雖立𡧤然論中判性相故無𡧤然心故依論法相舉十𮈣𦀇眾毛也小乗釋云𠦸多覧言因別意趣阿毘逹摩依法相可作證耳𦀇若害法住無緣者謂法者前十緣生句即拆法空觀也害及無緣者今躰法空觀即法無我無畏也無緣乗義如先弁矣䟽心外有無影像等者唯識論第九云若時於所緣智都無所得尒時住唯識離二取相故論曰若時菩薩於所緣境無分別智都無所得不取種種論相故尒時乃名實住唯識真勝義性乃至有義此智二分俱無乃至有義此智相見俱有乃至有義此智見有相無乃至云云私云准此文依第二師義云心外有影像依第三師義云心外無影像此中心者見分影像者相分也四分中相分云外後三分云內之義故云心外影像也又義䟽第二釋第二劫云行者解諸薀唯乃至非但見有不明亦復見空未盡今以如幻等門照有空不二而人法二空之相亦不當心文准此釋者初劫觀解有無未明故有無影像似有所得第二劫二空相不當心故云智都無所得也心王自在覺本不生者私云前文依顕相釋他緣心義今三句依密意成覺心乗㫖也故大師第二劫終心王自在覺自心本不生文證第七住心也問前無緣乗心法無我性文但明第六心今住無緣法無我句何第七心耶前文中中自有覺心乗別文故無緣乗心等句𡱈他緣心今文無第七別文故意含第七也又義云前惣即別名𡱈第六例如色處等今文通二種住心無緣法無我大乗通相故或云今文但第六顕第七䟽釋示此意也或云前文今文俱通二種心也前文通二心惣句故或云今文䟽俱𡱈第六也般若寺抄云第五無畏他緣心第六無畏覺心一道極無三心也取意私云中無第七則能𭔃齊心得自在待何𭔃齊何得言擬外迹顕修證耶次前文云通二心者違䟽及大師釋中二叚標釋別故又䟽中釋無緣乗義用𭰹密意故云阿𨹔那𭰹細識故又大師但第六心此文故後義非理又違䟽及大師釋五六無畏如次當第二三劫䟽上文中第二三劫各存二心故何違彼五存一六𭇥三耶又大師以覺心不生但為第七不證第六故㝡初義為勝而已又第三義祖師釋義也非無起盡䟽下釋中觀薀阿頼耶覺心不生𭰹密八識三無極無自性心華嚴般若取意又菩提心論相置第六㫖陳三心同法性緣起宗故也我之與薀法及無緣等者我者初二無畏人我未断故此釋一切薀處界能犱所犱我壽命文薀者第三無畏唯薀無我義故此釋等一字或却釋一切薀處界句也等字属前我眾生作者等我非一故法者第四無畏拆法空故即釋法字也無緣者第五無畏無緣乗心故即釋經無緣二字也皆同一性者釋自性無性句故䟽釋云所謂自性無性文初言謂觀自心畢竟空性者釋空一字也當知觀自心空性時悟我薀等諸法同一性故云此空智生當得一切法等也䟽此空智生者釋此空智生即是時極無自性心生也者釋當得法一切平等文也於業下重釋平等性義尒時下成空智生義也故知空智同性似断證異即如次第八九二心也故大師以於業煩惱等文證第九以離有為無為界證第八可悉之然此空智同性實同時故釋文前後隨冝欤又義皆同一性者釋自性無性句故云所謂自性無性是第八心也故䟽第二云若無自性即是本不生文此空智生者指文即是時極無自性心生也者釋也第九心也故住心論云等空心初起文般若寺䟽抄一云經若復一切至得一切法自性平等無畏者觀心畢竟空性時我之薀法及無緣皆同一性如是解自心本不生即亦解一道又解無自性此覺心不生一道極無自性三種住心也文此釋今無畏中明三心也或云五智房文此空智生者但第八心也今畧本故但一心然䟽中以具本意釋是時極無自性心生第九也或云智月房此空智生一句並明二心空智初後故且滿云是時極無自性心生也尒時於有為無為界等者於今此所離有為無為界可有二意若住心次第亦有二一者今極無所離故第八猶有為無為界欤故一文𭇥即離二義例如一法二義文𭇥門法矣二者上下故第九亦離第八所離故為極無所離故有為無為界唯隔厯義也二者䟽意未必分二心故但極無所離也故下不思議幻文云欲離有為無為界故乃至而業煩惱具依文都無所縛亦無所者云於業煩惱解而業煩𢙉具依文䟽第二云行者解一切業煩𢙉時即知一切業煩𢙉無非佛事本自無有縛令誰解耶文私云案䟽意於業煩惱解故云都無所而業煩惱具依故云亦無解也無縛無故一切法自性平等也即是真言行者等者且有二意一者准前五無畏以一切法平等𭔃齊空無垢菩提心故云即是等也顕密雖異悟分齊同故云尒也大師釋中第三刧又有淺略𭰹秘故般若寺釋如下二者第六無畏無能所𭔃齊第六無畏即真言行者淨菩提心故云即是也是以第三劫中云真言門修行菩薩行等也或又初地證理位故顕行人入此位廻心成密人故猶如天台云初地初住證道同圎耳大䟽抄云乃至謂觀自心畢竟空𡧤時我之薀法及無緣皆同一性如是解心本不生即亦解一道又解極無自性乃至尒時於有為無為界離扼縛得息處即真言行人得無垢菩提心時位與此齊也文又云六無畏者一善無畏乃至六一切法自性平等無畏也可悉修真言密教時有此六位一依止三昧三密修行位二本尊色相現前位三於法不生愛位四覺法性無生位五得心自在勝用位六淨菩提心法用位也文第六無畏出䏻𭔃齊心又分䟽文為能所𭔃齊矣然此心在纏出纏皆畢竟無相者真言行者初地淨菩提心也謂於此菩提心有表二義情無相似同一道極無無相空理故云即是乃至無相也上言謂觀自心畢竟空性者一道極無玄底一心無相極理也以彼畢竟空性同此畢竟無相故云即是也故寳鑰下云謂無相空相及非青非黃等言並是明法身真如一道無為之真理佛此名初法明道智度名入佛道初門言佛道者指金界宮大荼羅佛𭔹諸顕教是究竟理智法身望真言門是則初門文第八心也又云等空之心於是始起𡧤之果果還為因是因是心望前顕教極果於後秘心初心初心時便成正覺冝其然也文第九心也然無相言雖同空性意是異顕乗應化言語不及故云無相也密宗法身如義破犱故云無相也此無相者顕教如來不能䅐見故云以如來五眼等也又表德義者無相不具故云無相故䟽第十九云佛法離諸相而以𭤧便具足一切善㓛德神力不思議種種境界即相無相而具一切相即緣無緣具一切緣非謂但空直無所有而已也文私云遠離九種迷情妄假相故云離諸相也以三密𭤧便具足四本有㓛德故云而以𭤧便等也故大師住心論第三云若入阿字門悉離一切相離相之相無相不具文顕乗如來不知無相不具義故今此無相是不得九種假像㒵故云尚不能得其像㒵也故密嚴院古德云色有二謂假真實真實者非諸識所反影像三乗非一心緣起色一乗法佛法尒三色性佛性然四也取意或云真言如來情門時密佛又不得像㒵故此義非理雖知菩提心躰破犱故云不得像㒵者况餘生中人句又可然乎若實不知破犱則自宗佛知自證三菩提豈不知初地菩提心乎故知顕如來耳皆是擬儀外迹等者鈔云今所以明三劫六無畏者若不作如是𭔹弁恐常情各翫先習不能覺其㣲妙但擬度外事之形迹以顕修證之淺𭰹也文大䟽抄第一云意珠有三時况內心三犱此以外相與內心故尒云也文又上釋云𭂫有三時一珠在衢路時二見相生時三洗垢磨瑩時以此三時相配三犱文私云此釋未必顕云外迹欤或云今心相者真言行者心相故謂以行者心相外相知內性修證也為言故次下釋云見𤇆之相可以比知火性文或云擬顕乗外迹之心相顕密乗修證之心相也為言故䟽第二云此從淺至𭰹廣明心相皆為開示菩提心本末因緣文本末如次密顕二種故私云如上義是以六無畏淺秘兩釋或如次為真言心相外內或為顕密二宗也文淺略䟽釋加𭰹秘然今釋偏釋文何所加自釋云以明修證之𭰹淺乎故知中文順顕外迹而意顕密修證也為言故當卷下文云具緣品然以解二種義故得阿闍梨名所謂淺畧𭰹奥分二若觀前人未有𭰹解之機則順常途隨文為釋若已成就利根智惠則當演暢𭰹密而教授之今還以此二分釋阿闍梨義若於此荼羅種種支分乃至一切諸尊真言手觀行悉地皆悉通逹得傳教灌頂是名阿闍梨若度違順八心證𡧤然界是名阿闍梨若己心王自在覺自心本不生名阿闍梨若生極無自性心得入如上荼羅海會名阿闍梨文私云此中傳教阿闍梨存善身二種阿闍梨欤故當卷上文云如初無畏時以聲字觀修荼羅行第二無畏於有相視中修荼羅行文此六無畏阿闍梨隨常途作釋鈍機漸入次第也既云修荼羅行又云傳教灌頂阿闍梨此即五種三昧中第四三昧耶欤若尒所六無畏誰云顕乎又云𡧤然界阿闍梨等不可云𭰹秘利根行也况中既問真言行者心相舉但顕心乎故知中但舉淺略鈍機密行釋加𭰹秘利根𭰹行也斯則以真言利鈍行為能所𭔃齊也但鈍機所行無畏中順顕作釋故顕密𭅒別自顕故又云言顕為所𭔃齊無違故大師釋云今依此顕真言行者住心次第顕密二教𭅒別亦在此中文以三劫淺略文證住心作此釋良有以也意云已明見顕𤇆之相可以比知密之火性竟為言又云此淺秘二義下所舉劣惠𭰹惠二機所行也故具緣品云於當來世時劣惠諸眾生以癡愛自蔽唯依於有相文䟽第四云傳法之人當善識根緣若著相之人而輙尒為甚𭰹空義增其不信若利根𭰹智而輙授以淺畧法門則以為不順無為正道而生輕畧抄又第七卷有相行儀畢云次無相㝡殊勝具信解者所視察若真言乗𭰹惠人此生悉求無上果乃至甚𭰹無相法劣惠所不堪為應彼等故存有相文此文明有相無相如次劣𭰹二機所行也故知今文順常途作釋擬儀擇地造壇等有為事迹而顕修證𭰹淺也為言故䟽第四釋有相茶云如來以世間因緣事相擬儀况喻不思議法界以府逮郡機會進修行自見心明道畧抄今擬儀外迹等釋同此釋矣上已明見𤇆之相等者此文有二意一者結成前無畏就中亦有三一者顕云𤇆密云火二者密行中有淺𭰹二行故如次類𤇆火也三者真言淺畧行随如常𤇆相顕真宗火性故云尒也二者十緣生句來由也所謂地前六無畏位分𭔃齊如常故未離待𭔹地上十緣生觀門離待𭔹故今釋云更欲如何表示耶上釋中第二釋初地治地行云從此無有待𭔹出過心量不思議地文故知上已明見六無畏𤇆之相竟更可比知十緣生句火性也為言例如道火前相故亦各燸云云又𨗴僧都義云謂以極無自性心菩提心因海烟相而可比知法佛境界性海火性也云云又私云以初地淨菩提心之𤇆相而可比知妙覺自證三菩提之火性也為言但知心垢𥁞處等者謂初地淨菩提心位三盡處故云尒非謂盡微細犱也故下釋云菩薩亦如是依心進行故名此心為地以心尚有所依故未名正遍知如來已度微細論進修都息故名超越心地也文又菩提心論云既破人法上犱雖能正見真實之智或為無始間隔未能證於如來一切智智文人法上犱者三也故䟽第一云初心時直視自心人法論淨若空畧抄無始間隔者㣲細犱也又大師釋第九心云心外𪿨垢於是悉盡文又釋第十心云惠眼破無明昬夜文無明又微細犱也又義云十地因滿位三断故云尒故秘藏記云越三是十地究竟過此修上上𭤧便断微細犱至佛果故文又義云等覺因滿四断𥁞故云尒故䟽第三云乃至為一生補處菩薩擇去心中無明父母極細之垢亦名治地文無明父母者微細犱也問以六無畏配地位𭤧如何鈔云第一無畏即當十信已前第二無畏即當十信位也第三無我無畏即當十住十行位也第四法無畏即當十廻向四加行位第五法無我無畏即當初地至八地已前位也第六一切法自性平等無畏即當八地已去位也畧抄第二釋意開行配第二無畏都信當善無畏耳今謂不尒今此無畏三劫𭔹明三劫既滿但至初地六無畏何通十地耶况下文云第一具緣品云漸次證入大悲生三摩地文䟽第三云漸次證入者如初無畏時以聲字觀修荼羅行第二無畏於有相觀中修茶羅行第三無畏於唯薀無我心中修荼羅行第四無畏於法緣心中修㭟羅行第五無畏於無緣心中修㭟羅行第六無畏於平等心中修㭟羅行離垢地已去各於自地觀心中修㭟羅行略以行位分之已作十六重𭰹淺不同文此文意第六無畏於初地論之也釋六無畏修行相畢云離垢地已去各扵自地觀心中修行故故上釋第六無畏云即是真言行者空無垢菩提心也文空無垢菩提心是初地德故故䟽第二云初地菩薩得此空無垢菩提心文此等釋明鏡何通二地已上乎問抄釋非無起𥁞䟽第六釋八地三昧道云以一切菩薩初度第七地時上不見諸佛可求下不見眾生可度謂是住大𣵀槃於行𠇲息尒時十𭤧諸佛以此三昧道起其心得度菩提心難地文又䟽第二釋第三劫行云行者初觀空性時覺一切法皆入心之實際下不見眾生可度上不見諸佛可求尒時行𠇲息謂為究竟乃至尒時十𭤧諸佛同時現前而𭄿喻之以蒙佛教授故轉生極無自性心文兩釋文義既同明知第三劫在八地上也然第六無畏亦第三劫行也故知抄釋依此等意云第五無畏從初地至七地第六無畏在八地以上耳但至十六重玄者抄釋此事云又解謂漸次證入而有二種初六無畏從因至果以為漸次後十地從因至果以為漸次二門併影惣有十六非次第修行十六位也文尒者如何十六重玄從淺至𭰹一門漸次進義也何猥云二門別舉耶故䟽次下釋云略以行位分之已作十六重𭰹淺不同乃至其中從因向果則三密𭤧便展轉不同容極至心王大海𭤧一味無別耳文既云十六重𭰹淺何云二門別舉耶若二門別舉者應六重極在佛果十重初在初地然第六終初地十重始第二地豈非一相續位分乎故知六無畏為六重從地前至初地自二地至佛果為十重也故䟽下釋云乃至若生極無自性心得入如上㭟羅海會名阿闍梨從此復有十重𭰹行乃至復次毗那是名阿闍梨文又抄第四云䟽離垢地已去各於自地觀心中㭟羅者以初地菩薩入三世平等與第六平等無畏無異故取二地已上乃至佛地足前六種無畏故成十六重玄義也文但至第二文者隣彼釋而釋云即是初入此信解地下釋至此不思議地乃名真離二乗地也文第三劫解在初地明鏡者欤又至第六釋者又彼釋下云如上所一生補處及八地三昧是教道法門作如此耳然秘密乗人乃至從初心時即具行大空三昧其謂不然則於一生之中不能頓滿諸地也文故知第三劫在八地者教道𭔃顕之假非證道修得之實談也仍無失或云朝譽今私解云䟽云第六無畏於平等心中修㭟羅行離垢地已去各於自地觀心中修㭟羅行文此文無爭指初地言第六無畏而二地已去乃至佛地立十重玄也但䟽釋六無畏中佛還前三劫作𭅒降𭔹明者理實初劫及第二劫之初論六無畏今前三劫者付三瑜行門於前二劫中此無畏故言惣意別以為此釋耳若成此意者漸次證入之文䟽作十六重𭰹淺不同之釋巧相叶乎云云私云此義非理第六第三劫俱云極無自性心豈第六無畏降第二劫乎問以六無畏配十住心𭤧如何般若寺抄云第一二三四五無畏如次第二三四五六住心也第六無畏中𭇥第七八九三種住心也取意問第二四念住觀何當天乗第四證𡧤然界超緣覺位第七住心第二劫何安第六無畏耶祖師判文非無起盡故下文云第二無畏於有相觀中修㭟羅行文然䟽第七釋世間三昧云如行者初住有相瑜伽則世間三昧文有相觀文同有相瑜伽然大師以世間三昧道文證第三住心矣故知以第二無畏配第三住心也又䟽第七云若了知唯薀無我乃至證𡧤然界時當我人眾生壽者本不生故明種種法門文既以𡧤然界属人空分非為緣覺上唯薀無我即聲聞故又極上利根緣覺度一重法倒欤故相配矣義釋云𡧤然界是𭰹位緣覺云云可見正文又䟽第三云如觀薀阿頼耶覺自心本不生即根諸八識三無性義文八識三無性他緣乗法門故䟽第二云即楞伽解𭰹密等八識三性三無性皆是此意文故以第五無畏唯配第六住心也又䟽第三云如極無自性心十緣生句即花嚴般若種種不思議境界皆入其中文既以般若極無自性句故第六無畏中他緣心也故菩提心論㫖陳叚𭇥七八九三種住心可為證矣故知祖師釋義𭰹相叶䟽家宗家等釋耳凢東寺之末𣴑之人拾小野之遺塵之軰誰不信誰不依慿雖然私立義云善無畏第二三住心也故釋云今此中意明十善業道乃至漸受三歸戒於無量世生人天中文大師第二第三心判人天乗教故身及無我二無畏各通唯薀業四念住觀亦通二乗觀門故第四無畏或第五或第六也又義云第二聲聞七𭤧便第三聲聞四果又第三第四緣覺也第五他緣覺心䟽文分明也第六一道極無是第二第三劫義故但第二無畏有相觀者抄第四云第二無畏有相觀者謂四念處觀即真言行者本尊三昧眾相現前故文然有相瑜伽者世間三昧故云有相又繫属他主故云有相欤名言雖同義意是異也又第七釋者證𡧤然名雖属人空彼行相下別釋故䟽云以五喻觀察性空時當諸薀本不生故明種種法門文又第三卷四心義釋者上舉他緣覺心二心畢且付他緣心作釋欤或云八識他緣三無性覺心云云又至次下句者以般若大小無㝵義且同華嚴非取三論義也菩提心論且性相二宗義属相㫖陳別意欤是略前問中修行句也者問文云一切心相何云修行句耶且有二義一者既云遍知心相是以十緣生義觀法界眾生界一切心相皆能了知故所觀境界心相而非行者心相故今見一切心相觀十緣生義故云修行句也故下釋云若於一念心中乃至以皆從緣故即空即假即中故文二者心相句有惣別二義今惣義修行等句皆云心相欤故此品結云已淨菩提心諸心相竟文如下文行𭤧便等者謂指具緣品等所也故下釋云從此已下明進修𭤧便及悉地果生也文又云上品已種種心相𭔹弁一切智心竟然此妙果以何𭤧便而能得至耶故此品次明入㭟羅行法具眾緣支分及所要真言皆於此中廣明𨐫如已知乳酪有醍醐性即教令具諸器物𭤧便攅搖以從緣起故當知不異十緣生句也文依此文行即𭤧便也進修𭤧便故是故當知㝡為㫖要等者此文意十緣生句為真言行者㝡要𮗚矣問若尒如何秘藏記云如境界中見界會聖眾及餘一切事皆當入十緣生句観察不信而信之唯當每係心於本不生際無留所現境云云又云於十喻観密嚴海會眼前時観如陽炎其心如何若思是至極其意留著又作心譬如磨鏡時見現小影像停留時遂不成實鏡云云若此観至要一向可信何云不信而信又若思至極有過何云留意思之耶中川上人義云既行𭤧便淨除心垢必𮑭此観豈非㫖要而因緣生法即是假相即是法界若見假相不知法界思假相為至極之時則有留著心過失故言見所現境不可信是法界至極但可信是至極之假勿留假相當係心至極也本不生際即是法界至極故云云然統論此品中十緣生句略有三種者或云今所十緣生句有三重也三重同云十喻故云次下文云摩訶般若中十喻亦具含三意文此文意見於一種十喻含三意矣今謂不尒既云統論此品中應盡一品所諸喻既云𭰹修観察非待初二劫五六喻乎故釋云今此中十喻云𭰹修観察者即是意明第三重文又云真言門修行菩薩行可𡱈第三劫第三劫中目真言門修行菩薩行故又於今十喻作二釋中無通初二劫之釋故但至云十喻者或言惣也或𭘧数義也或順華嚴宗立增减十故又般若所廣何無五六喻今十喻言惣含闕五六喻耶故䟽第二明五喻畢如大般若中文又智論第六云復一切聲聞法中無揵闥婆城喻有種種餘無常譬喻色如聚沫受如泡想如野馬行如芭蕉識如幻文䏻釋論有五喻所釋豈癈其義乎况既云聲聞法中無揵闥城喻定知今十喻不通初劫也五喻義既成則六喻義何無乎或云今十喻有三重也今十喻真言行者所用故若初劫若第二劫皆真言行者用此十喻也但五喻六喻皆所𭔃齊観故非真言行者所用也但統論此品等者𭔃五六喻顕密観十喻故云尒意明第三重者示𭰹修義也以心沒薀中等者運和尚云且初幻有即心幻即薀幻即不思議幻即心幻者以心喻幻即蘊幻者以五薀喻幻即不思議幻者以諸佛聖人比幻文實範阿字義第四之謂以心沒薀中者三劫中初劫初心湛𡧤心也六無畏中第三無畏也十住心中四五住心也欲𭔹治實法故等者初劫後心𡧤然心也無畏中第四無畏也住心中第五或第六初心欤此心度一重法倒故云𭔹治實法故観五喻故云観此十緣生句逹諸法即空故云即空之幻也故䟽第二云行者如是観察時從無性門逹諸法即空得離一重法倒了知心性乃至名證𡧤然界文云彼出世間心住薀中乃至若於薀等起離著當観察聚沫泡芭蕉陽炎幻等皆離法性文以心沒法中等者初劫𡧤然心即第四法無畏也上文云法謂十緣生句也者是也𡧤然心沒𡧤然空理故云心沒法中也此理猶属偏真之理故云境界𣝴緣謂境界者理異名𣝴緣者偏義也観察薀阿頼耶知自性如幻炎等時離境界攀緣故云𭔹治境界乃至十緣生句也謂十緣生句者第二六喻也至此心時観𨹔那𭰹細了三界唯心故云薀阿頼耶即心之幻是也故䟽第二云至此僧始能観察阿𨹔那𭰹細之識解了三界唯心心外更無一法而可得者文今此能治心住心中第六他緣乗也以心沒心實際中等者諸本不同或本云以心𭰹著心實際中云云或本著字下有沒字或但云著沒無𭰹字矣有二意一者心實際者三劫中第二劫未無畏中第五無畏終十住心中第七住心也所謂即心幻既以初劫即空為所離第三劫又以第二劫心可為所離也又能治文云欲離有為無為界故文大師以此文證第八心故又不思議幻但為第九者今第八心何所乎問心實際言名第二劫䟽何文乎設雖無文其理極成何責之耶况復覺師釋云今此中十喻復為𭔹治前劫心沒實際欲令離有為無為界故観十喻亦成論文是一今金剛頂云住於如實際文實惠宗兩口决云三乗家極究竟位佛云云既云三乗究竟豈非覺心乗乎是二又菩提心論云當知一切法空已悟法本不生心躰自如不見身心住於𡧤平等究竟真實之智令無退失文大師以此文證第七住心即云心躰自如不見身心非沒心實際義乎是三又金剛頂中住如實際位云不見於身心住𡧤平等究竟真實智文准菩提心論文又第七住心也是四依此等文理定知第七心也二者第三劫初心第六無畏十住心中第八住心也且又示文理成義謂舉能治文云解一切業煩惱而業具依文大師以此文證第九心故所治實際可第八心也是一又䟽第二云若無自性即是本不生本不生即是心之實際心實際亦復不可得故曰極無自心生也文此文意心實際者第八心也心實際不可得是極無故是二又云行者初観空性時覺一切法皆入心之實際乃至尒時行休息乃至以蒙諸佛教授故轉生極無自性心文此文既驚第八生極無故是三金剛界儀䡄云想身證十地住於如實際乃至汝之所證處是一道清淨云云住如實際云一道清淨故是四住心論第九云驚一道於彈指覺無為於未極文准䟽釋以第八為所驚故是五戒序云覺心不生人無自性故起一道如實心一道如實人蒙諸佛驚覺故極無自性心文第七無驚第八有驚故是六依如是等文理故成心實際第八義也二義中後義為勝心實際文名第八䟽文分明故但會前文理者能所治義不定或兩劫相望如即心幻或於一劫內成能所治初後幻是也初劫既然也第三劫何不然乎又三重幻不盡三刧心舉一顕一謂初劫舉𡧤然顕湛𡧤第二劫舉他緣顕不生三界唯心他緣不及心王自在故第三劫舉極無顕一道也又大師以離有為無為界亦證第九故知望第九時第八還属無為等欤故覺無為於未極文又覺釋第二三二劫中各不存二心不知住心故故指前劫也口决釋三乗家者小乗大乗一乗云三乗故䟽釋通逹三乗云大小乗等文又香象釋大小一為三乗故儀䡄文云一道清淨故菩提心論文文同義異欤或彼文不通第八欤例如第九又雖云自如未云心實際故無失問三種幻配位𭤧如何字義第四實範云問三種幻何位之所観耶即空幻初劫即心第二劫即不思議第三劫乃至如來地之所観也問初二幻如次初二劫所観文分明何以得知第三幻第三劫乃至如來之所観耶䟽云今此中云𭰹修觀察者即是意明第三重乃至復次言𭰹修者謂得淨心已去從大悲生根乃至𭤧便究竟其間一一緣起皆當以十喻観之由所證轉𭰹故言𭰹観察也乃至是故唯有如來乃能窮此十喻逹其源底此所以次無垢菩提心即明十喻者包括始終綜該諸地云云故知第三重幻第三劫得淨心已去乃至佛地之所観也問文云修菩薩行諸菩薩是舉囙行人也釋云佛修行句非示因行乎况於果位無犱何用十喻観乎或云實示修行相是雖因位䡄則所授法豈果位無乎况修上上𭤧便断微細犱時寧不用此観乎又釋論𭔹治行相可證矣云唯有如來乃能窮此又下云毘那以上上智観盡其源底又云以十緣生句作無盡㽵嚴則此意也私云可𡱈因欤云菩薩行云修行句故但秘記釋者上上𭤧便句可存因滿也上云十地究竟故八九十三地如次下中上三品也因滿果滿為上上𭤧便也例如菩薩地盡句故知因滿断㣲細得佛果故云至佛果故也又當卷下云補處位断無明父母之垢故釋論又理無断故不可依無性観也但窮此十喻者因行轉齊至佛果故云尒又下釋者依因十緣観生上上智觀也又以因十句作果德莊嚴也然䟽文次第十喻観通因果故文此文難消矣即是意明第三重等者鈔云𭰹修観察者𭔹前二劫故名為𭰹謂第一劫中即空之幻是名為淺第二劫中即心幻亦名為淺今第三劫中不思議幻故名𭰹観也畧抄字義第四中川云第三即不思議幻等云𭰹修観察有二𭰹義一望初二幻等云𭰹二淨心已去所證轉𭰹故云𭰹即是意明第三重者初義也謂得淨心已去等者後義也文以自心為感佛心為應者大䟽抄云私若自心著真際時自心為穢是故感小自心穢故佛心應小故悉地不成乃至自心佛心俱畢竟淨是時有感有應乃至我心地淨本尊月自顕言也文謂行者信水淨則本尊影現云感應也又本尊影現云加行者信水能持故云持以加持逆次配感應耳故即身義云加持者表如來大悲與眾生信心佛日之影現眾生心水曰加行者心水能感佛日名持文所喜見身者若四種身義者受用反化等𣴑三身云所喜見身也能現毘那是自性身故若五種法身義者自性受用等四身皆所現也法界身為能現故故菩提心論云成大毘那佛自性身受用身反化身等𣴑身文此文既毘那外舉四身故又寳鑰下云是法身大毗那如來與自眷屬四種法身住金剛法界宮乃至云云既毘那外云眷屬四法身故密嚴院先哲正位礼懺文成五種法身義可見九字釋矣又義云能現所現俱通四種身且自他利義作能所現假欤故二教論云此四種身具竪橫二義橫即自利竪則利他文即是法界等者鈔云䟽即幻論遍一切等者如來金剛三乗之幻即是遍一切法界圎壇謂彼法界大㭟中一一本尊皆是法界幖幟一遍一切名遍一切處遍一切處論幻者謂遍一切處法界㭟羅即是如來三密之幻皆本不生四句求之俱不可得即不思議之幻也文字義第四云䟽云今此境界為從自生耶他生耶共生無因生耶以中論種種門観之生不可得而形聲然即是法界論幻即幻論法界即法界論遍一切處即遍一切處論幻故名不可思議幻也今行者於一念淨心中通逹如此塵沙四諦空則畢竟不生有則盡其性相中則舉躰皆常以三法無宗相故名不思議幻如四諦者余一切法門例耳云云十卷本云即是即即字十四本無法界論幻即幻論法界即幻論遍一切處即遍一切處論幻故名不可思議幻也云云抄第四云䟽即幻論遍一切處等者乃至云云如前當知即不思議幻有二義初義兩本義釋其意全同謂法界與幻㸦相即論亦幻與遍一切處㸦相即論抄釋後故名不思議幻䟽文雖異其意返同如來身語名為幻空有性即是法界圎壇為遍一切處三法一躰隨論異名今即法界遍一切處而論幻故名不思議幻後義三本皆同空即畢竟不生者八不舉初一有則盡其性相者十如出初二中則舉躰皆常者是法界不動也幻有假諦即餘二諦而無宗相故云即不思議幻也云云観義云古文點如常若私𧦐者即法界論幻乃至即遍一切處論幻故名不思議幻也云云意顕三諦相即義也謂法界者真如法界即空諦也幻者幻有即假諦也遍一切有空不二即中諦也云云私云相即義冝其然也但䟽文初句云即是若尒𧦐釋不順文欤不思議幻名專三諦中依幻有故可云論幻故名不思議幻故故知形聲然即是法界者惣先釋有空不二義也論幻即幻者一假一切假義也論法界即法界者一空一切空義也論遍一切處即遍一切處者一中一切中義也論幻故等者不思議三諦中今不思議假諦故名不思議幻也為言故天台釋云如明空一空一切空點如明相一假一切假就是論中一中一切中非一二三而一二三不縱不橫名為實相文又若無是字而有即法界本則何無其義乎三諦相即雖無偏頗今観門假為宗故從彼云不思幻也故下釋云以皆從緣起即空即假即中文既以緣起為三諦相即所由故抄釋牒文不順䟽文未審謂得淨心已去等者𭰹修観察第二釋也淨心者初地也起信論中名淨心地是也大乗義章十云歡喜地者中亦名淨心地也乃至住此地時於真如中證心清淨名淨心地又於三寳得清淨信亦名淨心文今謂初地是淨菩提心位故云淨心也三句中菩提心為因句也二地至七地為大悲句八地已上為𭤧便句也故當卷下云初入淨菩提心門見法明道前七地以來為大悲行無功用以去至如來一切智地名大悲胎藏生畧抄䟽第二云初地菩薩得此空無垢菩提心從二地以去增修大悲行至第八地以去皆名𭤧便地畧抄今釋與正釋異者或云前釋𡱈第三劫即八九十地也今解意通第二劫從初地至七地是第二劫故今謂不尒初釋初地淨菩提心三句中𡱈因句也後釋通三句廣亘十地故若初釋八地以上何不云轉𭰹耶又不思議幻是第六無畏也上文云即是真言行者空無垢菩提心也文豈有八地耶違初地菩薩得此空無垢菩提心文故菩提心進在究竟位乎故知三劫地前論之耳問若尒實範義云即不思議第三劫乃至如來地之所観云云如何彼正釋復次通論故云尒今兩釋別故無違矣且如四諦等者鈔云且者不𥁞之辞如即指之語法数誠多但舉四諦世界無量直示娑婆盖取一隅耳故華嚴四諦品云乃至諸佛子苦聖諦此娑婆世界中或名罪或名逼迫或名反異或名攀緣等乃至諸佛子苦道聖諦此娑婆世界中或名一乗或名趣𡧤等諸佛子此娑婆世界四聖諦有如是等四百億十千名乃至彼密訓世界中或名栄求根或名不出離乃至十𭤧無量世界各有無量名不可𬾨舉如彼廣故云且如等文次三法無定相者大䟽抄第一云此不思議幻得成就時三心究竟即是秘密行者所求果耳意者心中空有中道皆悉不生以不生故無有定相故名不思議幻言也文私云三心者心中具三諦故三諦云三心也凢今一句出三諦相即因成不思議義也不思議三諦有空中無定相不隔厯故云尒也天台止観云此三諦理不思議無决定性文或云至名為不思議幻為復次釋終矣或云至逹其源底為終矣或云不可縷為終耳私云諸義皆非理且如四諦至逹其源底者釋當於真言行通逹作證文也故云通逹如是塵沙四諦又云乃能窮此逹其源底也次無垢菩提心至明其大歸耳者次下所釋十喻來由也故云且依釋論等耳故知故言𭰹観察也句為復次釋終也次無垢菩提心等者字義云言無垢菩提心者上云得淨心已去之淨心也言十喻者第三重也謂所以次第六無畏即第三劫淨心即明第三重十喻者以淨心包始以十喻括終舉所観顕其他故始終即諸地故也云云覺心云有云無垢菩提心者十喻以前所淨菩提心也其菩提心已三劫十地無不通今其次十喻者如彼菩提心通始終𮈒諸位每事緣成此観云云行實多不可之云意也云云私云今此十緣生句包括三劫始終綜該信解諸地也為言凢通三劫十地位觸一切境成十緣生句観故云觸緣成観也問今十喻厯事観時所喻各別耶今所喻別也然於一事用多喻何之乎依之第二劫六喻通観頼耶自性初劫五喻各別如次観五薀無性等依之千手儀䡄観諸法假通用十喻故又金剛界儀䡄観煩惱等通用五喻故知通別隨冝耳包括始終綜該諸地者謂今此十緣生句包括三刧始終綜該信解諸地也為言凢通三刧十地位觸一切境成十緣生句観故云觸緣成観也御記云文永四年六月廿七日於高野山丈六堂以傳法大會之談義之次草之畢文永九年十二月中旬於醍醐寺中性院誂理性院上野公令清書畢自拭老眼加點畢金剛佛子頼生年四十七
