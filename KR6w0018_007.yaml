body:
  text: 疏卷第一之七經若我若我所者五見中身見於五薀執我我所也我者我身也以常一主宰義名我也謂我見顛倒緣非我五薀邪推度執常一主宰也次我所見者以餘法屬我身也餘法者我器我瓔珞等僮僕等也所者所屬餘法屬我物故名我所也餘法假無自他所屬而顛倒推度執我所也此我見我所見是身見攝也若能執所執者私案能執者能遍計依他妄心也所執者當情現境上所舉我我所歟即遍計所執也或又所遍計境歟若爾能執所執如次依他能取所取歟即依他見相二分也此二分離心無境離境無心然離心有境離境有心是我我所能所取也前二義中所執為所遍計聖教無文又為我我所似重言然上約我名我有義顯前我我所是所執何𭁆例如更舉清淨我矣守護經云若有執受若無執受文未必當今能執所執彼經中無我我所及清淨之文又準牒若我乃至清淨文釋我人壽者等法者遍計能取所取云能執所執歟或等法言舉依他能執歟世尊前已廣等者前文中雖廣約十二處十八界等明心實相猶有未解者故略明處界我我所等也又五薀法前未明故今更開也故知廣者指前心不在內已下文歟亦為等者此釋意釋成前我諸法等決了義也非通諸文所以上文中雖云知識其心未云歷何法知識其心故重約三科等法而明決了義也故知初釋不為開會也後釋局我已下故為決了別也初句云以下隨文釋可通二意與或諸薀和合中我不可得者唯薀無我義故指諸部小乘經也今經中若色若受想行識求不可得等文歟諸法從緣生都無自性者法空義故指般若等諸大乘也今經中一切分假中求不可得等文歟分假者衆緣生義故依之下疏云乃至一切分假中求不可得者即是摩訶般若等中歷法廣明者是也文彼言諸法實相等者指事云於諸經中所實相者與此經中所明心之實相躰同而教相異文文私云而教相異者彼漸次開實相此直約諸法故漸頓異故云爾也然後為即心之者今此即心有三意一者法華經也故上釋指法華云然後如來以實相文又法華經云為實相文準本經并上疏釋無爭法華也凡今文中有二節從如一切經中至更無別理也者先舉小乘三乘漸次教開會之也次從但為薄福至祕要之藏也者舉法華開會而示異今經決了也所謂小乘三乘無決了義故舉彼專述開會義故云彼言諸法實相者即是此經心之實相也又法華雖有開會異今經決了故云今經即不如是等也即與直其意異大師釋云餘教頓悟根熟待時密乘頓悟初心凡夫此生證悟文彼根熟故時義𭚘合即心此初心凡夫直示故云直約等也問何以知法華開會又所牒經文未見其義耶答不能自信作佛之釋正當法華不自信作佛之文淨諸垢障之是轉四諦方等洗人法垢穢之意也將護其心文般若洮汰之謂也時義合然後為即心之者四十餘年機根調𤍨後為實相之義也文義悉彼經矣但於經文無法華者經文約未開阿𭇥般若等雖明決了義疏家為欲顯今經決了勝法華故疏舉之歟或大師以法華同如實知自心故前假我諸法如是句兼法華歟疏家探經意今文釋之歟二者即心今經也直令知其心即心義故故疏釋云如來智即定其心廣分別文以智即定其心豈非即心義乎今經即不如是者前漸次實相直約已下釋成即心義也一切經中言不可簡一乘况諸法無自性義專當花嚴經故智證疏抄釋此文云今案以此明見一切諸經漸次開實久默斯要之言並可入此漸次之門今此經中歷大小諸法開示實相真實故為頓覺成佛入如實相門決了之故也文此釋心久默斯要之法華入漸次門也但自信作佛者如實知自心義也淨諸垢障等約隂界入方便令知識其心義時機合者出生義云大種姓根法緣已熟三祕密教時正至等文此意矣或又自信作佛淨諸垢障等重指前漸次實相而示為今經方便之義也故上釋云釋迦如來及三世佛所法無非為此三句究竟回歸本無異轍取意故智證指歸云明知在一切經後諸經猶文此經如以三摩地一切諸經為諸佛祕藏文三者法華并今經為即心歟經疏同以第三劫為真言行故大師又以天台同淨菩提心故以小乘三乘為所開也三義中前二義為勝矣謂若分假者舉從緣生法者問分假變易聖教常言若言所顯對若顯色等舉分假生死也况下文舉我我所等又處界攝無為彼等非緣生法若爾何何為句乎答結文既云一切分假中非隨一也况復守護經云謂此心性於一切相若形若顯等文大師以今經文同彼文然於一切相文當今謂若分假句一切相言豈非句疏釋以法待因緣生必有差別相故即此意矣但若言可讀如訓也又我我所於緣生法所起故無為依他所依故且屬衆緣生歟或性宗以上為無為躰一故能迷妄心亦云遍計所執故云緣生歟或約多分就依他為𢝰句歟當知一切色塵等者有二意一者顯形外云一切色塵是表色也取捨屈伸等非一故云一切是解經境界句中問表色是有情攝合掌打縛等令表示內心故故慈恩釋云表謂表示表自內心示於他故文可在下內身五薀之中然上文釋今色云色本非情文故大師釋云謂或顯色或形色若色受想行識乃至顯形如文可知自下即是表色也取捨業用為作等故文何答上舉顯形下舉五境其中間所示色塵非表色何乎但色本非情者指顯形非解境界句况上既釋六塵法境中有心心所法寧但云非情乎聲字義釋出三色證故境界句通六塵故且除之也又內身者頌疏十一云第二內外門自身名內所餘他身非情名外或約十二處辨眼等五根名內色等五境名外文內外分別非一何為難矣又大師釋云顯形色等色內外依正具文表色通器界歟然彼依正不二故云爾歟或今教意三摩耶身等有發心修行義故云爾二者青黃長短等草種色對顯形云一切色塵也其躰雖一開合異故故俱舍云色二或二十文既云色本非情故上六塵舉非情邊準大乘意法境中今取極略極逈等而非取心心所等歟下五薀有情故情非情相對若不爾似繁重歟守護經云謂此心性於一切相若形若顯若復色薀受想行識若復色塵聲香味觸若有執受若無執受若十二入若十八界如是等法觀察推求竟不可得文私云若復色塵等文當今境界句然不舉法境可思之或書寫誤歟般若寺抄云薀處界中及三界男女顯色形色逈色表色中皆不可得言也文準此釋一切色塵中亦攝法處逈色歟乃至現在一念識者問今此一念者妄心歟真心歟答可妄心歟所以然者凡今宗意雖直約諸法令識其心為令觀心易成且指一念妄心也謂於三科簡却界入復於五薀中除四薀取識薀從麁至細漸略義豈真心乎又薀不攝無為性相所判故天台要釋一念三千云的指一念即三法妙中特取心法也應知心法亦就迷就事而辨文天台既談事具三千祕宗豈述真心三諦乎所謂衆生念念妄心悉從緣生故即假也緣生無性故即空也此空有即不二故即中也此三諦遠離斷常一異等論故云遠離論也此三諦即字有空不生三義故云至於本不生際也此一念三諦義同天台一念三千故大師以如實知自心證第八住心云一念心中即具三諦以此為妙文天台十不二門云良由無始一念三千以三千中生隂二千為正國土一千屬依依正既居一念一心豈分能所雖無能所依正然文已觀諸法實相次明觀於我相者諸法局依圓不通我歟百法論云何等一切法云何為無我文準此釋者若能執所執遍計所執能取所取歟若不爾者何云但有假名矣如長爪梵志等者智論第一云舍利弗舅摩訶俱絺羅與姊論義不如婦俱絺羅思惟非姊力必懷智人未生乃爾及生長如何生憍慢心出家作梵志入南天笁始讀經書自願言我不剪抓讀十八種經書人見抓長長爪梵志是人以種種經書智惠力故摧伏諸論師已直向佛所而語佛言瞿曇我一切法不受佛問長爪汝一切法不受是見受不佛所質義汝已飲邪見毒言一切法不受是見汝受不爾時長爪梵志如好馬見鞭影即覺便著正道愧慙低頭如是思惟佛置我兩處負門中若我是見我受是負處門麁故衆多人所共知云何自言一切法不受今受是見此現前妄語是麁負處門衆人所共知第二負門細我欲受之以少有知者故作是念已答佛言瞿曇一切法不受是見亦不受佛語梵志汝不受一切法是見亦不受則無所受與衆人無異何生憍長爪自知負處即於佛智起敬信得阿羅漢取意私云雖作是見亦不受之答長爪意雖受之恐麁負處故舉不受答今約彼意許故云而受是見論云我顯受之可思之今亦如是取著觀空等者此文有二意一云以前外道清淨計類例長爪見也如者譬喻義也疏第二以觀空智惠不離斷常同長爪見故云云一云如長爪等者即舉作清淨計外道也如者指事也今亦下舉行者觀空智歟然二義中前義為勝生是清淨想者依經清淨文故彼豈行者想乎况長爪見不計𣵀槃之故即於以下明行者觀心也即是摩訶般若等者釋經乃至言也上雖舉我我所二科法未示六度万行等故云乃至也故釋云當知六度万行乃至心亦不可得文一切分假句準謂若分假句應句故問摩訶般若所明廣通三科等何唯云六度等讓彼矣如於隂界入等文非指般若所明乎答隂界入義亦雖大品所明彼義既讓毗曇故今以彼為例而指大品六度万行也當知句端此意矣况所牒既乃至以下句不可通上三科也一切分假句雖通三科今約六度万行邊故一切持三昧者疏第十二云百八三昧五百𨹔羅尼門文持𨹔羅尼梵漢不同也是心常樂我淨等者下所舉八倒歟抄云八者外道謂世間為常樂我淨為四二乘謂永寂為𣵀槃則無常樂我淨為復四倒文若依此釋所離妄倒也又起信論釋本覺德云常樂我淨義故文又釋所對染云非常非樂非我非淨文釋論云此四種過以對量本覺躰中四種㓛德云云若依此釋舉四德四患歟復次如聲聞等者或云此文大分二假謂祕密頓悟二門也上文雖明此意未分祕密頓悟二門故今更分別此二義也或云此釋對聲聞位顯真言行者法明道分位也云云私云前開小乘三乘漸次門而為今心實相也故上釋云或諸薀和合中我不可得或諸法從緣生都無自性彼言諸法實相者即是此經心之實相云云此意矣然今釋意對小乘三乘觀修而明真言行者觀行也未必開會義矣所以對聲聞我不可得而明真言心不可得又對三乘漸修而顯真言頓悟也或又次上釋隂界入義讓毗曇六度万行等指般若今釋對毗曇顯祕要義對般若示頓悟旨矣戒定智惠者般若所六度等故問不可得言雖同我與心其躰別何為例準乎答心上執之準我不可得歟猶如三無性矣問依圓無性空其躰若爾今又心躰可空乎答彼無性躰空執空兩門諍歟然雖躰空所遣是所執故今又情門故當執空義歟若約第四重無相者躰空義何無矣於八直道中等者智論八直道文八直道者八正道歟直正義同故準小乘性相八正道在見道位中法眼淨又見道得益故俱舍云修道位中近菩提位助覺勝故七覺增見道位中速疾而轉道行勝故八聖道增文若依大乘者七覺見道八正修道也然玄𮚌釋云此八正道別修行相雖在修道躰實通餘見無學道世尊應無八正道故文大小乘意大異然今依小乘意歟問若爾法眼淨小乘得益何下云大菩提道中得法眼淨乎答法華經既有法眼淨益何但小乘矣今經意初地法明道云法眼淨除障三昧云遠塵離垢歟又設雖法眼淨非法明道此位得彼益歟疏下文中以初地法明道類聲聞見道故嘉祥義疏云法眼淨有二一者小乘是初果二大乘是初地此難知也文又同師仁王疏云無量人衆皆得法眼淨謂始證初地云云妙樂疏記名同義殊文道暹釋莊嚴論判初地耳故知今法眼淨是初地得益也又義疏云但衆經多明法眼淨是小乘而聞大乘作悟小果者有人鈍根雖聞大法無巧方便故證小果文天台釋云法眼淨名通於大小無生忍名唯局在大文如餘遠離方便諸菩薩等者或云今此菩薩者顯三乘一乘菩薩也一乘又經遠劫故故大師今經開題云佛華法華牛時歷三大云云又云告成三大為限云云漸次頓悟顯密差異故先師云經疏并儀䡄等皆顯云三乘密云一乘故疏第九云略法有四種謂三乘及祕密乘文又五祕密經云若於顯教修行者久經三大無數劫或證七地回向二乘道果取意若非三乘何有七地退之義矣就中人法二空觀專第二劫行也故疏第二釋第二劫行云人法二空之相亦不當心文又超度人法有無二障云云又心之影像又第二劫也故疏第七云觀薀阿賴耶乃至覺自心時約心之影像本不生故明種種法門云云大師八九二心同淨菩提心故又頓中有顯密故屬頓悟歟又經疏等意約天笁流傳宗故不許顯一乘歟私云漸頓雖異所到一處故第二卷云舟車神通至到一處文彼方便對治第三劫故顯一乘也次下釋入佛智惠有無量方便門云云入佛智方便豈非一乘乎顯一乘非直觀自心而漸次實相門故云心影像無𭁆又三乘者小乘三乘一乘也例如云通達三乘矣心之影像者相似觀智是初地淨菩提心真證觀智之影像故歟猶如釋論三賢相似觀智菩薩云幻化影像菩薩今名即心幻即此意矣又義三乘教談諸識所變影像故云爾也入佛智惠有無量方便門等者顯密相對也下文舉喻中冶人消石成金神通者土木即成金此意矣故守護經釋云凡餘顯家入佛智惠有無量方便門今此宗菩薩直以淨菩提心為門若入此門即是初入一切如來境界故顯家方便門而得一之名文私云一者彼經第一清淨光明門即當今經法明道也一切如來境界者彼經一切智智諸佛境界甚深三昧即今經除障三昧也如𣃥勒開樓閣門等者出華嚴經中具如先生大惠光明等者三句釋法明道三字也謂法者所照法性明者能照智明也行者起大惠而照法性是行者所修行也以此行見古佛所行之道故故起信論云謂一切諸佛所證之道一切菩薩發心修行趣向義故文謂法之明法明道故二俱依主也下照見心明道者心是能照智躰也心即明也持業立名心名之道故意取道故為所照也彼上文凡夫二乘不見古佛所行路簡彼而云見心明道故知意取道也今三字各別釋故以明為能照耳或心法並舉故疏第五云若入此淨菩提門則見心法明道所謂古佛大菩提道文實上人云法明道者法者法性無量法性明者光明大惠光明道者諸佛所行之道謂此菩薩淨菩提心以覺心自本不生際故其心能生普照法性以大惠光明而見諸佛所行之道故其心名法明道也云云菩薩住此道時者此道者法明道謂住法明道即得除障定故云煩惱業苦皆悉除歟問經云菩薩住此修學等疏云小用功力等住法明道後更修而非云得三昧耶答除障定名依除五障然五障或云不入佛法或云不得聼法若不除彼障云何得法明道又明暗相違法住法明道位障猶存但經疏文者雖定惠俱時且約三昧邊為顯頓悟義如常遠劫漸修云不久小功也故經下文云住此除一切障菩薩信解力故不久勤修滿足一切佛法文此又住三昧勤修滿法明道等之義歟一切佛法中可有法明道故又守護經釋云若諸菩薩如是了知即得成就第一清淨光法明門大日經初法明道任運得此不可思議一切智智諸佛境界甚深三昧大日經言菩薩住此修學不久勤苦便得除一切障三昧若諸菩薩住是三昧一切佛法不作功用任運成就大日經云住此除一切障菩薩滿足一切佛法略抄既云任運成就未必更修歟或云文點可讀菩薩住此云云疏文讀云因淨菩提心照明諸法故云云問法明道何位耶答般若僧正云問何位爾名答真言行者第十祕密莊嚴住心也若配餘教者等覺位行相耳問以何可知此等覺位也答即五障也已次云當知行人則是位同大覺也文私云此意等覺妙覺一佛二名故作此釋歟然初地分證位也第二卷中菩提心為因判初地故又第七釋云到修行地即是淨菩提心初法明門例如聲聞見諦以後入修道位也文既同聲聞見道定知初地也又禪要釋得除障三昧位云得此三昧者名為地前三賢文準此文地前也然彼且就伏位云爾歟故彼要次下釋云依此漸進遍周法界者如經所名為初地文經者指今經歟譬如有人等者法譬相配者從有人至命終譬從妄起煩惱業苦又合中八万四千煩惱也從以明燈至塗相譬菩薩住此道時合中因淨至三昧是也從其人至喜樂譬清淨除也合中見八万至門故是也合中小用功力者釋經修學不久勤苦合譬中良醫診之至傷處也但彼知識教誘此自修行功自他雖異俱除障法明緣力也故知準譬意小功力是非法明以後之行也是中障有五種等者此五障釋經一切障也故知一切障言通五障名也然理趣經云一切障及煩惱障法障業障文及字起盡一切障似為別障下三障是今五障中三也若爾四障歟或別合論實三障歟般若寺抄五障中注前三云以上煩惱障也注後二云以上所知障也云云或云初三障即三道後二障業苦隨義離分立此歟又此五障雖一人所具且令人易知故約別人明之也或雖皆具有約偏增示之云云私云隨人具闕有不同歟又生障約異熟果邊立之後二障依等流增上果開之歟謂法障不得聼法依障法之緣第五妨修般若依差他道機皆今生果似前業故故唯識疏第八云或似先業後果隨轉者即無記果與自業相似與不善為同類也唯此一法非餘皆是假實增上果然假名等流非同性果故以異性法非同類故由令他命短自命亦短相似之義假名等流實業所感文演祕云唯此一法等者唯此報業相似一法假等流文準此今又因果相似假名等流實增上果實業所感故故知實是生障攝理趣釋中以法障攝餘二障開合隨冝歟又依華嚴地持等約滿果開立歟謂根本煩惱等者疏第二云由無明故生五根本煩惱心乃至若更約上中下九品等乃至成八万塵勞文私云五根本為初五度數成百六十心此百六十心約九品離分成八万四千也俱舍論以十煩惱為本展轉開增成八万四千也造諸重罪者疏第十七云如聲聞有四重禁戒於此中乃至是偷蘭非重禁也如前三世無障得戒中先令不捨三寶又令不捨菩提心此即菩薩真四重禁也文私云顯乘律藏所判聲聞四重婆羅夷非偷蘭然對自宗四重禁彼猶偷蘭也為言偷蘭此云大障善道能障善道墮𢙣道婆羅夷此云斷頭若犯此法不成比丘故或云今釋對堅住菩提心戒之人故作是然就今釋未發心真言行人不可犯四重矣無暇之身者八無暇之身也即八難也故梵古迹下云八難者有八無暇也謂三𢙣趣北州長壽天生盲生聾世智辨聰佛前佛後彼無修道故名八無暇亦名為難彼是報障文私云報障與生障名異義同也無修道故等者𢙣趣受苦無間北州等受樂無間無佛道修行之餘暇義歟無垢稱經第五云七以除八無暇法普攝一切無眼有情文兩不和合等者智論第六十八兩不和合品云復次須菩提聼法人欲書持般若彼羅蜜讀誦問義正憶念法人懈惰不欲為當知是菩薩摩訶薩魔事也須菩提法之人心不懈惰欲令書持般若波羅蜜聼法者不欲受之二心不和當知是為魔事釋云一切有為法因緣和合故生衆緣離則無聼法人信等五善根發故欲書持般若乃至正憶念法者五䨱心故不欲等文私云書持般若乃至正憶念云修般若也所知者修般若也今障彼故云所知障歟聽聞正法是十法行隨一故中邊論云講聼聞讀誦書寫供養轉思惟受持修習十種法行各差別故文若爾聼聞既有書寫受持等不爾乎答智論同卷云或時師慈悲心發故欲令書持般若第子信等五善根鈍不發故著世間樂故不欲受書持乃至正憶念少多聼受讀誦不能究竟成就故但名聼法文大品魔事品者誰兩不和合品所兩不和合義菩薩魔事故今疏從所云魔事品也例如淨影之釋云七漏之義如七漏經𣵀槃經七漏故云爾耳去來窹等者問眠是第六識有漏心相應法淨菩提心第八無漏心何俱起又昧略為性障觀為業豈與大惠俱起又唯欲界繫法非定相應何與除障三昧相應又淄州釋云除五故無眠文何答第八識發心未定設許非純無漏有漏散心位何不俱起矣餘師釋非今五障歟準相宗八地已上第六識純無漏七地以前通有漏心故可有眠歟智論七十三明阿毗致菩薩云復次須菩提菩薩摩訶薩乃至夢中亦不行小善道文既云夢中阿毗致位可有眠也或容有釋歟非實有眠歟即與諸佛菩薩同等住者謂初地淨菩提心位得佛智一分故云爾故釋論云初地菩薩內得正智外得後智一分智用與如來等文今位同大覺者此意矣若不爾者何云然非究竟乎問法譬相對月體是得佛譬也尤可約智躰也况菩提心論明十六大生又約月躰圓闕耶答若依月躰無增減義具縛猶同等何云分同次下然亦明漸漸增文約明用一分論同等也例如釋論中無明用因位雖斷躰唯佛斷今又約智用也菩提心論彼約月躰增減故云圓滿無得今云明漸漸增彼此意殊歟或又彼論云其一分明相等文彼又約明用歟又法譬相對者然字上下相對分明上法舉用譬舉躰下譬分滿俱舉法但示究竟法譬互顯歟或又亦字所顯躰位許一分明用歟或云若約本有邪定猶具始覺智用起時本覺智躰分顯故躰用俱得佛名歟或理云躰智為用歟乃至第十五日等者智論九十四云如月十五日雖同為月十四日不能令動大海水潮菩薩亦如是雖有實智惠清淨不能具足諸佛法故不能動一切十方衆生月十五日光明盛滿時能令大海水潮菩薩成佛亦如是放大光明能照十方國土衆生也云云三十六俱胝趣者疏第十一云如大乘中欲界有三十六處文今又明三十六俱胝性類或云嗔行偏多或云嗔性薄然嗔唯欲界是大小乘所判且就欲界判三十六處歟俱舍論云地獄傍生鬼人及六欲天名欲界廾由地獄州異文彼但開八地獄四大州故成二十處今八外開八寒四大州外開八中州故成三十六處具如先辨矣梵本嚕多是大聲乃至又兼多聲者智證大師抄云其意未詳文意隨方諸趣言音一世界猶無量差別况多世界乎對此方文字難具也為言通塞之相者所被機可度云通不可度云塞也如釋論道種智中廣明者非但意根等者上云復由意根淨解語言𨹔羅尼故云非但等歟前約六根淨義雖諸根淨非互用也今就諸根互用故問相宗六根淨地前得之天台十信得之今何云初地乎答上兼下故或前文復由意根淨者非不互用故重釋成也或今經不立地前位故初地皆得歟法華論云諸凡夫人以經力故得勝根用未入初地位乃至一一根中悉能具足見色聞聲知香味觸等諸根互用故云云玄𮚌有二義一義如唯識論一義云若加行力分所得者地前亦得也又天台真位六根從初住得之今教不立地前故初地得之歟問諸根互用方如何答唯識樞要有二師義初師又有二義一云一一識躰轉用成多非轉法躰云云一云恐壞法相但取自境皆是實境所取他境皆是假境云云後師云一一根處遍有諸根各自起用非以一根得一切境以諸根用各遍一切故名互用云云燈云然師意存第二解云云真𫤭云存初師第二解為言第一解有壞法相之𭁆後師解有非互用之𭁆也復次如上所等者此為釋經文諸佛護持句云復次也但六德次第相釋是預諸佛外護專依具內德故悉唱上內德而為外護來由故非為重顯上六德鉤鎖歟或又成前起後歟發五神通者問法明道菩薩五三妄已斷何但五通不發漏盡通依之大品經往生品云菩薩住六神通云云爾何答初地菩薩五三妄雖已斷微細妄執猶未斷故隨在何教謂於自乘果可得漏盡故依之疏第十二云此五通即是八地菩薩自在之用比於二乘之通如用日光等彼螢火也文又智論第二十八云五通是菩薩所得今欲住六神通是佛所得文仁王經云復有菩薩四眼五通皆成就取意佛眼漏盡果位所得故菩薩位除彼矣又即身義云若有真言行者現身獲得五神通漸次修練不捨此身進入佛位文此又不得佛位前但得五通也但於大品文者智論二十八釋此事云第六漏盡通有二種一漏習俱盡二漏盡而習不盡習不盡故云皆得五通漏盡故云住六神通文會大品如菩薩品往生品五通六通相違而作此釋漏盡故雖得六通名實是五通習未盡故當知案顯密諸經論意於因位不可得六通但二乘得六通約自教談也依人執漏盡故復次行者以內具等者自下釋經雖處生死等文也此文鉤鎖上文作釋此菩薩內具六德外被諸佛護持故處生死不染煩惱而成利衆生事也常在無間獄中者容有歟例如論中云常在人天及乃至身命而不惜或云處於生死而無染著等者金剛薩埵五祕密荼羅也今淨菩提心即初地金剛薩位故處於生死是不住𣵀槃義而無染著者不住生死也同一月輪同一蓮臺更問矣住無為戒者疏第十八云有為戒者此是修行方便故云有為戒也然無為戒者即是本性戒非是修成對此有所行方便故言有為然深觀即同無為戒也文第十七持明禁戒品云然戒西方音有二一者此是修行戒也謂淨身故須行之尸羅二者沒栗多尸羅戒有二謂本性戒及制戒也性戒謂淨諸根今沒栗多須成就故制之也是長時所持之戒沒栗多是有時願之戒文抄云梵語尸羅此云清冷此是本性具足戒也性自須持今持明戒梵語沒栗多此譯云制戒為持明者方便制之文私云疏文可讀亂達尸羅是性戒沒栗多制戒也故知有為戒者今制戒歟無為戒是性戒故十八云由住有為具惠方便能得如來無上吉祥無為戒文又云以此五戒為首而能成一切智地如來之位故云得無漏戒性成也文或云依前十七文三摩耶戒師受戒故非無為戒即四重十重禁也云云此義不爾既云佛性三摩耶戒又云發菩提心戒佛性菩提心豈有為乎况今制戒云有時願之戒然疏第五釋三昧耶戒云又對二乘律儀有限量故以三世無障得智為名也文具如下辨梵云尸羅是清冷義也者疏第五云若尸羅者但是清淨義也文大師戒序云戒有二種一毗奈耶此調伏二尸羅云清涼寂靜是則由大慈悲行願故自然離十不善心離十不善業即受調伏戒由離其心故心中得心清涼寂靜是則尸羅之戒亦是饒益有情之戒文基師義林章第三云尸羅梵語此曰清涼行𢙣之人𢙣於尸羅名𢙣尸羅非尸羅𢙣名𢙣尸羅古人解曰尸羅戒義尸羅者即𢙣戒文道宣戒疏第一云初云尸羅此為戒戒有何義義訓警也由警䇿三業遠離緣非明其因也如古所傳防非禁𢙣以解於戒然戒通善𢙣律儀亦然不可偏舉以釋戒義如經論中多從善戒約義得名文元照行宗記第一云古中先出古解然下局如屠殺者受𢙣律儀以殺為戒但對境名戒通禁名律儀戒既通𢙣古解局善即是偏舉文私云慈恩南山俱破古師其義㔫右然今疏及大師釋就善戒故勿違諸義耳戒序疏中各出二梵名尸羅名同南山釋中出三名序二名外舉波羅提木叉疏中沒栗多餘師釋無耳如是獲得除障三昧時等者疏第十七云又定惠等合為一名為等能住如此真實乃至等即是住佛戒也文等引又定一名也住等即住佛戒之義如今得三昧是尸羅故之要由白四羯磨者羯磨經云白四羯磨三十八法文同疏第一上云亦以一白三羯磨通為四也文濟緣記第一云律云有三種羯磨白羯磨白二羯磨白四羯磨據名名立本無差降文私云依此等釋一白三羯磨云白四羯磨也問白四羯磨作法何答四分僧羯磨上云正授戒法戒法難生衆緣須具諦受當如是作法開導令起上上品心至誠大德僧聼此某甲從某甲求受具足戒此某甲今從僧乞受具足戒某甲為和尚某甲自清淨無諸難事年滿二十三衣鉢具若僧時到僧忍聼授某甲具足戒某甲為和尚白如是大德僧聼此某甲從某甲求受具足戒此某甲今從僧乞受具足戒某甲為和尚某自清淨無諸難事年滿二十三衣鉢具僧今授某甲具足戒某甲為和尚誰諸長老忍僧與某甲授具足戒某甲為和上者默然誰不忍者三僧已忍與某甲授具足戒某甲為和尚竟僧忍默然故是事如是持作此法已應為記持邊受與此無異私云從大德僧聼至白如是一白也又從大德僧聼至誰不忍者三度云三羯磨也古師第三羯磨之字時云發戒躰也新師如是持之持下云得戒也方始得生等者聲聞戒是作一白三羯磨第三羯磨時始得戒躰然方便守護而至盡形壽壽盡戒躰隨亡若犯不至盡壽或汙戒或捨戒汙捨者或云戒躰雖相續不增長云汙戒戒躰已失不相續云捨戒也或云戒躰雖相續不增長云捨戒𮕱微云汙戒也彼顯乘菩薩戒雖盡未來際若有犯緣汙捨又有始得今無為戒是本性戒而非師受故云不由他得非始發無表故云非造作法也若雖有犯緣更無汙捨故云常無𭁆犯故下疏云三世無障得智戒也問大小顯密諸戒受持作法是同所以三種戒同對五師受之和尚羯磨教授證戒同法也但聲聞具戒依現前僧而受之顯菩薩戒梵十重禁瑜伽三聚淨戒及密佛戒皆對不現前僧受之然顯戒釋迦為和上文殊為羯磨彌勒為教授十方諸佛為證戒十方菩薩為同法密戒大日為和上餘四師同前此依小野廣澤三摩耶戒私記大師戒序異此矣既師受義同何云不從師得等乎依之疏第五云是故次令發菩提心然後為授三世無障得智戒此受菩薩戒法別有行儀也文又大師戒序云龍樹菩薩戒有五種云云人天聲聞緣覺菩薩三昧耶佛戒第五三昧耶佛戒今所授者也文此等文明鏡者歟何答今佛性三昧耶戒法佛自然智故法然本具戒故疏第五云然佛戒者即如來自然之惠文然凡夫不知此理故遇灌頂師示受持儀式也故經䡄中明受持作法耳又疏第十七云此本性戒自然合行故𣵀槃云性自能持戒也文令弟子知此理歟問戒惠其躰別何云自然智故戒序云非只戒異定惠亦別文何答無畏禪要云前雖受菩薩淨戒今須重受諸佛內證無漏清淨法戒方可入禪門入禪門已要須誦此𨹔羅尼𨹔羅尼者究竟至極同於諸佛乘法悟入一切智海是名真法戒也此法祕密不令輒聞若欲聞者先受一𨹔羅尼曰唵三去昧耶娑坥鍐此𨹔羅尼令誦三遍即令聞戒及深祕法亦能具足文私云前受菩薩淨戒者真言十重禁也無漏清淨戒者發菩提心戒即佛性三昧耶戒歟準此釋十重禁即似非三昧耶戒矣又疏第十七云如三世無障得戒中先令不捨三寶又令不捨菩提之心此即菩薩真四重禁也若菩薩不生如是心捨離於佛即名破於重禁文又云復次菩薩自有十重戒如前不殺等不在其數乃是偷蘭也云何十耶其四如前所更有六重也并為十也文又準此釋四重十重禁皆三昧耶戒歟然前無為戒云無𭁆犯今云破重禁未詳又灌頂文云如聲聞菩薩戒有四重十重三昧耶戒亦有之然其名同義趣別何者聲聞菩薩四重如常今此戒四重者亦如後文此又四重等為三昧耶戒歟聲聞雖無十重有四重故云也今案諸文意今佛性三昧耶戒是菩提心躰故一切功德無不具足故或云戒或云智或云定無違故疏中或云法佛自然智或云能住等引即住佛戒又云四重禁等也又菩提心論云勝義行願三摩地為戒云云此則三摩耶戒又三聚淨戒也戒定惠功德無不周備矣又灌頂文云此戒名三昧耶唐平等言平等者身語心三密平等亦名三部三部者佛蓮金也取意又疏第五云令行者深觀十緣生句了知三業畢竟不生法性自爾常無動作是名無為戒也文三部三密中何德不攝矣小乘七支大乘三業上防非止𢙣功能云戒躰今宗三密平等即戒躰依法不平等故起𢙣三密平等故衆𢙣即德云戒歟但戒序釋者且為別三學一往釋歟非謂不今戒攝也戒序四重十重名同義別者四重及十重數名歟一一名躰顯密大異故顯四重是盜殺妄也密四重者捨三寶捨菩提心等也十重又顯出梵經密見大疏等又禪要中但明十重與疏異戒序中四重十重別舉四重異經疏十重同禪要瑜伽中舉菩薩不共四重梵十重禁中初四共四重後四不共四重大日經中明謂謗諸法捨離菩提心慳惱害衆生四重矣經疏及序等四重不共四重也此等異勿令混監矣小野廣澤三摩耶戒私記不同出之小野四重十重俱授廣澤唯授十重歟問若爾顯密戒躰別乎答疏十七云聲聞緣覺有十善戒外道世天亦有十善戒今佛復菩薩十善戒有何差別耶隨上中下智所觀自成種種非一切衆生本原戒而有差別也取意戒序云戒有五種人天聲聞緣覺菩薩三摩耶佛戒十善戒通五種有淺深耳取意他宗釋云戒無大小受者心品云云問十善戒通三摩耶真言行者亦受持乎答疏釋學處品十善戒云先受此戒已住斯學處然後令聞如來之祕密之行此戒未造漫荼羅法前即合為也文不假受持常無𭁆犯者受者受戒遇師受得也持是隨戒謂持有二作持止持也犯又有二作犯止犯也作自恣布薩云作持之云止犯止殺盜等云止持之云作犯也𭁆者捨義失捨戒躰故即捨戒義也犯者破義通汙及捨故知犯廣失狹也準瑜伽論苾芻五衆律儀五緣故捨一由捨所學處故作法捨二由犯根本罪故三由形沒二形生故四由善根斷故五由捨衆同分故近事戒有三種捨緣前五中第一四五也但第一前苾芻必對人作法捨此不作法自捨為異近住戒有三緣一由日落已後餘同近事第一第三矣五十三菩薩戒有二種捨緣一捨無上正菩提大願二現行上品纏犯勝處法又更有二緣七十五勝處法者波羅夷名也此云斷頭四重罪也太賢古迹下瑜伽云若諸菩薩毀犯四種他勝處法數數現行都無慚愧深生愛樂見是功德當知名上品纏犯非諸菩薩暫一現行他勝處法便捨菩薩淨戒律儀不同聲聞一犯即捨又上纏犯雖𭁆淨戒經即懴亦得重受不同聲聞如斬頭者現身不能復入僧數文私云上品纏者前數數現行等四緣具足也四緣中一緣二緣等不具四緣中下纏也𮜋一現行者非數數故闕初緣義歟所謂行殺盜等依四緣具闕分上中下纏也制止八顛等者鈔云疏制止八倒者八者外道謂世間為常樂我淨為四二乘謂永寂為𣵀槃則無常樂我淨復為四倒若謂二乘無常樂我淨之四德此約與也若二乘既不如實以其該如蟲食木偶得成字故况不了生死實相即是𣵀槃安能離於八倒哉文私云外道常樂我淨四倒二乘非常非樂非我非淨又為四倒故成八倒也依抄所釋本顛字可倒字歟遠離二邊者二邊斷常二邊即邊見也前八倒是邪見攝歟所謂住無為戒有二德一實智增明二逮見中道謂依實智增明故制止八倒依逮見中道故遠離二邊也又梵經上云是十戒躰性制止八倒一切性離一切道清淨文古迹釋云防十𢙣時制止有為無為八倒有無性離一味清淨也文今又云由住此戒其意同矣又今無為戒初地淨菩提心第八住心也然彼云一道清淨文義自故大師彼經開題云一一章假歎一道清淨教文可思之迦亦云等者抄云此𣵀槃經佛告迦善男子謂四倒者於非苦中生於苦想苦生樂想無常常想常無常想無我我想我無我想淨不淨想不淨淨想是名顛倒乃至迦菩薩白佛言世尊我從今日始得正見世尊自是之前我等悉名邪見之人也文私云非苦生苦想乃至淨生不淨想是二乘四倒歟苦生樂想乃至不淨生淨想即外道四倒也故云𭂫夫二乘不能決擇等也是中惠不正等者準此文今邪見可通五見歟五見皆正見所離故又百法論中五見云不正見故筆削記第一云心行理外名邪見非但不信因果而已此乃𭂫夫外道二乘但名為邪故迦言我等自此已前皆名邪見人也文此釋同今疏但外道別舉今有𭂫夫中歟又唯識演祕云疏邪見言通𭇥五見文義章六云問曰五見斯皆是邪何故撥無偏名邪見成實釋云此見重故偏名為邪文空謂不空等見非撥無見故俱舍十九云撥無因果名為邪見文又五見隨一邪見也但撥無云邪見是俱舍意也故唯識論第六云三邪見謂謗因果作用實事及非四見諸餘邪執如增上緣名義遍故文又隨一邪見亦正見故不正見攝故又疏第十八云邪見者謂各各持於其本法之中即見理不正順邪道者皆是也若謂無果無因即壞三寶四諦法今盡撥無此事即是外道宗計也文即時無得智等者疏第五云菩薩所以發心攝受方便學處皆為成就如來清淨智惠於一念中了達三世諸法無罣得故其有住斯戒者乃至初見心明道時即有如是不思議㔟分以此戒親能發生佛惠又對二乘律儀有限量故以三世無障得智為名也文準此釋無得智者三世無障得智戒即三摩耶戒前無為戒也於一切法者所達三世諸法也又疏云自然智是如來自覺自證之智昔所未聞未知之法自然了了現前無所罣得故以為名文準此文如來自然智云無得智歟前文既云以戒生佛惠戒即非智歟或又戒即惠也故疏云然佛戒者即如來自然之惠文二義終一無違耳雖無量天魔等者抄智論云一切菩薩皆願欲得薩婆若魔來欲壞作是言是薩婆若空無有所有但諸師誑汝耳諸法者六波羅蜜等趣薩婆若是法亦空薩婆若亦空無所有相是中無得薩婆若者汝唐受辛苦云云私云此文魔來雖亂菩薩未見現佛身又雖云六波羅密趣薩婆若未六度歟或智論六十云佛言有所得般若波羅密是為相似般若波羅密之文而為今證此又不可真佛所未魔所矣起信論云則為諸魔外道鬼神之所惑亂亦作如來像若布持戒忍辱精進禪定智惠文釋論云修行因雖有無量而不出六種波羅蜜是彼像為修行者六資糧亂行者令入邪文此文既天魔現佛身六波羅蜜亂行者故此文歟不久勤修等者前住法明道不久勤修得三昧今又住此三昧不久勤修滿足佛法云云若爾法明三昧佛法漸次得之歟謂有二意或準冶人神通頓漸譬三德雖同時得開而令易知故作次第也例如彼云法在一心必次第也故知三種皆顯教漸修故云不久勤修也故釋法明道云若如實知即是初發心時便成正覺又釋三昧云若得此三昧者即是位同大覺也又今文云以是菩薩初發心時即名佛故云云既發心成佛同誰云別時功德矣或約初地中入住出三心作三重淺深歟疏第七云此修行地即是淨菩提心初法明門例如聲聞見諦以後入修道位也文法明道既見道後二如次修道住出位歟守護經云若諸菩薩住此門已任運得此佛境界甚深三昧住是三昧一切佛法不作功用任運成就略抄佛境界三昧者除障三昧也龍樹以為如冶人等者智論三十二云利根者即知是諸法皆是法性譬如神通人能變瓦石皆使為金鈍根者方便分別求之乃得法性譬如大冶鼓石然後得金文今以冶人神通人類顯密行人也爾時執金剛等者一本開題自下為正宗已上為序分𭂫序有二意先釋意以現瑞竒特事而為今經別序故故上釋云即是將此經示不可思議神通瑞相也文今義意以三句文為序分以九句別為正宗也三句大宗一經大意故為序也故今釋云如上佛經之大旨心實相門略已周備云云如華嚴諸經等者或云如者譬類從功德句返讀之猶如下文云如般若中等也華嚴經云菩薩於生死最初發心時一向求菩提堅固不可動彼一念功德深廣無涯際如來分別窮劫不能盡文又今經生廣大功德者擬功德深廣其性常堅固又同堅固不可動文故知例準也或云如者事也從經字返讀之意云如諸經但歎發心之德而未明心密今經直問如實知自心義故云心密也為言故疏第二云餘經廣歎沙羅樹王莖華果今此經中唯明此樹王種子生育因緣稱大日經王非為此乎云云但華嚴經文雖云求菩提未云如實知自心又雖云堅固猶未字不生際性故又下文云亦問異今直問矣又諸經中上求下化菩提心皆相貌句攝歟若已發生其性云何者經文但問發生未問已生性又依此釋可為二問歟或云性者躰也躰顯云生離躰何明生故問生即成性也故佛答文云其性常堅固知彼菩提生文此意矣或云或本生字也若爾非二問矣生字誤歟多本皆性字也如般若中廣明等者智論七十三云須菩提白佛言世尊以何等行何等類何等相貌知是阿毗菩薩佛告須菩提菩薩摩訶薩能知𭂫夫聲聞地辟支佛地是諸地如相中無二無別亦不念亦不分別入是如中聞是事冝遇無疑何以故是如中無一無二等故是菩薩亦不作無益語但利益相應語不視他人長短須菩提以是行類相貌知是阿鞞致菩薩摩訶薩云云七十三四兩卷中廣明撿可見之經願識心心勝者或云識七轉識次心第八質多心也後心第九識于栗多心也或云識字通二心也故下文云識心人中也文點識乃心心可讀歟或云識字唯屬初心而顯能證智義次但云心所證理也牒文作釋分明故私案是心自覺之智者心字釋經心自覺之智釋經識字也可讀識心故知二心字皆理也下識心人中者識者智心者理也但心自證心者初心依有戝名智歟唯是下二句釋生字佛既下二句解上句勝字唯願之一句釋下句字必能等三句出自然智之德也或境智俱妙句解勝字勝一字𭇥人法二義歟微相者微妙相貌義也指第二句也大勤勇者佛是精勤勇猛人故云佛之異名也即歎德也問有幾心次第等者大疏抄云住地及時節經幾次第言也文心諸相與時者大疏抄云即問其菩提心差別相及經幾時與得究竟淨菩提心也文此釋未祥今六十心百六十心相狀云心諸相超度彼地前三劫時分云時歟九種住心心續生地前故云相續勝進及相續下釋經時字也時無別躰依法而立故依第三句心續生明時也時分妄執雖異所到同初地故云而得究竟淨菩提心也故第二云舟車神通至到一處文初劫云淨菩提心少分增明第二劫云淨菩提心更作一轉開明等今望彼前二劫初地淨菩提心滿故云究竟歟或究竟字反可讀歟地前淨心皆是加行智分齊生死所殖善根歟功德聚者或云俱舍薄伽梵為功德聚自宗率都婆云功德聚俱是淨菩提心功德也大疏抄云即問此菩提心功德聚幾何文當以何行云何修行等者淨菩提心已前三密行云行晝夜四時精進修云修行也依此三密修行得初地淨菩提心云無上悉地也故下文云若不以三種祕密方便何以得此淨菩提心云云又上釋云此教諸菩薩真語為門自心發菩提云云又儀䡄云晝夜四時精進修現世證得歡喜地云云故知真言行者生死具縛行云及彼行修行也問所得既云無上悉地是可方便究竟第十二釋無上悉地云所謂如來一切智智當知諸成就中最為其上無與等無相比也文一切智智果是究竟故又得彼果之行豈非大悲万行故第三結釋云已淨菩提心竟從此已下明進修方便及悉地果生也文此意非云住心品明淨菩提心具緣品下根究竟義乎答今文是究竟淨菩提心故云無上非方便句也下釋住心品中雖粗明度三妄生淨心未示三密進修方便并依彼密行得淨菩提心悉地果故云爾也故具緣品疏釋云上品已約種種心相對辨一切智心竟然此妙果以何方便而能得至耶故此品次明入漫多羅行法文一切智心者淨菩提心也彼云此妙果又得彼果方便非生死行乎况入荼羅行法者下文末代我等弘通七日作壇等儀則也此寧非未斷惑薄地之行乎下文一切智智者又今一切智心也求一切智智之心故今一切智智者有戝立名矣當知望生死行而雖名妙果對根究竟還是因句也故上釋云此菩提心為後二句因若望生死善根則名為果云云前後釋義明鏡歟然或人進修方便悉地果生為根究竟句誤甚歟亦可分為二句也者般若寺抄云二句者以何行修行云何修而得無上悉地宮也文私案經文但云及彼行修行未舉所得果故知行躰與修行為二句也彼抄下釋或可分為十句云即第七句中有行修行二義以此可為分二也文此釋順今經文矣謂衆生異熟識心者前業所感異熟果心也法相宗第八識云真異熟識也唯識論云一謂異熟即第八識多異熟性故文殊異之心者行者轉勝心云殊異前諸心差別之相者謂於妄心中六十心等相別今淨心中從轉勝前後云殊異若爾心續生何別彼約續生義此取前後殊矣故三劫文答心續生并心殊異於能越淨心具此兩義故又答心相約所度百六十心差別相也或異熟識心約流轉此據還故云殊異歟所度妄心是衆生異熟識心等故能度淨心即行者殊異心故大疏抄釋經心心云初云心者衆生異熟心也次云心者瑜伽行者菩提心也云云牟尼者是寂默義者第十二云牟尼者寂默義也常寂之土微妙寂絶幽深玄遠不可以言之如是法界寂然大度法唯佛一人究竟清淨故名牟尼也文或可分為十句者第七句亦分為二句故成十句也先師云今此九句問三句中於因句成九句矣佛答三句中菩提心句一部經已畢或又修行句當根句無上悉地者究竟句歟疏十二云悉地是真言妙果為此果故而修因行故文入大悲藏荼羅等者具緣品中明入多羅之儀則是淨菩提心以前行故答修行句也問成就悉地品釋云從此以前真言之果從此品以後次第得修行入修之方便從此為首也文何答具緣品行得初地果地前行也悉地品下修行入證者大悲万行等歟故無違矣百字果等者經第六百字果品云若入大覺世尊大智灌頂地自見三三昧耶句文疏十八云殊異者謂如來三三昧耶之身文三三昧耶身云殊異未詳又經云復志求三𦴭三菩提句以知心無量故知身無量知身無量故知智無量知智無量故即知衆生無量知衆生無量故即知空無量文疏云求者樂欲次復樂求者還修菩薩道也文大師住心論中以心續生之相文證竪十種住心又以今文成撗塵數廣多準此釋疏第三句問十住心續生今第九句示塵數心殊異歟謂無量心識智智無邊等義自宗不共之談故云殊異歟又經云祕密主由心無量故得四種無量得已成最正覺具十智力降伏四魔以無所畏而師子吼文此文答功德句文歟十力四無畏佛不共功德故無量應度衆生者未來應度衆生也故上釋云時金剛手為令未來衆生具足方便無復餘疑故以偈問佛文問疏第三云此中大會即是法界荼羅所攝應度衆生文準此文非會座衆乎答六大無得故九界迷情即等流法身九世相入故未來衆生即今經聼衆歟况彼上文云為滿足彼諸未來世無量衆生為救護安樂故文略有七義故名大乘者抄云此與瑜伽雜集等或同或異教絶設不須和會也文理趣釋云大乘有七義一者法大二者人大三者勝解大四者意樂大五資糧大六者時大七者究竟大文嘉祥十二門論疏上云地持論中七義釋大言七種者一謂方等經菩薩藏此是教大所以前明教大者要根本由教然後方得發心修行二發心大謂發大道心三解行大至道種姓解行純熟名解行大四淨心大初地菩薩得無生忍其心清淨名淨心大五衆具大謂大福大智通為佛道資糧名為衆具大六時大謂三大阿僧祇劫修行七果大謂大菩提果文私案兩師釋同今疏七義歟但三四五七其名雖異其意是同第三信解者就十地立名云信解行地故彼解行約廽向得稱云道種姓故今疏意不立地前故解行攝於初地故無違矣第四金剛寶藏又初地故疏第二云從初地即入金剛寶藏故文此乃同初地菩薩文矣此金剛寶藏即自性淨心故云性大又云淨心大此淨心即菩薩意樂故云意樂大也第五妙乘者福智二嚴到佛菩提之所乘故云依止大此又為資糧故云衆具大又云資糧大也但地持瑜伽等七義皆所攝也枝末也今疏并理趣釋七義根本也能攝也故大師釋云能攝大乘者根本躰不二大乘所攝大乘者二重三十二大乘文即是不生而生等者住心論十云心續生之相諸佛大祕密者謂從初羝羊暗心漸次背暗向明求上之次第云云又疏第二釋八心等畢合今文矣準此等釋十心并十住心續生云心續生又云大祕密然不生而生義理事不二之談全非心續生之義又真俗相融是性宗以上盛談之何云大祕密乎又心續生義局第三句豈為九問乎或云疏家宗家各據一義矣又心續生文𭇥別二義故所謂不生而生義不𡱈第三句通菩提心生等故為况我今悉開示之敷演廣可亘九句一心應諦聼之勸觀寧局第三私案凡於十住心有二意謂淺略深祕又淺略中又有顯密顯於各各乘謂極果未知後住心淺略中密及深祕十心皆心續生次第也此十住心續生是不生而生生而不生續生故此等義顯乘隔聞故云大祕密也又性宗以上各於自乘雖談事理即一義未知十住心續生義故未名祕密矣又大師御意不生而生義雖廣今取十心續生不生而生邊故或又十心續生一宗大𮈣三密要樞故殊就第三句存并勸觀歟故二師無違矣今不生而生取水波譬下轉緣起十住心等續生上轉修行彼此豈相順矣又凡夫二乘云外道他緣以上皆屬密為知心續生者若爾何九種住心云不知人乎答水波譬隨冝寶鑰釋極無進密藏云水無自性遇風即波文故無違他緣乘又依圓不異門故雖似不生而生義性相終別故非理事不二義覺心以上雖真俗無得未知十種心續生故知𭂫夫二乘二義俱闕故疏舉偏論通示也或又疏約不生而生義他緣等屬密論約未知十住心續生云外也若依開會意外八心等皆不出字門故云祕密也故疏第二云如最初種子心生其實即是不生生以是堅固性故在衆生識心未至自心實際雖展轉滋長然亦不出阿字門故云心續生之相諸佛大祕密取意問若爾今宗談性相歷然義可無不生而生義何答今宗事理元各別不歸理而事本生而不生相本不生而生理又爾經云生住等諸法常恆如是生文可思之問若爾生常生乃至恆恐同外道常見歟答小乘云四相有實相宗云色心上假立性宗以上云一心緣起法今宗性佛性然四相故猶異一乘一心緣起四相何况同外道所計乎重意云𭂫心續生文大論有三意一者不生而生義今文是也九句答也二者十心相續義如第二卷釋三者十住心續生義如住心論矣後兩義第三句別答文也若不爾何云或後問先答耶𭂫夫二乘兩種外道者疏第十九云今此諸佛之祕一切外道所不能知然外道有二種一者世間種種外道二謂佛法內有諸外道也以雖入佛法中而未能知如來之祕密猶是邪見心行理外道故亦名外道也此法乃二種外道所不能知此佛法中外道即二乘中人也文準此文及第二釋常外道二乘也又準雜問答中於內分內內內外可通九種住心歟或云九種住心皆云凡夫又云外道釋尊自云我是𭂫夫又疏不了內證名為外道云云又世間三心云外道出世六心云二乘六心雖異大小二乘故又世間三心出世二心云外道內外外道故四箇大乘云二乘三乘一乘異故或云表製集中以諸顯教云聲聞小乘登壇學處以密教云菩薩大士灌頂法門以彼思此顯諸乘皆屬今小乘歟譬如空等者準前文空三義則經如空文𭇥二意謂無量顯無邊際義故同空無邊際義如字但被空讀之釋中加大字顯無邊際義也但不釋無量義其相顯故歟或小分相似文反顯法無量歟次譬如下取空畢竟淨邊喻心本寂無相義也若依此意如字及無相字讀之故知如空三字讀之猶如釋論中三平等本文三讀之但下合經不舉如空文約初且屬上句歟或又下文空譬釋家私加之不染已下經文但明法也若法譬合者從無始已下二句合譬中本初以來釋經本來二字也無有一法等二句合譬中四障不染與八風不動無有等六字讀之可合二文釋經不染汙并第二句也餘文可知耳為此寂光等者抄云寂謂心之實相本自不生永寂無相光者即此心相靈知不昧又寂是三昧光是大惠行者得除一切障三昧生大惠光明即能普照無量法性故曰寂光也文私云此目近詞故上本來寂無相等也故初釋為勝矣心佛現前等者即初地淨菩提心位也疏第二云然行者以何法入此門哉故經次云所謂空性空性即是自心等空性上文無量如空乃至正等覺顯現即喻此心也文準此文一道無為云正等覺歟又第三云以此中道正觀離有為無為界極無自性心生即是心佛顯現故云正等覺句文依此釋極無自性云心佛顯現矣今文又真言行者法明道云心佛顯現耳故知正等覺文𭇥顯密義又具表義矣然此信力等者今此信力者白淨信心非生死中信也即依供養行修行所得淨菩提心也此中供養有二種等者智證大師抄云下文明諸外供養未見內供之文其意如何和上答曰觀心之供此內供耳問若爾以一華令遍法界中供養諸佛凡如此皆外供之觀何以之為內供若金剛頂宗有內外供八供今此部中無其義耶答彼金剛頂宗有內外八供今此部中不有其檨者內法以為供養大旨者觀心供養也問觀心之義例於金剛頂尚通內外若約深祕釋一一皆廣法界之義今不疑之尚約胎藏無可指內供之者耶答今此中言內外者外香華為外供養若以運心加此華香為內供養所謂觀心之供養也文又經第五云供養有四種謂作禮合掌并及慈悲等世間與華香從手發生華奉諸救世者文疏十五云供養略有四種一是供養香華等及塗香等乃至飲食此是世間供養也以物獻也二者合掌謂禮敬也此是印也三慈悲四運心謂想香花滿法界運心已即用合掌也并慈悲三事皆運心也文私云此中初一云外世間事供故後三云內出世理供故下文當廣者指此等歟又供養法疏下云供養有三一者外供養謂香華飲食及燃燈莊嚴道場等也二行供養謂如奉行及禮拜持戒者等也三者理供養謂心住法躰無外攀緣也文私云三中行理為內歟又常五供理供事供云內外歟出具緣品等中私案供養行修行等二句答前第七問歟謂供養行修行如次答及彼行修行歟上一偈半答相貌下長行答心相續此文非答彼第七句何乎但釋家不屬則文分明故又與前文相違釋依供養行修行所得白淨信心即菩提心相貌故也或有言等者抄云此下十三行疏是形一類執禪者依本智性無作無修鏡本自明不拂不瑩即禪門絶無𭔃宗𭂫聖等法皆如夢幻都無所有本來空寂非今始無凡有所作皆是迷妄石頭牛頭皆示此理今所破者即其人也略抄一行本是禪師更入真言而舉禪門義破彼矣猶如龍樹交外道衆學彼宗而破耳無畏三藏禪要非點示點開之義妙樂釋云暗證之禪師燒勝定之手云云如以四種不生等者自他共無因四不生也礦中金性譬在纏菩提心雖復在因等二句真言行者以四不生觀在纏出纏心躰無增減猶如金性在礦出礦無增矣行人下合若不以等譬三密方便合利鑯灰水等合消融方便也今此三密行淨菩提心以前薄地行前云生死所殖善根是也具如先辨龍樹阿闍梨中道正觀等者中觀論云因緣所生法我即是空亦名為假名亦是中道義文準此文以從緣起故者因緣生義即俗諦也無生義成者即是空義即真諦也若爾何云中道乎答彼宗三諦各有中道今取無生義故真諦中歟今意以此無生中道正觀證今宗四不生義而禪門龜䨲無生為失歟汝謂等者指前執禪者歟又以緣起證三密方便若爾俗諦中又存歟所以生而不生故雖依四不生觀不生而生故用三密行寧同無相無行乎又如世人等者前明破禪門無相無行而用三密行自下對諸乘漸行顯自家頓證故上智論云如治人以種種方便消融礦石然後成金若神通者能使土木之類成金躰文又第二疏取世人仙人巧拙難易之譬又此意矣此等文明鏡也然抄中此文猶對執禪者云云恐不會文意矣妙性窮極者佛華法華以初地淨菩提心為極果故云爾歟下金寶者依密行所得菩提心也初心極果雖異得寶是一處故疏第二云舟車神通至到一處文但世人無祕密方便等者是二地上大悲方便也下云若以大悲万行是也意云顯乘人依一心行得至淨菩提心以此為極故更無根究竟行證故云不能得耳次淨菩提心下其有服食等合以大悲万行合服食之以神變加持業合住壽長遠等也此三句中究竟句也以今祕密方便大悲万行勿亂淨菩提心以前三密行矣不應已下一道極無以淨菩提心為究竟也世人為妙性窮極是也寶鑰釋第八心云一道無為之真理名初法明道於諸顯教是究竟理智法身望真言門是則初門取意又釋第九心云是心是因望前顯教極果於後祕心初心文問今此兩節釋解經何文乎答解二句文前對禪門釋供養等義後對諸乘述彼義也或又上釋供養行修行句故云祕密供養行門等下解從是初發心句故云不應保初心為極果也初心言故破以初心為極果耳我名我有者下云我我所是也謂我是躰用都無有名無實故云我名我有者我所我之家所有故云我有也經愚童𭂫夫者通三心句歟第二第三亦名愚童嬰童故又疏上文云愚童凡夫小有能信非第二等何有此理矣但證第一心者約執著我名等別句故以下答心相續義也者此意八心十心相續云心相續義也故上所牒之文但至離於斷常也住心論第一今文云善無畏三藏釋云從此已下十種住心佛答心相續之義也文此意十住心相續云心相續若爾兼三劫文與疏意異何云無畏釋云依之智證大師云或人立十住心判一代時教不合疏意不足為論文或云文點可讀十種住心中世間三心答心相續故疏論無違矣又義疏意非不存十住心義故第三劫終云此經從淺至深廣明心相皆為開示菩提心本末因緣若但依常途法相不得言諸佛大祕密我今悉開演也文既云從淺至深非十住心淺深乎又本末者九種云末第十云本若此經文局十心續生何在三劫終合彼文矣問三劫初釋云亦是答諸心相及心殊異也文今又云廣明諸心相全非心相續義就中除心續生之相句乎况十心三劫心相續次第中間何交六十心乎答已下言通三劫故三劫正雖答心相續兼答諸心相殊異故云亦是歟中間六十心雖非心續生兼顯所度妄心何𭁆又諸心相言亘㧾別故廣明心相者指心相續句歟故疏第三住心品結云已淨菩提心諸心相竟文或亦是答諸心相又心相續歟大祕密之稱非依心續生何云祕密乎智度云世間等者智論第三十一云無始空者世間若衆生若法皆無有始今生從前世因緣有前世復從前世有如是展轉無有衆生始法亦如是如經中佛語諸比丘衆生無有始無明覆愛所繫往來生死始不可得破如是無始法故名為無始空問曰無始是實不應破何以故若衆生及法有始者即墮邊見亦墮無因見遠離如是等過故應衆生及法無始今以無始空破是無始則還墮有始見答曰今已無始空破無始見又不墮有始見文經中佛言無明䨱愛所繫者智證大師記云和上釋訓云無明與䨱愛已上今疑若無明是能覆之物愛此所繫之物歟和上云可然也若爾無明尓覆波禮愛尓所繫禮天土訓之耶答無常也云云愚童義如前者抄云上疏云謂六道凡夫不知實諦因果乃至堅執不捨故以為名文𭂫夫者正譯等者異生正譯𭂫夫義歟梵名可尋決矣寶鑰上云𭂫夫作種種業感種種果身相万種而生故名異生文如十六知見等者住心論第一云大楞伽經百八部邪見瑜伽論十六計智度論十六知見文今依智論歟鈔云謂外道雖有九十五種大意莫過十六異論一因中有果宗二從緣顯了宗三去來實有宗四計我實有宗五諸法皆常宗六諸因宿作宗七自在等因宗八害為正法宗九邊無邊等宗十不死矯亂宗十一諸法無因宗十二七事斷宗十三因果皆空宗十四妄計最勝宗十五妄計清淨宗十六妄計吉祥宗略抄此十六知見異論十六別類外道宗計猶小乘二十部異計矣住心論三云外道有九十六種大外道九万三千眷屬外道為十六文智證記云和上云我我所執呼十六見是別別稱也可訓我我所執如十六知見等乃云云妄分別所由者唯識論等者妄分別是能遍計妄心是非所執我我所矣又準上文界趣同性我云妄執則我我所直妄分別歟如彼偈言等者此四句偈智論文也但彼論第三句無於字有則剩字可撿疏證本矣瑜伽我者等者智證大師記云瑜伽我者謂學定者云云此文何由似內道乎答凡此文者約學內教者不觀心之實法也文疏第七云若行人不解正因緣義而修證諸禪以當計著自心以為內我若深求此中至順自然撥除因業唯我性獨存乃至無一法入心而證空定最是世間究竟之理文今瑜伽我當此計歟問彼第三心之此證第一心何云同乎答此計有二意若約效彼行因成勝果第三心攝若依計自心為內我又第一心攝也故疏第二云前是不識因果之心今由善根熟故𭭉彼行因成勝果不同前計也取意此意也地等變化等者智證記云今疑下結文云略舉三十事爾乃合地等變化貟不足也疏文昧昧訓地等之變化若依疏及先大師可分為二若爾可言地等是執五大為真實之法者此計或言地為以下可言變化也意地等能變化為万物之因未詳云云疏第七云若行人不解正因緣義而修證諸禪必當計著自心以為內我彼見世間万法因心而有則謂由神我生設令不依內我必依外我即是自在梵天等也文準此釋瑜伽我者內我歟自在天是常等者三論玄云有外道云大自在天能生万物万物若還歸本天故云自在天若嗔四生皆苦自在若喜則六道咸樂然天非物因物非天果蓋是邪心所畫故名邪因邪果文如十二門中等者十二門論龍樹云問曰衆生從自在天生苦樂亦自在所生以不識樂因故與其苦答曰若衆生是自在天子者自下全同同論疏下云嘉祥云問曰下第二救正通傷慈之難答曰下第三破救有二難一者猶提提前無慈難文有大慈子不識恩終自與樂而自在不爾亦應但供養下作恩報不勉苦難若言不識恩故而苦者今報恩供養則應得樂不須修福文唯識論一云有執有一大自在天躰實遍常能生諸法彼執非理所以者何若法自生必非常故諸非常者必不遍故諸不遍者非真實故文又若自作等者論云全同疏下云復次下以果徵因破衆生之果既由自在自在之因應更有所從變覆結之文陶師子埏埴等者陶師子者作土器者也埏和名耶須埴和名波爾疏第七云如埿團輪繩陶師等和合故有瓶生文十二門論同之次云時與前時等者智證大師記云經云及時者與前有時其別如何答推文意云自在天者若流出及時也爾乃有人或計自在天是常能生万物或計從手功出一切法或計時是自在天之所作歟云云問若爾前建立可云自在天之心出一切法歟答今結云皆自在天種類也彼不爾故御本記云建治四年二月七日於醍醐寺中正院加點畢金剛佛子賴瑜
