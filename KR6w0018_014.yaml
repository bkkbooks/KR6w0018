body:
  text: 疏卷第二之七統論三劫始終等者且大師十住心者有多意或唯蘊無我為始極無自性為終上三劫文各存二意故疏云越世間三妄執出世間心生文出世間心論三劫故又云持齊為始極無為終故上文中一毫善為始下文中世間八心為一毫善故持齊為始又上文云若住此不思議解時是真阿羅漢乃至應受廣大供養文故極無為終也又云正唯蘊為始攝人天第十心為終也𮗚抄義私云始正如𮗚義終又有正極無為正祕密為上三劫中第三劫攝祕心初劫除世間心下六無畏舉世間心無祕密心故前後合論始終各有正耳或始可通第一心彼又有知過義故寶鑰云九種心藥文在石𮀑之中者𮀑薛峋云𬾃猛反銅鐵石祝尚丘云金玉未成器礦古猛反金璞金玉未成器云云私云礦字相通也金玉中今取玉邊為喻矣譬如收彼頑石置在家中者問譬中既無此意何合中示此義耶今文中譬合㸦顯圎世間三心也故有此句所謂合中是故諸善知識見衆生世間八心乃至遇便識之者第二持齊也諸佛菩薩亦爾私云對前譬云亦爾譬中雖無文有意故久已證知乃至𭤧便誘進令受三歸如前已分別譬如收彼頑石置在家中者第三嬰童心也受三歸戒是護戒故前譬中此心無文又譬中猶有如意寶在石礦之中乃至與瓦石無異者第一羊心也此文無合法故㸦顯圎三心耳次以三種三心等者有人云見修無學三道云三種此三道各有越三妄之心故云三種三心但云業煩惱者舉無學三心顯餘二三心也云云信證僧正義云第一僧內三種三妄執如次見修無學所斷也聲聞緣覺證𡧤然界三乘人各同三道斷彼三妄然聲聞空我故攝唯蘊無我緣覺與𡧤然界空法故攝業因種云云私云此意三乘云三種三道云三心歟𮗚抄云三乘心云三種三心三種即三心也又有義同第二義也私云第二義違住心淺𭰹見道三果是唯蘊心無學業心故第三義唯三乘心可云三種心後三字無用乎初義無難歟爾時生於佛家等者此文有二意或攝祕密或屬極無自性心合灰水使淨生於佛家合在幢雨寶之故即知極無唯在地前也地前地上是顯密界畔故故寶鑰釋顯密異云心外礦垢悉盡荼嚴漸開云云又云顯藥拂塵真言開庫文私云悉盡者依疏極淨文歟漸開又雨寶義也疏云從初地入金剛寶藏文若不開何入矣重意云入祕心迂回直往二機異今文明漸機入密若行者已下述頓機入祕也直從真言門直字此意矣所謂迂回直往雖巧度拙度不同俱入初地金剛寶藏故云獲寶無異路也意漸頓修行雖是顯密異路入初地時同得三密寶故無異路也為言後義意若行者已前文皆明顯乘行也巧度拙度相對分明故况復三劫各置次言蕳若生於佛家文更明真言初地何不置次言乎又結文以此因緣故堪受世間廣大供養也者又非釋世間宗奉常應供養文乎上疏文見歎極無德故即知今文成極無義理也但至合譬二重者於極無有斷惑證理二重無間解如次地前地上故然次生極無自性句雖通斷證惣句且斷惑邊合別譬也又大師釋者大顯密對辨時雖云拂外塵於顯中斷證異故非無得寶故寶鑰第九心云初心之佛其德不思議德始顯一心稍現文又第九心菩提心論德斯具妙用無窮文為證矣此等豈隨分非開寶乎然猶望三密寶時彼非真寶故云未開藏也又於初地位有表顯乘極位𭔃同祕密情故云雨藏一心三密雖異同初地位故上文云至到一處非所得寶是一也又舟車神通頓漸異故云巧拙難易然俱度五百由旬同路故云無異路非全得一寶也又𨗴僧都云獲寶無異路者謂是菩提心本末因緣故云爾如云汝等所行是菩薩道若依常途不得云此淺略大祕密文是以開會意云無異路海云彼諸乘各各有所至果殊故云無異非言一處也大師言所乘各異所謂亦異文以為證云云此從淺至𭰹乃至我今悉開演也者住心論第十云心續生之相諸佛大祕密我今悉開示者即是竪謂從初羊暗心漸次背暗向明求上之次第如是次第略有十種如上已文私云疏家以心續生之相文成三劫從淺至𭰹之義宗家以彼文證十住心續生次第故知影略牙顯歟又疏上文中以此文成八心等續生宗家以八心三劫文成十住心續生次第疏家宗家成一致非相違也故疏第一云已下心相續義也文大師住心論第一云善無畏三藏釋云從此已下十種住心佛心相續之義也文疏十心文釋十住心給可思之疏家意八心三劫中存十住心故俱以心續生文成義也或又疏中十心云續生論中十住心云心續生各據一義耳經信解行地𮗚察三心等者朝譽義云經心信解行地𮗚察三心等者正指八地已上云信解地出過一切聲聞等已下文八地上故但疏云此經宗理實淨菩提心已上十住地皆是信解行地也為證初地已上皆信解地華嚴經文經𮗚察三心者若通論則初地為因二地上云根八地上為究竟又一一地皆有三心依此義於八地上云𮗚察三心也建立十心等者若通論則十地相望論十心而一一地無邊智生又付一一地各有十心也心正八地上疏主以實義云初地上信解地也華嚴佛性等顯教成真言十地顯密雖別十地功德是同故云云教相抄私云此義心信解地者八地上故三心十心又短八地上心也疏言初地上者以實義長短三義作釋也為言覺心義同之證僧正義云今十住心者從麁至細從淺至𭰹本末合有十心前九種合為六無畏位第十中門十地惣為真言門十六重玄義橫竪統攝十二部則旋轉無盡是名諸如來次第證入大悲生三摩地菩提心論立三種行願者大悲勝義者𭰹般若於中有二義依教相著處空性旨直悟心性也三摩地者自心本有實德九種住心在勝義門次第情義祕密莊嚴是三摩地門實義又釋論五畨問次第淺𭰹道理炳然疏第二云如前所種子根疱等及歸依三寶為人天乘乃至又云空性即是自心等空性乃至影像不出常𡧤光故曰無相云云是天台常𡧤光境界是也又云行者得此心時乃至同會一處者亦彼宗意耳又云行者得如是微細惠時乃至故曰極無自性心生也云云是當華嚴法界緣起義又云真言門行菩薩等云云又云信解行地𮗚察三心等者真言也以續生分位配立諸宗疏家意趣顯然取意抄私云此意三劫十地是地前地上不同顯教密教差別耳寶生御房義云真言地前地上是異顯教也夫真言地前是竪義也地上是橫義也依十住心論者前九種住心皆是因皆是地前也第十即果即地上也竪論次第淺𭰹皆是真言地前行相也橫𮗚智智平等即地上行相也文般若僧正釋云問論文然今如上九種住心各第十住心亦有耶第九極無自性心文之次云復次祕密主信解行地𮗚察三心乃至此四分之一度於信解等云云文以下皆祕密莊嚴住心爾也云云私云三劫六無畏三劫九種心地前地上古來二義從顯入密人立地上義唯密學者成地前義䡄文二途大師釋左右也然以地前義為勝疏家宗家等釋多分此義故仁和醍醐高野賢皆以立地前義耳又大日宗顯密中委辨顯乘心故三劫六無畏九種心文分明也金剛頂宗曲明祕密心故五相十六生炳焉者歟二影略牙顯成一楑矣此經宗從淨菩提心已上等者抄第四云此宗從淨菩提等者即下文空無垢菩提心也言十住地者住謂依持地謂住生依持住生名為住地仁王云入理般若名為住住生德行名為地言信解中行者信謂忍可樂欲解謂了悟證逹各有淺𭰹淺即地前𭰹即地上此是地上行即地上行即進修故曰信解中行也略抄疏第三云此解行梵音阿毗目底謂明見此理心無疑如𮢶井已漸至泥雖未見水必知在近故名信解也文第十五云初信者謂隨分能淨諸根𭰹信如來祕藏決定不疑心信佛有如是如是𭤧便若依行者必成菩提此是地前信行也入地者謂初歡喜地也準望聲聞法中猶如見諦人也文或云信解行地者信十信解行三賢謂地前信解行攝地上唯立十地故云信解行地也亦名到修行地者疏第七云若到修行地授不思議果此修行地即是淨菩提心初法明門例如聲聞見諦已後復入修道位也此菩薩於百字明門中各見蓮華胎藏荼羅世界海文唯如來各究竟一切智地者問疏第一云如來信解遊神變等文又第四云諸如來從如來信解生文若爾何果位蕳信解名云究竟地耶依因信解願力得果德故果從因云如來信解也故知今文中正信解躰局十地上下文相從門名果故無過又十六玄門義云疏第二云十一地名信解地亦名到修行地文此釋信解有佛果也自然於十無盡界者六十華嚴第草四十地品云以十不可盡法而生是願為滿此願勤行精進何等為十一衆生界不可盡二世界不可盡三空不可盡四法界不可盡五𣵀槃不可盡六佛出世不可盡七諸佛智惠不可盡八心所緣不可盡九起智不可盡十世間轉法轉智轉不可盡若衆生界盡我願乃盡而衆生界實不可盡我諸願亦不可盡文生十大願等者抄第四云佛此菩薩住歡喜地如是大誓願如是大勇猛如是大作用以此十願門為首滿足百阿僧大願佛子此大願以十盡句而得成就乃至故我此大願善根無有窮盡文私云華嚴云不可盡今疏云十無盡界何抄云十盡句可尋決矣十願者華嚴玄記第十一云願是希求義今依𭩮攝論具列十名一供養願願供養勝緣福田師法主二受持願願受持妙勝正法三轉法輪願願於大集中轉未曾有法輪四修行願願如修行一切菩薩正行五成就願願成就此器世界衆生三乘善根六承事願願往諸佛土常見諸佛恆得敬事聼受正法七淨土願願清淨國土安立正法及能修行衆生八不離願願於一切生處恆不離諸菩薩得同意行九利益願願於一切時恆作利益衆生事無有空過十正覺願文私云文廣博故不之抄具載可披見問今此十大願因根句中何攝耶有多義云因句攝也初云得此空無垢菩提心時終結即是菩提心為因故知十願百等大願皆因句攝也𮗚義云根句攝也故次下文云從二地已去大悲行即是大願取意但上文無垢菩提心為因二地以上所修大願云大悲行也所以得菩提心時於十法界生大願故能所生義異何願為因乎今文中為顯因舉二地上願也結文此願即菩提心為因也為言此行增長至八地名𭤧便也私云依前義會下文者大悲行者大願為緣於十界生根彼根云大悲行也為言故知非大悲行即大願也故華嚴云菩薩住此歡喜地能成就如是大誓願文更立義云長短三句中長則初地攝故因句攝據短是根句攝也所以者何初地大願雖因攝二地上增修即成根也即大悲行也此根八地上增長云𭤧便也既云增修非蕳初地乎雖然於初地中心誓願異故短中根也又下文經云十大願已則得利益心等文彼疏云由先大願熏心故則得利益等十心為起行依文依此文十心既初地果相也十願初地根攝也故知短三心根句也若據長三心因句也彼疏起行者當今疏二地上行矣於十法界生根者抄第四云謂於前十無盡界中所修悲願能起後地𭤧便名之為根文意云於前十無盡界中所修大悲大願起八地上𭤧便二地上悲願為根也為言此釋前十大願為根句也問華嚴云菩薩住此歡喜地能成就如是大願文若爾何云二地上行耶經中云成就可初地位成就現在故疏中云生十願可二地行生在未來故又於十法界生根與前於十無盡界生大願文言既同義理豈異故知大願即根也又云依願起行何願即行乎所以於十法界或生願或生行故今云根也八地以上境界皆同等者抄第四云八地已上者謂後三地境界皆同以無相為境故言但𭤧便等者對治惑障有階差故佛性論云無相無功用道者即八地已上無相者即真如境乃至云言究竟者八地已上見境皆同更無別境所未見者故名究竟但𭤧便猶有淺𭰹耳文此釋心云於八地上無相無功用道有二意所證理無差別故云境界皆同是釋究竟義也又據能證智有斷障階差故云𭤧便階降即釋𭤧便義也例如清涼略云理無淺𭰹證有階降以無為法賢聖不同云云故知八地上理智云𭤧便究竟也問若爾初地乃至七地有智證理何不云𭤧便究竟乎細論有其義故云各有三心也然大分八地上無功用位故殊立此名七地前有功用位故又大師祕藏記云三句義即是真言行者用心也從凡位修行六度圎滿成佛故曰以𭤧便究竟成佛以後以大悲濟度衆生故曰𭤧便為究竟向上向下讀文有異文密嚴院云隨順菩薩𭤧便隨順衆生𭤧便云云私云心向上𭤧便以因行𭤧便成果位究竟故若長三句則七地前大悲行云𭤧便八地上可云究竟歟但今文八地上名𭤧便地者𭤧便所成地故從因云爾也又云成佛云究竟八九十三地𭤧便歟𭤧便之究竟向下𭤧便者濟生𭤧便即為究竟故𭤧便即究竟尊勝儀䡄云那大日即是法身人天智火即是應身己身住𭤧便即是化身故云𭤧便為究竟能作一切佛事是故自身為化身文諸佛利生𭤧便能現化身濟物為究竟也為言又準隨順衆生𭤧便者又𭤧便之究竟歟依主持業隨冝矣又疏第三云復次初入淨菩提心門見法明道如識種子歌羅羅時前七地以來為大悲行之所𭇥養如在胎藏無功用以去漸學如來𭤧便如嬰童已生習諸伎至如來一切智地如伎已成施干從政故名大悲胎藏生文私云八地已上無功用位學如來𭤧便如習伎云𭤧便至一切智地如伎已成云究竟歟若爾八地上𭤧便究竟雙明故云𭤧便究竟歟問若爾何下釋佛果云上上𭤧便耶疏第一云即行所成一切智智之果名𭤧便由內具𭤧便故𭤧便之業即是利他文果位由內具故云爾也問向上向下義依何文耶疏第一云𭤧便究竟者謂行圎極無可復增應物之權究竟能事即醍醐之妙果三密之原也文私云應物已下向下𭤧便已上文向上𭤧便也此文𭤧便究竟似𡱈果云行圎極無可復增故疏第三見支分生荼羅境界云謂初淨菩提心時見此荼羅已遍法界第二住又逾廣逾𭰹作十轉開明乃至第十一地而後所見圎極文既云第十一地所見圎極今行圎極義可𡱈果位歟或又準今疏八地上文者無功用位見荼羅境界有優劣故云行圎極歟若𮗚一一地亦自有三心等者釋𮗚察三心句初列名即是因根究竟心是也後若通論下配位於中有二初通門謂長三心配十地後別門短地地分三今文是也此中有二初釋惣標句後此無量下釋別句文初中二略示廣釋也廣釋中因緣者因句也因即緣例如親因名因緣矣𭤧便中淨治果相者向上𭤧便也治地是大悲行此行所成果相即究竟謂以𭤧便行成究竟果相故云向上也故疏第一云即彼行所成一切智智果名𭤧便文𭤧便業者向下𭤧便也故又第一云由內具𭤧便故𭤧便之業即是利他文餘皆準此者以初地三心準倣二地以上耳次釋別句中初釋根句有十心下釋究竟句中間無對無量等句通上下句惣句也於中二初釋建立十心後釋無邊智生初中有作釋證結成也此別釋中但有根究竟闕因句也又但短三心作釋顯長三心義也惣句既通別別句又可通長短故華嚴云十大願等者注華嚴第五十六第卅四録㐬注云佛子菩薩如是大願已由先大願熏心故則得利益等十心為起行依於後十行作自在然有二意一以十心通為十行之依隨釋易了二以十心別對十行以治十障文皆次第唯信行最初而不濁居未者以與釋文相接故也則得利益心利益苦即是悲心所依治害障能成悲行軟心與樂軟即是慈心治真恚𭜉強障隨順心隨順所求即是施心治於身命財生顧戀障𡧤靜心𡧤靜無求𭤧能求而無厭故是無疲厭心治希求報恩貪著利養不𡧤靜障調伏心三學調伏是知論心以詮於定論詮於惠於律復是調伏治無善巧求加行障有則調伏故𡧤心雖行世間妄惑不生故云𡧤是解世法心以治性不和不於他心隨順而轉不𡧤障謙下心高崇賢善拒𢙣不增故名謙下是慙愧心治於放逸之高舉障潤澤心能修出離以法潤澤即堅固莊嚴治於種種猛利無間無斷生死大苦生怯𭋘障不動心能如行故心不動即供養佛行治於大師所猶預疑惑障不濁心即第一信行信以心淨為性離不信濁故此治全未心全未受持菩薩學處障由治十障故名淨治地法地法通於教證此所治障具如瑜伽卅九文次又成就十種淨諸地法等者抄第四云次又成就十種淨治諸地法謂即能信如來本行所入乃至信成就果即信也菩薩乃至見諸衆生不免諸苦即生大悲此乃悲也是諸衆生我應救護令住畢竟佛道之樂慈也菩薩隨順如是大慈悲法於一切物無所貪惜學行大施喜捨也是菩薩以大悲心大施心救一切衆生心無疲懈即無有疲猒也菩薩生無疲倦功德於諸書能自開解即知諸論也由是功德善根能籌量應作不應作於上中下衆生隨冝利益即善解世法也由是功德則知時知量慚愧莊嚴修治自利利他之道功德即慚愧也如是功德精勤修行心不懈退是精進不退功德即得堪受力即堅固力也得堪受力已勤行供一切諸佛即是第一供諸佛也文復次住是地已善知諸地障等者抄第四云言復次住是等者謂此地菩薩已具十種淨諸地法更於諸佛菩薩善知識所咨受請問成就是地之法所謂善知諸地障者入初地時皆由𮗚解故知障有十障十地故知智有十治十障故立十地別善知成壞者欖行成位能集諸行即成相也解位無躰住自行故即壞相也善知地相果者謂𭤧便智𭘧相𮗚終故名相果善知地得修者謂得入時即根本智顯是證修非緣修故善知地法清淨者謂勝進位後得智信等淨地之法離障清淨故善知地地轉行者依前起後地背相捨故善知地地處非處者二執名非處二空為住處亦是相應不相應也善知地地殊勝智者以後勝前增長善巧名殊勝智善知地地不退轉者謂具𭤧便不退轉故善知淨治一切菩薩地乃至入如來地者能治障盡得解故等文更前三心作十心之等者覺心云更𭁡釋前𮗚察三心文也所謂前以三心通別義門攝華嚴衆多十心也今示開三心作十心以通別義攝華嚴十心也所以上既一章文悉釋畢重作此釋故云云朝譽義釋建立十心等文也云云具如先出矣私云疏家作釋尤可依何捨十心明文云依三心他文所謂文非無起盡中三心十心文各有惣標別釋信解行地𮗚察三心者三心惣也無量已下別也信解地無量無對不可思議者十心惣也建立十心下別也然建立十心等二句𭇥二意或三心中究竟句別釋也如疏文或十心中別句也𭇥疏意若如釋唯取三心別句者信解地無對等二句似無用歟所以三心首標信解行地外更云信解地等豈非十心標句乎故知建立十心等文𭇥多意故通二種十心也利益心等三心果相種子等十心云二種也但更三心等者前信解地三心釋之畢今更於三心之十地作十心之為言又雖一章文三心釋重於建立十心文釋別義何過若如所成者別句文不可有長義如何短三心釋故彼不許者此又不成乎問建立十心文疏釋分明何云釋彼文乎若於一文有三心十心二義者一假文悉可通釋歟所以以三心盡十地十地又如次種芽等十心義其理極成何必尋十心文句乎次後十心文八心假有之何為竒乎若又信解地標句為所由者三心釋可𡱈𮗚四攝法文下文十心文故文起盡彼此不相順如何一字攝多教文𭇥無邊義故或全文皆三心惣別兩釋也如疏釋或信解地以下又十心惣別也如更三心等釋也或上三心惣別下十心惣別三心中惣標具標三心別句唯明根顯餘二句也十心中惣歎德未云十心別指十心也故知惣別兩假影略牙顯而示義門多端畢又一文𭁡取其例是多謂如釋論能所平等門本文等而已所謂果中之果者私云有二意一前六心中結實既果也彼結實還為種更生無畏果上文云今此受用果心復成後心種子文故云果中果也二三句中八地上是果又十心中果故云果中杲也故今文云此二心於第八心中𭤧便轉開出之畢文意三心中𭤧便中開無畏等心故云爾也且如住初地時乃至推之可知者覺心云初一地時成就一切淨治法并知一切地果相是以悟初地智力悟後後地位也如此今地地具十心事例彼可知之也云云私云於此文有二點一云初如字𬒳知諸地相句讀之是釋初地十心義也𮑭此下二地上具十心之義例準也一云如字及更解二地讀之以上舉前短三心義也以十心下今十心義例準也然此宗從初地乃至自當證知也者朝譽義云顯教十地如華嚴今宗於十地㓛德有淺略𭰹祕二法淺略者謂華嚴所十地法門也𭰹祕者謂金剛頂所十六菩薩功德也菩薩若證入初地莫問顯密行必悟淺𭰹二法入證之後如實見佛界故華嚴淺略為十地法是教門故也若不逹如是密號等者若淺略者即因緣事相之十地次第可涉其品位若𭰹祕者事相十地之上即證顯十六菩薩功德也云云信證僧正云今釋位義有兩種義一顯教中有兩種義一從初地入證及從初住入證此兩行人隨其心解或離或即故有兩處分證不同二彼此相望十地為𭰹十住為淺何以故十住去佛尚遠須到十地𭤧乃近故依實從初地入名真分證華嚴十地𭇥此兩意又今經中多導十二地此取進果之位故不涉於十住品又一一地皆具十心都有百心百心滿時得成佛果例如金剛頂十六大生名具十六至亍第十六生得最正覺第二正顯今宗正義上來住地分證之義皆顯教行人或從初地或初住入此祕密所以處處文中所位義多教道淺略門今此教中初心乃至十地此生滿足之如實知自心名一切種智何用次第修行諸文中分別地位者對比顯教令行人知法相而實無時𭤧一切本不生空何論長短而論因果令除上𭞙義分別淺𭰹兩釋若惣論之攝於淺略其𭰹祕門在師只不可執文若偏執文因緣事相未是此宗𭰹祕之趣此中有擬儀外迹之趣意寶生御房義云於真言十地作淺𭰹二釋淺略十地行相如華嚴十地𭰹祕釋如金剛頂十六大菩薩生也若淺略十地依華嚴意釋有二一次第位位次第遷登位位時分厯位也二圎融十地功德皆法性緣起故諸位㓛德一一皆悉平等相入相即主伴無盡也如此雖云甚𭰹望真言此淺略行相當知真言𭰹祕十地是一一位皆當躰法然輪圎三密四身六大四涉入無得過剎塵謂之密十地也若不逹𭰹祕釋不知密號但依文則因緣事相往涉顯教義門有菩薩不可不慎趣意又十六玄義云疏第二十一地名信解地廣華嚴經釋信解相作淺略𭰹祕二釋淺略𭰹祕如華嚴經𭰹祕如金剛頂十六大菩薩生云云但以𭰹祕地位行相正為真言地位行相也云云覺心義云依華嚴十地名言作淺略𭰹祕釋之次合自宗金剛頂十六大菩薩生淺略𭰹祕意令準知也云云私云古德異義不同或今真言十地有淺𭰹二釋淺如華嚴十地𭰹如金剛十六也或顯中淺𭰹釋也住地淺𭰹位故又密中淺𭰹也迂回直往二機故或今信解地淺𭰹二釋如華嚴經𭰹祕如金剛頂也或先舉華嚴淺𭰹二釋合金剛頂淺𭰹兩釋也云云私更解云今此文通伏難也上來華嚴十地衆多十心釋今十地恐顯密雜亂歟仍為彼難云然此宗從初地入金剛寶藏等依無畏口傳華嚴名言須作淺𭰹二釋其中以彼經𭰹祕義同今而作釋也若不逹如是密義但依彼淺略文今經𭰹祕義則今菩提心本末因緣事相往涉於華嚴十住品矣若解金剛頂大生今經𭰹祕義自當證知也為言問金剛寶藏者菩提心實相歟如何覺心云以根究竟可云金剛寶藏也謂此宗言蕳餘也然自心實相法門顯密大同也初地證不生理亦顯故密自心實相非青非黃等遮情義非表德道理故云云寶生房云金剛寶藏者本有無垢金剛一乘祕密𭦟荼羅也云云私云菩提心實相云金剛寶藏也故疏第一云云祕密主云何菩提謂如實知自心即是開示如來㓛德寶所也文又云云何即知菩提心生越百六十相續心即是淨菩提心行者最初開金剛寶藏時見此心性取意此文分明不可異求矣但至初地同類者於初地菩提心有情表德此中情義似同顯乘寂絶離極果故云爾理實彼異顯極理四種言語不及故云絶離密情以如義遣破執故文言雖同義理全別何况菩提心表德實義乎故云初地入寶藏也問以十六大生攝十地盡如何或云十地攝十六生也故儀䡄云現世證得歡喜地後十六生成正覺文或云金薩地前也故不空心要云雖證薩正位而見惑未除文既云見惑未除定知地前也又菩提心論云若見者即名見真勝義諦若常見者即入菩薩初地文既異初地常見云見者地前金薩智分也私云金薩通地前初地二位也真言行者菩提心相似真證皆金薩故但儀䡄文真證也心要加行等𮗚心也證者得義也正位者正定也金薩通地前地上故三賢正定位金薩見惑未斷也為言禪要云乃至滿三千大千世界乃至即便證得解一切三昧得此三昧者名為地前三賢文若金薩地上者此等地前智分攝何菩薩乎又非本有修生智惠故唯云地前初地金薩䡄文分明故菩提心論文今義潤色也金薩通二位故有常見異也問以十六生相配十地𭤧如何依金剛三昧十六長配十地具如即身義抄又仁王𨹔羅尼祕釋不空云於瑜伽教中成普賢行十六行如聲聞見道中十六行也文此釋意於初地位具存十六菩薩準見道十六心故準知二地已上各具十六德也演密抄第四云又此十六大菩薩生若一一從菩薩時有其十六行者未度此時未得成佛若能一生度此即是一生成佛都名一生則無十六之異故云十六大菩薩生也又此十六大菩薩皆從普賢薩心生故下十五菩薩出生大意同此已上義當𭰹祕之釋文或云初釋十六大生一生中漸次證也後釋一一地中各各證十六功德也云云經云我一切諸有所等者或云我一切中所行果𭜧依十地三心修行得之云意也或云我一切者釋家云如上一切智地無盡莊嚴境界是也諸有所者釋家及餘修多羅佛所稱歡等文是也云云如上一切智地無盡莊嚴境界者𮗚抄云有云上明菩提心為因示一切智地是云如上等也或云如上一切智地無盡莊嚴境界者佛瑞相所現種種未曾有事是也金剛手見此一切智地外迹問其宗本一切智智指彼云我一切也餘者摩訶般若等所明六度等也是故餘如是廣歎等者覺義云顯及金剛頂等也雖真言具不三句者可攝枝末餘大日名根本王又釋今此中唯明此樹王種子等故故又顯經等中得王名是相形不定故密復如此㸦為主伴故云云義云今餘又但是顯疏前後文皆指顯云餘教故今種子生育因緣者因根究竟三句也然金剛頂中亦三句故又義顯密相待時顯云荎兩部相對時金果故云華果胎因故云種子故金剛頂部攝餘中何失云云私一義云唯於密經相對金剛頂部云餘也其故我一切諸有所文此餘皆見大日故疏釋意今一切智地果并金剛頂所歎行果無不依今菩提心也為言若餘是顯何與彼俱舉今一切智地乎若此行果唯云顯行果者從密因生顯果乎猶如栴檀種子生伊蘭果矣又果復成種之釋故故知今經及金剛頂行果皆依今因也為言理實二皆雖因行果今密中專菩提為因為宗故顯彼德也故住心品結文云已淨菩提心諸心相竟文可思之是故智者當思惟一切智信解地者朝譽云從此已下八地已上之益也故疏云復舉益𭄿修此中一切智信解地者一切智與信解地二地也故疏上云十住地皆是信解中行唯如來名究竟一切智地文謂一切智者是佛地信解地者是八九十地也云云私云今此文雖有依主相二義俱信解通十地也復越一劫住此地者抄第四云地者即指一切智地也下疏云就前三句中更開佛地為上上𭤧便心至此心時名度信解由前劫信解行地復越一劫住佛地此言一劫非更一阿僧劫時分但越佛地一障便名一劫為此宗以妄執為一阿僧劫故前疏云若一生度此三妄執則一生成佛何論時分前言三劫不四者合佛地一障在十地故又解言復越一劫者即是越此第三一劫佛地故曰復越一劫文私云初釋意一劫者佛地一障也此地者佛地也意依初入此八地上信解地之功力復度微細妄執而住一切智地也理實四妄也後解意一劫者第三極細妄執也此地如前意入八九十信解地度第三極細妄執住佛地也為言三四妄義雖異俱佛地云此地而二劫置地上也二義俱不明三劫地前所度也云八地上乎又信解名通十地八地上何云初入耶况復初義四妄義疏起盡安在乎故今文云名度三大阿僧祇劫也文如何三劫地前地上如先成矣所以祕藏記文分明上慈𫞕儀䡄云若一生中從初念誦至於越三無數劫行即證一生補處三莾地越一百六十心三度即是度三遏僧祇行文又四妄文是經中此四分之一度於信解文大師祕藏記分明也又疏第三云乃至為一生補處菩薩擇去心中無明父母極細之垢亦名治地文等覺因滿菩薩所斷無明父母惑豈非第四妄乎又同卷云如來已度此微細論進趣都息故名超越心地也文佛地所斷微細論非果位所斷微細妄執乎又初入者極細妄執入八地上信解地初斷故云初入也又度三者抄云前言三劫不四者合佛地一障在十地故文準知今文又爾也私云有二意此地者初地一劫者第三極細妄執也回向滿心無間道斷極細故云復越一劫初地入心解道入信解地故云住此地也文一切智信解地者一切智之信解地依主立名指此云此地也故次下舉一道極無第三劫意云解一切業煩惱等全同前第三劫文故此意今文在十地後故恐有人佛地障故重作此釋成極細旨也又義一劫者微細妄執此地者惣通十地也意於第三劫開第四妄執為真言十地所斷障至第十一地時斷彼妄執盡名一切智地也是小機漸證也若據大機頓證者初地菩提心位頓證十六大生故心位一念頓斷四妄速得十一地功德故先釋第三劫云越諸論依此相續生云云疏釋云業壽種除復有佛樹芽生文其次三心等釋十地行畢云復越一劫等復字起盡文鉤今文佛地斷證也但初入信解者上此一切智信解地者顯一切智即信解地故佛果信解云初入歟度三僧者微細是雖第四合門時第三欇故今第四云第三也但行者已下文明十地菩薩舉益佛杲益也𭄿修微細對治行相也義時因便又明地前三劫舉益生極無也𭄿修諸佛𭄿喻也又義第三劫八地上故為顯從極無因滿至佛果故作此釋歟此義違上上𭤧便文歟若一道極無為相生起因可云上𭤧便如何然大師祕記中地上三劫義又云上上𭤧便故無違歟又義是故乃至信解地者惣標復越乃至信解者別釋也此中復越一劫住此地者釋上信解地故疏云即是初入信解地文所謂一劫者第三妄執也此地者信解地初入初地時正斷極細故云一劫入此地則三妄皆已盡故疏云度三劫也次此四分之一度於信解者釋上一切智也故疏云名究竟一切智地文此意可讀一切智與信解地也若唯立三妄意十地無惑故疏云更開佛地為上上𭤧便心不云斷惑故或開第四妄執十地及佛地斷故祕記中立四妄執也但祕記云越三妄執十地究竟故復越一劫應是因滿微細唯佛果斷云斷微細妄執至佛果故之故或又越一劫入初地斷微細得佛果舉初後顯中間諸位斷證也若斷第四妄執云復越一劫者行者初𮗚空性乃至二乘地也文何次耶故知彼欲斷極細智品令知有一道極無二心故疏家作此釋也前諸義中此義疏文歟文永二年七月十二日始安立之行者初𮗚空性時等者疏第六云云八地菩薩三昧道不得一切諸法離於有生知一切如幻是故稱𮗚自在者如已十地道若次第而進當佛地若漸下者當第九地何故八地耶以一切菩薩初度第七地時上不見諸佛可求下不見衆生可度謂住大𣵀槃於行休息爾時十𭤧佛以此三昧道起其心得度菩提心難地是故別從此進入九地中無別從此過患難故不須別行處也從初意以來𭰹𮗚十緣生句入此地時得度性空彼岸故云不得一切諸法離於有生復以善巧𭤧便於如如不動中起十緣生無邊大用以如幻三昧遍至十𭤧佛剎親近種種善知識普學無量度人門隨諸衆生應以何等像類言音而得度者即皆現之而為法是故世間見如是事迹故號為𮗚世自在者是初入蓮華三昧之異名也文鈔第六云至第八地住於法愛貪著𡧤爾時十𭤧諸佛以七事𭄿從此起離之心得度菩提心難處故瓔珞云一切菩薩初度第七地時上不見諸佛可求下不見衆生可度為是住大𣵀槃於行休息爾時十𭤧諸佛以𮗚自在三昧道起其心得度菩提心難處文或云下八地驚覺與今第三劫文是文義全同故知第三劫八地已上也云云又瑜伽攝論等顯論中皆三賢為初劫初地乃至七地為第二劫八地已上為第三劫起信釋論等亦爾準知今疏又可爾乎私云疏家前後釋皆以第三劫為初地宗家以一道極無𭔃齊初地先成畢但至下文者教道門以地前第三劫𭔃同八地上也例如彼顯乘云初二三地相同𠀍間四五六地𭔃同羅漢等若據實證門第三劫二心回入真言初地故三劫地前也故疏第六次下云又如上所一生補處及八地三昧是教道法門作此耳然祕密乘人於世諦中即能通逹第一義諦者從初心時即具行大空三昧其謂不然者則於一生中不能頓滿諸地也文况復今釋雖似同第六卷釋進退義實異若住此位在八地何云退不墮二乘地若退第八地則應七地等之故又不可云不進得上菩薩地當位既菩薩地故故知一道心在地前出過二乘地故極無心即初地故云不進上菩薩地也第三云上菩薩地即此意也住心論望前二劫他緣一道望後二心根究竟之注釋𭰹𭑕此旨耳但顯乘中八地上為第三劫者顯密意異也何一同乎故真言問云八地沈空一道心蒙佛驚而轉生地上極無心然後入真言初地也又義云八地三昧道者顯教八地已上也意八地已上境界皆同故是即以顯教極位同真言初門也大師處處釋此意歟故檜尾口決云不見於身心者梵云阿莎波那伽三昧也住此三昧言住𡧤平等究竟真實智也是準顯教當八地已上何故者住如幻三昧是第八地也亦文言想身證十地故是第十地也然今八地已上行相同故今言八地已上耳文又宗私記云阿莎顯耶伽者是顯教八地以上住如幻三昧文兩口決既以八地如幻三昧云顯教顯八地已上彼宗皆為第三劫為八地上也非密八地已上也彼即真言初門故疏第六次下文云復次此中應初法明門三昧道於上品中已故不重言文初法明門者初地淨菩提心也上品已者住心品也上顯八地三昧乎下指密初法明門以顯極位同密初門也又五相𮗚意前住無相𮗚思惟諸法空是故得𮗚空一邊未見自心相今依徹心明力故知心如月輪也故大師第九心云雖入此宮初佛五相成身可追尋文問今文配二心𭤧如何行者初𮗚空性乃至亦名無記心者第八住心也然以菩提心乃至真離二乘地也者第九住心也問今此沈空位第二劫終覺心不生心也彼宗專談空理故依之疏第三明三種幻中三者以心𭰹著心實際中欲離有為無為界故𮗚十緣生句即不思議之幻也文既沈實際位為第三劫不思議幻所治豈非第二劫耶又口決中儀䡄不見於身心住𡧤平等究竟真實智名住八地上如幻三昧是指三乘第十地究竟佛所證也取意又寶鑰中菩提心論心躰自如不見身心住於𡧤平等究竟真實之智而證覺心乘既論䡄二文全同口決既指彼云八地如幻三昧非同大耶疏下沒心實際為第三劫所治宗家論䡄文為第七心或云三乘是知第二劫終第七住心也爾者如何住心實際位第三劫一道心也所以所謂空性無相無境界是第三劫文故經疏施設炳焉大師又以此文證第八心故今文又為顯度極細妄執有二心作此釋故但至下卷文者不思議幻是於第三劫內八九相望為能所治而作此釋歟例如於初劫內即薀即空相對為能所治耳故知第三重幻為令知第三劫中二心異以沒心實際一道心為不思議幻極無所治也故疏第三云如極無自性心攝華嚴種種不思議事文又口決釋彼下釋云今是定志三乘究竟位佛未知自心開一乘極究竟位成佛故教汝所證一道清淨更知自心理佛果極位也文心云三乘究竟佛不知實已開天台一道清淨理故驚覺也為言又云三乘者小乘三乘一乘云三乘顯一乘極位故云爾一乘者金剛一乘也意云三乘極位一道清淨未知自心當開祕密一乘成佛故為言菩提心論文於一文𭇥多義故且證第七歟又第九所乃至言𭇥彼文故通第九心歟遍滿記中以彼文證通逹心矣况復大師祕密釋云覺心不生人無自性故起一道如實心一道如實人蒙諸佛驚覺故極無自性心文此文但驚覺第八而不云驚覺第七故問抄第四釋轉生極無自性心云前劫無緣乘心以六種譬喻作唯識𮗚了知三性雜染等法皆無自性雖作此𮗚未得稱極今以十緣生句𮗚自心畢竟空性我之與薀法及無緣皆同一性所謂無性名極無自性此空智生名極無自性心也文此釋又住心實際位指第二劫見疏第三文又如成者第二即心幻既初劫心沒法中為所治不思議幻豈違彼乎覺𮏑師不知十住心續生故第三劫為極無一心第二劫唯他緣一重故作此釋也恐不合疏意二三劫各存二心疏起盡分明故第三劫中所謂空性下成心之實際義合今文初𮗚空性時皆入心之實際云云又皆入實際同皆入阿字義劫云漸入阿字義耶又即心幻二劫相望即空不思議於一劫內二心相望顯義門多端矣故知第三劫內一道極無淺𭰹疏起盡明鏡者歟問設許二心一道極無淺𭰹又不共許歟依之疏第三云又此宗橫統一切佛教如唯薀無我出世間心住於薀中即攝諸部中小乘三藏如𮗚蘊阿賴耶覺自心本不生即攝諸八識三性三無性義如極無自性心十緣生句即攝華嚴般若種種不思議境界皆其中如如實知自心名一切種智則佛性一乘如來祕藏皆入其中文此文既極無後置如實知自心佛華法華次第何云天台華嚴淺𭰹乎故智證今指歸出此文畢云或立十住心判一代教未合此文不足為論耳文又安然教時義云如實知自心之文釋以為從此復有十重𭰹行阿闍梨亦攝佛性一乘如來祕藏此中佛性即𣵀槃一乘即法華祕藏即真言教而海和尚以上如實知自心等文下所謂空性等文為天台宗於顯教是究竟於真言此初門而安華嚴教之下云云此難意如實知自心文攝天台真言二宗既同教何以天台安華嚴下耶教時義又云中所謂空性乃至極無自性之文及十緣生句義釋以為生極無自性心入荼羅海會一種阿闍梨亦攝華嚴般若種種不思議境界此中華嚴是華嚴宗般若是三論宗而海和上以所謂空性等文為天台宗以極無自性一句為華嚴宗云云此難意覺心不生阿闍梨後但立極無自性阿闍梨此中更不云有一道無為阿闍梨又極無自性句攝三論華嚴何大師偏為華嚴乎為言爾者如何朝譽云極無自性者談圎融相即而未見法自性立其名也若爾偏可華嚴何亦三論乎但華嚴般若等者指彼二所圎融義云不思議也謂華嚴一部皆圎融為宗離世間品等所是也般若又仁王中現五不思議神反等云云是皆華嚴一宗所明故又如實知自心句中攝法華𣵀槃文此中佛性言何非法華乎故智證指歸云或曰佛性指大𣵀槃一乘指法華如來祕藏即持明藏真言教者此亦一見矣今以為佛性一乘不合破為兩句下句亦不然并乖文意也法華明佛性一乘旨故合為一句如來祕藏為𣵀槃教最佛性一乘之一句只指法華寂宗旨也今佛性開為𣵀槃云非法華勞分一句成義有何由緒乎次如來祕藏文非示真言教其所以今明此中攝入余諸教豈更顯以真言攝此乎故知祕藏是𣵀槃也今攝法華𣵀槃者即顯天台宗義耳云云實云然義釋意隨義理冝前後而非淺𭰹之次第也彼佛性為𣵀槃如來祕藏為真言此義不然佛性一乘是法華故如來祕藏非真言故故智證云法華𣵀槃同明佛性一乘旨故惣為一句如來祕藏為𣵀槃教云云此橫統諸佛教者是明此攝餘顯教非此密教攝真言故云云進上人云智證大師言或云法華𣵀槃大日等攝如實句佛性指𣵀槃一乘指法華如來祕藏即持明藏真言教者此亦一見矣今以為佛性一乘不可讀為兩句教次第可亂故也法華與𣵀槃同明佛性一乘故合一句如來祕藏為真言或立十住心判一代教未合此疏不足為論耳云云此或云言當安公所立佛性一乘不可為兩句教次第可亂故云云而此一假義釋文非必教次第諸部小乘在前華嚴般若在後故如來祕藏為真言者如實句攝大日等能攝所攝是一也此又難指南又云或立十住心判一代教未合此疏不足為論耳者以不次之文以為定判云云又破安然釋云祕藏即真言教者今此橫統一切佛教之中如實句攝佛性一乘如來祕藏而佛性一乘如來祕藏皆法華𣵀槃所法門𣵀槃祕藏之藏所謂𭤧等典法華一切如來祕要之藏等也祕藏即真言教者如實一句即初心何攝真言因果云云私案三人釋義未詳範并譽依憑智證釋佛性一乘為法華如來祕藏為實云云進智證如來祕藏為真言而破之取智證釋大相違矣又進述自義以法華異二文如來祕藏亦存兩矣諸釋義雖異以能攝四句為真言是同也今謂佛性一乘是𣵀槃彼常住佛性之理故法華亦雖不彼旨正順𣵀槃也如來祕藏即法華也彼此法華諸佛如來祕密之藏一乘行品之故𣵀槃亦雖同有祕密之藏言廣通𭤧等獨非指𣵀槃寧如此法華如來祕藏之明文指掌乎應知法華𣵀槃同味教故同為如實句攝而為天台宗耳但以能攝句為今其理可然矣四句俱能攝為真言教以真言攝諸故今橫攝諸教故顯為所攝密為能攝三教對辨義故未必其次第列淺𭰹例如二教論顯密相對時四箇大乘非淺𭰹次第矣若竪論十住心時有淺𭰹故八心三劫文即存其旨故大師釋云心續生之相者即是竪云云寶鑰住心論依此義橫竪是一雙法門故疏中既存心相續之竪義然智證大師但守橫攝之文而破住心之義恐可謂不合疏意不足為論歟又實範上人云今云一阿闍梨開為二心準第二劫其理應知第二劫經云觀察蘊阿賴耶義者他緣亦覺自心本不生等者覺心故疏隨云楞伽解密八識三性三無性皆是此意云云此他法相義證他緣即法相也又云此中無為生死因緣生壞義如勝髣寶性佛性論中廣明云云此他教三論義成覺心即三論也故二宗證無相也自既一劫一阿闍梨開為二宗何嫌開二心乎疏第二劫為三論故此般若非顯性宗但欲明法界緣起道理也故義釋云如極無自性心十緣生句即攝華嚴般若種種不思議境界皆入其中云云釋意緣生故無自性無自性即空性空無性而緣起此妙道理非凡小境名不思議華嚴法界緣起極無自性般若諸法界空而能緣起故二攝於此妙道理歟能攝所攝其理同故故智證云華嚴般若種種諸部皆攝自性緣生句中第一義空故今案疏意不論時先後只取義理之淺𭰹以類集之與般若同云云注此意又疏般𠰥之言非三論也彼難之非見者知耳云云又進聖人云極無自性及十緣生句攝二者非為成華嚴三論二宗華嚴有十不思議所謂諸佛剎土不思議諸佛淨願不思議諸佛種性不思議諸佛出世不思議法身不思議謂佛音聲不可思議諸佛智惠不可思議諸佛神力自在不可思議諸佛無得不可思議諸佛解不可思議般若有五不可思議所謂時佛為王現五不思議神變云云二同不思議之境界故是圎融無得法門也三論非圎融之談何極無自性句攝之依之極無自性句唯攝華嚴一宗也云云私云此十及五不思議雖似順種種不思議文倩案非疏本意歟所以者何今十種不思議未必明一多即入之義此外又後事舉一切善根不思議一切願不可思議等十種不思議此又同之也况彼中一多即入之文未必云不思議仁王中雖一多無得但云神變不思議未顯即入之因何為彼宗圎融之義矣故法藏五教章中華嚴一多無得之文畢釋云此等並是實義非變化成此是如理智中如量境也其餘變化等皆不入此例何以故此並是法性實德法爾如是也非諸分別情謂境界但可去情思之云云今此釋云其餘變化等非仁王等神變不思議乎况疏前後云般若皆大品也今何別指仁王乎故知華嚴者指上極無自性句般若者出上十緣生句也上既標二義下出二非顯兩所明矣若如成者下二但局極無自性句不攝十緣生句乎應知種種不思議言通上二句二也謂諸法無性故一多即入事理相通此等皆正躰智中俗緣境界而非分別情謂境界故今云不思議本宗三乘教神變不思議義故未云必不思議歟故疏第三云空則畢竟不生所則𥁞其性相中則舉躰皆常以三法無定等故亦為不思議幻文此華嚴不思議也般若不思議者十緣生句也故疏第三云摩訶般若中十喻亦𭇥二意此中𭰹修觀察者即是意明第三重文又釋第三重云即不思議之幻也文故知指大品所十喻云般若不思議境也三論十喻等不思議非一故云種種不思議也委論極無自性又第三重十緣生句攝也所謂於初地淨菩提心位有八九十三箇住心俱作十緣生𮗚其中今所真言行者所用也故疏下云毗那以此十緣生句不思議法界作無盡莊嚴藏文般若所十喻是一道極無所用也其中今記極無邊故云攝般若不思議境界也範上人依智證釋雖依大品但惣云諸法皆空未云十喻恐諸師意似不合疏意十緣生句不思議法界之明文不可異求耳又義華嚴般若者華嚴即般若非指別也故天台釋籤第十云言二者謂般若法華以般若亦得名華嚴故法華佛慧不異彼故文既云般若名華嚴今又華嚴名般若故無違何煩穿𮢶矣問演密抄第四云言佛性一乘等者異勝如來藏等也問今第三義已該圎宗第四云如實知自心別收祕藏是華嚴般若劣於如來祕藏耶此乃宗是同但顯密為異前教相圎極攝諸了義後威咒驗屬以祕宗復何疑哉文此釋如何此師未知住心淺𭰹又不合疏意歟證僧正云文第三劫內分別始終二文其二心淺𭰹與真言佛懸成佛因初心今秋果先還如成來秋種子然信解初心從第三劫終極無自性中生祕密莊嚴初因猶如當春種子成當秋果實三心同攝菩提心句而不壞次第淺𭰹之義高祖獨逹餘師皆迷惑文諸佛同時現前而𭄿喻之者抄第四云十𭤧諸佛皆悉現前申其七𭄿依華嚴明七𭄿者一者應趣果德𭄿二愍念衆生𭄿三令憶本誓𭄿四界同二乘𭄿五指事令成𭄿六勿生上足𭄿七悉應通逹𭄿略抄就前三句義中等者朝譽云前釋八地已上之因位相畢故次釋佛地也前三句中因門為下品根門為中品𭤧便心為上品此𭤧便中更開佛地為上上品也至此上上品之第四心時名究竟一切智佛地故曰此四分之一度於信解謂超第十地信解位佛地故云度於信解耳文祕藏記云越三妄執越三僧劫即是十地究竟也過此修上上𭤧便斷微細妄執至佛杲故曰此四分之一度於信解文私云疏因根究竟淨心開上上故云四分之一記據三妄染心開微細妄執故云四分之一斯則四妄執義也度於信解者或如來信解果位斷彼故云度于信解仁也或信解局因故屬妄執故云度於信解也故知疏記影略牙顯二義同𬾨矣或又四分之一者疏記同淨心也故記云過此修上上𭤧便斷微細妄執者顯佛地斷障義未必釋四分之一文也或云但於𭤧便心開四品也謂八地為下九地為中十地為上開佛地為上上品也文永三年七月十四日于高野山丈六堂傳法院談義之次記之畢金剛佛子賴生年卌一
