body:
  text: 䟽卷第一之四前明諸執金剛一向是如來智者謂諸執金剛雖通慈悲等從多分云一向智歟又弟一重心數尊中雖有定及慈悲等智相應云智歟或云諸執金剛或一向智或一向慈等而異菩薩各相故但智者舉一顯餘歟今此菩薩等者䟽下釋云諸菩薩在悲智之間故上求下化故為第二文意云悲者化他故云下化即第三重釋迦等也智者自行故云上求即第一重執金剛也各舉一顕一矣然第二重諸菩薩在於悲智中上求下化故云又慈悲等也又四大菩薩中文殊是惠除障是定故云義定惠勒即慈普賢是悲抄普賢云行故行即大悲故云又慈悲也又四菩薩各各慈悲定惠故云義等也所謂慈氏是悲之慈故云謂佛四无量心等也文殊又定之惠故云即是具眾德義也餘菩薩又尒也故別受名結文隨應可得若依初義者菩薩名云別名也謂標諸執金剛今此菩薩成此結故意云前諸執金剛持智故云執金剛今菩薩定惠慈悲故受菩薩別名也為言問通別一双然金剛菩薩內大眷属通名依何云別耶荅於自雖通金剛菩薩相對猶得別稱也或又下卷金剛菩薩俱名大心眾望彼云別歟又依次義者普賢慈氏等云別名歟意云四菩薩云慈氏云妙惠等名異一向智故得定惠等別名也為言後義未必為別名囙故又中義非理執金剛有十九別名故故初義為勝矣亦是毘那內證㓛德者且內證外用重重或四重壇從內向外而分內外也或四重各有內外本地四重云內加持四重云外謂從法門身現羯磨身故當知諸菩薩法門等者所現加持身羯磨形也下云善知識身是也法門者能現內證法門身下云法界門上云定惠慈悲是也故此定惠等云內證㓛德也今文意云謂如執金剛內證對十智力有十佛𠛴今菩薩內證法門對十智力有十佛𠛴也為言故上釋云如來智无量且以十智力以表眾會數云云又義如執金剛法門羯磨相對有十佛𠛴今菩薩法門羯磨相對有十佛𠛴也為言又准執金剛加持身有十佛𠛴當知菩薩法門身有十佛𠛴也為言本經十佛𠛴專加持身故但䟽云智者經釋互顯歟又般若釋論等者智論第三十三云如釋迦文佛未出家時車匿給使優陁那咲瞿毘耶耶輸陁等諸婇女為內眷属出家六年苦行時五人給仕得道時喜羅陁須那𠛴多羅阿難密跡力士等是名內眷属大眷属者舎利弗目連摩訶迦湏菩提迦旃延𠖐樓那阿𭰖豆等諸聖人及勒文殊師利陁婆羅諸阿毘致一生補處菩薩等是名大眷属文私云今所引是此釋取意畧抄彼論是大品般若釋故云般若釋論也問智論次下云復次佛有二種身一者法性生身二者隨世間身世間身眷属如先法性生身者有无量无數阿僧一生補處菩薩侍從文准此文釋迦佛非生身何云生身佛耶荅生身有二謂法性生身父母生身也䟽生身者父母生身也即下文隨世間身是也故智論第九云佛有二種身一者法性身二者父母生身文故无違耳問阿難成道夜初生二十五嵗時詣佛所又舎利弗等又成道以後弟子何彼等云內大眷属耶荅惣佛在世云成道時未必初成時歟或又九世相入意歟手草云問䟽普賢等菩薩云一一是毘那內證㓛德何故云普賢等是大眷属荅本地之時皆无非那內證之德今事迹故云尒文及彌勒文殊等者法華文句云彌勒此云慈氏文上生經䟽云梅咀唎耶唐云慈也古云彌帝或勒皆訛也文玄應音義云正理論云阿氏多此云无勝舊云𦒿多或作阿逸多皆訛也文文殊釋至下可知矣問一生補處者何義乎荅大論第七云滿濡尸利慈氏菩薩是諸菩薩皆是補處紹尊位者畧抄問一生者何生耶荅法華攝釋第一云問一生補處何等生名為一生耶荅且如勒昔在人中各一生事一大生也若㨿小生者而有四也天中中有及本有二人中中有及本有二合為四生如七生等依大生實理論生有二十八云云私云此意都卒上生𨶒浮下生合云一生歟遁麟記云一生所繫菩薩者謂无始來為多生死之所繫故今唯一生所繫未得成佛故言一生所繫菩薩文私云此𨶒浮半生云一生欤攝釋云菩薩有三一者一生所繫二者最後之身三者㘴於道樹上生即一生所繫下生𡱈得二身今此三生唯化佛餘未見文以理而言亦通餘有云云今䟽第六云今此經宗言一生者未至第十一地唯少如來一位未得證知更有一轉法性生即補佛所故名一生補處畧抄私云此成佛位云一生也自當攝釋第三生然自證化他法應異耳又智論第三十八云問曰兠卒天上何以一生補處不二生三生荅曰復次有人言但大者不限於小文私案論意大生故云一生苦限小者可云二生三生歟問若依小生何不云四生耶荅攝釋云若尒何故智度論勒三生荅以在人中即得成佛故除人中本有一生但言三也文私云𨶒浮下生時即成佛故除本有生也為言今謂佛加持身等者今加持身者即毘舎那也故上文云毘舎那加持尊特身又謂以法身成道例生身成道耳或又內眷属云加持身以法身眷属例生身眷属故故次上文云以加持故現為一善知識身也文問何故名內大耶荅雜問荅云執金剛眾持如來密故為內普賢等眾定惠相應行如來事故為大文亦作淺深者若依今釋并執金剛菩薩名又准生身內大則內淺大深歟若四重次第內深大淺也然實无淺深上淺深故二義无相違歟故大品等者大品般若經第一序品云復次舎利弗菩薩摩訶薩欲在一切聲聞辟支佛前欲給侍諸佛欲為諸佛內眷属欲得大眷属欲得菩薩眷属欲淨報大施當學般若彼羅蜜文智論三十三釋今經文如先引但䟽釋先引經後舉可知矣普賢菩薩者文句十云大論觀經同名遍吉此經名普賢皆漢語梵邲輸陁此云普賢文義䟽云外国名三𭦟多陁羅三𭦟此云普也陁羅云賢此土亦名遍吉文謂菩提心所起行等者大師釋云普賢圎囙以圎融三法為宗即是一切如來菩提心行身也文義釋第五十卷本釋普賢云即是大日圎囙而佛圎囙之果也文私云普賢圎囙者持普賢即圎囙故大日圎囙者依主大日之圎囙故此圎囙是通菩提心及行俱大日之囙故菩提心行如次能所起同是普賢躰也及身口意者當大師釋身字猶如身秘密即法佛三密故准此文者今三密即圎囙之果也若囙者普賢三密也悉皆等二句釋上普義純一等兩句釋上賢義耳故法蔵釋云德周法界曰普淨順善稱賢文又玄賛云仁慈惠悟曰賢德利周滿名普此由內證一真外成德所以德利周𬾨仁慈惠悟故名普賢般若理趣云一切有情皆如來蔵普賢菩薩遍自躰故由證普遍賢善之理能證之道名為普賢或內證此普遍賢理外彰三業无所不賢故名普賢文私云䟽三釋普義賛就三成賢義矣慈氏菩薩者慈㤙玄賛第二云勒姓慈文嘉祥義䟽第一云勒者此云慈也過去值勒佛發名勒也出一切智光仙人經勒昔作一切智光仙人值慈氏佛慈三昧經故囙慈也華嚴經云初得慈三昧名慈也文又心地觀經云勒菩薩法王子從初發心不食肉以是囙緣名慈氏文又賢愚經云国王象師調象即慈心生從是得名慈氏文此中賢愚經并玄賛釋意同今䟽釋歟佛心是大慈悲故以慈為種姓今菩薩從彼種姓中生故云慈氏基師勒姓慈者又此意歟不断佛家者二本義釋俱家字作種矣謂佛四无量心等者秘蔵記釋四无量心云慈悲喜捨與樂為慈苦為悲不𡧱為喜捨亘三事文義章第八四无量義云四无量者化物心也化心不同一門四謂慈悲喜捨愛憐名慈惻愴曰悲慶恱名喜亡壞稱捨心无存著故曰亡壞經中名之以為无量亦云四等緣於无量諸眾生起故名无量等緣一切故復名等文問此菩薩偏大慈與樂得名何云四无量心耶荅䟽云今以慈為稱首文意云此菩薩雖具四无量慈心勝故取為首之慈為稱也為言或此菩薩正雖主慈具餘三故云四无量正故云稱首也問四中慈為首法必然歟又依人耶荅一徃可人若依觀音悲為首故理實法又可尒互相依故義章第八云次論主伴如龍樹言慈為妙主餘三隨從如民從王慈心正是與樂之意故為主无悲苦與樂不成故悲隨慈无喜除嫉與樂不勝故喜隨慈无捨除㝵與樂不等故捨隨慈盖乃且㨿一門為論理實四行皆得為主齊得為伴互相隨故文又云言躰用者初一慈行是其德躰德用如維摩慈是躰故後三用故隨人化益此等皆是對人用也一相如是理實四行齊得為躰並得為用互相依故文可思之上云普賢等者釋來由也自證之德者義釋中釋普賢佛境界莊嚴三昧云此佛境界者即是諸佛自證不思議平等心地莊嚴謂大悲胎蔵荼羅文欲化眾生等者釋從自證德起慈之義也妙吉祥菩薩等者玄賛第二云𭦗殊室利云妙吉祥興眾生樂是北方常喜世界歡喜蔵摩𡰱寳積佛也聞名能四重等罪文探玄記第四云文殊師利或云尸利或云殊室利或為敬首或云傳首或又云濡首又云妙德又云妙吉祥又梵語喚頭為室利吉祥德等亦為室利故致譯不同也文或云妙德等者漢名三種中前後二名釋其義今名何不釋耶文句二云文殊師利此云妙德大經云了了見佛性猶如妙德等文思益經云雖諸法而不起法相不起非法相故名妙德文亦名妙音者問法華文殊妙音別躰異名何今為文殊名耶荅妙樂五百問論云妙音海來文此釋文殊海來也應知雖別有妙音文殊又名妙音也言以大慈悲力等者又來由也演妙法音者釋妙音義也義釋云此菩薩通達如來甚深般若唯是佛佛自證不可與人是故以嬰兒行演人法无我畧抄嬰兒行者弘第八引釋名云人之初生曰嬰兒者胸前曰嬰接之嬰前而乳養之故曰嬰也文今推以二空對自證云嬰兒行歟若以无分別法等者或云文殊妙惠法上有断惑顯理德云除盖障也云云私云今文法𨐫影畧互顕謂法中舉能断法而顯所顯理喻中舉所顯日示披雲風也問今無分別法者定惠中何耶荅既云諸論可无分別智依之摩訶衍論正躰智断隨相云云論即隨相云諸論識故或又定今文句是明除盖障定故法蔵釋理定云塵相既止无所分別故云止也文今无分別可准知之况智断惑專依定故修惠唯断惑散惠不尒故又義定惠名從增勝實通止觀故定亦断惑何𭁆故法蔵釋云隨相而論止名定觀名惠就實而言定通止觀惠亦如是文又義釋云即法性之悲以自在力能除一切眾生一切盖障文依此釋大悲断惑歟此悲即法性故云无分別法也問初義舉前妙惠㓛不釋今三昧欤第二義與復次釋何異乎第三義似定惠雜乱矣後義後得智猶不断况所起大悲乎荅智断惑皆依定故推窮勝能在於定故云定何𭁆猶如摩訶衍稱矣次義正釋法断疑之次弟故云次妙音明之也復次釋六度次第故云次妙惠明之般若禪定六度次第故次義定惠與止觀有同異二義何失後義彼性宗後得智許断證今宗又大悲断惑何失如來諸有所作等者釋來由也諸有所作者文殊妙惠法也一事囙緣者除盖障断惑證理也復次行人等者來由別釋也謂般若者文殊也禪定者今菩薩也断惑㓛專依定故或又正釋惣為除盖障釋復次為來由欤既云如來所作未必文殊故然故次妙音明之釋難速故先義為吉矣此四菩薩即是佛身四德等者鈔第二云佛身四德者一行論二佛宗不断三大悲演法四深定除障如是次第而配属之文或云今四菩薩是既云佛身四德八四隅菩薩歟其故思第二重菩薩阿闍梨所傳荼羅中文殊除蓋障地蔵空蔵也又現圖中但有地蔵空蔵除蓋障三菩薩然今四菩薩中二菩薩雖擬第二重三菩薩專同八四行况復䟽第十六云又四菩薩普賢巽文殊坤慈氏乾觀音艮是其位也前緣起列眾中或以除盖障觀音或以除一切𢙣趣文殊也義各異課用一事亦得也此中用觀音為正也文既云緣起是序品義故大般若中以序品名緣起品也云列眾非今文乎但大眷属者中臺惣躰是心王邊別相即心數故云眷属也故大師釋云大毘那如來與自眷属四種法身住金剛法界宮云云又義既云大眷属可第二重故䟽第三云從大悲行現第二重諸大眷属云云又云從心已下是持大悲行諸大眷属云云當卷上文釋大眷属云諸菩薩大悲𭤧便普門攝受文文義是同又第六云次造第二重四菩薩等諸大眷属云云既云四菩薩非今四菩薩乎况復內大眷属專可依親近次第而八四隅菩薩親近於如來猶近自第一重何不云內眷属矣但䟽并現圖壇第二重諸尊相違者不舉諸尊盡歟依之䟽第二十云觀音文殊普賢勒已在八中漸出干外故次圎中復有文殊觀音等云云此文意於三重壇第一重為初第二重云次圎也爰知今四菩薩在第二重也第十六文者具緣品歟具緣品經云普賢慈氏尊及與除盖障除一切𢙣趣文以除𢙣趣文殊者當于此文矣今品中无除𢙣趣故具緣支分故云緣起歟又義凢四行菩薩第二重四菩薩其躰同故或四行邊云佛身四德或眷属邊云第二重也十六卷文或以除障觀音者今品也或以除𢙣趣文殊者具緣品也若俱具緣品者不可𣇣初或字二或字是顯兩品耳或云觀音在八自性身在第二重受用身在第三重變化身餘尊又可尒耳尋云除盖觀音同躰異名歟除𢙣文殊亦尒乎荅大師陁之次第九字配九尊云阿觀音羅除盖障云云小野小眼毒女舉八菩薩云觀自在菩薩地蔵菩薩除盖障菩薩云云依此等釋別躰菩薩歟或云觀音除盖障真言同何非同躰矣然言雖同躰是別例如四佛四波雖同躰是別又如勒如意輪讃是一其躰異矣况復胎蔵次第二菩薩言別也又般若寺抄云除盖障无能勝文文殊除𢙣趣同異准知之問佛身四德文何故四菩薩云四德耶荅般若寺抄云普賢是菩提慈氏大慈大悲普門𭤧便文殊是大智断用除盖障是大空𡧘照𭤧便所謂常樂我淨四德也云云依此釋者四菩薩為常樂我淨四德也大師法華開題云東南𭤧普賢即大捨德西南𭤧文殊則大喜德西北𭤧觀音即大悲智東北𭤧慈氏則大慈智文此逆次為慈悲喜捨又千手䡄中自東南順次為慈悲喜捨此等順逆雖異四德義同又秘蔵記中普賢空蔵觀音空庫如次為慈悲喜捨也金剛界次第等又同之尋云第一重第二重十三大院𭤧如何荅第一重上𭤧遍智院又云佛母院下𭤧五大院左𭤧金剛手院右𭤧觀音院第二重上𭤧文殊院下𭤧空蔵院左𭤧除盖障院右𭤧地蔵院第三重上𭤧釋迦院現圖中釋迦為第二重文殊為第三重也下𭤧蘓悉地院外金剛部院廽四𭤧為第三重也尋云今經中盡十三大院乎荅菩提心義第三安然云二所中十三院如具緣品圖尊中有十院云初中臺八二初重遍知等佛部三觀音等蓮華部四金剛手金剛部五二明王加上遍知為佛部也六第三重釋迦等七第二重文殊等八除盖障九地蔵十空蔵轉字品中有十一院一中臺二遍知三觀世音四金剛手五二明王六四大護七釋迦文八文殊九除盖障十地蔵十一空蔵大儀䡄中更加二院為十三院文釋論云菩提等者智論第四云問曰何等名菩提何等名薩荅曰菩提名諸佛道薩名或眾生或大心是人諸佛道㓛德盡欲得其心不可断不可破如金剛山是名大心如偈一切諸佛法智惠及戒定能利益一切是名為菩提其心不可動能忍成道事不断亦不破是心名薩文私云是人諸佛道㓛德盡欲得者忍樂修行等其心不断等者堅持不捨義也般若寺抄云有所云道心者樂求菩提有情故云菩提薩文復次此人等者智論第五云問曰何名摩訶薩荅摩訶者大薩名眾生或名勇心此人心能為大事不退不還大勇心故名摩訶薩復次摩訶薩者於多眾生中最為上首是故名為摩訶薩復次多眾生中起大慈大悲成立大乗能行大道得最大處故名摩訶薩復次大人相成就故名摩訶薩復次必能法破一切眾生及己身大邪見大愛大我心等諸煩惱故名為摩訶薩文惠影䟽第二云大人者以其諸德斯𬾨故得稱文私云此中復次多眾生已下忍樂修行之義也以上堅持不捨之意也今文智論第四第五二文也第四中釋菩提故題次云釋初品中菩提第五文第五卷釋摩訶薩故題次云釋初品中摩訶薩第六文又於摩訶薩釋有正釋復次多釋然今䟽中菩提為正釋摩訶薩為復次釋恐似違論文乎私案論中文異故為非正復之別釋䟽中二名雖異目於一躰故為正釋復次欤故大師釋云又菩提薩亦為摩訶薩文或又䟽中復次者非對正釋釋別文故云復次猶如起信論中云復次言意識等也又第五文雖有多釋同摩訶薩釋故䟽為一種釋歟木𢟷義云薩與摩訶薩為正釋復次但薩是自利義摩訶薩是利他義也云云又准智論正文云及與己身摩訶薩又自利歟大邪見大愛等者鈔第二云䟽大邪見大愛等者𣵀槃云一切煩惱邪見攝盡謂破壞三寳焚燒善根戒經十種謗三寳為最重故邪見稱大若㨿發潤生死流轉无明愛取為大若㨿遠隨現行障无學道我愛為大餘可名輕若煩惱當躰相望則十大煩惱為重隨惑為輕等今此智人必能法破壞故名摩訶薩文此索多者等者䟽第十七持明禁戒品云猶行大求大法起大行成大菩提事所謂普令眾生入佛知見故名大士也此有情者𣑽音索多是著義猶如世間人深著身心不能暫離也今菩提索多亦尒此大菩提行乃至无有一念𠇲息放捨之心故名索多也又名薩是有情義以於有情之中能修无上道荷一切諸餘眾生即是眾生之中无上故名大有情也眾生隨所執著義今能自出後令他出故名大有情也文私云索多是著義者同今索多者忍樂修行堅持不捨之義也薩是有情義者又同今薩名眾生之釋也雜問荅云又薩者梵音正應言索多若以義言之是堅持不捨之義也文鈔第二云前云薩直呼於人今云索多乃属人之㓛業即是忍樂修行堅持不捨言聲明有如是法者即八轉聲法也謂前云薩直目眾生之躰即躰聲也今云索多直属眾生之即聲也文觀鈔云薩眾生直依人躰故云躰聲索多忍樂修行等義是用故云聲也云云範抄云躰聲躰文故云不呼入聲索多讀點故云聲也云云躰是八轉聲中其二也或不流便者十四本同今文十卷義釋流字作當字矣薩畧有三種者問大師釋云又薩有四愚識金智是也文其數相違如何荅於菩提薩且顯密人開金智也故雜問荅云問何言愚童等耶荅六道凢夫名愚童聲聞緣覺名為有識修佛道人名為菩提問彼金薩此三中是何荅即第三人文故知金薩是第三開也又五秘密儀䡄云有三種薩所謂愚童薩智薩金剛薩文此文開金智以有識合愚童歟釋論中二乗攝邪定故又高尾口云四種薩如次凢夫二乗菩薩佛取意此意金智合更開佛欤佛又菩提薩攝故或金薩云佛歟密人皆果地人故問金薩者何菩薩耶荅或云四大菩薩云金薩蕳顕菩薩密菩薩皆云金薩欤今云但金剛手也問荅中上釋秘密主義畢云此菩薩名金剛薩此云彼金剛薩之故又五秘密䡄云以金剛薩開其二種薩修行得此金剛乗人即名金剛薩文准此釋通四行何過凢三四薩顕密分別隨冝不定今就諸大菩薩文出三種薩故此中愚童有識是第三重生身眷属二乗世天等也菩提薩四大菩薩等也然第一重執金剛等䟽中攝属未明故彼第一重金薩等即第三人也云也故知今此三種薩三重聖眾也但秘鍵釋𩔰密判薩欤或又彼探彼經深秘意成四行菩薩三摩地也問愚童不知囙果六道凢夫有識興度想定性二乗何云荼聖眾乎荅十界輪圎荼故六道二乗又海會聖眾也問若尒胎蔵界所列六道等眾生皆可實類乎若云實類者今此荼是從本𡸁迹之圎壇大悲利生之海會是故中臺自性之佛漸現三重荼之聖眾八受用之尊專成四種法身之化用當知胎蔵諸尊皆以佛智所現云事若實類凢夫見之可成罪之有何益故大師釋胎蔵聖眾云有從果向囙人无從囙至果人云云若云非實類者䟽下釋云我是凢夫外道𢙣趣眾生亦名五逆大邪見人大悲荼羅正表此義也云云又先德釋云不改九界迷情悉囙等流法身云云尒者㔫右不明如何荅凢真言宗義專此事顕秘蔵幽㫖獨此義極所謂今教意四重荼之聖眾皆是本有常住之佛躰六道四生之群類併又自性清淨之法身也是以重重帝網之莊嚴无一法而漏草木智智无邊之聖眾无一類而捨含識若除實類則圎壇稱難成若限權化則輪圎稱易闕者欤故知佛智照見者凢夫本等流法身又依密名字者實類性荼聖眾若尒挫實類而云權化何𭁆故金界次第云入我我入故本尊與我一躰无別但為表本迹義有加持㱕依觀云云此意未断惑之行者非為本尊之𡸁迹乎然則我等皆不動自性而成六道四生之形隨順无明而受三途八難之苦尋源汲流皆是那之𡸁迹也挫實類大悲本尊何𭁆推本見跡併又法身之應現也凢夫祈无邊悉地豈空若𭤽捨實類尋化爭成眾生即佛之觀偏𢙣凢夫愛聖者誰開凢聖不二之覺乎大悲𭦗荼羅正表此義也甚有深意者欤伏惟我宗意現覺諸法之故貪嗔癡𭞙現顕明王忿怒之姿直諸法之故欲觸愛𭞙直成菩薩慈悲之質五趣四生之鬼畜隔之永沉三途之苦海八苦五𮕱之人天融之即到五智之覺岸迷悟在己無執而到盖此謂欤况復彼顕乗猶性𢙣通融之故馳煩𢙉即煩𢙉之談此密乗豈性相歷然之故无生死即生死之義而已一者愚童等者鈔第二云愚謂愚癡童謂嬰童取未會分別也下經云愚童凢夫類猶如羝羊文不知實諦囙果等者不知四聖諦世出世囙果之道理故世間三心此中攝欤十六行相觀門是二乗所行故况修行義第一心難得二三有五戒十善修行故心行邪道下四句初二句忍樂修行義後兩句堅持不捨之義也猶如下顕不捨義欤二者有識薩等者鈔第二云䟽二者有識者謂有所識知者也對前愚童故稱有識也文私云有所識知者二乗初覺知生死過患故云有識也又准下文云識性二乗求𣵀槃之邊云有識欤性者理性故或二俱存故云有識前後文互顕故覺知等釋忍樂修行義著保化城等釋堅持不捨義也於如來㓛德者釋二乗不名菩提薩之由也問二乗亦得菩提何不名菩提薩乎荅安然釋云三乗皆名菩提而二乗不名摩訶薩文准此釋今菩提薩是摩訶薩故不通二乗欤又智論第四云復次三種道皆是菩提一者佛道二者聲聞道三者辟支佛道辟支佛道聲聞道雖得菩提而不稱為菩提佛㓛德中菩提稱為菩提是名菩提薩文依此文菩提薩名但佛菩提故不通二乗何以摩訶薩蕳彼乎恐安公釋違智論文欤出過一切臆度論等者鈔第二云一切之言攝盡內外有諸外道計我自性即同欲界或同色无色界乃至謂非想處即是𣵀槃又一切有道人言神人一切法門中求不可得如龜毛兔角常無而隂界入實有自性以如是等論法故盖由不識其心今此菩提出過如是臆度論種種過𭁆一向純淨即是眾生本心了知此者名之為菩提薩也文於是人中等者安然云三乗皆名菩薩唯菩薩名摩訶薩文慈㤙釋云揀小菩薩若異二乗故云摩訶薩也文明群機嘉會之時等者五大明王義云嘉會者是一時義法王啟運之日大眾嘉會之時也文玄賛一云此有二義一法王啟化機噐咸集聼事訖惣名一時二者聼者共相會遇時分无別故言一時文文句引肇師釋云法王啟運嘉會之時云云同記云啟初開也運合冝也嘉善也佛法大運必稱物機故云嘉會稱機品云云又䟽第四云良日晨者意在菩提心嘉會之晨也文有人云自性所成眷属為來流通示現群機之相也又云有三種壇謂秘密壇法身嘉會壇報身大悲壇應身今於隨他法界宮現他受用相故云群機嘉會也云云有人云普賢金剛手等各引實行菩薩為當機眾故云群機嘉會也云云私云三義中初義為勝自受法樂故不可有實行又自性身土故不可云他受用也所以然者上舉執金剛諸菩薩畢結此等大眾為聼法故而云次明群機嘉會應知上金剛菩薩云群機理實雖三世常恒為未來流通准如常示此相也若十佛𠛴等者若不定義舉伴顕主也經中大日并執金剛等各住自證三昧句真言故即真言蔵品等是也若不尒者何在次明群機嘉會之時所同聞法之文下明此義矣故知正時也故䟽第六云若現世天身則彼天三昧道若現聲聞身則聲聞三昧道當知此中偈頌如是无量𠛴塵非世間結集經卷所能具載文主伴俱雖大日獨為教主故下文云如此時中佛何法耳或云今此文重釋上大眾各為聼法以三密而供養大日也若不尒者何不舉大日如此儀式皆今經時分故云次明等也今謂時分義縱雖廣通所同聞法但取正也上既云然此經流布等下文云尒時住於佛日而演法此乃望於流通結集而正時云各各廣演則无限量等也當知今時求異如常八亇年等時時分法无邊際限量故結集者惣云住於佛日等也然字是結前義結成前時法也尒時住於佛日等者或云凢有三種日一𠀍間囙如世間至相推二圎明日以淨眼至之異三如來日然以至日也或云文分為二然以下釋加持故句以上釋越三時如來之日文也私云此日有二種一實相之日此中有能越所越此即釋經越三時之文也此日是本地身自證之日也謂云圎明常住又云實相之日此意矣二然以下如來之日以佛神力逗眾機延自在釋經如來之日句也此即住加持今經之時也三平等句是所法也加持故三字若能加持則大日如來也若㨿所加持時法二種也大䟽抄云意離三際始終常住不變大日如來加持故此法門言也文或又通釋經二句文也以淨眼下𢝰明能越時也延促自在又非世間日故彼長短定故此延促自在故故知經中越字𭇥二義也能越中舉自證為加持來由也若无自證則加持何故起矣例如上釋集會舉內證而為加持起囙矣問如來日是於加持世界而逗實行應加持日故或云令瑜伽行者或云咸適眾機此意也依之䟽第六云然諸行人若深入瑜伽境界三昧時自當了了聼聞如正時无異是故名為佛加持日也文何荅凢今經遠被未來機故云行者云機欤或又自性所成眷属為未來流通假現此相故云尒矣但第六卷釋者加持日有二種謂今經會自性加持身時云正時是也行者聼聞時他受加持身行相故異也或又此云佛日云如來日彼云加持日故其意別耳又寳淨院僧正解第六文云於此文可有二義為自受法樂為他受法樂若瑜伽行人入三昧時了了聼聞者隨他義如正時者隨自云云或述意云行者顕得邊云隨他法尒恒為隨自也云云問今經一代問可云何時耶荅今經法身非釋迦何作此問耶但智證大師㱕云𢝰十𭤧三世修多羅同顕三句本无異轍明知在一切經後文又小野纂要引出生義畢云法華經後真言文先師云以第六文案今佛日義一代之間大日經時是初七日判定耳故十地論云以初七日定不法思惟行故自受法樂故文意云一切義成就菩薩依字觀唱後夜成道法身先初七日隨自意大日經故云自受法樂故然顕一乗機隔聞故云思惟行故是故住化他加持身他受用身第二七日隨他意華嚴一乗也例如彼第二七日華嚴會小機隔聞云思惟故更赴鹿𮏑而小乗法門華嚴經云我起道塲詣婆羅奈文此意也又此初七日實相之日故圎明常住也然又佛神力故延促自在故云佛日也例如彼華嚴第二七日念刧圎融故九世相入耳重意云後夜成道今經者後夜丑寅不二時也即示生佛不二義此時是昨今不二時故成道又即身成佛故今經又即事而真故謂在不二時唱不二覺不二教也時人教相應矣故遺告云吾示不二一心云云依此祈請於久米道塲感得今經可思之又今經開題云不二中不二本法文又密嚴院釋云大日經能教主不二惣躰本地法身也文問尅定時何云三世常恒耶荅雖尅定其時又不恒延促无㝵故念劫圎融故彼華嚴猶雖第二七日許恒華嚴况秘宗時乎延促自在等者維摩經云或有眾生樂久住世而可度者菩薩即演七日以為一劫令彼眾坐謂之一劫或有眾生不樂久住而可度者菩薩即促一劫以為七日令彼眾生謂之七日云云法華經云五十小刧佛神力故令諸眾生謂如半日文日行四天下乃至三十時等者鈔第二云智論云日名從旦至夕初分中分後分夜亦三分一日一夜有三十時春秋分時十五時属晝十五時属夜餘時增减五月晝十八時夜十二時十一月此言十五時属晝三分中各五時也文又智證大師鈔云䟽云日行四天下一周晝夜各有初中後分乃至三十時等又第四云西𭤧曆法晝夜各有三十時云云今撿西𫭫記云三十臘為一牟呼栗多又俱舎頌云百二十𠛴那為恒𠛴那量臘縛此六十此三十湏臾此三十晝夜今案俱舎湏西𫭫牟呼栗多彼此量同也以此牟呼栗多五箇經於日夜合六時即成五六三十也若日夜各有三十時者日夜三時各各具二合十二時此日之六時各加五牟呼栗多即五六三十也夜亦如是故言日夜各有三十時又案之初中後三分各通於晝夜合成六時此六時各各具十故歷日夜即成六十各計至於三十也各字之㔟可通冠三十字第四卷云日夜各有三十時故又初中後時各各可有二分合成六時六時各五成五六三十也即與前案不相異也文私云前抄春秋分時者晝夜停等時春秋時正也晝夜各有十五時合成三十時也五月十一月者極長極短故有十八十二時也中間增减可知具如俱舎頌䟽十一也故知日行此州雖晝夜時有等不等隨在何位晝夜合則有三十時也初中後三分是日夜各以二時可為一分欤此釋違下文云晝夜各有三十時之文也後抄意存二義初意日夜各有初中後分合有六時此一時各經五亇牟呼栗多成五六三十也此晝夜停等時欤後義晝夜各有三十時也此中又有二意初義日夜三時初中後各具二合十二時一時間經五箇也後義初中後三分各通晝夜合六時此一時間經十箇也此意前二時合為一時故六時十二時雖異其意无違後兩解意以今文同第四釋然日夜各有三十時違俱舎西𫭫等諸師釋此甚難解今文各字被初中後不及三十時欤言日夜各有初中後分計牟呼栗多合至三十時也為言若尒下文恐各字悞欤可合字欤若又以下文為定量今文各字貫三十時讀之三十時者非牟呼栗多欤又嘉祥法華統畧云時量短長有十二節極短名𠛴那為一念百二十念為一瞬六十瞬為一息三十息為一湏臾三十湏臾為一日夜十五日夜為半月兩半月為一月文私云此又同俱舎等今瞬者彼恒𠛴那也息者彼臘縛也當知今晝夜各有三十時准彼等一時分經二亇半牟呼栗多欤言如來種種三等者雜問荅云身密語真言心妙觀平等相應至大日尊遍一切處三平等究竟實際若三中一闕即不能至平等之處如車一輪闕都无所到是即三平等義也文私云䟽如來三至一實理大師釋㨿行者三證大日一實理而互顕也一實理者阿字本不生理也身等於語等者又應云心等於語等亦可云心等於身等順逆无㝵橫竪涉入故今舉一隅顕三端也一心院僧都云故上人明惠房云華嚴一乗雖明三密平等義不及秘宗談所謂華嚴雖云身語㱕心而平等全无以意密㱕身語以一心為本故密宗不然意密亦㱕身語六大為本故故淺深大異矣問三密平等冝然今自他平等與華嚴三无差別有淺深耶荅實範上人云此三平等自法界故彼无差別由理融故是其淺深也云云同一醎味者智論三十五云𨐫如眾川流各各異色異味入於大海同為一味一名文其迹所住處者以其迹類下謂修如是道迹句即進行義也今行者踐先佛道跡而修行故云道迹也故釋論第七云三世一切菩薩眾如是如是如如隨踐順行應轉如其次第不超数量不過位地超入義故文以所住處同次第修行得住三平等處即住處義也謂大日尊三平等究竟實際位也此位究竟處故云所住處也句是究竟義故言辞句逗義亦如是者此意耳義究竟云句故重意云今三密法門至一實究竟位𭤧便故云三平等句也為言句逗者高雄口云一句與逗差別何荅云已止乃所留乎云句足所留乎云逗也言句者梵云談鉢未知正字此云所住處也云云為所入門者圎城寺金剛界八卷次第云尋云三密法門者能通門欤為當內證法欤或云究竟內證法門也云云又安然云以三密𭤧便為門見如來加持身取意或云今此宗以彼法即為門門即法也如抄以自身三入本尊三密時自身三業能入門本尊三密所入境也又以本尊三密入行者三業之可知故知門即法法即門是一躰不二也云云或云且以三密𭤧便望行者云所入對法界亦能入也云云私云三平等故加持受用身即行者平等智身故為欲顕實无能所故云所入門也謂以身平等之密等者䟽第十七云自真實謂自持真言手印想於本尊以專念故能見本尊本尊者即是真實之理非但見本尊而已又如實觀我之身即同本尊故名真實也此有三平等之𭤧便身即也語即真言也心即本尊也此三事觀其真實究竟皆等我此三平等與一切如來三平等无異是故真實也行者修行時佛海大會定信得入若有疑慮則真言之行終不能成文又云先作三平等之𭤧便謂真言身及觀本尊見本尊時其心相應而住无有能動乱之者又觀所持真言從本尊心中流出而入其口猶如華无有間絁即以如是佛之㓛德自滿其身亦不從身萸流出也文私云今釋同此文矣如是加持受用身等者或云加持受用身者他受用身也毘那遍一切身者自受用身也平等智身者自性身也云云私云䟽第七云行者但一心諦緣觀此聲字自當見佛加持身若見加持身即見本地身若見本地身即是行者自心也文准此文遍一切身者本地身也何云自受用身乎故知受用身者智法身即識大也遍一切身者理法身即五大也是本尊六大也平等智身者行者五薀也智者四薀身者色薀也所謂行者四薀是本尊識大開之本尊五大亦行者色薀開之合二准之識大四薀俱五智之德五大色薀同五輪之躰也本尊六大加入周遍行者五薀故云加持云遍也行者五薀本尊六大平等一味故云平等也斯則无能所而能所也不到而到即身成佛之理思之故當卷下釋云一切眾生色心實相常是毘舎那平等智身文可思之或云今宗行果皆字本不生上囙行果德故謂本不生故云不行不到然行不生而到不生際故云而行而到也又義今教明无盡莊嚴本具故不行不到蕳囙海之行果之言也而行而到顕性海行果之文也一切眾生皆入其中者自心即菩提故更无能所入然如實知自心故云皆入其中也時彼菩薩普賢等者開題意已上通序自下別序也二教論意已上自性身法自下受用身法云云兩釋異何謂通序五句文述當經教主處等自性土之行相故云自性身法也時彼已下三節文明現瑞竒特事故云別序又此瑞相示加持世界事故為三身法文也故无違耳又一義云毘那如來迅示現等文𭇥惣別二意所謂毘舎那如來者自性身即上薄伽梵即今經教主也時彼菩薩秘密主又前自性土同聞也示現无𥁞莊嚴蔵是正加持世界事也今此无盡蔵通三身是惣也𡱈受用是別也謂將此乃至當廣之者釋彼文之惣義復次普賢已下釋彼文之別句義也普賢秘密主等者所現他受用土同聞解門所現善知識也又轉釋佛莊嚴蔵等文更釋上惣中變化身也又廣前相等等流身又准知矣大師且依別意故配三身也又所謂初發心已下得益文合惣別意大師此得益為欲顕通三身故等流文除之䟽家属等流身為示此文別義也故知䟽家宗家影畧惣別互顕也應知兩師釋文雖似異義㫖終无違耳問何以故二種釋知惣別義乎荅初釋感動大眾之言不𡱈受用悉現境界之文廣通三身况法華序分等例廣可𥁞竒瑞故况復大師金剛般若開題云所謂德者荼羅无𥁞嚴蔵也謂福德者即四種法身相好也文此釋无𥁞嚴蔵福德云四種法身豈非惣句乎又復次釋先釋无𥁞蔵為今經瑞畢𣇣所謂言釋无𥁞蔵義而引經釋成時云一一皆現佛加持身既云佛加持身是受用身如來也報身亦雖佛身次下文別明故又至等流文云非但佛身等非今佛加持身等乎故知惣別義分明欤又義經文但別也大師注受用身故但䟽初釋惣𤗊三身文通釋三身為今經瑞也復次釋別釋受用身故云惣別欤或又兩釋俱惣釋三身及得益是竒瑞義也所謂已下文是別也初中正釋大眾感動復次實行引入也問前四菩薩十九金剛皆悉為上首今何𡱈普賢密主乎荅私云上自性會眷属今加持土伴類故主伴俱有異欤或又此菩薩密主雖自性土眷属且為顕主伴重重作如此例如法華地涌菩薩上一一菩薩唱導之首下云是四菩薩㝡為上首也或義云坂房覚此菩薩秘密主即為他受用身也故五秘密經云金剛薩他受用身云云私云此義非理下等流叚上二身而云非但示現佛身何菩薩執金剛云他受用乎五秘經文異今意欤謂大日自受用出薩化他故云尒開智拳作鈴杵可思之又相羕義云大普賢金剛薩者即他受用身如來也自性身化他之姿也非十六隨一金薩也問大師意今受用身通自他欤荅私云若依四身同為密教教主義則可通自他是即聖位經中法佛示四重圎壇矣又大日三身釋迦三身中顕大日三身也大師金剛界義中以四身配四時受用有自他受用云云既於受用分二種故若自性身為密餘三身為顕而明三身法勝劣之意則可𡱈他受用也所謂自受用是上文如來加持故䟽云次云如來是佛加持身名佛受用身文但等流身等云宣真言道句法者開會意欤此中二義前義為勝䟽釋清淨句文云頓覺成佛神通乗也不同餘乗多刧修行也取意如法華序分等者此顕所示現三密无𥁞蔵有二意也一謂顕此三密无𥁞受用等身是化他加持世界事故引序品類之二謂示自性土四重圎壇故引涌出品比之斯則不改自性而加持故於一文示二義欤或引宗秘論山佛常住曰金剛界之文本門為金界迹門為胎蔵而疑今涌出品例甚以不可䟽主既以今經同本門故䟽第七云壽量品云常在鷲山即此宗瑜伽之意耳文但宗秘論金剛界者即今經金剛法界宮也故䟽中心王毘那成覺處云金剛界中此文明鏡矣何云兩部中金剛界乎問今此加持身土令現自性會中欤又令見加持世界欤荅若依序品意令見加持世界猶如見放光所照国土也故下文云普見加持世界唯平等法門文若依涌出品者今會座令現在欤猶如千界塵数菩薩山涌出矣復次普賢等者此復次釋成上義非別釋欤例如釋論中云復次如來在世文也或惣別為正釋復次如先弁矣或又上隨自下隨他欤故寳淨院僧正抄云法身內證有隨自隨他二隨自意之邊唯有自性所成眷属隨他意之邊專有實行當機之人隨自无當機之文䟽第一云𨐫如国王若有政令乃至倍復生信故文大臣時史者同聞眾也此中无外民无當機之意也隨他有當機之證䟽一云然此諸解門實行諸菩薩故云云准此釋上叚應隨自今文信樂倍增等者同上文倍復生信俱是自受法樂義也問隨自自性身隨他餘三身耶荅或云尒也於自性身无加持受用義故木𢟷義云四身俱具自利利他二義四身本有歷然各不改自性而住神力加持益實行人云隨他也三身既通二利自性何癈化他耶自性會座既在餘三身加持世界何不見自性耶但䟽文并大師釋中受用已下云加持身者增勝也又大師釋云四種法身具竪橫二義橫則自利竪則利他文此文四身各非通二利乎序分義云問性身法唯為自受法樂欤亦為令他受樂耶荅亦為令他受樂其理如前苦重述者非但照機授藥為利他本聖位經云汝等將來於无量世界等此即性身為他也又有對機法之義如別卷抄云云私云利他為本義何異顕乎唯識論又自性身亦利他為增上緣文為未來機義尤理故經云於當來世時隨順是法文又䟽云亦為未來弟子明此嘱耳文又大師釋云問自性身有化他義者可云他受用若尒可攝第二身何荅謂於自他受用有橫竪二義所謂四種法身皆有自利利他二義自利邊四身俱云自性又云自受用化他邊四身同云他受用又云加持然非竪中自他受用是橫自證化他故若自性身无化他者普門機依何證悟然䟽普門一門二機分論心王心數兩根別矣私云自性會座无實類何有利他義乎故上文釋一切集會云由此眾德到於實際故名集會若一法未滿不名集會取意又大師釋云此經同聞眾皆是從果向囙之人也非從囙至果之人畧抄若尒實類何在座乎但大師釋者四重圎壇若橫平等義則三重所示類形皆大日舉躰元勝劣異何分教王同聞別然竪差別門則分能所主伴且此義𨕙自受法樂云竪則利他非益實類也又僧正抄中釋隨自四身有通別二義畢隨他四身通別准知云云隨他時又自性住餘三身云通四身各云別又四身各住自證三昧故云通自性身獨一切云別欤然此諸解門所現等者雜問荅云此內證會中諸智眷属蒙如來加持力普為法界善知識身隨應度人各示三昧法門依此修耳其善知識者經中所列上首金剛手等此金剛手等菩薩即大日如來內證㓛德无量智各現此菩薩身引攝眾生是故若入此一三昧而修行者即從此一門直至如來所證畧抄私云金剛手等傳自性會中教法流布𨶒浮引入未來眾生是為被教人意也自性會中无正被教之實人故故問荅上文云而若有眾生遇此教慇懃修習如修行觀念是即被教之人也文問文相次第為饒益實行人先示現大神力然後今經見非今實行居會座則前後文不順耶荅凢自性土法遠當來眾生且作能所主伴之儀各自受法樂之法斯則實人雖无座為未來作如此也故今經下文云於當來世時劣惠諸眾生為度彼等故隨順是法文又義云明加持世界事故有實人欤先迅示現等者秘密荼羅品云以如來迅平等荘嚴三昧以現法界无𥁞嚴故文字書云振也動也壯武㒵迅疾速也從一平等心普現一切本尊等者謂三密中意密勝故云本尊欤故秘蔵記云我本來自性清淨心於世間出世間㝡尊㝡上故曰本尊文私云三密不可有優劣六大本有故相望作主伴俱本俱末也然今心為本尊是住心品故或語為本尊住心論云於真如更有所依所謂字云云或身為本尊配佛部故又義云自心即一切智智故云本尊也佛云一切智故故䟽云所謂眾生自心品即是一切智智文如來秘密惠經者或云貞元開元錄不載之是錄外經欤或未度經欤或云勘開元錄此經一部二卷未得其本云云私云他家請來十四卷十卷兩本荘嚴下除也字秘密惠下安也字文云无𥁞嚴如來秘密惠也經云等文依此本如來秘密惠五字属上文非經題也然今䟽猶為經題故雜問荅云問何以得知荅如來秘密惠經云文此問荅明為經題矣雜問荅依䟽不依義釈故大師作定若尒恐治定悞欤或云十卷義釈上也字亦在矣問智論第十云佛雖入深禪定不為世事所動今以大慈悲心隣愍眾生為之法断疑密迹金剛經中佛有三密身密語密意密一切諸天人皆不解不知有人見佛身一丈六尺或見一里十里百千億乃至无邊无量遍空中如是等名身密語密者有人聞佛聲一里有聞十里百千億无數无量遍空中是名語密是時目連心念欲知佛聲近遠即時以己神足力去无量千億佛世界而息聞佛音聲如近不異諸佛要集經中文殊尸利到諸佛集處有一女人近彼佛㘴入三昧文殊尸利即彈覺之而不可覺以大聲喚亦不可覚投手牽亦不可覚又以神足動三千大千世界猶亦不覚有一菩薩名弃諸盖即時彈此女從三昧起文殊尸利白佛以何囙緣我動三千大千世界不能令此女起棄諸盖一彈便從三昧起佛告文殊尸利汝囙此女人初發阿耨多羅三𦴭三菩提意是女人囙棄諸盖菩薩初發阿耨多羅三𦴭三菩提意以是故汝不能令覚文准此文身語无𥁞舉密迹經三昧无𥁞依要集經欤棄諸盖即除盖障故若尒但云經云為勝也如來秘密者結成句也意三密无𥁞蔵是如來秘密智力也為言故䟽下云如來智力普群機究竟无㝵取意如何荅文㔟雖同㫖趣大異䟽所引經文佛身語及天女定見一經所更非二經施設也然論所引兩經也又䟽除盖障命目連令尋論目連自尋之又䟽除盖障不令出天女定論弃諸盖令天女起有此等相違何云彼經耶又設雖彼經譯者異名何失問今經證何義耶荅或云以如來身證受用變化二身以除疑天女證等流身欤或又以釈迦及天女類示大日无𥁞蔵義欤私云二義俱非理以今經證上三密无𥁞義故所謂以釈迦佛身及音聲无邊際證身語无𥁞以天女三昧證心无𥁞也故雜問荅引今經畢云問身口二遍空之義是即尒也意遍何荅除疑天女心行无量即心業遍義文又云問何故天女三昧之心為佛心業荅即大日世尊加持故况如來心文尒時除盖障菩薩等者謂除盖障雖自不尋所遣目連不測故能遣除盖又同不測也故云及以目連不能測故也例如遣使𭣦无表㱕本主矣然猶有疑故除盖障自徃觀察故云即自徃等也又義以字貫目連讀之除盖障以目連而不測故則自徃觀察也為言及言顕菩薩目連无雜也然後還㱕言𡱈除盖欤初云即自徃等故或通目連欤上文无彼目連還㱕之故我未發心時等者般若寺抄云意佛身者是智身也除疑天女者理身也是明從理發智故云我未發心時是天女住此定云女者是定故理智不二所以䟽𭤧見除疑天女故去佛不遠見入於三昧文或云天女者意業三昧耶形也非別人矣私云云天云女俱定表示欤修惠断惑故以定云除疑欤問准要集經此天女囙弃諸盖發心然除盖障既不測如來身語若尒何云我未發心時等耶荅論䟽所引經大異故何必責何况文殊釋尊九代祖師也然彼經中文殊囙天女發心云云文殊猶尒也况釈迦乎但除盖不測身語是假𦔳如來化儀故欤又除盖障弃諸盖別菩薩欤如是毘那等者上既引經證三密无𥁞義故自下重釈成无𥁞嚴之義也謂從所謂荘嚴者至无空隟處釈无𥁞嚴之義又如下釋蔵義也但今經文舉荘嚴二字是荘嚴之蔵故欤例如起信論囙緣叚𤗊生囙緣矣復次此諸大眾等者此復自性會眾欤前復次普賢秘密主等於如是境界乆已通達云云今釈但以佛神力故得見如是境界云云此為兩釋異矣此又實雖乆已通達為未來流通假現此相也例如金剛手云㓛德倍增耳如行者下囙便明未來行者見荼羅境界也或又此諸大眾等者明加持世界同聞感見受用身荘嚴之相也如行者下明加持世界當機實行人欤前自性會此依受用等故兩釋大異矣如胡麻中油遍滿法界等者智證大師䟽抄云胡麻𥢶中其實充滿專无空隟諸佛亦尒側塞空中𭓩如彼實唐國胡麻云油麻也文私云此釋實遍𥢶者王云公臥切𥢶麁穅也未詳其意今案云如胡麻油遍胡麻中諸根相好遍滿法界於中无空隟處為言遍滿下反釋上法也或可讀乱達遍滿法界一句可安上相好下也又勝佛頂䡄云即復觀空中无数諸佛猶如大地滿成胡麻不可稱数文與今文異今取遍䡄数故如行者內修般舟三昧者天台止觀第二云常行三昧者此法出般舟三昧經名佛立佛立三義一佛威力二三昧力三行者㓛德力能於定中見十𭤧現在諸佛其前立如明眼人暗夜觀星見十𭤧佛亦如是多故名佛立文或云䟽第十云淨菩提心與念佛三昧相應文念佛三昧般舟三昧是一也故知真言行者至淨菩提心得除盖障三昧時逮見无𥁞嚴蔵故云佛立三昧欤然此境界者中論云諸法不自生亦非他生不共不无囙是故无生文今文境界是三密无𥁞蔵也准中論諸法矣所謂諸法佛荘嚴雖似異四不生義全同故引證矣於此四不生有多重故五教章事云四不生義有三重一破外道一諸法不從躰自性生故云不自生二不從梵天自在等生故云不他生三非塵大種和合生故云不共生四亦非无囙自然而起故云不无囙生二破二乗一諸法不定從自同類囙生故二不定從彼異𤎼囙生故三不從俱有囙生故四小乗中許无明支前不正思惟詫而起似无囙今不尒故離无囙三法顕空一果不自起名不自生二自既不立對誰弁他又他只各自皆不成自云何他生故云不他生三自他囙果既不成故云不共生四離囙緣外无別異法故云不无囙生云云或云此中第三破大乗囙果也云云私云前二情門後一依顕實門欤何必破大乗囙果乎謂准下文云諸佛大秘密外道不能識者今又以四不生觀遣內外外道見欤或依下文云當知真言果悉離於囙果者顕教一乗囙果猶破之囙分妄假權𭤧便囙果而非性德輪圎本有囙果故何以故內囙外緣等者是則離九種住心妄假囙緣秘密荘嚴真實囙緣也故下文云即用一切智門五義自為眾緣能至菩提常住妙果所謂不可惠議不生不之囙緣也文當知如是荘嚴之相等者謂荘嚴蔵是法佛法尒德故隱顕唯在機情非受用等去來也問畢竟平等不出如故文豈非攝相㱕性義耶荅字義云同一名如多故如如理理无邊智智无數文私云无邊理智互相攝入故云平等云一如故釈論云非謂一法故稱平等文故非顕宗一心无相談也又云如平等義无變易義六大本有故三密平等故云如也問若尒一法界多法界義何荅顕宗一法界者謂无相一理遍差諸法諸法雖多差理性唯一平等也又於秘宗多法界有二意先師僧都義云十界眾生所生四三雖有麁細勝劣能造六大无彼此差別故即身義云上達法身下及六道雖麁細有隔然由不出六大故佛六大為法界躰性文故本尊行者三三密雖麁細別六大是一躰故成入我我入即身成佛義也但異顕者彼理性一法也此六大多法故六種非一故云多法界非謂自他六大別也木𢟷上人義云能造六大亦隨所生三密四各各不同故云多法界故大師釋云理理无邊智智无數文所謂能所造各雖異六大无㝵故四不離故三密加持故成入我我入義耳經云非從毘那等者安然等以不可得已上文合上文讀故經云乃至不可得而成上四不生義也以而字下為下釋所𤗊文矣切一具文丰属上其理不可大師以經云已下為別叚為變化身之文順前後例矣問經上文未見四不生義而䟽中釋四不生義非依此文耶若尒安然釋順經文欤就中䟽家轉釋佛荘嚴蔵之釋又此意矣况復上下文他受變化二身法別文何上无宣之句下闕示現之文既上下合現身法應知一具文非別文也例如又現執金剛宣真言等加之非從毘那等文未必見變化身義乎荅此文為變化身是非大師私釋䟽上釋云然此應化從毘那乃至起邊際俱不可得云云此釋明鏡也變化身法是依法身及眾生感應囙緣且機感邊云非從毘等又㨿佛應邊云而毘那也釋論无相現應隨見麁細可引作證耳又而毘已下為別叚者而字頭可安經云二字例如經云又現執金剛等又不可得已上引合上義者可𣇣送句也但二身現身及法各舉一互顕欤又䟽釋三密无𥁞語密豈非法乎又云非從毘那或語或意生反顕而毘下毘那生三義其理定或又而毘那者直變化欤故聲字義云若謂應化亦名大日尊文又轉釈者轉釈受用成變化身也立義法門引可證矣轉釋若非變化身者又廣前相可非等流身耶若彼許者此亦可然也又經釋相配者无𥁞无邊際者前受用身三密无𥁞无邊際限量也以不下出彼囙由也謂受用身常遍義不異自性身法尒之義也為言故知以以不乃至身也之文釋非從乃至意生之句為受用法尒義也雖常无起五字𤗊受用法尒爯釈非從等文顕變化身法尒似自性身法尒而能下釈一切已下經文為變化身隨緣之義也但於隨緣經文有惣別釈初一句惣顕變化身起及无邊際不可得者无義也故上釈云起邊際俱不可得文意起邊際邊際俱不可得也為言而字下別釈現身法也而是然前起後義也當知從等二句𭇥二身法尒義故云轉釋等也又義初非字不可得句讀之惣以四句為受用變化法尒之義作轉釈矣受用身亦有隱顕故云起耳而毘下為變化隨緣也釋中而能下釋彼文也凢四身皆雖有法尒隨緣義自性是法尒為本三身隨緣為宗故受用變化俱云不異自性法尒也故等流身又云皆如毘那等不異言顕四身各性有法尒義不攝相㱕性之義也故秘經云常於三世不壞化身利有情事文今宗意生住等諸法常恒如是生故起俱即事而真故上文緣謝即機興即生即事而真无有終𥁞文亦此意矣經文二點云非大日三密生一切處起邊際不可得而又云非大日三生一切處起邊際不可得而云云若受用身法尒初字非可讀切也或釈云然此應化非大日三密所作无緣慈悲任運如此故云普於十𭤧宣真言道文問設雖明四身以上三節文但為受用身之文更又現以下文可開二身云又廣前相即此意矣故大師護摩次第云且毘那佛云自性身四𭤧佛云受用身金剛蓮華等菩薩云變化身外金剛部等流身文又別本即身義云十六大菩薩應化法身金剛天等等流法身文如何荅大師釈義隨應相配雖異於今經文四身配釈无違謂二教論灌頂文等是一同故又秘蔵記云中臺毘那為法身四佛為應身釈迦為化身外金剛部龍鬼等為等流身文䡄匠其心者鈔第二云䡄者法也匠者工也工匠之作不失於法也如義玉薀在石璞之中不得良工琢磨則不成至寳眾生菩提心寳在煩𢙉石中若遇如來法𭤧便䡄而匠之則成法器也文又廣前相等者前二身叚佛身雖為主金剛菩薩等亦現之今但現非佛身何云廣乎荅彼雖現執金剛等為伴現之今執金剛等各各為主故云廣世所現金剛菩薩等者今釈𭔹經文金剛如名菩薩者普賢蓮華手也等者等取外金剛部諸天八部也或又等取十佛𠛴諸執金剛䟽家云乃至大師云此意也或云所現金剛等即今等流身也非上所舉菩薩執金剛上金剛手等或自性身或受用身故上非但示現佛身者受用變化二身也但現圖荼第一第二重无佛身者第一金剛第二菩薩是各舉眷属顕其主欤或為顕四重差際上二重挫云佛身欤問等流身不通佛身耶荅䟽第六阿闍梨所傳荼羅於外部有佛菩薩可通佛身欤又聲字義中以暫現即隱身為等流身其義如教相抄私云今三聖者第一重三點眷属也䟽第六云次造第一重伊字三點諸內眷属文當知舉第一重三聖等取外部欤但經䟽并現圖中於第一重但有金剛手觀音无普賢可之今三身不可依三重次第欤第三重釋迦即變化身也受用身者八中无量壽佛等報身欤受用身叚云現佛加持身故上文佛加持身云受用身故又等流身叚上文云非但佛身故當知佛形非佛形判三身身土欤且如十佛𠛴等者或云如法界宮自性眷属遍十𭤧界如是加持世界𠛴塵眷属如毘那遍十𭤧世界也為言私云謂於等流身有主伴上明執金剛等三密差別下釈天龍鬼等十普遍主伴遍互顕欤如者事言也舉主例伴故又解且如者如者今義也今金剛菩薩等三密无𥁞義也如是下金剛菩薩遍滿義也本尊像類等者釋經菩薩等像𧳖文意四重雖同法然德且淺畧門自性身為本質等流身為影像欤又像者等流身形㒵義非本影相𭔹矣執金剛𭔹金剛智惠門等者抄云執金剛是金剛部赤色有降伏普賢是如來部白色有𡧘災觀自在是蓮華部黃色有增益文䟽十五云佛部一向是息災用白色蓮華部一向是增益用黃色金剛部一向降伏其色雜色文私云黑色是調伏青色又黑色攝故欤而鈔云赤色者三角色故可尋之寳淨院抄云問觀音蓮華部尊也蓮華部敬愛法也何云增益耶荅奥文云摧破三障故云金剛滋榮善故名蓮華部云云滋榮之義用增益欤云云或云以華可愛色為敬愛以眾實俱成為增益欤問執金剛是金剛部諸尊通名何云稱首耶荅觀義云惣即別名秘密主也或金剛部義廣通外部故執金剛云稱首欤舉此三點等者抄云謂執金剛般若德普賢法身德觀音解德文又釋三點者梵書伊字有處云蓮華部擬法身金剛部擬般若佛部擬解云云䟽第六云造第一重伊字三點諸內眷属文又六度經云摩訶般若解法身文私云第一重伊字三點諸內眷属者經所荼具縁品并䟽圖尊中於第一重全无普賢故知彼三點眷属者非三重欤故䟽第五云大凢此第一重上𭤧佛身眾德下𭤧持明使者皆名如來部左𭤧如來大悲名蓮華部右𭤧如來大惠用名金剛部取意况撿經所荼羅第一重十七尊第二重二十尊第三重三十七尊中无普賢菩薩但經文第三重為第二院第二重為第三院又䟽第六圖尊三重四百七十五尊中无普賢也故知普賢者八四行隨一執金剛者第一重金剛手蓮華手者圖尊中第三重有蓮華手菩薩彼欤故八三重各舉一尊四重菩薩皆顕等流身欤又云經䟽并現圖不盡諸尊欤既上文中普賢文殊等云大眷属普賢舉第二重欤又現圖遍智院中大安樂不空菩薩普賢延命欤此云普賢欤又文殊院中有普賢也但第三重也又今蓮華手者觀音故第一重觀音尊也經荼中觀音院中㔟至名大悲蓮華手䟽第三重蓮華手者何耶又普賢云如如法身門抄第五云如來部遍智院等法身文又云普賢是如來部文但經䟽并圖中遍智院不舉且畧欤故䟽二十云且觀音文殊勒已在八中為度人故次圎中復有又殊觀音等類文等者等取普賢勒欤况䟽第五第一重上𭤧云佛身眾德荘嚴然經第二普賢三昧云佛境界荘嚴䟽釈云荘嚴者如來自證之躰躰有无量德文眾德荘嚴義既同普賢何非遍智院尊字所云等者乃至等者大師釈云言等者舉金剛蓮華手等外金剛部諸尊文䟽乃至言大師字顕等金剛菩薩等部類之義欤以外現荼羅等者兩本義釈以字作如字矣又䟽異本如字也抄云形內稱外謂大悲胎藏荼羅分三重從內向外此當第三故以名焉文此意於三重壇以第三重望第二重等內云外現也為言私云今外現荼者今經會荼謂為今經從自證法門身現加持羯磨身造四重壇故云外現也䟽第三云從佛菩提自證之德現八中胎蔵身乃至從普門𭤧便現第三重隨類身云云凢四重圓壇或從佛心地現之或從佛支分生之故云外現等也三聖及諸天等三重聖眾故惣例知上等流身也或以自性壇中外部所列諸天八部等而加持世界等流身可例知也為言問若尒自性加持可壇別乎荅躰一荼㨿義二種自受他受故或又外部荼形色性類所表示三點義例上可知也此義以字反終知可讀之若離如是實相等者抄云謂第三重荼羅所現荘嚴眷属多是諸天魔梵八部之眾及鬼子母鳩盤荼等雖現如是種種相狀皆即是實相之行者觀行與此相應以此為門皆見中胎大日之尊若不知如是秘皆隨愛見所生與天魔外道作諸塵勞伴侶耳文私案今實相者即上清淨知見也故䟽第九云一切眾生心自本有佛知見性但以无智瞙翳故諸法實相不得明了現前文今此普門所現天龍八部等身是德之一門法王之一官故開示眾生佛知見性諸法實相令現前故云實相也故䟽第七云就此經宗則五種三昧皆是開心實相門文此佛知見者眾生佛性也故大師開題云佛知見者即眾生心性也等覺十地不能見聞故云佛知見取意又准普觀釋佛知見有性相性即本覺相即始覺也性相即俱行佛性也或又性即理佛性相即行佛性也今清淨知見理可通理行實相似理佛性矣此二佛性躰雖在煩惱𭰖不染汙故云清淨知見也次又釋言等者此有三義一者上清淨句法文異釋也於中又二謂前本有之性今依修生之行也或准上於句出住處進行二義謂前住處之義如來清淨知見是三平等處故今依進行之義乗神通而修行如此道迹故下文復次者所謂之詞也例如釋論中云復次如來在世等矣二者釋所謂已下得益文也𭔹又廣前相故云次又也又釈別名故若上文別義可云復次或亦可也既所謂句為所𤗊文非經乎但舉清淨句者所謂是釋成上故今得益發心修行亦清淨句義故釋中𤗊加彼句也𭤧便修行超佛地等文分明釈次第此生滿足等經故三者為前文異釈而為後文正釈也三義中初義䟽云釈第二義經云釈二義中第二為善何者上文云次又釈歎加持住處經別句云次又故例亦可然矣若餘乗菩薩等者兩本義釈若字作如字矣私案今此餘乗者三乗欤或成或不成同聖位經文故故彼經云然如來變化身為地前菩薩二乗凢夫三乗法種種根機如修行或得三乗果或進或退於无上菩提三无数大刧勤苦𭤧得成佛畧抄智論三十八云有菩薩我求佛道乆乆无量阿僧刧或至或不至如乗羊者取意又戒序中他緣覚心判為十進九退之故或通一乗故五秘經云若於顕教修行者乆經三大无數刧然後證成无上菩提於其中間十進九退文金剛王儀䡄云不知秘密速成法於三忍諸苦行不至菩提畧抄𩔰教言不一乗故或又若望自宗皆得果故云或有成佛若望真言不一桒故云或不成佛故大師釈云自乗得佛名望後作論文依此意又三乗一乗通有矣又䟽第九云畧有四種謂三乗及秘密乗文又義釋序云此中具明三乗学處及㝡大乗持明行法文准此等釈聖位經三乗廣通顕乗欤顕密相𭔹判三一故然大師二教論意聖位三乗但菩薩乗非顕一乗也儀䡄并大䟽等意以顕一乗属密行𭔹菩薩乗判顕密欤演密抄釈序文云三乗者二乗及菩薩為三又及者揀別三乗外有㝡上持明行法故文先師云本經儀䡄等中以秘密𭔹三乗是天竺但在三乗宗故釈梵本經䡄中不示顕一乗也彼一乗於震旦杜順南等初立故故經䡄中三乗言理不一乗可有耳今真言門菩薩等者本尊三昧品䟽云然彼行者猶身真言及觀本尊此三事和合故本尊即自降道場而來加被也然此行者初行之時尚是凢夫自无德力何能感佛菩薩等如是而應耶但由彼佛菩薩等先立誠言大故若有眾生依我法而修行之不法則者我必冝應或雖不來而遙加護之若行人法則不如法而不應赴即是違本所願𭤧不得不應也如𭤧諸向月而水降圓鏡向日而火生若心不相應事緣有闕則本尊不加護念故无驗非佛菩薩之過也文私云准此釈今言不闕法則者不闕三密法則之義欤若心不相應者意地觀門不應也事緣有闕者身語二密有闕减欤事理俱密早得𢘻地故即身義云若有人不闕法則晝夜精進現身獲得五神通漸次修練不捨此身進入佛位文私云以䟽文釈逮見加持境界之義以即身義釈超佛地之義矣非但現前而已者此一句或上文結欤故安而已送句矣或下文來由也而已者非送句為讀相連下句之點𣇣此辞也點云非但加持境界現前而已若欲超佛地即應同大日也為言復次行者初發心時等者觀云上𭔹餘乗述今乗一生即身之㫖下釈當宗善根生長不退之義也或云上加持成佛故於此生中逮見加持境界文下顕得成佛故云乃至成菩提矣或上一生成佛故云超佛地下二生成佛故云入菩薩位等矣或上法本不生談頓成下就㓛德麁細前後矣例如天台云法在一心必次第云云或上惣釈下別釈其義全同矣或上釈清淨句此釈所謂已下也初發心者智證大師釈云初發心者非十住之初發心住應是博地初發菩提心之位也䟽云復次行者初發心時是與上同義也博地者凢夫具地發心欤或云初住發心也故䟽第九云㝡初發心乃至四十二地階次不同文意云初發心住以上有四十二地階級也為言私云初地發心也故䟽第三釈從初發心乃至十地文云謂初發淨菩提心作十轉開明文彼經文既同今經文䟽釈又初地淨菩提心云云今又可尒也又䟽既云得入阿字門入法明道之義故䟽下釈云法明者以覚心本不生際文阿字本不生義也又次下釈壽種除云得至空无垢淨菩提心文第二云初地菩薩得至空无垢文故知今初發心是初地也但第九釈云㝡初發心故異今釈矣凢今文扵十地長短三句義欤初發心得入阿字門者初菩提為囙也即是乃至更无退義者從二地至七地大悲為根義也乃至乃至然後停息者八地以上𭤧便究竟也又配五轉者入囙生芽增進行成菩提證停息入也或又入生芽囙中本有修生二菩提心也此芽增進行與悲句也次謂初發心下釈短有三心也初發心囙𭤧便修行根得至初地究竟也餘地准之有不住義等者此中三義准知空遊步三義不住者不住著已得法勝進者進超未得行遍行者當上神變義起自利利他神變遍行故進心不息為得四地故者或本得字滿字也私云以滿為勝其故第二第四滿心明之第三第五就入心述義影畧互顕矣初地通三心故云得至欤十卷義釈得入第三地句云得入二地此次云如是次第乃至滿足等而闕尒時乃至五地三十字矣䟽異本得至第三地云云又問荅中如今䟽有四五地文正不未矣唯以一行一道而成正覚者問今此成覚攝前十地耶荅雜問荅云以此一行一道至於第十一地文別立也問經云乃至十地此生滿足云云䟽釈云乃至成菩提无行可增然後停息故云次第此生滿足文經䟽同攝第十地更不開佛果乎又問荅釈以第十一地為補處位是十二地義異䟽文欤荅今文滿足十地下云唯以一行一道而成正覚非十地外存佛地乎又䟽上文云次第修行地波羅密乃至第十一地文又十八卷云大智灌頂地者如來第十一地也文以前後釈思今釈義佛果可立第十一地也但經此生滿足言𭇥囙滿果滿二義故或果滿義云乃至成菩提或㨿囙滿義云滿足十地其中今而成正覚者是果滿義也例如彼云此字句中自有二人也次雜問荅釈今䟽文何云補處位乎所以彼具文云當知乃至滿足第十地位以此一行至扵第十一地者先標囙滿果滿二位也次云更有一轉法性之生即補處是為真言門菩薩一生補處位真言行者如此修行超佛地而成正覺者重釋成上二地也若不尒者違䟽第六文彼文云迄至第十地滿足未至第十一地唯少如來一位更有一轉法生即補佛處故名一生補處畧抄此釈既十地滿足為補處位第十一地為如來位故但䟽中云未至問荅云至於者可讀文點乃至滿足第十地以此一行一道至第十一地云云仍无𭁆䟽第三釈經乃至十地諸菩薩文云乃至第十一地而後所見圓極文此意經十地合佛果欤又經雖囙䟽加果欤問一行一道者何乎荅大師云三密修行至成菩提云云䟽十七云謂一切法不出阿字門即是一道也道者謂乗此法而有所至到之義也一道者即是一切无㝵人共出生死直至道場之道也而言一者此即如如道獨一法界故言一也文私云䟽家字為一道宗家三密為一道字三密雖似異其意是同三密行悉入阿字門㱕本不生故又從字菩提心起三密行即㱕一實理故故問荅云住字門三密修行文又字觀三密具足矣可思之相應經云常以一字齊運三業文准知甚深更問若於異𭤧便門等者範義云諸顕教三乗一乗等𭤧便其機雖非密意依佛意即開顕密意不離寳乗也十界悉普門躰故法華云更以異𭤧便助顕第一義文可准矣私云顕教諸乗等於真言三密中之意密而以異𭤧便開顕故終不離真乗也為言𩔰密是一心三密為異故或又𭤧便并寳乗俱真乗也謂大日所无量乗是開顕密意故皆不離佛乗也故䟽云三重荼羅種種類形同㱕一躰皆是佛乗文或云異𭤧便為顕通顕密云開顕密意也意云以異𭤧便雖開于顕密二教意不離真言寳乗也為言緣生者等者智證大師䟽抄云緣生增長現行有情壽種除種子復有芽種生起從佛心種子生法性芽也私謂壽種者第二識有三相謂自相囙相果相也開因相為二謂與種所言者身口意不清淨也言種子者癡愛因緣也言壽者囙所生之果謂果報識故第八梨耶立種子及果報二名耳文私云第二識者第八識望第九云第二識欤且經釈配當者謂有情癡愛因緣者釈經緣字也造身下二句釈字乗如下釈生字也如次煩𢙉業苦三道也今修已下釈有情壽種除文也薀阿頼耶者有情惣報果躰故釈經有情也壽種如文今者障種子在第八中前云者障現行在前六識也故義忠釋云障種子唯在頼耶若現行在前六識文壽者惣報壽命在第八故釋論䟽云惣報壽命應依現識取意壽命者𣵀槃音義云壽亦命也壽取一期之名命取人之生分但異名耳文前言生者別報也種子者煩𢙉種子也前言緣者煩𢙉現行也皆悉焚者釈經除字也又准唯識宗二世一重囙果者頼耶中是行支壽者識等五支種子者无明支也緣者愛取者有支生者生老死也是云十囙二果也得已下釈復有芽種等文也一切等釋種從悲蔵等釈芽生起三字至已下釈經復有已下文於中初二句釈種子欤故云一切如來平等種子文點云有芽從種生起云云或經除字𭇥二句意欤故下釋越百六十心文云即是菩提心生也一切下釈芽種生起也或又芽種者芽即種如種等矣又經舉種芽二心䟽明六心例如佛種不断文釋三寳不断况今一節文轉釈前十地故委弁應云十心欤或又乃至下釈經起字欤問上文云從金剛性生芽今何云從悲蔵中生芽耶荅前舉因今平等種子是也今舉緣下䟽云從大悲生根文謂菩提心種依大悲緣生六度行芽也故无違矣又三句者一切至種子者因也從悲蔵至法界者根也成德至樹王者究竟也斯乃前所明煩𢙉業苦三道即成三句法門之義也應知除者非断除之義不捨断云除也復次如來所現等者自下惣結時彼菩薩已下現端之事也或云加持世界三身法得益无量无邊以佛日加持故於自性會中皆悉令現前也云云私云等流身法中非但自性身所現身末代真言行者入壇受軄之儀式談義擇之座廗九世相入故皆於會座間令現前也問等流身又普門所現之知識何交實行凢夫乎荅我等又設教相設事相隨分有弘通寧非如來使乎故先德釈云不改九界迷情囙等流法身云云又延命院次第入我我入觀云但為表本迹義有加持㱕依觀云云盖以行者非為本尊𡸁迹乎良以遍計分別前雖實類凢夫佛智所照邊猶𡸁迹等流也彼華嚴猶九世相入故於第二七日中現後流通之事此真言談實理六大无㝵故何扵佛加持日間不現末代流通矣問加持世界三身即可云自性土四重壇聖眾乎若許者瑞相會大異自性加持是分何云彼聖眾耶若不許者䟽第六指阿闍梨所傳四重壇云此正是毘那本尊所現无𥁞嚴蔵文此豈非同今示現无𥁞嚴蔵之文字荅或云自性土中大日為主三身為伴各三密法也加持世界三身各為教主皆經也例法華序分即此意矣但加持世界真言者開會意也開權顕實法華云云此意欤况彼八千土中不法華今瑞中真言乎云云私云自性加持二壇其義遙異然皆真言謂經中三身皆云宣真言釈中𭔹餘乗成覚之義若尒何云開會義矣又開權顕實者法華會非他土事故知彼不法華此真言所之義雖異竒瑞之㫖同故相例也非全同耳應知自性加持同雖密自性壇大日為本尊普門之壇也加持壇隨應本尊各別一門之壇也謂阿陁荼羅尊勝荼等也現流布諸尊荼羅皆是加持世界荼也故十八會荼羅或法界宮或波羅奈宮中湏頂他化天等不同斯乃自性加持合論欤當知若依所法自性加持壇雖別若就能人其躰无異欤四種身皆具自利利他二義故自利邊自性土聖眾也利他邊加持世界教主也故大師釈云此四種身具竪撗二義橫即自利竪即利他文此意矣又第六卷釈者大日所現三身有自利利他義故彼自利邊此依利他邊故无違又彼現普門壇此就出一門壇欤問今經中具緣品明普門壇秘密荼品諸尊壇若尒秘密品是可云加持世界乎荅彼雖諸尊壇自性會故非加持世界也加持世界壇諸尊各故又容有加持世界主大日壇是在加持世界而自性土事也故知理實普門一門壇互雖通四種身非自性加持土雜乱又兩土雖異其處可无別猶如四土不二矣扵會座之項皆悉現在前者且准序品例者謂令會座眾而見加持世界之事故云尒又准涌出品例者扵自性會座內而加持世界事令現前欤當知金剛手等者以金剛手可例勒彼經中文殊荅勒問今經金手問大日故然文殊金手問荅雖異乆已通達義同故金手知而問故同文殊知徃事而荅勒不知而問故不同彼耳唯平等法門者三平等句法門即扵加持世界宣真言之義也若尒所例他土行菩薩道又可法華欤或又同為瑞之義未必全同欤將演遍一切等者抄云言將演遍一切乗者謂次下文所種種法門各是一種運生之義又一一門皆遍一切處名遍一切乗也言自心成佛之教者即是所平等句法門也若有行者住扵此乗初發心時便成正覺不由他悟故曰自心成佛之教也文建治二年十二月十四日扵醍醐寺中性院再治畢金剛佛子頼
