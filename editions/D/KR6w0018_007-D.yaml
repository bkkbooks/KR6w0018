body:
  text: 䟽卷第一之七經若我若我所者五見中身見於五薀執我我所也我者我身也以常一主宰義名我也謂我見㒹倒緣非我五薀邪推度執常一主宰也次我所見者以餘法属我身也餘法者我器我瓔珞等僮僕等也所者所属餘法属我物故名我所也餘法假無自他所属而㒹倒推度執我所也此我見我所見是身見攝也若能執所執者私案能執者能遍計依他妄心也所執者當情現境上所舉我我所歟即遍計所執也或又所遍計境歟若爾能執所執如次依他能取所取歟即依他見相二分也此二分離心無境離境無心然離心有境離境有心是我我所能所取也前二義中所執為所遍計聖教無文又為我我所似重言然上約我名我有義顯前我我所是所執何𭁆例如更舉清淨我矣守護經云若有執受若無執受文未必當今能執所執彼經中無我我所及清淨之文又准牒若我乃至清淨文釈我人壽者等法者遍計能取所取云能執所執歟或等法言舉依他能執歟世尊前已廣等者前文中雖廣約十二處十八界等明心實相猶有未解者故略明處界我我所等也又五薀法前未明故今更開也故知廣者指前心不在內已下文歟亦為等者此釈意釈成前我諸法等决了義也非通諸文所以上文中雖云知識其心未云歷何法知識其心故重約三科等法而明决了義也故知初釈不為開會也後釋局我已下故為决了別也初句云以下隨文釈可通二意與或諸薀和合中我不可得者唯薀無我義故指諸部小乗經也今經中若色若受想行識求不可得等文歟諸法從緣生都無自性者法空義故指般若等諸大乗也今經中一切分叚中求不可得等文歟分叚者眾緣生義故依之下䟽云乃至一切分叚中求不可得者即是摩訶般若等中歷法廣明者是也文彼言諸法實相等者指事云於諸經中所實相者與此經中所明心之實相躰同而教相異文文私云而教相異者彼漸次開實相此直約諸法故漸頓異故云爾也然後為即心之者今此即心有三意一者法華經也故上釋指法華云然後如來以實相文又法華經云為實相文准本經并上䟽釈無爭法華也凢今文中有二節從如一切經中至更無別理也者先舉小乗三乗漸次教開會之也次從但為薄福至秘要之藏也者舉法華開會而示異今經决了也所謂小乗三乗無决了義故舉彼專述開會義故云彼言諸法實相者即是此經心之實相也又法華雖有開會異今經决了故云今經即不如是等也即與直其意異大師釋云餘教頓悟根熟待時密乗頓悟初心凢夫此生證悟文彼根熟故時義𭚘合即心此初心凢夫直示故云直約等也問何以知法華開會又所牒經文未見其義耶荅不能自信作佛之釋正當法華不自信作佛之文淨諸垢障之是轉四諦方等洗人法垢穢之意也將護其心文般若𣴧汰之謂也時義合然後為即心之者四十餘年機根調𤍨後為實相之義也文義悉彼經矣但於經文無法華者經文約未開阿𭇥般若等雖明决了義䟽家為欲顯今經决了勝法華故䟽舉之歟或大師以法華同如實知自心故前叚我諸法如是句兼法華歟䟽家探經意今文釈之歟二者即心今經也直令知其心即心義故故䟽釈云如來智即定其心廣分別文以智即定其心豈非即心義乎今經即不如是者前漸次實相直約已下釈成即心義也一切經中言不可簡一乗况諸法無自性義專當花嚴經故智證䟽抄釋此文云今案以此明見一切諸經漸次開實久嘿斯要之言並可入此漸次之門今此經中歷大小諸法開示實相真實故為頓覺成佛入如實相門决了之故也文此釋心久嘿斯要之法華入漸次門也但自信作佛者如實知自心義也淨諸垢障等約隂界入方便令知識其心義時機合者出生義云大種姓根法緣已熟三秘密教時正至等文此意矣或又自信作佛淨諸垢障等重指前漸次實相而示為今經方便之義也故上釈云釋迦如來及三世佛所法無非為此三句究竟回歸本無異轍取意故智證指歸云明知在一切經後諸經猶文此經如以三摩地一切諸經為諸佛秘藏文三者法華并今經為即心歟經䟽同以第三劫為真言行故大師又以天台同淨菩提心故以小乗三乗為所開也三義中前二義為勝矣謂若分叚者舉從緣生法者問分叚變易聖教常言若言所顯對若顯色等舉分叚生死也况下文舉我我所等又處界攝無為彼等非緣生法若爾何何為句乎荅結文既云一切分叚中非隨一也况復守護經云謂此心性於一切相若形若顯等文大師以今經文同彼文然於一切相文當今謂若分叚句一切相言豈非句䟽釈以法待因緣生必有差別相故即此意矣但若言可讀如訓也又我我所於緣生法所起故無為依他所依故且属眾緣生歟或性宗以上為無為躰一故能迷妄心亦云遍計所執故云緣生歟或約多分就依他為𢝰句歟當知一切色塵等者有二意一者顯形外云一切色塵是表色也取捨屈伸等非一故云一切是解經境界句中問表色是有情攝合掌打縛等令表示內心故故慈恩釋云表謂表示表自內心示於他故文可在下內身五薀之中然上文釋今色云色本非情文故大師釋云謂或顯色或形色若色受想行識乃至顯形如文可知自下即是表色也取捨業用為作等故文何荅上舉顯形下舉五境其中間所示色塵非表色何乎但色本非情者指顯形非解境界句况上既釈六塵法境中有心心所法寧但云非情乎聲字義釋出三色證故境界句通六塵故且除之也又內身者頌䟽十一云第二內外門自身名內所餘他身非情名外或約十二處辨眼等五根名內色等五境名外文內外分別非一何為難矣又大師釈云顯形色等色內外依正具文表色通器界歟然彼依正不二故云爾歟或今教意三摩耶身等有發心修行義故云爾二者青黃長短等廿種色對顯形云一切色塵也其躰雖一開合異故故俱舎云色二或二十文既云色本非情故上六塵舉非情邊准大乗意法境中今取極畧極逈等而非取心心所等歟下五薀有情故情非情相對若不爾似繁重歟守護經云謂此心性於一切相若形若顯若復色薀受想行識若復色塵聲香味觸若有執受若無執受若十二入若十八界如是等法觀察推求竟不可得文私云若復色塵等文當今境界句然不舉法境可思之或書冩悞歟般若寺抄云薀處界中及三界男女顯色形色逈色表色中皆不可得言也文准此釋一切色塵中亦攝法處逈色歟乃至現在一念識者問今此一念者妄心歟真心歟荅可妄心歟所以然者凢今宗意雖直約諸法令識其心為令觀心易成且指一念妄心也謂於三科簡却界入復於五薀中除四薀取識薀從麁至細漸畧義豈真心乎又薀不攝無為性相所判故天台要釋一念三千云的指一念即三法妙中特取心法也應知心法亦就迷就事而辨文天台既談事具三千秘宗豈述真心三諦乎所謂眾生念念妄心悉從緣生故即假也緣生無性故即空也此空有即不二故即中也此三諦遠離断常一異等論故云遠離論也此三諦即字有空不生三義故云至於本不生際也此一念三諦義同天台一念三千故大師以如實知自心證第八住心云一念心中即具三諦以此為妙文天台十不二門云良由無始一念三千以三千中生隂二千為正國土一千属依依正既居一念一心豈分能所雖無能所依正然文已観諸法實相次明観於我相者諸法局依円不通我歟百法論云何等一切法云何為無我文准此釋者若能執所執遍計所執能取所取歟若不爾者何云但有假名矣如長爪梵志等者智論第一云舎利弗舅摩訶俱絺羅與姉論義不如婦俱絺羅思惟非姉力必懷智人未生乃爾及生長如何生憍慢心出家作梵志入南天笁始讀經書自願言我不剪抓讀十八種經書人見抓長長爪梵志是人以種種經書智惠力故摧伏諸論師已直向佛所而語佛言瞿曇我一切法不受佛問長爪汝一切法不受是見受不佛所質義汝已飲邪見毒言一切法不受是見汝受不爾時長爪梵志如好馬見鞭影即覺便著正道愧慙仾頭如是思惟佛置我兩處負門中若我是見我受是負處門麁故眾多人所共知云何自言一切法不受今受是見此現前妄語是麁負處門眾人所共知第二負門細我欲受之以少有知者故作是念已荅佛言瞿曇一切法不受是見亦不受佛語梵志汝不受一切法是見亦不受則無所受與眾人無異何生憍長爪自知負處即於佛智起敬信得阿羅漢取意私云雖作是見亦不受之荅長爪意雖受之𢙢麁負處故舉不受荅今約彼意許故云而受是見論云我顯受之可思之今亦如是取著觀空等者此文有二意一云以前外道清淨計類例長爪見也如者譬喻義也䟽第二以觀空智惠不離断常同長爪見故云云一云如長爪等者即舉作清淨計外道也如者指事也今亦下舉行者觀空智歟然二義中前義為勝生是清淨想者依經清淨文故彼豈行者想乎况長爪見不計𣵀槃之故即於以下明行者觀心也即是摩訶般若等者釈經乃至言也上雖舉我我所二科法未示六度万行等故云乃至也故釈云當知六度万行乃至心亦不可得文一切分叚句准謂若分叚句應句故問摩訶般若所明廣通三科等何唯云六度等讓彼矣如於隂界入等文非指般若所明乎荅隂界入義亦雖大品所明彼義既讓毘曇故今以彼為例而指大品六度万行也當知句端此意矣况所牒既乃至以下句不可通上三科也一切分叚句雖通三科今約六度万行邊故一切持三昧者䟽第十二云百八三昧五百𨹔羅尼門文持𨹔羅尼梵漢不同也是心常樂我淨等者下所舉八倒歟抄云八者外道謂世間為常樂我淨為四二乗謂永寂為𣵀槃則無常樂我淨為復四倒文若依此釈所離妄倒也又起信論釈本覺德云常樂我淨義故文又釈所對染云非常非樂非我非淨文釋論云此四種過以對量本覺躰中四種㓛德云云若依此釈舉四德四患歟復次如聲聞等者或云此文大分二叚謂秘密頓悟二門也上文雖明此意未分秘密頓悟二門故今更分別此二義也或云此釈對聲聞位顯真言行者法明道分位也云云私云前開小乗三乗漸次門而為今心實相也故上釈云或諸薀和合中我不可得或諸法從緣生都無自性彼言諸法實相者即是此經心之實相云云此意矣然今釈意對小乗三乗觀修而明真言行者觀行也未必開會義矣所以對聲聞我不可得而明真言心不可得又對三乗漸修而顯真言頓悟也或又次上釈隂界入義讓毘曇六度万行等指般若今釈對毘曇顯秘要義對般若示頓悟㫖矣戒定智惠者般若所六度等故問不可得言雖同我與心其躰別何為例准乎荅心上執之准我不可得歟猶如三無性矣問依円無性空其躰若爾今又心躰可空乎荅彼無性躰空執空兩門諍歟然雖躰空所遣是所執故今又情門故當執空義歟若約第四重無相者躰空義何無矣於八直道中等者智論八直道文八直道者八正道歟直正義同故准小乗性相八正道在見道位中法眼淨又見道得益故俱舎云修道位中近菩提位𦔳覺勝故七覺增見道位中速疾而轉道行勝故八聖道增文若依大乗者七覺見道八正修道也然玄𮚌釋云此八正道別修行相雖在修道躰實通餘見無學道世尊應無八正道故文大小乗意大異然今依小乗意歟問若爾法眼淨小乗得益何下云大菩提道中得法眼淨乎荅法華經既有法眼淨益何但小乗矣今經意初地法明道云法眼淨除障三昧云遠塵離垢歟又設雖法眼淨非法明道此位得彼益歟䟽下文中以初地法明道類聲聞見道故嘉祥義䟽云法眼淨有二一者小乗是初果二大乗是初地此難知也文又同師仁王䟽云無量人眾皆得法眼淨謂始證初地云云妙樂䟽記名同義殊文道暹釈莊嚴論判初地耳故知今法眼淨是初地得益也又義䟽云但眾經多明法眼淨是小乗而聞大乗作悟小果者有人鈍根雖聞大法無巧方便故證小果文天台釋云法眼淨名通於大小無生忍名唯局在大文如餘遠離方便諸菩薩等者或云今此菩薩者顯三乗一乗菩薩也一乗又經遠劫故故大師今經開題云佛華法華牛時歷三大云云又云告成三大為限云云漸次頓悟顯密差異故先師云經䟽并儀䡄等皆顯云三乗密云一乗故䟽第九云畧法有四種謂三乗及秘密乗文又五秘密經云若於顯教修行者久經三大無數劫或證七地廻向二乗道果取意若非三乗何有七地退之義矣就中人法二空觀專第二劫行也故䟽第二釈第二劫行云人法二空之相亦不當心文又超度人法有無二障云云又心之影像又第二劫也故䟽第七云觀薀阿頼耶乃至覺自心時約心之影像本不生故明種種法門云云大師八九二心同淨菩提心故又頓中有顯密故属頓悟歟又經䟽等意約天笁流傳宗故不許顯一乗歟私云漸頓雖異所到一處故第二卷云舟車神通至到一處文彼方便對治第三刧故顯一乗也次下釈入佛智惠有無量方便門云云入佛智方便豈非一乗乎顯一乗非直觀自心而漸次實相門故云心影像無𭁆又三乗者小乗三乗一乗也例如云通達三乗矣心之影像者相似觀智是初地淨菩提心真證觀智之影像故歟猶如釈論三賢相似觀智菩薩云幻化影像菩薩今名即心幻即此意矣又義三乗教談諸識所變影像故云爾也入佛智惠有無量方便門等者顯密相對也下文舉喻中冶人消石成金神通者土木即成金此意矣故守護經釈云凢餘顯家入佛智惠有無量方便門今此宗菩薩直以淨菩提心為門若入此門即是初入一切如來境界故顯家方便門而得一之名文私云一者彼經第一清淨光明門即當今經法明道也一切如來境界者彼經一切智智諸佛境界甚深三昧即今經除障三昧也如𣃥勒開樓閣門等者出華嚴經中具如先生大惠光明等者三句釈法明道三字也謂法者所照法性明者能照智明也行者起大惠而照法性是行者所修行也以此行見古佛所行之道故故起信論云謂一切諸佛所證之道一切菩薩發心修行趣向義故文謂法之明法明道故二俱依主也下照見心明道者心是能照智躰也心即明也持業立名心名之道故意取道故為所照也彼上文凢夫二乗不見古佛所行路簡彼而云見心明道故知意取道也今三字各別釈故以明為能照耳或心法並舉故䟽第五云若入此淨菩提門則見心法明道所謂古佛大菩提道文實上人云法明道者法者法性無量法性明者光明大惠光明道者諸佛所行之道謂此菩薩淨菩提心以覺心自本不生際故其心能生普照法性以大惠光明而見諸佛所行之道故其心名法明道也云云菩薩住此道時者此道者法明道謂住法明道即得除障定故云煩𢙉業苦皆悉除歟問經云菩薩住此修學等䟽云小用功力等住法明道後更修而非云得三昧耶荅除障定名依除五障然五障或云不入佛法或云不得聼法若不除彼障云何得法明道又明暗相違法住法明道位障猶存但經䟽文者雖定惠俱時且約三昧邊為顯頓悟義如常遠劫漸修云不久小功也故經下文云住此除一切障菩薩信解力故不久勤修滿足一切佛法文此又住三昧勤修滿法明道等之義歟一切佛法中可有法明道故又守護經釈云若諸菩薩如是了知即得成就第一清淨光法明門大日經初法明道任運得此不可思議一切智智諸佛境界甚深三昧大日經言菩薩住此修學不久勤苦便得除一切障三昧若諸菩薩住是三昧一切佛法不作功用任運成就大日經云住此除一切障菩薩滿足一切佛法畧抄既云任運成就未必更修歟或云文點可讀菩薩住此云云䟽文讀云因淨菩提心照明諸法故云云問法明道何位耶荅般若僧正云問何位爾名荅真言行者第十秘密莊嚴住心也若配餘教者等覺位行相耳問以何可知此等覺位也荅即五障也已次云當知行人則是位同大覺也文私云此意等覺妙覺一佛二名故作此釈歟然初地分證位也第二卷中菩提心為因判初地故又第七釈云到修行地即是淨菩提心初法明門例如聲聞見諦以後入修道位也文既同聲聞見道定知初地也又禪要釈得除障三昧位云得此三昧者名為地前三賢文准此文地前也然彼且就伏位云爾歟故彼要次下釈云依此漸進遍周法界者如經所名為初地文經者指今經歟譬如有人等者法譬相配者從有人至命終譬從妄起煩𢙉業苦又合中八万四千煩𢙉也從以明燈至塗相譬菩薩住此道時合中因淨至三昧是也從其人至喜樂譬清淨除也合中見八万至門故是也合中小用功力者釈經修學不久勤苦合譬中良醫診之至傷處也但彼知識教誘此自修行功自他雖異俱除障法明緣力也故知准譬意小功力是非法明以後之行也是中障有五種等者此五障釈經一切障也故知一切障言通五障名也然理趣經云一切障及煩𢙉障法障業障文及字起盡一切障似為別障下三障是今五障中三也若爾四障歟或別合論實三障歟般若寺抄五障中注前三云以上煩𢙉障也注後二云以上所知障也云云或云初三障即三道後二障業苦隨義離分立此歟又此五障雖一人所具且令人易知故約別人明之也或雖皆具有約偏增示之云云私云隨人具闕有不同歟又生障約異熟果邊立之後二障依等流增上果開之歟謂法障不得聼法依障法之緣第五妨修般若依差他道機皆今生果似前業故故唯識䟽第八云或似先業後果隨轉者即無記果與自業相似與不善為同類也唯此一法非餘皆是假實增上果然假名等流非同性果故以異性法非同類故由令他命短自命亦短相似之義假名等流實業所感文演秘云唯此一法等者唯此報業相似一法假等流文准此今又因果相似假名等流實增上果實業所感故故知實是生障攝理趣釈中以法障攝餘二障開合隨冝歟又依華嚴地持等約滿果開立歟謂根本煩𢙉等者䟽第二云由無明故生五根本煩𢙉心乃至若更約上中下九品等乃至成八万塵勞文私云五根本為初五度數成百六十心此百六十心約九品離分成八万四千也俱舎論以十煩𢙉為本展轉開增成八万四千也造諸重罪者䟽第十七云如聲聞有四重禁戒於此中乃至是偷蘭非重禁也如前三世無障㝵戒中先令不捨三寳又令不捨菩提心此即菩薩真四重禁也文私云顯乗律藏所判聲聞四重婆羅夷非偷蘭然對自宗四重禁彼猶偷蘭也為言偷蘭此云大障善道能障善道堕𢙣道婆羅夷此云断頭若犯此法不成比丘故或云今釈對堅住菩提心戒之人故作是然就今釈未發心真言行人不可犯四重矣無暇之身者八無暇之身也即八難也故梵古迹下云八難者有八無暇也謂三𢙣趣北州長壽天生盲生聾世智辨聡佛前佛後彼無修道故名八無暇亦名為難彼是報障文私云報障與生障名異義同也無修道故等者𢙣趣受苦無間北州等受樂無間無佛道修行之餘暇義歟無垢稱經第五云七以除八無暇法普攝一切無眼有情文兩不和合等者智論第六十八兩不和合品云復次湏菩提聼法人欲書持般若彼羅蜜讀誦問義正憶念法人懈惰不欲為當知是菩薩摩訶薩魔事也湏菩提法之人心不懈惰欲令書持般若波羅蜜聼法者不欲受之二心不和當知是為魔事釈云一切有為法因緣和合故生眾緣離則無聼法人信等五善根發故欲書持般若乃至正憶念法者五䨱心故不欲等文私云書持般若乃至正憶念云修般若也所知者修般若也今障彼故云所知障歟聽聞正法是十法行隨一故中邊論云講聼聞讀誦書冩供養轉思惟受持修習十種法行各差別故文若爾聼聞既有書冩受持等不爾乎荅智論同卷云或時師慈悲心發故欲令書持般若第子信等五善根鈍不發故著世間樂故不欲受書持乃至正憶念少多聼受讀誦不能究竟成就故但名聼法文大品魔事品者誰兩不和合品所兩不和合義菩薩魔事故今䟽從所云魔事品也例如淨影之釈云七漏之義如七漏經𣵀槃經七漏故云爾耳去來窹等者問眠是第六識有漏心相應法淨菩提心第八無漏心何俱起又昧略為性障觀為業豈與大惠俱起又唯欲界繫法非定相應何與除障三昧相應又淄州釈云除五故無眠文何荅第八識發心未定設許非純無漏有漏散心位何不俱起矣餘師釈非今五障歟准相宗八地已上第六識純無漏七地以前通有漏心故可有眠歟智論七十三明阿毘致菩薩云復次湏菩提菩薩摩訶薩乃至夢中亦不行小善道文既云夢中阿毘致位可有眠也或容有釈歟非實有眠歟即與諸佛菩薩同等住者謂初地淨菩提心位得佛智一分故云爾故釈論云初地菩薩內得正智外得後智一分智用與如來等文今位同大覺者此意矣若不爾者何云然非究竟乎問法譬相對月體是得佛譬也尤可約智躰也况菩提心論明十六大生又約月躰円闕耶荅若依月躰無增减義具縛猶同等何云分同次下然亦明漸漸增文約明用一分論同等也例如釈論中無明用因位雖断躰唯佛断今又約智用也菩提心論彼約月躰增减故云円滿無㝵今云明漸漸增彼此意殊歟或又彼論云其一分明相等文彼又約明用歟又法譬相對者然字上下相對分明上法舉用譬舉躰下譬分滿俱舉法但示究竟法譬互顯歟或又亦字所顯躰位許一分明用歟或云若約本有邪定猶具始覺智用起時本覺智躰分顯故躰用俱得佛名歟或理云躰智為用歟乃至第十五日等者智論九十四云如月十五日雖同為月十四日不能令動大海水潮菩薩亦如是雖有實智惠清淨不能具足諸佛法故不能動一切十方眾生月十五日光明盛滿時能令大海水潮菩薩成佛亦如是放大光明能照十方國土眾生也云云三十六俱胝趣者䟽第十一云如大乗中欲界有三十六處文今又明三十六俱胝性類或云嗔行偏多或云嗔性薄然嗔唯欲界是大小乗所判且就欲界判三十六處歟俱舎論云地獄傍生鬼人及六欲天名欲界廾由地獄州異文彼但開八地獄四大州故成二十處今八外開八寒四大州外開八中州故成三十六處具如先辨矣梵本嚕多是大聲乃至又兼多聲者智證大師抄云其意未詳文意隨方諸趣言音一世界猶無量差別况多世界乎對此方文字難具也為言通塞之相者所被機可度云通不可度云塞也如釈論道種智中廣明者非但意根等者上云復由意根淨解語言𨹔羅尼故云非但等歟前約六根淨義雖諸根淨非互用也今就諸根互用故問相宗六根淨地前得之天台十信得之今何云初地乎荅上兼下故或前文復由意根淨者非不互用故重釈成也或今經不立地前位故初地皆得歟法華論云諸凢夫人以經力故得勝根用未入初地位乃至一一根中悉能具足見色聞聲知香味觸等諸根互用故云云玄𮚌有二義一義如唯識論一義云若加行力分所得者地前亦得也又天台真位六根從初住得之今教不立地前故初地得之歟問諸根互用方如何荅唯識樞要有二師義初師又有二義一云一一識躰轉用成多非轉法躰云云一云𢙢壞法相但取自境皆是實境所取他境皆是假境云云後師云一一根處遍有諸根各自起用非以一根得一切境以諸根用各遍一切故名互用云云燈云然師意存第二解云云真𫤭云存初師第二解為言第一解有壞法相之𭁆後師解有非互用之𭁆也復次如上所等者此為釈經文諸佛護持句云復次也但六德次第相釈是預諸佛外護專依具內德故悉唱上內德而為外護來由故非為重顯上六德鉤鏁歟或又成前起後歟發五神通者問法明道菩薩五三妄已断何但五通不發漏盡通依之大品經徃生品云菩薩住六神通云云爾何荅初地菩薩五三妄雖已断㣲細妄執猶未断故隨在何教謂於自乗果可得漏盡故依之䟽第十二云此五通即是八地菩薩自在之用比於二乗之通如用日光等彼螢火也文又智論第二十八云五通是菩薩所得今欲住六神通是佛所得文仁王經云復有菩薩四眼五通皆成就取意佛眼漏盡果位所得故菩薩位除彼矣又即身義云若有真言行者現身獲得五神通漸次修練不捨此身進入佛位文此又不得佛位前但得五通也但於大品文者智論二十八釈此事云第六漏盡通有二種一漏習俱盡二漏盡而習不盡習不盡故云皆得五通漏盡故云住六神通文會大品如菩薩品徃生品五通六通相違而作此釈漏盡故雖得六通名實是五通習未盡故當知案顯密諸經論意於因位不可得六通但二乗得六通約自教談也依人執漏盡故復次行者以內具等者自下釈經雖處生死等文也此文鉤鏁上文作釈此菩薩內具六德外被諸佛護持故處生死不染煩𢙉而成利眾生事也常在無間獄中者容有歟例如論中云常在人天及乃至身命而不惜或云處於生死而無染著等者金剛薩埵五秘密荼羅也今淨菩提心即初地金剛薩位故處於生死是不住𣵀槃義而無染著者不住生死也同一月輪同一蓮臺更問矣住無為戒者䟽第十八云有為戒者此是修行方便故云有為戒也然無為戒者即是本性戒非是修成對此有所行方便故言有為然深觀即同無為戒也文第十七持明禁戒品云然戒西方音有二一者此是修行戒也謂淨身故湏行之尸羅二者沒栗多尸羅戒有二謂本性戒及制戒也性戒謂淨諸根今沒栗多湏成就故制之也是長時所持之戒沒栗多是有時願之戒文抄云梵語尸羅此云清冷此是本性具足戒也性自湏持今持明戒梵語沒栗多此譯云制戒為持明者方便制之文私云䟽文可讀乱達尸羅是性戒沒栗多制戒也故知有為戒者今制戒歟無為戒是性戒故十八云由住有為具惠方便能得如來無上吉祥無為戒文又云以此五戒為首而能成一切智地如來之位故云得無漏戒性成也文或云依前十七文三摩耶戒師受戒故非無為戒即四重十重禁也云云此義不爾既云佛性三摩耶戒又云發菩提心戒佛性菩提心豈有為乎况今制戒云有時願之戒然䟽第五釋三昧耶戒云又對二乗律儀有限量故以三世無障㝵智為名也文具如下辨梵云尸羅是清冷義也者䟽第五云若尸羅者但是清淨義也文大師戒序云戒有二種一毘奈耶此調伏二尸羅云清凉寂靜是則由大慈悲行願故自然離十不善心離十不善業即受調伏戒由離其心故心中得心清凉寂靜是則尸羅之戒亦是饒益有情之戒文基師義林章第三云尸羅梵語此曰清凉行𢙣之人𢙣於尸羅名𢙣尸羅非尸羅𢙣名𢙣尸羅古人解曰尸羅戒義尸羅者即𢙣戒文道宣戒䟽第一云初云尸羅此為戒戒有何義義訓警也由警䇿三業遠離緣非明其因也如古所傳防非禁𢙣以解於戒然戒通善𢙣律儀亦然不可偏舉以釈戒義如經論中多從善戒約義得名文元照行宗記第一云古中先出古解然下局如屠殺者受𢙣律儀以殺為戒但對境名戒通禁名律儀戒既通𢙣古解局善即是偏舉文私云慈恩南山俱破古師其義㔫右然今䟽及大師釋就善戒故勿違諸義耳戒序䟽中各出二梵名尸羅名同南山釈中出三名序二名外舉波羅提木叉䟽中沒栗多餘師釋無耳如是獲得除障三昧時等者䟽第十七云又定惠等合為一名為等能住如此真實乃至等即是住佛戒也文等引又定一名也住等即住佛戒之義如今得三昧是尸羅故之要由白四羯磨者羯磨經云白四羯磨三十八法文同䟽第一上云亦以一白三羯磨通為四也文濟緣記第一云律云有三種羯磨白羯磨白二羯磨白四羯磨㨿名名立本無差降文私云依此等釈一白三羯磨云白四羯磨也問白四羯磨作法何荅四分僧羯磨上云正授戒法戒法難生眾緣湏具諦受當如是作法開導令起上上品心至誠大德僧聼此某甲從某甲求受具足戒此某甲今從僧乞受具足戒某甲為和尚某甲自清淨無諸難事年滿二十三衣鉢具若僧時到僧忍聼授某甲具足戒某甲為和尚白如是大德僧聼此某甲從某甲求受具足戒此某甲今從僧乞受具足戒某甲為和尚某自清淨無諸難事年滿二十三衣鉢具僧今授某甲具足戒某甲為和尚誰諸長老忍僧與某甲授具足戒某甲為和上者默然誰不忍者三僧已忍與某甲授具足戒某甲為和尚竟僧忍默然故是事如是持作此法已應為記持邊受與此無異私云從大德僧聼至白如是一白也又從大德僧聼至誰不忍者三度云三羯磨也古師第三羯磨之字時云發戒躰也新師如是持之持下云得戒也方始得生等者聲聞戒是作一白三羯磨第三羯磨時始得戒躰然方便守護而至盡形壽壽盡戒躰隨亡若犯不至盡壽或汙戒或捨戒汙捨者或云戒躰雖相續不增長云汙戒戒躰已失不相續云捨戒也或云戒躰雖相續不增長云捨戒𮕱㣲云汙戒也彼顯乗菩薩戒雖盡未來際若有犯緣汙捨又有始得今無為戒是本性戒而非師受故云不由他得非始發無表故云非造作法也若雖有犯緣更無汙捨故云常無𭁆犯故下䟽云三世無障㝵智戒也問大小顯密諸戒受持作法是同所以三種戒同對五師受之和尚羯磨教授證戒同法也但聲聞具戒依現前僧而受之顯菩薩戒梵十重禁瑜伽三聚淨戒及密佛戒皆對不現前僧受之然顯戒釈迦為和上文殊為羯磨彌勒為教授十方諸佛為證戒十方菩薩為同法密戒大日為和上餘四師同前此依小野廣澤三摩耶戒私記大師戒序異此矣既師受義同何云不從師得等乎依之䟽第五云是故次令發菩提心然後為授三世無障㝵智戒此受菩薩戒法別有行儀也文又大師戒序云龍樹菩薩戒有五種云云人天聲聞緣覺菩薩三昧耶佛戒第五三昧耶佛戒今所授者也文此等文明鏡者歟何荅今佛性三昧耶戒法佛自然智故法然本具戒故䟽第五云然佛戒者即如來自然之惠文然凢夫不知此理故遇灌頂師示受持儀式也故經䡄中明受持作法耳又䟽第十七云此本性戒自然合行故𣵀槃云性自能持戒也文令弟子知此理歟問戒惠其躰別何云自然智故戒序云非只戒異定惠亦別文何荅無畏禪要云前雖受菩薩淨戒今湏重受諸佛內證無漏清淨法戒方可入禪門入禪門已要湏誦此𨹔羅尼𨹔羅尼者究竟至極同於諸佛乗法悟入一切智海是名真法戒也此法秘密不令輙聞若欲聞者先受一𨹔羅尼曰唵三去昧耶娑坥鍐此𨹔羅尼令誦三遍即令聞戒及深秘法亦能具足文私云前受菩薩淨戒者真言十重禁也無漏清淨戒者發菩提心戒即佛性三昧耶戒歟准此釈十重禁即似非三昧耶戒矣又䟽第十七云如三世無障㝵戒中先令不捨三寳又令不捨菩提之心此即菩薩真四重禁也若菩薩不生如是心捨離於佛即名破於重禁文又云復次菩薩自有十重戒如前不殺等不在其數乃是偷蘭也云何十耶其四如前所更有六重也并為十也文又准此釈四重十重禁皆三昧耶戒歟然前無為戒云無𭁆犯今云破重禁未詳又灌頂文云如聲聞菩薩戒有四重十重三昧耶戒亦有之然其名同義趣別何者聲聞菩薩四重如常今此戒四重者亦如後文此又四重等為三昧耶戒歟聲聞雖無十重有四重故云也今案諸文意今佛性三昧耶戒是菩提心躰故一切功德無不具足故或云戒或云智或云定無違故䟽中或云法佛自然智或云能住等引即住佛戒又云四重禁等也又菩提心論云勝義行願三摩地為戒云云此則三摩耶戒又三聚淨戒也戒定惠功德無不周備矣又灌頂文云此戒名三昧耶唐平等言平等者身語心三密平等亦名三部三部者佛蓮金也取意又䟽第五云令行者深觀十緣生句了知三業畢竟不生法性自爾常無動作是名無為戒也文三部三密中何德不攝矣小乗七支大乗三業上防非止𢙣功能云戒躰今宗三密平等即戒躰依法不平等故起𢙣三密平等故眾𢙣即德云戒歟但戒序釈者且為別三學一徃釋歟非謂不今戒攝也戒序四重十重名同義別者四重及十重數名歟一一名躰顯密大異故顯四重是盜殺妄也密四重者捨三寳捨菩提心等也十重又顯出梵經密見大䟽等又禪要中但明十重與䟽異戒序中四重十重別舉四重異經䟽十重同禪要瑜伽中舉菩薩不共四重梵十重禁中初四共四重後四不共四重大日經中明謂謗諸法捨離菩提心慳𢙉害眾生四重矣經䟽及序等四重不共四重也此等異勿令混監矣小野廣澤三摩耶戒私記不同出之小野四重十重俱授廣澤唯授十重歟問若爾顯密戒躰別乎荅䟽十七云聲聞緣覺有十善戒外道世天亦有十善戒今佛復菩薩十善戒有何差別耶隨上中下智所觀自成種種非一切眾生本原戒而有差別也取意戒序云戒有五種人天聲聞緣覺菩薩三摩耶佛戒十善戒通五種有淺深耳取意他宗釈云戒無大小受者心品云云問十善戒通三摩耶真言行者亦受持乎荅䟽釋學處品十善戒云先受此戒已住斯學處然後令聞如來之秘密之行此戒未造漫荼羅法前即合為也文不假受持常無𭁆犯者受者受戒遇師受得也持是隨戒謂持有二作持止持也犯又有二作犯止犯也作自恣布薩云作持之云止犯止殺盜等云止持之云作犯也𭁆者捨義失捨戒躰故即捨戒義也犯者破義通汙及捨故知犯廣失狹也准瑜伽論苾蒭五眾律儀五緣故捨一由捨所學處故作法捨二由犯根本罪故三由形沒二形生故四由善根断故五由捨眾同分故近事戒有三種捨緣前五中第一四五也但第一前苾蒭必對人作法捨此不作法自捨為異近住戒有三緣一由日落已後餘同近事第一第三矣五十三菩薩戒有二種捨緣一捨無上正菩提大願二現行上品纏犯勝處法又更有二緣七十五勝處法者波羅夷名也此云断頭四重罪也太賢古迹下瑜伽云若諸菩薩毀犯四種他勝處法數數現行都無慚愧深生愛樂見是功德當知名上品纏犯非諸菩薩蹔一現行他勝處法便捨菩薩淨戒律儀不同聲聞一犯即捨又上纏犯雖𭁆淨戒經即懴亦得重受不同聲聞如斬頭者現身不能復入僧數文私云上品纏者前數數現行等四緣具足也四緣中一緣二緣等不具四緣中下纏也𮜋一現行者非數數故闕初緣義歟所謂行殺盜等依四緣具闕分上中下纏也制止八㒹等者鈔云䟽制止八倒者八者外道謂世間為常樂我淨為四二乗謂永寂為𣵀槃則無常樂我淨復為四倒若謂二乗無常樂我淨之四德此約與也若二乗既不如實以其該如䖝食木偶得成字故况不了生死實相即是𣵀槃安能離於八倒哉文私云外道常樂我淨四倒二乗非常非樂非我非淨又為四倒故成八倒也依抄所釈本㒹字可倒字歟遠離二邊者二邊断常二邊即邊見也前八倒是邪見攝歟所謂住無為戒有二德一實智增明二逮見中道謂依實智增明故制止八倒依逮見中道故遠離二邊也又梵經上云是十戒躰性制止八倒一切性離一切道清淨文古迹釋云防十𢙣時制止有為無為八倒有無性離一味清淨也文今又云由住此戒其意同矣又今無為戒初地淨菩提心第八住心也然彼云一道清淨文義自故大師彼經開題云一一章叚歎一道清淨教文可思之迦亦云等者抄云此𣵀槃經佛告迦善男子謂四倒者於非苦中生於苦想苦生樂想無常常想常無常想無我我想我無我想淨不淨想不淨淨想是名㒹倒乃至迦菩薩白佛言世尊我從今日始得正見世尊自是之前我等悉名邪見之人也文私云非苦生苦想乃至淨生不淨想是二乗四倒歟苦生樂想乃至不淨生淨想即外道四倒也故云𭂫夫二乗不能决擇等也是中惠不正等者准此文今邪見可通五見歟五見皆正見所離故又百法論中五見云不正見故筆削記第一云心行理外名邪見非但不信因果而已此乃𭂫夫外道二乗但名為邪故迦言我等自此已前皆名邪見人也文此釈同今䟽但外道別舉今有𭂫夫中歟又唯識演秘云䟽邪見言通𭇥五見文義章六云問曰五見斯皆是邪何故撥無偏名邪見成實釈云此見重故偏名為邪文空謂不空等見非撥無見故俱舎十九云撥無因果名為邪見文又五見隨一邪見也但撥無云邪見是俱舎意也故唯識論第六云三邪見謂謗因果作用實事及非四見諸餘邪執如增上緣名義遍故文又隨一邪見亦正見故不正見攝故又䟽第十八云邪見者謂各各持於其本法之中即見理不正順邪道者皆是也若謂無果無因即壞三寳四諦法今盡撥無此事即是外道宗計也文即時無㝵智等者䟽第五云菩薩所以發心攝受方便學處皆為成就如來清淨智惠於一念中了達三世諸法無罣㝵故其有住斯戒者乃至初見心明道時即有如是不思議㔟分以此戒親能發生佛惠又對二乗律儀有限量故以三世無障㝵智為名也文准此釈無㝵智者三世無障㝵智戒即三摩耶戒前無為戒也於一切法者所達三世諸法也又䟽云自然智是如來自覺自證之智昔所未聞未知之法自然了了現前無所罣㝵故以為名文准此文如來自然智云無㝵智歟前文既云以戒生佛惠戒即非智歟或又戒即惠也故䟽云然佛戒者即如來自然之惠文二義終一無違耳雖無量天魔等者抄智論云一切菩薩皆願欲得薩婆若魔來欲壞作是言是薩婆若空無有所有但諸師誑汝耳諸法者六波羅蜜等趣薩婆若是法亦空薩婆若亦空無所有相是中無得薩婆若者汝唐受辛苦云云私云此文魔來雖亂菩薩未見現佛身又雖云六波羅密趣薩婆若未六度歟或智論六十云佛言有所得般若波羅密是為相似般若波羅密之文而為今證此又不可真佛所未魔所矣起信論云則為諸魔外道鬼神之所惑亂亦作如來像若布持戒忍辱精進禪定智惠文釈論云修行囙雖有無量而不出六種波羅蜜是彼像為修行者六資粮乱行者令入邪文此文既天魔現佛身六波羅蜜亂行者故此文歟不久勤修等者前住法明道不久勤修得三昧今又住此三昧不久勤修滿足佛法云云若爾法明三昧佛法漸次得之歟謂有二意或准冶人神通頓漸譬三德雖同時得開而令易知故作次第也例如彼云法在一心必次第也故知三種皆顯教漸修故云不久勤修也故釈法明道云若如實知即是初發心時便成正覺又釈三昧云若得此三昧者即是位同大覺也又今文云以是菩薩初發心時即名佛故云云既發心成佛同誰云別時功德矣或約初地中入住出三心作三重淺深歟䟽第七云此修行地即是淨菩提心初法明門例如聲聞見諦以後入修道位也文法明道既見道後二如次修道住出位歟守護經云若諸菩薩住此門已任運得此佛境界甚深三昧住是三昧一切佛法不作功用任運成就畧抄佛境界三昧者除障三昧也龍樹以為如冶人等者智論三十二云利根者即知是諸法皆是法性譬如神通人能變瓦石皆使為金鈍根者方便分別求之乃得法性譬如大冶鼔石然後得金文今以冶人神通人類顯密行人也爾時執金剛等者一本開題自下為正宗已上為序分𭂫序有二意先釈意以現瑞竒特事而為今經別序故故上釈云即是將此經示不可思議神通瑞相也文今義意以三句文為序分以九句別為正宗也三句大宗一經大意故為序也故今釈云如上佛經之大㫖心實相門略已周備云云如華嚴諸經等者或云如者譬類從功德句返讀之猶如下文云如般若中等也華嚴經云菩薩於生死㝡初發心時一向求菩提堅固不可動彼一念功德深廣無涯際如來分別窮劫不能盡文又今經生廣大功德者擬功德深廣其性常堅固又同堅固不可動文故知例准也或云如者事也從經字返讀之意云如諸經但歎發心之德而未明心密今經直問如實知自心義故云心密也為言故䟽第二云餘經廣歎沙羅樹王莖華菓今此經中唯明此樹王種子生育因緣稱大日經王非為此乎云云但華嚴經文雖云求菩提未云如實知自心又雖云堅固猶未字不生際性故又下文云亦問異今直問矣又諸經中上求下化菩提心皆相㒵句攝歟若已發生其性云何者經文但問發生未問已生性又依此釈可為二問歟或云性者躰也躰顯云生離躰何明生故問生即成性也故佛荅文云其性常堅固知彼菩提生文此意矣或云或本生字也若爾非二問矣生字誤歟多本皆性字也如般若中廣明等者智論七十三云湏菩提白佛言世尊以何等行何等類何等相貌知是阿毘菩薩佛告湏菩提菩薩摩訶薩能知𭂫夫聲聞地辟支佛地是諸地如相中無二無別亦不念亦不分別入是如中聞是事冝遇無疑何以故是如中無一無二等故是菩薩亦不作無益語但利益相應語不視他人長短湏菩提以是行類相貌知是阿鞞致菩薩摩訶薩云云七十三四兩卷中廣明撿可見之經願識心心勝者或云識七轉識次心第八質多心也後心第九識于栗多心也或云識字通二心也故下文云識心人中也文點識乃心心可讀歟或云識字唯属初心而顯能證智義次但云心所證理也牒文作釈分明故私案是心自覺之智者心字釈經心自覺之智釈經識字也可讀識心故知二心字皆理也下識心人中者識者智心者理也但心自證心者初心依有戝名智歟唯是下二句釈生字佛既下二句解上句勝字唯願之一句釈下句字必能等三句出自然智之德也或境智俱妙句解勝字勝一字𭇥人法二義歟㣲相者㣲妙相貌義也指第二句也大勤勇者佛是精勤勇猛人故云佛之異名也即歎德也問有幾心次第等者大䟽抄云住地及時節經幾次第言也文心諸相與時者大䟽抄云即問其菩提心差別相及經幾時與得究竟淨菩提心也文此釈未祥今六十心百六十心相狀云心諸相超度彼地前三劫時分云時歟九種住心心續生地前故云相續勝進及相續下釈經時字也時無別躰依法而立故依第三句心續生明時也時分妄執雖異所到同初地故云而得究竟淨菩提心也故第二云舟車神通至到一處文初劫云淨菩提心少分增明第二劫云淨菩提心更作一轉開明等今望彼前二劫初地淨菩提心滿故云究竟歟或究竟字反可讀歟地前淨心皆是加行智分齊生死所殖善根歟功德聚者或云俱舎薄伽梵為功德聚自宗率都婆云功德聚俱是淨菩提心功德也大䟽抄云即問此菩提心功德聚幾何文當以何行云何修行等者淨菩提心已前三密行云行晝夜四時精進修云修行也依此三密修行得初地淨菩提心云無上悉地也故下文云若不以三種秘密方便何以得此淨菩提心云云又上釈云此教諸菩薩真語為門自心發菩提云云又儀䡄云晝夜四時精進修現世證得歡喜地云云故知真言行者生死具縛行云及彼行修行也問所得既云無上悉地是可方便究竟第十二釈無上悉地云所謂如來一切智智當知諸成就中㝡為其上無與等無相比也文一切智智果是究竟故又得彼果之行豈非大悲万行故第三結釈云已淨菩提心竟從此已下明進修方便及悉地果生也文此意非云住心品明淨菩提心具緣品下根究竟義乎荅今文是究竟淨菩提心故云無上非方便句也下釈住心品中雖粗明度三妄生淨心未示三密進修方便并依彼密行得淨菩提心悉地果故云爾也故具緣品䟽釈云上品已約種種心相對辨一切智心竟然此妙果以何方便而能得至耶故此品次明入澷多羅行法文一切智心者淨菩提心也彼云此妙果又得彼果方便非生死行乎况入荼羅行法者下文末代我等弘通七日作壇等儀則也此寧非未断惑薄地之行乎下文一切智智者又今一切智心也求一切智智之心故今一切智智者有戝立名矣當知望生死行而雖名妙果對根究竟還是因句也故上釈云此菩提心為後二句因若望生死善根則名為果云云前後釈義明鏡歟然或人進修方便悉地果生為根究竟句悞甚歟亦可分為二句也者般若寺抄云二句者以何行修行云何修而得無上悉地宮也文私案經文但云及彼行修行未舉所得果故知行躰與修行為二句也彼抄下釈或可分為十句云即第七句中有行修行二義以此可為分二也文此釈順今經文矣謂眾生異熟識心者前業所感異熟果心也法相宗第八識云真異熟識也唯識論云一謂異熟即第八識多異熟性故文殊異之心者行者轉勝心云殊異前諸心差別之相者謂於妄心中六十心等相別今淨心中從轉勝前後云殊異若爾心續生何別彼約續生義此取前後殊矣故三劫文荅心續生并心殊異於能越淨心具此兩義故又荅心相約所度百六十心差別相也或異熟識心約流轉此㨿還故云殊異歟所度妄心是眾生異熟識心等故能度淨心即行者殊異心故大䟽抄釈經心心云初云心者眾生異熟心也次云心者瑜伽行者菩提心也云云牟尼者是寂默義者第十二云牟尼者寂嘿義也常寂之土㣲妙寂絕幽深玄遠不可以言之如是法界寂然大度法唯佛一人究竟清淨故名牟尼也文或可分為十句者第七句亦分為二句故成十句也先師云今此九句問三句中於因句成九句矣佛荅三句中菩提心句一部經已畢或又修行句當根句無上悉地者究竟句歟䟽十二云悉地是真言妙果為此果故而修因行故文入大悲藏荼羅等者具緣品中明入多羅之儀則是淨菩提心以前行故荅修行句也問成就悉地品釈云從此以前真言之果從此品以後次第得修行入修之方便從此為首也文何荅具緣品行得初地果地前行也悉地品下修行入證者大悲万行等歟故無違矣百字果等者經第六百字果品云若入大覺世尊大智灌頂地自見三三昧耶句文䟽十八云殊異者謂如來三三昧耶之身文三三昧耶身云殊異未詳又經云復志求三𦴭三菩提句以知心無量故知身無量知身無量故知智無量知智無量故即知眾生無量知眾生無量故即知空無量文䟽云求者樂欲次復樂求者還修菩薩道也文大師住心論中以心續生之相文證竪十種住心又以今文成撗塵數廣多准此釈䟽第三句問十住心續生今第九句示塵數心殊異歟謂無量心識智智無邊等義自宗不共之談故云殊異歟又經云秘密主由心無量故得四種無量得已成㝡正覺具十智力降伏四魔以無所畏而師子吼文此文荅功德句文歟十力四無畏佛不共功德故無量應度眾生者未來應度眾生也故上釈云時金剛手為令未來眾生具足方便無復餘疑故以偈問佛文問䟽第三云此中大會即是法界荼羅所攝應度眾生文准此文非會座眾乎荅六大無㝵故九界迷情即等流法身九世相入故未來眾生即今經聼眾歟况彼上文云為滿足彼諸未來世無量眾生為救護安樂故文畧有七義故名大乗者抄云此與瑜伽雜集等或同或異教絕設不湏和會也文理趣釈云大乗有七義一者法大二者人大三者勝解大四者意樂大五資糧大六者時大七者究竟大文嘉祥十二門論䟽上云地持論中七義釈大言七種者一謂方等經菩薩藏此是教大所以前明教大者要根本由教然後方得發心修行二發心大謂發大道心三解行大至道種姓解行純熟名解行大四淨心大初地菩薩得無生忍其心清淨名淨心大五眾具大謂大福大智通為佛道資粮名為眾具大六時大謂三大阿僧祇劫修行七果大謂大菩提果文私案兩師釈同今䟽七義歟但三四五七其名雖異其意是同第三信解者就十地立名云信解行地故彼解行約廽向得稱云道種姓故今䟽意不立地前故解行攝於初地故無違矣第四金剛寳藏又初地故䟽第二云從初地即入金剛寳藏故文此乃同初地菩薩文矣此金剛寳藏即自性淨心故云性大又云淨心大此淨心即菩薩意樂故云意樂大也第五妙乗者福智二嚴到佛菩提之所乗故云依止大此又為資粮故云眾具大又云資粮大也但地持瑜伽等七義皆所攝也枝末也今䟽并理趣釈七義根本也能攝也故大師釈云能攝大乗者根本躰不二大乗所攝大乗者二重三十二大乗文即是不生而生等者住心論十云心續生之相諸佛大秘密者謂從初羝羊暗心漸次背暗向明求上之次第云云又䟽第二釈八心等畢合今文矣准此等釈十心并十住心續生云心續生又云大秘密然不生而生義理事不二之談全非心續生之義又真俗相融是性宗以上盛談之何云大秘密乎又心續生義局第三句豈為九問乎或云䟽家宗家各㨿一義矣又心續生文𭇥別二義故所謂不生而生義不𡱈第三句通菩提心生等故為况我今悉開示之敷演廣可亘九句一心應諦聼之勸觀寧局第三私案凢於十住心有二意謂淺畧深秘又淺畧中又有顯密顯於各各乗謂極果未知後住心淺畧中密及深秘十心皆心續生次第也此十住心續生是不生而生生而不生續生故此等義顯乗隔聞故云大秘密也又性宗以上各於自乗雖談事理即一義未知十住心續生義故未名秘密矣又大師御意不生而生義雖廣今取十心續生不生而生邊故或又十心續生一宗大𮈣三密要樞故殊就第三句存并勸觀歟故二師無違矣今不生而生取水波譬下轉緣起十住心等續生上轉修行彼此豈相順矣又凢夫二乗云外道他緣以上皆属密為知心續生者若爾何九種住心云不知人乎荅水波譬隨冝寳鑰釈極無進密藏云水無自性遇風即波文故無違他緣乗又依圓不異門故雖似不生而生義性相終別故非理事不二義覺心以上雖真俗無㝵未知十種心續生故知𭂫夫二乗二義俱闕故䟽舉偏論通示也或又䟽約不生而生義他緣等属密論約未知十住心續生云外也若依開會意外八心等皆不出字門故云秘密也故䟽第二云如㝡初種子心生其實即是不生生以是堅固性故在眾生識心未至自心實際雖展轉滋長然亦不出阿字門故云心續生之相諸佛大秘密取意問若爾今宗談性相歷然義可無不生而生義何荅今宗事理元各別不歸理而事本生而不生相本不生而生理又爾經云生住等諸法常恒如是生文可思之問若爾生常生乃至恒𢙢同外道常見歟荅小乗云四相有實相宗云色心上假立性宗以上云一心緣起法今宗性佛性然四相故猶異一乗一心緣起四相何况同外道所計乎重意云𭂫心續生文大論有三意一者不生而生義今文是也九句荅也二者十心相續義如第二卷釈三者十住心續生義如住心論矣後兩義第三句別荅文也若不爾何云或後問先荅耶𭂫夫二乗兩種外道者䟽第十九云今此諸佛之秘一切外道所不能知然外道有二種一者世間種種外道二謂佛法內有諸外道也以雖入佛法中而未能知如來之秘密猶是邪見心行理外道故亦名外道也此法乃二種外道所不能知此佛法中外道即二乗中人也文准此文及第二釈常外道二乗也又准雜問荅中於內分內內內外可通九種住心歟或云九種住心皆云凡夫又云外道釈尊自云我是𭂫夫又䟽不了內證名為外道云云又世間三心云外道出世六心云二乗六心雖異大小二乗故又世間三心出世二心云外道內外外道故四箇大乗云二乗三乗一乗異故或云表製集中以諸顯教云聲聞小乗登壇學處以密教云菩薩大士灌頂法門以彼思此顯諸乗皆属今小乗歟譬如空等者准前文空三義則經如空文𭇥二意謂無量顯無邊際義故同空無邊際義如字但被空讀之釈中加大字顯無邊際義也但不釈無量義其相顯故歟或小分相似文反顯法無量歟次譬如下取空畢竟淨邊喻心本寂無相義也若依此意如字及無相字讀之故知如空三字讀之猶如釈論中三平等本文三讀之但下合經不舉如空文約初且属上句歟或又下文空譬釈家私加之不染已下經文但明法也若法譬合者從無始已下二句合譬中本初以來釈經本來二字也無有一法等二句合譬中四障不染與八風不動無有等六字讀之可合二文釈經不染汙并第二句也餘文可知耳為此寂光等者抄云寂謂心之實相本自不生永寂無相光者即此心相靈知不昧又寂是三昧光是大惠行者得除一切障三昧生大惠光明即能普照無量法性故曰寂光也文私云此目近詞故上本來寂無相等也故初釈為勝矣心佛現前等者即初地淨菩提心位也䟽第二云然行者以何法入此門哉故經次云所謂空性空性即是自心等空性上文無量如空乃至正等覺顯現即喻此心也文准此文一道無為云正等覺歟又第三云以此中道正觀離有為無為界極無自性心生即是心佛顯現故云正等覺句文依此釋極無自性云心佛顯現矣今文又真言行者法明道云心佛顯現耳故知正等覺文𭇥顯密義又具表義矣然此信力等者今此信力者白淨信心非生死中信也即依供養行修行所得淨菩提心也此中供養有二種等者智證大師抄云下文明諸外供養未見內供之文其意如何和上荅曰觀心之供此內供耳問若爾以一華令遍法界中供養諸佛凢如此皆外供之觀何以之為內供若金剛頂宗有內外供八供今此部中無其義耶荅彼金剛頂宗有內外八供今此部中不有其檨者內法以為供養大㫖者觀心供養也問觀心之義例於金剛頂尚通內外若約深秘釈一一皆廣法界之義今不疑之尚約胎藏無可指內供之者耶荅今此中言內外者外香華為外供養若以運心加此華香為內供養所謂觀心之供養也文又經第五云供養有四種謂作禮合掌并及慈悲等世間與華香從手發生華奉諸救世者文䟽十五云供養畧有四種一是供養香華等及塗香等乃至飲食此是世間供養也以物獻也二者合掌謂禮敬也此是印也三慈悲四運心謂想香花滿法界運心已即用合掌也并慈悲三事皆運心也文私云此中初一云外世間事供故後三云內出世理供故下文當廣者指此等歟又供養法䟽下云供養有三一者外供養謂香華飲食及燃燈莊嚴道塲等也二行供養謂如奉行及禮拜持戒者等也三者理供養謂心住法躰無外攀緣也文私云三中行理為內歟又常五供理供事供云內外歟出具緣品等中私案供養行修行等二句荅前第七問歟謂供養行修行如次荅及彼行修行歟上一偈半荅相貌下長行荅心相續此文非荅彼第七句何乎但釈家不属則文分明故又與前文相違釈依供養行修行所得白淨信心即菩提心相貌故也或有言等者抄云此下十三行䟽是形一類執禪者依本智性無作無修鏡本自明不拂不瑩即禪門絕無𭔃宗𭂫聖等法皆如夢幻都無所有本來空寂非今始無凢有所作皆是迷妄石頭牛頭皆示此理今所破者即其人也畧抄一行本是禪師更入真言而舉禪門義破彼矣猶如龍樹交外道眾學彼宗而破耳無畏三藏禪要非點示點開之義妙樂釈云暗證之禪師燒勝定之手云云如以四種不生等者自他共無因四不生也鑛中金性譬在纏菩提心雖復在因等二句真言行者以四不生觀在纏出纏心躰無增减猶如金性在鑛出鑛無增矣行人下合若不以等譬三密方便合利𨯒灰水等合消融方便也今此三密行淨菩提心以前薄地行前云生死所殖善根是也具如先辨龍樹阿闍梨中道正觀等者中觀論云因緣所生法我即是空亦名為假名亦是中道義文准此文以從緣起故者因緣生義即俗諦也無生義成者即是空義即真諦也若爾何云中道乎荅彼宗三諦各有中道今取無生義故真諦中歟今意以此無生中道正觀證今宗四不生義而禪門龜㝹無生為失歟汝謂等者指前執禪者歟又以緣起證三密方便若爾俗諦中又存歟所以生而不生故雖依四不生觀不生而生故用三密行寧同無相無行乎又如世人等者前明破禪門無相無行而用三密行自下對諸乗漸行顯自家頓證故上智論云如治人以種種方便消融鑛石然後成金若神通者能使土木之類成金躰文又第二䟽取世人仙人巧拙難易之譬又此意矣此等文明鏡也然抄中此文猶對執禪者云云𢙢不會文意矣妙性窮極者佛華法華以初地淨菩提心為極果故云爾歟下金寳者依密行所得菩提心也初心極果雖異得寳是一處故䟽第二云舟車神通至到一處文但世人無秘密方便等者是二地上大悲方便也下云若以大悲万行是也意云顯乗人依一心行得至淨菩提心以此為極故更無根究竟行證故云不能得耳次淨菩提心下其有服食等合以大悲万行合服食之以神變加持業合住壽長遠等也此三句中究竟句也以今秘密方便大悲万行勿亂淨菩提心以前三密行矣不應已下一道極無以淨菩提心為究竟也世人為妙性窮極是也寳鑰釈第八心云一道無為之真理名初法明道於諸顯教是究竟理智法身望真言門是則初門取意又釈第九心云是心是因望前顯教極果於後秘心初心文問今此兩節釈解經何文乎荅解二句文前對禪門釈供養等義後對諸乗述彼義也或又上釈供養行修行句故云秘密供養行門等下解從是初𤼲心句故云不應保初心為極果也初心言故破以初心為極果耳我名我有者下云我我所是也謂我是躰用都無有名無實故云我名我有者我所我之家所有故云我有也經愚童𭂫夫者通三心句歟第二第三亦名愚童嬰童故又䟽上文云愚童凢夫小有能信非第二等何有此理矣但證第一心者約執著我名等別句故以下荅心相續義也者此意八心十心相續云心相續義也故上所牒之文但至離於断常也住心論第一今文云善無畏三藏釈云從此已下十種住心佛荅心相續之義也文此意十住心相續云心相續若爾兼三劫文與䟽意異何云無畏釈云依之智證大師云或人立十住心判一代時教不合䟽意不足為論文或云文點可讀十種住心中世間三心荅心相續故䟽論無違矣又義䟽意非不存十住心義故第三劫終云此經從淺至深廣明心相皆為開示菩提心本末因緣若但依常途法相不得言諸佛大秘密我今悉開演也文既云從淺至深非十住心淺深乎又本末者九種云末第十云本若此經文局十心續生何在三劫終合彼文矣問三劫初釈云亦是荅諸心相及心殊異也文今又云廣明諸心相全非心相續義就中除心續生之相句乎况十心三劫心相續次第中間何交六十心乎荅已下言通三劫故三劫正雖荅心相續兼荅諸心相殊異故云亦是歟中間六十心雖非心續生兼顯所度妄心何𭁆又諸心相言亘㧾別故廣明心相者指心相續句歟故䟽第三住心品結云已淨菩提心諸心相竟文或亦是荅諸心相又心相續歟大秘密之稱非依心續生何云秘密乎智度云世間等者智論第三十一云無始空者世間若眾生若法皆無有始今生從前世因緣有前世復從前世有如是展轉無有眾生始法亦如是如經中佛語諸比丘眾生無有始無明覆愛所繫徃來生死始不可得破如是無始法故名為無始空問曰無始是實不應破何以故若眾生及法有始者即墮邊見亦墮無因見遠離如是等過故應眾生及法無始今以無始空破是無始則還墮有始見荅曰今已無始空破無始見又不墮有始見文經中佛言無明䨱愛所繫者智證大師記云和上釈訓云無明與䨱愛已上今疑若無明是能覆之物愛此所繫之物歟和上云可然也若爾無明尓覆波礼愛尓所繫礼天土訓之耶荅無常也云云愚童義如前者抄云上䟽云謂六道凢夫不知實諦因果乃至堅執不捨故以為名文𭂫夫者正譯等者異生正譯𭂫夫義歟梵名可尋决矣寳鑰上云𭂫夫作種種業感種種果身相万種而生故名異生文如十六知見等者住心論第一云大楞伽經百八部邪見瑜伽論十六計智度論十六知見文今依智論歟鈔云謂外道雖有九十五種大意莫過十六異論一因中有果宗二從緣顯了宗三去來實有宗四計我實有宗五諸法皆常宗六諸因宿作宗七自在等因宗八害為正法宗九邊無邊等宗十不死矯乱宗十一諸法無因宗十二七事断宗十三因果皆空宗十四妄計㝡勝宗十五妄計清淨宗十六妄計吉祥宗畧抄此十六知見異論十六別類外道宗計猶小乗二十部異計矣住心論三云外道有九十六種大外道九万三千眷属外道為十六文智證記云和上云我我所執呼十六見是別別稱也可訓我我所執如十六知見等乃云云妄分別所由者唯識論等者妄分別是能遍計妄心是非所執我我所矣又准上文界趣同性我云妄執則我我所直妄分別歟如彼偈言等者此四句偈智論文也但彼論第三句無於字有則剩字可撿䟽證本矣瑜伽我者等者智證大師記云瑜伽我者謂學定者云云此文何由似內道乎荅凢此文者約學內教者不觀心之實法也文䟽第七云若行人不解正因緣義而修證諸禪以當計著自心以為內我若深求此中至順自然撥除因業唯我性獨存乃至無一法入心而證空定㝡是世間究竟之理文今瑜伽我當此計歟問彼第三心之此證第一心何云同乎荅此計有二意若約効彼行因成勝果第三心攝若依計自心為內我又第一心攝也故䟽第二云前是不識因果之心今由善根熟故𭭉彼行因成勝果不同前計也取意此意也地等變化等者智證記云今疑下結文云略舉三十事爾乃合地等變化貟不足也䟽文昧昧訓地等之變化若依䟽及先大師可分為二若爾可言地等是執五大為真實之法者此計或言地為以下可言變化也意地等能變化為万物之因未詳云云䟽第七云若行人不解正因緣義而修證諸禪必當計著自心以為內我彼見世間万法因心而有則謂由神我生設令不依內我必依外我即是自在梵天等也文准此釈瑜伽我者內我歟自在天是常等者三論玄云有外道云大自在天能生万物万物若還歸本天故云自在天若嗔四生皆苦自在若喜則六道咸樂然天非物因物非天果蓋是邪心所畫故名邪因邪果文如十二門中等者十二門論龍樹云問曰眾生從自在天生苦樂亦自在所生以不識樂因故與其苦荅曰若眾生是自在天子者自下全同同論䟽下云嘉祥云問曰下第二救正通傷慈之難荅曰下第三破救有二難一者猶提提前無慈難文有大慈子不識㤙終自與樂而自在不爾亦應但供養下作恩報不勉苦難若言不識恩故而苦者今報㤙供養則應得樂不湏修福文唯識論一云有執有一大自在天躰實遍常能生諸法彼執非理所以者何若法自生必非常故諸非常者必不遍故諸不遍者非真實故文又若自作等者論云全同䟽下云復次下以果徵囙破眾生之果既由自在自在之因應更有所從變覆結之文陶師子埏埴等者陶師子者作土噐者也埏和名耶湏埴和名波爾䟽第七云如埿團輪繩陶師等和合故有瓶生文十二門論同之次云時與前時等者智證大師記云經云及時者與前有時其別如何荅推文意云自在天者若流出及時也爾乃有人或計自在天是常能生万物或計從手功出一切法或計時是自在天之所作歟云云問若爾前建立可云自在天之心出一切法歟荅今結云皆自在天種類也彼不爾故御本記云建治四年二月七日於醍醐寺中正院加點畢金剛佛子頼瑜
