body:
  text: 䟽卷第一之二如是我聞等者智證大師抄云如是我聞者已開門為阿難我若尒阿難非大日侍者何𥠾我聞阿闍梨云法界通開義無其妨難文文云此經我聞或云金剛薩之我非阿難之我者此未詳私謂毘那對於聲聞何非阿難我耶示明文佛心經下卷有毘那對告阿難之文煩故不具引既有對告攵何故非阿難之我耶但世學者未見此文守株費見而已云云開題有三釋初金剛薩之詞次毘那親言也者佛云尒也三法尒有无人增减云云私云准諸經例且以金剛手云為𦀽集者也故六度經以惣持藏為金剛手受持秘藏記為結集者矣故秘藏記云結集修多羅藏阿難毘𡰱耶藏優婆離阿毘達摩藏迦栴延般若藏文殊秘密藏普賢是守護經文顯教中云佛度後普賢文殊菩薩𭅩阿難於䥫囲山間結集諸經是即惣守護經所別耳云云此釋以阿難而似為顕密五藏通結集者若結集伴通阿難歟若依結集主者金剛手也故安然釋云若結集主者是金剛手若結集伴者亦通阿難也云云文智證口云法界通開義者此意歟又准開題蔵記文唯金剛手結集也既云顯教中依智論等歟彼論云迦阿難於王舎城結集三藏為聲聞藏文殊阿難於䥫囲山集摩訶衍為菩薩藏文此論摩訶衍者但顯大乗故文六度經五藏傳持文惣持金剛手受持全非阿難傳持也若尒何撿六度經明文撿佛心經一金薩結集義况對告人未必結集者恐似守株費智耳但秘藏記惣別釋是於前四藏作惣別也又普賢金薩顯密異故理趣釋云是菩薩本是普賢從大日如來受金剛杵之故名金剛手文奥州得一於真言宗舉十一箇未中結集者疑云大毘那經初云如是我聞今疑此經釋迦如來度後八百年時毘那自對普賢執金剛手等而尒時阿難迦等久已度誰言我聞若言龍樹菩薩結集者復從毘那佛口傳普賢從普賢傳龍樹如何龍樹𥠾我聞若言普賢我聞者不尒普賢菩薩非二乗凢夫肉眼所能見何交雜人間結集云云或云今經者法界宮之无年月而疑者龍樹菩薩出時以為經之時出阿難迦生疑是大過也又龍樹結集不足起言如是我聞是金剛手語也開題云之語也我金剛薩從大日尊聞也文文云通阿難胎藏釋迦院烈座故專可結集也文二乗凢夫不見普賢者普賢觀經四眾八部得見普賢可悉之云云私云八百年龍樹出時是𨶒浮流布之時代也非正之時故義訣云經篋廣長如床厚四五尺有無量頌云云正時豈有經篋乎故知金剛薩結集文龍樹誦出也斯則當干楞伽所如來懸記之時非啻𡧱密藏宗㫖亦闇違顯經明文矣言交雜人間結集者智度論釋顯結集云佛度後文殊彌勒等諸大菩薩亦將阿難集此摩訶衍取意文殊彌勒等既與阿難俱而結集𢩁普賢何懷疑若不許者又顯經結集同疑經初五義等者抄云如來法有五成就言如是我聞者信成就也一時者時成就也薄伽梵者教主成就也住如來加持法界宮乃至生大樓閣寳王等所成就也其金剛名曰空無垢等眾成就也文私云此釋以通序五成就為五義歟䟽既經初五義釋下而成加通序之㫖若五義非五成者何作此釋耶故抄釋五成就畢般若燈論亦有六義文既六成云六義五義應是五成或又直就經釋五成義非釋䟽五義文歟故直𤗊經文不云䟽云可悉之又義云以五字義為五義非五成也次下文如智論中廣明文然撿智論於如是我聞一時文作五語三句釋故智論第一云如是我聞一時問曰佛經何以故初𥠾如是語曰佛法大海信為能入智為能度如是者即是信也我者佛弟子等雖知無我隨俗法我非實我也聞者非耳根非耳根能聞聲亦非耳識亦非意識是聞聲事從多囙緣生一者問曰佛法中數等法實無隂界入所不攝故何以言一曰隨世俗故有一時者有人言一切天地好醜皆以時為囙畧如是我聞一時五字別義竟文私云雖有六字合如是為信一義故云尒也既智論分明定知五義非五成就也所以一時已上讓智論薄伽梵已下𤗊釋故私更加一解云通序六句中前五句云五義歟今所𤗊如是乃至法界宮文六句中五句有之故故准智論文六成就開信與聞而為二故文良賁仁王經䟽云今依智論惣六義一者信成二者聞成三者時成四者主成五者所成六者眾成畧抄宝師𣵀槃䟽慈覺教王䟽同之故知五義者六義中前五義也但眾成就不讓智度者眾成中又𦂶所成而文不一純故且除之歟重意云五字為五義可為正智論畧如是我聞一時五字別義竟之文分明故別本云如是我聞一時五種各各義畧竟文但至覺𮏑良賁釋者慈覺教王䟽云今謂諸師雖依智論惣六義未明所㨿今記論意令易可知然案智論如是我聞一時𤗊為一叚開為五種結為三句謂一如是二我三聞四一五時是為五語如是為一我聞為二一時為三是為三句聞即我聞一是時數故故結為三句也但論㫖難尋依順先聖且明句數文阿闍梨云者或金剛智歟䟽主詞故或善无畏也記者詞故邏僧都義云善無畏云云或云䟽第五云阿闍梨言少時囙重病困絁神識徃𧨜司文此無畏御事也故所所阿闍梨者无畏也經文𤗊釋之外加囙緣由來等別之時置此言歟大日經供養法卷云右阿闍梨所集大毘那成佛神反加持經中供養儀式具足竟傳度者頗會意文不思議䟽下云右阿闍梨已下譯家語也此中阿闍梨者聖者文殊師利也文准此釋可金剛智歟大本有十偈等者開題云此經惣有三本一法尒常恒本諸佛法𭦟荼羅是也二分流廣本龍猛所誦傳十頌經是也三畧本有三千頌雖頌文三千經卷七軸也文別本云二分流本金剛手所誦傳十頌是也文都部陁羅𡰱目云依毘那成道經大本十偈可有三百卷經唐国所譯畧本七卷文䟽下云然此經流布𨶒浮提畧有十偈若十佛𠛴㣲塵大眾各各廣演身口意差別法門則無限量文私云今文大本者非分流大本中大本分流中廣本故云大本歟下畧有十者望常恒本故云畧歟海雲記云此經夹有三本廣本十偈若依本具譯可有三百餘卷已來廣本在西國不到此土本經畧本四千偈更有畧本二千五百偈中天笁国大阿闍梨集令持所傳者四千偈經文今經序云大本十頌𭤧秘而密藏今所譯者二千五百頌云云私云開題三本與記三本是殊開題常恒本䟽下文廣演身口意差別法門則无限量云云此歟然記中四千偈并二千五百本䟽中全所不見也文經序畧本雖同記一本亦背䟽文耳傳法聖者等者開元錄第九云大毘那神反加持經七卷第七一卷是念誦法沙門輸波迦羅唐言善無畏曩時沙門無行西遊天笁學畢言㱕迴至北天無幸而卒所持本有勑還北在西京華嚴寺取掌無畏與沙門一行於彼蕳得數本經還遂為沙門一行譯大毘那經其經具足文有十頌今所出者撮其要取㝡沙門寳月譯語沙門一行筆受云云十偈中取要為三千頌今七卷經是也故開題云頌文三千經卷七軸文理實三千頌應是前六卷第七卷於六卷中撰出供養儀䡄故故開題云此經一部七卷就中前六卷有三十一品文又海雲記云依本譯成六卷又惣集一部教持念次第共成一卷成七卷共成一部云云但密抄中此經七卷三十一品者七卷在三十一品之內故云尒若前六卷外更存第七卷者應云此經七卷三十六品故知第七卷是六卷所攝也問傳法聖者誰人耶准錄中今經本无畏從无行相羕傳法聖者無行歟或龍智金剛智等歟其故開題中十頌或云龍猛誦出或云金剛智誦傳彼二聖誦傳是分流廣本故知今三千頌龍智金剛智等取其要歟文十頌雖云龍猛誦傳亦不妨金剛手准知三千頌通龍猛歟問龍猛誦出未審大日經序云北天笁国勃嚕羅國中有大石山壁立干雲於其半腹有藏秘法窟數千捧經出暴風怱至吹一𣑽篋下來樵夫取之獻王王歡喜與之善無畏無畏得之所七卷取意又海雲大毘那大教相羕記云三藏善无畏云此法從毘那佛付属金剛手菩薩經數百年傳中度那蘭陁寺達磨掬多達磨付属中度国三藏釋迦善無畏文造玄記同之又大日經廣大儀䡄下奥云此法摩訶毘那付属金剛手金剛手次傳付属那蘭陁寺達摩掬多阿闍梨阿闍梨次属中天笁國主釋迦善無畏云云此等皆為無畏相羕不云龍猛誦傳耶凢大師依圎照貞元錄不空表製集等專以兩部秘藏之經偏存䥫流傳之㫖又龍猛論中載今經若不傳則何引自造論乎故表製集四云昔毘那經以瑜伽无上秘密最大乗教傳於金剛薩金剛薩教百嵗𭤧得龍猛菩薩而授焉龍猛又數百嵗乃傳龍智阿闍梨龍智又數百嵗傳金剛智阿闍梨金剛智振錫東來傳於和尚自法身如來至于和上傳此道者六人而已云云出生義付法傳血脉同之貞元錄云龍樹菩薩第子名龍智年七百餘嵗今猶見在南天笁國傳授金剛頂瑜伽經及毘那惣持陁羅𡰱法門云云龍猛入室龍智既以兩部經為傳授法門龍猛若不誦傳則龍智何為傳授法門乎依此等心大師住心論中舉兩部陁羅畢云若尒誰傳初從大日如來至青龍阿闍梨有七大阿闍梨耶云云又金剛頂經畧釋云此經及大日經龍猛菩薩從南天䥫中誦出文既尋大師血專表製集等文造玄海雲相羕違不空血邪正可悉之况海雲雖唐家人師是惠果二傳之弟展轉設有悞大師惠果面授之弟子親受何有疑乎文惠果行狀云常語門人曰金剛界大悲胎藏兩部大教者諸佛秘藏即身成佛之路訶陵弁弘新羅惠日並授胎藏師位釰南惟上河北義圎授金剛界大法義明供奉亦授兩部大法今有日本沙門來求聖教以兩部秘奥壇儀漢无差悉受於心猶如冩瓶云云付法傳云孔宣三千德行四人廣智數可八箇就中七人得金剛界一部青龍則得兩部師位文當知不空以兩部秘奥獨授惠果惠果以二界師位偏授大師又請來表云和尚告曰我先知汝來相待久今日相見大好大好報命欲竭無人付法必須速弁香華入灌頂壇云云惠果六箇可中獨賞大師而云猶如冩瓶屢蕳餘人而云無人付法同門賢弟猶不比肩况孫弟海雲等成同日論哉次付經序者石窟梵篋无畏直相羕之歟然今文阿闍梨傳者无畏也彼云傳法聖者探要三千頌云云此意无畏前有相羕人龍猛龍智等也若不尒者違䟽文故不用之依之安然又付二過不用之一違胎藏相羕過二違不思儀䟽過云云又實範上人更出二過一違䟽及開題失序二千五百頌違䟽及開題三千頌欤二違開元貞元錄失二錄意无畏所訳本曩時沙門无行所持也經言三蔵乃持典故相違也次儀䡄奥記者彼法潤弟子惟謹記錄歟彼即法全同門非東寺相羕况彼儀軓非大師請來也何為難南天北天之相羕自門他門之諍論也然真言秘教以東寺為正故大原長𡩷僧都四十狀云他上廣慶阿闍梨云伺習諸家灌頂無過東寺灌頂云云又小野纂要云兩部大法阿闍梨毘那根本最極傳法密廣智三藏從南天皈之後唯授惠果一人惠果和尚又唯授弘法大師不授餘人是故惠朗紹六為七不得師位義明可紹攝不謂入室不空惠果既不授之隨誰傳哉而他家與本所爭力猶如游复不聞張禹淡耳云云非啻自宗祖師獨𭞙亦是他門先德共許者歟問不空金剛頂義訳龍猛開䥫雖云誦出金剛頂百千頌未云誦持毘那經又不思議䟽中明今經第七卷由來云无畏三藏於金粟王下依聖加被感得供飬次弟法云云全非䥫本也何龍猛菩薩沗預如來之懸記云云專為顯密元祖何物不入其手乎况初地入證位𬾨法明道德何於兩部有所殘耶彼義訣中龍猛未入䥫前大日如來現其身授念誦法要云云此法要者大日經畧行也然其法力加持故以白芥子打開䥫扉前未得金剛頂經本猶誦傳之况既𮐃授大日經廣本恡何不授耶又於今經第七卷者凢雖有䥫本修持行儀未明故求聖加被更感得供養次第法也非六卷本外更有第七卷本歟依之第七卷初文云我依大日經王文又義釋云阿闍梨於烏仗曩国撰出毘那供養次弟法云云抄云阿闍梨者即无畏三藏烏仗曩国或云于闐國言撰者集也謂於大本中探取此品所有津要獨成一卷分為五分即此經第七卷也文或云感見撰出雖異大本畧行非有別本也故海雲記云依本譯成六卷又惣集一部教持念次弟共成七卷共成一部文若尒何以此譯難䥫本無乎又義此第七卷與要畧念誦經同本異譯而彼經龍猛到䥫下時毘那於空中為龍猛也彼念誦法既大日此第七卷无畏私撰乎故同題云大毘那佛要畧念誦經云云但我依大日經王者念誦經云我今依經要畧自利利他悉地法文大日指前佛云尒歟開題其㫖見義譯中撰出者以感得流通云撰出歟依大日經序无畏得北天笁石窟篋譯為七卷彼已有第七卷本何云私撰出乎或云義釋文溫古智嚴𭁡治時加人言歟二十卷草本䟽中無彼故若尒何必為南現復龍猛論中載供養法文若無䥫本者龍猛何引之且自門他家相羕作圖示之大師相羕血大毘那如來金龍猛菩龍智阿闍梨金剛智三藏一行阿闍梨大廣智三藏金閣𭇥光新羅惠超青龍惠果訶陵弁弘新羅惠日釰南惟上河北義圎義明供奉日本空海崇福惠朗保壽元皎保壽覺超海雲相羕次第胎藏界毘那佛金手逹磨掬多善無畏金智不空一行玄超惠果惟尚弘惠日悟真空海義滿義明義澄義照義操義愍文𮏑大遇海雲深逹義真法潤法全唯謹金界毘那佛金妙吉祥龍猛菩龍智阿闍梨金智善无畏不空𭇥光元皎惠朗天笁阿闍梨德美惠謹俗居士超梅曇貞覺趙如惠德惠果惠應惠則惟尚弁弘惠日空海義滿義明義操法潤義真義舟義圎深逹海雲大遇從賀文𮏑亮常堅智深法全文秘義照義愍義政義一俗居士吳殷造玄血次第大悲胎藏教毘那佛金手菩逹磨掬多善无畏一行禪師金智玄超惠果法潤法全宗遍明圎載圎𭹀圎仁智滿息怤造玄義真圎仁圎行深逹海雲大遇文𮏑金界大法毘那佛普賢金祖室利龍猛龍智金智善无畏一行不空𭇥光元皎惠朗天笁德美雅霄惠謹居士趙政喜貞惠清義曇貞覺超如惠德惠果惠應惠則縁惠元政造玄圎仁文悟惟尚弁弘惠日空海義滿義明義操法潤義真圎行義舟深逹海雲大遇文𮏑諒法全圎仁宗遍明圎載圎𭹀息怤弘𭎀文秘義一不空文義畧周者三千頌本文言簡畧義理周𬾨為言以非大經正本等者十頌云大經正本智證䟽抄云言不題通序者三千頌之本言今以例加之者例於十偈正本文問後人私加歟文以大本文加歟既上云以非大經正本等例大本通序加之歟中川序分義云十卷本智證裏書云此三千頌不是大本故𣑽文上不題通序今例十大經之本故加通序云云故此通序取加大本之真文也云云論師所解具有六義者佛地論第一云薄伽者謂薄伽聲依六義轉如有頌言自在熾盛與端嚴名𥠾吉祥及尊貴如是六種義差別應知惣名為薄伽如是一切如來具有於一切種皆不相離是故如來名薄伽其義云何謂諸如來永不繫属諸煩惱故具自在義炎猛智火所燒練故具熾盛義妙三十二大士相等於莊嚴飾故具端嚴義一切殊勝㓛德圎滿无不知故具名𥠾義一切世間親近供養咸𥠾故具吉祥義具一切㓛德常起方便利益安樂一切有情无懈癈故具尊貴義或能破壞四魔𭜨故名薄伽文私云此論是親光菩薩所造也今論師者彼菩薩歟文准理趣釋云又有六義如聲論所釋者聲論師云論師歟今此宗中薄伽是能破義者問今此能破義佛地六義隨一歟如何未必然問題云論師所解具有六義今舉其一薄伽𣑽是能破之義也文既云今舉其一非其中乎今能破義以智論舉四義中能破義為證又佛地中六義外舉破魔義故依之理趣釋云時薄伽者能義破義也所破者破四魔也又有六義如聲論所釋熾盛自在與端嚴等也文故知非隨一至大師釋者佛地有破魔成德二義中六義論師所解破魔准䟽釋彼云其一歟所以佛地云其一非六義中問慈覺教王䟽中會佛地六義智度四義云四六之義其㫖豈殊只是離合之異文佛地六義如上出智度四義者一有德義二巧分別義三有名聲義四能破義也既云離合異定知六義所攝也又䟽十四云薄伽義六義中前亦已解文是又已解者前解能破等義為六義中也尒何彼釈中四六配属時有德配端嚴吉祥巧分別為名稱義有名聲属餘三義全无能破配當故知四者言惣也應云三六開合異又䟽釋六義中者佛地前亦已解者能破義也亦言此意問今能破若取佛地能破魔義何蕳彼乎若依智論能破者彼又顕論難云今宗何或於佛地中引聲論頌欤故聲論師云論師六義以佛地破魔義云今此宗欤或佛地中六義但以句義釈薄伽未及字義然智論必以字義訓釈多名故二論相望智度義勝故為今宗義也故抄云謂彼顕宗之中具足六義都名一薄伽更无別義今此宗中以字義釋之復有多名故云今此文文以智論為顕密分別證况復龍樹秘宗元祖親光唯顕師故以大智明等者以大日大圎智明破囙海无明分位九種論妄識義也无明者智㝵煩惱者煩惱㝵煩惱即菩提故妄法元無生无相也如實智自心惠日出時无始間隔暗惑自除也是即非断煩惱躰除非菩提之間隔故云能破也故摩訶衍論云謂断煩惱心断除不起故文或大智者阿閦大圎智也淨菩提心位諸惑頓断故釋論亦云等者智論第二云復次頗伽名破婆名能能是能破怒癡故稱為頗伽婆問曰阿羅漢辟支佛亦破怒癡與佛何異曰阿羅漢辟支佛雖破三毒亦不了了盡𨐫如香在器中香雖无餘氣故在有如草木薪火燒之𤇆盡炭灰不盡火力薄故佛三毒求盡无餘𨐫如刧盡火燒湏山一切地都无煙无炭如舎利弗瞋恚氣殘難陁欲氣殘畢陵伽婆氣殘𨐫如被鏁初時猶不便文私云餘氣者習氣即不染无知是也大乗為法執所知障矣問緣覺断種故經云業煩惱株杌及無明種子文大師囙種心文何二乗俱云不盡耶相望不定故望聲聞雖断種對菩薩云未盡欤或二乗俱有利鈍故利二類断種鈍二人不然今舉鈍二乗經文大師釋利緣覺欤或種習別故抄云雖除種子未盡習氣文或種人執習㨿法執歟怒癡者上二如次貪瞋二惑也復次帝釋等者第二女人釋薄伽義有二義一息煩惱義二所從生義此中所從生者從所生子能生母立名謂人子所從母生故也䟽十七云如來即是一切善法所從生處文此文能生如來云所從生此為良證耳文義釋第七云次云三婆吠者是從生義如人胎分成就時出離胎蔵如來亦尒淨菩提心究竟圎滿時出過一切諸觀自然智生文今文无㝵知見人皆悉從是生者此釋同矣金剛頂宗等者非兩部隨一金剛頂宗望顕乗大日經宗亦金剛乗故云尒也又准下若解金剛頂十六大生釋可金剛頂部囙便明彼義也即此義者暫息永息等異故云尒非二義矣般若佛母者諸佛從般若菩薩生故此菩薩名佛母也无㝵知見人者佛也故䟽第七云如來无㝵知見在一切眾生相續中法尒成就无有减以於此真言体相不如實覺故名為生死中人若能自知自見時即名一切智者一切見者文得與相應等者私云與字可用此訓唯識論中有此例此者般若佛母也一切善心與此智相應而断煩惱故俱舎云若離擇法定无餘能諸惑勝𭤧便文問般若是惠男義何云母乎故秘蔵記云定則女惠則男雖父母共產生諸子名父不為母云云尒何荅若定若惠以能生義名母猶如悉曇男聲智惠字亦名字母也又秘蔵記上釋云㨿宗心有互出生之義或顕曰不得畧抄彼亦顕義也或又文殊云三世覺母可思之又秘鍵云定惠樹名云云此意般若通定歟有如是隱語者抄云不可直是般若佛母故言女人此宗多有如此隱密之語修學者應當觸所類例而思之耳文教時義第四云法相所立之佛密意謂詞深㫖淺未實義如大乗十法經聲聞成佛是佛秘密之教其實不可成佛而成佛是密意之故今真言教詞淺㫖深是名諸佛密語如觀音瑜伽中云男女二根和合能作佛事是以定惠和合生諸佛子非實男女二根和合是名言詞隱密諸佛密語畧抄又下文云如來自證之智設以神力加持亦不可示人文准此釋自證智云般若佛母歟輙不可示人故云不可直宣此智生无㝵知見人故云佛母此智會自證境直不可故以男女相應示之云如是隱語觸類思之也得與相應者理智合義也問相應於心心所云之何理智合云相應耶荅彼𫞐宗意也秘教理智又云相應故釋論中理智云相應俱有字義云理智相應故云報文䟽第五釋次徃第二院文云此中第二是隱密語耳湏口傳相付也文此釋未必如今文歟又薄伽梵者等者或云薄伽梵有三重釋皆異佛地論六義此三義大悲胎蔵三部曼荼羅也故初云今此宗中等矣第一正釋能破義金剛部意密也智有摧破㓛故第三又釋有名聲語密即蓮華部增益故云持資戝者第二復次相應義即佛部定惠相應理智具足人故是為身密矣此佛部從兩部理智生故所從生也此金佛蓮次第如先三身次第也釋論亦云婆伽言德等者智論第二云何名頗伽婆天笁語婆伽䄅言德婆言有是名有德復次頗伽名分別婆名巧用惣相別相巧分別諸法是故名頗伽婆復次頗伽名名聲婆名有是云有名聲无有得德名聲如佛者轉輪聖王釋梵護世者无有及佛何况諸餘凢麁文䟽抄云名謂名聲謂音聲或名謂名稱聲謂聲誉名稱普聞取意私云智論薄伽四義中今䟽舉三義為二義有德名聲為一義巧分別不取故或有德名聲離為二第二復次中又分二并第一能破可配五部五智矣三部五部開合異故麁分有三細分五異可思之言及尊者等者或義云言及尊者人直不其名也為言木𢟷義云及言扵尊者直不其名也為言能呼語聲至及尊者耳也此經中例云薄伽梵等者意云今經中以大智舎利弗等之例言之應云薄伽梵毘那也為言故理趣經云時薄伽𣑽毘那如來文或今經例大智舎利弗等正云薄伽毘那也為言經下時薄伽梵大日如來文今順此𭤧等者順唐言之文㔟應云大日世尊也為言故經下大日世尊文薄伽梵即毘那等者智證大師䟽抄云薄伽即毘那法身者自性身也佛加持身即受用身者自受用身也云云抄云䟽云本地法身者即實相法身也言次云如來是佛加持身者即應身他受用也次䟽釋成其所住處名佛受用身言如來心王等者如來是所住心王為能住如一切諸佛法儀式皆住於應身即本地身為教主也推㓛㱕本言法身依正尚无㝵豈佛身真應而𡱈定乎文光明山述意云法界宮中有疑然四種法身然自性身具他受用等用者是神力加持門之談也今此他受用雖疑然本有德令他見聞故云他受用亦名應身矣然他受用身親從自性加持身起同凝然故即與自性身色相荘嚴音聲法无二無別也故知自性身加被他受用身即令自內證法也文中川義云覺菀尚保法佛无形不知本地身法故強令住他受用身此經然於薄伽梵本地身依華嚴作二釋就三乗教云推㓛㱕本此復馳臆而會文依一乗教云真應无㝵則復駈自宗取義也文私云重譽心𦔳抄義云自性身加他受用身令自證法也實範抄二意俱非矣若尒實範意何身所乎荅序分義等中猶慈覺等自受用云若得自受用身之名必由自受法樂之義而作其教主不必從由彼身非自受用而為自受法能不受名自性身能亦受名受用身是故能唯自㓛所由為自受也取意此意自性身為教主也安然教時義云若菩薩大經蔵在華蔵界實是華嚴深密秘分其本未來此是舎那他受用其中亦有自證化他法門若大日金剛頂經等在法界宮此是自受用其中亦有自證化他文又信證僧正云隨自意四身有通別二義此又有二重通自性身通住餘三身法諸身法皆自性身所作故別者四種身各故又通者四身聖眾各住自證三昧故云通別者自性法身皆其主故獨一切故以為教主所以云別又二重各對通別可知之隨他四身通別義准上二門可知之大師御意以隨自意四種中自性身為教主伴通四身慈覺安然等以自受用身為教主餘三身覺超云他受用覺𮏑云他受變化也文私云此又取大師御意同中川義欤故寳鑰下云真言密蔵兩部秘蔵是法身大毘那如來與自眷属四種法身住金剛法界宮及真言宮殿等自受法樂故所演文此中法身大日者六大法身今䟽本地法身也故古德釋云薄伽梵者不二惣躰能加持无相法身位云云又云大日經教主能加持不二惣躰无相法身也文眷属四種身者四佛已下自性受用等四身欤即五種法身癈立欤故古德秘釋中引聖位礼懺二文立五種法身義矣䟽中以主成薄伽梵句釋本地法身自性身為教主不可異求矣况復以自受用身為所住所是所成句何為教主何况他受變化等乎問住心論十云薄伽梵者惣舉塵數諸尊德具釋如䟽住者顕能所二住言各各諸尊住自證三昧句如來加持廣大金剛法界宮者是則五佛之異名大日寳幢開敷陁天鼓如次配復次如來者大荼羅身金剛則三昧耶身法界則達磨荼羅身加持者事業威儀身也此通三種之身廣大者明各各身量同空法界言宮者顕所住處今此心王如來无始無終各各安住自法界三昧畧抄又金剛頂經釋云四種法身共陳此道文又古德釋云真言教主四種荼羅身文四義中以四配四身也此等釋廣通四種身若尒大師意何唯自性身乎荅序分義云私案䟽意薄伽梵即毘那本地法身即心王如來也論意薄伽梵者惣舉能住塵數諸尊住者顕能所住如來乃至宮者顕所住也所住中有二意一如來乃至法界者五佛也宮者定也謂以五佛之所證定為所住處二如來等者四種荼羅身也宮如前謂以四廣大身之所證為所住處准此所住故知能住薄伽梵者五佛四塵數諸尊德若尒薄伽梵是唯大日耶荅論意別䟽就㝡勝且云大日論盡能住故云塵數若就勝者論意亦可云大日一尊欤畧抄此意所住處舉五佛四所證定故以所住推能住可有五佛四身故薄伽梵句釋塵數諸尊也然䟽中大日者䟽論影顕也為言私云大日是普門躰故云塵數諸尊德猶如慈覺釋中金剛頂經一切如來釋大日或以薄伽梵諸佛通名今名大日故云尒非取諸尊也故論云具釋如䟽若與䟽異者何讓䟽耶但住處句配五佛者今經異顕經住所又如來身故云尒故大師秘經注釋云住所名則五佛秘妙德也文又䟽釋樓閣云還以如來種種㓛德寳王間餙樓閣寳王文閣既尒也宮何不尒乎宮又諸尊所證三昧惣妙德也為言次開題釋者自性土加持世界合論而云尒故次下句云十八瑜伽問示本趣文十八會中法界宮會外加持世界欤若論加持世界者今經亦尒瑞相土中以受用等三身為主故又古德釋既云四身何為難自性身有四身故四義釋一徃釋欤又義云次云如來是佛加持身者智證大師抄云佛加持身即受用身者自受用身也文般若寺抄云加持身者荼羅中臺尊此名佛加持身當報身也亦名字門道具足佛也亦名具身加持也其所住處者即通受用變化身故有四種法身也文信證僧正述意云能加持自性身住所加持受用反化等流時一切法門眷属皆住彼法界宮受法樂內證遍滿生死中利益眾生利他也爰知自性身住加持之時有自他受法樂一切皆无非毘那秘密加持文濟暹僧都云住如來加持通能所能加持唯中臺大日如來即能住自性身也所加持即八乃至第四重釋迦世天等自他受用變化等流也攝四重圎壇也取意此等釋意佛加持身為所加持所住處也文點云次云如來者佛加持身也其所住處也名佛受用身云云私案云佛加持身者上薄伽梵句中也彼句𭇥本地加持故本地无相位永上言語加持身是今經教主故云荼羅中臺尊也䟽第三云然以加持故從菩提自證之德現八中臺蔵身文此意矣此加持尊特理佛住自受用身等故云當報身也字義云理智相應故云報云云今所住又通他受變化等故抄云即通受用變化身故文或又胎蔵中臺加持身寄當金界中臺報身毘那故謂教主義同故云尒也本地自證位无言語故現加持身今經故云字門道具足也故經具緣品云此第一實際以加持力故為度諸世間而以文字文䟽釋云釋通世諦明起教所由文加持力既起教所由故本地位无法也又為顕此加持身即自性身求異受用以下加持身故云具身加持也然古德未知自性身中有加持身或云本地自證之而𡧱經䟽自證無言之文或云他受變化之而同顕教三乗一乗之佛恐隱䟽家之深㫖失宗家之本意欤當知以中臺尊故不壞大師自性身法之義又以加持身故不違䟽家神力加持三昧之䟽中云本地法身者先舉能現本地身為今教主所依䟽第三云菩提自證德第六云菩提實義是也具如前後文中弁矣文點云次云如來者佛加持身之其所住處也名佛受用身也云云先師蓮華院云經薄伽梵句䟽釋本地法身准諸經例是舉教主文句也住如來下示住所文言也故知以本地身為教主故大師以此文判自性身法然或云加持身或云符同湏陁會天者神變不改自性而有利他義又雖住加持自性敢不變如国王雖出外朝其躰无替故云如來金剛幻也又法身色相无比況物故且寄色究竟處示有色相非全隨類應同義耳木憣義云薄伽梵者理故云本地法身也如來者即智故云受用身自受用也此理智合互相加入彼此攝持而成他受用人躰云加持身也意云薄伽梵理住如來智之加持身他受用應身住廣大金剛法界宮云今經教主也為言今他受用者主伴各互受法樂故云他受用不同如常他受用又理智相應故云應身非隨機應現義也云云如來心王諸佛等者抄云如來是所住心王為能住如一切諸佛法儀式皆住於應身即本地身為教主也推㓛㱕本言法身文此意如來者可讀也教時義云諸阿闍梨言本地法身如來心王理法身即能加持身也其所住處名佛受用身是智法身自受用即所加持身令一切眾生見開悟三密是他受用身變化身也亦是所加持身也文此意令眾生開悟三密今文為他受變化也木𢟷義云如來心王諸佛者毘那理也其中者自受用智也能住理住所住智故云住而住也既遍一切加持力生者依理智合加持力生他受用應身人也理智同遍法界人法俱无分限故云遍一切所也即與下釋成生加持身之由也而以下釋他受用報身義也此報身義不同如常如先古德釋云大日經教主不二惣躰本地法身也文又私惟先師意云如來心王諸佛者本地身今教主羯磨身也其中者受用身即三摩耶身也謂理佛羯磨人住智身三形宮中也既遍一切等者從理佛法界加持力生三摩耶受用住所也即與下明所住宮與能住法身平等无二也斯則依正輪圎之法界能所瑜伽之佛躰故而以下而實依正无二為自受法樂且示依正之別猶如唯識論云雖此身土躰无差別而属佛法性相異故云云一切眾生者一切持金剛者等也所證三昧所法門非一故云根性不同也即此等者理佛云此是能住故智躰云所住即所居故問前云无相法身今何云具三密乎荅无相者𥾸𩔰教情妄假之相三密即就真言表德真實之躰故无違耳或无相不具故云无相也故䟽二十云此心即佛無非佛之相故云无相文論第三云若入阿字門悉離一切相離相之相无相不具文依此等意云无相故先德釋云无相法身位德无闕故自利利他断惑法等如此義有云云可悉之私云如來二字属上句經中如來是加持住所如來也為言心王諸佛住者中臺加持身也以此諸佛能住而住其加持住所受用身中也又義如來属下句文點可讀如來者心王諸佛之住而住其中也意經文如來者中臺加持身之所住也故加持身住其中也為言既從遍下釋所住如來名加持之由也既遍等者遍法界自證德以加持力生中臺蔵身也即與等者顕此所生加持身與本地身無別義也而以等者如來住神變加持三密法是遠為益未來眾生故云令一切眾生乃至種種不同也即此者今中臺蔵身也此身所住名加持所也為言故經第五云大日世尊入於等至三昧觀未來世諸眾生文䟽十六云毘那義上已釋之佛所以入此三昧者佛住畢竟无相𡧘之法以大悲故住於三昧令一切大會及无量眾生得見此大悲胎蔵荼羅荘嚴大會嚴妙之法即是於无相中而現有相雖復有相而從囙緣生即不生義同於性淨之法而令眾生各隨本緣見種種色聞種種聲獲種種法各隨心器如法修行有如是大囙緣故又為滿足金剛手所問之法令明白无餘故而入三昧也文又䟽釋似當機眾云得見大悲胎蔵嚴妙之法之故然則經䟽互𩔰欤問自證无相位言心俱絁歟荅言心俱離而心唯存問既云俱離何亦存心乎荅雖離如義及一一心然猶不二心存矣故大師云非一一心之所緣不二心之所證而已文又䟽中住心品雖云自證三菩提言語盡竟心行亦𡧘而具緣品釋自證三菩提自心自覺又不思議䟽秘秘中秘釋云本不生理自有理智自覺不生故文故知无相極位猶有不二心若不尒者同木石欤問若尒與顕乗一心无相為至𭫸而成證絁言之義何殊乎荅彼四言九心分位未及如義一一心况不二心乎問若尒无相位唯識大无五大乎荅法佛法尒六大自證位本有云六大法身所以隨緣六大是色心无㝵唯心唯色故依唯心之邊雖云不二心於法尒六大全无增减異矣彼本不生理自有理智者理五大智識大也可思之尋云能造六大色形有無如何荅木𢟷義云隨緣六大色心无㝵故雖云識大亦有色形五大或无色形法位六大識大无色形五大有色形也私云若法尒若隨緣六大論色形是所生四相也能造六大若識若五大不可有色形堅濕燸動无㝵了知性故實四大亦觸境非顕形二色故但與顕異彼有為事法此无為理性故次又釋歎加持住處等者前舉住處躰今歎住處德也論云如來加持廣大金剛法界宮者是則五佛之異名文宗家以五句為五佛秘名䟽家為躰德二義各舉一義互顕欤或又五佛緣起次弟轉釋故論䟽无違例如下四種身文轉釋又五字文中轉釋也又住處配五佛是三摩耶身五佛欤宮閣即如來三摩耶形故先德釋云法界宮者法界婆也三摩耶形文無所依者或本字用正訓順前後文歟此與釋論三種金剛三昧者智論四十七云問曰三種三昧何以皆言金剛荅曰初言金剛中言金剛輪後言如金剛如金剛三昧佛能貫穿一切諸法亦无不見是金剛三昧能通達諸三昧金剛輪三昧者得是三昧即能持諸三昧輪是皆佛自義論者攝持義言如金剛三昧者能破一切諸煩惱結使无有遺餘𨐫如釋提桓囙手執金剛破阿修羅軍云云私云輪䟽三種不合只例同金剛義欤或三事三種其數同故云大同欤或終一義大同意云三種中後一義大同也為言中字有由矣法界者廣大者安然云此法界宮有二種義一自受用遍法界宮義釋云大謂无邊際故乃至心王所都故云宮也云云二他受用法界宮義釋云此宮是古佛成菩提處乃至不獨在三界之表也文智證大師記云華蔵世界別教他受用土如何今為秘密教中那土耶荅別圎兩教通有他受用今此華蔵世界圎他受用身土於一世界分二義更无文雜問荅云淺深二義者大自在天宮是為淺義宮深秘義者金剛者實智之智即能破之義法界者廣大之義即實智之躰宮者无相法身妙住之境心王所都心神所宅此宮是古佛成道之處也故云宮隨如來所應之處无非是宮所以名為金剛法界宮文私云安然以此宮以下為他受用土此義不可此目近詞也尤可上宮也又智證大師那土惣云他受用土恐非理兩部經是理智法身境界故當知大師意此宮下釋成深秘法界宮義釋論下引智度淺畧宮蕳異密宗義今此宗下還成密乗義也或所謂以下文述淺畧義所謂是復次義故古佛成菩提處者䟽第十六云然此五事仍是古昔諸佛成㝡正覺先佛成三菩提也文五事者色尊位住三昧也此中色者本尊形相也住者本尊依言等所引來至加威而住也又十二云以羅字門等淨此心故生其真實智惠光六識發光故即見古佛所行之道文私云准此等釋望行者修顕分別新古欤又義云古佛成菩提者菩提實義也䟽第六云謂覺自心從本以來不生即是成佛文舊來成佛故云古佛成菩提也今教教主成佛外迹加持身故對彼云古佛耳摩𨢸首羅天宮者智論第二云如摩𨢸首羅天䄅言大自在文唯識䟽七云舊言摩𨢸首羅今應言莫𨢸伊濕伐羅即大自在也文十地論云現報利益受佛位故後報利益摩𨢸首羅智所生故文智周釋云行滿今生即證佛果名為現報菩薩後身地前感故名後報文通法釋云囙位窮時現報利益㓛德成滿異佛位故果位彰時後報利益寄色究竟所即於彼身示成菩提受佛位故文二師釋大異今䟽順後釋矣釋論云第四禪等者智論第九云問曰何以故名為淨居天梵世天荅曰第四禪有八種五種是阿那𭇥住處是名淨居三種凢夫聖人共住過是八種有十住菩薩住所亦名淨居大自在天王文問今此自在宮界內攝乎荅唯識䟽云其淨居上有實報土第十地居為三界所為不尒乎佛地論此他受用所居淨土為第十地諸菩薩等法處故即色究竟天攝文了義燈云然自在宮非淨居攝瑜伽第四云色界之中十八住處无想天廣果天攝非別處所既云十八住處復言无想攝廣果天故自在宮非五淨居若淨居攝處應十七非十八故文私云䟽意在淨居上而色究竟攝也燈意色界攝而非淨居攝然俱以為界內攝矣今䟽意非三界攝故下文非今云不獨在三界之表也之故表用外訓也故知䟽主意顕智論非三界攝也䟽第五云次於東方近北邊布列五淨居眾阿闍梨言此是五那𭇥天子耳過此以上有菩薩受佛識位處亦名淨居天多是一生補處菩薩是第二院所攝非此中所明也文此文又外院第二院分准知又可界外耳問住心論三引起世經云他化天上有魔波旬属他化天攝取意他化上魔天既他化攝淨居上自在豈非色天攝乎依之淨影釋云此他化上別有魔天處近他化亦他化攝依大智論五淨居上別更有一菩薩淨居是第十地菩薩住處以此通前色界合有二十三天文此釋㔟道理何荅魔天是界內波旬故云可他化攝十住菩薩界外聖人故非色天攝也依之或經云有妙淨土出過三界第十地菩薩當生其中文是以住心論中欲天中雖舉波旬天色天中无示今天斯則自顕界外義欤義章釋文點可讀以此通色界云云所以智論云五淨居上故舉色天之便雖舉此天非謂色界攝欤今此宗明義等者開題云若㨿淺畧義摩𨢸首羅天王宮釋論云如䟽引若就深秘釋者以自在加持如䟽云云雜問荅云淺深二義者大自在天王宮是為淺義宮深秘義者宮者无相法身妙住之境此宮是古佛成道之處也故云宮文私案此二文意前此宮古佛等文中所謂下一句淺義標句上一句深義結文也然今文重釋前深秘意也今成佛外迹云深秘對如常淺畧故若不尒者何今云有應之處矣但上文所謂者復次義非釋成上欤猶如釋論中本論所謂云復次矣或又轉釋深秘即為淺畧也如䟽下云轉釋佛莊嚴蔵耳當知智論義為淺今經義為深也神心所宅者明性云神心即知神知義也神心是能住自性理佛也所宅即所住受用智身也謂隨如來有應之處等者自在宮處所不定意欤佛地論第一云如是淨土為與三界同一處所為各別耶有義各別有處在淨居天上有處在西𭤧等故有義同處淨土周圎无有邊際通法界故如實義者實受用土周遍法界无處不有不可言離三界處亦不可即三界處若隨菩薩所冝現者或在色界淨居天上或在西𭤧等欤處所不定文私云今宗義同佛地如實義者矣智證大師在唐記云第四禪者若於毘那之分為遍法界第四禪乎荅然也諮問若遍法界皆是第四禪者唯有那住處應无眾生所居乎荅那唯遍法界不妨眾生所住猶如𡧘光遍於三土文私云此文成處所不定㫖欤䟽第四云大日如來身如𨶒浮檀金紫磨金色首戴髺髮被縠衣此是首陁會天成正覺之幖幟也彼界諸聖天眾衣服輕妙本質嚴淨不復假以外餙故世尊俯同其像也畧抄准此釋大日如來又於色界中五淨居天成正覺欤問金剛頂經云住阿迦𡰱吒天王宮中文慈覚䟽云阿迦𡰱吒天此云色究竟文與今自在天宮同異何荅安然教時義第四云第四禪色究竟天有五種名一名色究竟二名有頂三名湏陁會四名魔𨢸首羅五名阿那𭇥天第四禪主亦名魔𨢸首羅文私云今宗意胎蔵理身住金界智佛故䟽云其所住所名佛受用身彼智佛云自在宮心王自在德故金剛智佛住胎界理身故呼彼理身云色究竟色身究竟躰故故大師釋云身心互為能所住云云釋論第三真如為身般若為心云云又善無畏破地獄儀䡄云智法身佛住實相理為自他受用現三十七尊令一切入不二之道理法身佛住如如𡧘照法然常住不動而動現八為自受用示三重荼羅令十界證大空雖是理智之殊廣畧之異本來一法曾无殊異文私云實相理者如如理也如如𡧘照者䟽云云實相智云云如如智也故金光明經云唯有如如理及如如智名為法身文金界云云自他受用胎蔵但云自受用者自性受用佛與自眷属各三密門互以法樂故云自他受用實行隔聞故但云自受用也无違矣大師釈云自性胎蔵理身受用佛金界智佛自受法樂故與自眷属各三密門文文證既分明也不可異求矣當知大日經是理智不二之理身金剛頂又智理不二之智佛談也故金界那以止觀二羽而結智胎蔵毘以定惠兩手而作定甚以有深意者欤又金剛頂經能住佛身舉智之德教正經理趣經等大日經中所住宮殿示五智之名今經也瑜祇經中能所住佛宮俱明五智德三經教主住處義良有以也此中有味深思當見矣問諸經中皆以器界為住處何今以佛身心為住處耶荅凢三乗教雖云唯識所變猶論心外之依正一乗宗雖談一心緣起屢滯囙海之人法斯則洗滌心外之鑛垢未開心中之秘寳故然今教意性德本具怱陳恒沙已有速顕是故金剛𡰱吒天本有眾生心上月輪胎蔵法界宮豈非我等胸中之蓮臺所住是依正輪圎之法界何遙舉鷲峯之岫能住亦理智瑜伽之佛躰誰遠尋鵝王之迹故經中或云三十七尊住心城或云大菩提心光明殿此意矣依之序分六動名六根本煩𢙉之動搖誰混東涌西沒之竒瑞流通眾退皆悉礼佛隱而不現寧同作礼而去之儀式故大師釋云恒沙眷属鎮住自心之宮无𥁞嚴優遊本初之殿云云心王心數諸尊處心蓮而彰四之性理佛智佛大我住心月而三密之法大師釋云雙圎性海談四自性重如月殿三密自樂云云可思之又先德釋云聲字實相各窮性海之深理大三法羯同振本地之高德云云此釈逆次述上大師釈意声字實相是三密故此中深義依事相更問觀夫金薩頂之日并諸佛臆中之荼妙雲流傳之時開眾生心上之䥫五輪本我身誰求西土之雲兩部即吾心何東流之風故今䟽中釋此中秘密謂心為佛也金剛頂經中此即毘那聖眾集會便為現證都婆可悉之可悉之又䟽第五釋內心荼羅云此是如來秘傳之法不可形於翰墨故寄在圖像以示行人若得深意者自當默而識之及自當默而識之甚深甚深深察之問今理佛住智身何云有應乎荅信證僧正義云應有二義一是應義二相應義謂理智相應也今取後義文私云理智相應義可然又䟽第四云湏陁會天同之姿文自性中加持身理佛又有同義故云應何𭁆然非受用以下應也一切持金剛者等者今持金剛可通菩薩眾成就惣句皆悉眾會是廣故故住心論第十釋今金剛云金剛者五部諸尊所持法界幖幟文或又舉內眷属顕大眷属欤故下此文云其金剛名曰空无垢等故但大師釋於金剛部中亦有五部故秘蔵記云五部即五智一智所互具五智所以成二十五部文又先德秘釋中於十九金剛分三部五智故二義中前義為勝別中金剛菩薩列舉云及普賢菩薩等今文外无菩薩惣句故又金剛菩薩名互通故故䟽第十二云復次菩薩身即是金剛之躰而十𭤧一切佛同以如來金剛智授其手故名持金剛也文此釈金剛名通菩薩也又第三云自臍以上至𠰸出現无量十住諸菩薩然此中自有二重從心以下諸大眷属從心已上諸內眷属通名大心眾畧抄此文內大同名十住菩薩故准此等釋當知今文持金剛通二重眷属云持金剛也住心論釋又此意矣故寳鑰云五部諸佛擎智森羅文既云諸佛不𢩁金剛部也又惣句金剛𭇥二類故其中云其金剛或雖通二金剛名近內眷属故從勝云其欤問金剛頂經中與九十俱𦙠菩薩眾俱之惣句𣇣大摩𡰱殿後諸經亦尒何今違顕密諸經例眾成惣句安樓閣前乎荅或云處眾各惣別二節故𦂶文也私云處眾交舉而顕依正不二人法一躰義欤得淺深二釋者鈔云淺謂執持執持金剛杵也深謂住持住持金剛也文此釋意持𭇥二義欤執持住持故意云摽今謂持金剛結於義為勝文起𥁞无爭執持相望持金剛得二義故為勝也為言若不尒者不順字及結文故問若尒不順故字應云然隨文便何荅今持金剛亦執義故是故隨便二名互用也為言私義云梵語陁羅具執持二義故舊云執金剛新云持金剛然今經得新舊深淺二釋故隨文便或云持金剛一切持金剛文或云執金剛十九執金剛文於義勝也為言五百執金剛神者或云表釋迦五百大欤或示五百塵點欤心王所住之處等者准上文云如來在此宮中為獨處耶下文云心王毘那可𡱈大日一尊今經教主故心數又第一重等內大眷属欤下眾成就文列金剛菩薩故今文舉內眷属顕大眷属欤云智及執金剛故䟽第四云荼羅者名聚集乃至十世界㣲塵数差別智輪圎輻湊翼輔大日心王是故為荼羅也云云但不舉四佛四菩薩者彼具王数二義五佛即心王餘尊即心数又大日即心王餘尊即心数又九尊心王餘尊心数也今舉偏顕通欤例如立義四句貫兩重故不属矣又住心論釋今經文云心王如來大毘那五智四及心数㣲塵数眷属文此釋以五佛心王為薄伽梵句欤故次下釋云薄伽梵者摽諸尊德文又上文云五佛即心王餘尊即心数文但此意舉能人非五佛皆為教主欤或又但心王如來大毘那釋薄伽梵句五智四釋如來乃至法界文次下配釋分明故與䟽釋同大日普門躰故云諸尊德猶如金剛頂經一切如來釋大日如來矣或薄伽梵諸尊德今名大日也為言故云具釋如䟽可思之問依轉識得智義四佛是八識為躰或九尊配九識高尾口准顕家八識九識皆是心王躰何今属心数乎荅今教意帝網瑜伽故心数心王重重也故頌云心数心王過𭃯塵各具五智无際智文以如常一途義勿令疑矣又秘蔵記中一識心王八識心王別本即身義中以法界智為本為證四佛等八識為心数耶實義是互相涉入彼此加持故主伴重重王数多多也雜問荅云是以互為能所主伴自受法樂文別本即身義云金剛界七十三尊大日為心王餘七十二尊為心数胎蔵界五百尊大日為心王餘四百九十九尊為心数取意正本即身義云心王者法界躰性智等心数者多一識文私云正本即身義文等字等取四佛欤住心論云五佛即心王之故或又通四菩薩欤秘蔵記云不動九識其餘十佛𠛴一切心王攝於一識名一切一心識云云此釋意八中臺云九識第一重以外云其餘故無不即入金剛界中者准上文云金剛法界宮彼宮云金剛界中欤又第二十卷云一切大會荼羅皆是一身无別身也即普門身是法界身即是金剛界身也文准此文心王心数諸尊當躰云金剛界欤界是性義名身躰也金剛界儀䡄云應當知自身即為金剛界文准之又上文云金剛喻實相智此智躰如來實相智身文所住宮即受用身故云尒故前後釋是同欤心王毘那成自然覺等者此為成今經會加持身湏先明自證法門身主伴也故云如來內證㓛德自證三菩提義也下卷中或云菩提實義第六卷或云常寂之躰第四或云菩提自證之德第三或云實相自然智惠第五等是也此自證妙嚴之相常寂之躰法尒无减非造作所成故云自然覺也故第四云如來妙嚴之相法尒无减非造作所成故文又䟽第六釋菩提實義云謂覺自心從本以來不生即是成佛而實无覺无成也文第一云如來无㝵知見者一切眾生相續中法尒成就无有减文又云唯佛與佛乃能知之是顕十地非境之㫖也故上文云則雖十地菩薩尚非其境界下卷中十住菩薩猶囙羕佛神力得見加持身文此等義如先弁耳問唯佛與佛者何佛乎荅當經理佛云唯佛金界智身云與佛例如止觀唯佛與佛文弘中釋唯佛釋迦與佛十𭤧佛也菩提義等者抄云雖法與人能所有異然恐難解謂於荼羅中若但𣇣名法荼羅即菩提義金剛若於彼中𣇣一切賢聖各持其依位而住是佛陁義持金剛者取意此釋三昧耶名法欤故云難解欤今謂不尒結前自證法門故云菩提義謂自證三菩提故此自證法門法尒所成其性定不改故云金剛非𭚘等也又從此法門身今法身三摩地等云法門身非種子等法門身也現加持身大日及內大等羯磨身故云佛陁義即有无量无邊持金剛者是即生後也問第四云以如是內證之德无量无邊故其所加持現作法門眷属无量无邊文此釋法門身又所現如何荅法門身有二重法身三摩地等內證德也種子法荼羅是所現加持身也四身皆法利生此皆加持身故故即身義云法身三摩地等亦名法智文下經文云即以陁羅𡰱形示現佛身文住心論釋云法身既尒何况餘身文問自證法門五十一心数九識心王等不同何皆云智耶荅智所持故或與智相應故信進慚等又云智欤由此眾德等者此文有二義一云既云眾德却釋前自證㓛德主伴集會義欤二云案經文集會言專今經會座故所以佛陁義成眾會義也又此者囙近之辞故雜問荅云此內證境平等界中有過塵数心王心数是會集之義也此一相平等四種法身遍眾生趣法利益此聼處名為集會耳文以此文二節證前二義耳問經文一切持金剛者皆悉集會者多人相望而成集會義何今一人具德云一切集會耶荅若少分未等一法未滿等反釋經一切文故知具一切德持金剛者一味到實際故云皆悉集會欤或又經䟽影畧互顕也然以自在神力等者䟽第三云然以如來加持故從佛菩提自證之德現八中胎蔵身從金剛密現第一重金剛手等諸內眷属從大悲行現第二重摩訶薩諸大眷属從普門𭤧便現第三重一切眾生喜見隨類之身若以輪王灌頂𭤧之則第三重如国君長第二重如朝百揆第一重如宗枝內弼中胎如𡸁拱之君故華臺常智為大荼羅王也文准此文今加持尊特身者中胎蔵身今經教主也既云然以如來加持故即中胎大日非云加持身耶䟽第六云成佛外迹是也依之䟽第四云大日如來身紫磨金色被縠衣此是首陁會天最成正覺之幖𢡠也如來妙嚴之相法尒无减非造作所成故十住菩薩猶囙羕佛神力得見加持身其於常劣之躰如在羅縠取意此文又大日如來首陁會天五淨居天同姿云加持身今加持尊特身者今經教主云事不可異求矣又般若僧正抄云加持身者荼羅中胎尊亦名字門道具足佛也亦名具身加持也文故知即從心王毘那者菩提自證德法門眷属者金剛密大悲普門等也所現中舉第一重顕二三重眷属也或又法門眷属者但智也惣即別名故問䟽第五云內心妙白蓮華者是實相自然智惠蓮華是大悲方便也其餘三重是從此自證㓛德流出諸善知識入法界門耳文如此文八云大悲方便三重俱云自證㓛德能現法門相違如何荅自證法門立名隨冝通而言之皆法門身又自證㓛德也第三卷中臺八云自證勝第五三重云自證㨿通門也故當卷下十九執金剛云內證之德四大菩薩云內證㓛德即此意矣又八云大悲者配囙根究竟時有此義故欤䟽第二十云為以中臺為菩提心次八為大悲外三院為方便也文持大空戰具者抄云今此諸執金剛各從一門內自證智遍一切所破諸无明障染義名戰具大空智即戰具名大空戰具作持業釋或執金剛者各隨一門法界慓𢡠謂是杵等是大空之戰具可作依主釋文私云一一智皆徹字本不生際而一相一味故云大空故云一相一味到於實際也各有断惑㓛故云戰具也或又一一智具眾德而涉入猶如空𭇥眾像无㝵故云大空欤即身義云法身同空而无㝵𭇥眾像故曰大空文或又以空无垢智所持皆同空无垢之相无有餘相故云大空空遊步等准知之舉初二三顕餘欤无明之煩惱者或本无相之煩惱云云䟽第二云由有无明生五根本煩惱文准此釋五根本煩惱欤今依主立名矣又通百六十心故下文云百六十隨煩𢙉文或云煩𢙉无相㒵而縛心如天帝五繫修羅故云无相耳云云又十卷義釋云无明堅執一切煩𢙉云云十四卷義釋云无相堅執一切煩𢙉云云既云一切煩𢙉可五根本煩𢙉及百六十隨煩𢙉欤本記云建治四年二月七日於醍醐寺中正院加點畢金剛佛子頼瑜
