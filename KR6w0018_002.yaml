body:
  text: 疏卷第一之二如是我聞等者智證大師抄云如是我聞者已開門為阿難我若爾阿難非大日侍者何𥠾我聞阿闍梨云法界通開義無其妨難文文云此經我聞或云金剛薩之我非阿難之我者此未詳私謂毗那對於聲聞何非阿難我耶示明文佛心經下卷有毗那對告阿難之文煩故不具引既有對告攴何故非阿難之我耶但世學者未見此文守株費見而已云云開題有三釋初金剛薩之詞次毗那親言也者佛云爾也三法爾有無人增减云云私云准諸經例且以金剛手云為𦀽集者也故六度經以惣持藏為金剛手受持祕藏記為結集者矣故祕藏記云結集修多羅藏阿難毗𡰱耶藏優婆離阿毗達摩藏迦栴延般若藏文殊祕密藏普賢是守護經文顯教中云佛度後普賢文殊菩薩𭅩阿難於䥫圍山間結集諸經是即惣守護經所別耳云云此釋以阿難而似為顯密五藏通結集者若結集伴通阿難歟若依結集主者金剛手也故安然釋云若結集主者是金剛手若結集伴者亦通阿難也云云文智證口云法界通開義者此意歟又准開題藏記文唯金剛手結集也既云顯教中依智論等歟彼論云迦阿難於王舍城結集三藏為聲聞藏文殊阿難於䥫圍山集摩訶衍為菩薩藏文此論摩訶衍者但顯大乘故文六度經五藏傳持文惣持金剛手受持全非阿難傳持也若爾何撿六度經明文撿佛心經一金薩結集義况對告人未必結集者恐似守株費智耳但祕藏記惣別釋是於前四藏作惣別也又普賢金薩顯密異故理趣釋云是菩薩本是普賢從大日如來受金剛杵之故名金剛手文奧州得一於真言宗舉十一箇未中結集者疑云大毗那經初云如是我聞今疑此經釋迦如來度後八百年時毗那自對普賢執金剛手等而爾時阿難迦等久已度誰言我聞若言龍樹菩薩結集者復從毗那佛口傳普賢從普賢傳龍樹如何龍樹𥠾我聞若言普賢我聞者不爾普賢菩薩非二乘凡夫肉眼所能見何交雜人間結集云云或云今經者法界宮之無年月而疑者龍樹菩薩出時以為經之時出阿難迦生疑是大過也又龍樹結集不足起言如是我聞是金剛手語也開題云之語也我金剛薩從大日尊聞也文文云通阿難胎藏釋迦院烈座故專可結集也文二乘凡夫不見普賢者普賢觀經四衆八部得見普賢可悉之云云私云八百年龍樹出時是𨶒浮流布之時代也非正之時故義訣云經篋廣長如床厚四五尺有無量頌云云正時豈有經篋乎故知金剛薩結集文龍樹誦出也斯則當干楞伽所如來懸記之時非啻𡧱密藏宗㫖亦暗違顯經明文矣言交雜人間結集者智度論釋顯結集云佛度後文殊彌勒等諸大菩薩亦將阿難集此摩訶衍取意文殊彌勒等既與阿難俱而結集𢩁普賢何懷疑若不許者又顯經結集同疑經初五義等者抄云如來法有五成就言如是我聞者信成就也一時者時成就也薄伽梵者教主成就也住如來加持法界宮乃至生大樓閣寶王等所成就也其金剛名曰空無垢等衆成就也文私云此釋以通序五成就為五義歟疏既經初五義釋下而成加通序之㫖若五義非五成者何作此釋耶故抄釋五成就畢般若燈論亦有六義文既六成云六義五義應是五成或又直就經釋五成義非釋疏五義文歟故直𤗊經文不云疏云可悉之又義云以五字義為五義非五成也次下文如智論中廣明文然撿智論於如是我聞一時文作五語三句釋故智論第一云如是我聞一時問曰佛經何以故初𥠾如是語曰佛法大海信為能入智為能度如是者即是信也我者佛弟子等雖知無我隨俗法我非實我也聞者非耳根非耳根能聞聲亦非耳識亦非意識是聞聲事從多因緣生一者問曰佛法中數等法實無隂界入所不攝故何以言一曰隨世俗故有一時者有人言一切天地好醜皆以時為因略如是我聞一時五字別義竟文私云雖有六字合如是為信一義故云爾也既智論分明定知五義非五成就也所以一時已上讓智論薄伽梵已下𤗊釋故私更加一解云通序六句中前五句云五義歟今所𤗊如是乃至法界宮文六句中五句有之故故准智論文六成就開信與聞而為二故文良賁仁王經疏云今依智論惣六義一者信成二者聞成三者時成四者主成五者所成六者衆成略抄寶師𣵀槃疏慈覺教王疏同之故知五義者六義中前五義也但衆成就不讓智度者衆成中又𦂶所成而文不一純故且除之歟重意云五字為五義可為正智論略如是我聞一時五字別義竟之文分明故別本云如是我聞一時五種各各義略竟文但至覺𮏑良賁釋者慈覺教王疏云今謂諸師雖依智論惣六義未明所據今記論意令易可知然案智論如是我聞一時𤗊為一假開為五種結為三句謂一如是二我三聞四一五時是為五語如是為一我聞為二一時為三是為三句聞即我聞一是時數故故結為三句也但論㫖難尋依順先聖且明句數文阿闍梨云者或金剛智歟疏主詞故或善無畏也記者詞故邏僧都義云善無畏云云或云疏第五云阿闍梨言少時因重病困絁神識往𧨜司文此無畏御事也故所所阿闍梨者無畏也經文𤗊釋之外加因緣由來等別之時置此言歟大日經供養法卷云右阿闍梨所集大毗那成佛神反加持經中供養儀式具足竟傳度者頗會意文不思議疏下云右阿闍梨已下譯家語也此中阿闍梨者聖者文殊師利也文准此釋可金剛智歟大本有十偈等者開題云此經惣有三本一法爾常恆本諸佛法𭦟荼羅是也二分流廣本龍猛所誦傳十頌經是也三略本有三千頌雖頌文三千經卷七軸也文別本云二分流本金剛手所誦傳十頌是也文都部陀羅𡰱目云依毗那成道經大本十偈可有三百卷經唐國所譯略本七卷文疏下云然此經流布𨶒浮提略有十偈若十佛𠛴微塵大衆各各廣演身口意差別法門則無限量文私云今文大本者非分流大本中大本分流中廣本故云大本歟下略有十者望常恆本故云略歟海雲記云此經夾有三本廣本十偈若依本具譯可有三百餘卷已來廣本在西國不到此土本經略本四千偈更有略本二千五百偈中天笁國大阿闍梨集令持所傳者四千偈經文今經序云大本十頌𭤧祕而密藏今所譯者二千五百頌云云私云開題三本與記三本是殊開題常恆本疏下文廣演身口意差別法門則無限量云云此歟然記中四千偈并二千五百本疏中全所不見也文經序略本雖同記一本亦背疏文耳傳法聖者等者開元録第九云大毗那神反加持經七卷第七一卷是念誦法沙門輸波迦羅唐言善無畏曩時沙門無行西遊天笁學畢言㱕回至北天無幸而卒所持本有勑還北在西京華嚴寺取掌無畏與沙門一行於彼蕳得數本經還遂為沙門一行譯大毗那經其經具足文有十頌今所出者撮其要取最沙門寶月譯語沙門一行筆受云云十偈中取要為三千頌今七卷經是也故開題云頌文三千經卷七軸文理實三千頌應是前六卷第七卷於六卷中撰出供養儀䡄故故開題云此經一部七卷就中前六卷有三十一品文又海雲記云依本譯成六卷又惣集一部教持念次第共成一卷成七卷共成一部云云但密抄中此經七卷三十一品者七卷在三十一品之內故云爾若前六卷外更存第七卷者應云此經七卷三十六品故知第七卷是六卷所攝也問傳法聖者誰人耶准録中今經本無畏從無行相羕傳法聖者無行歟或龍智金剛智等歟其故開題中十頌或云龍猛誦出或云金剛智誦傳彼二聖誦傳是分流廣本故知今三千頌龍智金剛智等取其要歟文十頌雖云龍猛誦傳亦不妨金剛手准知三千頌通龍猛歟問龍猛誦出未審大日經序云北天笁國勃嚕羅國中有大石山壁立干雲於其半腹有藏祕法窟數千捧經出暴風匆至吹一𣑽篋下來樵夫取之獻王王歡喜與之善無畏無畏得之所七卷取意又海雲大毗那大教相羕記云三藏善無畏云此法從毗那佛付屬金剛手菩薩經數百年傳中度那蘭陀寺達磨掬多達磨付屬中度國三藏釋迦善無畏文造玄記同之又大日經廣大儀䡄下奧云此法摩訶毗那付屬金剛手金剛手次傳付屬那蘭陀寺達摩掬多阿闍梨阿闍梨次屬中天笁國主釋迦善無畏云云此等皆為無畏相羕不云龍猛誦傳耶凡大師依圎照貞元録不空表製集等專以兩部祕藏之經偏存䥫流傳之㫖又龍猛論中載今經若不傳則何引自造論乎故表製集四云昔毗那經以瑜伽無上祕密最大乘教傳於金剛薩金剛薩教百嵗𭤧得龍猛菩薩而授焉龍猛又數百嵗乃傳龍智阿闍梨龍智又數百嵗傳金剛智阿闍梨金剛智振錫東來傳於和尚自法身如來至于和上傳此道者六人而已云云出生義付法傳血脉同之貞元録云龍樹菩薩第子名龍智年七百餘嵗今猶見在南天笁國傳授金剛頂瑜伽經及毗那惣持陀羅𡰱法門云云龍猛入室龍智既以兩部經為傳授法門龍猛若不誦傳則龍智何為傳授法門乎依此等心大師住心論中舉兩部陀羅畢云若爾誰傳初從大日如來至青龍阿闍梨有七大阿闍梨耶云云又金剛頂經略釋云此經及大日經龍猛菩薩從南天䥫中誦出文既尋大師血專表製集等文造玄海雲相羕違不空血邪正可悉之况海雲雖唐家人師是惠果二傳之弟展轉設有誤大師惠果面授之弟子親受何有疑乎文惠果行狀云常語門人曰金剛界大悲胎藏兩部大教者諸佛祕藏即身成佛之路訶陵辨弘新羅惠日並授胎藏師位釰南惟上河北義圎授金剛界大法義明供奉亦授兩部大法今有日本沙門來求聖教以兩部祕奧壇儀漢無差悉受於心猶如寫瓶云云付法傳云孔宣三千德行四人廣智數可八箇就中七人得金剛界一部青龍則得兩部師位文當知不空以兩部祕奧獨授惠果惠果以二界師位偏授大師又請來表云和尚告曰我先知汝來相待久今日相見大好大好報命欲竭無人付法必須速辨香華入灌頂壇云云惠果六箇可中獨賞大師而云猶如寫瓶屢蕳餘人而云無人付法同門賢弟猶不比肩况孫弟海雲等成同日論哉次付經序者石窟梵篋無畏直相羕之歟然今文阿闍梨傳者無畏也彼云傳法聖者探要三千頌云云此意無畏前有相羕人龍猛龍智等也若不爾者違疏文故不用之依之安然又付二過不用之一違胎藏相羕過二違不思儀疏過云云又實範上人更出二過一違疏及開題失序二千五百頌違疏及開題三千頌歟二違開元貞元録失二録意無畏所譯本曩時沙門無行所持也經言三藏乃持典故相違也次儀䡄奧記者彼法潤弟子惟謹記録歟彼即法全同門非東寺相羕况彼儀軓非大師請來也何為難南天北天之相羕自門他門之諍論也然真言祕教以東寺為正故大原長𡩷僧都四十狀云他上廣慶阿闍梨云伺習諸家灌頂無過東寺灌頂云云又小野纂要云兩部大法阿闍梨毗那根本最極傳法密廣智三藏從南天皈之後唯授惠果一人惠果和尚又唯授弘法大師不授餘人是故惠朗紹六為七不得師位義明可紹攝不謂入室不空惠果既不授之隨誰傳哉而他家與本所爭力猶如游復不聞張禹淡耳云云非啻自宗祖師獨𭞙亦是他門先德共許者歟問不空金剛頂義譯龍猛開䥫雖云誦出金剛頂百千頌未云誦持毗那經又不思議疏中明今經第七卷由來云無畏三藏於金粟王下依聖加被感得供飬次弟法云云全非䥫本也何龍猛菩薩沗預如來之懸記云云專為顯密元祖何物不入其手乎况初地入證位𬾨法明道德何於兩部有所殘耶彼義訣中龍猛未入䥫前大日如來現其身授念誦法要云云此法要者大日經略行也然其法力加持故以白芥子打開䥫扉前未得金剛頂經本猶誦傳之况既𮐃授大日經廣本吝何不授耶又於今經第七卷者凡雖有䥫本修持行儀未明故求聖加被更感得供養次第法也非六卷本外更有第七卷本歟依之第七卷初文云我依大日經王文又義釋云阿闍梨於烏仗曩國撰出毗那供養次弟法云云抄云阿闍梨者即無畏三藏烏仗曩國或云于闐國言撰者集也謂於大本中探取此品所有津要獨成一卷分為五分即此經第七卷也文或云感見撰出雖異大本略行非有別本也故海雲記云依本譯成六卷又惣集一部教持念次弟共成七卷共成一部文若爾何以此譯難䥫本無乎又義此第七卷與要略念誦經同本異譯而彼經龍猛到䥫下時毗那於空中為龍猛也彼念誦法既大日此第七卷無畏私撰乎故同題云大毗那佛要略念誦經云云但我依大日經王者念誦經云我今依經要略自利利他悉地法文大日指前佛云爾歟開題其㫖見義譯中撰出者以感得流通云撰出歟依大日經序無畏得北天笁石窟篋譯為七卷彼已有第七卷本何云私撰出乎或云義釋文溫古智嚴𭁡治時加人言歟二十卷草本疏中無彼故若爾何必為南現復龍猛論中載供養法文若無䥫本者龍猛何引之且自門他家相羕作圖示之大師相羕血大毗那如來金龍猛菩龍智阿闍梨金剛智三藏一行阿闍梨大廣智三藏金閣𭇥光新羅惠超青龍惠果訶陵辨弘新羅惠日釰南惟上河北義圎義明供奉日本空海崇福惠朗保壽元皎保壽覺超海雲相羕次第胎藏界毗那佛金手逹磨掬多善無畏金智不空一行玄超惠果惟尚弘惠日悟真空海義滿義明義澄義照義操義愍文𮏑大遇海雲深逹義真法潤法全唯謹金界毗那佛金妙吉祥龍猛菩龍智阿闍梨金智善無畏不空𭇥光元皎惠朗天笁阿闍梨德美惠謹俗居士超梅曇貞覺趙如惠德惠果惠應惠則惟尚辨弘惠日空海義滿義明義操法潤義真義舟義圎深逹海雲大遇從賀文𮏑亮常堅智深法全文祕義照義愍義政義一俗居士吳殷造玄血次第大悲胎藏教毗那佛金手菩逹磨掬多善無畏一行禪師金智玄超惠果法潤法全宗遍明圎載圎𭹀圎仁智滿息怤造玄義真圎仁圎行深逹海雲大遇文𮏑金界大法毗那佛普賢金祖室利龍猛龍智金智善無畏一行不空𭇥光元皎惠朗天笁德美雅霄惠謹居士趙政喜貞惠清義曇貞覺超如惠德惠果惠應惠則緣惠元政造玄圎仁文悟惟尚辨弘惠日空海義滿義明義操法潤義真圎行義舟深逹海雲大遇文𮏑諒法全圎仁宗遍明圎載圎𭹀息怤弘𭎀文祕義一不空文義略周者三千頌本文言簡略義理周𬾨為言以非大經正本等者十頌云大經正本智證疏抄云言不題通序者三千頌之本言今以例加之者例於十偈正本文問後人私加歟文以大本文加歟既上云以非大經正本等例大本通序加之歟中川序分義云十卷本智證裏書云此三千頌不是大本故𣑽文上不題通序今例十大經之本故加通序云云故此通序取加大本之真文也云云論師所解具有六義者佛地論第一云薄伽者謂薄伽聲依六義轉如有頌言自在熾盛與端嚴名𥠾吉祥及尊貴如是六種義差別應知惣名為薄伽如是一切如來具有於一切種皆不相離是故如來名薄伽其義云何謂諸如來永不繫屬諸煩惱故具自在義炎猛智火所燒練故具熾盛義妙三十二大士相等於莊嚴飾故具端嚴義一切殊勝㓛德圎滿無不知故具名𥠾義一切世間親近供養咸𥠾故具吉祥義具一切㓛德常起方便利益安樂一切有情無懈廢故具尊貴義或能破壞四魔𭜨故名薄伽文私云此論是親光菩薩所造也今論師者彼菩薩歟文准理趣釋云又有六義如聲論所釋者聲論師云論師歟今此宗中薄伽是能破義者問今此能破義佛地六義隨一歟如何未必然問題云論師所解具有六義今舉其一薄伽𣑽是能破之義也文既云今舉其一非其中乎今能破義以智論舉四義中能破義為證又佛地中六義外舉破魔義故依之理趣釋云時薄伽者能義破義也所破者破四魔也又有六義如聲論所釋熾盛自在與端嚴等也文故知非隨一至大師釋者佛地有破魔成德二義中六義論師所解破魔准疏釋彼云其一歟所以佛地云其一非六義中問慈覺教王疏中會佛地六義智度四義云四六之義其㫖豈殊只是離合之異文佛地六義如上出智度四義者一有德義二巧分別義三有名聲義四能破義也既云離合異定知六義所攝也又疏十四云薄伽義六義中前亦已解文是又已解者前解能破等義為六義中也爾何彼釋中四六配屬時有德配端嚴吉祥巧分別為名稱義有名聲屬餘三義全無能破配當故知四者言惣也應云三六開合異又疏釋六義中者佛地前亦已解者能破義也亦言此意問今能破若取佛地能破魔義何蕳彼乎若依智論能破者彼又顯論難云今宗何或於佛地中引聲論頌歟故聲論師云論師六義以佛地破魔義云今此宗歟或佛地中六義但以句義釋薄伽未及字義然智論必以字義訓釋多名故二論相望智度義勝故為今宗義也故抄云謂彼顯宗之中具足六義都名一薄伽更無別義今此宗中以字義釋之復有多名故云今此文文以智論為顯密分別證况復龍樹祕宗元祖親光唯顯師故以大智明等者以大日大圎智明破因海無明分位九種論妄識義也無明者智㝵煩惱者煩惱㝵煩惱即菩提故妄法元無生無相也如實智自心惠日出時無始間隔暗惑自除也是即非斷煩惱躰除非菩提之間隔故云能破也故摩訶衍論云謂斷煩惱心斷除不起故文或大智者阿閦大圎智也淨菩提心位諸惑頓斷故釋論亦云等者智論第二云復次頗伽名破婆名能能是能破怒癡故稱為頗伽婆問曰阿羅漢辟支佛亦破怒癡與佛何異曰阿羅漢辟支佛雖破三毒亦不了了盡𨐫如香在器中香雖無餘氣故在有如草木薪火燒之𤇆盡炭灰不盡火力薄故佛三毒求盡無餘𨐫如劫盡火燒須山一切地都無煙無炭如舍利弗瞋恚氣殘難陀欲氣殘畢陵伽婆氣殘𨐫如被鎖初時猶不便文私云餘氣者習氣即不染無知是也大乘為法執所知障矣問緣覺斷種故經云業煩惱株杌及無明種子文大師因種心文何二乘俱云不盡耶相望不定故望聲聞雖斷種對菩薩云未盡歟或二乘俱有利鈍故利二類斷種鈍二人不然今舉鈍二乘經文大師釋利緣覺歟或種習別故抄云雖除種子未盡習氣文或種人執習據法執歟怒癡者上二如次貪瞋二惑也復次帝釋等者第二女人釋薄伽義有二義一息煩惱義二所從生義此中所從生者從所生子能生母立名謂人子所從母生故也疏十七云如來即是一切善法所從生處文此文能生如來云所從生此為良證耳文義釋第七云次云三婆吠者是從生義如人胎分成就時出離胎藏如來亦爾淨菩提心究竟圎滿時出過一切諸觀自然智生文今文無㝵知見人皆悉從是生者此釋同矣金剛頂宗等者非兩部隨一金剛頂宗望顯乘大日經宗亦金剛乘故云爾也又准下若解金剛頂十六大生釋可金剛頂部因便明彼義也即此義者暫息永息等異故云爾非二義矣般若佛母者諸佛從般若菩薩生故此菩薩名佛母也無㝵知見人者佛也故疏第七云如來無㝵知見在一切衆生相續中法爾成就無有减以於此真言體相不如實覺故名為生死中人若能自知自見時即名一切智者一切見者文得與相應等者私云與字可用此訓唯識論中有此例此者般若佛母也一切善心與此智相應而斷煩惱故俱舍云若離擇法定無餘能諸惑勝𭤧便文問般若是惠男義何云母乎故祕藏記云定則女惠則男雖父母共産生諸子名父不為母云云爾何答若定若惠以能生義名母猶如悉曇男聲智惠字亦名字母也又祕藏記上釋云據宗心有互出生之義或顯曰不得略抄彼亦顯義也或又文殊云三世覺母可思之又祕鍵云定惠樹名云云此意般若通定歟有如是隱語者抄云不可直是般若佛母故言女人此宗多有如此隱密之語修學者應當觸所類例而思之耳文教時義第四云法相所立之佛密意謂詞深㫖淺未實義如大乘十法經聲聞成佛是佛祕密之教其實不可成佛而成佛是密意之故今真言教詞淺㫖深是名諸佛密語如觀音瑜伽中云男女二根和合能作佛事是以定惠和合生諸佛子非實男女二根和合是名言詞隱密諸佛密語略抄又下文云如來自證之智設以神力加持亦不可示人文准此釋自證智云般若佛母歟輒不可示人故云不可直宣此智生無㝵知見人故云佛母此智會自證境直不可故以男女相應示之云如是隱語觸類思之也得與相應者理智合義也問相應於心心所云之何理智合云相應耶答彼𫞐宗意也祕教理智又云相應故釋論中理智云相應俱有字義云理智相應故云報文疏第五釋次往第二院文云此中第二是隱密語耳須口傳相付也文此釋未必如今文歟又薄伽梵者等者或云薄伽梵有三重釋皆異佛地論六義此三義大悲胎藏三部曼荼羅也故初云今此宗中等矣第一正釋能破義金剛部意密也智有摧破㓛故第三又釋有名聲語密即蓮華部增益故云持資戝者第二復次相應義即佛部定惠相應理智具足人故是為身密矣此佛部從兩部理智生故所從生也此金佛蓮次第如先三身次第也釋論亦云婆伽言德等者智論第二云何名頗伽婆天笁語婆伽䄅言德婆言有是名有德復次頗伽名分別婆名巧用惣相別相巧分別諸法是故名頗伽婆復次頗伽名名聲婆名有是云有名聲無有得德名聲如佛者轉輪聖王釋梵護世者無有及佛何况諸餘凡麁文疏抄云名謂名聲謂音聲或名謂名稱聲謂聲譽名稱普聞取意私云智論薄伽四義中今疏舉三義為二義有德名聲為一義巧分別不取故或有德名聲離為二第二復次中又分二并第一能破可配五部五智矣三部五部開合異故麁分有三細分五異可思之言及尊者等者或義云言及尊者人直不其名也為言木𢟷義云及言于尊者直不其名也為言能呼語聲至及尊者耳也此經中例云薄伽梵等者意云今經中以大智舍利弗等之例言之應云薄伽梵毗那也為言故理趣經云時薄伽𣑽毗那如來文或今經例大智舍利弗等正云薄伽毗那也為言經下時薄伽梵大日如來文今順此𭤧等者順唐言之文㔟應云大日世尊也為言故經下大日世尊文薄伽梵即毗那等者智證大師疏抄云薄伽即毗那法身者自性身也佛加持身即受用身者自受用身也云云抄云疏云本地法身者即實相法身也言次云如來是佛加持身者即應身他受用也次疏釋成其所住處名佛受用身言如來心王等者如來是所住心王為能住如一切諸佛法儀式皆住於應身即本地身為教主也推㓛㱕本言法身依正尚無㝵豈佛身真應而𡱈定乎文光明山述意云法界宮中有疑然四種法身然自性身具他受用等用者是神力加持門之談也今此他受用雖疑然本有德令他見聞故云他受用亦名應身矣然他受用身親從自性加持身起同凝然故即與自性身色相莊嚴音聲法無二無別也故知自性身加被他受用身即令自內證法也文中川義云覺菀尚保法佛無形不知本地身法故強令住他受用身此經然於薄伽梵本地身依華嚴作二釋就三乘教云推㓛㱕本此復馳臆而會文依一乘教云真應無㝵則復驅自宗取義也文私云重譽心𦔳抄義云自性身加他受用身令自證法也實範抄二意俱非矣若爾實範意何身所乎答序分義等中猶慈覺等自受用云若得自受用身之名必由自受法樂之義而作其教主不必從由彼身非自受用而為自受法能不受名自性身能亦受名受用身是故能唯自㓛所由為自受也取意此意自性身為教主也安然教時義云若菩薩大經藏在華藏界實是華嚴深密祕分其本未來此是舍那他受用其中亦有自證化他法門若大日金剛頂經等在法界宮此是自受用其中亦有自證化他文又信證僧正云隨自意四身有通別二義此又有二重通自性身通住餘三身法諸身法皆自性身所作故別者四種身各故又通者四身聖衆各住自證三昧故云通別者自性法身皆其主故獨一切故以為教主所以云別又二重各對通別可知之隨他四身通別義准上二門可知之大師御意以隨自意四種中自性身為教主伴通四身慈覺安然等以自受用身為教主餘三身覺超云他受用覺𮏑云他受變化也文私云此又取大師御意同中川義歟故寶鑰下云真言密藏兩部祕藏是法身大毗那如來與自眷屬四種法身住金剛法界宮及真言宮殿等自受法樂故所演文此中法身大日者六大法身今疏本地法身也故古德釋云薄伽梵者不二惣躰能加持無相法身位云云又云大日經教主能加持不二惣躰無相法身也文眷屬四種身者四佛已下自性受用等四身歟即五種法身廢立歟故古德祕釋中引聖位禮懺二文立五種法身義矣疏中以主成薄伽梵句釋本地法身自性身為教主不可異求矣况復以自受用身為所住所是所成句何為教主何况他受變化等乎問住心論十云薄伽梵者惣舉塵數諸尊德具釋如疏住者顯能所二住言各各諸尊住自證三昧句如來加持廣大金剛法界宮者是則五佛之異名大日寶幢開敷陀天鼓如次配復次如來者大荼羅身金剛則三昧耶身法界則達磨荼羅身加持者事業威儀身也此通三種之身廣大者明各各身量同空法界言宮者顯所住處今此心王如來無始無終各各安住自法界三昧略抄又金剛頂經釋云四種法身共陳此道文又古德釋云真言教主四種荼羅身文四義中以四配四身也此等釋廣通四種身若爾大師意何唯自性身乎答序分義云私案疏意薄伽梵即毗那本地法身即心王如來也論意薄伽梵者惣舉能住塵數諸尊住者顯能所住如來乃至宮者顯所住也所住中有二意一如來乃至法界者五佛也宮者定也謂以五佛之所證定為所住處二如來等者四種荼羅身也宮如前謂以四廣大身之所證為所住處准此所住故知能住薄伽梵者五佛四塵數諸尊德若爾薄伽梵是唯大日耶答論意別疏就最勝且云大日論盡能住故云塵數若就勝者論意亦可云大日一尊歟略抄此意所住處舉五佛四所證定故以所住推能住可有五佛四身故薄伽梵句釋塵數諸尊也然疏中大日者疏論影顯也為言私云大日是普門躰故云塵數諸尊德猶如慈覺釋中金剛頂經一切如來釋大日或以薄伽梵諸佛通名今名大日故云爾非取諸尊也故論云具釋如疏若與疏異者何讓疏耶但住處句配五佛者今經異顯經住所又如來身故云爾故大師祕經注釋云住所名則五佛祕妙德也文又疏釋樓閣云還以如來種種㓛德寶王間飾樓閣寶王文閣既爾也宮何不爾乎宮又諸尊所證三昧惣妙德也為言次開題釋者自性土加持世界合論而云爾故次下句云十八瑜伽問示本趣文十八會中法界宮會外加持世界歟若論加持世界者今經亦爾瑞相土中以受用等三身為主故又古德釋既云四身何為難自性身有四身故四義釋一往釋歟又義云次云如來是佛加持身者智證大師抄云佛加持身即受用身者自受用身也文般若寺抄云加持身者荼羅中臺尊此名佛加持身當報身也亦名字門道具足佛也亦名具身加持也其所住處者即通受用變化身故有四種法身也文信證僧正述意云能加持自性身住所加持受用反化等流時一切法門眷屬皆住彼法界宮受法樂內證遍滿生死中利益衆生利他也爰知自性身住加持之時有自他受法樂一切皆無非毗那祕密加持文濟暹僧都云住如來加持通能所能加持唯中臺大日如來即能住自性身也所加持即八乃至第四重釋迦世天等自他受用變化等流也攝四重圎壇也取意此等釋意佛加持身為所加持所住處也文點云次云如來者佛加持身也其所住處也名佛受用身云云私案云佛加持身者上薄伽梵句中也彼句𭇥本地加持故本地無相位永上言語加持身是今經教主故云荼羅中臺尊也疏第三云然以加持故從菩提自證之德現八中臺藏身文此意矣此加持尊特理佛住自受用身等故云當報身也字義云理智相應故云報云云今所住又通他受變化等故抄云即通受用變化身故文或又胎藏中臺加持身寄當金界中臺報身毗那故謂教主義同故云爾也本地自證位無言語故現加持身今經故云字門道具足也故經具緣品云此第一實際以加持力故為度諸世間而以文字文疏釋云釋通世諦明起教所由文加持力既起教所由故本地位無法也又為顯此加持身即自性身求異受用以下加持身故云具身加持也然古德未知自性身中有加持身或云本地自證之而𡧱經疏自證無言之文或云他受變化之而同顯教三乘一乘之佛恐隱疏家之深㫖失宗家之本意歟當知以中臺尊故不壞大師自性身法之義又以加持身故不違疏家神力加持三昧之疏中云本地法身者先舉能現本地身為今教主所依疏第三云菩提自證德第六云菩提實義是也具如前後文中辨矣文點云次云如來者佛加持身之其所住處也名佛受用身也云云先師蓮華院云經薄伽梵句疏釋本地法身准諸經例是舉教主文句也住如來下示住所文言也故知以本地身為教主故大師以此文判自性身法然或云加持身或云符同須陀會天者神變不改自性而有利他義又雖住加持自性敢不變如國王雖出外朝其躰無替故云如來金剛幻也又法身色相無比況物故且寄色究竟處示有色相非全隨類應同義耳木憣義云薄伽梵者理故云本地法身也如來者即智故云受用身自受用也此理智合互相加入彼此攝持而成他受用人躰云加持身也意云薄伽梵理住如來智之加持身他受用應身住廣大金剛法界宮云今經教主也為言今他受用者主伴各互受法樂故云他受用不同如常他受用又理智相應故云應身非隨機應現義也云云如來心王諸佛等者抄云如來是所住心王為能住如一切諸佛法儀式皆住於應身即本地身為教主也推㓛㱕本言法身文此意如來者可讀也教時義云諸阿闍梨言本地法身如來心王理法身即能加持身也其所住處名佛受用身是智法身自受用即所加持身令一切衆生見開悟三密是他受用身變化身也亦是所加持身也文此意令衆生開悟三密今文為他受變化也木𢟷義云如來心王諸佛者毗那理也其中者自受用智也能住理住所住智故云住而住也既遍一切加持力生者依理智合加持力生他受用應身人也理智同遍法界人法俱無分限故云遍一切所也即與下釋成生加持身之由也而以下釋他受用報身義也此報身義不同如常如先古德釋云大日經教主不二惣躰本地法身也文又私惟先師意云如來心王諸佛者本地身今教主羯磨身也其中者受用身即三摩耶身也謂理佛羯磨人住智身三形宮中也既遍一切等者從理佛法界加持力生三摩耶受用住所也即與下明所住宮與能住法身平等無二也斯則依正輪圎之法界能所瑜伽之佛躰故而以下而實依正無二為自受法樂且示依正之別猶如唯識論云雖此身土躰無差別而屬佛法性相異故云云一切衆生者一切持金剛者等也所證三昧所法門非一故云根性不同也即此等者理佛云此是能住故智躰云所住即所居故問前云無相法身今何云具三密乎答無相者𥾸𩔰教情妄假之相三密即就真言表德真實之躰故無違耳或無相不具故云無相也故疏二十云此心即佛無非佛之相故云無相文論第三云若入阿字門悉離一切相離相之相無相不具文依此等意云無相故先德釋云無相法身位德無闕故自利利他斷惑法等如此義有云云可悉之私云如來二字屬上句經中如來是加持住所如來也為言心王諸佛住者中臺加持身也以此諸佛能住而住其加持住所受用身中也又義如來屬下句文點可讀如來者心王諸佛之住而住其中也意經文如來者中臺加持身之所住也故加持身住其中也為言既從遍下釋所住如來名加持之由也既遍等者遍法界自證德以加持力生中臺藏身也即與等者顯此所生加持身與本地身無別義也而以等者如來住神變加持三密法是遠為益未來衆生故云令一切衆生乃至種種不同也即此者今中臺藏身也此身所住名加持所也為言故經第五云大日世尊入於等至三昧觀未來世諸衆生文疏十六云毗那義上已釋之佛所以入此三昧者佛住畢竟無相𡧘之法以大悲故住於三昧令一切大會及無量衆生得見此大悲胎藏荼羅莊嚴大會嚴妙之法即是於無相中而現有相雖復有相而從因緣生即不生義同於性淨之法而令衆生各隨本緣見種種色聞種種聲獲種種法各隨心器如法修行有如是大因緣故又為滿足金剛手所問之法令明白無餘故而入三昧也文又疏釋似當機衆云得見大悲胎藏嚴妙之法之故然則經疏互𩔰歟問自證無相位言心俱絁歟答言心俱離而心唯存問既云俱離何亦存心乎答雖離如義及一一心然猶不二心存矣故大師云非一一心之所緣不二心之所證而已文又疏中住心品雖云自證三菩提言語盡竟心行亦𡧘而具緣品釋自證三菩提自心自覺又不思議疏祕祕中祕釋云本不生理自有理智自覺不生故文故知無相極位猶有不二心若不爾者同木石歟問若爾與顯乘一心無相為至𭫸而成證絁言之義何殊乎答彼四言九心分位未及如義一一心况不二心乎問若爾無相位唯識大無五大乎答法佛法爾六大自證位本有云六大法身所以隨緣六大是色心無㝵唯心唯色故依唯心之邊雖云不二心於法爾六大全無增减異矣彼本不生理自有理智者理五大智識大也可思之尋云能造六大色形有無如何答木𢟷義云隨緣六大色心無㝵故雖云識大亦有色形五大或無色形法位六大識大無色形五大有色形也私云若法爾若隨緣六大論色形是所生四相也能造六大若識若五大不可有色形堅濕燸動無㝵了知性故實四大亦觸境非顯形二色故但與顯異彼有為事法此無為理性故次又釋歎加持住處等者前舉住處躰今歎住處德也論云如來加持廣大金剛法界宮者是則五佛之異名文宗家以五句為五佛祕名疏家為躰德二義各舉一義互顯歟或又五佛緣起次弟轉釋故論疏無違例如下四種身文轉釋又五字文中轉釋也又住處配五佛是三摩耶身五佛歟宮閣即如來三摩耶形故先德釋云法界宮者法界婆也三摩耶形文無所依者或本字用正訓順前後文歟此與釋論三種金剛三昧者智論四十七云問曰三種三昧何以皆言金剛答曰初言金剛中言金剛輪後言如金剛如金剛三昧佛能貫穿一切諸法亦無不見是金剛三昧能通達諸三昧金剛輪三昧者得是三昧即能持諸三昧輪是皆佛自義論者攝持義言如金剛三昧者能破一切諸煩惱結使無有遺餘𨐫如釋提桓因手執金剛破阿修羅軍云云私云輪疏三種不合只例同金剛義歟或三事三種其數同故云大同歟或終一義大同意云三種中後一義大同也為言中字有由矣法界者廣大者安然云此法界宮有二種義一自受用遍法界宮義釋云大謂無邊際故乃至心王所都故云宮也云云二他受用法界宮義釋云此宮是古佛成菩提處乃至不獨在三界之表也文智證大師記云華藏世界別教他受用土如何今為祕密教中那土耶答別圎兩教通有他受用今此華藏世界圎他受用身土於一世界分二義更無文雜問答云淺深二義者大自在天宮是為淺義宮深祕義者金剛者實智之智即能破之義法界者廣大之義即實智之躰宮者無相法身妙住之境心王所都心神所宅此宮是古佛成道之處也故云宮隨如來所應之處無非是宮所以名為金剛法界宮文私云安然以此宮以下為他受用土此義不可此目近詞也尤可上宮也又智證大師那土惣云他受用土恐非理兩部經是理智法身境界故當知大師意此宮下釋成深祕法界宮義釋論下引智度淺略宮蕳異密宗義今此宗下還成密乘義也或所謂以下文述淺略義所謂是復次義故古佛成菩提處者疏第十六云然此五事仍是古昔諸佛成最正覺先佛成三菩提也文五事者色尊位住三昧也此中色者本尊形相也住者本尊依言等所引來至加威而住也又十二云以羅字門等淨此心故生其真實智惠光六識發光故即見古佛所行之道文私云准此等釋望行者修顯分別新古歟又義云古佛成菩提者菩提實義也疏第六云謂覺自心從本以來不生即是成佛文舊來成佛故云古佛成菩提也今教教主成佛外迹加持身故對彼云古佛耳摩𨢸首羅天宮者智論第二云如摩𨢸首羅天䄅言大自在文唯識疏七云舊言摩𨢸首羅今應言莫𨢸伊濕伐羅即大自在也文十地論云現報利益受佛位故後報利益摩𨢸首羅智所生故文智周釋云行滿今生即證佛果名為現報菩薩後身地前感故名後報文通法釋云因位窮時現報利益㓛德成滿異佛位故果位彰時後報利益寄色究竟所即於彼身示成菩提受佛位故文二師釋大異今疏順後釋矣釋論云第四禪等者智論第九云問曰何以故名為淨居天梵世天答曰第四禪有八種五種是阿那𭇥住處是名淨居三種凡夫聖人共住過是八種有十住菩薩住所亦名淨居大自在天王文問今此自在宮界內攝乎答唯識疏云其淨居上有實報土第十地居為三界所為不爾乎佛地論此他受用所居淨土為第十地諸菩薩等法處故即色究竟天攝文了義燈云然自在宮非淨居攝瑜伽第四云色界之中十八住處無想天廣果天攝非別處所既云十八住處復言無想攝廣果天故自在宮非五淨居若淨居攝處應十七非十八故文私云疏意在淨居上而色究竟攝也燈意色界攝而非淨居攝然俱以為界內攝矣今疏意非三界攝故下文非今云不獨在三界之表也之故表用外訓也故知疏主意顯智論非三界攝也疏第五云次於東方近北邊布列五淨居衆阿闍梨言此是五那𭇥天子耳過此以上有菩薩受佛識位處亦名淨居天多是一生補處菩薩是第二院所攝非此中所明也文此文又外院第二院分准知又可界外耳問住心論三引起世經云他化天上有魔波旬屬他化天攝取意他化上魔天既他化攝淨居上自在豈非色天攝乎依之淨影釋云此他化上別有魔天處近他化亦他化攝依大智論五淨居上別更有一菩薩淨居是第十地菩薩住處以此通前色界合有二十三天文此釋㔟道理何答魔天是界內波旬故云可他化攝十住菩薩界外聖人故非色天攝也依之或經云有妙淨土出過三界第十地菩薩當生其中文是以住心論中欲天中雖舉波旬天色天中無示今天斯則自顯界外義歟義章釋文點可讀以此通色界云云所以智論云五淨居上故舉色天之便雖舉此天非謂色界攝歟今此宗明義等者開題云若據淺略義摩𨢸首羅天王宮釋論云如疏引若就深祕釋者以自在加持如疏云云雜問答云淺深二義者大自在天王宮是為淺義宮深祕義者宮者無相法身妙住之境此宮是古佛成道之處也故云宮文私案此二文意前此宮古佛等文中所謂下一句淺義標句上一句深義結文也然今文重釋前深祕意也今成佛外迹云深祕對如常淺略故若不爾者何今云有應之處矣但上文所謂者復次義非釋成上歟猶如釋論中本論所謂云復次矣或又轉釋深祕即為淺略也如疏下云轉釋佛莊嚴藏耳當知智論義為淺今經義為深也神心所宅者明性云神心即知神知義也神心是能住自性理佛也所宅即所住受用智身也謂隨如來有應之處等者自在宮處所不定意歟佛地論第一云如是淨土為與三界同一處所為各別耶有義各別有處在淨居天上有處在西𭤧等故有義同處淨土周圎無有邊際通法界故如實義者實受用土周遍法界無處不有不可言離三界處亦不可即三界處若隨菩薩所冝現者或在色界淨居天上或在西𭤧等歟處所不定文私云今宗義同佛地如實義者矣智證大師在唐記云第四禪者若於毗那之分為遍法界第四禪乎答然也咨問若遍法界皆是第四禪者唯有那住處應無衆生所居乎答那唯遍法界不妨衆生所住猶如𡧘光遍於三土文私云此文成處所不定㫖歟疏第四云大日如來身如𨶒浮檀金紫磨金色首戴髺髮被縠衣此是首陀會天成正覺之幖幟也彼界諸聖天衆衣服輕妙本質嚴淨不復假以外飾故世尊俯同其像也略抄准此釋大日如來又於色界中五淨居天成正覺歟問金剛頂經云住阿迦𡰱吒天王宮中文慈覺疏云阿迦𡰱吒天此云色究竟文與今自在天宮同異何答安然教時義第四云第四禪色究竟天有五種名一名色究竟二名有頂三名須陀會四名魔𨢸首羅五名阿那𭇥天第四禪主亦名魔𨢸首羅文私云今宗意胎藏理身住金界智佛故疏云其所住所名佛受用身彼智佛云自在宮心王自在德故金剛智佛住胎界理身故呼彼理身云色究竟色身究竟躰故故大師釋云身心互為能所住云云釋論第三真如為身般若為心云云又善無畏破地獄儀䡄云智法身佛住實相理為自他受用現三十七尊令一切入不二之道理法身佛住如如𡧘照法然常住不動而動現八為自受用示三重荼羅令十界證大空雖是理智之殊廣略之異本來一法曾無殊異文私云實相理者如如理也如如𡧘照者疏云云實相智云云如如智也故金光明經云唯有如如理及如如智名為法身文金界云云自他受用胎藏但云自受用者自性受用佛與自眷屬各三密門互以法樂故云自他受用實行隔聞故但云自受用也無違矣大師釋云自性胎藏理身受用佛金界智佛自受法樂故與自眷屬各三密門文文證既分明也不可異求矣當知大日經是理智不二之理身金剛頂又智理不二之智佛談也故金界那以止觀二羽而結智胎藏毗以定惠兩手而作定甚以有深意者歟又金剛頂經能住佛身舉智之德教正經理趣經等大日經中所住宮殿示五智之名今經也瑜祇經中能所住佛宮俱明五智德三經教主住處義良有以也此中有味深思當見矣問諸經中皆以器界為住處何今以佛身心為住處耶答凡三乘教雖云唯識所變猶論心外之依正一乘宗雖談一心緣起屢滯因海之人法斯則洗滌心外之礦垢未開心中之祕寶故然今教意性德本具匆陳恆沙已有速顯是故金剛𡰱吒天本有衆生心上月輪胎藏法界宮豈非我等胸中之蓮臺所住是依正輪圎之法界何遙舉鷲峯之岫能住亦理智瑜伽之佛躰誰遠尋鵝王之迹故經中或云三十七尊住心城或云大菩提心光明殿此意矣依之序分六動名六根本煩𢙉之動搖誰混東涌西沒之竒瑞流通衆退皆悉禮佛隱而不現寧同作禮而去之儀式故大師釋云恆沙眷屬鎮住自心之宮無𥁞嚴優遊本初之殿云云心王心數諸尊處心蓮而彰四之性理佛智佛大我住心月而三密之法大師釋云雙圎性海談四自性重如月殿三密自樂云云可思之又先德釋云聲字實相各窮性海之深理大三法羯同振本地之高德云云此釋逆次述上大師釋意聲字實相是三密故此中深義依事相更問觀夫金薩頂之日并諸佛臆中之荼妙雲流傳之時開衆生心上之䥫五輪本我身誰求西土之雲兩部即吾心何東流之風故今疏中釋此中祕密謂心為佛也金剛頂經中此即毗那聖衆集會便為現證都婆可悉之可悉之又疏第五釋內心荼羅云此是如來祕傳之法不可形於翰墨故寄在圖像以示行人若得深意者自當默而識之及自當默而識之甚深甚深深察之問今理佛住智身何云有應乎答信證僧正義云應有二義一是應義二相應義謂理智相應也今取後義文私云理智相應義可然又疏第四云須陀會天同之姿文自性中加持身理佛又有同義故云應何𭁆然非受用以下應也一切持金剛者等者今持金剛可通菩薩衆成就惣句皆悉衆會是廣故故住心論第十釋今金剛云金剛者五部諸尊所持法界幖幟文或又舉內眷屬顯大眷屬歟故下此文云其金剛名曰空無垢等故但大師釋於金剛部中亦有五部故祕藏記云五部即五智一智所互具五智所以成二十五部文又先德祕釋中於十九金剛分三部五智故二義中前義為勝別中金剛菩薩列舉云及普賢菩薩等今文外無菩薩惣句故又金剛菩薩名互通故故疏第十二云復次菩薩身即是金剛之躰而十𭤧一切佛同以如來金剛智授其手故名持金剛也文此釋金剛名通菩薩也又第三云自臍以上至𠰸出現無量十住諸菩薩然此中自有二重從心以下諸大眷屬從心已上諸內眷屬通名大心衆略抄此文內大同名十住菩薩故准此等釋當知今文持金剛通二重眷屬云持金剛也住心論釋又此意矣故寶鑰云五部諸佛擎智森羅文既云諸佛不𢩁金剛部也又惣句金剛𭇥二類故其中云其金剛或雖通二金剛名近內眷屬故從勝云其歟問金剛頂經中與九十俱𦙠菩薩衆俱之惣句𣇣大摩𡰱殿後諸經亦爾何今違顯密諸經例衆成惣句安樓閣前乎答或云處衆各惣別二節故𦂶文也私云處衆交舉而顯依正不二人法一躰義歟得淺深二釋者鈔云淺謂執持執持金剛杵也深謂住持住持金剛也文此釋意持𭇥二義歟執持住持故意云摽今謂持金剛結於義為勝文起𥁞無爭執持相望持金剛得二義故為勝也為言若不爾者不順字及結文故問若爾不順故字應云然隨文便何答今持金剛亦執義故是故隨便二名互用也為言私義云梵語陀羅具執持二義故舊云執金剛新云持金剛然今經得新舊深淺二釋故隨文便或云持金剛一切持金剛文或云執金剛十九執金剛文於義勝也為言五百執金剛神者或云表釋迦五百大歟或示五百塵點歟心王所住之處等者准上文云如來在此宮中為獨處耶下文云心王毗那可𡱈大日一尊今經教主故心數又第一重等內大眷屬歟下衆成就文列金剛菩薩故今文舉內眷屬顯大眷屬歟云智及執金剛故疏第四云荼羅者名聚集乃至十世界微塵數差別智輪圎輻湊翼輔大日心王是故為荼羅也云云但不舉四佛四菩薩者彼具王數二義五佛即心王餘尊即心數又大日即心王餘尊即心數又九尊心王餘尊心數也今舉偏顯通歟例如立義四句貫兩重故不屬矣又住心論釋今經文云心王如來大毗那五智四及心數微塵數眷屬文此釋以五佛心王為薄伽梵句歟故次下釋云薄伽梵者摽諸尊德文又上文云五佛即心王餘尊即心數文但此意舉能人非五佛皆為教主歟或又但心王如來大毗那釋薄伽梵句五智四釋如來乃至法界文次下配釋分明故與疏釋同大日普門躰故云諸尊德猶如金剛頂經一切如來釋大日如來矣或薄伽梵諸尊德今名大日也為言故云具釋如疏可思之問依轉識得智義四佛是八識為躰或九尊配九識高尾口准顯家八識九識皆是心王躰何今屬心數乎答今教意帝網瑜伽故心數心王重重也故頌云心數心王過𭃯塵各具五智無際智文以如常一途義勿令疑矣又祕藏記中一識心王八識心王別本即身義中以法界智為本為證四佛等八識為心數耶實義是互相涉入彼此加持故主伴重重王數多多也雜問答云是以互為能所主伴自受法樂文別本即身義云金剛界七十三尊大日為心王餘七十二尊為心數胎藏界五百尊大日為心王餘四百九十九尊為心數取意正本即身義云心王者法界躰性智等心數者多一識文私云正本即身義文等字等取四佛歟住心論云五佛即心王之故或又通四菩薩歟祕藏記云不動九識其餘十佛𠛴一切心王攝於一識名一切一心識云云此釋意八中臺云九識第一重以外云其餘故無不即入金剛界中者准上文云金剛法界宮彼宮云金剛界中歟又第二十卷云一切大會荼羅皆是一身無別身也即普門身是法界身即是金剛界身也文准此文心王心數諸尊當躰云金剛界歟界是性義名身躰也金剛界儀䡄云應當知自身即為金剛界文准之又上文云金剛喻實相智此智躰如來實相智身文所住宮即受用身故云爾故前後釋是同歟心王毗那成自然覺等者此為成今經會加持身須先明自證法門身主伴也故云如來內證㓛德自證三菩提義也下卷中或云菩提實義第六卷或云常寂之躰第四或云菩提自證之德第三或云實相自然智惠第五等是也此自證妙嚴之相常寂之躰法爾無减非造作所成故云自然覺也故第四云如來妙嚴之相法爾無减非造作所成故文又疏第六釋菩提實義云謂覺自心從本以來不生即是成佛而實無覺無成也文第一云如來無㝵知見者一切衆生相續中法爾成就無有减文又云唯佛與佛乃能知之是顯十地非境之㫖也故上文云則雖十地菩薩尚非其境界下卷中十住菩薩猶因羕佛神力得見加持身文此等義如先辨耳問唯佛與佛者何佛乎答當經理佛云唯佛金界智身云與佛例如止觀唯佛與佛文弘中釋唯佛釋迦與佛十𭤧佛也菩提義等者抄云雖法與人能所有異然恐難解謂於荼羅中若但𣇣名法荼羅即菩提義金剛若於彼中𣇣一切賢聖各持其依位而住是佛陀義持金剛者取意此釋三昧耶名法歟故云難解歟今謂不爾結前自證法門故云菩提義謂自證三菩提故此自證法門法爾所成其性定不改故云金剛非𭚘等也又從此法門身今法身三摩地等云法門身非種子等法門身也現加持身大日及內大等羯磨身故云佛陀義即有無量無邊持金剛者是即生後也問第四云以如是內證之德無量無邊故其所加持現作法門眷屬無量無邊文此釋法門身又所現如何答法門身有二重法身三摩地等內證德也種子法荼羅是所現加持身也四身皆法利生此皆加持身故故即身義云法身三摩地等亦名法智文下經文云即以陀羅𡰱形示現佛身文住心論釋云法身既爾何况餘身文問自證法門五十一心數九識心王等不同何皆云智耶答智所持故或與智相應故信進慚等又云智歟由此衆德等者此文有二義一云既云衆德却釋前自證㓛德主伴集會義歟二云案經文集會言專今經會座故所以佛陀義成衆會義也又此者因近之辭故雜問答云此內證境平等界中有過塵數心王心數是會集之義也此一相平等四種法身遍衆生趣法利益此聼處名為集會耳文以此文二節證前二義耳問經文一切持金剛者皆悉集會者多人相望而成集會義何今一人具德云一切集會耶答若少分未等一法未滿等反釋經一切文故知具一切德持金剛者一味到實際故云皆悉集會歟或又經疏影略互顯也然以自在神力等者疏第三云然以如來加持故從佛菩提自證之德現八中胎藏身從金剛密現第一重金剛手等諸內眷屬從大悲行現第二重摩訶薩諸大眷屬從普門𭤧便現第三重一切衆生喜見隨類之身若以輪王灌頂𭤧之則第三重如國君長第二重如朝百揆第一重如宗枝內弼中胎如𡸁拱之君故華臺常智為大荼羅王也文准此文今加持尊特身者中胎藏身今經教主也既云然以如來加持故即中胎大日非云加持身耶疏第六云成佛外迹是也依之疏第四云大日如來身紫磨金色被縠衣此是首陀會天最成正覺之幖𢡠也如來妙嚴之相法爾無减非造作所成故十住菩薩猶因羕佛神力得見加持身其於常劣之躰如在羅縠取意此文又大日如來首陀會天五淨居天同姿云加持身今加持尊特身者今經教主云事不可異求矣又般若僧正抄云加持身者荼羅中胎尊亦名字門道具足佛也亦名具身加持也文故知即從心王毗那者菩提自證德法門眷屬者金剛密大悲普門等也所現中舉第一重顯二三重眷屬也或又法門眷屬者但智也惣即別名故問疏第五云內心妙白蓮華者是實相自然智惠蓮華是大悲方便也其餘三重是從此自證㓛德流出諸善知識入法界門耳文如此文八云大悲方便三重俱云自證㓛德能現法門相違如何答自證法門立名隨冝通而言之皆法門身又自證㓛德也第三卷中臺八云自證勝第五三重云自證據通門也故當卷下十九執金剛云內證之德四大菩薩云內證㓛德即此意矣又八云大悲者配因根究竟時有此義故歟疏第二十云為以中臺為菩提心次八為大悲外三院為方便也文持大空戰具者抄云今此諸執金剛各從一門內自證智遍一切所破諸無明障染義名戰具大空智即戰具名大空戰具作持業釋或執金剛者各隨一門法界慓𢡠謂是杵等是大空之戰具可作依主釋文私云一一智皆徹字本不生際而一相一味故云大空故云一相一味到於實際也各有斷惑㓛故云戰具也或又一一智具衆德而涉入猶如空𭇥衆像無㝵故云大空歟即身義云法身同空而無㝵𭇥衆像故曰大空文或又以空無垢智所持皆同空無垢之相無有餘相故云大空空遊步等准知之舉初二三顯餘歟無明之煩惱者或本無相之煩惱云云疏第二云由有無明生五根本煩惱文准此釋五根本煩惱歟今依主立名矣又通百六十心故下文云百六十隨煩𢙉文或云煩𢙉無相㒵而縛心如天帝五繫修羅故云無相耳云云又十卷義釋云無明堅執一切煩𢙉云云十四卷義釋云無相堅執一切煩𢙉云云既云一切煩𢙉可五根本煩𢙉及百六十隨煩𢙉歟本記云建治四年二月七日於醍醐寺中正院加點畢金剛佛子賴瑜
