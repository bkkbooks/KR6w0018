body:
  text: 疏卷第二之三若以淨菩提心等者抄第三云疏若以淨菩提心等者若言不定之意此有二義謂若以淨菩提心為出世間心即是超越三劫瑜之行則出世間心生出世間心生即是淨菩提心此心出於一切世間故若以佛惠初心為出世間心即是三阿僧劫成佛亦名出世間心今言三阿僧劫即三種執行者若一生越此三執即一生成佛何見有時分耶故云若以等文教相抄第三𫐠意云此釋心云於三執斷位疏心有二義謂疏若以淨菩提心等者若以初地為出世間心是即地前斷三執也若依此義可言所三瑜行皆是地前所行也疏梵云劫波有二義等下第二義若以佛果為出世間心即三執至第十地盡之疏心付第二義釋始終也文抄第二云今約因中具有麁細極細三重執障翳菩提即以地前祕密𭤧便越初劫一重麁名離一切障出世間心生見心明道時淨菩提心始得顯現如是練修至八地時越第二劫一重執名離一切障其菩提心逾勝逾增更益𭤧便乃至金剛道中越第三劫極細執名離一切障其菩提心與如來等此位但有四分之一佛地之障存焉乃至唯佛地障解道斷故此乃四分之一最後微垢也文又相鈔云此釋心云地前唯斷麁其所以乃至法華儀䡄云若能專注無間修習現生則入初地頓集一大阿僧劫福智資糧文故知真言初地離一僧劫所斷麁執證寂然界乃至既地前唯斷麁故知第二第三執定地上所除也云云範抄云若以淨菩提心為出世間心即是超越三劫瑜行者消文之𢝰句也梵云乃至得至佛惠初心故云三劫成佛也者別釋也故以初地淨菩提心結佛惠初心也若佛地何云初心於佛地不可有初後故又疏無若以佛惠初心文上下同云三劫仍非別位歟云云私云朝譽意依鈔義專成地前一劫地上二劫之旨也傳法院覺心義亦同之本寺道範義高野古德等多分義也是三劫地前義也初義意三賢是初僧祇初地乃至七地第二僧八地以上第三僧之義諸論設敢以無矣今宗又爾也故五祕密云能反易弟子俱生我執種子應時集得身中一大阿僧祇劫所集福德智惠則為生在佛家文又觀智儀䡄云若能專注無間修習現生即入初地頓集一大阿僧劫所集福德智惠資糧文此等文既今宗又地前一僧行即入初地也又今一僧執是我執故不可云第二第三劫後二劫中唯斷法執故又疏第六釋八地三昧道文云菩薩初度第七地時上不見諸佛可求下不見衆生可度謂是住大𣵀槃於行休息爾時十𭤧諸佛以此三昧道起其心文又疏第二釋第三劫行云行者初觀空性時覺一切法皆入心之實際下不見衆生可度上不見諸佛可求爾時萬行休息謂為究竟乃至爾時十𭤧諸佛同時現前而勸喻之云云二處文全同應知疏意第三劫在於八地上也又檜尾口決中以儀䡄汝之所證處是一道清淨文釋住八地如幻三昧也既地前初劫八地上第三劫義其分明也若爾初地乃至七地第二劫之義其理極成矣依之大師祕藏記云越三執越三僧劫即是十地究竟也過此修上上𭤧便斷微細執至佛果故曰此四分之一度於信解文既十地究竟斷三佛地斷微細故地上二劫義分明者歟加之復慈𫞕儀䡄云若一生中從初念誦至於越三無數劫行即證一生補處三莾地文又疏第三云乃至為一生補處菩薩擇去心中無明父母極細之垢亦名治地云云此等文又斷第三劫執至因滿位云佛惠初心也然後斷微細得果故於中有二一無間道斷彼解道得果故故抄云至金剛定越極細執文二佛果斷故故抄云唯佛地障解道斷文此乃依十一地十二地異故但因滿位而言三劫成佛者等妙二覺一佛二名之故又密抄第三云問第三劫滿得成佛不若越三執力即得成佛故疏云復越一重極細執得至佛惠故文又雜抄第七智證云越一百六十心麁執即一劫越第二重細執即二劫第三重極細執即超第三阿僧至於佛果初心故云於成佛時不限劫數也心內無明漸漸斷除即超劫之義也文此等釋斷第三劫執即至佛果也故云故云三劫成佛也此是佛果初剎那云佛惠初心也故釋論云極解道初剎那中一時相不能俱行文此意微細攝極細而不開也依此等釋義地前初劫地上二劫之義同瑜伽起信等矣後義意三劫俱是𭔃𭔹如常之地前位也故疏下釋第三劫極無心云此心望前二劫猶如蓮華盛敷若望後二心果復成種文住心論第九云望前二劫者指他緣一道二種住心後二心者示真言門根究竟二心文又疏云次生極無自性心乃至爾時生於佛家文華嚴云生在如來家即得入初地文又疏第三云此空智生即是極無自性心生也乃至即是真言行者空無垢菩提心也文疏二云初地菩薩得此空無垢菩提心云云又云漸次證入者如初無畏時以聲字觀入荼羅行乃至第六無畏於平等心中修𭦟荼羅行離垢地以去各於自地觀心中修荼羅行略以位分之已作十六重𭰹淺不同文私云既離垢地以上為十重初地同第六無畏也又住心論第八心云是因是心望前顯教極果於後祕心初心初心時便成正覺冝其然也云云疏二云此心望前二劫猶如蓮華盛敷若望後二心果復成種故曰如是初心佛成佛因云云以上諸文但以極無置初地矣又論第八心云云此菩薩淨菩提心門名初法明道釋云是明法身真如一道無為之真理佛此名初法明道智度名入佛道初門於諸顯教是究竟理智法身望真言門是即初門略抄又二教論上云至如彼百非洞遣四句皆亡唯佛與佛乃能究盡此則顯教閞但真言藏家以此為入道初門略抄已上二文以第八心文同初地歟又當卷下釋初地果相云從此無有待對出過心量不思議地云云此意一道極無俱屬地前歟云從初地離待對故已上三義若能越淨心或一道地前極無初地或二心俱地前或兩心同地上三雖異若依所度妄心者三妄皆在地前故云地前三劫耳但至三祇配立違諸論者大師釋此事云問第三僧祇即是八地已上而何言初心菩薩耶是初心菩薩也無數劫者三劫之中何劫耶第三劫也已下如先別此釋既云真言初入淨菩提心位頓具顯行無數劫功德準知兩䡄又於自宗初地得顯行第三劫福智故云一大阿僧祇非云初僧祇也俱生我執等者實教意於二障中不分見修地前伏現初地斷種十地除習故極細當二障種故且煩惱障邊云我執種歟非無法執種麁惑𭔃現行微細同習或又但一煩惱麁云我執細法執云種子我執之種子歟次疏第六釋者疏自釋云復次此中應初法明門三昧道於上品中已故不重言又如上所一生補處及八地三昧是教道法門作如此耳然祕密乘人於世諦中即能通第一義諦者從初發心具行大空三昧其謂不然則於一生之中不能頓滿諸地也云云此意於今宗有教門實行二意若依教道門準如常第三劫在於八地上例如云初二三地相同世間四五六地𭔃同羅漢也故云一生補處及八地三昧是教道法門等也若依實行者初地斷三故顯行八地上行初地得故云從初心即具行大空三昧也疏二云然此宗從初地即得入金剛寶藏文即此意矣或又八地三昧者直指如常八地上第三僧祇也教道法門者常途教門也然祕密乘等者真言門行也初心菩薩頓得顯行第三劫功德故故云其謂不然乃至不能頓滿諸地也次祕藏記釋者越三之後十地究竟也為言文點云越三僧越三執即是十地究竟也過此者過十地位也此位亦雖斷微細且𥁞處云果位所斷也猶如根本無明雖從初地斷此云佛地所斷矣次慈氏儀䡄及疏第三一生補處位斷第三劫執者疏第六云如上所一生補處是約教道法門文餘釋如先若實行是如尊勝儀䡄等故彼䡄云初心時便越百六十心度三無數劫行證普賢色身三昧耶即是初心便成正覺文此又同疏從初心具行大空三昧文矣故知今宗異餘教三劫在地前十地離待𭔹也故大師釋現世證得歡喜地文云非顯教所言初地自家佛乘之初地也云云可悉之又依初義會疏及論文者先疏此心望前二劫等者抄第四云第三劫極無自性心生時如蓮華盛敷故云望前二劫等言若望後二心等者此心喻八心中第五華種心第六成果心後二心者第七受用種子第八嬰童心也望此二心名果復成種云云又教相抄會論釋等云前二劫者指初二劫極無自性是第三劫心謂八地乃至十地也以此極無心為因句以蒙佛警更增進心為根句即金剛心一念也後以成正覺心為究竟句也然顯教意今第八地心為果位前二劫顯行滿升此地故今教以八地乃至十地為成佛因初心佛矣云云疏第三十六重𭰹行者彼卷下釋云傳教灌頂是名阿闍梨乃至若生極無自性心得入如上荼羅海會名阿闍梨從此復有十重𭰹行乃至於解三密人中最為上首如金剛薩是名阿闍梨復次毗那是名阿闍梨云云抄第四釋極無自性心名阿闍梨已上之文云如是次第從下至上皆得名為阿闍梨也云云又云疏從此復有十重等者十重𭰹行即十地也乃至云云教相抄云此文意從傳教至極無是從下至上示阿闍梨位謂從地前至第十地也次從此復有十重等者還從上至下委顯有十重德行謂從十地至初地也次乃至已下顯從初地至傳教更有地前卅心故云乃至云云或云從下至上六重如先乃至如金剛薩者十重從上至下舉初地金薩上九地云乃至也又相抄云疏第二釋八地已上云住是地已善知諸地障乃至如是等有衆多十心云云指此十心云十重𭰹行也取意况復云十重𭰹行何入佛果故知前文離垢地指初地也空無垢菩提心故凡三劫地前地上古來未決然前義為勝疏論釋以顯教極果為真言初門故又望後二心會釋非理先密抄釋不可以三劫配十地時第二劫至七地然配五六地華果二心為此心而七八地二心云後二心理豈然矣次相抄義又非理何者八九十地為因句長短三心中何若短三心則一地內有三心長則八地上究竟句也等覺為根果位為究竟依疏何文乎開上上𭤧便雖為佛果未見此也又八地以上淨菩提心經疏何文乎就中十地三句真言行位也誰以八地上究竟句為真言初門矣密抄猶淨菩提心初地義明鏡故許地前三劫一義然依彼釋成八地上菩提心義非啻抄釋害經疏明文暗大師釋論悮甚哉次又十六重𭰹行是釋漸次證入文然作順逆二科通釋大背文復疏第三云初劫智惠猶與二乘共行若二劫智惠尚與二乘共聞第三劫等空無邊智惠一切二乘不能思議堪作祕密行阿闍梨也就祕密中又漸次轉𭰹乃至佛為十地般若則九地非其境界唯大毗那得名究竟阿闍梨也略抄此中等空心者極無心即初地也就祕密中等者離垢地以去也既云漸次轉𭰹從上至下豈夫爾乎前文自地𮗚心者顯此祕密行義也二地已上不𭔹顯行是真言行故故疏二釋初地果相云從此無有待𭔹文又既毗那云究竟阿闍梨加佛地為十重也但九地非境者十地十一地開合異故合門云爾歟或等妙二覺一佛二名故除十地歟前文舉金薩大日二種者六無畏十重中各舉終阿闍梨顯前阿闍梨躰故云乃至也乃至言流至毗那上又八地上十心者不合疏文疏釋云有十心無邊智生即是初地果相也文又𭰹行者多分歟或佛果亦𭰹行所得故云爾或微細惑解道斷故果位有𭔹治行相故云爾歟又十六重是阿闍梨支分故傳法阿闍梨作此事業故毗那云𭰹行歟故鄰彼釋云是故作最初阿闍梨事業時即須𮗚照自身即金剛薩毗那文又智證大師釋云有十重𭰹行者從第二地至於等覺也於無自性心當於初地也云云依此釋十重𭰹行無違但違毗那阿闍梨文矣又三祇配位相違者顯密相違文義非一何於此一事守顯乘就中抄釋依初義許地前三劫之義若三祇配位決定豈許彼義乎顯教中有地地經三之義耳尋云微細執唯佛果所斷乎如何或云第三極細執從初地至因滿斷之次斷微細執至佛果也故疏下文云復越一劫升住此地即是初入此信解地乃至更開佛地為上上𭤧便乃至故曰此四分之一度於信解也文此文初地斷第三極細之後更不云斷別惑而佛果位斷四分一微細故又疏第三卷云補處菩薩斷無明極細之垢故是故成第三極細執至因滿之義故知微細執唯佛地所斷也又義云經云復越一劫升住此地此四分之一度於信解文此於第三執開第四執為十地所斷也謂第三劫終越諸論之句疏釋云越第三重微細百六十心文此後復次信解地等十地畢云復越一劫等是舉信解地所斷也次此四分之一者此言指前復越一劫文也故知十地斷微細執也或云今第三執有三重一初地所斷二十地所斷三佛地所斷而今復越一劫云三者合十地所斷云極細也過此修上上𭤧便斷微細執者別開佛地所斷為第四也真言門行者等者問三劫俱有時分執義何第三劫置真言門言耶本中第三劫文云復次真言門等文今準彼歟問初二劫顯如常顯行可爾今初二劫又執何更云真言門耶三劫皆雖通顯密二行第三劫能越心即初地淨菩提心故此位顯極密因故更置真言門言也得至佛惠初心者密抄第三云第三劫滿得成佛不若越三執力即得成佛故疏云復越一劫極細執得至佛惠也文又雜抄云第三云超極細執即超第三僧祇至於佛果初心故云於成佛時不限劫數也文依此兩釋佛果初心云佛惠初心故梵云已下可為異釋也大師𨹔羅尼義云得至佛惠初心者真言佛惠初心也顯宗當圎滿正覺位也文此意淨菩提心云佛惠初心也梵云下別釋已上惣標也所謂惣標別釋成三劫地前之旨也但云三劫成佛者斷三是初地分證成佛故菩提心義三云義釋超三重執名度三阿僧祇劫過第三劫入佛惠初心名淨菩提心門淨菩提心門以上十住地名信解行地文私云此釋雖似同大師釋其意異何者以別圎初地初住同淨菩提心故故彼釋云天台圎初住別初地證道同位即是真言佛惠初心淨菩提心門也云云大師以佛惠初心當于天台果佛故安然意非理天台別教地前可三劫歟若一生度此三執等者鈔第三云若一生度此等者此宗明義但除執名為瑜祇若一生度此三執名一生成佛文問今此一生成佛與前祕密釋三劫成佛全同可云耶依一義非全同歟問兩釋雖異俱度三成佛所度既同成佛何異乎今文若言起盡顯異前成佛也所謂前標若以淨菩提心結得至佛惠初心是即明初地分證成道也此中有顯密成佛顯雖約究竟且就密成分證義也今若一生度此等者更顯一生成佛究竟成道也分滿既殊前後成佛豈同乎依之大師雜問中釋三義畢云問如此等義爾耳今所建立不歷三劫此生即上菩薩地位即身成之義有依慿耶證文甚多云云如此問經論等中疏第一所之大品文證一生二生義依此釋案今文即上菩薩位當於得至佛惠初心即身成佛即今一生成佛也但三言雖同寬狡是別後三攝微細故故抄第四云前言三劫不四者合佛地一障在十地故文仍無過問案文次第上釋時分執義畢而言即一生成佛何論時分耶之意無爭前常途祕密中重蕳時分成執義是正釋通妨一義也何云別義乎後至文處釋第三劫時或釋舟車神通至到一處或判巧拙難易不同得寶無異路云云既云至到一處何別分滿寶所矣又兩處三言何忽有寬狡乎祕密意若分證若究竟皆蕳時分故結何論時分耶今分證究竟即如一生二生二類故金剛頂略釋云若能受持思修不三大劫十六大生乃至現生證如來大覺位文即身義云諸論中皆三劫成佛今建立即身成佛義云云此即以真言究竟成佛非待顯家時分成佛乎或又此即身成佛與一生成佛有寬狡一生二生同不捨肉身故即身成佛攝也又佛惠初心是祕密分證義𨹔羅尼義釋分明也如先一生成佛又究竟成佛大師處處判文也但至下釋者真言分證與顯究竟一處故云爾非謂祕密中無分滿也故疏第一釋初地成佛云然非究竟大牟尼位文又三言隨冝何必一同例如初劫中三重三也仍無失又義準祕記釋者初心者因滿望果云初心歟或佛果初剎那歟然則究竟成佛若一生下雖上明時分執三劫成佛未判勝劣取捨故度三成佛是密即身成佛故不取時分也為言或又密成佛雖非時分未聞隔生即身義故即顯祕密成佛是一生成佛也然就第一重內等者抄第三云然第一重內復有三種三執今初出世心生即離初三執謂世間衆生從無始不了我之自性唯依諸蘊執有實我由執我故起種種惑造種種業受種種報成三毒根今瑜伽行者從初心依真言門了知心相於諸蘊中即離相在內外觀之皆不可得即離我倒所生三毒根本是越三世間三執也文此釋三道似云三毒矣教相抄一云心云付初劫所斷麁執又細分有三重三執第一謂以貪嗔癡三毒為三此中攝所一重百六十心謂付六十心於一一心各有麁細重重其中𭰹細攝乃至極細執其中麁淺此即當毗曇所聲聞人見道位所斷也故住心論第四云此唯蘊無我一句中攝一切小乘法盡故今聲聞乘名唯蘊無我住心文故知觀唯蘊無我度六十心者是諸部之棟𭩮毗曇斷惑也若爾成實等論可屬緣覺智耳略抄此意六十心通見修三之中今舉麁𭑭中見斷六十心歟唯蘊無我言雖通三道且就初得𢝰名歟例如無雲天云最初解了是顯見道位也問麁中既分三重第二第三應亦爾耶般若寺抄一云問其三重三執者何有每三重執各有三重凡九重執耳問爾初重執云三執何初重執建立麁執細執極細執也餘二重執亦如是也問於劫亦可在九劫三劫各三劫之故爾云有何妨問爾疏正文何三重執畢次文云凡有三重三執也云云可云單三執復三執耳略抄準此釋細等亦應有三種歟此釋初重內三種亦立麁細等名如次可配見修相望修惑是細故種子極細義也但出疏正文三重三云云今本云三種三此乃麁中有三種三妄也為言非九劫之義也然今隨義轉用歟又雜問云云越世間三妄執出世間心生者於妄執有多種一者百六十心三重度故云三妄執二度世間心離我倒所生三妄名越三妄執三六根六境六識制伏此三故超三妄執四者斷業煩惱無明故云度三妄執問此四妄執配人云何第二大乘人所斷也第三三果所度也第四無學所斷也若隨根而論之凡有三種三妄執問第一三妄何人耶真言行者略抄此心於一文釋有四妄義歟就中初惣釋三妄文為真言行者所度以麁妄中三重為顯乘大小乘人所斷矣準此釋第二第三劫不可有三種三妄歟六十心文可𡱈第一重歟所謂根境界等者教相抄云第二三妄執者於根境識三法所起妄執也是謂聲聞所斷修惑故云三果學人所留滯於十八界諸法自相所起修惑非須𨹔所斷故云三果所滯云云安然釋云是藏修道三果所斷修惑文修道三果者預流果是第十六心修道攝故此果進斷修惑故云爾歟或此果直雖不斷修惑修道攝第十六心是已曾釋故所斷言正一來不還歟前抄云非須𨹔所斷也若云所留滯三果皆依後惑故歟或隨在何道斷惑得果道故云三果所斷歟問何故根境識云修惑耶惠暉疏第一云十五唯修斷者五根五境及善無記心王為所依境修惑為能緣是所緣縛此能緣惑修道除名修斷也文俱舍論云後三界通三文光記云三通三者見斷隨眠及相應法迷理起故四相與得是彼見惑親起故皆見所斷乃至諸餘有漏若無色善無覆無記是不染汙緣縛斷故若諸煩惱及彼相應迷事起故四相及得是彼修惑親起欲及善染無表是修斷心親起故又是色法緣縛斷故皆修所斷乃至一切無漏非繫縛故皆非所斷文準此釋今疏中於後三果取修斷邊故十八界諸法云三果所斷也見斷邊攝第一三妄故然此十八界中染心王及心所等成妄執法皆自性斷也善無記七心界心所等及五根五境等所緣縛也今為能緣修惑云妄執也或又若眷屬躰五根五境等亦妄執攝歟猶如第三妄執舉業矣故釋論記釋執相應染云眷屬亦通業及果報文佛地論又爾也淹留修行者淹久留滯義也謂見修相望修道時長故云淹久也又前見惑頓斷今修惑漸斷前惑斷故云修行後惑未斷故云留滯也又義根境界三妄是法執也故下釋淹留修行云法執當心又大疏抄釋第一重三妄云三妄執自何起我執法執無明起也云云問以何可知疏云最初解了唯蘊無我根境界淹留修行業煩惱株及無明種子略抄準此釋三果是法執未斷位故云淹留修行也私案於十八界諸法有躰用迷用是人執修惑也迷躰是法執也然前義為勝所以初重三妄皆所斷故又若法執者設聲聞無學設緣覺無學亦應留滯何𡱈三果乎又有不示修斷之過故又下文如下抄如內外十二界等者或云如者若義也謂於根境界文有二意十八界義如先又若內外十二界即根境故境界合言之也為言問若爾何云三妄耶迷根境十二界起修惑三毒故云三妄也例如第一重於蘊起我倒所生三毒也或云內外十二界界字通根境歟或義初云唯蘊舉五蘊今言根境界示十八界此三妄等中未明處門故釋十二處也十八界中以六識合意根界故成十二界也為言又義根境界文似處門然今釋界門故作此釋歟後二義意如者指事義也或云義章中依成實意釋法入之中分出六識此意以六識可合法處歟然大小乘所判皆六識攝意根成實意未矣所謂業煩惱㧣杌等問云四斷業煩惱無明故云度三妄執文今三妄者業及煩惱與無明云三妄也問無明煩惱同煩惱攝也何開為二所生十二因緣何非其數故疏第七云淨除於業生文又論釋業因種云業者𢙣業因則十二因緣種者無明種子文準此釋煩惱攝於無明別立因似為三妄如何今文既標有三妄釋所謂業煩惱株扟及無明種子疏釋明鏡者也但至疏下釋并論釋者未必三妄義舉所斷所𮗚歟又煩惱無明別立過現也故實範阿字義云私案言業者行有二支煩惱愛取無明初支生者餘七七事無明等之所生故云生也鈔云業及煩惱根本無明種子所生十二因緣大樹云云當知十二因緣大多羅樹無明為種子四支為根本餘七枝華果等也其中無明等正妄執躰也故疏但云所謂乃至種子云云問㧣杌種子何物耶安然菩提心義三云業煩惱正使聲聞所斷無明種子習氣支佛所斷云云此意業煩惱正使為株機正使通種現歟種子是習氣也今謂不爾株杌亦名習氣而為緣覺所斷也故論釋緣覺云業惱株杌猶此而無明種子因之而斷云云疏第一云摧壞無明大樹其根本云云此文以無明現種非為樹及根乎但或以抄釋四支為根本者其理不可抄株機種子為聲聞無學所斷故與今意是異耳彼又十二因緣云大樹今於無明分樹根故疏下釋大師釋懸會矣即是無學聖人等者抄云言即是無學至最難斷處者即非想地第九品煩惱最極微細名為難斷處也文此釋但為聲聞無學所斷歟俱舍云第九無間道名金剛喻定盡得俱盡智成無學應果文或通二乘歟至下作二釋矣然與大師意異未辨聲緣種子斷不故又安然菩提心義三云今文業煩惱正使聲聞所斷種子是習氣支佛所斷文此意今無學雖置二乘無學云緣覺斷習又與大師異業煩惱株機為現行為聲聞所斷故大師意株機同習氣也最難斷義準抄可得意歟又教相抄一云第三重三妄執者是緣覺人無學位所斷也所斷既越聲聞分齊故云最難斷處緣覺智惠𭰹聲聞故故十住心論第五云辟支佛智惠𭰹利故能以惣別之相𭰹觀察之見一切集法皆是法此與聲聞異故業煩惱株機及無明種子文付三重三妄前二聲聞所斷第三緣覺所除也中聲聞所斷云三果學人所滯不舉無學所斷緣覺所除云無學聖人所斷不舉學位所斷者凡今所三瑜祇行者欲顯真言勝餘教而大小諸乘人所修諸行從淺至𭰹漸次舉之以為真宗𭤧便也故初出聲聞行次示緣覺斷然此二人俱有學無學二位聲聞舉其學位讓無學於緣覺緣覺示其果位預學位於聲聞是則隱顯為義耳又三果學人者後三果也此人𭔹緣覺果位猶有學處故云學人緣覺不舉學位者以聲聞人為緣覺因人也或又三果學人者前三果也無學聖人者第四果也然此無學果人有所斷者有聲聞無學轉成獨覺之義故故住心論云以羅漢等回心亦成獨覺故文誠聲聞無學未株機種子更居獨覺之學位能除彼株機等𭤧證中乘極果所以云無學聖人最難斷處矣云云又愚案云無學聖人者通二乘惣句也所斷難斷是辨聲緣淺𭰹別句也例如起信論如菩薩地盡等惣別二句意云株機及種子緣覺所斷聲聞難斷處也為言就中上但舉三果學人此中無聲聞應果可闕彼故又云後三果者第二三妄迷十八界修惑既為彼惑所留滯處無學果豈有彼義乎應知今文𭇥聲聞無學釋聲聞應果習難斷義非想第九品修斷義自顯也問或難云大師釋云根境界等者三果所度也文何云未斷惑應知今留滯者望見惑頓斷修惑漸斷故云爾故光云見惑易斷惣立一果修惑難斷別立三果文爾何三果留滯義後向道惑與前果而為留滯處故前三果各進斷三界修惑故云三果所度也若不爾者無學既無所斷何云三果所度乎光釋斷修惑而所得果故與今留滯義異耳但緣覺不舉學位者聲聞四果同緣覺學位故唯識章云又上必下聲聞行緣必獨覺法故文建治二年傳法會談義豫始立此義矣凡有三種三妄執者或云第一重麁妄中有人法二執中今三種攝人執見修無學所斷顯一重法倒也或云此法倒攝今業煩惱也故下文明法倒云業煩惱網故凡業煩惱等文雖通二執斷今約無學所斷云違世心也若依菩薩法執斷義又離違世矣猶如彼如菩薩地盡𭇥因滿果滿也或又業煩惱句雖約二倒今約無學斷云湛𡧤歟例如唯識論云二乘見道唯斷一種菩薩見道俱斷二種耳若爾何第三劫業煩惱不在此句中耶彼隔僧故此一僧內故又大疏抄釋三重三妄各有麁細極細三妄凡為九重妄執畢云問爾疏正文何三重妄執畢次文云凡有三重三妄執也云云可云單復三妄執耳云云此釋意今三種三妄者九重妄執義若爾何局麁妄矣學摩訶衍人等者抄云謂學大乘之人初得出世初心即是越我倒麁妄執名出世初心此與小乘見道預流果齊謂上疏云如聲聞人初觀隂界入時乃至於八直道中遠塵離垢真法眼生真言門菩薩亦復如是初觀隂界入時乃至於如來大菩提道中遠塵離垢得法眼淨故云與小乘見道齊今言齊者但相似名齊也文教相抄述意云前明二乘智斷畢次顯大乘人行此人依顯教大乘初心時聞心性不生𭰹信其理雖然為我見等倒惑所覆未得空觀現前爾時數數學觀解謂蘊界入等集成人此人者以心為主然蘊界等是因緣所生法推求其性不可得也若心依何而住故心即不生成此觀時離諸見網故云小乘見道齊然此菩薩雖與小乘見道齊不墮聲聞位聲聞觀隂上無人菩薩知心性不生故又二乘闕慈心菩薩具大悲依此菩提心㔟力不墮二乘地也云云私案抄釋以學大乘人似為真言行者合上疏文故又以真言行者為能𭔃齊是疏前後例也又六無畏假中但所𭔃齊顯乘疏中示能𭔃齊密行今又順彼故又淨菩提心少分增明文真言行者菩提心名淨菩提心故又云度無量見網淨心增明同疏第五釋真言行者三世無障得戒云住此戒時無量見網皆悉淨除之故又今卷下欲釋𡧤然界云以行者於瑜伽中湛𡧤之心雖已明顯等文修瑜伽行者寧非密人乎又義顯行人也下引三獸渡河喻是三乘共菩薩也又云非如實巧度是拙度菩薩也而下舉顯密二行云巧拙難易故又云同以無言道得諸法實相三乘俱證偏真理故又云同共一法中而升沈有異同智論三乘共十地故具如下辨又三獸渡河之喻出于優婆塞并寶性論彼論中真言菩薩乎又下所舉𡧤然界菩薩是此菩薩升進位也彼既屬偏真理顯人也此何不然乎又修禪定等度門云云大師出顯行云六度為宗真言行是三密故又覺師判通教菩薩故又大師立四妄執時初劫三妄中第一云大乘人所斷此外以第一三妄為真言行所度故依如是等文理顯人而非真言行者也二義中後義為勝但至能𭔃齊者非為密人於三乘人中緣覺菩薩但極位也故緣覺舉無學云業惱株機等菩薩明度法倒之位云彼離違順八心等之故上下故前斷位𭔃聲緣斷位示之也全非顯密相𭔹也又六無畏文異今文彼但如常顯密行此極顯淺位故若如彼學大乘人為真言行者𡧤然菩薩顯密中何若如六無畏為顯人者何學大乘人不齊彼矣若為密人者𭔃顯明密行之時無所𭔃齊而直出真言行者度法倒之位案六無畏𭔃齊以密人未斷惑位同顯人斷證位豈非違彼例乎故知於證偏真理之顯行三乘而顯斷惑異也又淨菩提心名何顯矣如云淨心最初生起外種子心猶得此稱矣又下釋者度見網顯密同故猶如大小相似何以言同云其躰無異矣又於瑜伽中釋者第二劫往昔修瑜伽等文此非指顯行又釋順理云古昔修瑜伽行者文此豈密人耶故知今菩薩三乘共菩薩非密人也顯行二乘密行菩薩合論成三乘義甚以不可矣問下文中於𡧤然菩薩作常途祕密二釋若此菩薩但顯人何作祕密釋耶依之疏第三明十六重𭰹行出𡧤然界阿闍梨此豈非真言行者乎但大師釋約惣別義舉大乘人所斷非謂不密人矣何下釋是𡧤然界菩薩唯是顯人之證也何者三乘中菩薩一僧證𡧤然界也今祕宗度一重妄執同彼也為言寂然菩薩亦非為密人也寧於一人並顯密二行乎又雜問釋約惣別非理若爾三果學人無學聖人亦真言行者乎所以彼釋立四妄之所由云根機非一所以多種也文若約惣別何云根機非一大乘人非顯大乘者有不示顯大乘機之過根機非一中無顯大乘機矣第三釋者彼次上釋云若觀前人未有𭰹解之機則順常途隨文為釋文故知彼且順常途顯真言行故云爾𡧤然菩薩即非密人也然彼行者等者此下以學大乘人修惑斷位與三果學人位齊也教相抄云心云菩薩前雖觀蘊無性知心不生以𮗚解未𤎼故有法執猶愛禪定智惠等㓛德起修所斷惑故亦次觀定惠等功德法之無性斷無所有處已下地所起根境識三妄執是第二重三妄也此與小乘三果學人位齊然不墮聲聞地義如前釋云云此意以學大乘人修惑斷位似前三果斷位也此修惑愛禪惠等法而溜滯故立法執名非實法執例如起信中於法執立人見稱也雖不起我倒等者謂此位雖不起見惑我倒而迷諸法用起修惑也為言或又法執者舉所依歟人執必依法執而起故此菩薩前出世初心但度見網未斷修惑修斷非此位何耶又義法執留滯義也既云法執當心故又不起我倒者準下我蘊兩倒之文若見若修人執煩惱悉可云我倒故知雖不起人我倒猶有法執而留滯之義也蘊倒是法執故又不能速至菩提云云準唯識能障菩提名所知障之文今又障菩提故應法執矣又三乘中菩薩所入𭰹若不斷法執何有此理矣又義此菩薩約未斷惑成留滯義歟此菩薩湛𡧤位未度法倒故又前後位既齊人執斷位中間何明法執斷義又非如實巧度云云拆法空義同三藏菩薩彼教三乘同斷見思故又下疏中拆法但遣人我故又所𭔃齊三果明法執留滯義故大疏抄釋意也前三義中初義為勝矣順前後故故下假然亦稍離下地三執者指今斷位根境界三妄也若下八地云下地者非想地九品業惱等既人執也即下八地煩惱法執乎若聲聞地云下地者緣覺所斷無明種子既人執習氣也聲聞所斷分齊何云法執乎故知今所斷人執修惑也若約法執斷者違諸文故湛𡧤菩薩類水中蓮華未度法倒故若約未斷惑者非啻違前後例亦違所𭔃齊三妄故更出一解云於一文𭇥大小二義故疏家作二釋也中學大乘人出世初心唯蘊無我是似同小乘見道故也後二文無𭔃齊可悉之然亦稍離下地三執等者此下以學大乘人煩惱障習氣斷位同支佛業惱株機也故下文云行者未過此劫與辟支佛位齊文以業煩惱為緣覺此文明鏡歟具如下辨抄云疏然亦稍離下地等者此同二乘無學也謂行者雖有法執當心非如實巧度然亦稍離下之八地三妄執故復能第九地我執家業及煩惱根本無明種子所生十二因緣大樹又解然亦稍離下地三妄執者此同不還果也能業煩惱等者此同無學果也行者能知如是甚𭰹實相之法有佛無佛性相常耳證此理時退非二乘拆法進非別圎乃是三獸渡河共空意也文教相抄云次𮗚十二因緣甚𭰹無性理業煩惱株機及無明種子是第三重妄執也非想一地惑屬第三重妄執是無學人所斷故此位與小乘緣覺齊又離下地三執者指聲聞地云下地此時與聲聞所斷齊故云離下地三執也能業煩惱等者緣覺所斷此可云上地煩惱是即聲聞屬學地緣覺屬無學故聲聞云下地耳若依抄義與此別抄心以業煩惱等云聲聞無學所斷大師以此心為緣覺所住又抄心以摩訶衍人云退非二乘拆法空進非別圎菩薩大師心初若湛𡧤若𡧤然皆屬緣覺智分而為第五住心攝也取意私云密抄有二釋初釋同二乘無學中緣覺下八地煩惱凡位斷故云稍離下地其義然聲聞未必然但超越證不還中有此類歟謂凡位斷欲九品惑盡乃至或斷無所有處煩惱盡後入見道斷遣惑盡至道類智超證不還果故此中斷下八地惑盡入見道證第三果人進斷非想地惑起九無間九解道證無學果故惠暉疏聲聞無學十八念者指此歟上最難斷處釋非想第九品是約第九無間道所斷也故俱舍云斷初定一品至有頂八品皆阿羅漢向第九無間道名金剛喻定文後釋或述意云同不還者只斷欲界九品修惑之所得果也云云此意欲界五趣地云下地歟今謂不爾前約九地分上下今約四果論上下歟前又通二乘今𡱈聲聞故異也今此兩釋皆不合疏意今假本意業惱株機專知十二因緣甚𭰹法為宗此但緣覺智分非聲聞所知故疏第七云如聲聞極𮗚察智解了唯蘊無我以猒怖心重故斷煩惱自證𣵀槃不能分別推求十二因緣實相辟支佛智惠𭰹利故能以惣別之相𭰹觀察之見一切集法皆是法此與聲聞異也阿𭇥云十二因緣法有佛無佛法位常住文此釋全同今文阿𭇥經法位常住今性相常爾義也既判為此與聲聞異何背疏分明釋云或同聲聞無學或通聲緣乎故知株機并種子者人執習氣獨是緣覺所斷故故疏第七文云辟支佛觀一切集法皆悉如𣵀槃相於種種有為境界中皆亦論風息文一切集法如𣵀槃相者性相常爾義也論風息者知性相常爾義故斷習氣也故云論息也又大師住心論中同性聲聞十地緣覺十地而證住心淺𭰹之中緣覺有甚𭰹十二因緣地甚𭰹利智地疏釋自𭚘此經矣又聲聞第十地立阿羅漢地是約斷正使歟緣覺第十地出習氣漸薄地是當今株機種子應知依此意聲聞十地云下地緣覺為上地也故論第五舉疏第七釋今文同性三文成緣覺勝聲聞既此意矣又嘉祥釋云同性經明緣覺有十地十地中有習氣薄地以根利鈍長斷習氣名中𣵀槃聲聞不斷名小𣵀槃文二師得全同妙至矣又義智度三乘共十地已辨地云下地支佛地云中地菩薩地云上地歟故疏下云故以三乘上中下出世心合論一阿僧劫即此意歟若爾何約三界九地以非想地惑云株機種子乎非想九品亦聲聞所斷修惑攝故又義約九地又為緣覺所斷無違故住心論五云或云明獨覺者此有二種一者麟覺二者部行此二成覺斷見修惑都有一百六十心諸緣覺乘法爾皆於凡位時無所有處已下諸惑先已斷竟後入見道有十六心但法忍法智不斷惑可知斷修所斷惑上之八地每地地九品各有二心合有一百卅四心通前見位惣一百六十心耳略抄準此釋諸獨覺下八地惑凡位斷此故云然亦稍離下地三執也株機及種子與非惣第九品惑俱斷歟故上文云無學聖人所斷也所以緣覺一百六十心取果一百五十九是向一心是果故問下八地惑既凡位斷何起上七地無間解耶凡正理心除菩薩餘人皆無超越㓛能故起下地道為加行起非想地心也又婆沙意麟覺如菩薩卅四心證獨覺菩提也又惠暉疏云佛麟角卅四心部行獨覺一百六十心聲聞無學十八念初果十六念中二果一無間一解道也文此釋依婆沙意歟但住心論依正理論意歟問若爾何不起欲界道耶正理云根本非欲斷𭔹治故云云此釋難思若約斷𭔹治者何起四法忍四法智及上亡地無間解耶又獨覺唯依第四定得菩提寧依彼定起下三禪斷𭔹治乎或云此獨覺向中必得不還故欲九無間八解是不還向道攝故豈得勝果道後還起劣向道乎故不起欲界道也問若爾何起法忍法智耶彼有超越功能菩薩猶起獨覺耶故惠暉疏云𭤧斷見惑以初起難能斷修惑非初起故麟喻及佛法智忍為𭤧便類智忍也取意問今文以學大乘人斷惑同無學所斷若此菩薩同彼許凡位斷者可云小乘卅四心斷結成佛菩薩歟又齊小乘見道位可作此釋如何雖大乘菩薩以人執斷位𭔃同聲緣斷位時聲聞未必凡位斷故同彼見道未出凡位斷也獨覺必凡位斷故齊彼時出凡位斷也所以𭔃聲聞見修二道獨覺無學道顯人執斷位也業惱株機位即非成佛故永異小乘菩薩卅四心斷結成佛也此菩薩進度法倒故生十二因緣者問業煩惱無明即十二因緣躰何更云生十二因緣耶實範云言業者行有二支煩惱愛取無明初支生者餘七七事無明等之所生故云生也故抄云業及煩惱根本無明種子所生十二因緣大樹云云當知十二因緣大多羅樹無明為種子四支為根本餘七枝華果等也其中無明等正妄執躰也云云此意所生雖是七事現在五果未來二果或言惣或𭘧數云十二因緣歟私更讀文點云業煩惱及無明與生之十二因緣法也生者名七事躰非詞字也故具緣中云淨除於業生文又義株機種子為能生十二因緣為所生也上舉業煩惱無明是為取種子習氣也如是甚𭰹之法等者疏第七云辟支佛智惠𭰹利故能以惣別之相𭰹觀察之見一切集法皆是法此與聲聞異也阿𭇥云十二因緣法有佛無佛法位常住龍樹亦云此中法位即是如之別名乃至辟支佛𮗚一切集法皆悉如𣵀槃相云云智度論第三十二云問曰聲聞法中何以不是法性實際而摩訶行法中處處聲聞法中亦有處但少分如雜阿𭇥經中有一比丘問佛十二因緣此是為佛作為是餘人作佛告比丘不作十二因緣亦非餘人作有佛無佛諸法如法相法住常有所謂是事有故是事有是事生故是事生如無明因緣故諸行諸行因緣故識乃至老死因緣故有憂悲苦惱是事無故是事無是身故是事如無明故諸行諸行滅故識乃至老死故憂悲苦惱如是生法有佛無佛常爾是處如文嘉祥二諦章中云一於但一者凡夫顛倒謂瓶衣等諸法為有此瓶衣等物有佛無佛常於凡夫是有如𣵀槃云十二因緣有佛無佛性相常住但小乘釋有二人毗婆闥婆提云是無為常住法薩婆多彈云恆有為常如火有佛無佛常不可言火有佛無佛不有佛無佛恆為常十二因緣亦爾今明世諦亦如此諸法於凡常有常有世諦也文準論及章釋性相常爾義通聲聞何疏中云此與聲聞異耶復今疏所阿𭇥經者豈非論所經乎龍樹亦云者指今論文歟但今所阿𭇥經全同章所𣵀槃文也然章意依婆沙云無為常住法依薩婆多有為法恆有云常住二義俱通聲聞所知如何此甚難解然於阿𭇥十二因緣有二意流轉還之義通二乘所觀依之疏釋聲聞極𮗚察智云從無明至老死此有故彼有此生故彼生乃至輪回無際云云論云是事有故是事有是事生故是事生云云又疏云既見四諦已背生死流隨行聖道云云論云是事無故是事無是事故是事云云已上生義疏論同矣此生義通二乘所𮗚也又疏云見一切集法皆是法云云此乃阿𭇥所法位常住義也論云有佛無佛諸法如法相法位常有云云此義但在緣覺故云此與聲聞異歟或又準嘉祥釋或無為法云常或三𠀍實有法躰恆有云法位常住此等義通聲聞疏云一切集法皆悉𣵀槃相云云此義獨𡱈獨覺歟或又智論云聲聞法中未必聲聞人緣覺法又聲聞藏故性相常住義舉緣覺所知歟章釋何𭤽苦勞矣問法相大乘猶性相別論未談相常住之義何湛𡧤小乘位許彼義乎彼未談隨緣真如及攝相歸性等義故云性相別論今集法有為相法無為性俱有佛無佛常有故云爾非謂有為相即無為常住躰也故疏云集法如𣵀槃相者即此意耳問有為無為各別而言常有者何異真宗生住等諸法常恆如是生之義耶彼生住等即性佛性然躰故云常住此十二因緣生義無常常有故猶如相續常也長爪梵尼者或本梵字先字也是則長爪梵志也如稻芉等經等者抄云彼經云爾時尊者舍利弗問勒言今日世尊覩見稻芉而作是乃至見十二因緣即是見法見法即是見佛十二因緣者無明緣行乃至憂悲苦惱乃至如是十二因緣如多羅樹前其𭥎更不得生文言湛𡧤等者抄云湛即是喻𡧤即是法湛𡧤即是三乘所得但空之理證此空故五根本煩惱等皆畢竟不生故名為𡧤又此空理湛然甚𭰹如萬仞之清潭仞七尺也不測於淺𭰹建立宗等種種諸計非其境界故不能窺度也文私云清潭者青渕也澄怗者清靜義歟鏡徹者明透義歟云三獸渡河等者問今此云者何論耶基師義林章優婆塞經言三獸渡河淺𭰹成別文惠照義燈云寶性論中猶如一河三獸渡水得淺𭰹異文又止𮗚云𣵀槃名為三獸度河文又寬信抄云三獸渡河譬喻出𣵀槃經大智度等云云指此等論歟問如上論皆大乘也何以彼文成湛𡧤義耶抄云今此初劫文意得藏通二教之意何以故有拆法成空之義故有三獸度河之理故云云疏上釋云非如實巧度故圎三藏拙度菩薩而為拆法空之義也又天台以三獸度河為通義故云通二教之意也依此釋者今此菩薩約同通教之邊證歟又抄云證此理時退非二乘拆法進非別圎乃是三獸度河共空意也文止𮗚第一云此三畨語異俱順入空退非二乘拆法進非別圎乃是三獸度河共空之意也文同第六云擇論形斥三藏云餘多示人淨法般若示人無淨法亦名如實巧度中論云諸法實相三人共得大品名為三乘之人同以無言道斷煩惱見第一義亦名共般若𣵀槃為三獸度河皆是通教四門𮗚意文安然云唯三獸是通義文準此等釋者湛𡧤三乘但同通教三乘矣但抄意藏通菩薩歟若不爾者前後相違故又安然釋今疏文云此明前藏通三乘及別圎真空八住八信功德也文又濟𨗴云大小雖異義準相似云云又惠暉疏云無為理躰同三乘證有淺𭰹如三獸渡河文此文為小乘喻異故知取喻隨冝不可𡱈定耳此中有三乘之人等者此文大同止𮗚第六出大品如前也抄云此第一劫中既有三乘之人同以空為門入諸法真實之性二乘之人自為已得𣵀槃生度想沈也菩薩以不住道起大悲升也譬如同一去一停故升沈有異也文智覺禪師宗鏡録六十五云三獸渡河同入於水三獸有強弱河水有底岸兔馬力弱雖濟彼岸浮淺不𭰹又不到底大象力𭤽俱得底岸三獸喻三人水喻即空底喻不空二乘智少不能𭰹求喻如兔馬菩薩𭰹喻如大象水軟喻空同見於空不見不空底喻實相菩薩獨到智者見空及不空文或云湛𡧤三乘所斷雖無別諦緣度異故云升沈有異也故嘉祥釋云但取智優劣譬二車不同云云天台釋云初三藏中諦緣度殊故因大異俱斷見思三乘微異果小同云云但同共一法中者三乘所證同生空理故私案二乘斷惑有淺𭰹故謂聲聞斷正使緣覺侵習氣菩薩度法倒故天台四教儀高麗諦𮗚云次明通教者乃至謂三人同以無言道躰色入空故名通教依大品乾惠等十地即是此教位次也一乾惠他未有理水故得其名即外凡位而藏教五停心惣別等三位齊二性地伏見思惑即內凡位與藏教四善根齊三八人地四見地此二位斷三界見惑盡見真諦理與藏教初果齊五薄地斷欲界九品思前六品與藏教二果齊六離欲地斷欲界九品思盡與藏教三果齊亡已辨地斷三界見思惑盡但斷正使不能侵習如燒木成炭與藏教四果齊聲聞位齊此八辟支佛更侵習氣如燒炭成灰九菩薩地正使斷盡與二乘同扶習潤生淨佛國土十佛地以一念相應惠頓斷殘習成佛正俱除如炭灰俱盡云三獸度河謂象馬兔也論斷惑不同故略抄準此釋三獸度河升沈專可依斷惑異也當知學大乘人出世初心者當八人見地然彼下𭔃三果之位當薄地離欲已辨三地也然亦下同無學之位當支佛地𡧤然界位當佛地也菩薩地可屬湛寂歟但於通教有當通被接二類故同釋云此教三乘因同果異證果雖異同斷見思同出分假同證偏真然於菩薩中有二種謂利鈍鈍則但見偏空止成當教果頭佛行因雖異果與藏教齊若利根菩薩非但見空見不空不空即中道分二種謂但不但若見但中別教來接若見不但中圎教來接云云依此文今𡧤然菩薩若屬偏真理之義雖似當通菩薩度法倒邊異彼但斷見思正習未法執故又今菩薩不可云被接彼斷無明而見中道故若別接通則第二劫攝若圎接通則第三劫攝故然或書判名別義通次位時三乘共十地第十地云佛地以一念相應惠斷餘殘習氣亦斷小分塵沙惑成勝應佛是同居土佛又通𭤧便土也云云今𡧤然菩薩度一重法倒同斷少分塵沙矣塵沙是所知障中障事惑故又録中以大象喻見不空菩薩故或又準淨影執取相為法執今一重法倒者六識相應執取相歟若爾龍樹釋中彼判人執故不相違又但彼天台以藏通二教如次為拆空躰空若一分不斷法執何成躰空之義矣問今文釋湛𡧤義三獸度河之何以𡧤然菩薩為湛𡧤攝乎凡今三乘中菩薩者𡧤然界菩薩也所以經中明三乘時上下故菩薩入執斷位讓二乘而不別然疏家採經意以𡧤然菩薩人執斷位𭔃二乘顯之云學大乘人非謂別人也若學大乘人別菩薩何中湛𡧤位不彼乎緣覺亦爾學位所斷讓聲聞而不別明依之慈恩唯識章云上必下二乘境行必菩薩境行故云云又云又上下聲聞行緣必獨覺法故云云雖他宗釋自經疏意矣在湛𡧤文雖此喻意寂然也若不爾者何云升沈有異所以釋菩薩勝支佛云心垢漸除淨心漸現此豈非度法倒乎又云便得菩提心㔟力能以不住道等是又法執斷𭤧便也故下釋𡧤然菩薩云然以菩提心㔟力還能起悲願從此以後三乘徑路始分云云文義既同不可異求釋學大乘人有法執之義云住禪惠等今云不住道等定知心垢漸除是度法倒之義也何疏下云以三乘上中下出世心等以𡧤然為三乘隨一明鏡者歟依之抄云今此初劫文意得藏通二教之意何以故有拆法成空之義故有三獸度河之理故由是疏云故以三乘上中下心合論一阿僧劫文此又以𡧤然等三乘為三獸度河之意耳同以無言等二句釋同共一法之義喻一河也然聲聞置種度門故釋升沈有異之義合三獸度河有淺𭰹也以三乘人類兔馬象已同共一法中而升治有異也者結上義可知矣天台四教義第三智者云若小乘教門苦諦為初觀四諦入道真無漏斷正使盡位證羅漢乃至現身而入𣵀槃故大智論如麞在獵圍驚怖跳出都不顧群乃至若緣覺中乘教門集諦為初𮗚十二因緣真無漏斷三界結使盡侵餘習氣乃至亦於一世即入𣵀槃故大智度論云如鹿在獵圍驚跳自出顧群怖不停待乃至若大乘菩薩乃至教門以道諦為初修行六度化一切衆生共出三界至成佛果利益功力圎入𣵀槃故大智度論云如大香象在於獵圍雖遭刀箭擁群共出云云此釋中麞鹿象喻全同今疏聲聞猒怖生死緣覺不甚忩菩薩用不住道之義準此釋未必依斷惑判升沈歟今義中但出聲緣正習斷異不舉菩薩斷除疏中舉菩薩斷惑未顯二乘斷惑然今疏意二乘斷惑淺𭰹先顯故今不示天台通教三乘菩薩斷餘殘習氣異緣覺歟釋竹云次通教中俱學般若故因大同同座解習盡不等故果小異云云但四教義釋三藏教三乘歟可決此釋俱學般若似可言同共一法矣塞智論三獸雖異其意是同耳同以無言道等者經第二云緣覺乃至無言於一切法證極語言三昧文又住心論釋緣覺云證三昧於無言文準此文無言證理可𡱈緣覺何通三乘乎無言證理之義雖通三乘緣覺始終不用言語故別得極語言三昧之稱也疏第七云世尊得無得知見於法自在能於無言法中為作名字轉受衆生辟支佛智惠有得故是故不能演文聲聞雖智惠有得不言故法歟此宗中有兩種外道等者抄云外道有多略為二種一者離佛法外外道二者附佛法外道名內外道外外道者本源有三一迦毗羅乃至二漚樓僧伽三勒娑婆乃至二內外道者起自犢子部如先已文此意草部中但犢子云內外道若爾餘部亦許知無量寶王之義歟或云雜問云經云諸佛大祕密外道不能知其外道者有二種一外外道二內外道問何言之耶真言教諸佛自內證教故云內內顯教隨機而故云內外外道入而不識略抄此意內外道通九種住心歟若爾無量寶王似指無盡莊嚴寶矣謂湛𡧤位亦有祕密二乘三昧道等是德之一門開心實相之祕寶故云爾歟私解云湛𡧤是如常小乘偏真理也真言行者豈沈彼理耶故六無畏中湛𡧤為所𭔃更舉密行應知入而不識是三乘中二乘也故第一云凡夫二乘兩種外道文無量寶王者菩薩所行種種度門非一故云無量勝二乘諦緣故云寶王也又云菩薩淨菩提心云寶王也故次上釋云菩薩悟如是法時即知淨心漸現云云又第七云淨菩提心如意寶文顯密菩提心雖異寶王之義同故證矣既菩薩但云即知二乘不爾當知識無量寶王是三乘中菩薩也但雜問釋湛𡧤教亦隨機故云爾彼又以今文證兩種義非全同歟或又隨義轉用歟又依文但舉外外道不知然疏中示入而不知之二乘大師又廣通九種住心各據一義歟又疏第十九云今此諸佛之祕一切外道所不能知然外道有二種一者世間種種外道二謂佛法內有諸外道也以雖入佛法中而未能知如來祕密猶是邪見心行理外道故亦名外道也此法乃二種外道所不能知此佛法中外道即二乘人也文準此釋內外道如先無量寶王祕密寶也又義三乘俱云內外道歟皆不知祕密寶故唯有此一門等者抄云過去諸佛無不此一門即一種㩲教三乘也故法華云尋念過去佛所行𭤧便力我今所得道亦應三乘等又一實教大乘門謂㩲教三乘故法華云開𭤧便門示真實相也文初釋一即門也雖三乘𭤧便門故後釋一之門也持業依主可知矣私記十一云應知三世諸佛誘諸衆生三乘𭤧便教中唯有菩薩乘一門而令諸子出三界火宅善巧𭤧便門云也問曰可同法華所云唯有一門出於火宅義耶彼大乘義此小乘義也雖然義顯是同意也云云私案抄義順文湛𡧤三乘俱所知故內外道者但犢子故記釋順疏釋疏前後皆以二乘云內外道故然上文菩薩云即知無量寶王不通二乘故知記義勝歟又法華以三車雖令出火宅正所授是牛車故又教相抄云內外道者指小乘部也此人雖入一佛法中不信大乘寶王故文種種因量諸師等者抄云外道小乘部類不一名為種種其中善解因明比量之師以因喻次第於此理上欲出其過終不能得故曰種種因量等云云私案外道所立是邪比量故於佛教不出其過佛子立量是正比量故還破外宗也故上文云西𭤧諸菩薩作種種量破宗計也文小乘又望大乘猶屬邪歟未名真淨菩提心者湛𡧤菩薩雖淨心漸現未斷法執故未名真淨菩提心也或又湛𡧤三乘雖斷人執證人空未斷法執得法空故云爾也前心如水中蓮華後心如水上蓮華故云如蓮華等也以行者於瑜伽中等者教相抄云是湛𡧤心有二種初明隂上無人之𮗚尚不見蘊等性空故根塵識等當心不現也次然以已下明觀諸法無性為治猒離有為樂無為之心修離著𭤧便為證𡧤然界之前門也故湛𡧤心中有唯蘊無我諸法無性之二心也菩提心義第三云彼出世間心住蘊中有如是惠隨生行者未度法性未名真淨菩提心蓮華離泥尚未出水私云結前云云準此注録以行者至隨生之文重釋上湛𡧤之義歟謂從以行者至明顯者釋彼出世間心文從然涉至無為法者釋住於蘊中句從然以至他教也十卷義釋無也字者釋如是隨生句也但上合不舉如是等句者粗釋挭溉合文故具不舉歟應知此意如是者指上湛𡧤也惠者人空智也文點云彼出世間心住蘊中有如是惠隨生云云又解云有如是惠生者有者或義如是惠者法空智也即指下觀無性空即空𮗚也故知彼出世間心住於蘊中者結上也故合時送句也字矣有如是惠生後文摽句也疏以行者至無為法者重舉湛𡧤意而為𡧤然來由也然以不明法空智之行相也又準若於蘊等若字起盡指上彼於世間心云如是惠歟疏然以菩提心等者示湛𡧤菩薩勝二乘也非為顯寂然菩薩歟置也字即此意矣若爾能於蘊等下釋即空觀也十卷義釋無也字依此文然以下順釋𡧤然菩薩改若字云能於蘊等有如是下似明𡧤然菩薩矣𮗚察無性空者或云𡧤然菩薩𮗚屬偏真理故拆法空歟故下釋云然亦所觀人法俱空成實諸宗未甚懸絶文嘉祥釋成實拆法空也成實既拆法空此豈不然耶又下釋云前劫五喻有泡沫芭蕉乃至此事猶𭘧拆法明無性空然此中幻𦦨等喻意明躰法難解之空略抄此意初劫為拆空第二劫為躰空也私云今無性空者躰法空也故下釋云逹諸法即空文若非躰空何云諸法即空矣故抄意云謂前劫中有通教菩薩從無性門逹諸法即空此則躰法空文既以𡧤然即空同通教如幻即空躰法空義決定矣無性言雖通拆法未云即空又拆空是為遣人我非度法倒也故疏第三云謂𮗚唯蘊無我時於隂界入中種種分拆推求我不可得乃至今五蘊尚從緣生都無自性何此積集中而有我耶文今無性𮗚門專度法倒誰云拆空矣又湛𡧤菩薩未度法倒云非如實巧度𡧤然非顯巧度乎故抄云今此初劫文意得藏通二教之意文此意以湛寂寂然菩薩如次配藏通菩薩藏通如次為拙度拆空巧度躰空也但成實諸宗未甚懸絶者偏真義同彼非同拆空義又淨影成實判躰法空也次猶𭘧拆法者既云𭘧非當躰拆法也猶且法觀必𭘧生空也或又此五喻通二乘所𮗚故云𭘧折法歟故下釋云聲聞中雖此五喻而意明無我今此中五喻意明諸蘊性空文又第二劫云躰法難解空與今躰空偏真中道異故故三重幻即空幻即心幻異也故抄云此即自性不可得空故與前無性空意復有殊矣文問五喻中芭蕉釋云乃至分分披拆之文是豈非拆空義耶又成實拆空斷法執成實存二空故若爾拆空何但遣人我耶拆空有二毗曇拆空雖分折五蘊等未拆極微故遣我也成實拆鄰故法執也或釋云論破鄰數存鄰者此意矣論者成實數者毗曇今疏意以鄰亦不可得喻行本不生也未必取鄰分拆之邊歟疏第三云爾時幻𦦨等喻觀察諸蘊即空得離違順八心證𡧤然界文可思之問今無性𮗚見度法倒爾者猒有為著無為二種法執俱治歟若俱治者𮗚蘊無性但可治生死實有執𣵀槃實有執何之乎蘊不攝無為之故上舉欣猒二執其下明能治觀門寧有所蕳矣謂五蘊無性即本不生義故云通五蘊皆明不生義此不生即𣵀槃故𣵀槃實有執又破也故起信論云法我見者乃至見有者五隂生之法怖畏生死妄取𣵀槃云何治以五隂法自性不生則無有本來𣵀槃故文此為良證耳問法華義疏嘉祥云三藏中所以不據城者為三藏不一切法本性空寂乾城喻辨能成之因所成之果本無所有故三藏中不也而成實論亦有此喻有菩薩藏中𨐫就小乘法中釋文準此文成實小乘猶用乾城喻而證諸法空𡧤然大乘何不彼喻而明無性空耶下釋云然所𮗚人法俱空與成實諸宗未甚懸絶文何彼乾城喻是為顯能成因所成果本末空𡧤故專大乘所用也依之第二劫躰法難解之喻始取之但成實中雖在此喻就小乘法釋故尚顯空不究全非喻正旨有此喻同不也故龍樹釋云小乘中不乾闥婆城喻文又嘉祥二諦章下云前破相宗𮗚法假有土木城雖無空性不無假城此宗破相𮗚法如似乾闥婆城非城城喻然幻化等𨐫類亦齊等文如夏時暴雨水上浮泡者抄云謂當復時自雨水中隨渧大小種種浮泡形類各異然水性一味自為因緣泡起即是水起泡即是水舉躰從緣四句求之無別所生之法此𨐫受隂諸苦樂等皆從情塵和合故生苦生即是情生苦即情四句推之亦無別法即是受隂本不生也文私云聲聞中用泡喻者此泡雖無實性以因緣猶是實喻拆蘊遣我歟今喻意泡起全躰是水無別所生法故喻即空也第三劫中以一水生衆泡類行者自心能作法界不思議反化也地氣日光望之如水者疏第三云釋論云以日光風動塵故乃至初見之為水云云演祕第七云又如陽焰於飄動時實無有水而有水覺文準此等釋今文地氣者塵歟故知風塵三和合成𦦨水也今文舉二顯風歟或處云𭵴空塵云云至於鄰亦不可得者此文似同論破鄰成實之意歟然實異歟如先辨歟成實論立無品云一切分皆分拆壞裂乃至微塵以分破塵終歸都無文此文云破微塵未云極微或又極微立微塵名歟一微涉於動境等者抄云謂從根本無明一念熏真界時即涉動也展轉能生諸雜染法淪沒生死則無窮已故晉遠法師云一毫涉動境成此頺山㔟即其義矣此諸法皆是緣生既從衆緣則無自性舉躰皆空即是行本不生也文此釋意無明一念心微細故云微歟貪嗔癡等是行隂攝故若不爾者何云微矣心法分拆至剎那色法至極微故或又準遠師釋以無明熏真心初念似類一微動境矣又俱舍論十二云衆緣和合法得自躰項或有動法行度一極微文寶師云二或有動法度一極微名一剎那極微處量促剎那乃至由此故度一極微名一剎那極微處量促剎那時量促乃至由此故度一極微名一剎那問曰若諸法得自躰項名一剎那得自躰項即是一念因何仁王般若云一念有九十剎那一剎那有九百生生微細唯佛能知小乘心麁見生麁諸佛心細見生細由此不同云云遁鄰云此以諸法實無行度相續道中假動故云云準此釋諸法緣生不過一剎那故云一微涉動境但又雖相反意可同矣諸法速故雖無動依相續邊動也鄰釋此意矣釋論云因緣有法不過一剎那文又疏下釋云一念無明等文可悉之問何不依仁王因小乘度一微剎那義乎今此無性空猶屬偏真故隨轉門意歟識隂亦爾等者抄云識隂亦爾從無明緣生無明盡時行識等盡當知蘊性即空也文又云初出三界等者非出過也但以無明幻起於識等在於三界究其識躰亦本不生也文此釋意無明者十二因緣中無明支識隂是識支也故知於十二因緣流轉義云初出三界還義云本不生矣聲聞中雖等者阿𭇥等中雖五喻譬拆法之義故意明人無我也疏第三云謂𮗚唯蘊無我時於隂入中種種分拆推求我不可得云云又云聲聞中以受譬浮泡乃至雖無實性而因緣猶是實法文今此中五喻譬躰法空故云今此中等也六入十二緣等者或本六大云云六入者十二因緣中六處歟法華經中六入緣觸等文又二本義釋六大云云得離一重法倒者今此倒是第六識惑歟初劫但知六識唯蘊業分齊故但法倒者準淨影釋執取相歟彼意識中法著我故龍樹釋以彼為人執故云直是人執品矣又菩提心論云但淨意識不知其他文又第七識相應智相相續是第二劫所斷故故知今法倒當執取相歟云人法二空成實諸宗未甚懸絶淨影又云利根二乘斷彼法執故實是人執故大師十住心時攝業因種更不開可思之又義當第七相應智相等歟湛寂寂然譬水中水上蓮故湛𡧤是但知六識證𡧤進斷末那惑歟第二劫釋云始能𮗚察阿𨹔那識云云知𡧤然可斷第七惑品也故云漸過二乘境界也今菩薩斷三重三妄位名學大乘人同二乘湛𡧤心智論共地中已菩薩地支佛地也此菩薩進度一重法倒云𡧤然界即共地中斷塵沙菩薩地位也為人天乘齊等者準大師住心六心是人四心是天也然齊善法亦云天乘行據通別正義門歟又上經云護戒生天第七受用種子文是別門意歟若三乘初道意等者此釋意指順解分善云初道意歟故上文云又於此中殊勝住有求解惠生思惟𮗚察生決定想從此即聲聞菩提初種子心文既從內第十決定心生聲聞種子寧非順解分善耶今文上舉順世續彼而明違世尤初道意可聲聞種子心也復初道意若指見道者與第一釋何異矣問小乘七𭤧便位皆世間有漏心何云違世耶雖有漏心背生死向𣵀槃故云違世也雖未出世間有背世之心故云違世也依之住心論釋順解分云𮗚𣵀槃德背生死過文又疏第七釋不順行因云背生死隨行聖道文當知出世違世㸦有寬狡故可作四句分別謂有違世非出世二乘凡位也有出世非違世𡧤然已上諸大乘也有亦出世亦違世二乘聖位也有非違世非出世違理心及諸大乘凡位也或可下就聖位論違世正是出世位故此釋意凡位為順世心歟雖肖生死向𣵀槃世間有漏心故又義前釋又於聖位論之歟初道意者即見道歟五位中見道已上得道名故但兩釋異者長短八心異故例如十地位分長短十心時位無寬狡矣兩義中前義為勝順世者內八心又求人天有漏果故云順世今文云為人天乘行齋善法即此意矣雖有漏心猒生死向𣵀槃之心何云順世乎但或可釋違世義勝亦作釋歟非違凡位上文云從此即聲聞菩提初種子心乃至三乘一一地皆具十心文抄云疏或可就見道等者上疏云乃至三乘一一地皆具十心乃至故云或可等文可悉之又於十地長短例者以聖位分短顯凡位短八心故無失於一切法都無所取等者躰法即空𮗚故云無所取無所捨也不同湛𡧤心猒有為無為而有取捨故我蘊兩倒者釋相續二字歟謂順世八心我倒未離違世八心蘊倒猶存此兩倒各有二種業煩惱歟此二種業煩惱令生死相續不令出似網故云網歟實範釋云兩倒業煩惱者我法二執之所生也云云依常途解釋等者教相抄云心云𡧤然界者從無性門逹蘊等諸法皆空也若顯教菩薩一僧劫𭤧證此理若今宗菩薩雖一生度麁妄執即證此理然𡧤然界理菩薩及最極上根緣覺同證之故疏下云次以三種心業煩惱根本無明種子如以利鐵去其麁礦次𮗚無緣乘法無我性如漸至軟處云云乃至既業後無緣乘前不出寂然界心而合譬𡧤然界與無緣乘二心各別疏下文分明也所以用𡧤然界不可攝無緣心也若𡧤然亦與業心別者何業心後不出之乎故知𡧤然界即緣覺心也故今云行者未過此劫與辟支佛位齊又云與成實諸宗未甚懸絶也大乘義章二無我義云第二宗中具明二空五隂及生攬別成惣是因和合因和合中空無定性名衆生空乃至苦無常等集成諸法名法和合法和合中空無定性是其法空第三宗中亦具二空言生空者前宗直就因和合中假無性名衆生空不空假生今此宗中假生亦無故名生空言法空者前宗之中但諸法苦無常等和合無性故名法空不空無假名諸法此宗所假法亦空故云法空文又云聲聞人中根有三品謂上中下此三品人聞第二宗破性之教鈍者但能悟解生空中上二人通解二空聞第三宗中下二人但解生空利人俱解文今疏心可準彼釋謂彼中聲聞人者此疏緣覺種性也皆是解諸法無性等空故就此中解彼第二宗之人此中證湛𡧤之緣覺也悟彼第三宗之人此中證𡧤然之緣覺也故疏云證𡧤然界菩薩與辟支佛位齊也成實論聖行品云有二行空行無我行於五隂中不見衆生是名空行見五隂亦無是無我行文此文從無性門𮗚蘊等皆空也若非皆空者何云五隂亦無乎故疏云證𡧤然界法俱空與成實宗未甚懸絶也依之疏第三云初劫智惠與二乘共行非𭰹般若文此文豈非明證乎問疏云證此𡧤然界時漸過二乘境界文若緣覺與𡧤然菩薩齊者豈云如此乎又疏云菩薩從心已來一大阿僧劫𭤧證如是𡧤然界文然緣覺極利行不過百大劫彼人證𡧤然界而與菩薩齊者菩薩僧行豈非劣二乘乎又住心論釋緣覺云遊泳湛𡧤之潭優遊無為之宮云云疏釋湛𡧤心云怖有為故著無為法文故知緣覺尚留湛𡧤之潭未至𡧤然之𫭫爾何𡧤然界心一宗難義末學未決然三文會之先漸過二乘文者二乘智解任言之只觀諸法無性未及即空理數習諸法即空觀爰𡧤然菩薩越中下二乘等上根人故云漸過也疏云至第二僧乃與二乘異也文此意也次至菩薩僧行者緣覺與菩薩同雖證此理根有利鈍解分明昧謂緣覺根鈍故以百劫行謂所證足菩薩極別故僧行窮𡧤然理若爾百劫薰修僧廣行所證雖一更不同日論矣又緣覺無慈心故唯求自出離故百劫行也菩薩大悲濟物利他行故僧證𡧤然界也次住心論文者謂度湛𡧤之潭入𡧤然界無為之宮也又大師依大日立十住心若言緣覺唯證湛𡧤未及𡧤然界唯局菩薩者何業之後他緣之前不立一𡧤然心以此理故知𡧤然界是攝業因種之中也取意𭄿修寺寬信法務抄云先以𡧤然界即為業緣覺不可爾歟是前後位也其一又未過此劫等文其二與成實諸宗未甚絶等文其三非證據歟已上疏文料蕳如下抄之次義章四宗二空者所依論各別也於大日初劫之一假不可云湛𡧤之文第二宗緣覺𡧤然之句第三宗支佛疏釋湛𡧤空引三獸度河之喻出𣵀槃大智論等是大乘共地也不可為第二宗心其四次章第二三乘心者二乘共悟二空今疏意聲聞唯生空緣覺悟二空彼此異也不可為證歟鈔云彼章聲聞者此疏緣覺也云云其心如何其五次抄云漸過二乘者菩薩過中下緣覺齊上根之類以過中下根云漸過云云菩薩與二乘相𭔹判勝劣者菩薩共可過緣覺三根也此義不順道理并疏意就中三乘共十地者於大品大小相𭔹不依根上下也其六愚案云見此兩假之文證𡧤然界者非二乘之所證是共地之中第九唯菩薩行也心者八地以前三乘共以但空𮗚斷煩惱業等所行全同至第九地由菩提心㔟力更修離著𭤧便成如幻即空𮗚斷煩惱習氣八地以前三乘空𮗚名違世八心今此𡧤然界離違順二世心了逹諸蘊即空離前地空執都無取捨心此地初過二乘地故云漸過二乘故非二乘之觀行二乘豈得菩提心㔟力哉凡疏文三獸度河之喻此是大品共地天台通教也見前後文或云與見道齊或云與辟支佛齊又云偏真理皆是彼宗通教之詞也疏主學天台之上文𭰹叶其旨歟所以共地者七地以前齊聲聞第八地齊支佛三乘同以無言道證但空理故云辟支佛齊時心滯無為法若失𭤧便墮二乘地云云齊時者指至第八地之時無出假𭤧便者須墮二乘地也然以菩提心至𨒬路始分者明第九地出假利生超過二乘地故云三乘𨒬路始分也然所𮗚以下還釋三乘所證空𮗚同也心者九十兩地悲願雖勝二乘猶嗜二空未悟中道故云與成實諸宗乃至一僧劫云云玄義四云雖菩薩佛名異二乘通俱𮗚無生躰同是無學竭二𣵀槃共歸灰斷證果處一故稱為通云云其旨與今疏釋同至第二劫始悟唯識中道故云至第二僧乃與二乘異也云云大師以𡧤然界不立別住心蓋此謂也已上略抄私案古德義皆非無文理取捨有憚歟然行者未過此劫等者𡧤然菩薩未斷法倒而業惱株機之位云與支佛齊也此乃前同二乘斷位之中第三位也猶如共地中至支佛地也前證此𡧤然界時漸過三乘境界者度一重法倒證𡧤然菩薩故云漸過也猶如共地中九十地矣但朝譽義章成義不可其破如法務抄又法務義三乘共義雖可然緣覺悟二空者違疏并大師釋智度共地之歟何者中以業緣覺屬湛𡧤極住蘊中故疏中譬水中蓮未出水上故又湛寂業屬違世而即空菩薩云離違順八心我蘊兩倒之故又大師住心論等以菩提心論雖破人執猶有法執之文證緣覺故又智論共地龍樹所菩提心論既不許緣覺法空智論豈成支佛斷法執之義天台以彼以彼共地證通教時支佛地不云斷塵沙故然依智論天台釋成今義而許緣覺法空文義相違耳又相抄以優遊無為之宮而為𡧤然位非理謂遊泳湛𡧤之潭者湛𡧤之心明顯之義也優遊無為之宮者是著無為法之意也何以此為度法倒𡧤然位矣故大師住心論等明此意畢菩提心論雖破人執猶有法執之文成彼旨耳問上明𡧤然菩薩度一重法倒畢云行者未過此劫等何云未度法倒之位依之抄釋極無言處云我蘊俱離故稱為極語路欲絶名無言處也文應知齊辟支行者是𡧤然菩薩耶上約常途祕密釋𡧤然位畢行者下為𡧤然菩薩即湛𡧤菩薩勝進位故前學大乘人𭔃小乘三道中舉終位而為至𡧤然位所由也若不爾者何云心滯無為法相𡧤然位度法倒故故知爾時至小𣵀槃舉湛𡧤菩薩同支佛地位也然以下述𡧤然行相即當九十地也良以此菩薩與支佛齊時但斷人執證人空故云滯無為法更至𡧤然位度法倒證二空故云與成實諸宗未甚懸絶也抄釋不下文強不可依用矣或又準義釋第七釋聲聞真言云𣵀是大空義聲聞中以法空為大空乃至是名大力聲聞者利根緣覺豈不法空乎故又釋緣覺真言云嚩是語言道斷義以辟支佛智惠𭰹利見一切集法皆是法故名為證𡧤然界住此三昧時𮗚諸法如𣵀槃相無可宣名為極語言三昧文故知與辟支佛齊者約法空同歟若爾同義章意何失問𡧤然界十住心中何心攝耶朝譽之意緣覺𡧤然同斷法執證法空故業心攝也寬信義緣覺𡧤然同雖得法空勝劣玄隔然依偏真理同故攝第五也信證僧正抄云是第一僧內三種三妄執如次見修無學三道所斷也聲聞緣覺證𡧤然界三乘人各同三道斷彼三妄然聲聞空我故攝唯蘊無我緣覺與證𡧤然界空法故攝業因種故疏云如聲聞極𮗚察智解了唯蘊無我乃至此與聲聞異也云云亦云行者如是𮗚察時乃至故名證𡧤然云云若分別配之小乘諸部薩婆多攝唯蘊無我我存蘊故名是俱舍宗部攝業因種歟我法俱空故是稱成實宗云云又𨗴僧都記云他緣乘心有初分後分二種行位以其初分為此𡧤然界五教章云六諸法但名宗謂一部一切我法唯假名都無躰故此通初教之始此初教始義者今𡧤然界也云云或義云此菩薩通五六二心也謂偏真理邊攝第五心又法空邊第六攝也例如犢子通第一第四二心矣私云緣覺𡧤然人法二空雖異若偏真理同若依一僧攝攝緣覺也以勝攝多是如聲聞藏攝緣覺菩薩藏攝大覺梵輔攝大梵問聲緣雖異同是湛𡧤人空理也𡧤然菩薩既度一重法倒類水上蓮何𡧤然菩薩立住心以緣覺不攝聲聞耶依之六無畏中唯蘊無我為一種攝緣覺更𡧤然別立矣何大師十住心專依論性相依別意趣開𡧤然故故性相釋云素怚覽言因別意趣阿毗逹摩依法相文例亦爾菩提心論中開二乘不明𡧤然故大師廢立𭰹存此意矣但至六無畏釋者出沒隨冝當卷下以寶珠譬統論三劫始終時業心後無緣乘前不出𡧤然界故三乘上中下等者或云唯蘊無我湛𡧤𡧤然云上中下心也準十住心次第唯蘊無我配聲聞湛𡧤當緣覺雖有共事離分之時約勝故配三乘歟或云三乘各有上中下心謂唯蘊無我根境界淹留修行業煩惱株機及無明種子也私案湛𡧤中有聲聞下乘緣覺中乘同雖湛𡧤三昧分異故亦故三使習氣斷異故為下中也𡧤然菩薩度一重法倒得法空故為上根也理實湛𡧤三道中見修二道中三乘俱有無學緣覺菩薩𡧤然唯菩薩也約勝位一往配耳建治二年七月中旬之比以傳法會談義之次記畢金剛佛子賴生年五十二
