body:
  text: 疏卷第二之四大乘行發無緣乘心法無我性者演密鈔第三云疏發無緣乘心等者此心有二一真心二事心今初理運載真心名乘謂諸行者解了三界唯心心外更無一法故名無緣無即一心則是能遣緣為法乃目所無既了緣本不生是諸法無我性為斯乘躰發謂發起即無發之發以諸行者乘此真心直至道場故曰發無緣乘心也二事心者行濟物事心名乘謂行者𮗚於六道隨緣普利而無自他能所之相名為無緣無即淨心離冤親故緣乃群生有高下故既念平等一緣普令同修𭤧行是則六度行為斯乘躰發謂興起進䇿之義以諸行者乘此無緣乘心上菩提道故曰無緣桑心也文私云真心事心者如次疏無緣他緣義也真心者大智證理自利行也事心者大悲濟物利他行也即正躰後得𮗚門也或復真心是真理五重唯識中識性唯識即遣相證性識也故唯識章云事為相用遣而不取理為性躰應求作證文事心即識相唯識也後得智𮗚門故前四重唯識中隨應攝也此釋意真心者即覺心不生義也第二劫中不分二重故宗家意不爾無緣心又事心法相唯談有為識故故釋無緣義云𮗚阿陀耶識了三界唯心云云異覺心乘如來藏云阿梨耶故故覺自心本不生者真理云心王也二重別故又義云大乘行等三句通二種住心惣摽也次釋成中依何以故徵問作二重初如彼往昔乃至乾闥婆城者顯他緣心義後彼如是捨無我乃至知自心性者明覺心乘義是超越二劫瑜行者惣結二心也但大師以惣摽句屬第六者惣摽屬前假其例非一歟二義中前義冝歟二假文各有摽釋何惣合成摽釋矣所以二假各惣初祕密主言別初各存何以故句即是明第二重等者鈔云謂初劫中五喻逹諸法即空離一重法倒𭘧拆法故合論一僧第二劫六喻正𮗚不可得空以躰法空𮗚賴耶法無我性故云第二重也取意私云此義意於大乘法空𮗚即空即心二重殊故今云第二重也又義依大師住心次第初劫中𡧤然界攝業唯薀業人無我分齊也今𭔹彼人無我大乘法無我云第二重也或又不云人法三劫相望時第二劫云第二重歟問今法無我中法者五薀歟或云五薀法也但前即空𭘧拆法今唯躰法故法空有淺深也私云前即空覺云法也故第三卷法無畏云離薀之縛法無我無畏云離法之縛云云六無畏中既在後無畏離前無畏覺也今亦可爾故第三劫釋云此中十喻望前十喻復成論文又第六無畏釋云謂𮗚空性時我之與薀法及無緣自性無性取意梵音莾鉢羅等者鈔云莾此云無鉢羅云他今欲明無緣他緣異故以梵音甄之也文私云此釋未無他梵語別何云亦是他義耶亦言無用歟乃至諸一闡提及二乘入正位者𨗴記云彼法相大乘偏𭘧𫞐存五性各別義是大日宗依佛隨自意趣正理成立一切衆生皆成佛義也文或人云闡提有三種斷善無性大悲也二乘有二種定性不定也𭔃同相宗義今斷善及不定性云折伏攝受也但入正位者見道已上也故上文云與小乘見道適齊然不墮聲聞正位文彼宗意已得果亦廽心故或本未入正位云云十住心論所引同之依此本者未起順擇分已起順擇分未得果三類論之歟四位廽心瑜伽雜集等意也如住心論第五具辨也或未入正位者無餘位云正位歟二乘極位故若爾為顯不定性云未歟定性入無餘故又云准疏第一云一闡提必死之疾二乘實際作證已死之人者無性闡提定二乘歟然折伏攝受者菩薩意樂也非實得益矣故慈恩釋云以衆生界無𥁞時故無性有情不成佛故大悲菩薩無成佛故文又定性隨分有信解心祕密神通力唯療彼故又云正位者大乘正位也被上二類意云闡提二乘未入大乘正位者攝受令入是乘也為言故云普令同入是乘文或云大師御所持本入正位云云二本義釋入正位云云故知以入正位本為勝上多義中以初義為善攝大乘論云身子化人既得受記念未定入二乘正位者改小乘行已入正位者令其練根學菩薩也文玄論第七引之此文凡聖位論入未入歟唯識樞要上云然第五性合有三種一名闡底迦二名阿闡底迦三名阿㒹底迦一闡底迦是樂欲義樂生死阿闡底迦是不樂欲義不樂𣵀槃故此二通斷善根人不信愚癡所覆𮑇故亦通大悲菩薩大智大悲所薰習故阿㒹底迦名為畢竟畢竟無𣵀槃性故此無性人亦得前二名也前二久久當會成佛後必不成文乃至者上法界衆生句惣摽五性今別句中舉無性不定顯餘三乘性故云乃至也大師疏文次第闡提定性之文云云此無緣大悲等者私云顯他緣又𭇥經無緣乘之義也謂住𭜨親平等𮗚普利一切衆生故云無緣也異三界唯心義故知無緣他緣義他緣狡不唯心故故知此無緣乘即是法無我性者通二義惣結歟何者梵云等十二字是惣摽也所謂以下別釋別釋中二義各有結文故知此無緣下二句通二義惣結也問無緣他緣住心時專應立無緣乘名例如住心品名何不爾耶立名隨冝經既云無緣乘大師立他緣名顯無緣有他緣義歟故他緣乘下注云無緣起悲也又為顯大小差異專有自利利他不同歟故第六心云四量四攝齊他利行文始能𮗚察阿陀那等者抄云始謂𭤧始初始謂至第二劫𭤧始能𮗚前未能故又舉始攝末故名為始能文私云𭤧始與初始如次配二釋矣初義意第二劫𭤧始𮗚阿賴耶故後釋從深至淺舉初本識攝未七轉也又或准大師釋他緣覺心但示八心者第二劫中二心俱知八識中他緣乘在初故云爾也問初劫是六識分齊也何末那不云始𮗚乎或云𡧤然界所斷法執是末那相應歟龍樹菩提心論等中六識唯人執相應故若爾末那屬𡧤然界歟或又經論中唯無七識之文故故住心論第十云唯薀業二乘但知六識他緣覺心兩教但示八心一道極無但知九識釋大衍十識大日經王無量心識無量身等文言阿陀那深細者鈔云言阿陀那者執持義即第八識之別名唯識論云或名阿陀那執持種子及諸色根故文唯識論第三云解深密經亦作是阿陀那識甚深細一切種子如暴𣴑我于凡愚不開演恐彼分別執為我以能執持諸法種子及能執受色根依處亦能執取結生相續故此識名阿陀那無性有情不能窮底故甚深趣𡧤種姓不能通逹故名甚細是一切法真實種子緣擊便生轉識波浪恆無間斷猶如暴流凡即無性愚即趣𡧤恐彼于此起分別執墮諸𢙣趣障生聖道故我世尊不為開演唯弟八識有如是相文問經云阿賴耶釋云阿陀那其義同耶鈔云言阿陀那者執持義即第八識之別名此通一切位也又名無垢識此名唯在如來地阿賴耶名過失重故最初捨故異𤎼識菩薩將得菩提時捨聲聞獨覺人無餘依𣵀槃時捨無垢識躰無有捨時今無緣乘心亦應𮗚此故住心品中云皆以無所住而住其心故亦令𮗚也取意私云阿陀那名通因果二位賴耶稱𡱈因位但異異𤎼名者賴耶𡱈七地以前不通八地已上故又唯識疏及樞要有多釋中一者三位釋謂我愛執藏位善𢙣業果位相續執持位賴耶名唯在初位異𤎼名通初二位有漏位也阿陀那名通第三位也取意由屬𭔹治悉檀者鈔云疏猶屬𭔹治悉檀等者即四悉檀中尚屬𭔹治非第一義也悉檀者此云義宗而有四種謂佛以四法各云義宗一世間悉檀二各各為人悉檀三𭔹治悉檀四第一義文私云第二劫即心𮗚是緣生中道故第一義攝也初劫即空𮗚是偏真故屬𭔹治也為言問四悉檀義如何如鈔釋又天台釋云世界樂欲為人生善𭔹治破惑第一義入理文若失般若𭤧便等者鈔云謂前劫修𮗚行時心沒薀中以無性空門𮗚法無我若失般若無所得𭤧便即墮斷文私云無所得𭤧便者第二劫中道𮗚也故釋云今大乘不可得空空相亦不可得文即無所得義也又鈔中釋𭤧廣道人云即清辨論師等也文若般若𭤧便者與即空𮗚者何失彼時云亂清辨空乎故知若失護法中道𭤧便者亂清辨心境俱空義各𢙣取空為言若不中道𮗚者不失彼時但空故望第二劫𮗚可云𢙣取空乎又此文以即空𮗚成屬𭔹治悉檀之義若非失第一義𭤧便何為屬𭔹治之因乎又上文釋他緣心云亦當以種種𭤧便折伏攝受文此云般若𭤧便也後得大悲能所起雖異俱利他心故故知般若𭤧便者緣生中道也又義云般若𭤧便者𡧤然智分也所謂于即空𮗚解有悲智𭤧便故上文釋𡧤然心云若失𭤧便多墮二乘地證小𣵀槃然以菩提心㔟力還能發起悲文是大悲𭤧便也今文般若𭤧便者大智𭤧便也故知即空𮗚解以菩提心㔟力具悲智故顯示不墮斷則非𢙣趣空也又下文釋初劫𮗚解云畏墮斷故不能𥁞理𮗚空文今又畏斷般若𭤧便定知𡧤然智分也又唯識疏釋論中道云謂非一向空如清辨非一向有如小乘故名中道文准此釋湛𡧤小乘同初時𡧤然即空同第二時般若第二劫中道深密也故知般若𭤧便第二劫中道𮗚也然今疏意覺心不生同勝𩮺寶性故以般若不可同𡧤然歟又准香寫釋寶性論等為終教般若中𮗚等為始教初門今疏同此歟無性空讓般若故此又違大師釋三論為性宗故又𭤧廣道人者鈔云龍樹斥云非佛法𭤧廣亦是邪人法也文又疏家宗家意有宗空論如次他緣覺心淺深故二義任意取捨但若失𭤧便者上文云爾時心滯無為法相文𡧤然心望湛𡧤位作此釋歟故上文云行者湛𡧤心雖已明顯然涉事時根塵等當心者著無為法然以菩提心㔟力修離著𭤧便𮗚察無性空取意彼既望湛𡧤而𡧤然心云𭤧便此文可爾歟或文㔟不似彼不可同歟又下文相望不定故望中道即空云斷何失𭤧廣道人者鈔云𭤧廣道人者即清辨論師等也唯識云清辨計若論世俗心境俱有若依勝義心境俱空失於中道名𢙣取空𭤧廣道人即同彼人也又摩訶止𮗚云𭤧廣道人自以明讀佛十喻自作義云不生不如幻如化空幻為躰龍樹斥云非佛法𭤧廣亦是邪人法也今同彼人故云𭤧廣等文三論玄嘉祥云二𭤧廣道人謂一切諸法如龜毛㝹角無罪福報應此人失世諦有𭓩然而空故空名有既失有亦失空如斯之人亦失二諦文智論疏第一惠影云𭤧廣道人者此是𭤧廣部中所執道人故云𭤧廣道人此人雖學大乘而失大乘㫖執之大過執言一切法無間假實之生與法悉皆無如㝹角無文私云演密初釋違經疏起𥁞歟經并宗家御意有宗為淺空宗為深為他緣覺心二重故天竺那羅壇寺戒賢智光二義分華嚴探玄記第一云三藏云近代天竺那爛陀寺同時有二大德法師一名戒賢一名智光神解超倫聲高五印以所羕宗別立教不同謂戒賢遠羕勒無著近踵護法難陀依深密等經瑜伽等論立三種教謂初鹿薗小乘法雖生空然未法空真理故非了義即四阿𭇥等經第二時中雖依遍計所執自性諸法空然猶未依他圎成唯識道理故亦非了即諸部薩婆若等教第三時中𭤧就大乘正理具三性三無性等唯識二諦𭤧為了義即解深密經等第二智光論師遠羕文殊龍樹近稟提婆清辨依婆若等經中𮗚等論亦立三教謂佛初薗為諸小根小乘法明心境俱有第二時中為彼中根法相大乘明境空心有唯識道理以根猶劣未能令入平等真空故作是于第三時為上根無為大乘辨心境俱空平等一味為真了義文私云立教淺深互有文理斯乃相成非相破也然今疏并大師釋義頗順智光所判矣性相二宗淺深冝然之故今大乘不可得空相空相等者兩本義釋無初相字抄無二相字故義釋云不可得空空相亦不可得云云鈔云今大乘等者𭔹前三桑但空故云今大乘不可得空空亦不可得是名不可得空也文𨗴託云空相亦不可得者是明此他緣大乘所𮗚依他圎成之上圎空理也為遣所執實我實法而且諸法空義若遣所執我法畢後於依他圎成二性不可成空不空之定相也文阿字義第四實範云又云𭔹前三乘但空故云今大乘不可得空空亦不可得不可得空云云又云謂前劫中有通教菩薩具如上之今則不爾了法緣生故幻有知緣無性故真空此則自性不可得空故云與前𢙣性空意復有殊矣云云有人云今大乘不可得空相者此劫緣生中道也空相亦不可得者前𡧤然留無性空之故今遣彼云亦不可得也云云又義不可得空者依圎有也故下云然亦于諸法無所空文空相亦不可得者遍計無也故下云雖𮗚諸法無所有文故須離有離無道者上中道結成也或云初二句遣遍計能遣空猶無所得故云空相亦不可得也雖𮗚已下四句存依圎也亦與雖二字起𥁞可思之故唯識論第七云我法非有空識非無離有離無故中道文同疏云謂心外所計我法非有真如理空及能緣真識非無我空即真理識即俗事中道者結前所言會中道也文又云是則中道者謂非一向空如清辨非一向有如小乘故名處中道謂二諦有不同清辨二取無不同小乘故處中道文私云二諦者依圎二性即前空圎成真諦識依圎俗諦也二取者能取所取即遍計所執也前我及法我法各有二取也定又三時教次第初時小乘云有教依圎有故第二時般若云空教明遍計空故第三時深密等云中道教三性有無雙辨故故知前二時未了但有但空故第三時顯了談明離有離無中道故故云故須離有離無道𮗚法無我性也疏文可讀文點今大乘不可得空空相亦不可得云云問唯識云我非有既通二我今何云法無我唯法我非人我乎又彼云空識非無依圎存有此何云𮗚薀阿賴耶而唯𡱈識乎人無我初劫顯故讓彼且舉法空顯人空也或法空如𭘧人空故故彼宗釋云然且法空必𭘧生空文次𮗚阿賴耶者舉識顯空理也又真如識實性故言識即顯也故下文云然阿賴耶有三種義文或法無我性即理故問今文清辨空義者疏家意可云法相勝三論劣耶明宗義𭔃彼宗雖談之所存終別故依之𮗚薀阿賴耶等處即楞伽深密等云云引相宗經成義文覺自心本不生處如勝𩮺寶性等云云引性宗經論成理文可思之宗家依此判他緣覺心勝劣耳問若爾清辨立教如何小乘經中述心境俱有義深密等中明境空心有義般若等中成心境俱空義故般若勝深密劣也夫護法清辨互以雖是非非成鉾楯故法藏釋云色即是空清辨義立空即是色護法義存此乃相成非相破也文然內冷然之聖人雖不鉾楯外迹應同之與法非無淺深性相分𡵨𫞐實殊途仍大師判二重勝劣分三乘差異耳有人云師云于前清辨所立出難者彼所立二諦唯是教門云云故二諦教外有中道理故有無二諦教云偏有偏空有無教外有中故中亦偏非中破也而清辨所立有表不有並遣四句無表不無並遣何云偏有偏空乎護法門人且為弘一教付此過也祖師內證非鉾楯也云云護法聖智所證非有非無而有而無等者二諦假理故離情有無則聖智還有無也云云為欲淨除智障故者鈔云何智為障智有二種一證智二識智識智分別躰違相順相順故為智躰違故為障也智即是障名為智障入大乘論云出世間無明是智障世間無明賢聖已遠離故無明即是智之惑故是智之障故名智障也略抄唯識論第十云所知障者謂執遍計所執實法薩迦耶見而為上首見疑無明愛恚𭞙等覆所知境無㒹倒性能障菩提名所知障文私云智障者二障中所知障二執中法執也隨順古昔諸菩薩等者經云如彼往昔如是修行者文問今此行者真言行歟又顯行者歟如何顯行者也所以舉修行䡄則云𮗚薀阿賴耶出所依經證云即楞伽解深密明知顯乘行者也又疏第三云明三劫六無畏衆多心相擬儀外跡顯修證深淺文此文又顯三劫六無畏是如常顯乘行而非密乘行也又住心論第六引今文畢法相大乘以此為宗此則所謂菩薩乘也文既云菩薩乘非顯三乘教耶依此等文定知顯乘行者耳又義真言行者也經品號既云入真言門住心品所以初劫假云淨菩提心少分增明第二劫釋心主自在明即是淨菩提心第三劫中判世尊所以廣如上諸心相者為教真言門𮗚行者云云又住心論第一引今經云又問發趣菩提之時心所住處相相續次第幾種佛具之故經初品名曰住心今經顯真言行者住心次第顯密二教差別亦在此中文斯則顯示大日所住心次第真言行者修證續生也先師云古德二義住心論中淺略深祕如次顯教密教二行也或云于真言行有一心三密修行三密行者後深祕門也一心行是前淺略門也此中又有顯密二行顯行者釋尊所三乘一乘等各住自乘不知心相續是也密行者大日所三劫十住心續生次第是也雖一心𮗚解專期祕密莊嚴心一生到彼寶處故異顯耳但至即楞伽等文并擬儀外迹文者自宗淺略與如常顯教融不融雖異教行相順故云皆是擬儀外迹顯乘以明修證之深淺耳真言淺略也大師又云今經住心次第顯密差別亦在此中云云故知淺略又通密行也依之疏第七云如餘經所求小乘人當修行作𮗚即便于世間法教深生猒離求大乘人又于聲聞法教深生怖畏此皆為未知祕密藏者作此𭤧便耳就此經宗則五種三昧皆是開心實相門如行者初住有相瑜伽則是世間三昧但于此中了知唯薀無我即是聲聞三昧若以十緣生句𮗚諸薀無性無生即是菩薩三昧餘如住心品中廣明不同餘教以心性之㫖未明故五乘殊轍不相融會也若更作深祕密釋者如三重荼羅中五位三昧皆是毗那祕密加持其與相應者皆可一生成佛何有淺深之殊文私云住心論淺略深祕專依此文起𥁞歟故淺略中可有真言行也但六無畏能𭔃齊真言行有淺深次第與今深祕異歟若爾彼修證深淺者能𭔃齊三密行歟又住心論深祕中世間三心同第七卷深祕四箇大乘深祕同第三卷祕密云云淺深無淺深隨冝歟即楞伽深密等者問香寫釋中唯識法相宗所依出深密如來藏緣起宗所依出楞伽經如何慈恩唯識述記云所謂華嚴深密楞伽厚嚴云云八識三性三無性者私云解深密經中第一卷心意識品八識第二卷法相品明三性又無自性品明三無性又唯識論中先三能變八識次三性後明三無性經論符今次第矣彼論第九云即依此前所三性立彼後三種無性謂即相生勝義無性故佛密意一切法皆無自性非性全無乃至云何依此而立彼三謂依此初遍計所執立相無性由此躰相畢竟非有如空華故依次依他立生無性此如幻事託衆緣生無如妄執自然性故假無性非性全無依後圎成實立勝義無性謂即勝義由遠離前遍計所執我法性故假無性非性全無如大空雖遍衆色而是衆色無性所顯文問凡案三時教次第無性先明三性後如何義燈中有三釋其中判第二釋勝故三無性可後但至三時次第者華嚴中明三性㫖性既最第一也故云三性先無過問三無性既深密經顯了何唯識云佛密意耶或云于三無性教有顯了隱密若顯相生勝義三無性是顯了即深密經是也故義林章云以顯了言三無性文若依三無性惣諸法無性亦名無性教是隱密也唯識密意者此意也故彼疏云惣密意三種無性文何今但一義並不相違耳問楞伽經云八九種識文何今但云八識耶住心論引唯識章云或因果合九楞伽第九頌云八九種識如水中諸波依無相論同性經中若取真如為第九者真俗合故今取淨位第八本識為第九染淨本識各別故文唯識疏第一云楞伽經中識性或以第八染淨別開故言九識非是依他識躰有九亦非躰類別有九識文私云意一種第八識因果染淨位分為八九非躰別有九也為言故章云或因果合九疏云或以第八染淨別開也依此等意疏家楞伽八識云云宗家他緣覺心但示八心文問同性經無相論以真如為第九故無相論云能緣有三一果報識即阿梨耶二執識即末那三塵識即六識乃至境識俱泯即是空性其空性者阿摩羅識乃至唯阿末羅識是真如如大乘同性經言衆生神識無𨕙無色無相不可見無定處所識相清淨唯無明貪愛習氣業等客塵煩𢙉之所覆障𨐫如清淨空四塵所障文此文既云真如何云淨第八耶若取淨位第八別立餘七識亦可開染淨別故若爾識躰可成十六如何淨位第八別立是依莊嚴經也故彼經云如來無垢識乃至圎鏡智相應文既云圎鏡智相應定知第八識非真如也故又唯開第八非七轉也餘識非圎鏡相應故又楞伽經上文云依諸邪念法是故有識生八九種識文既云生有為識躰非真如也但至無相等者彼性宗所依論歟問若爾既云依諸邪念法邪念所起識唯有漏識何云無漏識乎依具二意八識邪念所起故云依彼也第九轉邪念得故云依例如起信論云依不覺故有始覺云云即是知三界唯心也者鈔云謂了知八識三性皆如幻等唯是自心故華嚴覺林菩薩云若人欲了知三世一切佛應𮗚法界性一切唯心造正與此同文私云唯識演祕中引此文然但有唯心文無三界言新華嚴第三十七明第六地云了逹三界依心有十二因緣亦復然生死皆由心所作心若者生死𥁞云云又第五十四云菩薩知三界唯心三世唯心而了知其心無量無𨕙云云此文同今疏文也問三界唯心意如何相宗釋云世親攝論第四無解無性第四廣解十地經名躰言唯心者心識是一唯言為遣所取境義由彼無故能取亦無不心所不相離故如若無心所心未曾轉三界唯心之言即顯三界唯識即與欲等愛結相應墮在三界即屬三界貪等結此唯識言無有橫計所緣不遣真如所緣依他所緣謂道諦攝根本後得二智所緣等云云𪩡法師記云謂此三界皆存欲等愛結謂心所墮在三界與此愛結相應繫屬三界貪等故言三界唯心或此言欲等者即以欲界等餘二界謂心所屬此三界愛結也文私云惣意云有情起三界煩𢙉煩𢙉力故輪廽三界若不起三界惑業不可受三界苦故知三界唯心之所為也為言彼宗意以華嚴三界唯心文證捨留純識准此等文者今唯心人取事心所但阿賴耶者舉本攝末舉王包所故抄上釋云又舉始攝于末故名為始能文問欲色界中而有色法心能變色故不離心可云唯心無色中既無色法何復云唯心耶唯識疏云此不然也非但色無亦無貪等能取之心故亦無餘空等識所取義故三界唯心文義演云無色界中雖無色法有貪信等恐外人執離心外別有貪信等今為彼故三界唯心無色中離心王外無別貪信等以為能取心又無色界雖有空無為等然此等無為亦不離心外別有是識之所取恐計離心別有故三界唯心文私云依此解者今三界者五薀中取色行二薀歟貪信等行薀少分故又義云以二界五薀無色四薀㱕第八識云三界唯心歟此義隱劣顯勝識攝歟又義云唯心者真理賴耶實性故攝三界五薀有為俗事薀不無為故㱕無為真理故云三界唯心是即第四重攝末㱕本攝也故唯識章釋攝末㱕本云所理事真俗𮗚等皆此門攝文又義云遣三界五薀事相證無為理性故云三界唯心故疏云心外更無一法文鈔云無即一心則是能遣緣為法乃目所無文又唯識章釋遣相證性識云識言所表具有理事事為相用遣而不取理為性躰應求作證文問若爾慈恩以三界唯心經唯證第二重唯識何違彼乎隨義轉用故無失是以五教章云又如十地經云三界妄唯一心者攝論等始教釋為賴耶識等也十地論終教釋為第一義真心也文皆是雙辨有無者私云此有無有二意一云三性相𭔹辨有無有者依圓也無者遍計也故下文云然阿羅耶有三種義文一云但依他此依他有非有似有二義故云有無也故下釋云明薀阿賴耶別緣起義文准唯識論等後義為勝彼論第八依他八喻舉幻事陽炎等故問所引莊嚴論中幻事𨐫遍計豈不違彼乎莊嚴文如幻事以幻師所起義𨐫分別性妄心所起義也此即當情顯現情有義非𮗚心所𮗚理無謂也豈為知自性𮗚解耶依之唯識論中釋依他云如幻事等非有似有明遍計云如空華等性相都無第八文釋圎成云如大空雖遍衆色而是衆色無性所顯第九文三性𨐫喻異中幻事唯顯依他非有似有義也但莊嚴文幻事非有而有𨐫依他非有而有文取此證薀賴耶也故疏云了知自性如幻最與此經符會文又義云今疏意如幻即通三性𨐫喻也幻事非有而有或𨐫遍計情有理無故是事非處有等文或𨐫依他非有似有也當知妄分別有而非有文又以幻事有空不二義𨐫圎成故文云今以如幻等門照有空不二乃名真入法空悟唯識性文問前明緣生中道云離有離無何今云雙辨有無耶詮門離言中道義異故謂雙辨有無是表亦有亦無故詮門中道也離有離無者有無並亡故離言中道也餘教雙照雙非中道義自相當耳又此離言詮門各有三性合論三性別論也合論遍計是無依圓即有又依圓非無遍計非有故別論遍計情有理無如次有無又理無非有情有非無故依圓各二義通二種准知又此合論別論若離言若詮門皆實空有不二為宗故疏下云照空有不二悟唯識性文明薀阿賴耶別緣起義者私云相宗明生有為賴耶是則蕳異性宗真妄和合二分不二賴耶彼事理通融具分識也此生一分緣起故云別緣起也故法藏章下云若依始教於阿賴耶識但得一分生之義以于真理未能融通但凝然不作諸法故就緣起生事建立賴耶從業等種辨躰而生異𤎼報識為諸法依𭤧便漸漸引向真理故熏等悉皆即空如解深密經云乃至若依終教于此賴耶得理事通融二分義乃至不同前教業等生故文又法藏探玄記第一云始教中廣法相少真性所立百法擇分明故無違諍所八識唯是生如瑜伽雜集乃至終教中少法相廣真理以會事從理故所立八識通如來藏隨緣成立具生不生不乃至如寶性等論文私云始教者相宗即當他緣乘也此宗酬前業今生感得惣報果報果躰故云業種生也唯識第二云酬因業力感第八識取意終教者性宗義當覺心乘也彼宗談真如緣起故立二分不二識也與前劫五喻等者鈔云謂前劫中有通教菩薩從無性門逹諸法即空此則躰法空今則不爾了法緣生故幻有知緣無性故真空此則自性不可得空故云與前無性空意復有殊矣文私云以雙照有無緣生中道異前無性空偏真耳正為室等者鈔上釋云言薀阿賴耶者薀謂諸薀阿賴耶此云巢室即薀之位處也文疏第十六云藏者梵云阿賴耶此為藏或云宮室舍宅之義如世間舍宅一切衆生各隨己分安住其中既有此窟宅即有善𢙣𭇥藏不能自出如來已離如是阿賴耶窟宅故云無藏性也文金剛界儀䡄云心為阿賴耶善𢙣皆由心文私云此善𢙣者與今諸薀名異義同故知善𢙣種子云諸薀歟第八識集諸法種子起現行故云薀薀即聚集義也又薀是有為義薀不攝無為故無為無種故為顯諸法種子是有為故云薀歟此識與薀而為能所藏能藏識生相續所藏諸薀生相續故云諸薀於中生也問疏第一云一切薀阿賴耶業壽種子文此文非諸薀即種子歟如何薀阿賴耶者依主立名故薀即種子歟或復薀者三界五薀從賴耶緣起故云諸薀於中生也故上文云三界唯心也又唯識論第二云此即顯示初能變識所有自相攝持因果為自相故文同疏云自是惣因果是別自相攝持因果二相為自躰故文准此釋者賴耶三相中自相云藏因相果相云諸薀歟又因果二相則五有能所藏義故彼疏云能持種種為所藏此識是能藏也是雜染法所熏所依染法為能藏此識為所藏文私云染種者有漏法皆名雜染非唯染法也即是因相也此識者果相也故演祕云又能藏所藏皆通種現無別躰故文然阿賴耶有三種義者抄云即是遍計所執性依他起性圓成實性皆不離心故文有人云相宗有多師玄護法等義立凝然真如義或有真如緣起之義唐智覺禪師唯識論中緣起義為宗云云此義不爾其故智覺禪師者禪門人歟醫王眼觸途藥以深教意於唯識談真如緣起義何預彼宗義乎彼華嚴清凉大師釋云此唯識實性亦即是真如定言不變過㱕彼輩文此又為相宗義乎又法相撲揚釋云馬鳴菩薩亦言真如受薰持種恐譯者誤文此又為性宗義乎故知阿賴耶唯依他也然具三義者遍計于依他上起故圓成又依他實性故以不離故云具三義也抄釋有其理也故唯識論第八云此中意三種自性皆不遠離心所法謂心所及所變現疏云謂心所即自證分及所變現即相見分文衆緣生故如幻事等非有似有誑惑愚夫疏云愚夫等不了謂為實有一切皆為依他起性愚夫於此橫執我法有無一異俱不俱等如空華等性相都無一切皆名遍計所執依他起上彼所妄執我法俱空所顯識等真性名圓成實疏云此空所顯識及心所一切相分等真性名圓成實文是故此三不離心等文疏云故此三性不離心所相分等文故應知三性俱真實者莊嚴論第四勒頌無善釋云次求真實義偈曰離二及迷依無無論三應及二淨二淨三𨐫顯釋曰離二及迷依無無論者此中應知三性俱是真實離二者乃至由自性無論不可故三應及二淨二淨三𨐫顯者三應謂初真實應知第二真實應斷第三真實應淨二淨謂一者自性清淨由本來清淨故二者無垢清淨由離客塵故此二清淨由三種𨐫喻可得顯現謂空金水如此三𨐫一則俱𨐫自性清淨由空等非不自性清淨故二則俱𨐫無垢清淨由空等非不離客塵清淨故偈曰法界與世間未曾有少異衆生癡盛故著無而棄有釋曰法界與世間未曾有少異者非法界與世間而有少異何以故法性與諸法無差別故衆生癡盛故著無而棄有者由衆生愚癡熾盛於世間無法不應著而起著於如如有法不應捨而棄文私云今疏所引未必如本文或取本三應及二淨等意或依釋初真實第二真實第三真實文明此句也已上二頌并釋是求真實法也三性俱真實者抄云此三俱是真實而有二義一者三性各別論真實二者三性無㝵論真實且初義者遍計性真實是分別故依他性真實是因緣義故圓成性真實是真實故下疏云如彼可得故通逹世諦實第二無㝵義者遍計依他皆以圓成而為躰故下疏云如彼無躰故得入第一義又華嚴抄云情有即理無緣生即無性皆是真實也文私云各別真實者遍計情有依他似有圓成真有三性真實各別故云別論也𨐫云如彼可得故通逹世諦實文法云衆生癡盛故著無而棄有文𨐫舉依他遍計真實顯圓成真實故但云世諦實也或上文無㝵真實同故不別舉歟法文具顯歟衆生癡盛故著者能遍計妄心第六七識與癡惠相應執我法故云癡盛故著也故唯識論第八云有義第六第七心品執我法者是能遍計唯意識能遍計故意及意識名意識故計度分別能遍計故執我法者必是惠故二執必與無明俱故文著者通二執妄計著故無一字所執躰相無故云無妄心者彼成實有執故故著無者顯依他遍計真實也而棄有者有者真有圓成真實也妄心計著情有故棄捨圓成真有也又無㝵真實者遍計理無依他非有皆顯圓成故云圓成為躰也遍計依他空為門顯圓成故故章云空為門故入於真性文不同彼華嚴遍計理無依他無性即云圓成不變耳故𨐫云如彼無躰故得入第一義法判法界與世間未曾有少異法界者圓成世間者餘二性也以不離故云未曾有少異也故𨐫中不云無性即第一義也二性又㱕圓成真有論真實故云無㝵不同華嚴三性一際論相故清凉性相兩宗十別中立三性即離別也抄二義中初義順本文歟本頌云三應釋中應知應斷應淨文既遍計應知無染分依他可斷故情有與似有云真實也淨分依他是二淨攝故具如下辨也問法相華嚴三性即離為異若爾三論天台三性云何異耶大乘玄二諦義嘉祥云三性者依他分別真實分別性者即六塵為識所分別故言依他性者本識為種子所依故名依他真實性者二無我真如三無性者知塵無相故言分別無相性依他無生性者知本識無生故言無生性知無我理無性故真實無生性三論云無性法亦無他宗不遣三無性今論遣三無性故云云私云三論三性三無性義雖同相宗彼三無性為極此無性又遣故殊矣天台大乘止𮗚下南嶽云惣明三性者謂出𮉐真如及佛淨德悉名真實性在障之真與染和合名阿梨耶識此即依他性六識七識妄惣分別悉名分別性文又云更有一義就依他性中即分別為三性一者淨分謂在染之真即名真實性二者不淨分謂染法習氣種子及相果報即是分別性二性和合無二即是依他性也文私云初釋真實性出𮉐依他分別在𮉐然真如躰是一也後釋於在𮉐依他染淨分真實分別二性也二義雖異三性一際二義雙融義全同華嚴故華嚴五教章中云又云阿毗逹磨修多羅中世尊法有三種一染汙分二清淨分三染汙清淨分依何義此三分於他性中分別性為染汙分真實性為清淨分依他性為染汙清淨分依此義故三分釋曰阿毗逹磨修多羅中分別性以煩𢙉為性真實性以清淨品為性依他性由具兩分以二性為性故法有三種此上論文又真該妄相無不攝妄徹真源躰無不𡧤真妄交徹二分雙融無㝵全攝思之可見文故知彼三論雖遣三無性唯情義未及表德圎融矣由能所畢竟無故者私云依此釋者頌離二者能取所取云二畢竟無釋離歟又二者依他相見二分此二分是自躰分所變不即不離不一不異如鏡上能照所照用不離鏡而愚夫依妄熏習力執心離境執境離心斯則迷依他內境相分彼上起所取遍計所執迷依他內心見分彼上起能取遍計所執此能取所取即當情現躰用都無物也此二取離依他相見計故云離二也又依他相見不即不離也然遍計二執偏離故云離二也又二者我法也此我法二種離內境故云離二也問𨐫中云二迷顯現何明都無義耶是法𨐫影略互顯三性真實別融二義也又法中遍計舉無㝵真實依他舉各別真實互顯也為言問實相𭔹法三性俱真實𭔹何耶故五重唯識中遣存實識文非遍計遣依圓存實耶相𭔹非一義門隨冝依圓真實如令尋也二智境故遍計情實云真實遍計一性通實二義故𭔹理無情有云實也無㝵論真實唯圓成故非難歟迷依者鈔云謂依他性與迷分別為所依故故名迷依由此能起諸分別故文私云迷分別者遍計所執性也依依他而起遍計故無無論者唯識論第二云謂空無我所顯真如有無俱非心言路絁與一切法非一異等是法真理故名法性文私云此文真理云心言路絁今又圓成真理言語道絁故云無心行亦𡧤故云無論也故慈恩理趣分疏中釋經謂貪欲性無論等文云超過尋思言議故云無論取意今絁尋思故云無論也問論既通心言者何別云無乎次下句三應及二淨文二淨者圓成二門真如及無漏心真理故云無嘆菩提故云無論也二淨者自性淨無垢淨故謂真實性真實者准下彼事無躰故得入第一義之文今此真實性局真理歟二性云彼事圓成云第一義故又彼論法頌云法界與世間未曾有少異文釋論云法性與諸法無差別故文法界法性是真如異名故又准下如是轉依故即得真實義之釋者通理智歟轉依言理智故又舉依他云妄分別唯染分依他故淨分依他攝圓成歟已上二義中初義常無常門圓成後義漏無漏門圓成也故唯識樞要上云三性有二諦一常無常門常為圓成唯真如是一切有為皆依他起二有漏無漏門一切無漏皆圓成實諸有漏法皆依他起菩提𣵀槃並圓成故文又唯識論第八云有漏心等定屬依他無漏心等容二性攝衆緣生故攝屬依他無㒹倒故圓成實攝文二義中後義為勝歟彼論中無無論下有二句云三應及二淨二淨三𨐫顯文釋論云三應謂初真實應知第二真實應斷第三真實應淨二淨謂一者自性清淨由本來清淨故二者無垢清淨由離客塵故文既依他云應斷圓成云應淨淨分依他攝圓成也二淨如次理智二法自性淨無垢淨義可然故但法界與世間者法界唯理世間但有漏故舉唯圓唯依法而顯通二性無漏心歟又彼論釋如云有法世間云無法依此文舉唯圓唯遍而顯通二性有為心歟次求真實𨐫喻者問今此𨐫至何文耶𮗚義云正𨐫二種迷乃至通逹世諦實二行八句頌也通彼事無躰故乃至可得亦如是諸頌也或初二頌惣後諸頌別也問何應知所治躰等頌非𨐫耶彼通妨故且正釋論之也又彼頌等更有法故又義云諸頌皆求真實𨐫喻也通妨依正釋𨐫喻起故攝彼也云云私云本論中法中有二行頌𨐫中又有二行如次配顯矣文言無偏頗法𨐫齊等耳彼事無躰故等更設𨐫合雙轉釋前法𨐫餘義歟若爾何偏屬𨐫耶如幻師依咒術力等者本論中有𨐫家也今此文釋上頌中又如下釋下二句倒因已上釋上二句各有開𨐫合𨐫二假文各如是下釋合𨐫已上釋開𨐫也又本頌中前二句前迷依𨐫下二句前離二喻也各上開𨐫下合𨐫也變木石等者𮗚抄云幻師幻事如次依他遍計文顯以木石可𨐫圓成也所以法三性具舉𨐫頌無圓成釋中舉木性喻圓成也云云或云俊以幻師咒術力喻能變計依他即第六七識也木石者即所變計依他下云木石是也即實木石也此木石等為因變金等相喻所執也今木石為所執二迷之因故云迷因也所以頌中幻師𨐫依他是能變計依他也下木等實境𨐫圓成是取木等四躰故云實境也此義雖順頌文違變木石之文今木石舉所變法何為能變因矣若能變者應云木石變乎道範云依咒術因緣力故於草木等上假施設顯現似金銀等物是依他也實草木等是圓成圓成諸有為法之性真實自性故又解云實草木喻依圓二性若細合喻者以草木等惣相喻依他是草木等所有色香味觸四性喻圓成也云云私云變木石等者釋頌中起幻二字也准唯識疏等釋幻事喻於此幻事有二一者假事幻謂依咒術力因緣所變現之木石等也喻之依他似有他二者實事幻謂於假事幻愚夫不見因緣而見實木石等也喻之遍計也故知今木石等者等金木也是依他也所以依咒術所變假木石等上起情實木石等故云變木石等以為迷因也迷是實事幻即遍計也但合𨐫中依他性者類上木石種種分別者所執也意云謂作依他起所執之倒因如假木石之為實木石之因也為言又義起種種分別合變木石等種分別即依他也妄分別故為㒹倒因合以為迷因文句相𭔹分明故如是分別等句合𨐫摽句也此義為勝云云次下幻像金等者等取木石等也是實事幻遍計也理實言之木石像金皆通假實故喻依遍二性也問頌見幻師𨐫依他幻事喻遍計何但幻事分二種耶釋中以幻師咒術為變木石之因緣是當依他衆緣但頌文為取所起幻事舉能起緣而顯假事幻也次諸幻事者取實事幻𨐫遍計也或本云如彼真幻事云云疏主為顯實事幻真諸歟若幻事唯𨐫遍計非依他者依今論唯識論既幻事𨐫依他非能所相違乎故知今疏下彼論明𮗚薀阿賴耶了知自性如幻之釋與唯識論意同矣不可異求耳問於幻事分假實依慿安在乎樞要下云中𨕙論八喻通依他所執二性假喻依他實喻所執文是其證也演祕第七云中𨕙據彼幻事躰及能執心所執木等通喻二性文此釋未必分別假實歟或云今木石云圓成非理圓成非迷因故故唯識論云攝大乘是依他起遍計心等所緣緣故真非妄執所緣境故文義初義同𮗚後義以今草木為能變因而喻依他故又違下木等實境喻真實性義矣當知真草木圓成假草木依他實草木遍計也故彼論下文云色識為迷因識識為迷躰釋曰彼迷境名色識彼能迷名識識文此文既云依他色心境為迷因何為迷因木石云圓成乎非色識者妄分別能遍計心歟此𨐫依他分別二相者古德云以依他分別如次𨐫上幻者及幻事也今謂不爾二相俱𨐫幻事有假實故但摽幻者是為取幻事也意幻者之幻事為言中川上人點本幻者幻事云云况今顯二相無躰幻師既無彼義何取彼乎又多本中皆無幻者二字疏主為顯幻事通二性省幻者二字歟或云是依了知所執理無與依他假有而無性義故悟入圓成也上所云求真實者求入圓成也云云私云遍計理無依他非有云無實躰也依他似有世諦𨕙故又求真實義何必𡱈圓成乎若爾違如彼可得故通逹世諦實文故所以應知應斷應淨求三性真實義故又如幻者幻事躰亦不可得者鈔云此中剩箇不字應云如幻者幻事躰亦可得文私云不字誤歟本頌云如彼可得故故又本論亦無不字矣此𨐫妄分別者此妄分別者唯依他性也上文云分別依他性故又唯識論第八云妄分別是依他起又云謂能遍計妄分別文又第七引中𨕙云妄分別有於此二都無文釋云此頌且依染依他文當知唯名依他也遍計唯云分別不云妄故問世諦實應知應斷義異何唯舉依他乎舉依他顯遍計歟或勝唯舉依他歟或二諦影略互顯歟或又妄與分別為二性歟凡此一頌圓性真諦依遍俗諦故三性各別真實義歟彼事無躰故等者𮗚義云此頌轉釋上如彼無躰等頌意也又云上頌明幻師幻事無躰此文限幻事無躰未必轉釋上文歟云云私云此文但釋上幻事非幻師云彼事故又云彼幻事無躰故彼事者上幻事即依他如上文云此𨐫妄分別也或通依遍如上文云依他分別亦無實躰也問合中彼二迷無躰文何唯云依他耶𨐫合互顯歟又依後義合𨐫文舉迷顯假歟已轉位染分依他亦可斷故若不爾違次下文中明依他非有而有等故或二迷者二性歟真實境者釋中云木等實境是𨐫圓成也所以得假依實遍幻事木等無躰故即得真實木等躰也為言故合𨐫云得轉依時即得真實性義也文當知上假中明依他遍計有義成三性別論真實義今文中明遍計影依他無義辨三性無㝵真實義也前文第一義即圓成也今文轉依是圓成也即通理智故樞要云二有漏無漏門一切無漏皆圓成實諸有義法皆依他故菩提𣵀槃並圓成故文又彼事無躰故等頌次下本論中更有一頌并釋故論云迷因無躰故無迷自在行倒因無躰故無倒自在轉釋曰迷因無躰故無迷自在行者世間木石等雖復無躰而為迷因若得無迷行則自在不依于他倒因無躰故無倒自在轉者如是依未轉時雖復無躰而為倒因若得轉時由無倒故聖人得自在依自在行文私云依未轉時雖復無躰等者未轉位雖依他法具無性義二障未斷故為妄心所緣境故云為倒因也已轉依位二障斷故能遍計妄心𥁞故見道已上聖人離二種相自在行也為言是事彼處有等者有人云是事者幻事也即遍計依他無躰無性義也彼處者依他起處也有者前二迷也云云私云此文幻事顯有而非有義何唯云無躰無性義耶或云此文唯明遍計有無義也故釋云有謂幻像事彼處顯現故等文上文中以幻像事𨐫分別性故今謂不爾此二行頌明幻事非有而有等義顯依他非有似有也故合文此幻即𨐫諸薀是故當知妄分別有而非有文復次妄分別非有而有文既云諸薀三界五薀也又有而非有非有而有俱云妄分別能遍計依他也故唯識疏云妄分別有即有三界妄心也即能分別分別境故起執故文故知妄分別言唯在依他非遍計故二頌同明依他也但有而非有非有而有於一法二義為顯兩義無偏頗作順逆釋例如不生而生而不生矣又義云上一頌明遍計情有理無義故云有而非有也有而言未必似有歟又案頌次第是事者上二迷彼事故正是遍計也後頌明依他非有似有故云非有而有故結後頌云此幻即𨐫諸薀也是故已下文更述兩頌意也又上是事言正變計依他歟此幻事有假實故彼處文可通依圓歟又妄分別言所執又彼所起故云爾歟二義中前義順文歟非有而有等而字起𥁞是顯即無而有義故即似有假有義也或人云唯識等中或云假有實無或云非有似有意少異假有者依他當躰假義也實無者守千師意云遍計情有也是執空義也徵法師意假躰云實無也躰空意也又非有者非圓成真有故云非有似有者似遍計情有故云似有也如是有躰與無躰無二者此文釋頌第三句也彼論正文𤗊後二句明此釋故由此下釋第四句也但後頌第三句無躰無二是不二義分明今頌不二義難得然文點可讀有躰與無而有也意云有躰與無躰不二而有也為言此幻即𨐫諸薀者問本論文此幻即𨐫諸薀是故當知十字無之何疏加之耶本論中此間有兩頌今疏妄分別以下文略頌引釋故論云偈曰有二種光而無二光躰是故色等有躰即無躰釋曰有二種光而光無二躰者此顯妄分別有而非有何以故有者彼二光顯現故非有者彼實躰不可得故是故色等有躰即無躰者由此義故色等有躰即是無躰偈曰無躰非無躰非無躰即躰是故色等無躰無二釋曰無躰非無躰非無躰即躰者此顯妄分別非有而有何以故非有者彼二光無躰由無實躰故而有者彼二光非無躰由光顯現故色等無躰無二者由此義故故色等無躰與躰而無有二文私云此二行頌雖二光有而非有非有而有義未云𨐫上幻事二義故疏家取意以二光二義𨐫上幻事二義也為言故加此句耳或云上二行頌明遍計有無義下二行頌明依他有無二義也此幻即𨐫諸薀者上幻事𨐫遍計故此幻事又𨐫依他也為言有人云上下𨐫合但顯遍計所執也所執諸薀非依他五薀云云私云上二頌唯𨐫無遍計合何爯云合依他耶又遍計諸薀者依慿安在乎頌并釋中云色等舉色薀非等取餘四薀乎此非依他五薀耶又上釋薀阿賴耶云謂諸薀於中生文豈云遍計乎故知上下𨐫合但顯依他性也况復所引論文偏為證𮗚薀阿賴耶知自性如幻等也前後諸文顯遍計則引證成無用歟疏中加此幻即𨐫諸薀句良有以也故引彼論畢釋云彼論明𮗚察薀阿賴耶了知自性如幻最與此符會故具出之文既彼論文云賴耶自性了如幻非依他喻幻事定知諸薀云遍計誤甚也問於妄分別釋而有義云彼二影顯現文非所執二迷顯現義耶又釋非有義云彼二都無實躰文非遍計躰用都無義耶故知所執情有理無釋有而非有等義見如何妄分別唯依他先成畢然於彼釋有無二義是遍計乎故知二影者依他相見二分故無性攝論云但法生時緣起力大即一躰上有二影生更互相望不即不離諸心心所由緣起力其性法爾如是而生文太鈔云更互相望不即不離者一識躰上有見相二分生即見相分別故不即無離自躰分別見相分故名不離文此釋分明歟又莊嚴論正文云有者彼二光顯現故文次彼二都無實躰者依他無性義云爾也故上文云依他分別二相亦無實躰文故無過又彼論今正文云有者彼二光顯現故文又下求染汙及清淨頌云自界及二光癡共諸惑起如是諸分別二實應遠離又釋云界謂自阿梨耶識種子二光能取光所取光此等分別界共無明及諸餘惑故得生起二實謂所取實及能取實如是實染汙應求遠離文此釋既二光云能取實所取實似云分別性乎又依他見相二分云能取所取歟本文云光今所引改云影處文如此唯識依他八喻中光影為一喻顯色十二光與影別也今以影光其義是一歟能建立誹謗等者鈔云疏能建立等者由此有而非有非有而有有無不二故能彼二及小乘故言建立者應言建立不建立前外計處云建立淨不建立無淨計建立者建立一切依此修行謂之為淨不建立者謂此建立非究竟法若無建立所謂無為乃名真我謂一向都撥為無即名誹謗故言能等文有人云此釋頗穿𮢶歟龍樹釋云建立有誹謗無云云可用通相義也私云抄意建立計云建立不建立計云誹謗既以不二二乘有無可外道何云穿𮢶乎彼論正文云問躰與無躰何不一向定而令彼二無差別耶偈曰有𨕙為立無𨕙為謗退大趣小彼亦如是釋曰如其次第一為有𨕙二為無𨕙三為趣小乘𡧤是故不得一向定問云何有𨕙有𨕙為立此明由於無躰知無躰故不應安立有問云何無𨕙無𨕙為謗此明由於有躰知世諦故不應非謗無問云何趣小乘𡧤退大趣小彼亦如是此明由彼二無別故不應猒躰入小𣵀槃文私云遍計依他無躰故入第一義謂之無躰外道有又依遍可得故逹世諦實謂之有躰外道無有無不二二諦是一故二乘猒生死有入𣵀槃空也又云彼二無別者非有非無中道故外道𨕙空也幻像及取幻等者彼論中此偈前有一偈并釋故論云偈曰色識為迷因識識為迷躰色識因無故識識躰亦無釋曰彼所迷境名色識彼能迷躰名非色識色識無故非色識亦無何以故由因無故彼果亦無文私云此文法歟幻像者所取境𨐫色識為迷因也色心諸法皆為所迷境故取幻者能取心即𨐫識識為迷躰歟心所是能迷心故此心境即相見二分於中染淨不同染分相見𨐫幻像相分取幻見分淨分相見為骨像取骨如次又相見也也染所治即可斷依他也淨能治即不斷依他也能取所取者如次染依他見相二分也能𮗚所𮗚者淨依他相見二分也此染淨能所治依他俱具非有似有二義故云彼二雖無而二可得也又義云幻像取幻是所執能取所取也骨像取骨即𮗚心相見二分也兩處彼二雖無而二可得者所執情有理無義𮗚心非有似有義也文同義異矣又義云迷人者愚夫也幻像取幻者所遍計境即依他相見也迷故者能遍計妄心染分依他也能取所取二事者遍計所執也彼二等者彼二者前依他二分也而二者今遍計二取也意云彼依他相見雖無遍計二取由迷彼二分而此二取可得也為言故云由迷顯現故也𮗚門二事如先但彼二雖無等者𮗚心前無所執二取故云彼二雖無非無𮗚心相見故云而二可得也已上三義中初義能治無漏心也淨分依他故故下文云如是清淨法能令染法𥁞文所治是可斷法也染分依他故斷能迷心所執隨之故依他中所遍計通染淨今取能遍計染心為所斷也次義能治是有漏心故云能治躰念處等四念處等𮗚是應有漏故或通無漏歟唯識中云四地修得菩提分法故又今文既云清淨法故或又此文不違前地上位通有漏心故又釋論宗中有漏信進等六清淨法故後義可通漏無漏歟問無漏心𭘧所執二取耶護法正義無漏心不𭘧所執也但安惠意無漏心𭘧執也正後智有異依本宗可矣今文既云菩薩雖修行而無所得也順護法義矣問何所治中云幻像等能治中云骨像等耶幻像有假實故若所執者是實幻像故若染依他者假幻事故骨像是四念處等能治𮗚門不淨𮗚所緣境故問若爾何下文能治又云強幻王乎𮗚心又若有漏若無漏皆依他如幻躰故但本論正文云釋幻像及取幻等一行頌畢又有問更舉頌作釋也文云問此𨐫欲何所顯頌曰骨像及取骨等云云此意骨像等頌為法乎私案為顯前頌迷因無躰雖舉此喻顯能𮗚所𮗚歟如是𮗚已等者𮗚義云自離二及迷依乃至可得亦如是文云如是𮗚已也謂𮗚薀阿賴耶相與此論符會故私云骨像及取幻等一行頌也既云𮗚故亦二故但引離二及迷依等文證𮗚薀阿賴耶者已前文為證賴耶三義𮗚義今文是也故無違耳何法為所治下義釋及本論有何法為能治五字也迷法相者等者論正文云法迷相法迷相者云云迷法相者或唯所執也或唯能迷心也或通二也謂如是如是躰故者有躰無躰二義故云如是如是歟有非有又爾也或躰無躰與有非有云如是如是歟或能取所取云爾歟或相見二分歟或依遍歟然如乃至分別故者釋頌中如是躰及有也亦乃至無別故者釋無躰并非有也前順躰標有釋也後逆非有摽無躰釋也如是下釋如幻二字歟謂諸佛所念處等者私云舉四念處等取八解八勝處等無量法門也何以故下釋成能所治二義如諸凡夫等者明所執情有義即所治也如諸佛等者迷所執理無義即能治也依此文則前所治幻像取幻所執能取所取歟又下文云如是清淨法能令染法𥁞者似染分依他歟彼宗明匠可尋矣𮗚抄義云此文徵釋能治有無也謂凡夫於念處教法等作有解諸佛於所住空也云云私云有無俱為能治非理案如是躰無相等問起但以無躰為能治也若通有躰何致示現入胎等有相之難矣况云如諸佛所未必取佛四念處𮗚是有漏心故凡夫能治𮗚亦屬下文故知上凡夫所取者所治迷相也又准以佛示現八相致難者可通無漏心也如上辨就中依他如幻後得智境未起正後二智已前皆遍計分別攝歟若爾凡夫位猶迷如幻道理歟如是如是躰故者有能𮗚所𮗚二事故云如是如是歟如凡夫所取等者舉所治迷法成今能治𮗚歟問如是躰無相者躰無躰二義歟躰即無相之義歟今此一句頌若合前生佛二文者順初若唯合佛無躰者會後義矣舉凡天所取者為顯佛且示所治歟而佛世尊示現等者或云此文通伏難也問意云如諸佛所如是如是無躰無相何諸佛示現八相耶意云然諸佛現八相是離所執相後得智中現身立等故云如是無相而影顯現也故唯識論第八云雖似所取能取相現而非一切能遍計攝勿無漏心亦有執故如來後得應有執故經佛智現身立等種影像如鏡等故文又義云如是躰無相乃至成等正覺者問也如是無相等二句也問中初一句𤗊正釋意而佛下正致難也前解意如是躰無相者結成上意也由此義故菩薩雖修行而無所得也者疏家私釋成頌意也或以釋論意釋成頌也彼論云釋曰𨐫如強幻王令餘幻王退者彼能治淨法亦如幻王由能𭔹治染法得增上故彼所治染法亦如幻王由於境界得增上故如是清淨法能令染法𥁞者如彼強力幻王能令餘幻王退菩薩亦爾知法如幻能以淨法𭔹治染法是故無𭞙文此文既云知所治能治俱如幻事無𭞙故云雖修行而無所得歟彼論明𮗚察薀阿賴耶等者問莊嚴論中雖明三性真實未云𮗚賴耶又雖幻事𨐫分別性未類賴耶自性何彼論所明如此耶三性即賴耶三義故引三性文證𮗚賴耶之義也况復彼論下求染汙及清淨云偈曰自界及二光癡共諸惑起如是諸分別二實應遠離釋曰自界謂自阿賴耶識種子二光能取光所取光此等分別界共無明及諸餘惑故得生起二實謂所取實及能取實如是實染汙應求遠離文此文既云自界謂阿賴耶識種子豈非𮗚薀阿賴耶義耶又雖所執喻幻事又非幻事不𨐫賴耶非有似有故上文云此幻即𨐫諸薀文幻事𨐫薀賴耶之義也又彼論求真實文終以幻夢等八喻類依他諸法何唯云𨐫遍計耶此中八喻如唯識八喻但所喻行相異也故論云如幻至如化次第𨐫諸行者幻𨐫內六入無有我等躰但光顯現故夢𨐫外六入所受用塵躰無有故𦦨𨐫心及心數法二法由起迷故像復𨐫內六入由是宿業像故影復𨐫外六入由是內入影內入增上起故響𨐫所法法如響故水月𨐫依定法定則如水法則如月由彼證靜法顯現故化𨐫菩薩故意受生不染一切所作事故文唯識論中八喻皆𨐫心心所衆緣生非有似有義况復彼唯識以莊嚴論為所依然唯識中以幻事𨐫依他所依論中無彼義䀄非能所相違乎此等義云此經符會歟當知陽炎等者六喻中引莊嚴文成賴耶如幻義畢餘五喻又莊嚴八喻中隨應引證又引餘經論釋旋火輪乾闥婆城等如幻事應廣也為言前劫五喻等者私云五喻六喻相望而明初二劫𮗚解有勝劣也此三事猶𭘧拆法者有人云世人見芭蕉泡沫時實謂有躰智人拆之令見之時知無躰故云折法空陽炎等世人見時不拆即知無躰故喻躰法空也云云私云三喻又顯躰法空也云𭘧拆法明無性空故𭘧拆法者聲聞經中𨐫人無我意歟故第三釋云謂𮗚唯薀無我時於隂界入種種分拆推求我不可得文又上文云聲聞經中雖此五喻而意明無我今此中五喻意明諸薀性空文既五喻明性空知𨐫躰空也故鈔𡧤然界云通教躰法空也故知今意三喻是𭘧拆空之躰空故不同幻炎等唯躰空故今不取也為言問若爾何第三劫十喻中取泡喻耶彼一水生衆泡𨐫行者自心能作法界荼羅不思議變化也非取拆空躰空𨕙故經云如天降雨生泡彼真言悉地種變化當知亦爾文又疏云聲聞經以受𨐫浮泡般若中以泡為喻雖無實性而因緣猶是實法故十喻中有如化而不明泡喻今此經𨐫意復殊也文所喻既殊何為難矣言即是麁相轉融者有多意實悟房義云第二劫𮗚解待第三劫云麁相望初劫云轉融也謂即心幻不及不思識幻故云麁勝即空幻故云融也為言文點云麁相乃轉融也又上佛房義云初二劫𮗚解雙結意麁相與轉融也故轉融中道位不論即空麁相喻也為言或云初劫即空麁相轉融第二劫云中道𮗚也點云麁相于轉融也私云轉有轉捨轉得二義謂初劫五喻中拆法三喻轉捨躰法幻炎二喻轉融故云爾也未了如是自性時乃至見空未𥁞者𮗚抄云舉初劫未𥁞空有𮗚成第二劫𥁞理中道𮗚也問初劫但即空𮗚未見𮗚有畏有所得𮗚空畏墮斷耶凡佛法𮗚空智惠因緣外無見空所以見緣生𮗚性空謂之即空𮗚故初劫無性空釋五薀皆云緣生無性仍為斷常見𮗚空且名離斷常中道歟云云私云於他緣乘中相似實證待𭔹明勝劣也加行位頌云現前立少物謂是唯識性以有所得故非實住唯識文論釋云𤏙等四法依四尋思四如實智初後位立四尋思者尋思名義自性𭅒別假有實無如實遍知此四離識及識非有名如實智此四位中猶於現前安立少物謂是唯識真勝義性以彼空有二相未除𭘧相𮗚心有所得故非實安住真唯識理彼相已𭤧實安住文立少物謂是唯識未𥁞之義也又成假有實無之𮗚是有空𮗚門也此𮗚未住真勝義性云未了自性等也然見道以上二智𮗚門是實證故二空相不當心而悟入識相識性唯識也故見道位頌云爾時住唯識離二取相故文論釋云爾時乃名實住下識真勝義性即證真如文故上文云行者解諸薀唯心即是知法自性又下云今以如幻等門乃至悟唯識性故即此意矣重意云今經𮗚薀阿賴耶知自性者即見道以上實住唯識之義也為言問既云今以如幻等非𭔹初劫𮗚解耶例如今大乘不可得空等也又云人法二空相亦不當心非初劫耶今字隨冝何必同矣於一劫中初後相望何失又唯識𮗚雖待加行𮗚初劫二空無過加行𮗚未離彼相故故釋云𭘧相𮗚心有所得故非實安住真唯識理彼相已𭤧實安住文今二空之相亦不當心者彼相已𭤧證安住意也况初劫二空𮗚門非有𮗚何云不能𥁞理𮗚有矣若望今心而成恐斷之義上文即空𮗚屬斷矣若與初劫言之誰云非𥁞理𮗚乎故知非初劫𮗚門也又義人空𮗚是𮗚依圎有人我自亡故可云有𮗚歟然未知五隂法本來𣵀槃故非𥁞理也又𮗚薀即空時斷法倒故云空然未空相不可得故非𥁞理也非𥁞理者以第二劫中道𮗚降初劫𮗚之意也今以如幻等門照有空不二等者唯識宗立三時教初時有教依圓有小乘第二時空教明遍計空般若是偏有偏空而終有空離別矣第三時中道教深密等三性有空雙辨故亦有亦空則詮門中道也又遍計非有依圓非空故離有離無則離言中道也詮門離言俱非偏有偏空故云空有不二歟故唯識論第七云我法非有空識非無離有離無故中道文私云此中空識者空圓成識依他具如前辨也又依三劫次第者初劫中湛𡧤明有𡧤然空是偏有偏空也第二劫緣生中道故云不二也又義云有空𮗚門一念同時故云空有不二歟唯識章云由無始來執我法為有撥事理為空故此𮗚中遣者空𮗚𭔹破有執存者有𮗚𭔹遣空執今𮗚空有而遣有空真興記云依所治病有空能治藥可有空有若所治病無增者應能治藥亦無遣存為言以彼空有相待𮗚成純有純空誰之空有記云意云若所治病純有純空無有空相並者能治之𮗚但有偏空之𮗚為誰相並有空有之𮗚乎為言故欲證入離言法性可須依此𭤧便而入記云意云若欲引起無分別智證得真見離言真如要先資糧及加行位可修如此遣存實𮗚為言非謂有空皆即定證真𮗚位非有非空法無分別性離言故記云所𮗚之法非躰定是有是無諸法躰性言語道斷詮言不及有無分別皆斷故但是世俗妄施設何以知者證真實位一切諸法非有非空離諸分別離言故若諸法躰有無定者無分別智應非證實為言要𮗚空𭤧證真謂要𮗚彼遍計所執空為門故入於真性真躰非空文記云是通伏難也般若等云𮗚空入真者由能顯空以為門故入於真性非真躰空如廣百論云聖智所證非有非無而有而無即其意也文私云證真𮗚位非有非空者即當空有不二義以幻事非有似有類空有不二歟章謂要𮗚彼遍計所執者同疏人法二空之相亦不當心也以章空為門故入於真性釋疏真入法空悟唯識性也字義第四實範云私案疏言今以如幻等門昭有空不二而人法二空之相亦不當心乃名真入法空悟唯識性者有空不二者幻有空謂真空而此有空相性是異故不一相性不離故不異且不離云不二也故上文云唯識無境躰法難解之空即是麁相轉融唯識無境者幻有難解之空者真空轉融者明不二然𭘧不一故云麁相人法二空者人法謂初二性二空謂真實性三性妄假真實有空諸相皆不當於心也故下文結此第二劫云然上來原始要終自發一毫之善以至於超度人法有無二障云云真入等者入真空故證勝義性證勝義故了世俗性故云悟唯識性也云云御本記云先年比以高野山傳法會談義之次草之畢文𣱵十年春比理性院上野公令清書畢同九月中旬拭老眼加點畢披覽人必可令訪菩提給耳金剛佛子賴瑜生年四十八
