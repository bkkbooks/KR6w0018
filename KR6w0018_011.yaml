body:
  text: 䟽卷第二之四大乗行發無緣乗心法無我性者演密鈔第三云䟽發无緣乗心等者此心有二一真心二事心今初理運載真心名乗謂諸行者解了三界唯心心外更无一法故名无緣無即一心則是能遣緣為法乃目所無既了緣本不生是諸法无我性為斯乗躰發謂發起即无發之發以諸行者乗此真心直至道塲故曰發无緣乗心也二事心者行濟物事心名乗謂行者𮗚於六道隨緣普利而无自他能所之相名為無緣无即淨心離冤親故緣乃群生有高下故既念平等一緣普令同修𭤧行是則六度行為斯乗躰發謂興起進䇿之義以諸行者乗此无緣乗心上菩提道故曰无緣桒心也文私云真心事心者如次䟽无緣他緣義也真心者大智證理自利行也事心者大悲濟物利他行也即正躰後得𮗚門也或復真心是真理五重唯識中識性唯識即遣相證性識也故唯識章云事為相用遣而不取理為性躰應求作證文事心即識相唯識也後得智𮗚門故前四重唯識中隨應攝也此釋意真心者即覚心不生義也第二刧中不分二重故宗家意不尒无緣心又事心法相唯談有為識故故釈无緣義云𮗚阿陁耶識了三界唯心云云異覺心乗如來蔵云阿梨耶故故覺自心本不生者真理云心王也二重別故又義云大乗行等三句通二種住心惣摽也次釋成中依何以故徵問作二重初如彼徃昔乃至乾闥婆城者顕他緣心義後彼如是捨無我乃至知自心性者明覚心乗義是超越二刧瑜行者惣結二心也但大師以惣摽句属第六者惣摽属前叚其例非一欤二義中前義冝欤二叚文各有摽釈何惣合成摽釈矣所以二叚各惣初秘密主言別初各存何以故句即是明第二重等者鈔云謂初刧中五喻逹諸法即空離一重法倒𭘧拆法故合論一僧第二刧六喻正𮗚不可得空以躰法空𮗚頼耶法无我性故云第二重也取意私云此義意於大乗法空𮗚即空即心二重殊故今云第二重也又義依大師住心次第初刧中𡧤然界攝業唯薀業人无我分齊也今𭔹彼人无我大乗法无我云第二重也或又不云人法三刧相望時第二刧云第二重欤問今法无我中法者五薀欤或云五薀法也但前即空𭘧拆法今唯躰法故法空有淺深也私云前即空覚云法也故第三卷法无畏云離薀之縛法无我无畏云離法之縛云云六无畏中既在後无畏離前无畏覚也今亦可尒故第三刧釈云此中十喻望前十喻復成論文又第六无畏釈云謂𮗚空性時我之與薀法及无緣自性无性取意梵音莾鉢羅等者鈔云莾此云無鉢羅云他今欲明無緣他緣異故以梵音甄之也文私云此釈未无他梵語別何云亦是他義耶亦言无用欤乃至諸一闡提及二乗入正位者𨗴記云彼法相大乗偏𭘧𫞐存五性各別義是大日宗依佛隨自意趣正理成立一切眾生皆成佛義也文或人云闡提有三種断善无性大悲也二乗有二種定性不定也𭔃同相宗義今断善及不定性云折伏攝受也但入正位者見道已上也故上文云與小乗見道適齊然不墮聲聞正位文彼宗意已得果亦廽心故或本未入正位云云十住心論所引同之依此本者未起順擇分已起順擇分未得果三類論之欤四位廽心瑜伽雜集等意也如住心論第五具弁也或未入正位者无餘位云正位欤二乗極位故若尒為顕不定性云未欤定性入无餘故又云准䟽第一云一闡提必死之疾二乗實際作證已死之人者无性闡提定二乗欤然折伏攝受者菩薩意樂也非實得益矣故慈㤙釈云以眾生界无𥁞時故无性有情不成佛故大悲菩薩无成佛故文又定性隨分有信解心秘密神通力唯療彼故又云正位者大乗正位也被上二類意云闡提二乗未入大乗正位者攝受令入是乗也為言故云普令同入是乗文或云大師御所持本入正位云云二本義釈入正位云云故知以入正位本為勝上多義中以初義為善攝大乗論云身子化人既得受記念未定入二乗正位者改小乗行已入正位者令其練根学菩薩也文玄論第七引之此文凢聖位論入未入欤唯識樞要上云然第五性合有三種一名闡底迦二名阿闡底迦三名阿㒹底迦一闡底迦是樂欲義樂生死阿闡底迦是不樂欲義不樂𣵀槃故此二通断善根人不信愚癡所覆𮑇故亦通大悲菩薩大智大悲所薰習故阿㒹底迦名為畢竟畢竟无𣵀槃性故此无性人亦得前二名也前二乆乆當會成佛後必不成文乃至者上法界眾生句惣摽五性今別句中舉无性不定顕餘三乗性故云乃至也大師䟽文次第闡提定性之文云云此無緣大悲等者私云顕他緣又𭇥經无緣乗之義也謂住𭜨親平等𮗚普利一切眾生故云无緣也異三界唯心義故知无緣他緣義他緣狡不唯心故故知此无緣乗即是法无我性者通二義惣結欤何者梵云等十二字是惣摽也所謂以下別釋別釈中二義各有結文故知此無緣下二句通二義惣結也問无緣他緣住心時專應立无緣乗名例如住心品名何不尒耶立名隨冝經既云無緣乗大師立他緣名顕无緣有他緣義欤故他緣乗下注云无緣起悲也又為顕大小差異專有自利利他不同欤故第六心云四量四攝齊他利行文始能𮗚察阿陁那等者抄云始謂𭤧始初始謂至第二刧𭤧始能𮗚前未能故又舉始攝末故名為始能文私云𭤧始與初始如次配二釋矣初義意第二刧𭤧始𮗚阿頼耶故後釈從深至淺舉初本識攝未七轉也又或准大師釈他緣覚心但示八心者第二刧中二心俱知八識中他緣乗在初故云尒也問初刧是六識分齊也何末那不云始𮗚乎或云𡧤然界所断法執是末那相應欤龍樹菩提心論等中六識唯人執相應故若尒末那属𡧤然界欤或又經論中唯無七識之文故故住心論第十云唯薀業二乗但知六識他緣覺心兩教但示八心一道極無但知九識釈大衍十識大日經王无量心識无量身等文言阿陁那深細者鈔云言阿陁那者執持義即第八識之別名唯識論云或名阿陁那執持種子及諸色根故文唯識論第三云解深密經亦作是阿陁那識甚深細一切種子如暴𣴑我扵凢愚不開演恐彼分別執為我以能執持諸法種子及能執受色根依處亦能執取結生相續故此識名阿陁那无性有情不能窮底故甚深趣𡧤種姓不能通逹故名甚細是一切法真實種子緣擊便生轉識波浪恒无間断猶如暴流凢即无性愚即趣𡧤恐彼扵此起分別執墮諸𢙣趣障生聖道故我世尊不為開演唯弟八識有如是相文問經云阿頼耶釈云阿陁那其義同耶鈔云言阿陁那者執持義即第八識之別名此通一切位也又名无垢識此名唯在如來地阿頼耶名過失重故㝡初捨故異𤎼識菩薩將得菩提時捨聲聞獨覺人无餘依𣵀槃時捨无垢識躰無有捨時今无緣乗心亦應𮗚此故住心品中云皆以无所住而住其心故亦令𮗚也取意私云阿陁那名通囙果二位頼耶稱𡱈囙位但異異𤎼名者頼耶𡱈七地以前不通八地已上故又唯識䟽及樞要有多釈中一者三位釈謂我愛執蔵位善𢙣業果位相續執持位頼耶名唯在初位異𤎼名通初二位有漏位也阿陁那名通第三位也取意由属𭔹治悉檀者鈔云䟽猶属𭔹治悉檀等者即四悉檀中尚属𭔹治非第一義也悉檀者此云義宗而有四種謂佛以四法各云義宗一世間悉檀二各各為人悉檀三𭔹治悉檀四第一義文私云第二刧即心𮗚是緣生中道故第一義攝也初刧即空𮗚是偏真故属𭔹治也為言問四悉檀義如何如鈔釈又天台釋云世界樂欲為人生善𭔹治破惑第一義入理文若失般若𭤧便等者鈔云謂前刧修𮗚行時心沒薀中以无性空門𮗚法无我若失般若無所得𭤧便即墮断文私云无所得𭤧便者第二刧中道𮗚也故釈云今大乗不可得空空相亦不可得文即无所得義也又鈔中釈𭤧廣道人云即清弁論師等也文若般若𭤧便者與即空𮗚者何失彼時云乱清弁空乎故知若失護法中道𭤧便者乱清弁心境俱空義各𢙣取空為言若不中道𮗚者不失彼時但空故望第二刧𮗚可云𢙣取空乎又此文以即空𮗚成属𭔹治悉檀之義若非失第一義𭤧便何為属𭔹治之囙乎又上文釋他緣心云亦當以種種𭤧便折伏攝受文此云般若𭤧便也後得大悲能所起雖異俱利他心故故知般若𭤧便者緣生中道也又義云般若𭤧便者𡧤然智分也所謂扵即空𮗚解有悲智𭤧便故上文釈𡧤然心云若失𭤧便多墮二乗地證小𣵀槃然以菩提心㔟力還能發起悲文是大悲𭤧便也今文般若𭤧便者大智𭤧便也故知即空𮗚解以菩提心㔟力具悲智故顕示不墮断則非𢙣趣空也又下文釈初刧𮗚解云畏墮断故不能𥁞理𮗚空文今又畏断般若𭤧便定知𡧤然智分也又唯識䟽釈論中道云謂非一向空如清弁非一向有如小乗故名中道文准此釈湛𡧤小乗同初時𡧤然即空同第二時般若第二刧中道深密也故知般若𭤧便第二刧中道𮗚也然今䟽意覚心不生同勝𩮺寳性故以般若不可同𡧤然欤又准香冩釈寳性論等為終教般若中𮗚等為始教初門今䟽同此欤无性空讓般若故此又違大師釈三論為性宗故又𭤧廣道人者鈔云龍樹斥云非佛法𭤧廣亦是邪人法也文又䟽家宗家意有宗空論如次他緣覚心淺深故二義任意取捨但若失𭤧便者上文云尒時心滯无為法相文𡧤然心望湛𡧤位作此釈欤故上文云行者湛𡧤心雖已明顕然涉事時根塵等當心者著无為法然以菩提心㔟力修離著𭤧便𮗚察无性空取意彼既望湛𡧤而𡧤然心云𭤧便此文可尒欤或文㔟不似彼不可同欤又下文相望不定故望中道即空云断何失𭤧廣道人者鈔云𭤧廣道人者即清弁論師等也唯識云清弁計若論世俗心境俱有若依勝義心境俱空失於中道名𢙣取空𭤧廣道人即同彼人也又摩訶止𮗚云𭤧廣道人自以明讀佛十喻自作義云不生不如幻如化空幻為躰龍樹斥云非佛法𭤧廣亦是邪人法也今同彼人故云𭤧廣等文三論玄嘉祥云二𭤧廣道人謂一切諸法如龜毛㝹角无罪福報應此人失世諦有𭓩然而空故空名有既失有亦失空如斯之人亦失二諦文智論䟽第一惠影云𭤧廣道人者此是𭤧廣部中所執道人故云𭤧廣道人此人雖学大乗而失大乗㫖執之大過執言一切法無間假實之生與法悉皆无如㝹角無文私云演密初釈違經䟽起𥁞欤經并宗家御意有宗為淺空宗為深為他緣覚心二重故天竺那羅壇寺戒賢智光二義分華嚴探玄記第一云三蔵云近代天竺那爛陁寺同時有二大德法師一名戒賢一名智光神解超倫聲高五印以所羕宗別立教不同謂戒賢遠羕勒无著近踵護法難陁依深密等經瑜伽等論立三種教謂初鹿薗小乗法雖生空然未法空真理故非了義即四阿𭇥等經第二時中雖依遍計所執自性諸法空然猶未依他圎成唯識道理故亦非了即諸部薩婆若等教第三時中𭤧就大乗正理具三性三無性等唯識二諦𭤧為了義即解深密經等第二智光論師遠羕文殊龍樹近稟提婆清弁依婆若等經中𮗚等論亦立三教謂佛初薗為諸小根小乗法明心境俱有第二時中為彼中根法相大乗明境空心有唯識道理以根猶劣未能令入平等真空故作是扵第三時為上根无為大乗弁心境俱空平等一味為真了義文私云立教淺深互有文理斯乃相成非相破也然今䟽并大師釈義頗順智光所判矣性相二宗淺深冝然之故今大乗不可得空相空相等者兩本義釈无初相字抄无二相字故義釈云不可得空空相亦不可得云云鈔云今大乗等者𭔹前三桒但空故云今大乗不可得空空亦不可得是名不可得空也文𨗴託云空相亦不可得者是明此他緣大乗所𮗚依他圎成之上圎空理也為遣所執實我實法而且諸法空義若遣所執我法畢後於依他圎成二性不可成空不空之定相也文阿字義第四實範云又云𭔹前三乗但空故云今大乗不可得空空亦不可得不可得空云云又云謂前刧中有通教菩薩具如上之今則不尒了法緣生故幻有知緣无性故真空此則自性不可得空故云與前𢙣性空意復有殊矣云云有人云今大乗不可得空相者此刧緣生中道也空相亦不可得者前𡧤然留无性空之故今遣彼云亦不可得也云云又義不可得空者依圎有也故下云然亦扵諸法无所空文空相亦不可得者遍計无也故下云雖𮗚諸法无所有文故湏離有離無道者上中道結成也或云初二句遣遍計能遣空猶无所得故云空相亦不可得也雖𮗚已下四句存依圎也亦與雖二字起𥁞可思之故唯識論第七云我法非有空識非無離有離無故中道文同䟽云謂心外所計我法非有真如理空及能緣真識非無我空即真理識即俗事中道者結前所言會中道也文又云是則中道者謂非一向空如清弁非一向有如小乗故名處中道謂二諦有不同清弁二取无不同小乗故處中道文私云二諦者依圎二性即前空圎成真諦識依圎俗諦也二取者能取所取即遍計所執也前我及法我法各有二取也定又三時教次第初時小乗云有教依圎有故第二時般若云空教明遍計空故第三時深密等云中道教三性有无雙弁故故知前二時未了但有但空故第三時顕了談明離有離无中道故故云故湏離有離无道𮗚法無我性也䟽文可讀文點今大乗不可得空空相亦不可得云云問唯識云我非有既通二我今何云法无我唯法我非人我乎又彼云空識非无依圎存有此何云𮗚薀阿頼耶而唯𡱈識乎人无我初刧顕故讓彼且舉法空顕人空也或法空如𭘧人空故故彼宗釈云然且法空必𭘧生空文次𮗚阿頼耶者舉識顕空理也又真如識實性故言識即顕也故下文云然阿頼耶有三種義文或法無我性即理故問今文清弁空義者䟽家意可云法相勝三論劣耶明宗義𭔃彼宗雖談之所存終別故依之𮗚薀阿頼耶等處即楞伽深密等云云引相宗經成義文覚自心本不生處如勝𩮺寳性等云云引性宗經論成理文可思之宗家依此判他緣覺心勝劣耳問若尒清弁立教如何小乗經中述心境俱有義深密等中明境空心有義般若等中成心境俱空義故般若勝深密劣也夫護法清弁互以雖是非非成鉾楯故法蔵釈云色即是空清弁義立空即是色護法義存此乃相成非相破也文然內冷然之聖人雖不鉾楯外迹應同之與法非無淺深性相分𡵨𫞐實殊途仍大師判二重勝劣分三乗差異耳有人云師云扵前清弁所立出難者彼所立二諦唯是教門云云故二諦教外有中道理故有无二諦教云偏有偏空有无教外有中故中亦偏非中破也而清弁所立有表不有並遣四句无表不无並遣何云偏有偏空乎護法門人且為弘一教付此過也祖師內證非鉾楯也云云護法聖智所證非有非无而有而無等者二諦假理故離情有無則聖智還有無也云云為欲淨除智障故者鈔云何智為障智有二種一證智二識智識智分別躰違相順相順故為智躰違故為障也智即是障名為智障入大乗論云出世間无明是智障世間无明賢聖已遠離故无明即是智之惑故是智之障故名智障也畧抄唯識論第十云所知障者謂執遍計所執實法薩迦耶見而為上首見疑无明愛恚𭞙等覆所知境無㒹倒性能障菩提名所知障文私云智障者二障中所知障二執中法執也隨順古昔諸菩薩等者經云如彼徃昔如是修行者文問今此行者真言行欤又顕行者欤如何顕行者也所以舉修行䡄則云𮗚薀阿頼耶出所依經證云即楞伽解深密明知顕乗行者也又䟽第三云明三刧六無畏眾多心相擬儀外跡顕修證深淺文此文又顕三刧六無畏是如常顕乗行而非密乗行也又住心論第六引今文畢法相大乗以此為宗此則所謂菩薩乗也文既云菩薩乗非顕三乗教耶依此等文定知顕乗行者耳又義真言行者也經品号既云入真言門住心品所以初刧叚云淨菩提心少分增明第二刧釈心主自在明即是淨菩提心第三刧中判世尊所以廣如上諸心相者為教真言門𮗚行者云云又住心論第一引今經云又問發趣菩提之時心所住處相相續次第幾種佛具之故經初品名曰住心今經顕真言行者住心次第顕密二教差別亦在此中文斯則顕示大日所住心次第真言行者修證續生也先師云古德二義住心論中淺畧深秘如次顕教密教二行也或云扵真言行有一心三密修行三密行者後深秘門也一心行是前淺畧門也此中又有顕密二行顕行者釈尊所三乗一乗等各住自乗不知心相續是也密行者大日所三刧十住心續生次第是也雖一心𮗚解專期秘密荘嚴心一生到彼寳處故異顕耳但至即楞伽等文并擬儀外迹文者自宗淺畧與如常顕教融不融雖異教行相順故云皆是擬儀外迹顕乗以明修證之深淺耳真言淺畧也大師又云今經住心次第顕密差別亦在此中云云故知淺畧又通密行也依之䟽第七云如餘經所求小乗人當修行作𮗚即便扵世間法教深生猒離求大乗人又扵聲聞法教深生怖畏此皆為未知秘密蔵者作此𭤧便耳就此經宗則五種三昧皆是開心實相門如行者初住有相瑜伽則是世間三昧但扵此中了知唯薀无我即是聲聞三昧若以十緣生句𮗚諸薀无性無生即是菩薩三昧餘如住心品中廣明不同餘教以心性之㫖未明故五乗殊轍不相融會也若更作深秘密釈者如三重荼羅中五位三昧皆是毘那秘密加持其與相應者皆可一生成佛何有淺深之殊文私云住心論淺略深秘專依此文起𥁞欤故淺畧中可有真言行也但六无畏能𭔃齊真言行有淺深次第與今深秘異欤若尒彼修證深淺者能𭔃齊三密行欤又住心論深秘中世間三心同第七卷深秘四箇大乗深秘同第三卷秘密云云淺深无淺深隨冝欤即楞伽深密等者問香冩釋中唯識法相宗所依出深密如來蔵緣起宗所依出楞伽經如何慈㤙唯識述記云所謂華嚴深密楞伽厚嚴云云八識三性三无性者私云解深密經中第一卷心意識品八識第二卷法相品明三性又无自性品明三无性又唯識論中先三能變八識次三性後明三无性經論符今次第矣彼論第九云即依此前所三性立彼後三種无性謂即相生勝義无性故佛密意一切法皆无自性非性全无乃至云何依此而立彼三謂依此初遍計所執立相无性由此躰相畢竟非有如空華故依次依他立生无性此如幻事託眾緣生无如妄執自然性故假无性非性全无依後圎成實立勝義无性謂即勝義由遠離前遍計所執我法性故假无性非性全无如大空雖遍眾色而是眾色无性所顕文問凢案三時教次第无性先明三性後如何義燈中有三釋其中判第二釈勝故三无性可後但至三時次第者華嚴中明三性㫖性既㝡第一也故云三性先无過問三无性既深密經顕了何唯識云佛密意耶或云扵三无性教有顕了隱密若顕相生勝義三无性是顕了即深密經是也故義林章云以顕了言三无性文若依三无性惣諸法无性亦名無性教是隱密也唯識密意者此意也故彼䟽云惣密意三種无性文何今但一義並不相違耳問楞伽經云八九種識文何今但云八識耶住心論引唯識章云或囙果合九楞伽第九頌云八九種識如水中諸波依无相論同性經中若取真如為第九者真俗合故今取淨位第八本識為第九染淨本識各別故文唯識䟽第一云楞伽經中識性或以第八染淨別開故言九識非是依他識躰有九亦非躰類別有九識文私云意一種第八識囙果染淨位分為八九非躰別有九也為言故章云或囙果合九䟽云或以第八染淨別開也依此等意䟽家楞伽八識云云宗家他緣覺心但示八心文問同性經无相論以真如為第九故无相論云能緣有三一果報識即阿梨耶二執識即末那三塵識即六識乃至境識俱泯即是空性其空性者阿摩羅識乃至唯阿末羅識是真如如大乗同性經言眾生神識无𨕙无色无相不可見无定處所識相清淨唯無明貪愛習氣業等客塵煩𢙉之所覆障𨐫如清淨空四塵所障文此文既云真如何云淨第八耶若取淨位第八別立餘七識亦可開染淨別故若尒識躰可成十六如何淨位第八別立是依荘嚴經也故彼經云如來无垢識乃至圎鏡智相應文既云圎鏡智相應定知第八識非真如也故又唯開第八非七轉也餘識非圎鏡相應故又楞伽經上文云依諸邪念法是故有識生八九種識文既云生有為識躰非真如也但至无相等者彼性宗所依論欤問若尒既云依諸邪念法邪念所起識唯有漏識何云无漏識乎依具二意八識邪念所起故云依彼也第九轉邪念得故云依例如起信論云依不覚故有始覺云云即是知三界唯心也者鈔云謂了知八識三性皆如幻等唯是自心故華嚴覺林菩薩云若人欲了知三世一切佛應𮗚法界性一切唯心造正與此同文私云唯識演秘中引此文然但有唯心文无三界言新華嚴第三十七明第六地云了逹三界依心有十二囙緣亦復然生死皆由心所作心若者生死𥁞云云又第五十四云菩薩知三界唯心三世唯心而了知其心无量无𨕙云云此文同今䟽文也問三界唯心意如何相宗釈云世親攝論第四无解无性第四廣解十地經名躰言唯心者心識是一唯言為遣所取境義由彼无故能取亦无不心所不相離故如若无心所心未曾轉三界唯心之言即顕三界唯識即與欲等愛結相應墮在三界即属三界貪等結此唯識言无有橫計所緣不遣真如所緣依他所緣謂道諦攝根本後得二智所緣等云云𪩡法師記云謂此三界皆存欲等愛結謂心所墮在三界與此愛結相應繫属三界貪等故言三界唯心或此言欲等者即以欲界等餘二界謂心所属此三界愛結也文私云惣意云有情起三界煩𢙉煩𢙉力故輪廽三界若不起三界惑業不可受三界苦故知三界唯心之所為也為言彼宗意以華嚴三界唯心文證捨留純識准此等文者今唯心人取事心所但阿頼耶者舉本攝末舉王包所故抄上釈云又舉始攝扵末故名為始能文問欲色界中而有色法心能變色故不離心可云唯心无色中既无色法何復云唯心耶唯識䟽云此不然也非但色无亦无貪等能取之心故亦无餘空等識所取義故三界唯心文義演云无色界中雖无色法有貪信等恐外人執離心外別有貪信等今為彼故三界唯心无色中離心王外无別貪信等以為能取心又无色界雖有空无為等然此等无為亦不離心外別有是識之所取恐計離心別有故三界唯心文私云依此解者今三界者五薀中取色行二薀欤貪信等行薀少分故又義云以二界五薀无色四薀㱕第八識云三界唯心欤此義隱劣顕勝識攝欤又義云唯心者真理頼耶實性故攝三界五薀有為俗事薀不无為故㱕无為真理故云三界唯心是即第四重攝末㱕本攝也故唯識章釈攝末㱕本云所理事真俗𮗚等皆此門攝文又義云遣三界五薀事相證无為理性故云三界唯心故䟽云心外更无一法文鈔云无即一心則是能遣緣為法乃目所無文又唯識章釈遣相證性識云識言所表具有理事事為相用遣而不取理為性躰應求作證文問若尒慈㤙以三界唯心經唯證第二重唯識何違彼乎隨義轉用故无失是以五教章云又如十地經云三界妄唯一心者攝論等始教釈為頼耶識等也十地論終教釈為第一義真心也文皆是雙弁有无者私云此有无有二意一云三性相𭔹弁有无有者依圓也无者遍計也故下文云然阿羅耶有三種義文一云但依他此依他有非有似有二義故云有无也故下釈云明薀阿頼耶別緣起義文准唯識論等後義為勝彼論第八依他八喻舉幻事陽炎等故問所引荘嚴論中幻事𨐫遍計豈不違彼乎荘嚴文如幻事以幻師所起義𨐫分別性妄心所起義也此即當情顕現情有義非𮗚心所𮗚理无謂也豈為知自性𮗚解耶依之唯識論中釈依他云如幻事等非有似有明遍計云如空華等性相都无第八文釈圎成云如大空雖遍眾色而是眾色无性所顕第九文三性𨐫喻異中幻事唯顕依他非有似有義也但荘嚴文幻事非有而有𨐫依他非有而有文取此證薀頼耶也故䟽云了知自性如幻㝡與此經符會文又義云今䟽意如幻即通三性𨐫喻也幻事非有而有或𨐫遍計情有理无故是事非處有等文或𨐫依他非有似有也當知妄分別有而非有文又以幻事有空不二義𨐫圎成故文云今以如幻等門照有空不二乃名真入法空悟唯識性文問前明緣生中道云離有離无何今云雙弁有无耶詮門離言中道義異故謂雙弁有無是表亦有亦無故詮門中道也離有離無者有無並亡故離言中道也餘教雙照雙非中道義自相當耳又此離言詮門各有三性合論三性別論也合論遍計是无依圓即有又依圓非无遍計非有故別論遍計情有理無如次有無又理无非有情有非无故依圓各二義通二種准知又此合論別論若離言若詮門皆實空有不二為宗故䟽下云照空有不二悟唯識性文明薀阿頼耶別緣起義者私云相宗明生有為頼耶是則蕳異性宗真妄和合二分不二頼耶彼事理通融具分識也此生一分緣起故云別緣起也故法蔵章下云若依始教於阿頼耶識但得一分生之義以扵真理未能融通但凝然不作諸法故就緣起生事建立頼耶從業等種弁躰而生異𤎼報識為諸法依𭤧便漸漸引向真理故熏等悉皆即空如解深密經云乃至若依終教扵此頼耶得理事通融二分義乃至不同前教業等生故文又法蔵探玄記第一云始教中廣法相少真性所立百法擇分明故无違諍所八識唯是生如瑜伽雜集乃至終教中少法相廣真理以會事從理故所立八識通如來蔵隨緣成立具生不生不乃至如寳性等論文私云始教者相宗即當他緣乗也此宗酬前業今生感得惣報果報果躰故云業種生也唯識第二云酬囙業力感第八識取意終教者性宗義當覚心乗也彼宗談真如緣起故立二分不二識也與前刧五喻等者鈔云謂前刧中有通教菩薩從无性門逹諸法即空此則躰法空今則不尒了法緣生故幻有知緣无性故真空此則自性不可得空故云與前无性空意復有殊矣文私云以雙照有无緣生中道異前无性空偏真耳正為室等者鈔上釈云言薀阿頼耶者薀謂諸薀阿頼耶此云巢室即薀之位處也文䟽第十六云蔵者梵云阿頼耶此為蔵或云宮室舎宅之義如世間舎宅一切眾生各隨己分安住其中既有此窟宅即有善𢙣𭇥蔵不能自出如來已離如是阿頼耶窟宅故云无蔵性也文金剛界儀䡄云心為阿頼耶善𢙣皆由心文私云此善𢙣者與今諸薀名異義同故知善𢙣種子云諸薀欤第八識集諸法種子起現行故云薀薀即聚集義也又薀是有為義薀不攝无為故无為无種故為顕諸法種子是有為故云薀欤此識與薀而為能所蔵能蔵識生相續所蔵諸薀生相續故云諸薀於中生也問䟽第一云一切薀阿頼耶業壽種子文此文非諸薀即種子欤如何薀阿頼耶者依主立名故薀即種子欤或復薀者三界五薀從頼耶緣起故云諸薀於中生也故上文云三界唯心也又唯識論第二云此即顕示初能變識所有自相攝持囙果為自相故文同䟽云自是惣囙果是別自相攝持囙果二相為自躰故文准此釈者頼耶三相中自相云蔵囙相果相云諸薀欤又囙果二相則五有能所蔵義故彼䟽云能持種種為所蔵此識是能蔵也是雜染法所熏所依染法為能蔵此識為所蔵文私云染種者有漏法皆名雜染非唯染法也即是囙相也此識者果相也故演秘云又能蔵所蔵皆通種現无別躰故文然阿頼耶有三種義者抄云即是遍計所執性依他起性圓成實性皆不離心故文有人云相宗有多師玄護法等義立凝然真如義或有真如緣起之義唐智覚禪師唯識論中緣起義為宗云云此義不尒其故智覚禪師者禪門人歟醫王眼觸途藥以深教意於唯識談真如緣起義何預彼宗義乎彼華嚴清凉大師釈云此唯識實性亦即是真如定言不變過㱕彼軰文此又為相宗義乎又法相撲揚釈云馬鳴菩薩亦言真如受薰持種恐譯者悞文此又為性宗義乎故知阿頼耶唯依他也然具三義者遍計扵依他上起故圓成又依他實性故以不離故云具三義也抄釈有其理也故唯識論第八云此中意三種自性皆不遠離心所法謂心所及所變現䟽云謂心所即自證分及所變現即相見分文眾緣生故如幻事等非有似有誑惑愚夫䟽云愚夫等不了謂為實有一切皆為依他起性愚夫於此橫執我法有无一異俱不俱等如空華等性相都无一切皆名遍計所執依他起上彼所妄執我法俱空所顕識等真性名圓成實䟽云此空所顕識及心所一切相分等真性名圓成實文是故此三不離心等文䟽云故此三性不離心所相分等文故應知三性俱真實者荘嚴論第四勒頌无善釈云次求真實義偈曰離二及迷依无无論三應及二淨二淨三𨐫顕釈曰離二及迷依无无論者此中應知三性俱是真實離二者乃至由自性无論不可故三應及二淨二淨三𨐫顕者三應謂初真實應知第二真實應断第三真實應淨二淨謂一者自性清淨由本來清淨故二者无垢清淨由離客塵故此二清淨由三種𨐫喻可得顕現謂空金水如此三𨐫一則俱𨐫自性清淨由空等非不自性清淨故二則俱𨐫无垢清淨由空等非不離客塵清淨故偈曰法界與世間未曾有少異眾生癡盛故著无而棄有釈曰法界與世間未曾有少異者非法界與世間而有少異何以故法性與諸法无差別故眾生癡盛故著无而棄有者由眾生愚癡熾盛於世間无法不應著而起著於如如有法不應捨而棄文私云今䟽所引未必如本文或取本三應及二淨等意或依釈初真實第二真實第三真實文明此句也已上二頌并釈是求真實法也三性俱真實者抄云此三俱是真實而有二義一者三性各別論真實二者三性无㝵論真實且初義者遍計性真實是分別故依他性真實是囙緣義故圓成性真實是真實故下䟽云如彼可得故通逹世諦實第二无㝵義者遍計依他皆以圓成而為躰故下䟽云如彼无躰故得入第一義又華嚴抄云情有即理无緣生即无性皆是真實也文私云各別真實者遍計情有依他似有圓成真有三性真實各別故云別論也𨐫云如彼可得故通逹世諦實文法云眾生癡盛故著无而棄有文𨐫舉依他遍計真實顕圓成真實故但云世諦實也或上文无㝵真實同故不別舉欤法文具顕欤眾生癡盛故著者能遍計妄心第六七識與癡惠相應執我法故云癡盛故著也故唯識論第八云有義第六第七心品執我法者是能遍計唯意識能遍計故意及意識名意識故計度分別能遍計故執我法者必是惠故二執必與无明俱故文著者通二執妄計著故无一字所執躰相无故云无妄心者彼成實有執故故著无者顕依他遍計真實也而棄有者有者真有圓成真實也妄心計著情有故棄捨圓成真有也又无㝵真實者遍計理无依他非有皆顕圓成故云圓成為躰也遍計依他空為門顕圓成故故章云空為門故入於真性文不同彼華嚴遍計理无依他无性即云圓成不變耳故𨐫云如彼无躰故得入第一義法判法界與世間未曾有少異法界者圓成世間者餘二性也以不離故云未曾有少異也故𨐫中不云无性即第一義也二性又㱕圓成真有論真實故云无㝵不同華嚴三性一際論相故清凉性相兩宗十別中立三性即離別也抄二義中初義順本文欤本頌云三應釈中應知應断應淨文既遍計應知无染分依他可断故情有與似有云真實也淨分依他是二淨攝故具如下弁也問法相華嚴三性即離為異若尒三論天台三性云何異耶大乗玄二諦義嘉祥云三性者依他分別真實分別性者即六塵為識所分別故言依他性者本識為種子所依故名依他真實性者二无我真如三无性者知塵无相故言分別无相性依他无生性者知本識无生故言无生性知无我理无性故真實无生性三論云无性法亦無他宗不遣三无性今論遣三无性故云云私云三論三性三无性義雖同相宗彼三无性為極此无性又遣故殊矣天台大乗止𮗚下南岳云惣明三性者謂出𮉐真如及佛淨德悉名真實性在障之真與染和合名阿梨耶識此即依他性六識七識妄惣分別悉名分別性文又云更有一義就依他性中即分別為三性一者淨分謂在染之真即名真實性二者不淨分謂染法習氣種子及相果報即是分別性二性和合无二即是依他性也文私云初釈真實性出𮉐依他分別在𮉐然真如躰是一也後釋於在𮉐依他染淨分真實分別二性也二義雖異三性一際二義雙融義全同華嚴故華嚴五教章中云又云阿毘逹磨修多羅中世尊法有三種一染汙分二清淨分三染汙清淨分依何義此三分於他性中分別性為染汙分真實性為清淨分依他性為染汙清淨分依此義故三分釈曰阿毘逹磨修多羅中分別性以煩𢙉為性真實性以清淨品為性依他性由具兩分以二性為性故法有三種此上論文又真該妄相无不攝妄徹真源躰无不𡧤真妄交徹二分雙融无㝵全攝思之可見文故知彼三論雖遣三无性唯情義未及表德圎融矣由能所畢竟无故者私云依此釈者頌離二者能取所取云二畢竟无釋離欤又二者依他相見二分此二分是自躰分所變不即不離不一不異如鏡上能照所照用不離鏡而愚夫依妄熏習力執心離境執境離心斯則迷依他內境相分彼上起所取遍計所執迷依他內心見分彼上起能取遍計所執此能取所取即當情現躰用都无物也此二取離依他相見計故云離二也又依他相見不即不離也然遍計二執偏離故云離二也又二者我法也此我法二種離內境故云離二也問𨐫中云二迷顕現何明都无義耶是法𨐫影畧互顕三性真實別融二義也又法中遍計舉无㝵真實依他舉各別真實互顕也為言問實相𭔹法三性俱真實𭔹何耶故五重唯識中遣存實識文非遍計遣依圓存實耶相𭔹非一義門隨冝依圓真實如令尋也二智境故遍計情實云真實遍計一性通實二義故𭔹理无情有云實也无㝵論真實唯圓成故非難欤迷依者鈔云謂依他性與迷分別為所依故故名迷依由此能起諸分別故文私云迷分別者遍計所執性也依依他而起遍計故无無論者唯識論第二云謂空无我所顕真如有无俱非心言路絁與一切法非一異等是法真理故名法性文私云此文真理云心言路絁今又圓成真理言語道絁故云無心行亦𡧤故云无論也故慈㤙理趣分䟽中釋經謂貪欲性无論等文云超過尋思言議故云无論取意今絁尋思故云无論也問論既通心言者何別云无乎次下句三應及二淨文二淨者圓成二門真如及无漏心真理故云无嘆菩提故云无論也二淨者自性淨无垢淨故謂真實性真實者准下彼事无躰故得入第一義之文今此真實性局真理欤二性云彼事圓成云第一義故又彼論法頌云法界與世間未曾有少異文釈論云法性與諸法无差別故文法界法性是真如異名故又准下如是轉依故即得真實義之釈者通理智欤轉依言理智故又舉依他云妄分別唯染分依他故淨分依他攝圓成欤已上二義中初義常无常門圓成後義漏无漏門圓成也故唯識樞要上云三性有二諦一常无常門常為圓成唯真如是一切有為皆依他起二有漏无漏門一切无漏皆圓成實諸有漏法皆依他起菩提𣵀槃並圓成故文又唯識論第八云有漏心等定属依他无漏心等容二性攝眾緣生故攝属依他无㒹倒故圓成實攝文二義中後義為勝欤彼論中无无論下有二句云三應及二淨二淨三𨐫顕文釋論云三應謂初真實應知第二真實應断第三真實應淨二淨謂一者自性清淨由本來清淨故二者无垢清淨由離客塵故文既依他云應断圓成云應淨淨分依他攝圓成也二淨如次理智二法自性淨无垢淨義可然故但法界與世間者法界唯理世間但有漏故舉唯圓唯依法而顕通二性无漏心欤又彼論釈如云有法世間云无法依此文舉唯圓唯遍而顕通二性有為心欤次求真實𨐫喻者問今此𨐫至何文耶𮗚義云正𨐫二種迷乃至通逹世諦實二行八句頌也通彼事无躰故乃至可得亦如是諸頌也或初二頌惣後諸頌別也問何應知所治躰等頌非𨐫耶彼通妨故且正釈論之也又彼頌等更有法故又義云諸頌皆求真實𨐫喻也通妨依正釈𨐫喻起故攝彼也云云私云本論中法中有二行頌𨐫中又有二行如次配顕矣文言无偏頗法𨐫齊等耳彼事无躰故等更設𨐫合雙轉釈前法𨐫餘義欤若尒何偏属𨐫耶如幻師依咒術力等者本論中有𨐫家也今此文釈上頌中又如下釈下二句倒因已上釈上二句各有開𨐫合𨐫二叚文各如是下釈合𨐫已上釈開𨐫也又本頌中前二句前迷依𨐫下二句前離二喻也各上開𨐫下合𨐫也變木石等者𮗚抄云幻師幻事如次依他遍計文顕以木石可𨐫圓成也所以法三性具舉𨐫頌无圓成釈中舉木性喻圓成也云云或云俊以幻師咒術力喻能變計依他即第六七識也木石者即所變計依他下云木石是也即實木石也此木石等為因變金等相喻所執也今木石為所執二迷之因故云迷因也所以頌中幻師𨐫依他是能變計依他也下木等實境𨐫圓成是取木等四躰故云實境也此義雖順頌文違變木石之文今木石舉所變法何為能變因矣若能變者應云木石變乎道範云依咒術因緣力故於草木等上假施設顕現似金銀等物是依他也實草木等是圓成圓成諸有為法之性真實自性故又解云實草木喻依圓二性若細合喻者以草木等惣相喻依他是草木等所有色香味觸四性喻圓成也云云私云變木石等者釈頌中起幻二字也准唯識䟽等釈幻事喻於此幻事有二一者假事幻謂依咒術力因緣所變現之木石等也喻之依他似有他二者實事幻謂於假事幻愚夫不見因緣而見實木石等也喻之遍計也故知今木石等者等金木也是依他也所以依咒術所變假木石等上起情實木石等故云變木石等以為迷因也迷是實事幻即遍計也但合𨐫中依他性者類上木石種種分別者所執也意云謂作依他起所執之倒因如假木石之為實木石之因也為言又義起種種分別合變木石等種分別即依他也妄分別故為㒹倒因合以為迷因文句相𭔹分明故如是分別等句合𨐫摽句也此義為勝云云次下幻像金等者等取木石等也是實事幻遍計也理實言之木石像金皆通假實故喻依遍二性也問頌見幻師𨐫依他幻事喻遍計何但幻事分二種耶釈中以幻師咒術為變木石之因緣是當依他眾緣但頌文為取所起幻事舉能起緣而顕假事幻也次諸幻事者取實事幻𨐫遍計也或本云如彼真幻事云云䟽主為顕實事幻真諸欤若幻事唯𨐫遍計非依他者依今論唯識論既幻事𨐫依他非能所相違乎故知今䟽下彼論明𮗚薀阿頼耶了知自性如幻之釈與唯識論意同矣不可異求耳問於幻事分假實依慿安在乎樞要下云中𨕙論八喻通依他所執二性假喻依他實喻所執文是其證也演秘第七云中𨕙㨿彼幻事躰及能執心所執木等通喻二性文此釈未必分別假實欤或云今木石云圓成非理圓成非迷因故故唯識論云攝大乗是依他起遍計心等所緣緣故真非妄執所緣境故文義初義同𮗚後義以今草木為能變因而喻依他故又違下木等實境喻真實性義矣當知真草木圓成假草木依他實草木遍計也故彼論下文云色識為迷因識識為迷躰釈曰彼迷境名色識彼能迷名識識文此文既云依他色心境為迷因何為迷因木石云圓成乎非色識者妄分別能遍計心欤此𨐫依他分別二相者古德云以依他分別如次𨐫上幻者及幻事也今謂不尒二相俱𨐫幻事有假實故但摽幻者是為取幻事也意幻者之幻事為言中川上人點本幻者幻事云云况今顕二相无躰幻師既无彼義何取彼乎又多本中皆无幻者二字䟽主為顕幻事通二性省幻者二字欤或云是依了知所執理无與依他假有而无性義故悟入圓成也上所云求真實者求入圓成也云云私云遍計理无依他非有云无實躰也依他似有世諦𨕙故又求真實義何必𡱈圓成乎若尒違如彼可得故通逹世諦實文故所以應知應断應淨求三性真實義故又如幻者幻事躰亦不可得者鈔云此中剩箇不字應云如幻者幻事躰亦可得文私云不字悞欤本頌云如彼可得故故又本論亦无不字矣此𨐫妄分別者此妄分別者唯依他性也上文云分別依他性故又唯識論第八云妄分別是依他起又云謂能遍計妄分別文又第七引中𨕙云妄分別有於此二都無文釈云此頌且依染依他文當知唯名依他也遍計唯云分別不云妄故問世諦實應知應断義異何唯舉依他乎舉依他顕遍計欤或勝唯舉依他欤或二諦影畧互顕欤或又妄與分別為二性欤凢此一頌圓性真諦依遍俗諦故三性各別真實義欤彼事无躰故等者𮗚義云此頌轉釋上如彼无躰等頌意也又云上頌明幻師幻事无躰此文限幻事无躰未必轉釈上文欤云云私云此文但釈上幻事非幻師云彼事故又云彼幻事无躰故彼事者上幻事即依他如上文云此𨐫妄分別也或通依遍如上文云依他分別亦无實躰也問合中彼二迷无躰文何唯云依他耶𨐫合互顕欤又依後義合𨐫文舉迷顕假欤已轉位染分依他亦可断故若不尒違次下文中明依他非有而有等故或二迷者二性欤真實境者釈中云木等實境是𨐫圓成也所以得假依實遍幻事木等无躰故即得真實木等躰也為言故合𨐫云得轉依時即得真實性義也文當知上叚中明依他遍計有義成三性別論真實義今文中明遍計影依他无義弁三性无㝵真實義也前文第一義即圓成也今文轉依是圓成也即通理智故樞要云二有漏无漏門一切无漏皆圓成實諸有義法皆依他故菩提𣵀槃並圓成故文又彼事无躰故等頌次下本論中更有一頌并釈故論云迷囙无躰故无迷自在行倒因无躰故无倒自在轉釈曰迷因无躰故无迷自在行者世間木石等雖復无躰而為迷因若得无迷行則自在不依扵他倒因无躰故无倒自在轉者如是依未轉時雖復无躰而為倒因若得轉時由无倒故聖人得自在依自在行文私云依未轉時雖復无躰等者未轉位雖依他法具无性義二障未断故為妄心所緣境故云為倒因也已轉依位二障断故能遍計妄心𥁞故見道已上聖人離二種相自在行也為言是事彼處有等者有人云是事者幻事也即遍計依他无躰无性義也彼處者依他起處也有者前二迷也云云私云此文幻事顕有而非有義何唯云無躰无性義耶或云此文唯明遍計有無義也故釈云有謂幻像事彼處顕現故等文上文中以幻像事𨐫分別性故今謂不尒此二行頌明幻事非有而有等義顕依他非有似有也故合文此幻即𨐫諸薀是故當知妄分別有而非有文復次妄分別非有而有文既云諸薀三界五薀也又有而非有非有而有俱云妄分別能遍計依他也故唯識䟽云妄分別有即有三界妄心也即能分別分別境故起執故文故知妄分別言唯在依他非遍計故二頌同明依他也但有而非有非有而有於一法二義為顕兩義无偏頗作順逆釈例如不生而生而不生矣又義云上一頌明遍計情有理无義故云有而非有也有而言未必似有欤又案頌次第是事者上二迷彼事故正是遍計也後頌明依他非有似有故云非有而有故結後頌云此幻即𨐫諸薀也是故已下文更述兩頌意也又上是事言正變計依他欤此幻事有假實故彼處文可通依圓欤又妄分別言所執又彼所起故云尒欤二義中前義順文欤非有而有等而字起𥁞是顕即无而有義故即似有假有義也或人云唯識等中或云假有實無或云非有似有意少異假有者依他當躰假義也實無者守千師意云遍計情有也是執空義也徵法師意假躰云實无也躰空意也又非有者非圓成真有故云非有似有者似遍計情有故云似有也如是有躰與无躰無二者此文釈頌第三句也彼論正文𤗊後二句明此釈故由此下釈第四句也但後頌第三句无躰無二是不二義分明今頌不二義難得然文點可讀有躰與无而有也意云有躰與无躰不二而有也為言此幻即𨐫諸薀者問本論文此幻即𨐫諸薀是故當知十字无之何䟽加之耶本論中此間有兩頌今䟽妄分別以下文畧頌引釈故論云偈曰有二種光而无二光躰是故色等有躰即无躰釈曰有二種光而光無二躰者此顕妄分別有而非有何以故有者彼二光顕現故非有者彼實躰不可得故是故色等有躰即无躰者由此義故色等有躰即是无躰偈曰无躰非无躰非無躰即躰是故色等无躰無二釈曰无躰非无躰非無躰即躰者此顕妄分別非有而有何以故非有者彼二光无躰由无實躰故而有者彼二光非无躰由光顕現故色等无躰無二者由此義故故色等无躰與躰而无有二文私云此二行頌雖二光有而非有非有而有義未云𨐫上幻事二義故䟽家取意以二光二義𨐫上幻事二義也為言故加此句耳或云上二行頌明遍計有無義下二行頌明依他有無二義也此幻即𨐫諸薀者上幻事𨐫遍計故此幻事又𨐫依他也為言有人云上下𨐫合但顕遍計所執也所執諸薀非依他五薀云云私云上二頌唯𨐫无遍計合何爯云合依他耶又遍計諸薀者依慿安在乎頌并釈中云色等舉色薀非等取餘四薀乎此非依他五薀耶又上釈薀阿頼耶云謂諸薀於中生文豈云遍計乎故知上下𨐫合但顕依他性也况復所引論文偏為證𮗚薀阿頼耶知自性如幻等也前後諸文顕遍計則引證成無用欤䟽中加此幻即𨐫諸薀句良有以也故引彼論畢釋云彼論明𮗚察薀阿頼耶了知自性如幻㝡與此符會故具出之文既彼論文云頼耶自性了如幻非依他喻幻事定知諸薀云遍計悞甚也問於妄分別釈而有義云彼二影顕現文非所執二迷顕現義耶又釈非有義云彼二都無實躰文非遍計躰用都無義耶故知所執情有理无釈有而非有等義見如何妄分別唯依他先成畢然於彼釈有無二義是遍計乎故知二影者依他相見二分故无性攝論云但法生時緣起力大即一躰上有二影生更互相望不即不離諸心心所由緣起力其性法尒如是而生文太鈔云更互相望不即不離者一識躰上有見相二分生即見相分別故不即無離自躰分別見相分故名不離文此釋分明欤又荘嚴論正文云有者彼二光顕現故文次彼二都無實躰者依他无性義云尒也故上文云依他分別二相亦无實躰文故无過又彼論今正文云有者彼二光顕現故文又下求染汙及清淨頌云自界及二光癡共諸惑起如是諸分別二實應遠離又釋云界謂自阿梨耶識種子二光能取光所取光此等分別界共无明及諸餘惑故得生起二實謂所取實及能取實如是實染汙應求遠離文此釈既二光云能取實所取實似云分別性乎又依他見相二分云能取所取欤本文云光今所引改云影處文如此唯識依他八喻中光影為一喻顕色十二光與影別也今以影光其義是一欤能建立誹謗等者鈔云䟽能建立等者由此有而非有非有而有有無不二故能彼二及小乗故言建立者應言建立不建立前外計處云建立淨不建立无淨計建立者建立一切依此修行謂之為淨不建立者謂此建立非究竟法若无建立所謂无為乃名真我謂一向都撥為无即名誹謗故言能等文有人云此釈頗穿𮢶欤龍樹釈云建立有誹謗無云云可用通相義也私云抄意建立計云建立不建立計云誹謗既以不二二乗有无可外道何云穿𮢶乎彼論正文云問躰與无躰何不一向定而令彼二无差別耶偈曰有𨕙為立无𨕙為謗退大趣小彼亦如是釈曰如其次第一為有𨕙二為无𨕙三為趣小乗𡧤是故不得一向定問云何有𨕙有𨕙為立此明由於无躰知無躰故不應安立有問云何无𨕙无𨕙為謗此明由於有躰知世諦故不應非謗無問云何趣小乗𡧤退大趣小彼亦如是此明由彼二无別故不應猒躰入小𣵀槃文私云遍計依他無躰故入第一義謂之无躰外道有又依遍可得故逹世諦實謂之有躰外道无有無不二二諦是一故二乗猒生死有入𣵀槃空也又云彼二无別者非有非无中道故外道𨕙空也幻像及取幻等者彼論中此偈前有一偈并釈故論云偈曰色識為迷因識識為迷躰色識因无故識識躰亦无釈曰彼所迷境名色識彼能迷躰名非色識色識無故非色識亦无何以故由因無故彼果亦无文私云此文法欤幻像者所取境𨐫色識為迷因也色心諸法皆為所迷境故取幻者能取心即𨐫識識為迷躰欤心所是能迷心故此心境即相見二分於中染淨不同染分相見𨐫幻像相分取幻見分淨分相見為骨像取骨如次又相見也也染所治即可断依他也淨能治即不断依他也能取所取者如次染依他見相二分也能𮗚所𮗚者淨依他相見二分也此染淨能所治依他俱具非有似有二義故云彼二雖无而二可得也又義云幻像取幻是所執能取所取也骨像取骨即𮗚心相見二分也兩處彼二雖无而二可得者所執情有理无義𮗚心非有似有義也文同義異矣又義云迷人者愚夫也幻像取幻者所遍計境即依他相見也迷故者能遍計妄心染分依他也能取所取二事者遍計所執也彼二等者彼二者前依他二分也而二者今遍計二取也意云彼依他相見雖无遍計二取由迷彼二分而此二取可得也為言故云由迷顕現故也𮗚門二事如先但彼二雖无等者𮗚心前无所執二取故云彼二雖无非无𮗚心相見故云而二可得也已上三義中初義能治无漏心也淨分依他故故下文云如是清淨法能令染法𥁞文所治是可断法也染分依他故断能迷心所執隨之故依他中所遍計通染淨今取能遍計染心為所断也次義能治是有漏心故云能治躰念處等四念處等𮗚是應有漏故或通无漏欤唯識中云四地修得菩提分法故又今文既云清淨法故或又此文不違前地上位通有漏心故又釈論宗中有漏信進等六清淨法故後義可通漏无漏欤問无漏心𭘧所執二取耶護法正義无漏心不𭘧所執也但安惠意无漏心𭘧執也正後智有異依本宗可矣今文既云菩薩雖修行而无所得也順護法義矣問何所治中云幻像等能治中云骨像等耶幻像有假實故若所執者是實幻像故若染依他者假幻事故骨像是四念處等能治𮗚門不淨𮗚所緣境故問若尒何下文能治又云強幻王乎𮗚心又若有漏若无漏皆依他如幻躰故但本論正文云釈幻像及取幻等一行頌畢又有問更舉頌作釈也文云問此𨐫欲何所顕頌曰骨像及取骨等云云此意骨像等頌為法乎私案為顕前頌迷因无躰雖舉此喻顕能𮗚所𮗚欤如是𮗚已等者𮗚義云自離二及迷依乃至可得亦如是文云如是𮗚已也謂𮗚薀阿頼耶相與此論符會故私云骨像及取幻等一行頌也既云𮗚故亦二故但引離二及迷依等文證𮗚薀阿頼耶者已前文為證頼耶三義𮗚義今文是也故无違耳何法為所治下義釈及本論有何法為能治五字也迷法相者等者論正文云法迷相法迷相者云云迷法相者或唯所執也或唯能迷心也或通二也謂如是如是躰故者有躰无躰二義故云如是如是欤有非有又尒也或躰无躰與有非有云如是如是欤或能取所取云尒欤或相見二分欤或依遍欤然如乃至分別故者釈頌中如是躰及有也亦乃至无別故者釈无躰并非有也前順躰標有釈也後逆非有摽无躰釈也如是下釈如幻二字欤謂諸佛所念處等者私云舉四念處等取八解八勝處等无量法門也何以故下釈成能所治二義如諸凢夫等者明所執情有義即所治也如諸佛等者迷所執理无義即能治也依此文則前所治幻像取幻所執能取所取欤又下文云如是清淨法能令染法𥁞者似染分依他欤彼宗明匠可尋矣𮗚抄義云此文徵釈能治有无也謂凢夫於念處教法等作有解諸佛於所住空也云云私云有无俱為能治非理案如是躰无相等問起但以无躰為能治也若通有躰何致示現入胎等有相之難矣况云如諸佛所未必取佛四念處𮗚是有漏心故凢夫能治𮗚亦属下文故知上凢夫所取者所治迷相也又准以佛示現八相致難者可通无漏心也如上弁就中依他如幻後得智境未起正後二智已前皆遍計分別攝欤若尒凢夫位猶迷如幻道理欤如是如是躰故者有能𮗚所𮗚二事故云如是如是欤如凢夫所取等者舉所治迷法成今能治𮗚欤問如是躰无相者躰无躰二義欤躰即无相之義欤今此一句頌若合前生佛二文者順初若唯合佛无躰者會後義矣舉凢天所取者為顕佛且示所治欤而佛世尊示現等者或云此文通伏難也問意云如諸佛所如是如是无躰无相何諸佛示現八相耶意云然諸佛現八相是離所執相後得智中現身立等故云如是无相而影顕現也故唯識論第八云雖似所取能取相現而非一切能遍計攝勿无漏心亦有執故如來後得應有執故經佛智現身立等種影像如鏡等故文又義云如是躰无相乃至成等正覺者問也如是无相等二句也問中初一句𤗊正釈意而佛下正致難也前解意如是躰无相者結成上意也由此義故菩薩雖修行而无所得也者䟽家私釈成頌意也或以釈論意釈成頌也彼論云釈曰𨐫如強幻王令餘幻王退者彼能治淨法亦如幻王由能𭔹治染法得增上故彼所治染法亦如幻王由於境界得增上故如是清淨法能令染法𥁞者如彼強力幻王能令餘幻王退菩薩亦尒知法如幻能以淨法𭔹治染法是故无𭞙文此文既云知所治能治俱如幻事无𭞙故云雖修行而无所得欤彼論明𮗚察薀阿頼耶等者問荘嚴論中雖明三性真實未云𮗚頼耶又雖幻事𨐫分別性未類頼耶自性何彼論所明如此耶三性即頼耶三義故引三性文證𮗚頼耶之義也况復彼論下求染汙及清淨云偈曰自界及二光癡共諸惑起如是諸分別二實應遠離釈曰自界謂自阿頼耶識種子二光能取光所取光此等分別界共无明及諸餘惑故得生起二實謂所取實及能取實如是實染汙應求遠離文此文既云自界謂阿頼耶識種子豈非𮗚薀阿頼耶義耶又雖所執喻幻事又非幻事不𨐫頼耶非有似有故上文云此幻即𨐫諸薀文幻事𨐫薀頼耶之義也又彼論求真實文終以幻夢等八喻類依他諸法何唯云𨐫遍計耶此中八喻如唯識八喻但所喻行相異也故論云如幻至如化次第𨐫諸行者幻𨐫內六入无有我等躰但光顕現故夢𨐫外六入所受用塵躰无有故𦦨𨐫心及心數法二法由起迷故像復𨐫內六入由是宿業像故影復𨐫外六入由是內入影內入增上起故響𨐫所法法如響故水月𨐫依定法定則如水法則如月由彼證靜法顕現故化𨐫菩薩故意受生不染一切所作事故文唯識論中八喻皆𨐫心心所眾緣生非有似有義况復彼唯識以荘嚴論為所依然唯識中以幻事𨐫依他所依論中无彼義䀄非能所相違乎此等義云此經符會欤當知陽炎等者六喻中引荘嚴文成頼耶如幻義畢餘五喻又荘嚴八喻中隨應引證又引餘經論釈旋火輪乾闥婆城等如幻事應廣也為言前劫五喻等者私云五喻六喻相望而明初二劫𮗚解有勝劣也此三事猶𭘧拆法者有人云世人見芭蕉泡沫時實謂有躰智人拆之令見之時知无躰故云折法空陽炎等世人見時不拆即知无躰故喻躰法空也云云私云三喻又顕躰法空也云𭘧拆法明无性空故𭘧拆法者聲聞經中𨐫人无我意欤故第三釈云謂𮗚唯薀无我時於隂界入種種分拆推求我不可得文又上文云聲聞經中雖此五喻而意明无我今此中五喻意明諸薀性空文既五喻明性空知𨐫躰空也故鈔𡧤然界云通教躰法空也故知今意三喻是𭘧拆空之躰空故不同幻炎等唯躰空故今不取也為言問若尒何第三劫十喻中取泡喻耶彼一水生眾泡𨐫行者自心能作法界荼羅不思議變化也非取拆空躰空𨕙故經云如天降雨生泡彼真言悉地種變化當知亦尒文又䟽云聲聞經以受𨐫浮泡般若中以泡為喻雖无實性而囙緣猶是實法故十喻中有如化而不明泡喻今此經𨐫意復殊也文所喻既殊何為難矣言即是麁相轉融者有多意實悟房義云第二劫𮗚解待第三劫云麁相望初劫云轉融也謂即心幻不及不思識幻故云麁勝即空幻故云融也為言文點云麁相乃轉融也又上佛房義云初二劫𮗚解雙結意麁相與轉融也故轉融中道位不論即空麁相喻也為言或云初劫即空麁相轉融第二劫云中道𮗚也點云麁相扵轉融也私云轉有轉捨轉得二義謂初劫五喻中拆法三喻轉捨躰法幻炎二喻轉融故云尒也未了如是自性時乃至見空未𥁞者𮗚抄云舉初劫未𥁞空有𮗚成第二劫𥁞理中道𮗚也問初劫但即空𮗚未見𮗚有畏有所得𮗚空畏墮断耶凢佛法𮗚空智惠因緣外無見空所以見緣生𮗚性空謂之即空𮗚故初劫无性空釈五薀皆云緣生无性仍為断常見𮗚空且名離断常中道欤云云私云於他緣乗中相似實證待𭔹明勝劣也加行位頌云現前立少物謂是唯識性以有所得故非實住唯識文論釈云𤏙等四法依四尋思四如實智初後位立四尋思者尋思名義自性𭅒別假有實无如實遍知此四離識及識非有名如實智此四位中猶於現前安立少物謂是唯識真勝義性以彼空有二相未除𭘧相𮗚心有所得故非實安住真唯識理彼相已𭤧實安住文立少物謂是唯識未𥁞之義也又成假有實无之𮗚是有空𮗚門也此𮗚未住真勝義性云未了自性等也然見道以上二智𮗚門是實證故二空相不當心而悟入識相識性唯識也故見道位頌云尒時住唯識離二取相故文論釈云尒時乃名實住下識真勝義性即證真如文故上文云行者解諸薀唯心即是知法自性又下云今以如幻等門乃至悟唯識性故即此意矣重意云今經𮗚薀阿頼耶知自性者即見道以上實住唯識之義也為言問既云今以如幻等非𭔹初劫𮗚解耶例如今大乗不可得空等也又云人法二空相亦不當心非初劫耶今字隨冝何必同矣於一劫中初後相望何失又唯識𮗚雖待加行𮗚初劫二空无過加行𮗚未離彼相故故釈云𭘧相𮗚心有所得故非實安住真唯識理彼相已𭤧實安住文今二空之相亦不當心者彼相已𭤧證安住意也况初劫二空𮗚門非有𮗚何云不能𥁞理𮗚有矣若望今心而成恐断之義上文即空𮗚属断矣若與初劫言之誰云非𥁞理𮗚乎故知非初劫𮗚門也又義人空𮗚是𮗚依圎有人我自亡故可云有𮗚欤然未知五隂法本來𣵀槃故非𥁞理也又𮗚薀即空時断法倒故云空然未空相不可得故非𥁞理也非𥁞理者以第二劫中道𮗚降初劫𮗚之意也今以如幻等門照有空不二等者唯識宗立三時教初時有教依圓有小乗第二時空教明遍計空般若是偏有偏空而終有空離別矣第三時中道教深密等三性有空雙弁故亦有亦空則詮門中道也又遍計非有依圓非空故離有離无則離言中道也詮門離言俱非偏有偏空故云空有不二欤故唯識論第七云我法非有空識非无離有離無故中道文私云此中空識者空圓成識依他具如前弁也又依三劫次第者初劫中湛𡧤明有𡧤然空是偏有偏空也第二劫緣生中道故云不二也又義云有空𮗚門一念同時故云空有不二欤唯識章云由无始來執我法為有撥事理為空故此𮗚中遣者空𮗚𭔹破有執存者有𮗚𭔹遣空執今𮗚空有而遣有空真興記云依所治病有空能治藥可有空有若所治病无增者應能治藥亦无遣存為言以彼空有相待𮗚成純有純空誰之空有記云意云若所治病純有純空无有空相並者能治之𮗚但有偏空之𮗚為誰相並有空有之𮗚乎為言故欲證入離言法性可湏依此𭤧便而入記云意云若欲引起无分別智證得真見離言真如要先資糧及加行位可修如此遣存實𮗚為言非謂有空皆即定證真𮗚位非有非空法无分別性離言故記云所𮗚之法非躰定是有是无諸法躰性言語道断詮言不及有无分別皆断故但是世俗妄施設何以知者證真實位一切諸法非有非空離諸分別離言故若諸法躰有无定者无分別智應非證實為言要𮗚空𭤧證真謂要𮗚彼遍計所執空為門故入於真性真躰非空文記云是通伏難也般若等云𮗚空入真者由能顕空以為門故入於真性非真躰空如廣百論云聖智所證非有非无而有而无即其意也文私云證真𮗚位非有非空者即當空有不二義以幻事非有似有類空有不二欤章謂要𮗚彼遍計所執者同䟽人法二空之相亦不當心也以章空為門故入於真性釈䟽真入法空悟唯識性也字義第四實範云私案䟽言今以如幻等門昭有空不二而人法二空之相亦不當心乃名真入法空悟唯識性者有空不二者幻有空謂真空而此有空相性是異故不一相性不離故不異且不離云不二也故上文云唯識无境躰法難解之空即是麁相轉融唯識无境者幻有難解之空者真空轉融者明不二然𭘧不一故云麁相人法二空者人法謂初二性二空謂真實性三性妄假真實有空諸相皆不當於心也故下文結此第二劫云然上來原始要終自發一毫之善以至於超度人法有无二障云云真入等者入真空故證勝義性證勝義故了世俗性故云悟唯識性也云云御本記云先年比以高野山傳法會談義之次草之畢文𣱵十年春比理性院上野公令清書畢同九月中旬拭老眼加點畢披覧人必可令訪菩提給耳金剛佛子頼瑜生年四十八
