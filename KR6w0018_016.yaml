body:
  text: 疏卷第三之二經謂如幻陽等者智度論第六譬喻義品云解了諸法如幻如𦦨如水中月如空如響如揵闥婆城如夢如影如鏡中像如化是十喻為解空法故文智論疏第二影云名喻雖十相𭔹即五如幻𦦨者內外相𭔹也水月空有無相𭔹如響如城見聞相𭔹如夢如影𥨊覺相𭔹如像如化合散相𭔹文又大品弟一序品十喻文同譬喻品文私云此十喻與今經十喻大同少異經影喻當論鏡像以浮泡同如化以影喻火輪餘七全同故云大同少異也嘉祥二諦章下云什師云十喻以悟空空必待此喻文又不空千手儀䡄舉十度印言中明智度印言功能云斷二種證得一切法如幻如陽炎如夢如影像如谷響如光影如水月如變化如因𨹔羅如空不久滿足十地住法雲地為大法師文私云此中十喻九喻全同論帝一種當經中乾城歟又金薩埵儀䡄有九喻幻陽㷔夢影像聲響光影水月變化空法華儀䡄有八喻幻陽炎夢影像響光影水月佛變化略出經有七喻八炎幻化揵闥婆城空中響旋火輪夢妄別本次第異之而幻為初金剛界儀䡄有五喻幻㷔乾闥婆城旋火輪空谷響也又唯識中有八喻已上經論異多少隨冝歟云何為幻者抄云幻者化也無而忽有之謂也先無形質假因緣有名為幻化又幻者詐惑以不實事惑人眼目故曰幻也文疏雖於衆緣中乃至生處者釋經中何以故本性淨故文歟故合中雖一一緣中乃至不異淨心文初釋中闕此釋矣而亦五情所𭔹明了現前者釋經惑自眼故見希有事也望幻事見聞人云自抄云惑人眼目故曰幻也文幻師是犱持行用證心人也何云惑耶初釋并合又闕此句矣又以諸大論師可釋惑自眼故句歟諸大論師不出其所由故當迷惑義故今釋中上摽五情所𭔹等下結是事亦非籌度思量之境耳大疏抄第一云問既幻師諦解心幻是不實物故不更成疑若爾何經惑自眼故云云此文極難也引智論十六顯幻法義也可見之問爾者能喻幻法不實所喻真言若實歟文偏如是真言相唯假立云云𭔹偏犱實人如是耳文雖展轉相生乃至非不異者釋經展轉相生乃至非不去文也初釋中以空隱形履水蹈火釋此句及能造所造種種色像句也合中以成一切竒特不思議事合能造所造種種色像以自在神變然不謬合展轉往來等也又以藥術因緣釋經咒術藥力初釋中舉藥力顯咒術合中合三密行也又初釋中舉犱持行用人即是幻師也合中持誦者是也故合云獨有方便具足得成悉地者自證心耳文第二釋及經譬闕此句經合中持誦成就者是也故知第二釋譬初釋就合意也又經合中闕畢竟淨故展轉往來等義以譬而顯故又一切言合歟無明亦如是雖非內有等者智論第六云無明亦如是雖不內有不外有不內外有不先世至今世今世至後世亦無實性無有生者者而無明因緣諸行生乃至衆苦集如幻息幻所作亦息無明亦爾無明盡行亦盡乃至衆苦皆盡文私云無明亦如是下云雖不內有等准譬文以無明合幻所作歟又依無明因緣諸行生句以無明可合幻師無明所生行可合幻事故故智論云如幻息幻所作息無明盡行亦盡文智論疏第二惠影云幻息所作亦息者㒹倒分別心若盡妄分別法亦自無非是際蕩万物已方乃致無如無明盡業報則盡故言知諸法如幻也文既還時以無明行如次譬幻師幻所作生起時何以無明合幻所作耶二義中前義為勝順智論法文故故智論云德如白佛言世尊是無明內有不佛言不外有不佛言不內外有不佛言不世尊此無明從先世來不佛言不從此世至後世不佛言不是無明有生有不佛言不有一法定實性是名無明不佛言不文法譬合三中內外多重問相何異求之但類無明幻者是幻術歟應有幻師幻術幻事三種故知此中幻術望幻師所作也故云是幻所作內有不等𭔹幻事是能作也故云從幻能作伎樂也以行等所生合唯所作幻事也以幻師可合不正思惟歟或可合無明能具心歟或合一心歟論中無法合者以譬顯歟例如今經中但舉幻術幻事疏中加人矣又大師詠如幻喻詩云吾觀諸法譬如幻是衆緣所合成一箇無明諸行業不中不外惑凡情三種世間能所造十方法界水蓮城文此意無明行俱似云不內有不外有若爾二義並存歟三種世間能所造者幻事中能所造歟或云以幻事中能所造如次可合無明行歟今謂不爾彼同幻事故藥則當三密行故大疏抄云問約幻有幾種耶幻有二種問即何假事幻實事幻也問今此中取何幻為論耶通二種幻也又有三種幻即空幻即心幻不思議幻也可悉之也文智論復次釋云復次是幻譬喻示衆生一切有為法空不堅因如一切諸行如幻欺誑小兒屬因緣不得自在不久住是故諸菩薩知諸法如幻文依三密修行得成一切竒特等者疏第十五云如如意珠滿一切願隨心所欲今𮗚是彼從珠得生耶從人心生耶當知不從珠出不從人心出不共不無因緣但和合有耳今悉地不思議神變亦如是但猶真言觀本尊及身印等緣而成悉地由真言故口業淨觀本尊故意業淨印故身業淨三事平等故自我而有不思議業然亦不可分別無思無為也略抄不異淨心者大疏抄第一云意真言神變不思議極無垢淨菩提心生言也文獨有方便具足得成悉地者疏第十一悉地出現品云所謂真言悉地本來成就何以故如來現證如是不思議法所謂阿字自躰從本已來具足無量自在力不思議力此悉地躰常住不變但由行人不自了知故不得如是之果今以此行淨其身口意業若能與法相應即自成就諸法自爾終不也不思議果衆緣會時自當生起如大海潮終不失時文如是真言相唯是假名者大疏抄第一云問爾者能喻幻法不實所喻真言若實歟文偏如是真言相唯是假名云云𭔹偏犱實人如是耳文以日光風動塵故者疏第二云次句陽炎者如春月地氣日光望之如水文私云地氣攝風塵歟或外書云風者天地忿也云云風是天地氣故今取地氣歟塵其義顯矣如野馬無智人者且有二意一者野馬者遊絲也如者譬類義斯則以野馬類陽炎也依之智論第六下譬中云聲聞法中色如聚沫受如泡想如野馬行如芭蕉識如幻文今經中以想譬陽炎故知陽炎與野馬形相相似故俱𨐫想今又相𨐫歟故大疏抄第一云風光相映野馬生形故智論十六云以日光風動塵故廣野中動如野馬等云云無智人者能迷人也二者野馬者渴馬也亦能迷者如字指示義也被下無智人讀之故下引智論云𩚂渴悶極覩氣如野馬謂之為水文此文渴馬義分明也又大師釋云渴鹿野馬馳塵𣩃云云又大師陽炎詩云舉躰空空無所有狂兒迷渴遂忘歸遠而似有近無物走馬流川何處依文此中狂兒者能迷無智人也走馬者野馬也指炎水云走馬流川歟故惠影疏第二云陽春之月有日光動塵西國名為陽炎此間名為野馬無智見之犱言是水而實非水文衆生亦爾者智論正文云男女相亦如是文私云本論文指所迷境合譬中水相也今文似指能迷無智惠者合上無智人歟又男女相即是人相故云衆生也故菩提心論中指人犱云衆生犱也結使煩𢙉日光等者問煩𢙉為光菩提行為塵邪念為風有何因耶智論釋可見不知無我及諸法空等者正文云不知無我不知諸法空於衆界入性空法中生人想男女想文私云無我者人空也諸法空者法空也人想等者我相也等者取男想女想也別異故問不知人空法空故可云生人想法想何唯舉人想耶舉人顯法歟或下能治文云則知諸法實相文正顯法空歟能所治互顯也或諸法實相通二空也炎之相強立假名者問陽炎應躰名何云假名耶依之智論中見之為水文以水可云假名如何水從日立炎名故云爾歟又炎者因即光也相者果即水也之言隔法詞故意炎之果立水名假名也為意此水有名無實躰故云妄想成立有所談議也慈行釋云炎水枯乾如似實濕云云唯是假名離於著者祕藏記云於十喻觀密嚴海會現前時觀如陽炎其心如何若思是至極其意留著又作心譬如磨鏡時見現小影像停留時遂不成實鏡文准此釋今著者留著與心也或云今觀海會是犱空也故疏上云如下文万行方便中無不藉此十緣生句淨除心垢文或云躰空也故經云唯是假名釋云但是法界炎耳又祕藏記云如境界中見海會聖衆皆當入十緣生句觀察不信而信之唯當每係心於本不生際無留所現境文此意信本不生不信所現境為言又前引文云不留小影成實鏡此等釋似空其躰耳私云今宗神變不改自性如來金剛幻即事而真何空其躰矣但經假名者破犱言也記釋者見所現境成至極犱遣犱也無犱而信云淨信也故云不信而信也但是法界炎者瑜伽中所現竒特境界合水相法界加持因緣類光炎也又神變種種因緣者即指所現境界歟大師論云瑜伽境界特竒異法界炎光自相暉莫莫欺是假物大空三昧是吾理文又如以眠力故等者智論第六云復次夢者眠力故無法而見人亦如是無明眠力故種種無而見有所謂我我所男女等復次如夢中無喜事而喜無瞋事而瞋無怖事而怖三界衆生亦如是無明眠力故不應喜而喜不應瞋而瞋無應怖而怖文見此文今文略抄也惠影疏第二云几論夢法睡眠時始夢不眠不夢如人睡眠夢中見𮓜畏號𠮧覺者見之知其夢爾夢𮓜自無衆生亦爾卧生死床覆無明被昏睡眠隨眠生五塵夢起五欲想取著諸法生我我所見生死中男女等相相愛經著或時怖畏或乍歡喜迷實法相聖人覺悟知其如夢故以諸法實相方便示而覺悟之若知實相則五塵自無不生分別文論云復次夢有五種若身中不調若氣多則多夢見火見黃見赤若冷氣多則多見水見白若風氣多則多見飛見黑五復所聞見事多若思惟念故夢見或天與夢欲令知未來事故五種夢皆無事而妄見人亦如是五道中衆生身力因緣故見四種我色衆是我色是我所我中色之中我如色受想行識亦如是四五草得道實智惠覺已知無實文問夢見是何識作能耶第六識與睡眠心所相應而作夢事也故瑜伽論中舉十五不共業中以夢為第六識不共業矣但大小乘意少異小乘意雖眠位無善𢙣意識起無記意識起與眠心所相應故夢見也大乘意無心眠位六識皆故不能夢事有心眠位意識猶存故夢見也或云淨影釋中智相相續夢見云云此意第七識作能歟今復明此夢事等者疏家釋經文也此中有二初就文釋後行者得如是下依義結也初中有二初釋譬後今此真言下釋如是夢等合也二假各有夢事覺時二節如文易知矣疏第十五云復次如夢中夢上三十三天受天種種妙樂猶人於夢中而遊諸天宮不捨於此身亦不於彼者過千万劫及其夢覺乃少時項耳彼人不捨此身不往彼天但猶眠法之心有此不思議事也不可以心識而能測其所以今成就悉地者遊諸世界亦如是但以瑜伽夢因緣得有此事成種種事然不無然知彼皆如十喻不生取著文私云夢喻中下文云皆如十喻今文云深修十句有何故耶謂夢事不思議全同瑜伽境界竒特故殊此喻中舉句歟如鏡中像非鏡作等者論疏第二云此文破外道四種邪因非鏡作者破自因義外道犱言自有一我能作得果是神我自作神我自受故名自因也非面者破他因義外道犱言梵天喜時衆生受樂梵天瞋時衆生受苦今日衆生所以受苦樂等者並是梵天所作非是衆生也非持鏡人作者破共因義若言我與梵天共作者本有我云何得有神我共作衆生所以受於苦樂皆由往業因緣造𢙣得苦造善感樂云何言由共是故破共因也非無因緣者要須有鏡有面持鏡人等和合有像現故言非無因緣也明諸法因緣故有非是自然論中五句義以自我為一無因緣為二此二同破無因義文私云論疏中鏡為自面為他犱鏡者為共具鏡與靣故何故今疏下云本尊身為鏡等耶今案云以本尊之應現行者之心可同面像現鏡中故論疏理今疏釋是廽文未盡歟亦可讀爛耳叉論疏中二同破無因義者論譬中會有五句無因外開自然故故合中但有四句問何故自然屬無因耶三論玄嘉祥云問無因自然此有何異無因據其因無自然明乎果有約義不同猶是一犱文准知今文未有鏡面像自然有故果有義也無因句因無義顯矣又疏第二破自然云即是從緣非自然有文今破無因云若無因緣應常有文能破意同也故一犱也無鏡無面則無像故者與下未有鏡面及若除鏡面異者今無鏡面者𭔹犱鏡者遣鏡面故云無下未有鏡面者直因緣躰故云未有例如彼無因果非因果異也又除鏡除面者望果云除未有直就因躰論故異歟或云三句雖異能破是同何失當知諸法至故不知耳者論正文云諸法亦如是非自作非彼作非共作非無因緣云何非自作我不可得故一切因緣生法不自在故諸法屬因緣故是非自作亦非他作者自無故他亦無若他作則失罪福事他作有二種若善若不善若善應與一切樂若不善應與一切苦若苦樂雜以何因緣故與樂以何因緣故與苦共有二過故自過他過若無因緣生苦樂人應常樂離一切苦若無因緣人不應作樂因除苦因一切諸法必有因緣愚癡故不知譬如人從木求火從地求水從扇求風如是等種種各有因緣是苦樂和合因緣生先世業因今世若怒行若邪行緣從是得苦樂種種因緣以實求之無人作無人受空五衆作空五衆受無智人得樂心愛著得苦生瞋恚是樂時更欲求得如小兒見鏡中像心樂愛著失已破鏡求索智人笑之失樂更求亦復如是亦為得道聖人所笑文私云以有二過者共作付二過也其二過者上自作過他作過也共作有自過他過二過也為言故論正文云共有二過故自過他過文如先世業因等者或云今生新業𦔳過去古業而招當來果故云從是得苦樂也善𢙣如次感樂果苦報也論正文云是苦樂和合因緣生先世業因今世若怒行若邪行從是得苦樂文如小兒見鏡中像者准智論正文今文中闕法歟故智論正文云無智人得樂心愛著得苦生瞋恚是樂時更欲求得文具如上引但得苦生瞋恚句譬無文智人笑之法闕文影略互顯歟以如來三密淨身為鏡等者意云本尊三密身為鏡即緣也行者三密行為面即因也依此面鏡因緣有悉地影像生也為言今疏文廽文未盡以下面一字廽為字下應云如來三密淨身為鏡自身三密行為面鏡中像因緣有悉地猶如像云云或又以緣字屬初句三密淨身意云如來淨身鏡與自身行為鏡中像因緣有悉地生猶如面之像也為言或面與像意面屬三密行也問下水月喻云由三密方便自心澄淨故諸佛密嚴海會悉於中現文此文本尊月現行者心水相違如何入我我入彼此攝持互相加入故各顯一義故無過今顯我入下示入我也乃至起五神通等者經第三成就悉地品云若欲廣大智或起五神通長壽童子身成就持明等文疏第十二云若欲廣大智五通或持悉地明等長壽童子未得持誦者乃至是不隨順廣大智身即是如來身也謂一切三業功德下至五神通長壽等事離覽字無相之門無有得義所以者何若人心著於相則生纏隨業而轉不得自在乃至世間悉地尚不可得何五通等耶五通等尚無得理何况如來平等智身耶是故佛三業世間一切功德利益皆從無相法中而得成辦如神通有多種若行者以心離相無故乃至能得二乘五通若更深修乃至能得菩薩五通此五通即是入地菩薩自在之用比於二乘之通如用日光等彼螢火也持明者謂持誦人得妙成就悉地之果即能遍遊一切佛土供養諸佛成就衆生也若不𮗚此離一切相本來空寂法門此仙亦不可得此即是入於菩薩地也長壽謂於壽自在常住世間利益衆生親近諸佛童子謂壽無量歲常如十六童子容色鮮妙亦是持明仙也文又疏第一云又行者猶與如來共同等住即能以方便力起五神通不動本心遊諸佛剎現種種身語意興種種供養雲以無盡大願廣修諸度文然是悉地成就者疏第十二成就悉地品云悉地是真言妙果為此果故而修因行故此中成就者是作業成就文抄第八云成就者獲得之稱悉地者成就為義未審成就與悉地為一為異若是異者何故前來譯悉地而作成就若是一者不應雙置然此一題義包因果上成就字乃是行者能成就因下悉地言所成就果即是始覺同本覺名為得果成就之悉地作依主釋又因果不二成就即悉地作持業釋文私云梵語約果立名漢名據因得互顯歟故智論鏡像偈云等者以此偈證上義也以偈非有證上若先有之衆緣則無所用之義此文意破先有云衆緣無用故顯非有義也以亦非無證若先無之衆緣復何所用義也准前可知矣次二句證然是悉地成就亦復非無因緣義也意不受前非有非無二句義反因緣義故此義為共生句成能破引論耳又義云證上四不生義以有無配自他歟亦復非有無當共生此語亦不受者當無因句故釋中然是悉地成就亦復非無因緣者破無因生也第四句歟智論云譬如鏡中像非鏡亦非面亦非持鏡人非自非無因非有亦非無此語亦不受如是名中道文具文上舉四不生畢有此文故知四句義歟不應如彼等者疏家以智論譬意結成上義也日初出時至顛倒願息者智論第六云如揵闥婆城者日初出時見城門樓櫓宮殿行人出入日轉高轉但可眼見而無實是名揵闥婆城有人初不見揵闥婆城晨朝東向見揵闥婆城意謂實樂疾行趣之轉近轉失日高轉飢渴悶極見氣如野馬謂之為水疾走趣之轉近轉疲極困哭至窮山夾谷中大喚涕聞有響應謂有居民求之疲極而無所見思惟自悟渴願心息無智之人亦如是空衆界入中見吾我及諸法瞋心著四方狂走求樂自滿顛倒欺誑窮極懊𢙉若以智惠知無吾我無實法者是時顛倒願息復次揵闥婆城非城人心想為城凡夫亦如是非身想為身非心想為心文私云正文有三喻今疏中但見二譬而無所見及渴願心息二句正順陽炎意故疏主隨義轉用為喻耳或安乃至言故存三喻義歟或云為願無我無法二空義用二喻歟云云此義非理違正文云喻故又云喻俱顯二空故若以智惠知無我等者譬中陽炎乾城俱有假有實無二意今合中但明我法無不示我法有義耶謂我法有義非今觀門本意故略之歟智論正文并明我相法相有矣具如先所引矣問前後譬喻中各但用一喻今何用多喻耶智論云問曰一事可知何以多譬喻曰我先已是摩訶衍如大海水一切法盡攝摩訶衍多因緣故多譬喻無復次是菩薩甚深利智故種種法門種種因緣種種譬喻於諸法為人解故應多引喻文或云一事者法也意云何一法以多譬顯耶為言今謂不爾一事者一喻也意云一喻可知何用多譬耶為言故下文指十喻云何以但以十事為喻云云疏第二泡等三喻云此中三事可思之又以城喻身等者大疏抄第一云問陽炎風光相映方生其躰文今乾闥婆城海氣日光相會方生云云何有別智度論以陽炎喻我空性又經文世人妄想成立有所談議云云故二乘智觀我空故與此異也今此我法俱空故二乘經中無言也文智論第六云問曰聲聞法中以城喻身此中何以揵闥婆城喻曰聲聞經中城喻衆緣實有但城是假名揵闥婆城衆緣亦無如旋火輪但惑人目聲聞經中為破吾我故以城為喻此中菩薩利根深入諸法空中故以揵闥婆城為喻文同疏第二云聲聞中但得生空不得法空不無隂躰猶在不無成城因緣揵闥婆城因緣并無是故不今日大乘生法并空所以得明也文私云聲聞經中城喻者土木城此城緣實城假義譬法有我無也揵城是緣及城俱無故類菩薩二空也二諦章下云前破相宗𮗚法假有如土木城雖無定性不無假城此宗破相𮗚法如似乾闥婆城即非城城喻既然幻化等譬類齊等文私云二城同以棟𭩮椽柱云衆緣歟土木城棟梁等實有故乾城不然故問成實論用乾城喻然彼論全依四阿𭇥經何聲聞經中乾城喻無耶智論次上文云復一切聲聞法中無乾闥婆城喻有種種餘無常譬喻文但至成實者嘉祥法華疏云三藏中所以不揵城者為三藏不本性空寂乾城喻辨能成之因所成之果無所有故三藏中不也而成實論亦有此喻者引菩薩藏中譬就小乘法中釋文法華義疏第三云如智度論云佛於三藏中為諸聲聞種種譬喻但不揵闥婆城喻乃至為諸菩薩廣十種喻等也三藏中所以不揵闥婆城喻者為三藏不一切法本性空乾城喻辨能成之因所成果本無所有故三藏中不也而成實論亦有此喻者引菩薩藏中譬就小乘法中釋耳文私云能成因者棟梁椂柱等衆緣也所成之果者城也上謂密嚴佛國等者菩提心義第二安然云大日義釋悉地品中云上品悉地密嚴佛國中品悉地十方淨嚴下品悉地諸天修羅宮文彼文密嚴同今密嚴彼文十方淨嚴是他受用土有方分故諸天修羅宮得長壽住利生是下品悉地云云上文云此密嚴者是妙覺實報淨土文私云下悉地出現品成就悉地品疏中未必此同住心品疏文矣大疏抄第一云問爾以此喻喻三品悉地宮非實者下品宮二乘皆知所知應云一分二乘所得何全云非二乘所得今宗所云悉地宮最是密嚴佛土行者若得此宮時為令不生愛著故引此喻故疏云二乘經中無若行者成三品持明仙等者疏第十五祕密荼羅品云如行人隨上中下期願依真言法要而修得成悉地由此悉地在身故乘悉地之業而受彼果名為生悉地家既生悉地家已乃至成佛已來終不失壞文私云准此釋依上中下期願成三品持明悉地者安住三品悉地宮也馬頭儀䡄下云作念誦三落刃遍即得成就持咒仙人自在得入阿修羅宮六落刃遍即得千歲活則持現身往十方諸佛國土文疏第十二云如上諸器隨作一事用缺字若得上中下成就隨事而用乃至得成持之以遊歷諸佛國土名持明仙也文私云上中下成就者三品悉地也悉地是成就義故此中不出修羅宮舉佛國顯修羅宮歟故上文云開謂開阿修羅宮等也文又諸佛國中攝密嚴并十方淨土歟又儀䡄中舉中下二宮顯密嚴歟問持明與下所舉五種悉地相攝如何疏第十五云夫言成就悉地者謂住菩提心也此菩提心即是第十一地成就最正覺如是名悉地諸悉地中最在其上謂此無上悉地以前略有五種悉地一者信二者入地三者五通四者二乘五者成佛此是五種悉地也初信者謂隨分能淨諸根深信如來祕藏决定不疑信佛有如是如是方便若依行者必成菩提此是地前信行也次入地者謂入歡喜地也第三五通者謂了知世間五通之境猶如幻夢水月鏡像不可犱著爾時度五通仙人之地名第三也第四二乘者謂觀察二乘境界心得無著心不墮實際爾時得度二乘境界爾時到第八地也五從第九地修菩提行道轉轉勝進成如來位也然諸經論師大略皆作如此耳文大師即身義釋大日經欲於此生入悉地文云此經所悉地者明持明悉地及法佛悉地也文私云大師既持明悉地外舉法佛悉地若五種中成佛兼果則持明悉地攝四種半歟法佛唯佛果故若佛果唯無上悉地因位分五種則持明可攝五種也謂持明法佛如次一門普門悉地故持明悉地局因位悉地歟故疏第十二云持明者謂持誦人得妙成就悉地之果即能遍遊一切佛土供養諸佛成就衆生也即是入於菩薩地也文又依前引儀䡄文持明似局下品悉地矣又義云持明者有𢝰別二意三品悉地何不盡一切耶普門行者亦受持法佛明故應云持明仙故經次下云親於尊所受明法文法佛明又灌頂師所授故又疏中佛云大仙况行者乎又大師以經持真言者得真言仙文證即身成佛義一生成佛機云真言仙豈非持明仙乎大師持明法佛二種悉地是別門意也又義即身義持明法佛同舉普門悉地也經云此生入悉地是一生成佛之義故又經六文論兩文同證即身成佛故又問中以得真言仙文證一生成佛之故或云普門一門未必依一生二生歟祕釋云問依五轉門機有幾種有二機一上根上智期即身成佛二但信行淺期順次往生就此行者亦有多正往生密嚴土兼有期十方淨土文此中生密嚴非普門果乎或又即身義不分一生二生云即身成佛小機二生又非隔生故異祕釋順次往生之義矣當以此喻觀察等者疏第十五云如乾闥婆城身祕密者彼所有仙人非身復非識也云何身祕密者言此悉地之人不捨此身不捨此識而能祕密其身猶如乾闥婆城於中見種種宮殿人民衆物之相雖似有是而實非有亦不有而有或時可見或時而無此行人祕密其身亦如乾闥婆城但從衆緣而生其實非實或隱或顯由真言觀行衆因緣故而令此身隨緣生亦如是也文私云准知之若深山峽谷中者智論疏云谷中空故故有響應如樂器等空故有出聲衆生亦爾內外俱空俱以妄顛倒因緣從聲出聲故名為響文余處云空谷響即此意也愚人不解而生三毒等者已上長行自下偈頌也故智論第六云風名憂擅那觸齊而上去是風七處觸頂及斷齒脣舌𠰸及以𮌚是中語言生愚人不解此或著起瞋癡中人有智惠不嗔亦不著亦復不愚癡但隨諸法相文私云長行釋大㫖同愚人不解等釋取偈頌意順長行作釋也以此文為合歟種種八風違順之音者當卷下云以真言行者未見真諦以來當有違順境界或現種種可畏形色或作異聲乃至震動大地爾時安心不動無有退屈行者見此住菩提心有大義利故彼彼魔事不能留㝵也文大疏抄第一云八風者利𮕱毀譽稱譏苦樂也文此中四違境四順境也故云違順真言行者聞此違順𢙣之聲時以響喻可觀也此是順違聲俱過故應非聖者法音行者耳根淨故聞餘𢙣聲歟不同下所舉瑜伽境界中聖者法音也慈行釋云八風不動心念故須無我若准賢首戝榮潤已耗侵陵故云利𮕱越過以毀越德而歎故名毀譽依實德讃名依實過謗名譏逼迫侵形名苦心神恱名樂略抄或由舌根淨故等者大疏抄第一云乃至聞諸佛菩薩教誡音聲又自以音聲遍滿世界遇此緣時以彼響喻觀察此道理不應生著也文此釋意或由已下文為行者所為也私云此猶舉前聖者所為也前舉無量音聲之教今明一音普遍之德故殊出舌根淨之因歟無量一音異故云或也况次下文既云遇此境界所𭔹境界若通行者應云得此境界歟爾時入音聲惠法門者大疏抄第一云意如前所言於音聲得解故爾云耳文上文云既解音聲衆緣和合不實故於不思議神變音聲不生貪著不生貪著故心性不穢心性清淨故能住實際也文如是真言水月喻等者有云有二點一者如是真言水月可悟喻用悟訓二者真言水月悟持明者當如此云云私云何必喻訓煩尺真言水月譬可訓意本尊行者水月旦云喻歟從喻故實是法也故所引釋論法云實法性月輪在實際空中凡夫心水有我我所相現云云此文既喻水月外更法水月准知真言水月又可同歟又中川點云真言水月乃喻於毛天云云月在空中等者智論疏第二云月本在天唯有一月有衆水故見衆多月諸法亦爾本來一相以衆生無明心水有故遂見諸法有種種相生我我所迷實相諸法本來唯一實相實相者何所謂無相也文實法性月輪在如如法性等者問月空同法性何為能所在耶或云謂於一法性性德輪圓靈明具足此喻月輪廣大無㝵清淨無分別性號空也又云謂於理智不二法本覺圓明云月輪真如無障云空耳私云設雖一理何無能所義相性別故故唯識論第十云又自性身依法性土雖此身土躰無差別而屬佛法相性異故文又釋論中云真如門理理自理故文凡夫心水有我我所相現者問法性月輪是本來清淨由何我我所相現耶若法性現我相則質影相違猶如水質現火影矣彼復禮真法性本淨妄念何由起云云引可作證如何妄元無躰故依法性他成也故起信論云謂不如實知真如法一故不覺心起文摩訶衍論云根本無明不能自有當依真如方得止住文又慈行釋云妄元無性故依他成文天台釋云無明無躰全依法性文但至質影相違者以從真起妄同從質現影也又復禮問者慈行釋此事云故清凉曰迷真妄念生迷心即用妄生即體而全同此迷真是用得起是躰文仍無失問未不如三法前真獨在立歟迷真起妄又爾也若爾又有真前妄後過耶真妄從無始雖同時且義前後故二卷起信論云謂從無始來謂不如實知真如法一故不覺心起文又淨影釋云全真義𨕙終日全真而不妨妄成妄義𨕙終日成妄而不妨真文無實智故見種種法者無實智故見法相何下文中以實智遣我相耶謂我相法相俱實智所斷故無失或又下文舉我相顯法相上文中我我所相現亦爾也今十喻菩薩所𮗚故專可法相也無明心靜水中等者惠影疏第二云是諸衆生不知諸法唯有一相本來是空無明心中橫生取著起我我所造種種業生種種煩𢙉執誑法菩薩聖人解諸法實相故皆悉了逹知是誑法所以不著見凡夫犰之是以𦤺笑耳文實智惠杖擾心水則不見者大疏抄第一云聖者心水常清如月凡夫心水常濁如𭰖生生我我所以智惠杖擾其我月自然不現是故行者能應知心性言也文或自以如意珠身等者上約本尊現行者心中今據行者身現于衆生心中也斯則如次自行化他義也如意珠身者疏第十五云如如意珠在於幢頭能滿一切人願隨心所欲可彼所求稱心而至今𮗚是彼從珠得生耶從人心得生耶若從珠出何故一切時不出要待人心希願方出耶若從人心出則人心得何不自求而待珠耶當知不從珠出不從人心出不共不無因緣但和合有耳今悉地不思議神變亦如是但猶真言故口業淨𮗚本尊故意業淨印故身業淨三業平等故自然而有不思議業然亦不可分別無思無為也文私云准此釋行者三業淨故有不思議業用無思無為而作利衆生事如如意珠滿人求願故云如意珠身也又經第七云大菩提心如意寶滿世出世所有希願文此行者身悉地成就後有不思議業悉地從心生故菩提心所生身故云如意珠身歟爾時應諦想𮗚之者自下破犱文也此句標也今此下別釋也既能下結也就別釋中有二初今此至所生者密嚴海會破犱也故云密嚴之想此依自心佛身因緣現故我心佛身相待作自他不生等義矣意云自他理性平等實相尚畢竟不生况迷情差別相違自他因緣寧有所生耶為言問今此文四句具有耶或云自他二句也私云意𭇥四句所謂相違自他故自不生他不生相違自他故共不生相違自他則俱非因緣故無因不生也例如香象出三業以即一因作存壞四句次又如下後如意珠身破犱也此中有二初重明珠身心現此中有法譬法譬中不來去義相反謂悉不來反合水不去自心不去反合月不來也來去雖相反義理全無違耳後當以下正述破犱也此中二初正述後以喻反顯第二結中初既能自淨其意者結初釋自心澄淨而海會現故後當下結第二釋如意珠身故云如如不動衆生蒙益故云為人演也聲聞經以受至復殊也者為明今經浮泡喻示先舉二經意異今經也所謂聲聞經中以浮泡無性衆緣實法喻唯薀無我歟故疏第二云聞中雖此五喻而意明無我文又智論云復一切聲聞法中無揵城喻有餘無常譬受如泡取意般若中泡是雖無實性因緣猶實法故菩薩觀諸法空十喻中除此取如化也故大般若經第一緣起品云於諸法門勝解𮗚察如幻如陽㷔如夢如水月如響如空花如像如光影如變化事如尋香城雖皆無實而現似有文但今般若者指大品歟彼經第一序品云諸法如幻如炎如水中月如空如響如乾闥婆城如夢如影如鏡中像如化文今疏浮泡喻意異二意而譬即心變化也問疏第二云此三事猶帶拆法明無性空此中幻炎等明躰法難解空故不論也取意既泡沫芭蕉三事帶拆法故第二劫猶不取之第三劫中何取彼耶因緣實法故不順躰法空例如土木城故不取彼耳然今以泡起即水起喻即心之變化故所况既異例難不齊矣問變化又化事雖無心因緣實法何捨泡取化耶下釋云但以心生便有心則文故知心化生同而異泡水存故問若爾何譬即心變化乎彼取泡即水𨕙故無違耳問第二劫又明三界唯心義故三重幻中云即心幻若爾何不為喻耶唯心言雖同即心意是異所謂彼諸識所變影像故云唯心此一心緣起故云即心也又彼質影雙存此唯影無質也又彼諸法歸自心此自心成諸法故二劫意大異而已又如彼華嚴三界唯識自宗他宗俱談三界唯心但𡱈我宗也又以心為𭦟荼羅等者今釋與前異云前釋自心作佛還蒙彼佛示悟方便自心轉入無量法門也今釋自心作𭦟荼羅境界此為能緣境界自心能作不思議神變也以此喻海水自心空成雨水作佛降與海水為緣生種種浮泡轉入法門能作反化也兩釋如次自利利他歟故云轉入法門能作變化也修定者有十四變化者智論第六云如化者十四變化心初禪二欲界初禪二禪三欲界初禪二禪三禪四欲界初禪二禪三禪四禪五欲界初禪二禪三禪四禪是十四變化心作八種變化一者能作小乃至微塵土者能作大乃至滿空三者能作輕乃至如鴻毛四者能作自在能以大為小以長為短如是種種五者能有主力有大力人無所下故言有主力六者能遠到七能動地八者隨意所欲盡能得一身能作多身能作一石壁皆過履水手捫日月能轉四大地作水水作地火作風風作火石作金金作石文抄中第七文云云頌疏第草七云從神境通生變化心有十四謂初定果有二二定果有三三定果有四第四定果有五且初禪有二化心一欲界攝謂初禪作欲界化也二初禪攝謂初禪作初禪化也乃至第四靜有五化心四種如前加第四禪化諸果化心依上地必無依下謂𫝑力劣故文又云此二界化各有二種一似自身化二似他身化身在多界化有四種謂作欲界自他二化及作色界自他二化身在色界化亦四種如欲界文私云此能化心從神境通生是通之果也故頌疏云此十四能變化心從定修生無記性攝四無記中通果無記也文故知今如化者但化事非取能化心能化心是實法故故智論云如化人無生老病死無苦無樂亦異於人生以是故空無實一切諸法亦如是皆無生住以是故諸法如化文此所化事若欲界化則以色香味觸四境為躰若色界化則以色觸二境為躰也於中有即質離質若即質化即我身化色天形欲界人天等姿也若離質化我身外別化彼等身也設離質化設即質化隨所化事可攝欲色二界能化心唯色界攝也依身欲色二界隨應不定也若色界人天身修得色界定可色天乎或云入定位彼天攝出定不爾歟私云設雖入定依身既欲界故欲界攝也問今變化何不通無色耶彼非通依地故故頌疏云五通必依止觀均地未至等地故亦無通文無色定多惠少四通分惠多定少故非通依地問義章第草云又小乘中前之五通唯依四禪根本定地大乘法中始終同小究竟終成依一切禪悉能起之文又瑜伽論云色無色天變身万億共立毛端文此等釋通無色如何今所引智論既云十四變化局欲色又瑜伽文者住心論釋此事云然大乘唯識論等許無色界有定品色而無業果通果色文既諸論一同義章釋未但會之彼章次上釋云又聲聞人隨依何定所發神通入餘定中不能起用諸佛菩薩則不如是隨依何定所發神通入餘定中悉能起用文准此釋入餘定中悉能起用義勝聲聞故云依一切禪歟非謂依無色起通而已問變化亦雖化事無性能化心因緣即實法若爾何捨泡取化耶泡從水生泡舉躰水故破泡形濕性猶存是即如拆法極微𭃯那躰猶在然化事雖從心生化事舉躰非心故化息時化事處無心殘故喻躰法空也例如乾城木城異也天龍鬼神亦能作化者智論云是變化復有四種欲界藥草寶物幻術能變化諸物諸神通人神力故能變化諸物天鬼神輩得生報力故能變化諸物色界生報修定力故能變化諸物文同疏第二惠影云復有四種者謂藥草等亦能變物延年也寶物者如意珠亦能變物令成寶也幻術亦能變諸物也勒那留支等用咒事亦善能咒井水令滿方方自取之能咒幻博貪向墓也諸神通者明神通人亦能變化也前言八種變化變化若得禪時即能得者今此中別明修通除障通無明所得故別出之耳諸龍神色界修定所得生報力能變化等不入四種四種中但取修習所得者耳前言變化據身在欲界修得諸禪作者是故此中別出初禪生報所得者也文俱舍論草七云神境智類有五種一修得二生得三咒成四藥成五業成文光記云一修得由修定得故二生得生彼處得故三咒成由咒九成故四藥成由藥力成故五業成由業力成故文私案智論四種加前修得雖成五種與俱舍少異互用開合故謂智論以業得合生得更開神通故俱舍神通攝修得更開業得故又俱舍有占相得矣問以五種得配人天等方如何頌疏云若修得通唯人天趣能入定故生得除人通餘四趣皆有生得咒藥二種通人天鬼趣占相唯人也文咒藥通天者欲天歟智論生得無地獄者舉龍鬼顯彼歟光釋有多解撿可見矣如化生先無定物等者智論云復次化生先無定物但以心生便有所作皆無有實人身亦如是本無所有但從先世心生從今世身皆無有實以是故諸法如化如變化心則化諸法亦如是因緣果亦不自在復次如變化生法無初無中無後諸法亦如是如變化生時無所從來亦無所去諸法亦如是文復次如變化相等者智論云復次如變化相清淨乃至皆悉清淨文同故不具引終句與泡喻意同者疏家私詞也如空者謂但有名而無實法者且取空為譬歟然經中云如空中無衆生等直非取空也故列名中經云空華論云如空若爾經論是異疏家何引論文釋經意而准論有人飛上等文釋如得神通者於空一顯色中自在飛行等乎謂釋論意非直取大躰取縹色為譬歟故以空一顯色同經空華歟故惠影疏第二云衆生亦爾遠無漏法故為㒹例分別心所轉於空法中轉取男女等相生染著心如遠生空謂為縹色也文又大品十喻云如空大般若十喻云如空花可思之又釋論意不許空實躰故直取空歟彼論多重問付空論之遠無漏實智惠故等者問應云遠實相譬遠視故𭔹空故應以實相類空以實智合眼以我男女等合縹色故如何譬合影略互顯歟譬中舉翳眼顯明目合中舉實智顯𢙣惠故故譬中又應云遠明眼故竒空見縹色合中又應云遠視故身見轉見我男女也謂犱我我所是身見故極遠而無所見者上文遠視故見縹色云云何今遠而無見耶謂上文在地下遠視故見青色今飛空中遠至無見也意異智論具文云有人飛上極遠而無所見以遠視故謂為青色文諸法亦如是等者大疏抄第一云問此喻意何此意真際如空諸法如空華等凡夫妄見空中種種相𧳖其所見相都無實躰如是行者修觀行時遇諸魔境種種違順緣時安心空不動不起言也無為空量前也文若有種種魔事等者謂以種種魔并業煩𢙉合譬中疾病非人等因緣也謂魔及業煩𢙉如次合譬人及疾病歟以事及境二字合種種人物形相等事謂魔所作事境謂業煩𢙉所起境故以皆當安心等文合得本心等句也問此喻及下火輪喻經中無合法文如何舉喻顯法歟又前八喻其義顯故又摽中云十喻皆真言行者所行故譬如火燼等者智論疏第二云如旋火輪者被火燒頭名作火𢲵投之𢚩轉遙看似如火輪其實無輪万法云云亦爾無實衆生遠離諸法實相故見諸法似有觀之則無也文一躰速疾力者疏第六云經云時佛入於一切如來一躰速疾力三昧者謂入此三昧時證心一切如來皆同一法界智躰於一念中能次第觀察無量世界海微塵等諸三昧門知如是如是若于衆生於彼彼三昧門中應得入道知彼善智識已為若于衆生作種子因緣等為若于衆生作種種因緣或有衆生入如是法門可得超成佛入餘法門久遠稽留不得成佛如是等種種根性不同進修方便皆亦隨異乃至遊其中次第修習出入超世界於一一門各得能成就無量衆生故名一躰速疾力三昧也文又第一云如是遊即是菩薩自在神通言毗那本行菩薩道時以一躰速疾力三昧供養無量善知識遍行無量諸度門自利利他法皆具足文私云一躰速疾力三昧是准上下文通佛菩薩所入歟但今文是舉菩薩所入歟云淨菩提心故此三昧又普門三昧歟或云字觀云一躰速疾力三昧也云云此義非無理今文既云於一字門旋轉無㝵故又論云火輪隨手方與圓種種變形任意遷一種可字多旋轉無𨕙法義因茲宣文諸結使煩𢙉等者此中正見合光我法相合影然譬中無煩𢙉譬謂合中舉煩𢙉譬中顯人歟又次釋中舉人并影合中但舉影顯人歟善𢙣業即隨人去住動故故智論偈云空中亦逐去地底亦隨去處處常隨逐業影不相離略抄起信論云住持過去無量世等善𢙣之業令不失故文故知兩節釋又影略互顯也初釋中譬中闕人後釋中合中闕人故或云果報類人或云業譬人報合影不斷故云罪福就時出也大疏抄一云意有人躰時影隨有人去影去隨業有報言也文但以非俱時故法𨐫不齊歟人又雖果報今且約人持業論去住動歟未詳委可尋决耳此中報不斷故罪福𤎼時出者合動歟又出者去義也故智論去不去中論云不出動是去住外無別躰故四威儀中無舉故無別合歟然是影非有物者疏家以釋論影喻同今經火輪也影是眼識所緣顯密通滿捉何云誑眼法乎影又顯色其一極微聚集實色大小大同習也何云非有物乎謂且約釋論不許影實躰作此釋歟大疏抄第一云旋火輪與影喻其意同也可思也上第四喻釋論名鏡中像喻也可悉之文了知大乘句者大疏抄第一云問又經十緣生句已是大乘句云云若爾者皆非二乘所解何乾闥婆城一云非二乘所解彼以乾闥婆城攝餘緣生爾云也問不然疏文不云相准可知何可云例攝此甚難好可悉也私思以乾闥婆城喻身也身即以衆緣合成二乘之人知人不云法不證法空理故一往爾云耳文或云通顯密大乘今十緣生句第二劫所觀第三劫中有顯密能所𭔃齊故故疏釋云非聲聞緣覺安足之處文或云但局密也大乘生句釋毗那上上智觀故必定句等正覺句等局密故但非二乘文者雖唯真言作此釋何失例如諸佛大祕密外道不能識也安足之處者句是足跡之義故大乘人安足之處故非聲緣安足也義如前釋即此意矣障蓋雲披自當證知耳者經上文云此菩薩淨菩提心門名初法明道菩薩住此不久修學便得除一切障三昧文疏第一云行者已得淨除五障三昧爾時於自心中常見十方一切諸佛當知行人則是位同大覺也以其自覺心故便得佛名然非究竟妙覺大牟尼位文函相稱等者理智不二類函相稱也故鈔云心之實相與彼智惠猶如函文天台釋云境既無量無𨕙常住不智亦如是函大大文了知心處則安住其中者釋論第四云金剛心心還智惠未滿福德微少不逹一心中實處故根本無明猶未出離而卒万行到果位時始覺般若分明顯了本有功德具足圓滿現見一中法界之心安立住處根本無明頓斷無餘是故名為見一處文私云心之實際是一心中實之處故云心處如來智惠又安住其實相中故云安住其中也論約所安住處今依能安住智歟論一中法界之心者後重一法界心即當天台宗今心處者初地淨菩提心是亦同天台矣或又一中法界兼華嚴以風水龍王同華嚴故今文此心名極無自性心故引合耳必定師子吼等者疏第一云第九大那羅延力執金剛者謂持祕密神通力也如一闡提必死之疾二乘實際作證已死之人諸佛醫王明見如來性故則能必定師子吼於救療因緣心不怯弱文准此文諸佛以祕密神通力見闡提二乘如來性必定師子吼救療實相印故云如來性心實相印也法華經中二乘成佛故云如實相印也可例准歟一切諸魔皆化身作佛等者鈔第四云智度論云復有魔作比丘被服來語菩薩汝先從小師聞修六波羅密法皆是妄所集隨喜功德亦是妄汝先所聞皆是誑文飾不真非佛口今我為汝真示佛法乃至魔作佛身來所異於法相者亦不信受譬如狗著師子皮諸獸見之雖怖聞則知是狗何况變作餘身等能令行者變易其心哉文即是心佛顯現等者疏第一云爾時行人為此寂光所照無量知見自然開發如蓮華敷故云無量智成就此智成就即是毗遮那心佛現前故云等正覺顯現梵本云三𦴭三佛𨹔現也佛已略如此心實相印若行者與此相應得至淨菩提心文私云准此文今成覺是真宗初地成佛故云毗那心佛現前然非究竟妙覺位又非顯乘成覺也又依云極無自性心生即是等則顯成覺歟故大師釋極無自性心云是因是心望前顯教極果於後祕心初心初發心時便成正覺冝其然也文又云極無自性未必顯歟故疏下云若生極無自性心得入如上𭦟荼羅海會名阿闍梨文乃至毗那以上上智觀等者自初地至佛果漸次轉深故云乃至也故上釋云謂得淨心已去從大悲生根乃至方便究竟其間一一緣起皆當以喻觀之由所證轉深故言深觀察也文又義通地前也故下釋云漸次證入者如初無畏以聲字觀修𭦟荼羅行乃至離垢地已去各於自地觀心中修𭦟荼羅行其中從因向果則三密方便展轉不同容極至心王大海方一味無別耳文既心王大海之譬同如入大海之句前二義中前義為勝云以深修觀察故深修言局第三劫以上故但至大海喻者意大異謂下取海水一味今取海底漸深故上上智觀者𣵀槃經四乘菩提中佛菩提也中論疏云下智觀故得聲聞菩提中智觀故得緣覺菩提上智觀故得菩薩菩提上上智觀故得佛菩提文如是六句次第相釋等者疏第一云今此真言門修行諸菩薩以見法明道故即生獲得除一切障三昧得此三昧故即能與諸佛菩薩同住發五神通以五神通故獲一切衆生語言𨹔羅尼獲此𨹔羅尼故能知一切衆生心行而作佛事以能廣作佛事不斷如來種故則於一切時一切處常為十方諸佛之所護持當知如是諸句皆悉次第相釋也文今准此文應相釋也謂了知甚深大乘故得自證知心實性了知心實性故得理智一際了知理智不二故必定師子吼如來性心實相印了知如來性故成初地正覺了知正等覺故漸次轉深發毗那上上智觀也如此六句相望後後云相釋釋前句故前前云相生生後句故又次第相釋等相字顯互釋互生義歟次第又有順逆次第故例如彼釋論別因果故表功德故引行者故文有順逆相釋矣又六句中前五云次第相釋後一云次第相生漸次轉深乃至生佛智故又且以六句配五種大乘者大乘句是他緣乘大乘初門故云名故云非聲聞緣覺等心句即覺心乘覺自心本不生故云心句也謂五句八迷障雲披八不中道自心月顯故無等等句必定句者一道心理智不二是一道一乘義故釋云函大大是函相稱義也二乘作佛法華故云必定師子吼故法華云如實相印文正等覺句則極無心也故云極無自性心即是心佛顯現也大乘生句者祕密心也故云乃至毗那以上上智觀等也又配三種幻者初大乘句者即空幻是學大乘人觀故度違順八心故非二乘安足之處也次心句者即心幻也無等等已下諸句不思議幻也依之當卷下釋一念守齊乃至一生補處治地義畢云例如十緣生句漸次轉深不可窮盡也文大疏抄第一云問十緣生句了次經文出六句其意何此五句歎緣生不思議也問以此六句歎彼十緣生何此十喻皆是大乘甚深緣起非二乘安立故云大乘句心之實際不可得無能無所如是觀時心性空寂故名心句如來智亦不可得無敢可比者故云無等等句也諸佛以此十緣生義决定師子吼并能信解决定至無上果故云决定句能知此十喻義極無垢心生此心生時即得佛果一德故云正等覺句如是十喻令行者心漸從淺至深淺者自餘九宗深者今此祕密莊嚴住心從彼唯薀無我至此第十住心令心𢏏淨𢏏固遂住無垢淨菩提心言也文從十世界微塵數諸法界門等者疏下釋云十世界微塵數金剛密惠差別智印猶如𩯫十世界微塵數大悲万行波羅蜜門猶如華藏三乘六道無量應身猶如根等條發暉相間以如是衆德輪圓周備故名𭦟羅也文又云復次大悲胎藏發生三昧中有種種法界門種種善知識如善戝童子次第詢求或於如是法門已善修行而於余門未能究習若入普門世界時則能於一念中具足相應是名深行阿闍梨也文工巧大智惠者大疏抄第一云工巧者𫞐智巧諸法令能解故大智者實智能證一大法界理故也文若於一念心中等者謂由淨菩提心一躰速疾力三昧故一念心中窮上求下化行盡也上窮無盡法界者上求自利行下極無盡生界者下化利他行也故疏下云若入普門世界時即能於一念中具足相應是名深行阿闍梨也文疏第一云以一躰速疾力三昧供養無量善知識遍行無量諸度門自利利他法皆具足文自然有緣起智生等者十緣生觀故云緣起智也不同如常定所發修惠通逹也為言鈔云即法界不思議祕密緣起之智生也謂行者以內自觀行力為因外感佛神通加持力為緣由斯二力故自然而有祕密法界緣起智生即能得見不思議加持境界是故不同尋常耳文持誦次第如法悉地如法果生者疏第十二云悉地是真言妙果為此果故而修因行故文准此文悉地即果也何雙舉耶謂悉地成就此通因故寬狹為異或𭁡舉何失猶如云悉地成就故次下云悉地果生也或又悉地成就因果別故非例歟抄釋如上引已淨菩提心諸心相竟者諸心相有二義或九句隨一諸心相句也住心中雖亦明心續生修行等句廣明諸心相句又重故且約廣多云爾也或云諸心相言通別故今約通云諸心相句也如實遍知一切心相釋修行句也又住心品中又雖三句多明菩提心句故云淨菩提心也次下進修方便及悉地果生者根究竟也大疏抄第一云意上已十心差別次六無畏次亦十緣生句此第一真言門住心品大心也次入𭦟荼羅具緣真言品此意已知住心差別淨菩提心因緣今明以此淨菩提心入𭦟荼羅進修應得悉地果言也文去文永四年丁卯七月五日於高野山丈六堂北僧坊傳法會談義之次遂日馳筆畢同九月庚申十二月十九日於醍醐寺中性院以理性院上野公令清書自拭老眼加點畢但令清書許不及𭁡治後賢刊定金剛佛子賴生年卌七寬文元辛丑年九月吉辰烏丸通下立賣下町野田莊右衛門板行
