body:
  text: 疏卷第二之六前二劫中雖云度二乘地等者抄第三云等者等舍利弗目連等謂須菩提於般若會中猶能承佛威神人法俱空若離加持則不能為謂行者於前劫中雖過愚法未能出此廣惠人等至此劫中須菩提等而於此祕密一乘不知所趣故此行者乃名直過二乘地也文法華安樂行品云此法華諸佛如來祕密之藏於諸中最在其上文疏第三云復次初劫智惠與二乘共行非𭰹般若二劫智惠尚與二乘共聞亦非甚𭰹般若第三劫等空心無邊智惠一切二乘不能思議乃名甚𭰹般若堪作祕密行阿闍梨也文私云疏第三尚與二乘共聞者廣惠承佛力二空故云共聞也然今即上文至第二僧乃與二乘異也者過愚法故云爾不謂與不愚法二乘異也等空心者第八等空心也無邊智惠者法華云諸佛智惠甚𭰹無量文一切二乘不能思議者法華云其智惠門難解難入一切聲聞辟支佛所不能知文準此釋者若常途諸論乃至辟支佛地也一章是唯明第八住心歟又此菩薩等文又第八也唯獨自明了文順法華唯獨自明了余人所不見文故故知三重祕密是前後一指法華也又菩提心論云今真言行人如前觀已復利益安樂無余衆生界一切衆生心以大悲決定永超外道二乘境界文此文會第三劫文第三劫初云復次真言門故論又云今真言行人也云出過二乘疏云真離二乘地故論又永超二乘文論文可通八九心歟故釋提桓因等者抄第三云準此文但言釋提桓因親近供養何故疏言帝釋奉草四王獻鉢梵王請轉法輪今經略故故智度論云佛至樹下時釋提桓因奉上好草執金剛菩薩常執金剛衛護菩薩梵天王請轉法輪如是等各有常法是以疏主來釋此故云釋提桓因等文私云經意𭇥四王梵天故疏中舉二天歟或與釋影略㸦顯歟問今假成佛者顯密中何佛耶𭂫案一假意初直行者內證外用歎德其文可知後出過下重𭔹顯家法身生身讃德也於中有二初以顯法身極佛同內證初心故大師云顯教理智法身是則真言初門云云常途諸論證此心時即名為佛者即此意矣後釋提下疏時大下釋此文以顯草座成佛擬密外用德也故知今成佛是顯佛也故疏十九云又佛所以自藉此草者除世間憍心故為太子時種種放逸坐卧寶床寶几承足等若出家猶習之即與本在家無異此能捨如是事而坐草一切人天皆生敬心文此釋迦菩薩事也今文同彼故可云顯成佛乎又義上文明初心現證位為人天所歸又同顯佛極理而歎內證德也今文真言菩薩當成四種身之中亦反化法身利他之德也故菩提心論云成大毗遮那佛自性身受用身變化身等流身文前歸依今敬禮其言雖同其意是異謂現當因果內外等異故問草座成佛是天台三藏佛何云密佛耶密成佛又四身別故變化法身用草座何失或㭫顯釋迦即云變化法身歟或又密意大日成佛用草座歟况彼圎教佛雖空為座又用草座之義歟何况灌頂阿闍梨用草座可思之問若爾灌頂阿闍梨授印可時是令弟子成佛之儀式也何唯華座非草座乎私案初後夜位內證故坐華座後朝歎德外用故座草座可悉之今疏釋內證外用此意歟阿闍梨住化他門故坐草座歟故知今中菩提實義時不用草座成佛外迹可依彼座歟可尋決矣又疏第八云又為弟子作法時阿闍梨此邊藉以生茅使蹲踞而座阿闍梨亦當座於茅座不得加以床𥛑之類也然受用生茅略有三義一者其性潔淨離處樂觸可以蠲除行者昏怠恣之心二者是吉祥草以為數坐而證菩提是故能除一切諸障三者以此吉祥茅表惠性也文私云今此文世尊者大日世尊歟若爾成佛外迹可用此座歟又第十九云以如來成道時所坐故一切世間以為吉祥故持誦者藉之障不生也文此又大日如來歟然準下文云為太子時者釋迦歟若爾第八文又可同此歟或云奉草獻鉢等有𭰹祕釋疏第九六種震動釋六根煩惱準知耳經所謂空性等者有云住心論等中以所謂空性等文證第八九二心中以終極無自性心生句為第九蕳別文此空性者真如大空性隨緣作諸法故以同文證兩心也其緣起無性中第九心即無性極故以終句為蕳別矣云云抄云有云所謂空性乃至身意者第八心也極無自性心生一句唯第九心也故大師云極無自性心一句悉攝華嚴教盡文但第九引上文是為來由非正證耳有云此文通二種心然於一文上𭇥淺𭰹義所以六無畏立一無畏三重幻𭇥一種幻但以終句為蕳別文極言顯無上故云云私云三義中初義於空性等一文淺𭰹有無未分明矣或云空性等文無淺𭰹而證第九勝兼劣故例如慈恩二諦章中云又上兼下聲聞行緣必獨覺法乃至上必兼取下二乘境行必菩薩境行故云云又般若寺疏抄中以所謂空性乃至等空之文證第八以離有為無為界乃至極無自性心生之文證第九也準此釋者離有為至舌身意十七字通二心前後文句各𡱈歟但寶鑰中兩所之下所如疏抄上所與第八所者同文故來歟私撿文論八九鑰八并第九上皆除無邊至續生之三句但論鑰俱第九增極無自性心生句又論鑰各第八云等同空加同字耳下除初所謂至論之四句以等空以下三句退安極無自性心生下更加無邊一切等三句具如是初心已下文矣倩案以極無自性句為第九蕳句鑰論是同但鑰下以無邊一切佛法依此相續生文似為別句矣或又下為驚覺的據一切佛法生者五相成身等荼功德故上重證時鑰論俱不此文歟又義等空一句兼八九通句歟故今所安極無下也故上釋云驚一道於彈指覺無為於未極等空之心於是始起云云此釋極無云等空但始起者已極邊歟非第八也故疏云空性即是自心等空性文又守護開題云空性等空融境智而知一實文或又此文空性與等空歟又或云所謂空性至空通二心惣句也離有為下二心別也離有至身意第八也終一句第九也例如第二劫中覺心所度云微細他緣所度云智障故故理實細與極細又各分麁細故大疏抄云六劫可思之問若爾第八所度何耶經顯文越諸論是無間第八心也佛法續生即解第九心也然理實各有斷證故此中十喻者第三劫第八覺也前十喻者第二劫覺與第三劫第八所度妄俱故云復成論也今第八越彼故云越諸論也越者指第八覺也又等空三字顯微細斷也又義第九證終一句也依之疏云心實際亦復不可得故曰極無自性心生也文又云行者初𮗚空性時覺一切法皆入心實際乃至以蒙佛教授故轉生極無自性心乃至心之實際亦復不可得文文意第八心沈心實際行休息時諸佛驚覺而令轉生第九心故云轉生又云亦復也轉及亦起盡非是示二心勝劣乎若空性等文通第九則於一重心有轉生義耶但第九同者若無彼文則難知無自性心從何心轉生故為來由也例如第五心證故彼心所云又云聲聞所真言一一句安布是中辟支佛復有少差別謂三昧分異淨除於業生文此中聲聞所一一句安布是第四心證也今𭁡是來由義也復有少差別難知與何法差別故問迂回直往二機俱以空性為入門耶或云然也漸機今空性者住常𡧤光理性時蒙佛驚即轉生極無心然後入祕密也頓機宿善機熟可入密者即成空性心空性者無始生死我執轉融性也此心不生時難入故以機為空性也斯則字三諦究竟入字三諦也宿善位以字空性為門而入金剛寶藏中三點開藏內見時三點雙現前於藏外談內寶即有次第也橫竪義可思之云云問今此空性無境等義可通覺心乘耶不通也問覺心乘畢竟皆空為極不三無得為要依之大師開題八不空性談義寶鑰獨空絶不二無相文若爾空性無相等義不通第七乎不通也其故大師證其文別故所以二劫三劫隔僧三乘一乘異境行故疏云前劫悟法唯心今𮗚此心即是如來自然智身取意若此文通覺心三劫雜亂十心難辨者歟但至八不空性等釋者彼宗八不空理云八不空性非依今文歟所以宗家第八心獨名空性無境心故仍無失問大師立十住心專依大日菩提心論八不空性又非依今文乎又雖有第七所依別文兼通此文何失例如第九心正雖依極無自性句亦通所謂空性等文矣又空性無境心名雖名第八何通餘心例如如實知自心矣如何住心淺𭰹尤可任別慿論起盡此文通第七住心優降難辨者歟但又住心淺𭰹雖依真言經論兼取各宗文理也故八不空性及一心無相等言依彼宗釋義歟又云第九證者如先會矣或八九一劫故設雖通此隔僧何同彼耶又如實知自心名雖惣即別名空性無境心稱可𡱈第八例如一道無為心矣上文無量等者云無量如空不染𣲇常住諸法不能動本來𡧤無相無量智成就正等覺顯現文疏第一云次有一偈半略菩提心相貌乃至爾時行人為此𡧤光所照無量知見自然開發如蓮華敷故云無量智成就此智成就即是毗那心佛現前故云正等覺顯現文私云疏云𡧤光所照無量知見同天台四佛知見云無量智成就同法華諸佛智惠甚𭰹無量文又心佛顯現義如實知自心義故大師今文證第八心符疏意矣前劫悟法唯心等者唯心中有他緣覺心法相唯識是事心也三論唯心即真心也相宗遣相證性唯識雖名真理識實性故云唯識異三論云真理即唯心耳故知唯識言雖同事理義是別具如先辨而已今𮗚此心即是如來自然智等者疏第六云次云離一切論法佛自然智是廣歎不思議智而為世間滿足衆希願是廣歎不思議𭤧便是故𫞐實二惠具不可思議也文法華第一云諸佛智惠甚𭰹無量其智惠門難解難入文同疏云歎𫞐實二智取意二意同𫞐實二智俱不思議故云自然智也又一道心中談法報常住義故云如來自然智等也如來自然智者自受用身毗那遍一切身者法身也二身俱常住故云自然及遍一切也故天台釋云境既無量無邊常住不智亦如是函太蓋大文理智俱常住而合如函蓋相稱也問法報常住等義覺心乘亦談故疏第二劫文釋心主自在文云以不滯有無心無挂得所為妙業隨意能成文意云法報同常住故云不滯有無不云法身無為報身有為之故理智俱會故云心無挂得故第七覺心云悟心性不生知境智不異文又嘉祥法華義疏云內應與法身相應法身常住應身亦常文內應者自受用身也既云俱常是法報常住義也又云相應豈非理智合耶彼他緣心猶成理智會義何况覺心乘乎法身常住言雖同理智不二意全別故彼義疏云報佛壽量有始無終初證佛杲是故有始一證已後湛然不故無有盡文雖二身俱常報身猶有始無終也而今文中如來自然智顯報身無始無終故云自然智也又唯識等論中雖明智與真如平等平等報身唯有為生躰未及無終談也故慈恩三身義云佛受用身既墮法數生者皆是一向記故不可是本性常許從因生是常者違比量故文何為難端乎凡今住心理智俱無始無終會一際故境智俱實相也境智俱般若也故疏云以心實相智覺心之實相境智皆是般若波羅密文又宗家此心云似澄水之能如瑩金之影像濕金即照影照影即金水即知境即般若般若即境文此等義豈亂覺心乘乎問大師菩提心論心躰自如不見身心之文證覺心乘又嘉祥二諦章云不見有法出法性者是名與般若相應文既云能照心躰即真如又云不見法性外有能照智法此等豈非云境智俱實相耶如何雖云境智俱實相未談心境同般若歟例如智論文云有為實相即是無為無為相者即非有為云云又云理智不二談二心雖同影像取義兩宗是別所以第七心心外影像但於唯心位談理智不二故疏上文云覺此心本不生即是漸入阿字門文然今心中非但明自心不生心外影像亦不出常𡧤光故疏云以心如是故諸法亦如是根塵皆入阿字門影像不出常𡧤光文止𮗚第五云無生教門竪攝因果其義已彰橫攝之意今當大品若聞無生門則解一切義初阿字攝四十七字四十七字攝阿字中間亦然橫竪𬾨攝其文如此文既云橫竪𬾨攝皆入阿字意也漸入皆入義可思之問根塵皆入阿字即事理俱密之義影像不出常𡧤是即事而真之談也若爾何異祕密心耶境智俱般若之談雖甚𭰹猶是一乘一如理未及十十無盡影像歸常𡧤之義雖希有猶是攝相歸性或未入性相歷然位也𮗚夫祕宗意現覺諸法本初不生也何云入阿字耶直諸法令識其心也豈云歸常𡧤乎所以皆入不出言顯示一心緣起未歸一心無相本也寧及性佛性然六大四乎故釋云今所言色者非諸識所變影像三乘色非一心緣起色一乘色性佛性然四法佛法爾三色文真言色也以此中十喻望前十喻等者鈔第四云疏以此中十喻等者初劫第二劫十種譬喻乃成論今此中十喻復為𭔹治前劫心沒實際欲令離有為界故𮗚此十喻亦成論今時等空性俱不可得故云越諸論文道云此釋意以此十喻者第三劫十喻望前十喻者前二劫十喻也前二劫十喻沒實際為𭔹治之𮗚此第三劫十喻尚𭔹前十喻成能所故成論釋歟謂即空即心不思議三種幻麁細極三妄如次能所治也若三劫十喻為論者何心為能治耶即以等空性俱不可得為能治也云云或云以第三劫妄執云論故次下云第三重百六十心煩惱業種除文是即越諸論意也或云第二劫十喻覺望第三劫覺降論非妄執也或云前位覺即後位迷故俱無相違耳問四義俱未先杪義不明二三劫相望時何忽第三劫十喻云論乎次義非理十喻望十喻成論義何忽云妄執耶作釋合其文別何以下釋成上義耶次義非理此中十喻者第三劫望前十喻者第二劫不順綴文若如成者應云以前十喻望此十喻成論也後義不然真妄一躰則何分能越所越耶諸義皆非理如何諸義皆非無理抄意得綴文起盡故意云以此第三劫十喻望前初二劫十喻成論此復成論也為言更述抄意云初二劫十喻望第三劫成論義也所以𮗚此十喻者指沒心實際前二劫十喻也意云今此第三十喻復𮗚此沒實除前十喻亦成論也為言初二劫妄執既論故望彼云亦也若不爾者違下今時等空性等文故等空性是第三劫十喻故又是能越心故但會難者前劫十喻屬論是不斷極細故其論者妄執也又第三重微細等釋雖文在下意指上文也合屬後者舉前意為來由耳佛樹牙生偏當等空等文故次義甚𭰹所義理相順何綴文依之唯識論云不可隨文而取其義十地論述隨聲取義有五種過云云宗家判如文取義三世諸佛之𭜨云云所以此十喻所望也前十喻能望也以此十喻於望前十喻於可讀也又實點云以此中十喻於望連彼前十喻復成論云云後義相望不定故一時具二義也故釋論云復次覺與不覺是一味故云云上諸義任意取捨但案宗家意第三劫中有二種心故一道心十喻猶屬論故以第三劫十喻云復成論也故大師一道心云前劫菩薩作論此心正覺亦非真文此釋依今文起盡故意云第二劫菩薩望第三劫覺屬論準知於第三劫中第八望第九非真是論也為言故文點云以此中乃十喻於望禮波前乃十喻復成論云云意云於第三劫中八九十喻相望第八成論故云越諸論也為言越諸論文雖通八九今顯第九勝第八矣次下云微細百六十心者重成第九所度邊也所以極細中分麁細故立微細名歟若不爾者所越論可非極細妄執何故疏第三云此空智生時極無自性心生也但知心垢盡處論不行即是第六無畏依略抄既極無位云論不行即知一道心猶論也理實言之極細妄執是障二心故一道雖斷一分極無障猶在故一道十喻亦成戲論也又義如下辨問第二劫唯六喻何云十喻耶十有增減十故初二劫五六喻皆云十喻也故疏第三云然統論此品中十緣生句略有三種摩訶般若中十喻亦具𭇥三意文又法無畏釋云法謂十緣生句也文初劫五喻非名十緣生句乎第三重微細百六十心煩惱等者或云一道心所度也其故所謂空性乃至舌身意文第八文極無自性心生句偏在第九即知第八文中第九義未終前所舉妄執唯可第八所度歟或云所謂空性等文亘二種心八九有淺𭰹越諸戲論文又可通二心所度也私一義云但第九心所斷也謂等空句對前望後𭇥無間解二義前越諸戲論者第八無間道斷極細麁分也若對彼今等空成第八證理有智𭑕空理故云等空也若望後佛法而生句又為第九無間道斷極細中細分故云微細猶如第二劫中他緣所度云智障覺心所斷云微細也佛法而生是第九證理故故知種已上釋等空以空似煩惱無歟復有下釋無邊以下文也但至云第八所中間文者作釋證依義理淺𭰹不云文言交雜今第十心在八九前又菩提心論七八證未必文前後矣又大師處處釋第八第九同云等空心八九同此文通二心義顯然者歟問下云於業煩惱解非第九所度耶彼廣通三妄煩惱即知佛事故例如云一心流轉作四相故云云業壽種者疏第一云薀阿賴耶業壽種子文智證大師釋云業壽種者第二識有三相謂自相因相果相也開因相為二謂業與種所謂業者身口意不清淨業也言種子者癡愛因緣也言壽者𮠪因所生之果報識故第八梨耶立種子及果報二名也文私案業者業種子種者煩惱種子壽是惣報躰皆在賴耶識故知今業果可通二種生死歟問第一卷釋緣業生云癡愛因緣造不清淨業生六趣身云云此但分假業果何通反易况彼華嚴猶云若依圎教不反易等期即身成佛行者受反易乎上緣業生者分假煩惱業現行並別報故在前六識今業壽種是種子并惣報故在第八識然今宗三妄頓斷故極細斷時煩惱障等一時斷故二種生死業種等又頓離也但上舉分假者真言行者無始本具邊雖有反易業果非三妄漸故不云受反易麁苦先盡細苦顯云反易也今既頓斷故分假盡時即反易無故成即身成佛義也華嚴又一斷一切斷故云但分假身窮於因位也但初劫文業煩惱株機等者雖同時斷𭔃如常且作次第也况第一釋云二乘雖破三毒亦不了了盡文分假業煩惱種子實極細斷位可斷盡歟若今教即身成佛故不存反易業果者彼業果終不離况極細法執故反易煩惱乎若爾如常斷又雖有彼種不可云受反易地前凡位無漏未起故初地以上無漏雖起非反易業歟非有分別無漏故又緣助煩惱已斷故又雖有微細妄執非二死緣助惑歟又義但分假業果歟智證釋云六趣業故又普𮗚釋云其實二苦通依一切本未不覺文又香象釋相續業用通五意故或智證釋以現行顯種也普記等助潤歟問等空是初地菩提心平等種子何云業壽種除義佛樹牙生又二地以上大悲為根何云極無自性心耶故疏第一云今修平等三業清淨惠門一切薀阿賴耶業壽種子皆悉焚得至空無垢大菩提心一切如來平等種子從悲藏中生法性牙乃至荎華果遍滿諸法界成德開敷菩提樹王文此文明鏡者歟如何業壽種除釋等空文非無依憑疏第一云即時人法戲論淨若空成自然覺不由他悟文以上二句準等空以下二句似無邊已下也佛樹牙生者空無垢菩提心也心因句中有短三心等故云芽也空無垢又業壽種除義也又義云如能難長十心時種子為因牙等為根故疏下文云初地為種子二地為牙三地為疱文但今釋中不舉平等種者疏影略舉菩提心種子疏示所斷妄執也或除字平等種子歟若不爾者如伊蘭種生栴檀牙如何又大師證者為證驚覺義此文矣故蒙驚轉入祕密故云牙生也又義云文依此相續生文通種牙歟疏家宗家牙顯歟雜問云問何故先住此不生理是空無垢大菩提心之地故亦一切如來平等種子故所以真言行人從初心住金剛種性時即法性之芽自此而生德之果於此開開故先住之文私云此文證二義德果者心果德故寶鑰釋第九心云初心之佛其德不思議德始顯一心稍現文是證初義也又云三密功德云德杲故同釋顯密異云心外礦垢於是悉盡荼莊嚴此時漸開文是證後義也或云準釋論中云從無明種出覺知樹則業種生佛牙歟疏第一云離因業生佛樹牙生文可思之既不壞因緣即入法界等者因緣及生釋有為法界及不生釋無為也不壞不動即入即是釋離字中明捨離前劫隔歷三諦故云離有為等疏中明今心不思議三諦故云即入即是也故天台釋云隔歷三諦是麁法也圎融三諦是妙法也云云又云始自華嚴終至般若但為次第三諦所攝今會實𭤧曰圎融文私云以華嚴為隔歷與今疏異耳問有為無為是事理真俗法也何云三諦耶二諦三諦開合不同一法二義差別故疏第三云今此境界而形聲然即是法界論幻即幻論法界即法界論遍一切處即遍一切處論幻故名不思議幻也文私云幻法界遍處如次假空中三諦也謂幻是假有義法界即空理異名中道遍二諦故云遍一切處也前緣起法界如次俗諦真諦也二諦門合假空為俗以中為真諦也問不思議幻者但假諦如何云三諦耶一假一切假故以空中即假諦故云不思議空及中相即又爾也故疏第三云若於一念心中明見十緣生句義則上窮無盡法界下極無盡衆生界其中一切心相皆能了了覺知以皆從緣起即空即假即中故故曰如實遍知一切心相文又天台止𮗚第六云無明一念因緣所生法即空即假即中不思議三諦一心三𮗚一切種智佛眼等法耳文故大師二教論中第八心云此宗所𮗚不過三諦一念心中即具三諦以此為妙文問離有為無為界者中道正𮗚離真俗二諦義故故疏第三云以此中道正𮗚離有為無為界極無自性心生文若爾別教離邊中道何云圎融三諦乎疏下文以不思議中道隔歷二諦也所謂圎融隔歷同雖明三諦且中道二諦顯其義也又圎融三諦雖俱躰俱用中為躰故釋竹第一云問雖云辭異意同空假如何得為躰既是不思議空假還指空假即中中為躰中即空假亦指於中三諦無非遍一切處文何况中道正𮗚既云極無自性心第八心既圎融第九心還隔歷若如來出世若不出世等者鈔第四云一切諸法住阿字本不生中若佛出世若不出世其性常住離於造作故曰諸法法爾等文大日真言相云若諸如來出現若諸如來不出諸法法爾如是住謂諸真言法爾故文疏第七云此意言如來自證法躰非佛自作非餘天人所作法爾常住而以加持力出興于世利益衆生如來無得知見在一切衆生相續中法爾成就無有缺減以於此真言躰相不如實覺故名為生死中人若能自知自見時即名一切知者一切見者是故如是知見非佛自所造作亦非他所傳授也文私云宗家第十心此文今如實知自心義同故合也釋大行論云六者非作非造自然意謂欲顯示一切諸法有佛無佛相熏相生無斷絶義法爾道理性如是故文此釋會今文歟如般若中一切法趣眼等者抄第四云言一切法趣眼等者一切法者般若中從色等歷法是也趣即歸趣謂一切法皆歸趣於眼處即法界也是趣不過者無有出過是處者也大品云云何菩薩摩訶薩得阿耨多羅三𦴭三菩提時為衆生色趣空受想行識趣空乃至一切種智趣空等何以故是色空相非趣非不趣乃至云一切法趣空是趣不過何以故空中趣非趣不可得故又論問曰般若波羅蜜非趣非不趣須菩提何以故問行般若者趣至何處佛何以言趣薩般若曰外道言法從因趣果從先世入今世從今世趣後世破是常顛倒故言無趣不趣此中須菩提以著心問佛以無著心等文私云宗家以今文證第八心疏家以般若意作釋相違如何經論文理隨冝若爾般若何背第八心乎疏第三云如極無自性心十緣生句即攝華嚴般若種種不思議境界文第九心猶攝般若况第八心乎或又此文證第九心故依般若歟下文分明故止𮗚第四云若得此意初心𭂫夫能於一念圎諸蓋故大品云一切法趣欲事是趣不過欲事尚不可得何况當趣不趣釋云趣即是有有能趣所趣故即辨俗諦欲事不可得即是明空空中無能趣所趣即辨真諦云何當有趣非趣即是辨中道當知三諦只在一欲事耳文私云準此釋者趣是有也有能所趣故即俗諦也一切法乃至更無去處也次是故乃至眼尚不可得者是即明空空中無能所趣故即真諦也何况趣非趣耶者即是辨中道也此文有雙非雙照中道謂趣不趣如次有空故亦有亦空中道也又㸦兩亡故趣不趣如次非空非有中道也當知三諦只在一眼中耳耳鼻舌身意等應準知之故云亦如是也大師以此離眼耳鼻等文證第八住心甚有𭰹意矣彼宗一心三諦為極故問大品文並止𮗚釋三諦義冝然今云離眼等未聞三諦義如何謂以大品文合今意趣眼是有義釋眼字眼尚不可得即空義當離字何况趣不趣並同離眼二字故知開為二諦合為中道也或又三諦俱在眼一字中以眼耳等各三諦歸第一實際故云離也故次為釋極無重示此意云一切諸法無不從緣生者者假諦也若從緣生即無自性者空諦也若無自性即本不生即中道也疏第七釋阿字有空不生三義中云又不生者即是中道文本不生即是心之實際者天台雖明圎融三諦以中為躰故云不生即是心之實際也玄義云正指實相直為正躰文釋籤云既是不思議空假還指空假即中中為躰文又三諦是能依別義實際是所依一心也故疏第一云又復從緣生故即空即假即中遠離一切戲論至於本不生際本不生際者即是自性清淨心文𭤩決五云心性不動假立中名亡泯三千假立空雖亡而存立假號文此中心性者今心實際所依惣躰也中離字也不動已下三諦別義故皆云假立也眼耳等文也二義雖異心實際為極故云離也行者得如是微細惠時等乃至極無自性心生也者住心論中以此文證第九心此文有多意如是者指前言也微細惠者空性心即第八心也所以𮗚一切法乃至即是心之實際者重述前假意為後心來由也前大品成天台一心三諦義畢重舉其意為極無起因也心之實際者或中道或所依一心義如先成今心實際亦復不可得者前一道無為心理無自性故起事事無得故云亦復不可得云極無自性也依之金師子章釋第五圎教云情盡躰露繁興大用起必全真像紛然略抄大師菩提心論德斯具妙用無窮證極無良有以也繁興大用像紛然二句逆次配論二句矣心實際無自性而起事事故云起必全真等耳故知心實際亦復不可得文正釋極無自性心生句也是即第九心也故下釋云行者初𮗚空性時覺一切法皆入心之實際爾時十𭤧諸佛同時現前而𭄿喻之以蒙佛教授故轉生極無自性心文此釋意者入心實際是第八心故又云如是牒已成義指例未成法之義也前已成第八心畢欲今更成第九心故微細惠者極無自性心於前空性等文有二意一有為無為相即是天台圎融三諦也二緣生無性義即華嚴法界緣起也抄第六云又云行者得如是乃至心生也云云是當當華嚴法界緣起義文所謂𮗚一切染法等者染淨諸法俱有緣生無性義故大師菩提心論夫迷之法從妄想生染法緣生妄想止除種種法同無性從真起用施諸法門淨法緣生逹於彼岸法已應捨同無性之文證第九心同今文耳故知一假文皆正證第九也次下釋此心云若住不思議地時不著於有為無為云云又義一章文皆悉釋極無自性一句故證第九而已故寶鑰下云善無畏三藏此極無自性一句悉攝華嚴教盡所以者何華嚴大意原始要終明真如法界不守自性隨緣之義文問準華嚴釋義真如隨緣義是三乘真如緣起而非一乘稱性具德故玄記中立十重唯識云六轉真成事唯識謂如來藏不守自性隨緣顯現八識王數相見種現七理事俱融唯識謂如來藏舉躰隨緣成辨諸事其自性本不生業即此理事混融無得是故一心二諦皆無得故起信云依一心法有二種門皆各惣攝一切法已上終教八融事相入唯識謂由理性圎融無得以理成事事亦鎔融牙不相得或一入一切一切入一無所障得九全事相即唯識謂依理之事事無別事理既無彼此之異合事一即一切十帝納無得唯識謂一中有一切彼一切中復有一切既一門中如是重重不可窮盡餘一一皆各如是法性圎融故令事相無得此三門別教取意此文中以真如法界隨緣義為終教以事事圎融為圎教大師何違本宗義以三乘教義成一乘義理誰信用耶有二意一云真如法界隨緣義者是一乘無盡法界緣起非三乘一相真如緣起也故復古記下云太一云一乘緣起自躰法界不同大乘緣起但能離執斷常諸過示此宗不爾一即一切無過不離無法不同也文華嚴玄門云若二乘教辨即異事顯異理若此宗即事是理等略抄華嚴問云三乘緣起者緣集有緣散即無一乘緣起即不爾緣合不有緣散不無文壽靈云三乘一相緣起一乘無盡緣起云云準此文今法界隨緣者一乘無盡緣起也二云彼宗雖云無盡緣起是一心緣起未及三密無盡緣起故云真如緣起也又雖以理成事故談事融未明性相歷然事常故故先德云顯一乘一心緣起談非性佛性然四取意般若僧正疏抄云一道無為與極無自性住心文相交難見別意一道者佛知見即佛性此佛性自性清淨故云極無自性也譬如金真每值阿練其形𭅒而其性不改也問爾者可云極有自性住心何云極無自性也其攝相歸性爾云可也文寶生御房云又直因淨菩提心照明諸法故少用功力便得除蓋除三昧見八四千煩惱實相成八四千寶聚門初心時便成正覺得如來一身無量身初位得後位功德猶論明昧是法華等顯一乘教相也或已開淨知見照法性圎融解一切業煩惱時即知一切業煩惱時即知一切業煩惱無非佛事本自無有縛令誰解耶一斷一切斷一成一切成在於一地普攝一切諸地功德因果無二始終無得猶明從微至著階位漸次有次第行布等是真言淺略華嚴等顯一乘表德教門斷惑證理行相也今真言祕教金剛一乘表德教門曰能治道品是一一行者本有內證祕密金剛智論所治惑障即一一法佛法然自性三摩地密標𢡠也何捨何取哉文此心望前二劫等者鈔第四云此心望前三劫等者三字誤書謂此心屬第三劫故第三劫極無自性心生時如蓮華盛敷故云望前二劫等言若望後二心等者此心喻八心中第五華種心第六成果心後二心者第七受用種子第八嬰童心也望此二心名果成種復能與彼後心而為種故文於業煩惱解即是如蓮華開敷而業煩惱具依即是果成種也又解此心是三心中菩提心望前來二劫論時當第三劫如蓮華盛敷望後二心即根與究竟此菩提心却為因故云如是初心佛成佛因也文朝譽述抄意云前二劫者指初二劫也根與究竟者以極無自性心為因句時次以蒙佛警更增進心為根句此即金剛心一念也後以成正覺位心為究竟句也然顯教意見今之第八地心為果位前二劫顯行滿升此地故今教以八地已上乃至十地心為成佛因初心佛矣密教行始成八地故此三漸行而論若據實尋其行者初地已上可云成佛因故疏第十一釋初地德云平等清淨離諸分別劑此名見菩提之心為初成佛種子也文皆是密教行行大空三昧故故疏第六云如上所一生補處及八地三昧是教道法門作如此耳然祕密乘人於世諦中即能通逹第一義諦者從初心時即具行大空三昧其謂不然則於一生之中不能頓滿諸地也文取意私云抄十心或三心二釋中述後釋意也今謂不爾抄師於出世間心生疏釋存三劫地前地上二意今釋何必云八地已上菩提心句耶又大師住心論第九行者得如是乃至佛成佛因疏文注釋云前二劫者指他緣一道二種住心後二心者示真言門根究竟二心文寶鑰中經如是初心乃至而業煩惱具依文與住心論少異彼不於業煩惱等二句也於此釋異義或云第二第三劫中各舉初攝後云二劫也意於前二劫中極無自性心如蓮華盛敷也為言故以論上文云是因是心望前顯教極果於後祕心初心文既顯教中有極無故或云以他緣一道二心云二劫顯中間覺心非三劫義歟釋二劫者二種住心之故或云第二劫舉他緣攝覺心第三劫唯取一道能所相望異故以一劫半云二劫也半劫又一劫攝故問在第三劫指前二劫應是初二劫例如上文云前二劫中雖云度二乘地等又望初劫未敷蓮第三劫惣應云開蓮若爾相對初劫㔫可入前劫故知抄義合疏意如何宗家釋義𭰹疏意惣持字義依處隨義可取文義前三劫相對今十住心相望也又初劫中湛𡧤證𡧤相望而分水中水上之未敷蓮準知今第三劫中一道極無相望而別未盛已盛之開蓮華故疏第一釋無量智成就文云爾時行人為此𡧤光所照無量知見自然開如蓮華敷文此文第八心故今卷中此文合所謂空性文無量智者同法華佛智無量義無量知見當彼四佛知見理然但云蓮華敷不云盛敷故知於第三劫內開敷與盛敷相望也重意云前三義中初義望字違上此心言不順下猶如等文大師釋又望前顯教者對極無指一道等云前顯教歟若爾何為證矣次義又非理何唯舉他緣一道不舉覺心乎若又攝覺心者非二劫歟故第三義為勝上下文順故隨又前諸難無故世尊以十𭤧三世佛為證等者釋心云極無自性心望顯極杲於密初心之義以十𭤧佛而證之義也故住心論九云是因是心望前顯教極果於後祕心初心初心時便成正覺冝其然也文此意十𭤧佛中且以報身所華嚴文證顯果密因之義也即以此義開示衆生云一大事因緣又云淨知見也故知以華嚴文而證顯果為密因之義源出大日非大師私義耳問今釋同法華中以大事因緣四佛知見何云顯果祕因之義耶隨義轉用矣行者解一切業煩惱時等者自此下重釋於業煩惱等文已上𭁡釋上二句也此中有法譬法中初釋初句即知下釋而業下句本自下二句如次釋成上二義連前文兩次讀之如良下譬有二種初譬中反毒為藥如次喻煩惱時即知佛事用除衆病一句通應譬本自下二句又義以譬二句對法二二句各逆次配矣又如下以譬二句對法四句而兩次配之又或此譬却顯前開華成種之義而傢具依同果復成種之意故若依後意可云像即空耳演密抄第四云知一切業煩惱等者據事則凡情謂之塵勞聖智逹為功德理則本離塵染然與一切煩惱為依故以反毒空二喻而相况爾文實注云私案變毒喻事空喻理云云阿字義第四實云又云雖解一切業煩惱者行者得此心時即名之為明明來暗謝故即是無明則行乃至生則老死等名為業煩惱解又云而業煩惱具存者淨名云不斷無明而具明逹之智又云衆生未成佛以菩提為煩惱菩薩成佛時以煩惱為菩提故華嚴疏顯三毒相普有正法彼有五義一當相即空空故是道非謂此三即是佛法般若二幻用攝生亦非即是淨名三在或用心𮗚心為道亦非即道浴流四留惑潤生長菩薩道亦非即是淨名五當相即道不同前四不思議故今第五義正與此同故無行云欲即是道恚癡亦復然如是二法中具一切佛法即斯義又如空出過衆相而像具依故下云空無垢無自性云云具可見之云云私云覺并實其意大同矣菩提心義第三云私云欲入第三劫時先𮗚性空無相菩提超第三重無明極細妄執證得極無自性瑜伽之心名超第三劫行所度惑名第三劫行所證法名淨菩提心真言初住於一分無明不斷而斷名超第三而極細妄執然猶有四十一品無明故云解業煩惱而業煩惱具依變毒為藥即是初住以上法性同躰之無明也不斷而斷斷而不斷故云解而具依也略抄大師守護釋下云一切義宗云大聖空法遠離於斷常案上來文顯家之佛滯斷常二行未出業煩惱之苦依故大日中如是初心佛成佛因故於業煩惱解而業煩惱具依等華嚴寶雲等應機之假佛未許究竟圎極之真佛文私云而業煩惱具依義疏釋與大師釋是異各據一義影略牙顯歟自宗十地有本有性德修生顯德二義疏家本有無垢十地故無間道地前諸惑斷盡故疏第三云但知心垢盡處戲論不行即是第六無畏依更欲如何表示耶文解道初地開寶聚門悟故今文云即知一切業煩惱無非佛事文不同天台法性同躰惑也又寶鑰云心外𮀑垢悉盡荼嚴漸開云云大師據修生斷惑十地故云滯斷常二行也所以菩提心論十六分明昧大日疏第四微細妄執等是也西谷義也或云修生十地有有惑無惑義矣寶生御房義云夫真言地前者是竪義也地上橫義也依十住心論前九種住心皆是因也是地前也第十即果也即地上也竪論次第淺𭰹皆是真言地前行相也橫𮗚智智平等即地上行相也又義疏中釋今文有二意一者此心乃至成種文似釋如是初心佛成佛因故文也上二句反顯下兩句順成以此心兩字應流下二句矣或讀文點皆為順釋謂如是初心佛成佛因上二句釋成佛義下二句釋因義也故住心論中疏今文合𡱈成佛因文矣於業下文下別釋行者已下文是也故疏第三今文云如前所解一切業煩惱等除初二句矣但佛兩字廣貫下文故釋歟二者於業已下文又為所釋也置故字以反順義成上佛因之義故所謂上先作盛敷成種釋合解具依等故抄上釋云於業煩惱解即是如蓮開敷而業煩惱具依即是果成種文大師守護釋同此意矣意離地前三妄故云盛敷地上微細未斷故云成種寶鑰云望前顯教極果於後祕心初心者即此意矣次行者以下釋更述別義也若依頓證人微細亦初地盡故云爾歟前義約漸證人兼顯顯密差別歟大師顯密分別為要但依前義也若爾依後義不成佛因義乎謂知無非佛事即頓證之因故云成佛因耳但疏下釋不思議幻義下句顯故爾也意異矣大師釋不釋不盡歟或又顯果後惑不存故云無非佛事依密因後惑未盡故云果復成種前後相成而成一義矣或又釋論中熏離熏俱作二釋今釋當第二是一味故釋歟問無非佛事悟唯在諸惑斷盡位耶準釋論染淨始覺悟可爾歟故仁王云菩薩未成佛時以菩提為煩惱菩薩成佛時以煩惱為菩提文又準同論五重問明無明義者分分可開此悟歟問如是初心等者寶鑰云初心時便成正覺冝其然也文以真言𭰹位初地同華嚴淺位初住豈夫可然乎有人云祕宗又立卌二位故彼宗初住入此宗初住也云云私云不爾以同位𭔃同者淺𭰹猶難辨所以彼顯極果同密初心故彼具文云是因是心望前顯教極果於後祕心初心初心時便成正覺冝其然也文既云極果顯初住乎又釋第八心云於諸顯教是究竟理智法身望真言門是則初門文但初心時便成正覺者指今如是初心佛成佛因文也何云華嚴文成祕宗義例如智論是助佛道初門之文矣問龍樹付法顯密報佛唯顯故相例不齊故大師雖智論為顯密𭅒別之證華嚴不爾如何傳持龍樹既知密能如來不思祕故大師釋云應化如來祕而不談傳法菩薩置而不論文楞伽我乘內證智可作證况大師處處釋中以釋論所大本華嚴成顯密義畢但初心者如云初心未必心住歟或隨義轉用矣若住此不思議解時等者極無自性心在初地故云住不思議等也故下文云轉生極無自性心至不思議地文問不思議解何必地上耶第六無畏云不思議幻故設雖地前何不云不思議乎既下文云不思議地豈非初地以上乎今文意回向滿心垢悉盡入初地時開一切業煩惱無非佛事悟故云不思議地也故疏第七云若到修行地授不思議果此修行地即是淨菩提心初法明門例如聲聞見諦已後復入修道位也文此文分明矣但至不思議幻者何云地前耶故疏第三釋極無自性心云即是真言行者空無垢菩提心也文又云如前所解一切業煩惱而業煩惱具依即不思議之幻也文非指今文乎文永三年七月四日于高野山丈六堂僧坊草了是偏為紹隆佛法回向菩提而已金剛資賴生年卌一
