body:
  text: 疏卷第一之四前明諸執金剛一向是如來智者謂諸執金剛雖通慈悲等從多分云一向智歟又弟一重心數尊中雖有定及慈悲等智相應云智歟或云諸執金剛或一向智或一向慈等而異菩薩各相故但智者舉一顯餘歟今此菩薩等者疏下釋云諸菩薩在悲智之間故上求下化故為第二文意云悲者化他故云下化即第三重釋迦等也智者自行故云上求即第一重執金剛也各舉一顯一矣然第二重諸菩薩在於悲智中上求下化故云又慈悲等也又四大菩薩中文殊是惠除障是定故云義定惠勒即慈普賢是悲抄普賢云行故行即大悲故云又慈悲也又四菩薩各各慈悲定惠故云義等也所謂慈氏是悲之慈故云謂佛四無量心等也文殊又定之惠故云即是具衆德義也餘菩薩又爾也故別受名結文隨應可得若依初義者菩薩名云別名也謂標諸執金剛今此菩薩成此結故意云前諸執金剛持智故云執金剛今菩薩定惠慈悲故受菩薩別名也為言問通別一雙然金剛菩薩內大眷屬通名依何云別耶答於自雖通金剛菩薩相對猶得別稱也或又下卷金剛菩薩俱名大心衆望彼云別歟又依次義者普賢慈氏等云別名歟意云四菩薩云慈氏云妙惠等名異一向智故得定惠等別名也為言後義未必為別名因故又中義非理執金剛有十九別名故故初義為勝矣亦是毗那內證㓛德者且內證外用重重或四重壇從內向外而分內外也或四重各有內外本地四重云內加持四重云外謂從法門身現羯磨身故當知諸菩薩法門等者所現加持身羯磨形也下云善知識身是也法門者能現內證法門身下云法界門上云定惠慈悲是也故此定惠等云內證㓛德也今文意云謂如執金剛內證對十智力有十佛𠛴今菩薩內證法門對十智力有十佛𠛴也為言故上釋云如來智無量且以十智力以表衆會數云云又義如執金剛法門羯磨相對有十佛𠛴今菩薩法門羯磨相對有十佛𠛴也為言又准執金剛加持身有十佛𠛴當知菩薩法門身有十佛𠛴也為言本經十佛𠛴專加持身故但疏云智者經釋互顯歟又般若釋論等者智論第三十三云如釋迦文佛未出家時車匿給使優陀那笑瞿毗耶耶輸陀等諸婇女為內眷屬出家六年苦行時五人給仕得道時喜羅陀須那𠛴多羅阿難密跡力士等是名內眷屬大眷屬者舍利弗目連摩訶迦須菩提迦旃延𠖐樓那阿𭰖豆等諸聖人及勒文殊師利陀婆羅諸阿毗致一生補處菩薩等是名大眷屬文私云今所引是此釋取意略抄彼論是大品般若釋故云般若釋論也問智論次下云復次佛有二種身一者法性生身二者隨世間身世間身眷屬如先法性生身者有無量無數阿僧一生補處菩薩侍從文准此文釋迦佛非生身何云生身佛耶答生身有二謂法性生身父母生身也疏生身者父母生身也即下文隨世間身是也故智論第九云佛有二種身一者法性身二者父母生身文故無違耳問阿難成道夜初生二十五嵗時詣佛所又舍利弗等又成道以後弟子何彼等云內大眷屬耶答惣佛在世云成道時未必初成時歟或又九世相入意歟手草云問疏普賢等菩薩云一一是毗那內證㓛德何故云普賢等是大眷屬答本地之時皆無非那內證之德今事迹故云爾文及彌勒文殊等者法華文句云彌勒此云慈氏文上生經疏云梅咀唎耶唐云慈也古云彌帝或勒皆訛也文玄應音義云正理論云阿氏多此云無勝舊云𦒿多或作阿逸多皆訛也文文殊釋至下可知矣問一生補處者何義乎答大論第七云滿濡尸利慈氏菩薩是諸菩薩皆是補處紹尊位者略抄問一生者何生耶答法華攝釋第一云問一生補處何等生名為一生耶答且如勒昔在人中各一生事一大生也若據小生者而有四也天中中有及本有二人中中有及本有二合為四生如七生等依大生實理論生有二十八云云私云此意都卒上生𨶒浮下生合云一生歟遁麟記云一生所繫菩薩者謂無始來為多生死之所繫故今唯一生所繫未得成佛故言一生所繫菩薩文私云此𨶒浮半生云一生歟攝釋云菩薩有三一者一生所繫二者最後之身三者㘴於道樹上生即一生所繫下生𡱈得二身今此三生唯化佛餘未見文以理而言亦通餘有云云今疏第六云今此經宗言一生者未至第十一地唯少如來一位未得證知更有一轉法性生即補佛所故名一生補處略抄私云此成佛位云一生也自當攝釋第三生然自證化他法應異耳又智論第三十八云問曰兜卒天上何以一生補處不二生三生答曰復次有人言但大者不限於小文私案論意大生故云一生苦限小者可云二生三生歟問若依小生何不云四生耶答攝釋云若爾何故智度論勒三生答以在人中即得成佛故除人中本有一生但言三也文私云𨶒浮下生時即成佛故除本有生也為言今謂佛加持身等者今加持身者即毗舍那也故上文云毗舍那加持尊特身又謂以法身成道例生身成道耳或又內眷屬云加持身以法身眷屬例生身眷屬故故次上文云以加持故現為一善知識身也文問何故名內大耶答雜問答云執金剛衆持如來密故為內普賢等衆定惠相應行如來事故為大文亦作淺深者若依今釋并執金剛菩薩名又准生身內大則內淺大深歟若四重次第內深大淺也然實無淺深上淺深故二義無相違歟故大品等者大品般若經第一序品云復次舍利弗菩薩摩訶薩欲在一切聲聞辟支佛前欲給侍諸佛欲為諸佛內眷屬欲得大眷屬欲得菩薩眷屬欲淨報大施當學般若彼羅蜜文智論三十三釋今經文如先引但疏釋先引經後舉可知矣普賢菩薩者文句十云大論觀經同名遍吉此經名普賢皆漢語梵邲輸陀此云普賢文義疏云外國名三𭦟多陀羅三𭦟此云普也陀羅云賢此土亦名遍吉文謂菩提心所起行等者大師釋云普賢圎因以圎融三法為宗即是一切如來菩提心行身也文義釋第五十卷本釋普賢云即是大日圎因而佛圎因之果也文私云普賢圎因者持普賢即圎因故大日圎因者依主大日之圎因故此圎因是通菩提心及行俱大日之因故菩提心行如次能所起同是普賢躰也及身口意者當大師釋身字猶如身祕密即法佛三密故准此文者今三密即圎因之果也若因者普賢三密也悉皆等二句釋上普義純一等兩句釋上賢義耳故法藏釋云德周法界曰普淨順善稱賢文又玄贊云仁慈惠悟曰賢德利周滿名普此由內證一真外成德所以德利周𬾨仁慈惠悟故名普賢般若理趣云一切有情皆如來藏普賢菩薩遍自躰故由證普遍賢善之理能證之道名為普賢或內證此普遍賢理外彰三業無所不賢故名普賢文私云疏三釋普義贊就三成賢義矣慈氏菩薩者慈恩玄贊第二云勒姓慈文嘉祥義疏第一云勒者此云慈也過去值勒佛發名勒也出一切智光仙人經勒昔作一切智光仙人值慈氏佛慈三昧經故因慈也華嚴經云初得慈三昧名慈也文又心地觀經云勒菩薩法王子從初發心不食肉以是因緣名慈氏文又賢愚經云國王象師調象即慈心生從是得名慈氏文此中賢愚經并玄贊釋意同今疏釋歟佛心是大慈悲故以慈為種姓今菩薩從彼種姓中生故云慈氏基師勒姓慈者又此意歟不斷佛家者二本義釋俱家字作種矣謂佛四無量心等者祕藏記釋四無量心云慈悲喜捨與樂為慈苦為悲不𡧱為喜捨亘三事文義章第八四無量義云四無量者化物心也化心不同一門四謂慈悲喜捨愛憐名慈惻愴曰悲慶恱名喜亡壞稱捨心無存著故曰亡壞經中名之以為無量亦云四等緣於無量諸衆生起故名無量等緣一切故復名等文問此菩薩偏大慈與樂得名何云四無量心耶答疏云今以慈為稱首文意云此菩薩雖具四無量慈心勝故取為首之慈為稱也為言或此菩薩正雖主慈具餘三故云四無量正故云稱首也問四中慈為首法必然歟又依人耶答一往可人若依觀音悲為首故理實法又可爾互相依故義章第八云次論主伴如龍樹言慈為妙主餘三隨從如民從王慈心正是與樂之意故為主無悲苦與樂不成故悲隨慈無喜除嫉與樂不勝故喜隨慈無捨除㝵與樂不等故捨隨慈蓋乃且據一門為論理實四行皆得為主齊得為伴互相隨故文又云言躰用者初一慈行是其德躰德用如維摩慈是躰故後三用故隨人化益此等皆是對人用也一相如是理實四行齊得為躰並得為用互相依故文可思之上云普賢等者釋來由也自證之德者義釋中釋普賢佛境界莊嚴三昧云此佛境界者即是諸佛自證不思議平等心地莊嚴謂大悲胎藏荼羅文欲化衆生等者釋從自證德起慈之義也妙吉祥菩薩等者玄贊第二云𭦗殊室利云妙吉祥興衆生樂是北方常喜世界歡喜藏摩𡰱寶積佛也聞名能四重等罪文探玄記第四云文殊師利或云尸利或云殊室利或為敬首或云傳首或又云濡首又云妙德又云妙吉祥又梵語喚頭為室利吉祥德等亦為室利故致譯不同也文或云妙德等者漢名三種中前後二名釋其義今名何不釋耶文句二云文殊師利此云妙德大經云了了見佛性猶如妙德等文思益經云雖諸法而不起法相不起非法相故名妙德文亦名妙音者問法華文殊妙音別躰異名何今為文殊名耶答妙樂五百問論云妙音海來文此釋文殊海來也應知雖別有妙音文殊又名妙音也言以大慈悲力等者又來由也演妙法音者釋妙音義也義釋云此菩薩通達如來甚深般若唯是佛佛自證不可與人是故以嬰兒行演人法無我略抄嬰兒行者弘第八引釋名云人之初生曰嬰兒者胸前曰嬰接之嬰前而乳養之故曰嬰也文今推以二空對自證云嬰兒行歟若以無分別法等者或云文殊妙惠法上有斷惑顯理德云除蓋障也云云私云今文法𨐫影略互顯謂法中舉能斷法而顯所顯理喻中舉所顯日示披雲風也問今無分別法者定惠中何耶答既云諸論可無分別智依之摩訶衍論正躰智斷隨相云云論即隨相云諸論識故或又定今文句是明除蓋障定故法藏釋理定云塵相既止無所分別故云止也文今無分別可准知之况智斷惑專依定故修惠唯斷惑散惠不爾故又義定惠名從增勝實通止觀故定亦斷惑何𭁆故法藏釋云隨相而論止名定觀名惠就實而言定通止觀惠亦如是文又義釋云即法性之悲以自在力能除一切衆生一切蓋障文依此釋大悲斷惑歟此悲即法性故云無分別法也問初義舉前妙惠㓛不釋今三昧歟第二義與復次釋何異乎第三義似定惠雜亂矣後義後得智猶不斷况所起大悲乎答智斷惑皆依定故推窮勝能在於定故云定何𭁆猶如摩訶衍稱矣次義正釋法斷疑之次弟故云次妙音明之也復次釋六度次第故云次妙惠明之般若禪定六度次第故次義定惠與止觀有同異二義何失後義彼性宗後得智許斷證今宗又大悲斷惑何失如來諸有所作等者釋來由也諸有所作者文殊妙惠法也一事因緣者除蓋障斷惑證理也復次行人等者來由別釋也謂般若者文殊也禪定者今菩薩也斷惑㓛專依定故或又正釋惣為除蓋障釋復次為來由歟既云如來所作未必文殊故然故次妙音明之釋難速故先義為吉矣此四菩薩即是佛身四德等者鈔第二云佛身四德者一行論二佛宗不斷三大悲演法四深定除障如是次第而配屬之文或云今四菩薩是既云佛身四德八四隅菩薩歟其故思第二重菩薩阿闍梨所傳荼羅中文殊除蓋障地藏空藏也又現圖中但有地藏空藏除蓋障三菩薩然今四菩薩中二菩薩雖擬第二重三菩薩專同八四行况復疏第十六云又四菩薩普賢巽文殊坤慈氏乾觀音艮是其位也前緣起列衆中或以除蓋障觀音或以除一切𢙣趣文殊也義各異課用一事亦得也此中用觀音為正也文既云緣起是序品義故大般若中以序品名緣起品也云列衆非今文乎但大眷屬者中臺惣躰是心王邊別相即心數故云眷屬也故大師釋云大毗那如來與自眷屬四種法身住金剛法界宮云云又義既云大眷屬可第二重故疏第三云從大悲行現第二重諸大眷屬云云又云從心已下是持大悲行諸大眷屬云云當卷上文釋大眷屬云諸菩薩大悲𭤧便普門攝受文文義是同又第六云次造第二重四菩薩等諸大眷屬云云既云四菩薩非今四菩薩乎况復內大眷屬專可依親近次第而八四隅菩薩親近於如來猶近自第一重何不云內眷屬矣但疏并現圖壇第二重諸尊相違者不舉諸尊盡歟依之疏第二十云觀音文殊普賢勒已在八中漸出干外故次圎中復有文殊觀音等云云此文意於三重壇第一重為初第二重云次圎也爰知今四菩薩在第二重也第十六文者具緣品歟具緣品經云普賢慈氏尊及與除蓋障除一切𢙣趣文以除𢙣趣文殊者當于此文矣今品中無除𢙣趣故具緣支分故云緣起歟又義凡四行菩薩第二重四菩薩其躰同故或四行邊云佛身四德或眷屬邊云第二重也十六卷文或以除障觀音者今品也或以除𢙣趣文殊者具緣品也若俱具緣品者不可𣇣初或字二或字是顯兩品耳或云觀音在八自性身在第二重受用身在第三重變化身餘尊又可爾耳尋云除蓋觀音同躰異名歟除𢙣文殊亦爾乎答大師陀之次第九字配九尊云阿觀音羅除蓋障云云小野小眼毒女舉八菩薩云觀自在菩薩地藏菩薩除蓋障菩薩云云依此等釋別躰菩薩歟或云觀音除蓋障真言同何非同躰矣然言雖同躰是別例如四佛四波雖同躰是別又如勒如意輪讃是一其躰異矣况復胎藏次第二菩薩言別也又般若寺抄云除蓋障無能勝文文殊除𢙣趣同異准知之問佛身四德文何故四菩薩云四德耶答般若寺抄云普賢是菩提慈氏大慈大悲普門𭤧便文殊是大智斷用除蓋障是大空𡧘照𭤧便所謂常樂我淨四德也云云依此釋者四菩薩為常樂我淨四德也大師法華開題云東南𭤧普賢即大捨德西南𭤧文殊則大喜德西北𭤧觀音即大悲智東北𭤧慈氏則大慈智文此逆次為慈悲喜捨又千手䡄中自東南順次為慈悲喜捨此等順逆雖異四德義同又祕藏記中普賢空藏觀音空庫如次為慈悲喜捨也金剛界次第等又同之尋云第一重第二重十三大院𭤧如何答第一重上𭤧遍智院又云佛母院下𭤧五大院左𭤧金剛手院右𭤧觀音院第二重上𭤧文殊院下𭤧空藏院左𭤧除蓋障院右𭤧地藏院第三重上𭤧釋迦院現圖中釋迦為第二重文殊為第三重也下𭤧蘇悉地院外金剛部院廽四𭤧為第三重也尋云今經中盡十三大院乎答菩提心義第三安然云二所中十三院如具緣品圖尊中有十院云初中臺八二初重遍知等佛部三觀音等蓮華部四金剛手金剛部五二明王加上遍知為佛部也六第三重釋迦等七第二重文殊等八除蓋障九地藏十空藏轉字品中有十一院一中臺二遍知三觀世音四金剛手五二明王六四大護七釋迦文八文殊九除蓋障十地藏十一空藏大儀䡄中更加二院為十三院文釋論云菩提等者智論第四云問曰何等名菩提何等名薩答曰菩提名諸佛道薩名或衆生或大心是人諸佛道㓛德盡欲得其心不可斷不可破如金剛山是名大心如偈一切諸佛法智惠及戒定能利益一切是名為菩提其心不可動能忍成道事不斷亦不破是心名薩文私云是人諸佛道㓛德盡欲得者忍樂修行等其心不斷等者堅持不捨義也般若寺抄云有所云道心者樂求菩提有情故云菩提薩文復次此人等者智論第五云問曰何名摩訶薩答摩訶者大薩名衆生或名勇心此人心能為大事不退不還大勇心故名摩訶薩復次摩訶薩者於多衆生中最為上首是故名為摩訶薩復次多衆生中起大慈大悲成立大乘能行大道得最大處故名摩訶薩復次大人相成就故名摩訶薩復次必能法破一切衆生及己身大邪見大愛大我心等諸煩惱故名為摩訶薩文惠影疏第二云大人者以其諸德斯𬾨故得稱文私云此中復次多衆生已下忍樂修行之義也以上堅持不捨之意也今文智論第四第五二文也第四中釋菩提故題次云釋初品中菩提第五文第五卷釋摩訶薩故題次云釋初品中摩訶薩第六文又於摩訶薩釋有正釋復次多釋然今疏中菩提為正釋摩訶薩為復次釋恐似違論文乎私案論中文異故為非正復之別釋疏中二名雖異目於一躰故為正釋復次歟故大師釋云又菩提薩亦為摩訶薩文或又疏中復次者非對正釋釋別文故云復次猶如起信論中云復次言意識等也又第五文雖有多釋同摩訶薩釋故疏為一種釋歟木𢟷義云薩與摩訶薩為正釋復次但薩是自利義摩訶薩是利他義也云云又准智論正文云及與己身摩訶薩又自利歟大邪見大愛等者鈔第二云疏大邪見大愛等者𣵀槃云一切煩惱邪見攝盡謂破壞三寶焚燒善根戒經十種謗三寶為最重故邪見稱大若據發潤生死流轉無明愛取為大若據遠隨現行障無學道我愛為大餘可名輕若煩惱當躰相望則十大煩惱為重隨惑為輕等今此智人必能法破壞故名摩訶薩文此索多者等者疏第十七持明禁戒品云猶行大求大法起大行成大菩提事所謂普令衆生入佛知見故名大士也此有情者𣑽音索多是著義猶如世間人深著身心不能暫離也今菩提索多亦爾此大菩提行乃至無有一念𠇲息放捨之心故名索多也又名薩是有情義以於有情之中能修無上道荷一切諸餘衆生即是衆生之中無上故名大有情也衆生隨所執著義今能自出後令他出故名大有情也文私云索多是著義者同今索多者忍樂修行堅持不捨之義也薩是有情義者又同今薩名衆生之釋也雜問答云又薩者梵音正應言索多若以義言之是堅持不捨之義也文鈔第二云前云薩直呼於人今云索多乃屬人之㓛業即是忍樂修行堅持不捨言聲明有如是法者即八轉聲法也謂前云薩直目衆生之躰即躰聲也今云索多直屬衆生之即聲也文觀鈔云薩衆生直依人躰故云躰聲索多忍樂修行等義是用故云聲也云云範抄云躰聲躰文故云不呼入聲索多讀點故云聲也云云躰是八轉聲中其二也或不流便者十四本同今文十卷義釋流字作當字矣薩略有三種者問大師釋云又薩有四愚識金智是也文其數相違如何答於菩提薩且顯密人開金智也故雜問答云問何言愚童等耶答六道凡夫名愚童聲聞緣覺名為有識修佛道人名為菩提問彼金薩此三中是何答即第三人文故知金薩是第三開也又五祕密儀䡄云有三種薩所謂愚童薩智薩金剛薩文此文開金智以有識合愚童歟釋論中二乘攝邪定故又高尾口云四種薩如次凡夫二乘菩薩佛取意此意金智合更開佛歟佛又菩提薩攝故或金薩云佛歟密人皆果地人故問金薩者何菩薩耶答或云四大菩薩云金薩蕳顯菩薩密菩薩皆云金薩歟今云但金剛手也問答中上釋祕密主義畢云此菩薩名金剛薩此云彼金剛薩之故又五祕密䡄云以金剛薩開其二種薩修行得此金剛乘人即名金剛薩文准此釋通四行何過凡三四薩顯密分別隨冝不定今就諸大菩薩文出三種薩故此中愚童有識是第三重生身眷屬二乘世天等也菩提薩四大菩薩等也然第一重執金剛等疏中攝屬未明故彼第一重金薩等即第三人也云也故知今此三種薩三重聖衆也但祕鍵釋𩔰密判薩歟或又彼探彼經深祕意成四行菩薩三摩地也問愚童不知因果六道凡夫有識興度想定性二乘何云荼聖衆乎答十界輪圎荼故六道二乘又海會聖衆也問若爾胎藏界所列六道等衆生皆可實類乎若云實類者今此荼是從本𡸁迹之圎壇大悲利生之海會是故中臺自性之佛漸現三重荼之聖衆八受用之尊專成四種法身之化用當知胎藏諸尊皆以佛智所現云事若實類凡夫見之可成罪之有何益故大師釋胎藏聖衆云有從果向因人無從因至果人云云若云非實類者疏下釋云我是凡夫外道𢙣趣衆生亦名五逆大邪見人大悲荼羅正表此義也云云又先德釋云不改九界迷情悉因等流法身云云爾者㔫右不明如何答凡真言宗義專此事顯祕藏幽㫖獨此義極所謂今教意四重荼之聖衆皆是本有常住之佛躰六道四生之群類併又自性清淨之法身也是以重重帝網之莊嚴無一法而漏草木智智無邊之聖衆無一類而捨含識若除實類則圎壇稱難成若限權化則輪圎稱易闕者歟故知佛智照見者凡夫本等流法身又依密名字者實類性荼聖衆若爾挫實類而云權化何𭁆故金界次第云入我我入故本尊與我一躰無別但為表本迹義有加持㱕依觀云云此意未斷惑之行者非為本尊之𡸁迹乎然則我等皆不動自性而成六道四生之形隨順無明而受三途八難之苦尋源汲流皆是那之𡸁迹也挫實類大悲本尊何𭁆推本見跡併又法身之應現也凡夫祈無邊悉地豈空若𭤽捨實類尋化爭成衆生即佛之觀偏𢙣凡夫愛聖者誰開凡聖不二之覺乎大悲𭦗荼羅正表此義也甚有深意者歟伏惟我宗意現覺諸法之故貪嗔癡𭞙現顯明王忿怒之姿直諸法之故欲觸愛𭞙直成菩薩慈悲之質五趣四生之鬼畜隔之永沉三途之苦海八苦五𮕱之人天融之即到五智之覺岸迷悟在己無執而到蓋此謂歟况復彼顯乘猶性𢙣通融之故馳煩𢙉即煩𢙉之談此密乘豈性相歷然之故無生死即生死之義而已一者愚童等者鈔第二云愚謂愚癡童謂嬰童取未會分別也下經云愚童凡夫類猶如羝羊文不知實諦因果等者不知四聖諦世出世因果之道理故世間三心此中攝歟十六行相觀門是二乘所行故况修行義第一心難得二三有五戒十善修行故心行邪道下四句初二句忍樂修行義後兩句堅持不捨之義也猶如下顯不捨義歟二者有識薩等者鈔第二云疏二者有識者謂有所識知者也對前愚童故稱有識也文私云有所識知者二乘初覺知生死過患故云有識也又准下文云識性二乘求𣵀槃之邊云有識歟性者理性故或二俱存故云有識前後文互顯故覺知等釋忍樂修行義著保化城等釋堅持不捨義也於如來㓛德者釋二乘不名菩提薩之由也問二乘亦得菩提何不名菩提薩乎答安然釋云三乘皆名菩提而二乘不名摩訶薩文准此釋今菩提薩是摩訶薩故不通二乘歟又智論第四云復次三種道皆是菩提一者佛道二者聲聞道三者辟支佛道辟支佛道聲聞道雖得菩提而不稱為菩提佛㓛德中菩提稱為菩提是名菩提薩文依此文菩提薩名但佛菩提故不通二乘何以摩訶薩蕳彼乎恐安公釋違智論文歟出過一切臆度論等者鈔第二云一切之言攝盡內外有諸外道計我自性即同欲界或同色無色界乃至謂非想處即是𣵀槃又一切有道人言神人一切法門中求不可得如龜毛兔角常無而隂界入實有自性以如是等論法故蓋由不識其心今此菩提出過如是臆度論種種過𭁆一向純淨即是衆生本心了知此者名之為菩提薩也文於是人中等者安然云三乘皆名菩薩唯菩薩名摩訶薩文慈恩釋云揀小菩薩若異二乘故云摩訶薩也文明群機嘉會之時等者五大明王義云嘉會者是一時義法王啓運之日大衆嘉會之時也文玄贊一云此有二義一法王啓化機器咸集聼事訖惣名一時二者聼者共相會遇時分無別故言一時文文句引肇師釋云法王啓運嘉會之時云云同記云啓初開也運合冝也嘉善也佛法大運必稱物機故云嘉會稱機品云云又疏第四云良日晨者意在菩提心嘉會之晨也文有人云自性所成眷屬為來流通示現群機之相也又云有三種壇謂祕密壇法身嘉會壇報身大悲壇應身今於隨他法界宮現他受用相故云群機嘉會也云云有人云普賢金剛手等各引實行菩薩為當機衆故云群機嘉會也云云私云三義中初義為勝自受法樂故不可有實行又自性身土故不可云他受用也所以然者上舉執金剛諸菩薩畢結此等大衆為聼法故而云次明群機嘉會應知上金剛菩薩云群機理實雖三世常恆為未來流通准如常示此相也若十佛𠛴等者若不定義舉伴顯主也經中大日并執金剛等各住自證三昧句真言故即真言藏品等是也若不爾者何在次明群機嘉會之時所同聞法之文下明此義矣故知正時也故疏第六云若現世天身則彼天三昧道若現聲聞身則聲聞三昧道當知此中偈頌如是無量𠛴塵非世間結集經卷所能具載文主伴俱雖大日獨為教主故下文云如此時中佛何法耳或云今此文重釋上大衆各為聼法以三密而供養大日也若不爾者何不舉大日如此儀式皆今經時分故云次明等也今謂時分義縱雖廣通所同聞法但取正也上既云然此經流布等下文云爾時住於佛日而演法此乃望於流通結集而正時云各各廣演則無限量等也當知今時求異如常八亇年等時時分法無邊際限量故結集者惣云住於佛日等也然字是結前義結成前時法也爾時住於佛日等者或云凡有三種日一𠀍間因如世間至相推二圎明日以淨眼至之異三如來日然以至日也或云文分為二然以下釋加持故句以上釋越三時如來之日文也私云此日有二種一實相之日此中有能越所越此即釋經越三時之文也此日是本地身自證之日也謂云圎明常住又云實相之日此意矣二然以下如來之日以佛神力逗衆機延自在釋經如來之日句也此即住加持今經之時也三平等句是所法也加持故三字若能加持則大日如來也若據所加持時法二種也大疏抄云意離三際始終常住不變大日如來加持故此法門言也文或又通釋經二句文也以淨眼下𢝰明能越時也延促自在又非世間日故彼長短定故此延促自在故故知經中越字𭇥二義也能越中舉自證為加持來由也若無自證則加持何故起矣例如上釋集會舉內證而為加持起因矣問如來日是於加持世界而逗實行應加持日故或云令瑜伽行者或云咸適衆機此意也依之疏第六云然諸行人若深入瑜伽境界三昧時自當了了聼聞如正時無異是故名為佛加持日也文何答凡今經遠被未來機故云行者云機歟或又自性所成眷屬為未來流通假現此相故云爾矣但第六卷釋者加持日有二種謂今經會自性加持身時云正時是也行者聼聞時他受加持身行相故異也或又此云佛日云如來日彼云加持日故其意別耳又寶淨院僧正解第六文云於此文可有二義為自受法樂為他受法樂若瑜伽行人入三昧時了了聼聞者隨他義如正時者隨自云云或述意云行者顯得邊云隨他法爾恆為隨自也云云問今經一代問可云何時耶答今經法身非釋迦何作此問耶但智證大師㱕云𢝰十𭤧三世修多羅同顯三句本無異轍明知在一切經後文又小野纂要引出生義畢云法華經後真言文先師云以第六文案今佛日義一代之間大日經時是初七日判定耳故十地論云以初七日定不法思惟行故自受法樂故文意云一切義成就菩薩依字觀唱後夜成道法身先初七日隨自意大日經故云自受法樂故然顯一乘機隔聞故云思惟行故是故住化他加持身他受用身第二七日隨他意華嚴一乘也例如彼第二七日華嚴會小機隔聞云思惟故更赴鹿𮏑而小乘法門華嚴經云我起道場詣婆羅奈文此意也又此初七日實相之日故圎明常住也然又佛神力故延促自在故云佛日也例如彼華嚴第二七日念劫圎融故九世相入耳重意云後夜成道今經者後夜丑寅不二時也即示生佛不二義此時是昨今不二時故成道又即身成佛故今經又即事而真故謂在不二時唱不二覺不二教也時人教相應矣故遺告云吾示不二一心云云依此祈請於久米道場感得今經可思之又今經開題云不二中不二本法文又密嚴院釋云大日經能教主不二惣躰本地法身也文問尅定時何云三世常恆耶答雖尅定其時又不恆延促無㝵故念劫圎融故彼華嚴猶雖第二七日許恆華嚴况祕宗時乎延促自在等者維摩經云或有衆生樂久住世而可度者菩薩即演七日以為一劫令彼衆坐謂之一劫或有衆生不樂久住而可度者菩薩即促一劫以為七日令彼衆生謂之七日云云法華經云五十小劫佛神力故令諸衆生謂如半日文日行四天下乃至三十時等者鈔第二云智論云日名從旦至夕初分中分後分夜亦三分一日一夜有三十時春秋分時十五時屬晝十五時屬夜餘時增减五月晝十八時夜十二時十一月此言十五時屬晝三分中各五時也文又智證大師鈔云疏云日行四天下一周晝夜各有初中後分乃至三十時等又第四云西𭤧曆法晝夜各有三十時云云今撿西𫭫記云三十臘為一牟呼栗多又俱舍頌云百二十𠛴那為恆𠛴那量臘縛此六十此三十須臾此三十晝夜今案俱舍須西𫭫牟呼栗多彼此量同也以此牟呼栗多五箇經於日夜合六時即成五六三十也若日夜各有三十時者日夜三時各各具二合十二時此日之六時各加五牟呼栗多即五六三十也夜亦如是故言日夜各有三十時又案之初中後三分各通於晝夜合成六時此六時各各具十故歷日夜即成六十各計至於三十也各字之㔟可通冠三十字第四卷云日夜各有三十時故又初中後時各各可有二分合成六時六時各五成五六三十也即與前案不相異也文私云前抄春秋分時者晝夜停等時春秋時正也晝夜各有十五時合成三十時也五月十一月者極長極短故有十八十二時也中間增减可知具如俱舍頌疏十一也故知日行此州雖晝夜時有等不等隨在何位晝夜合則有三十時也初中後三分是日夜各以二時可為一分歟此釋違下文云晝夜各有三十時之文也後抄意存二義初意日夜各有初中後分合有六時此一時各經五亇牟呼栗多成五六三十也此晝夜停等時歟後義晝夜各有三十時也此中又有二意初義日夜三時初中後各具二合十二時一時間經五箇也後義初中後三分各通晝夜合六時此一時間經十箇也此意前二時合為一時故六時十二時雖異其意無違後兩解意以今文同第四釋然日夜各有三十時違俱舍西𫭫等諸師釋此甚難解今文各字被初中後不及三十時歟言日夜各有初中後分計牟呼栗多合至三十時也為言若爾下文恐各字誤歟可合字歟若又以下文為定量今文各字貫三十時讀之三十時者非牟呼栗多歟又嘉祥法華統略云時量短長有十二節極短名𠛴那為一念百二十念為一瞬六十瞬為一息三十息為一須臾三十須臾為一日夜十五日夜為半月兩半月為一月文私云此又同俱舍等今瞬者彼恆𠛴那也息者彼臘縛也當知今晝夜各有三十時准彼等一時分經二亇半牟呼栗多歟言如來種種三等者雜問答云身密語真言心妙觀平等相應至大日尊遍一切處三平等究竟實際若三中一闕即不能至平等之處如車一輪闕都無所到是即三平等義也文私云疏如來三至一實理大師釋據行者三證大日一實理而互顯也一實理者阿字本不生理也身等於語等者又應云心等於語等亦可云心等於身等順逆無㝵橫竪涉入故今舉一隅顯三端也一心院僧都云故上人明惠房云華嚴一乘雖明三密平等義不及祕宗談所謂華嚴雖云身語㱕心而平等全無以意密㱕身語以一心為本故密宗不然意密亦㱕身語六大為本故故淺深大異矣問三密平等冝然今自他平等與華嚴三無差別有淺深耶答實範上人云此三平等自法界故彼無差別由理融故是其淺深也云云同一醎味者智論三十五云𨐫如衆川流各各異色異味入於大海同為一味一名文其迹所住處者以其迹類下謂修如是道迹句即進行義也今行者踐先佛道跡而修行故云道迹也故釋論第七云三世一切菩薩衆如是如是如如隨踐順行應轉如其次第不超數量不過位地超入義故文以所住處同次第修行得住三平等處即住處義也謂大日尊三平等究竟實際位也此位究竟處故云所住處也句是究竟義故言辭句逗義亦如是者此意耳義究竟云句故重意云今三密法門至一實究竟位𭤧便故云三平等句也為言句逗者高雄口云一句與逗差別何答云已止乃所留乎云句足所留乎云逗也言句者梵云談鉢未知正字此云所住處也云云為所入門者圎城寺金剛界八卷次第云尋云三密法門者能通門歟為當內證法歟或云究竟內證法門也云云又安然云以三密𭤧便為門見如來加持身取意或云今此宗以彼法即為門門即法也如抄以自身三入本尊三密時自身三業能入門本尊三密所入境也又以本尊三密入行者三業之可知故知門即法法即門是一躰不二也云云或云且以三密𭤧便望行者云所入對法界亦能入也云云私云三平等故加持受用身即行者平等智身故為欲顯實無能所故云所入門也謂以身平等之密等者疏第十七云自真實謂自持真言手印想於本尊以專念故能見本尊本尊者即是真實之理非但見本尊而已又如實觀我之身即同本尊故名真實也此有三平等之𭤧便身即也語即真言也心即本尊也此三事觀其真實究竟皆等我此三平等與一切如來三平等無異是故真實也行者修行時佛海大會定信得入若有疑慮則真言之行終不能成文又云先作三平等之𭤧便謂真言身及觀本尊見本尊時其心相應而住無有能動亂之者又觀所持真言從本尊心中流出而入其口猶如華無有間絁即以如是佛之㓛德自滿其身亦不從身萸流出也文私云今釋同此文矣如是加持受用身等者或云加持受用身者他受用身也毗那遍一切身者自受用身也平等智身者自性身也云云私云疏第七云行者但一心諦緣觀此聲字自當見佛加持身若見加持身即見本地身若見本地身即是行者自心也文准此文遍一切身者本地身也何云自受用身乎故知受用身者智法身即識大也遍一切身者理法身即五大也是本尊六大也平等智身者行者五薀也智者四薀身者色薀也所謂行者四薀是本尊識大開之本尊五大亦行者色薀開之合二准之識大四薀俱五智之德五大色薀同五輪之躰也本尊六大加入周遍行者五薀故云加持云遍也行者五薀本尊六大平等一味故云平等也斯則無能所而能所也不到而到即身成佛之理思之故當卷下釋云一切衆生色心實相常是毗舍那平等智身文可思之或云今宗行果皆字本不生上因行果德故謂本不生故云不行不到然行不生而到不生際故云而行而到也又義今教明無盡莊嚴本具故不行不到蕳因海之行果之言也而行而到顯性海行果之文也一切衆生皆入其中者自心即菩提故更無能所入然如實知自心故云皆入其中也時彼菩薩普賢等者開題意已上通序自下別序也二教論意已上自性身法自下受用身法云云兩釋異何謂通序五句文述當經教主處等自性土之行相故云自性身法也時彼已下三節文明現瑞竒特事故云別序又此瑞相示加持世界事故為三身法文也故無違耳又一義云毗那如來迅示現等文𭇥惣別二意所謂毗舍那如來者自性身即上薄伽梵即今經教主也時彼菩薩祕密主又前自性土同聞也示現無𥁞莊嚴藏是正加持世界事也今此無盡藏通三身是惣也𡱈受用是別也謂將此乃至當廣之者釋彼文之惣義復次普賢已下釋彼文之別句義也普賢祕密主等者所現他受用土同聞解門所現善知識也又轉釋佛莊嚴藏等文更釋上惣中變化身也又廣前相等等流身又准知矣大師且依別意故配三身也又所謂初發心已下得益文合惣別意大師此得益為欲顯通三身故等流文除之疏家屬等流身為示此文別義也故知疏家宗家影略惣別互顯也應知兩師釋文雖似異義㫖終無違耳問何以故二種釋知惣別義乎答初釋感動大衆之言不𡱈受用悉現境界之文廣通三身况法華序分等例廣可𥁞竒瑞故况復大師金剛般若開題云所謂德者荼羅無𥁞嚴藏也謂福德者即四種法身相好也文此釋無𥁞嚴藏福德云四種法身豈非惣句乎又復次釋先釋無𥁞藏為今經瑞畢𣇣所謂言釋無𥁞藏義而引經釋成時云一一皆現佛加持身既云佛加持身是受用身如來也報身亦雖佛身次下文別明故又至等流文云非但佛身等非今佛加持身等乎故知惣別義分明歟又義經文但別也大師注受用身故但疏初釋惣𤗊三身文通釋三身為今經瑞也復次釋別釋受用身故云惣別歟或又兩釋俱惣釋三身及得益是竒瑞義也所謂已下文是別也初中正釋大衆感動復次實行引入也問前四菩薩十九金剛皆悉為上首今何𡱈普賢密主乎答私云上自性會眷屬今加持土伴類故主伴俱有異歟或又此菩薩密主雖自性土眷屬且為顯主伴重重作如此例如法華地涌菩薩上一一菩薩唱導之首下云是四菩薩最為上首也或義云坂房覺此菩薩祕密主即為他受用身也故五祕密經云金剛薩他受用身云云私云此義非理下等流假上二身而云非但示現佛身何菩薩執金剛云他受用乎五祕經文異今意歟謂大日自受用出薩化他故云爾開智拳作鈴杵可思之又相羕義云大普賢金剛薩者即他受用身如來也自性身化他之姿也非十六隨一金薩也問大師意今受用身通自他歟答私云若依四身同為密教教主義則可通自他是即聖位經中法佛示四重圎壇矣又大日三身釋迦三身中顯大日三身也大師金剛界義中以四身配四時受用有自他受用云云既於受用分二種故若自性身為密餘三身為顯而明三身法勝劣之意則可𡱈他受用也所謂自受用是上文如來加持故疏云次云如來是佛加持身名佛受用身文但等流身等云宣真言道句法者開會意歟此中二義前義為勝疏釋清淨句文云頓覺成佛神通乘也不同餘乘多劫修行也取意如法華序分等者此顯所示現三密無𥁞藏有二意也一謂顯此三密無𥁞受用等身是化他加持世界事故引序品類之二謂示自性土四重圎壇故引涌出品比之斯則不改自性而加持故於一文示二義歟或引宗祕論山佛常住曰金剛界之文本門為金界迹門為胎藏而疑今涌出品例甚以不可疏主既以今經同本門故疏第七云壽量品云常在鷲山即此宗瑜伽之意耳文但宗祕論金剛界者即今經金剛法界宮也故疏中心王毗那成覺處云金剛界中此文明鏡矣何云兩部中金剛界乎問今此加持身土令現自性會中歟又令見加持世界歟答若依序品意令見加持世界猶如見放光所照國土也故下文云普見加持世界唯平等法門文若依涌出品者今會座令現在歟猶如千界塵數菩薩山涌出矣復次普賢等者此復次釋成上義非別釋歟例如釋論中云復次如來在世文也或惣別為正釋復次如先辨矣或又上隨自下隨他歟故寶淨院僧正抄云法身內證有隨自隨他二隨自意之邊唯有自性所成眷屬隨他意之邊專有實行當機之人隨自無當機之文疏第一云𨐫如國王若有政令乃至倍復生信故文大臣時史者同聞衆也此中無外民無當機之意也隨他有當機之證疏一云然此諸解門實行諸菩薩故云云准此釋上假應隨自今文信樂倍增等者同上文倍復生信俱是自受法樂義也問隨自自性身隨他餘三身耶答或云爾也於自性身無加持受用義故木𢟷義云四身俱具自利利他二義四身本有歷然各不改自性而住神力加持益實行人云隨他也三身既通二利自性何廢化他耶自性會座既在餘三身加持世界何不見自性耶但疏文并大師釋中受用已下云加持身者增勝也又大師釋云四種法身具竪橫二義橫則自利竪則利他文此文四身各非通二利乎序分義云問性身法唯為自受法樂歟亦為令他受樂耶答亦為令他受樂其理如前苦重述者非但照機授藥為利他本聖位經云汝等將來於無量世界等此即性身為他也又有對機法之義如別卷抄云云私云利他為本義何異顯乎唯識論又自性身亦利他為增上緣文為未來機義尤理故經云於當來世時隨順是法文又疏云亦為未來弟子明此囑耳文又大師釋云問自性身有化他義者可云他受用若爾可攝第二身何答謂於自他受用有橫竪二義所謂四種法身皆有自利利他二義自利邊四身俱云自性又云自受用化他邊四身同云他受用又云加持然非竪中自他受用是橫自證化他故若自性身無化他者普門機依何證悟然疏普門一門二機分論心王心數兩根別矣私云自性會座無實類何有利他義乎故上文釋一切集會云由此衆德到於實際故名集會若一法未滿不名集會取意又大師釋云此經同聞衆皆是從果向因之人也非從因至果之人略抄若爾實類何在座乎但大師釋者四重圎壇若橫平等義則三重所示類形皆大日舉躰元勝劣異何分教王同聞別然竪差別門則分能所主伴且此義𨕙自受法樂云竪則利他非益實類也又僧正抄中釋隨自四身有通別二義畢隨他四身通別准知云云隨他時又自性住餘三身云通四身各云別又四身各住自證三昧故云通自性身獨一切云別歟然此諸解門所現等者雜問答云此內證會中諸智眷屬蒙如來加持力普為法界善知識身隨應度人各示三昧法門依此修耳其善知識者經中所列上首金剛手等此金剛手等菩薩即大日如來內證㓛德無量智各現此菩薩身引攝衆生是故若入此一三昧而修行者即從此一門直至如來所證略抄私云金剛手等傳自性會中教法流布𨶒浮引入未來衆生是為被教人意也自性會中無正被教之實人故故問答上文云而若有衆生遇此教殷勤修習如修行觀念是即被教之人也文問文相次第為饒益實行人先示現大神力然後今經見非今實行居會座則前後文不順耶答凡自性土法遠當來衆生且作能所主伴之儀各自受法樂之法斯則實人雖無座為未來作如此也故今經下文云於當來世時劣惠諸衆生為度彼等故隨順是法文又義云明加持世界事故有實人歟先迅示現等者祕密荼羅品云以如來迅平等莊嚴三昧以現法界無𥁞嚴故文字書云振也動也壯武㒵迅疾速也從一平等心普現一切本尊等者謂三密中意密勝故云本尊歟故祕藏記云我本來自性清淨心於世間出世間最尊最上故曰本尊文私云三密不可有優劣六大本有故相望作主伴俱本俱末也然今心為本尊是住心品故或語為本尊住心論云於真如更有所依所謂字云云或身為本尊配佛部故又義云自心即一切智智故云本尊也佛云一切智故故疏云所謂衆生自心品即是一切智智文如來祕密惠經者或云貞元開元録不載之是録外經歟或未度經歟或云勘開元録此經一部二卷未得其本云云私云他家請來十四卷十卷兩本莊嚴下除也字祕密惠下安也字文云無𥁞嚴如來祕密惠也經云等文依此本如來祕密惠五字屬上文非經題也然今疏猶為經題故雜問答云問何以得知答如來祕密惠經云文此問答明為經題矣雜問答依疏不依義釋故大師作定若爾恐治定誤歟或云十卷義釋上也字亦在矣問智論第十云佛雖入深禪定不為世事所動今以大慈悲心鄰愍衆生為之法斷疑密迹金剛經中佛有三密身密語密意密一切諸天人皆不解不知有人見佛身一丈六尺或見一里十里百千億乃至無邊無量遍空中如是等名身密語密者有人聞佛聲一里有聞十里百千億無數無量遍空中是名語密是時目連心念欲知佛聲近遠即時以己神足力去無量千億佛世界而息聞佛音聲如近不異諸佛要集經中文殊尸利到諸佛集處有一女人近彼佛㘴入三昧文殊尸利即彈覺之而不可覺以大聲喚亦不可覺投手牽亦不可覺又以神足動三千大千世界猶亦不覺有一菩薩名弃諸蓋即時彈此女從三昧起文殊尸利白佛以何因緣我動三千大千世界不能令此女起棄諸蓋一彈便從三昧起佛告文殊尸利汝因此女人初發阿耨多羅三𦴭三菩提意是女人因棄諸蓋菩薩初發阿耨多羅三𦴭三菩提意以是故汝不能令覺文准此文身語無𥁞舉密迹經三昧無𥁞依要集經歟棄諸蓋即除蓋障故若爾但云經云為勝也如來祕密者結成句也意三密無𥁞藏是如來祕密智力也為言故疏下云如來智力普群機究竟無㝵取意如何答文㔟雖同㫖趣大異疏所引經文佛身語及天女定見一經所更非二經施設也然論所引兩經也又疏除蓋障命目連令尋論目連自尋之又疏除蓋障不令出天女定論弃諸蓋令天女起有此等相違何云彼經耶又設雖彼經譯者異名何失問今經證何義耶答或云以如來身證受用變化二身以除疑天女證等流身歟或又以釋迦及天女類示大日無𥁞藏義歟私云二義俱非理以今經證上三密無𥁞義故所謂以釋迦佛身及音聲無邊際證身語無𥁞以天女三昧證心無𥁞也故雜問答引今經畢云問身口二遍空之義是即爾也意遍何答除疑天女心行無量即心業遍義文又云問何故天女三昧之心為佛心業答即大日世尊加持故况如來心文爾時除蓋障菩薩等者謂除蓋障雖自不尋所遣目連不測故能遣除蓋又同不測也故云及以目連不能測故也例如遣使𭣦無表㱕本主矣然猶有疑故除蓋障自往觀察故云即自往等也又義以字貫目連讀之除蓋障以目連而不測故則自往觀察也為言及言顯菩薩目連無雜也然後還㱕言𡱈除蓋歟初云即自往等故或通目連歟上文無彼目連還㱕之故我未發心時等者般若寺抄云意佛身者是智身也除疑天女者理身也是明從理發智故云我未發心時是天女住此定云女者是定故理智不二所以疏𭤧見除疑天女故去佛不遠見入於三昧文或云天女者意業三昧耶形也非別人矣私云云天云女俱定表示歟修惠斷惑故以定云除疑歟問准要集經此天女因弃諸蓋發心然除蓋障既不測如來身語若爾何云我未發心時等耶答論疏所引經大異故何必責何况文殊釋尊九代祖師也然彼經中文殊因天女發心云云文殊猶爾也况釋迦乎但除蓋不測身語是假𦔳如來化儀故歟又除蓋障弃諸蓋別菩薩歟如是毗那等者上既引經證三密無𥁞義故自下重釋成無𥁞嚴之義也謂從所謂莊嚴者至無空隟處釋無𥁞嚴之義又如下釋藏義也但今經文舉莊嚴二字是莊嚴之藏故歟例如起信論因緣假𤗊生因緣矣復次此諸大衆等者此復自性會衆歟前復次普賢祕密主等於如是境界久已通達云云今釋但以佛神力故得見如是境界云云此為兩釋異矣此又實雖久已通達為未來流通假現此相也例如金剛手云㓛德倍增耳如行者下因便明未來行者見荼羅境界也或又此諸大衆等者明加持世界同聞感見受用身莊嚴之相也如行者下明加持世界當機實行人歟前自性會此依受用等故兩釋大異矣如胡麻中油遍滿法界等者智證大師疏抄云胡麻𥢶中其實充滿專無空隟諸佛亦爾側塞空中𭓩如彼實唐國胡麻云油麻也文私云此釋實遍𥢶者王云公臥切𥢶麁穅也未詳其意今案云如胡麻油遍胡麻中諸根相好遍滿法界於中無空隟處為言遍滿下反釋上法也或可讀亂達遍滿法界一句可安上相好下也又勝佛頂䡄云即復觀空中無數諸佛猶如大地滿成胡麻不可稱數文與今文異今取遍䡄數故如行者內修般舟三昧者天台止觀第二云常行三昧者此法出般舟三昧經名佛立佛立三義一佛威力二三昧力三行者㓛德力能於定中見十𭤧現在諸佛其前立如明眼人暗夜觀星見十𭤧佛亦如是多故名佛立文或云疏第十云淨菩提心與念佛三昧相應文念佛三昧般舟三昧是一也故知真言行者至淨菩提心得除蓋障三昧時逮見無𥁞嚴藏故云佛立三昧歟然此境界者中論云諸法不自生亦非他生不共不無因是故無生文今文境界是三密無𥁞藏也准中論諸法矣所謂諸法佛莊嚴雖似異四不生義全同故引證矣於此四不生有多重故五教章事云四不生義有三重一破外道一諸法不從躰自性生故云不自生二不從梵天自在等生故云不他生三非塵大種和合生故云不共生四亦非無因自然而起故云不無因生二破二乘一諸法不定從自同類因生故二不定從彼異𤎼因生故三不從俱有因生故四小乘中許無明支前不正思惟詫而起似無因今不爾故離無因三法顯空一果不自起名不自生二自既不立對誰辨他又他只各自皆不成自云何他生故云不他生三自他因果既不成故云不共生四離因緣外無別異法故云不無因生云云或云此中第三破大乘因果也云云私云前二情門後一依顯實門歟何必破大乘因果乎謂准下文云諸佛大祕密外道不能識者今又以四不生觀遣內外外道見歟或依下文云當知真言果悉離於因果者顯教一乘因果猶破之因分妄假權𭤧便因果而非性德輪圎本有因果故何以故內因外緣等者是則離九種住心妄假因緣祕密莊嚴真實因緣也故下文云即用一切智門五義自為衆緣能至菩提常住妙果所謂不可惠議不生不之因緣也文當知如是莊嚴之相等者謂莊嚴藏是法佛法爾德故隱顯唯在機情非受用等去來也問畢竟平等不出如故文豈非攝相㱕性義耶答字義云同一名如多故如如理理無邊智智無數文私云無邊理智互相攝入故云平等云一如故釋論云非謂一法故稱平等文故非顯宗一心無相談也又云如平等義無變易義六大本有故三密平等故云如也問若爾一法界多法界義何答顯宗一法界者謂無相一理遍差諸法諸法雖多差理性唯一平等也又於祕宗多法界有二意先師僧都義云十界衆生所生四三雖有麁細勝劣能造六大無彼此差別故即身義云上達法身下及六道雖麁細有隔然由不出六大故佛六大為法界躰性文故本尊行者三三密雖麁細別六大是一躰故成入我我入即身成佛義也但異顯者彼理性一法也此六大多法故六種非一故云多法界非謂自他六大別也木𢟷上人義云能造六大亦隨所生三密四各各不同故云多法界故大師釋云理理無邊智智無數文所謂能所造各雖異六大無㝵故四不離故三密加持故成入我我入義耳經云非從毗那等者安然等以不可得已上文合上文讀故經云乃至不可得而成上四不生義也以而字下為下釋所𤗊文矣切一具文丰屬上其理不可大師以經云已下為別假為變化身之文順前後例矣問經上文未見四不生義而疏中釋四不生義非依此文耶若爾安然釋順經文歟就中疏家轉釋佛莊嚴藏之釋又此意矣况復上下文他受變化二身法別文何上無宣之句下闕示現之文既上下合現身法應知一具文非別文也例如又現執金剛宣真言等加之非從毗那等文未必見變化身義乎答此文為變化身是非大師私釋疏上釋云然此應化從毗那乃至起邊際俱不可得云云此釋明鏡也變化身法是依法身及衆生感應因緣且機感邊云非從毗等又據佛應邊云而毗那也釋論無相現應隨見麁細可引作證耳又而毗已下為別假者而字頭可安經云二字例如經云又現執金剛等又不可得已上引合上義者可𣇣送句也但二身現身及法各舉一互顯歟又疏釋三密無𥁞語密豈非法乎又云非從毗那或語或意生反顯而毗下毗那生三義其理定或又而毗那者直變化歟故聲字義云若謂應化亦名大日尊文又轉釋者轉釋受用成變化身也立義法門引可證矣轉釋若非變化身者又廣前相可非等流身耶若彼許者此亦可然也又經釋相配者無𥁞無邊際者前受用身三密無𥁞無邊際限量也以不下出彼因由也謂受用身常遍義不異自性身法爾之義也為言故知以以不乃至身也之文釋非從乃至意生之句為受用法爾義也雖常無起五字𤗊受用法爾爯釋非從等文顯變化身法爾似自性身法爾而能下釋一切已下經文為變化身隨緣之義也但於隨緣經文有惣別釋初一句惣顯變化身起及無邊際不可得者無義也故上釋云起邊際俱不可得文意起邊際邊際俱不可得也為言而字下別釋現身法也而是然前起後義也當知從等二句𭇥二身法爾義故云轉釋等也又義初非字不可得句讀之惣以四句為受用變化法爾之義作轉釋矣受用身亦有隱顯故云起耳而毗下為變化隨緣也釋中而能下釋彼文也凡四身皆雖有法爾隨緣義自性是法爾為本三身隨緣為宗故受用變化俱云不異自性法爾也故等流身又云皆如毗那等不異言顯四身各性有法爾義不攝相㱕性之義也故祕經云常於三世不壞化身利有情事文今宗意生住等諸法常恆如是生故起俱即事而真故上文緣謝即機興即生即事而真無有終𥁞文亦此意矣經文二點云非大日三密生一切處起邊際不可得而又云非大日三生一切處起邊際不可得而云云若受用身法爾初字非可讀切也或釋云然此應化非大日三密所作無緣慈悲任運如此故云普於十𭤧宣真言道文問設雖明四身以上三節文但為受用身之文更又現以下文可開二身云又廣前相即此意矣故大師護摩次第云且毗那佛云自性身四𭤧佛云受用身金剛蓮華等菩薩云變化身外金剛部等流身文又別本即身義云十六大菩薩應化法身金剛天等等流法身文如何答大師釋義隨應相配雖異於今經文四身配釋無違謂二教論灌頂文等是一同故又祕藏記云中臺毗那為法身四佛為應身釋迦為化身外金剛部龍鬼等為等流身文䡄匠其心者鈔第二云䡄者法也匠者工也工匠之作不失於法也如義玉薀在石璞之中不得良工琢磨則不成至寶衆生菩提心寶在煩𢙉石中若遇如來法𭤧便䡄而匠之則成法器也文又廣前相等者前二身假佛身雖為主金剛菩薩等亦現之今但現非佛身何云廣乎答彼雖現執金剛等為伴現之今執金剛等各各為主故云廣世所現金剛菩薩等者今釋𭔹經文金剛如名菩薩者普賢蓮華手也等者等取外金剛部諸天八部也或又等取十佛𠛴諸執金剛疏家云乃至大師云此意也或云所現金剛等即今等流身也非上所舉菩薩執金剛上金剛手等或自性身或受用身故上非但示現佛身者受用變化二身也但現圖荼第一第二重無佛身者第一金剛第二菩薩是各舉眷屬顯其主歟或為顯四重差際上二重挫云佛身歟問等流身不通佛身耶答疏第六阿闍梨所傳荼羅於外部有佛菩薩可通佛身歟又聲字義中以暫現即隱身為等流身其義如教相抄私云今三聖者第一重三點眷屬也疏第六云次造第一重伊字三點諸內眷屬文當知舉第一重三聖等取外部歟但經疏并現圖中於第一重但有金剛手觀音無普賢可之今三身不可依三重次第歟第三重釋迦即變化身也受用身者八中無量壽佛等報身歟受用身假云現佛加持身故上文佛加持身云受用身故又等流身假上文云非但佛身故當知佛形非佛形判三身身土歟且如十佛𠛴等者或云如法界宮自性眷屬遍十𭤧界如是加持世界𠛴塵眷屬如毗那遍十𭤧世界也為言私云謂於等流身有主伴上明執金剛等三密差別下釋天龍鬼等十普遍主伴遍互顯歟如者事言也舉主例伴故又解且如者如者今義也今金剛菩薩等三密無𥁞義也如是下金剛菩薩遍滿義也本尊像類等者釋經菩薩等像𧳖文意四重雖同法然德且淺略門自性身為本質等流身為影像歟又像者等流身形㒵義非本影相𭔹矣執金剛𭔹金剛智惠門等者抄云執金剛是金剛部赤色有降伏普賢是如來部白色有𡧘災觀自在是蓮華部黃色有增益文疏十五云佛部一向是息災用白色蓮華部一向是增益用黃色金剛部一向降伏其色雜色文私云黑色是調伏青色又黑色攝故歟而鈔云赤色者三角色故可尋之寶淨院抄云問觀音蓮華部尊也蓮華部敬愛法也何云增益耶答奧文云摧破三障故云金剛滋榮善故名蓮華部云云滋榮之義用增益歟云云或云以華可愛色為敬愛以衆實俱成為增益歟問執金剛是金剛部諸尊通名何云稱首耶答觀義云惣即別名祕密主也或金剛部義廣通外部故執金剛云稱首歟舉此三點等者抄云謂執金剛般若德普賢法身德觀音解德文又釋三點者梵書伊字有處云蓮華部擬法身金剛部擬般若佛部擬解云云疏第六云造第一重伊字三點諸內眷屬文又六度經云摩訶般若解法身文私云第一重伊字三點諸內眷屬者經所荼具緣品并疏圖尊中於第一重全無普賢故知彼三點眷屬者非三重歟故疏第五云大凡此第一重上𭤧佛身衆德下𭤧持明使者皆名如來部左𭤧如來大悲名蓮華部右𭤧如來大惠用名金剛部取意况撿經所荼羅第一重十七尊第二重二十尊第三重三十七尊中無普賢菩薩但經文第三重為第二院第二重為第三院又疏第六圖尊三重四百七十五尊中無普賢也故知普賢者八四行隨一執金剛者第一重金剛手蓮華手者圖尊中第三重有蓮華手菩薩彼歟故八三重各舉一尊四重菩薩皆顯等流身歟又云經疏并現圖不盡諸尊歟既上文中普賢文殊等云大眷屬普賢舉第二重歟又現圖遍智院中大安樂不空菩薩普賢延命歟此云普賢歟又文殊院中有普賢也但第三重也又今蓮華手者觀音故第一重觀音尊也經荼中觀音院中㔟至名大悲蓮華手疏第三重蓮華手者何耶又普賢云如如法身門抄第五云如來部遍智院等法身文又云普賢是如來部文但經疏并圖中遍智院不舉且略歟故疏二十云且觀音文殊勒已在八中為度人故次圎中復有又殊觀音等類文等者等取普賢勒歟况疏第五第一重上𭤧云佛身衆德莊嚴然經第二普賢三昧云佛境界莊嚴疏釋云莊嚴者如來自證之躰躰有無量德文衆德莊嚴義既同普賢何非遍智院尊字所云等者乃至等者大師釋云言等者舉金剛蓮華手等外金剛部諸尊文疏乃至言大師字顯等金剛菩薩等部類之義歟以外現荼羅等者兩本義釋以字作如字矣又疏異本如字也抄云形內稱外謂大悲胎藏荼羅分三重從內向外此當第三故以名焉文此意於三重壇以第三重望第二重等內云外現也為言私云今外現荼者今經會荼謂為今經從自證法門身現加持羯磨身造四重壇故云外現也疏第三云從佛菩提自證之德現八中胎藏身乃至從普門𭤧便現第三重隨類身云云凡四重圓壇或從佛心地現之或從佛支分生之故云外現等也三聖及諸天等三重聖衆故惣例知上等流身也或以自性壇中外部所列諸天八部等而加持世界等流身可例知也為言問若爾自性加持可壇別乎答躰一荼據義二種自受他受故或又外部荼形色性類所表示三點義例上可知也此義以字反終知可讀之若離如是實相等者抄云謂第三重荼羅所現莊嚴眷屬多是諸天魔梵八部之衆及鬼子母鳩盤荼等雖現如是種種相狀皆即是實相之行者觀行與此相應以此為門皆見中胎大日之尊若不知如是祕皆隨愛見所生與天魔外道作諸塵勞伴侶耳文私案今實相者即上清淨知見也故疏第九云一切衆生心自本有佛知見性但以無智瞙翳故諸法實相不得明了現前文今此普門所現天龍八部等身是德之一門法王之一官故開示衆生佛知見性諸法實相令現前故云實相也故疏第七云就此經宗則五種三昧皆是開心實相門文此佛知見者衆生佛性也故大師開題云佛知見者即衆生心性也等覺十地不能見聞故云佛知見取意又准普觀釋佛知見有性相性即本覺相即始覺也性相即俱行佛性也或又性即理佛性相即行佛性也今清淨知見理可通理行實相似理佛性矣此二佛性躰雖在煩惱𭰖不染汙故云清淨知見也次又釋言等者此有三義一者上清淨句法文異釋也於中又二謂前本有之性今依修生之行也或准上於句出住處進行二義謂前住處之義如來清淨知見是三平等處故今依進行之義乘神通而修行如此道迹故下文復次者所謂之詞也例如釋論中云復次如來在世等矣二者釋所謂已下得益文也𭔹又廣前相故云次又也又釋別名故若上文別義可云復次或亦可也既所謂句為所𤗊文非經乎但舉清淨句者所謂是釋成上故今得益發心修行亦清淨句義故釋中𤗊加彼句也𭤧便修行超佛地等文分明釋次第此生滿足等經故三者為前文異釋而為後文正釋也三義中初義疏云釋第二義經云釋二義中第二為善何者上文云次又釋歎加持住處經別句云次又故例亦可然矣若餘乘菩薩等者兩本義釋若字作如字矣私案今此餘乘者三乘歟或成或不成同聖位經文故故彼經云然如來變化身為地前菩薩二乘凡夫三乘法種種根機如修行或得三乘果或進或退於無上菩提三無數大劫勤苦𭤧得成佛略抄智論三十八云有菩薩我求佛道久久無量阿僧劫或至或不至如乘羊者取意又戒序中他緣覺心判為十進九退之故或通一乘故五祕經云若於顯教修行者久經三大無數劫然後證成無上菩提於其中間十進九退文金剛王儀䡄云不知祕密速成法於三忍諸苦行不至菩提略抄𩔰教言不一乘故或又若望自宗皆得果故云或有成佛若望真言不一桑故云或不成佛故大師釋云自乘得佛名望後作論文依此意又三乘一乘通有矣又疏第九云略有四種謂三乘及祕密乘文又義釋序云此中具明三乘學處及最大乘持明行法文准此等釋聖位經三乘廣通顯乘歟顯密相𭔹判三一故然大師二教論意聖位三乘但菩薩乘非顯一乘也儀䡄并大疏等意以顯一乘屬密行𭔹菩薩乘判顯密歟演密抄釋序文云三乘者二乘及菩薩為三又及者揀別三乘外有最上持明行法故文先師云本經儀䡄等中以祕密𭔹三乘是天竺但在三乘宗故釋梵本經䡄中不示顯一乘也彼一乘於震旦杜順南等初立故故經䡄中三乘言理不一乘可有耳今真言門菩薩等者本尊三昧品疏云然彼行者猶身真言及觀本尊此三事和合故本尊即自降道場而來加被也然此行者初行之時尚是凡夫自無德力何能感佛菩薩等如是而應耶但由彼佛菩薩等先立誠言大故若有衆生依我法而修行之不法則者我必冝應或雖不來而遙加護之若行人法則不如法而不應赴即是違本所願𭤧不得不應也如𭤧諸向月而水降圓鏡向日而火生若心不相應事緣有闕則本尊不加護念故無驗非佛菩薩之過也文私云准此釋今言不闕法則者不闕三密法則之義歟若心不相應者意地觀門不應也事緣有闕者身語二密有闕减歟事理俱密早得𢘻地故即身義云若有人不闕法則晝夜精進現身獲得五神通漸次修練不捨此身進入佛位文私云以疏文釋逮見加持境界之義以即身義釋超佛地之義矣非但現前而已者此一句或上文結歟故安而已送句矣或下文來由也而已者非送句為讀相連下句之點𣇣此辭也點云非但加持境界現前而已若欲超佛地即應同大日也為言復次行者初發心時等者觀云上𭔹餘乘述今乘一生即身之㫖下釋當宗善根生長不退之義也或云上加持成佛故於此生中逮見加持境界文下顯得成佛故云乃至成菩提矣或上一生成佛故云超佛地下二生成佛故云入菩薩位等矣或上法本不生談頓成下就㓛德麁細前後矣例如天台云法在一心必次第云云或上惣釋下別釋其義全同矣或上釋清淨句此釋所謂已下也初發心者智證大師釋云初發心者非十住之初發心住應是博地初發菩提心之位也疏云復次行者初發心時是與上同義也博地者凡夫具地發心歟或云初住發心也故疏第九云最初發心乃至四十二地階次不同文意云初發心住以上有四十二地階級也為言私云初地發心也故疏第三釋從初發心乃至十地文云謂初發淨菩提心作十轉開明文彼經文既同今經文疏釋又初地淨菩提心云云今又可爾也又疏既云得入阿字門入法明道之義故疏下釋云法明者以覺心本不生際文阿字本不生義也又次下釋壽種除云得至空無垢淨菩提心文第二云初地菩薩得至空無垢文故知今初發心是初地也但第九釋云最初發心故異今釋矣凡今文于十地長短三句義歟初發心得入阿字門者初菩提為因也即是乃至更無退義者從二地至七地大悲為根義也乃至乃至然後停息者八地以上𭤧便究竟也又配五轉者入因生芽增進行成菩提證停息入也或又入生芽因中本有修生二菩提心也此芽增進行與悲句也次謂初發心下釋短有三心也初發心因𭤧便修行根得至初地究竟也餘地准之有不住義等者此中三義准知空遊步三義不住者不住著已得法勝進者進超未得行遍行者當上神變義起自利利他神變遍行故進心不息為得四地故者或本得字滿字也私云以滿為勝其故第二第四滿心明之第三第五就入心述義影略互顯矣初地通三心故云得至歟十卷義釋得入第三地句云得入二地此次云如是次第乃至滿足等而闕爾時乃至五地三十字矣疏異本得至第三地云云又問答中如今疏有四五地文正不未矣唯以一行一道而成正覺者問今此成覺攝前十地耶答雜問答云以此一行一道至於第十一地文別立也問經云乃至十地此生滿足云云疏釋云乃至成菩提無行可增然後停息故云次第此生滿足文經疏同攝第十地更不開佛果乎又問答釋以第十一地為補處位是十二地義異疏文歟答今文滿足十地下云唯以一行一道而成正覺非十地外存佛地乎又疏上文云次第修行地波羅密乃至第十一地文又十八卷云大智灌頂地者如來第十一地也文以前後釋思今釋義佛果可立第十一地也但經此生滿足言𭇥因滿果滿二義故或果滿義云乃至成菩提或據因滿義云滿足十地其中今而成正覺者是果滿義也例如彼云此字句中自有二人也次雜問答釋今疏文何云補處位乎所以彼具文云當知乃至滿足第十地位以此一行至于第十一地者先標因滿果滿二位也次云更有一轉法性之生即補處是為真言門菩薩一生補處位真言行者如此修行超佛地而成正覺者重釋成上二地也若不爾者違疏第六文彼文云迄至第十地滿足未至第十一地唯少如來一位更有一轉法生即補佛處故名一生補處略抄此釋既十地滿足為補處位第十一地為如來位故但疏中云未至問答云至於者可讀文點乃至滿足第十地以此一行一道至第十一地云云仍無𭁆疏第三釋經乃至十地諸菩薩文云乃至第十一地而後所見圓極文此意經十地合佛果歟又經雖因疏加果歟問一行一道者何乎答大師云三密修行至成菩提云云疏十七云謂一切法不出阿字門即是一道也道者謂乘此法而有所至到之義也一道者即是一切無㝵人共出生死直至道場之道也而言一者此即如如道獨一法界故言一也文私云疏家字為一道宗家三密為一道字三密雖似異其意是同三密行悉入阿字門㱕本不生故又從字菩提心起三密行即㱕一實理故故問答云住字門三密修行文又字觀三密具足矣可思之相應經云常以一字齊運三業文准知甚深更問若於異𭤧便門等者範義云諸顯教三乘一乘等𭤧便其機雖非密意依佛意即開顯密意不離寶乘也十界悉普門躰故法華云更以異𭤧便助顯第一義文可准矣私云顯教諸乘等於真言三密中之意密而以異𭤧便開顯故終不離真乘也為言𩔰密是一心三密為異故或又𭤧便并寶乘俱真乘也謂大日所無量乘是開顯密意故皆不離佛乘也故疏云三重荼羅種種類形同㱕一躰皆是佛乘文或云異𭤧便為顯通顯密云開顯密意也意云以異𭤧便雖開于顯密二教意不離真言寶乘也為言緣生者等者智證大師疏抄云緣生增長現行有情壽種除種子復有芽種生起從佛心種子生法性芽也私謂壽種者第二識有三相謂自相因相果相也開因相為二謂與種所言者身口意不清淨也言種子者癡愛因緣也言壽者因所生之果謂果報識故第八梨耶立種子及果報二名耳文私云第二識者第八識望第九云第二識歟且經釋配當者謂有情癡愛因緣者釋經緣字也造身下二句釋字乘如下釋生字也如次煩𢙉業苦三道也今修已下釋有情壽種除文也薀阿賴耶者有情惣報果躰故釋經有情也壽種如文今者障種子在第八中前云者障現行在前六識也故義忠釋云障種子唯在賴耶若現行在前六識文壽者惣報壽命在第八故釋論疏云惣報壽命應依現識取意壽命者𣵀槃音義云壽亦命也壽取一期之名命取人之生分但異名耳文前言生者別報也種子者煩𢙉種子也前言緣者煩𢙉現行也皆悉焚者釋經除字也又准唯識宗二世一重因果者賴耶中是行支壽者識等五支種子者無明支也緣者愛取者有支生者生老死也是云十因二果也得已下釋復有芽種等文也一切等釋種從悲藏等釋芽生起三字至已下釋經復有已下文於中初二句釋種子歟故云一切如來平等種子文點云有芽從種生起云云或經除字𭇥二句意歟故下釋越百六十心文云即是菩提心生也一切下釋芽種生起也或又芽種者芽即種如種等矣又經舉種芽二心疏明六心例如佛種不斷文釋三寶不斷况今一節文轉釋前十地故委辨應云十心歟或又乃至下釋經起字歟問上文云從金剛性生芽今何云從悲藏中生芽耶答前舉因今平等種子是也今舉緣下疏云從大悲生根文謂菩提心種依大悲緣生六度行芽也故無違矣又三句者一切至種子者因也從悲藏至法界者根也成德至樹王者究竟也斯乃前所明煩𢙉業苦三道即成三句法門之義也應知除者非斷除之義不捨斷云除也復次如來所現等者自下惣結時彼菩薩已下現端之事也或云加持世界三身法得益無量無邊以佛日加持故於自性會中皆悉令現前也云云私云等流身法中非但自性身所現身末代真言行者入壇受職之儀式談義擇之座廗九世相入故皆於會座間令現前也問等流身又普門所現之知識何交實行凡夫乎答我等又設教相設事相隨分有弘通寧非如來使乎故先德釋云不改九界迷情因等流法身云云又延命院次第入我我入觀云但為表本迹義有加持㱕依觀云云蓋以行者非為本尊𡸁迹乎良以遍計分別前雖實類凡夫佛智所照邊猶𡸁迹等流也彼華嚴猶九世相入故於第二七日中現後流通之事此真言談實理六大無㝵故何于佛加持日間不現末代流通矣問加持世界三身即可云自性土四重壇聖衆乎若許者瑞相會大異自性加持是分何云彼聖衆耶若不許者疏第六指阿闍梨所傳四重壇云此正是毗那本尊所現無𥁞嚴藏文此豈非同今示現無𥁞嚴藏之文字答或云自性土中大日為主三身為伴各三密法也加持世界三身各為教主皆經也例法華序分即此意矣但加持世界真言者開會意也開權顯實法華云云此意歟况彼八千土中不法華今瑞中真言乎云云私云自性加持二壇其義遙異然皆真言謂經中三身皆云宣真言釋中𭔹餘乘成覺之義若爾何云開會義矣又開權顯實者法華會非他土事故知彼不法華此真言所之義雖異竒瑞之㫖同故相例也非全同耳應知自性加持同雖密自性壇大日為本尊普門之壇也加持壇隨應本尊各別一門之壇也謂阿陀荼羅尊勝荼等也現流布諸尊荼羅皆是加持世界荼也故十八會荼羅或法界宮或波羅奈宮中須頂他化天等不同斯乃自性加持合論歟當知若依所法自性加持壇雖別若就能人其躰無異歟四種身皆具自利利他二義故自利邊自性土聖衆也利他邊加持世界教主也故大師釋云此四種身具竪撗二義橫即自利竪即利他文此意矣又第六卷釋者大日所現三身有自利利他義故彼自利邊此依利他邊故無違又彼現普門壇此就出一門壇歟問今經中具緣品明普門壇祕密荼品諸尊壇若爾祕密品是可云加持世界乎答彼雖諸尊壇自性會故非加持世界也加持世界壇諸尊各故又容有加持世界主大日壇是在加持世界而自性土事也故知理實普門一門壇互雖通四種身非自性加持土雜亂又兩土雖異其處可無別猶如四土不二矣于會座之項皆悉現在前者且准序品例者謂令會座衆而見加持世界之事故云爾又准涌出品例者于自性會座內而加持世界事令現前歟當知金剛手等者以金剛手可例勒彼經中文殊答勒問今經金手問大日故然文殊金手問答雖異久已通達義同故金手知而問故同文殊知往事而答勒不知而問故不同彼耳唯平等法門者三平等句法門即于加持世界宣真言之義也若爾所例他土行菩薩道又可法華歟或又同為瑞之義未必全同歟將演遍一切等者抄云言將演遍一切乘者謂次下文所種種法門各是一種運生之義又一一門皆遍一切處名遍一切乘也言自心成佛之教者即是所平等句法門也若有行者住于此乘初發心時便成正覺不由他悟故曰自心成佛之教也文建治二年十二月十四日于醍醐寺中性院再治畢金剛佛子賴
