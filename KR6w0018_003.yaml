body:
  text: 疏卷第一之三次明所住樓閣及師子座者上法界宮是所依國城也今樓閣即所住堂殿也故教王經云住阿迦尼吒天王宮中大摩尼殿文理趣經云在於欲界他化自在天王宮中大摩尼殿文又今經第五云即時諸佛國土地平如掌隨福所感宮室殿堂意生之座文準而可知矣信解者始從真正發心等者智證大師抄云真正發心指𭂫夫位初發心之處言爾也文義釋裏付云義有三番一博地𭂫夫初發心二初住已上菩薩初發心三究竟發心若約實義真名約究竟而今且依博地言真正者所發大心是真是正不偽不邪故名真正發此大心位同大覺故名真正望前為果望後為因云云此等釋意薄地發心也疏第三攝受弟子中釋有大信解文出已發菩提心未發菩提心二類未發心信解豈非薄地乎又義初發心住云真正發心歟起信論釋初住云一者直心正念真如法故文直心正念是真正義故故疏第九云最初發心乃至四十二地階次不同文又義初地也故疏第二云從淨菩提心已上十住地皆是信解中行唯如來名究竟一切智地文三義中第三義為勝十地云信解行地故但第九釋既云最初發心顯非初地真正發心也何况薄地發心乎問若爾信解不通果位乎答有二意或通果今經云如來信解云云又第五密品云諸如來從如來信解生文又同卷祕密位品云如來信解願力等文問既云於是中間何通如來乎故經云此四分之一度於信解文又疏第二文如上何答初真正發心既信解終佛果何不然乎但於是中間者中間亦信解故云爾也文點云信解者初發心乃至成佛也於中間通名信解也為言次經文者上上方便位度因信解故云爾非果無信解也疏第九云如來信解謂是何法謂無貪等善根也文無貪善根豈因有果無慈恩釋云果位諸識與二十一相應文二十一中有無貪故或又四分之一者微細妄執四分之一妄執果信解度之為言次第二釋者顯因位唯信而非究竟非果位無信解也又抄第九云問前云初地乃至十地名信解地度於信解方成如來何故此從佛信解出耶答前據因稱此言果德以前經云如來信解遊神變豈因相耶文又云局因也信解行地經疏第二釋分明故但如來信解文今疏云毗舍那本行菩薩道時等文又寄印品文疏第十四釋云如來已證平等法界以神力加持為令一切衆生皆悉得信解同入一切智地當知從佛信解生也略抄既云得信解入一切智地非閞因乎疏第九釋者彼釋上文云身見俱生之類即是垢也今斷是垢竟即休息耶未休息更有勝法謂除是垢已當生如來信解此義如最初解我見等是初劫所斷然斷此垢而生如來信解豈是佛果耶但如來信解者從當立名歟或因信解又佛智用故云爾歟又此義如最初解者指今文也於是中間者為顯果非信解非簡初地歟梵云微吃哩多者問此梵名通信解乎答疏第三云此信解梵音阿毗目底謂明見是理心無疑慮下云深信者此信梵音捨攞馱是依事依人之信文或云此文信解有別梵名故今梵名不通彼也私一義云遊神變同𭇥此梵名信解何不然今文雖信解梵語梵語多𭇥故顯有餘義歟下文又示信解有多梵名歟例如日有毗那及阿儞地也梵名耳從初發心以來者以來者向下以去向上上上去去下下來來故依之疏第三云前七地以來無功用以去文無功用八地已上也故知今深種善根者地前生死所殖善根歟經中信解舉地上行躰遊神變示地前利益歟若爾本行菩薩道者可通四十二地矣約行者修顯過云本行等顯得以後是無去來今故三世常恆自性法身也又準下從初發心以來得精進大㔟等釋者初地上云以來也若爾神變遊等又地上行也一躰速力三昧者疏第六云謂入此三昧時則證知一切如來皆同一法界智躰於一念中能次第觀察無量世界微塵等諸三昧門知如是如是若于衆生於種種三昧門中應得入道於一一門各得成就無量衆生故名一躰速力三昧也文以前後釋思之今三昧通因果位所入也今云本行菩薩道下經文云時佛入於一切如來一躰速力三昧文故三昧之躰雖同行觀之相是殊準下佛三昧義今又證知無量知識皆同一法界躰供養故云一躰於一念中遍行自利利他諸度門故云速力歟此因位二利行彼果後觀知之益也當知普門一門三昧別普門行者乘一躰速力三昧至大日位也故住心論云大日所乘一躰速神通寶輅文一門行者或入大慈三昧或住普觀三昧等也此中供養有事理供養法疏云理者會理入證是云理供養也事者盡心竭力營辨香花供養佛海是言事供養也文具如下辨諸度又通事理謂用六度明是理六度也備六種微供是事六度也十波羅蜜万行等準知矣具如五重結護雜問答等耳問於一念中如何滿二利行耶答檜尾口決云此大悲弘常途義約外衆生為言今意約內為言也衆生者內心煩惱清淨已隨煩惱數諸佛顯現是名約內心衆生願度約他衆生其自心諸煩惱下所有本覺如來依我三密力悉顯現如是依熏大悲種於諸衆生彼外衆生亦速會緣成佛若唯約外衆生無盡如何應度竟大悲益寬矣無有一衆生依我大悲觀力不令本覺佛顯現也于意實夫三功德促半念無邊衆生度一座三密妙行五部祕觀甚深者歟如來智寶等者經第七云淨菩提心如意寶滿世出世勝希願除疑究竟獲三昧自利利他因是生文此中智者經菩提心也寶者經如意寶也依一躰速力三昧自利利他法足故云除疑究竟獲三昧自利利他因是生也於一切實報所生等者大師吽字義云此報者非因緣酬答之報果相應相對故名曰報也此則理智相應故曰報心境相對故曰報也法身智身相應無二故名報性相無得涉入故曰報躰用無二相應故曰報也文準此釋者今經意理為能住智為所住故是理智相應義也又樓閣是性莊嚴即相故是性相無得義也又第一寂是躰加持神力即用故躰用無二義也故上文釋住處云既從遍一切處加持力生即與無相法身無二無別文依如是等義云報也問經云信解所生疏云本行菩薩道等此豈非因緣酬答義乎依之經第五明自性身土云無量菩薩隨福所感宮室殿堂意生之𫝶文既云隨福所感明修因感果云事又理智相應義何必不共彼天台釋云境發智為報智境為受文爾何答信解所生者且約行者修顯邊云爾非修因感果義次隨福所感者是又於修顯法寄如常作此言非實因緣相感也又天台釋者雖理智相應因分緣起理智而未及性德本心境故又彼釋迦三身之理智此大日三身之依報故大樓閣寶王等者密嚴院釋云大樓閣寶王高無中邊大樓閣者五大所成五輪率都婆也率都婆名為高顯故高無中邊云文問今此樓閣可有法爾隨緣二義乎答聲字義云大日經曰爾時世尊住於定中即時諸佛國土地平如掌無量菩薩隨福所感宮室殿堂意生之座如來信解願力所生法界慓𢡠大蓮華王出現如來法界性身安住其中此文現顯何義謂有二義一明法佛法爾身土謂法界性身法界慓𢡠二明隨緣顯現謂菩薩隨福所感及如來信解願力所生故文準今此文云信解生大樓閣故但是隨緣義歟或又信解遊神變生同下信解願力所生故隨緣義也大樓閣寶王擬下法界慓𢡠故云法界樓觀觀者家義也即是法爾義也問大師釋自性身土為法爾三身身土為隨緣也故次下釋云法身依正則法爾所成結上畢若謂報佛亦名大日尊故曰信解願力所生文若爾何以此文成自性土樓閣隨緣義乎答本經文四假四身別所以時彼如來已下三身文故今文自性文其中隨緣何三身文乎故知若謂報佛等者下文標句非釋上隨緣義也若謂應化若謂等流傍例分明故但信解願力所生者下報身文中信解所生文先預合之非指上文歟况復四種身皆具橫竪二義法爾隨緣互有所限乎或又上文信解願力所生句𭇥二身隨緣歟故又合報身也下文無願力二字故又具下文何先抽之乎或又文雜舉故雖屬自性假受用文故合報身歟自性法爾三身隨緣影略互顯各具二義歟文義樓閣并莊嚴其躰舉寂性法爾也猶如能嚴所嚴皆金剛依加持力以諸德間飾成樓閣是隨緣也猶如能所嚴之相斯則法爾而隨緣不生而生故隨緣而法爾生而不生故故疏十六云於無相中而現有相雖復有相而從因緣生即才生義文樓觀莊嚴之相者疏第十六云雜色者非但五方之色更有種種雜色也雜色憣其相長而在門標之上標上又懸白拂寶鐸以為莊嚴前是綵幡幡有寶鐸及幡拂之類并懸寶憣而間錯之也從第一無相之法而出生如是大悲藏生之相普現色身種種方便無量法是雜色義也文然此第一寂之相等者疏十六云佛住畢竟無相寂之法以大悲故住於三昧令一切大會無量衆生得見此大悲胎藏荼羅莊嚴大會微妙之法而令衆生各隨本緣見種種色聞種種聲獲種種法各隨心器如法修行有如此大因緣故文私云第一寂并無相寂是自證位也以如來加持等者以大悲住三昧義也今經會樓閣生起也法門表像者荼羅莊嚴微妙之法鑒未來衆生心器故有如此相若彼未來衆生可見聞觸知金剛手等流傳令如法修行入法界故云有大因緣也既云可見聞等可字起盡約未來機耳見聞觸知者獲種種法者觸知歟起信論云見聞覺知文智論十四云問曰何故三識所知合為一三識所知別為三眼名為見耳為聞意知名為識鼻舌身識名為覺答曰是三藏助道法多故是故別餘三識不爾是故合文如善戝童子等者抄云華嚴云爾時善戝童子而白彌勒言唯願大聖開樓閣門令我得入時彌勒前詣樓閣彈指出聲其門即開令善戝入善戝心喜入已還閇見其樓閣廣博無量同於空乃至善財於一處中見一切處一切諸處悉如是乃至爾時彌勒即攝神力入樓閣中彈指作聲告善戝言善男子緣起法性如是此是菩薩知諸法智因緣聚集所現之相如是自性如幻如夢等疏主今取此文意者若真言行者見聞觸知此境界時即同善財入彌勒閣中於一處中見一切處一切處中悉如是見即觀十緣生句與花嚴宗不相異也文疏下釋云今此宗直以淨菩提心為門若入此門即是初入一切如來境界譬如彌勒開樓閣內善財童子是中具見無量不思儀事難以言宣但入者自知耳文抄意以彼經菩薩知法智及境自性如幻等義同今經十緣生句觀準下釋者未必然此樓閣棟梁椽柱及莊嚴相皆法門表儀故即以此為門入一切法界門類善財入樓閣而一處中見一切處矣上金剛法界宮等者上經文住處云如來加持故云即是如來身次明樓閣云如來信解故云亦是如來身也又例上宮及閣云如來身而成師子座亦菩薩身義故云亦爾歟問宮閣是如來加持力信解力所生何即云如來身耶答如來加持身即宮故次文如來是從信解生閣也為言又義如來身者釋家詞也意云經宮及閣即是如來三昧耶身也今座亦三摩耶身也為言乃至第十一地者義釋十四卷本乃至如來地云云釋論云譬如等者智論第七云問曰何以名師子坐為佛化師子為實師子來為金銀木石作師子又師子非善獸故佛所不須亦無因緣故不應來答曰是名佛子非實師子也佛為人中師子佛所座處名師子座一切座處若床若地皆名師子座譬如今國王座處名師子坐又如師子四足獸中獨步無畏能伏一切佛亦如是於九十六種外道中一切降伏無畏故名人師子文九十六種外道者抄云謂西方外道九十五種若兼佛法成九十六種謂佛法中有人雖披經典不達聖旨心行理外亦名外道文私云佛教中有人者犢子部歟彼宗立非即非離我故屬外道矣天台弘決云大論二十五云九十六外道中實者是佛今文但云九十五者論邪道故文勇健菩提心者疏第三云住勇健菩提心者勇健是雄猛無怯𭋘義所以須此心者以真言行者未見真諦以來當有違順境界爾時安心不動無有退屈依於法教而淨除之文又云毗那金翅鳥王俯觀法界大海如觀明鏡止觀翅摶天人龍乃是勇健菩提心也文若作淺略釋等者雜問答云此有深祕淺略二義淺略意即以菩薩身為師子座深祕以菩薩心為師子座菩薩深敬法故以身荷戴佛師子座所以菩薩身為座也真言門菩薩初發意來勇健精進無有怯弱住此大㔟心獲得佛菩提所以云心為座問以心為座之義云何答菩薩次第初地為第二地基乃至第十地為第十一地基此菩薩行為佛果本故菩薩心為如來座取意私云此釋意舉菩提心譬師子之釋成心為座義重引上十地行為座釋成上義矣故知菩提心為師子即為座也師子即座故作持業釋當知今淺略釋對上二節文也今此宗明義下上雖釋菩薩行為座未聞師子義故重釋成師子即座義也問智論釋淺深中屬何文乎答座義對上文師子義待下文此釋師子之座故為淺略若爾何今更作淺略釋乎謂智論雖作師子座依主釋邊淺略未明身為座淺略之故又今宗下一節却雖成上座即師子義兼又對智度師子文成深祕也故問答云問何故菩薩行及佛身喻師子耶答釋論云如師子王於衆獸中獨步無畏佛亦如是一切降伏以無畏故名人中師子又菩薩勇猛大㔟之行猶如師子故取意當知前後兩節座義淺深中間二文師子淺深也問經中但身為座何今釋心為座義乎答舉身顯心歟心依身而住故或兩部配身心時胎藏三密俱云身密歟故大師釋經身祕密文云法佛三密文或身字亦名心躰歟例如云實相智身又俱舍云六識身耳大疏抄云師子座者是菩薩身也意以為菩薩修万行滿足地波羅蜜故當知後地即以前地為基故云如來以菩薩身為師子座云云亦如師子王人所座故云師子座也智度論意也又云諸菩薩深心敬法乃至以身荷戴佛師子座故菩薩之身為師子座也三義畢文此又為三義菩提心為師子文屬初釋歟與大師問答同歟智證大師記云然淺略釋應云必有師子戴座今所請來金剛界毗那𫝶下所畫者是也深祕釋示如來無畏法門略抄此釋異疏歟或無畏法門者菩提心有大㔟力故云爾歟以身荷戴佛師子座者若如古點菩薩身荷戴八師子座歟若爾菩薩身可云師子座之座歟又文點云以身荷戴佛師子之座之故云云師子者捐佛也問曰佛所經等者抄云此問意云佛所經即應直宣正宗何須先明住處及眷屬耶文答曰譬如國王等者抄云謂佛設教必不徒然若不先明住處眷屬何存若不次辨眷屬當根則闕故五種成就闕一不可是故次第須如是也文當根者當機衆歟此釋意教主是他受應化故抄云疏一云譬如國王若有政令乃至倍復生信故文外朝者法處也教命者所法也大臣時史者同聞衆也聞者生信布教利益也此中無外民無當機之意也故慈覺教王經疏一云問諸佛法必為利他今與內證眷屬法有何利益答是即自受法樂如轉輪聖王與自眷屬受大快樂非是國內万民所知故文此意本地身內證義也故彼抄上文云本有法身內證時有隨自隨他之二隨自意之邊唯有自性所成眷屬隨他意之邊專有實行當機之人於此二義各有文證隨自意無當機文瑜經云諸地菩薩俱不覺知文此菩薩有顯教菩薩真言未究竟菩薩疏一云譬如國王如上引隨他意有當機之云疏一云然此諸解門所現乃至實行諸菩薩故文此意今經本有法身隨自意也私云今譬意國王毗舍那本地身言斷心自證位也若有政令者三密教令也出居外朝者異朝云外朝歟又於當朝出政斷處云爾歟住加持三昧加持身也疏第三云從佛菩提自證之德現八中胎藏身云云大疏抄云加持身者𭦟荼羅中胎尊也制斷刑賞是法斷疑斷惑證理也刑刑罰斷惑也賞勸賞證理也時史著記者經家云時史結集書記云著記某時王以下五成就相也時王處臣衆如是教命信是也境內信伏等者傳法者舉五句等流布𨶒浮令未來衆生生信也合中法王亦爾者合譬如國王出居外朝也將大法合若有政令制斷刑賞必於大眷屬乃至證明者擬譬中五成就也令作證明是影向衆意歟聞者生信已下合境內信伏等是則未來流通得益之人非今經同聞衆也問云法王亦爾國王非合當經教主乎故疏釋教主云本地法身何答譬出居外朝今經會也若爾可加持身其證如上出矣又疏第十四祕密漫荼羅品云如師子王在深窟中安住不動有時出頻申動即是其身本不動今則離其常處而動故也佛亦如是安住如是甚深密藏之中若非如來加持神力則微妙寂絶不可得示現文今此釋譬雖異意是同師子在深窟如國王在帳內有時出窟如出居外朝也然佛亦如是合通在窟出窟也合加持神力及微妙寂絶義故今又可爾也頻申𡚒動是今將大法意也故當卷別序釋云如師子將欲震吼必先迅其身呈現材力然後發聲如來亦爾將欲必定師子吼一切智門故先迅示現無盡莊嚴藏也文凡今經三十一品皆雖自受法樂悉加持身所也非受用等加持身四身俱有本地加持故自性身化他也被未來機故疏十四云凡有所皆是如來加持神力則不可表示故名神力加持字輪品也餘一切品皆如是釋之文故先列衆也者或本衆下有及處二字或本唯有處一字矣問既問衆及處結文亦可有處歟或今釋衆文故唯可限衆也空無垢等者先德祕釋云密嚴院初六就字之五轉差別次五歷因分住心設後八偏寄祕密莊嚴判義初六中亦為二初五別顯五轉不同後一歸不二實際空無垢執金剛者即是菩提心躰如最初字當開佛知見執者二執謂人執法執也愚童凡夫二執恆有二乘之人雖斷人執未斷法執為於人執畢竟淨法執未斷之位人空未淨故也菩薩之人分斷非全所以有位位階級諍者佛究竟之諍也論者真言自乘之障妄執也文私云愚童𭂫夫者世間三心也二乘者四五心也菩薩六七心也權佛八九心也真言第十心也問今此菩提心本有修生中何心耶答準離一切執諍論等文可修生歟故下文云業壽種子皆悉焚得至空無垢大菩提心文又第二云初地菩薩得至空無垢菩提心文第三云於二種扼縛得蘇息處即是真言行者空與垢菩提心也文又當卷下云觀自心故即時人法論淨若空文金界儀䡄釋修菩提心云我見自心清淨如滿月離諸煩惱垢能執所執等文今文同之又下釋無垢執金剛云即是離一切障菩提心也則知初質尚與微垢共住初質者金剛也又儀䡄釋通達心云觀心如月輪若在輕霧中文又祕釋云初二是菩提為因也中分本有修成文依此等釋唯本有但離障文雖同儀䡄本淨新淨別故又義通二義五轉中因句故猶如金薩通本有修生矣離一切障是明新淨邊無垢無染是本淨義故問此菩提心有東因中因二義乎答若東若中皆字為因故俱存歟中約本有因東約修生因歟東因亦行義此意歟或又東中同通本修歟第八識第九識菩提心可通本修故故知今五轉五義全二意矣如淨空等者抄云如淨空躰離一切障翳垢染無能取也及離一切分別無所取也若於空躰上見有障染名為執諍若於空上分別是淨是垢即名論空不爾故能遠離也淨菩提心亦復如是法合易知文私云能取所取者可通依他能取所取遍計能取所取歟染分依他是可斷法故依他見相二分如次能所取也於此依他見相執實能所取是遍計能所取也是躰用都無故又所離也又準先德義以空喻菩提心以無障翳等類離執諍等也障翳比執二乘菩薩所斷異故垢染類諍天台華嚴所離別故分別譬論妄執又名分別故準此文者空無垢稱約喻矣復次空遊步等者祕釋意云是菩提行也如第二字當示佛知見此中以三義釋遊步也不住著已得之法故云不住能進趣未得之行故云勝進起自利利他之大用故云神變也都無所住進修万行起大神通之三句如次釋成三義也又不住者表蓮華部本來之理在纏出纏常離住著如彼蓮華在泥出泥離垢染矣勝進者表金剛部本有之智有斷惑之能如彼金剛有摧破之德斷惑必有勝進也神變表佛部如上理智凡位未顯覺道圓滿即名為佛當此之時具足無盡神變故名佛部也又三義如次因根究竟三句也本有菩提心無住著故菩提薩埵進修万行無離大悲故三覺圓滿到究竟地必以神通方便起化用故今執金剛是五轉中偏當行義三句中唯根句也而分別三句三部等是本具一切互相交涉如因𨹔羅所以理理無邊智智無數法界法門不可定執矣問第三以後標其數何今云復次耶答或云第二金剛具因行二義謂望本有菩提心是發歸本心故屬行於修生初發心故為種子東行亦因可思之若約修生菩提心邊有菩提心義故不云第二云復次含多義也私云祕釋中準三義配三句此中因行果合故但云第二唯是行闕因義故云復次兼因義矣或云準無住義空有不住能故知空即遊步義也小田原義云菩提心起行喻空遊步也云云私云菩提心起勝進行如空即遊步若空為所遊履者可云遊步空矣復次空無垢等者抄云阿字門種子空無垢修無住行是遊步金剛取意或云此文重顯上空無垢生起發行金剛但初只云菩提心躰性無垢未談有行今阿字門種修無住行云云此義意初二釋顯因行躰今復次示二種生起矣故知通二種復次也故初標不置牒言矣或云初釋躰用義今釋種芽義也私云於此文可讀亂達空無垢正釋復次也第二遊步云復次而不云第二示有亂達歟所謂正釋約本有菩提心復次據修生菩提心二種中正起行是修生故云發也即取能發心而非取所發行也或又修生菩提心望本有菩提心且屬第二行歟故為遊步復次矣或又正釋約三句義故云即是菩提心躰復次據五轉義故云即字門矣第三空生執等者祕釋云當第三字悟佛知見文私云大空生是同字大空點義故又成菩提義以四不生觀之無所起無起處大空生故也悟佛知見者又此意矣佛知見即佛菩提義悟是證義即菩提義也萠芽已生者第二遊步也念念滋長者長芽今金剛也以無所得方便等者以無所得方便合上四大空空不等又增上緣也或能作因也是一切智門五義也以万行合上念念滋長等意云以無所得方便為緣而生万行云真實生又名大空生也為言故下云隨行者以無住心所修万行即由大悲地界所執持故乃至大悲空不障礙故爾時無量度門任運開發由如芽莖枝次第莊嚴文故知智門五義為緣所修万行為所生歟或本方便上有為字故知万行亦緣也無得合空万行合四大歟謂万行為緣生菩提芽云大空少也疏下云平等種子生法性芽即是大空生也取意或万行展轉為緣及生故云万行為緣歟依密抄意者已上三種金剛者如次因根究竟三句矣又依祕釋意第三空生是大悲句攝也故釋云就上來六種金剛或以三句次第配屬所謂初二是菩提為因也中分本有修生二門次二者大悲為根此中亦異万行大悲後二是方便究竟於此隨順衆生隨順菩提二種方便文若依祕釋今本為勝大空生即万行故或祕釋依或本歟亦於今本可讀文點無得方便万行為緣云云問以五轉義案之抄有三句不盡五轉之過祕釋似證還為行如何答祕釋以五句配五轉合六句為三句義門是異勿成行證相違難抄又於今文不見五義何付過乎若五轉三句相攝則初二轉即初二句後三轉是究竟句歟住心論九云此字有十二轉除中七字菩提因行證入究竟中間則大悲句攝略抄此意中間七字攝第二行云大悲句歟問五轉時第二為行三句時何屬因乎答於遊步有三義中第一因義故云淨菩提心都無所住後二行義故云進修万行等仍今遊步合因行義故無違矣問復次釋中修無住行文無住即非行乎答無住義通五轉故故上文結五轉云皆以無所住而住其心文若爾隨冝歟或又下文修生菩提心有亦因亦行義故云行非所發根芽行歟種殖方便是今無住行也根中万行大悲者第三云万行為緣第四云大悲𭦟荼故究竟中二義俯應群機是隨順衆生義入如實智即隨順菩提義也私云三空異者第一約無垢義第二依不住義空即遊步也第三取無得義也三種俱從喻立名耳第四被雜色衣等者疏第十云雜色衣即是種種万德莊嚴法門若人能證此空三昧即能万德莊嚴其身如淨空明覩顯色也文祕釋云當第四字入佛知見也文私云被雜色衣者表寂智身之上万德挍飾是大𣵀槃具德義也萠芽增長是第三智印第四來由也莖花實四表有餘無餘等四種𣵀槃及常樂等四德也即第四智也四𣵀槃四德非一故云万德開敷又云具種種色也問開敷華王佛是南方佛五轉中行何配𣵀槃乎答彼華開敷故表行此華實滋繁万德開敷故顯果德所以有異又菩提心有東因中因二義若中因義以開敷花為成菩提佛故疏六云黃色是娑羅樹王色以成正覺時万德開敷皆到金剛際故第三文開敷既通行證若爾何不為𣵀槃耶或萠芽者第二智增長者第三智二三轉齊第四故皆雜色所攝矣復次種種等者或云正釋解雜色義復次釋衣義也私云初約所生万德明雜色衣義今就能生因緣顯雜色衣義也所以種種法界色者一切智門五義也故疏第六云復次如世間綵盡不過五色巧惠者善分布之出生万像法界不思議色不過五字門如來以普門善巧圖作悲生𭦟荼羅略抄又云以法界不思議色染衆生心同一淨菩提心文或前約從因至果義今依從果向因義歟故疏第十六云從第一無相之法而出生如是大悲藏生之相普現色身種種方便無量法是雜色義也文第五善行步執等者祕釋云具足方便也當第五字依端嚴種子文意云第五字衆點具足故云端嚴又甚深祕密字故云種子也為言是約字釋也若約果德者撗遍十方具衆德故云端嚴竪通三際無𭁆壞故云種子下已得果實當端嚴義還為種子是種子義也又約自證云果實望化他云種子又始覺窮滿故已得果實也本覺隨緣故還為種子矣言善行步等者自下釋步行義也望遊步言異者前約上轉今據下轉也又進趣自利道云遊步趣向利他道云行步矣諸佛威儀者果後方便三密威儀也可度不可度者是機非機也通塞者謂通達閇塞即得𭁆無滯云通有障云塞也曲中規矩者抄有二釋初釋云曲謂委曲中去文意委當規矩可讀歟後釋云曲隨他意言中謂順自意語皆成佛事文意曲中於規矩可訓歟雜問答釋五鈷云法身正理捨方便故處中正直曰佛身智帶方便故曲而向中文準之謂曲隨他義中隨自意是即以隨自隨他方便作佛事義也斯則自利利他中於利他邊分二義也故云俯應群機矣例如聖位經中云或自意趣或他意趣耳規矩者方圓即所被機矣第六住一切法等者祕釋云住一切法平等執金剛者住如實際照上來五句究竟不二名住一切法平等也住者依止義一切法者所觀平等者能觀智也文私云釋中住一切佛平等性者佛是能覺即能觀智也標法者所覺也標釋互顯歟謂因果下舉三對六重法釋上一切法也所謂五轉中前四為因後一為果一對二重又前四為有為因故後一為無為果故一對二重是一往假也又五轉皆為自利第五轉中果後方便為化他是一對二重也亦可前二因後三果有為無為準知初一為自初地菩提心位頓自證窮故後四為化他為令他知開功德故當知前義約漸證今義據頓證耳入此下以實知平等觀釋上平等性也然上來五句等者異義多端或云為成第六平等義置然言簡別上來五種差別也故祕釋云住如實際照上來五句究竟不二文又般若抄云五句者空無垢乃至善行步執金也文或云釋六種畢云上來五句定知第六又五句隨一也但至云五句者第一第二約菩提心本有修生雖分之五轉中同第一因之位也故疏中不置第一第二言粗示此旨歟私云後義未詳第一二為一種者五轉闕乎第二行故且準聖靈三句義中因分本始第一二約三句為一句三句五轉合云五句歟或彼義意第一二合為一轉加第六如次為五轉歟前義為勝所謂五轉有橫竪二義前五句竪義第六橫意也故佛德無淺深殊為令人易解作次第云云此意也但初二金剛不置一二言者復次空無垢等釋為顯有亂達也第七哀愍無量等者祕釋云自此下約住心分別之於中有二初五屬因分住心後八屬祕密莊嚴云云又云哀愍無量者當異生羝羊等三種世間心能化智文私云哀愍者能化之心大悲為躰無量衆生界者所化之類衆生言雖通二種生死今但限世間三心常沒也已出離者讓後後所化故又云當他緣大乘心法相宗也文私云同躰悲愍之心當無緣慈悲故已住平等法性者上第六金剛根本實智也發同躰悲愍之心者今金剛即權智大悲也起信論云以同躰智力故隨應見聞而現作業文第八那羅延力等者祕釋云那羅延者當唯蘊拔業二心能化智也文又云當覺心不生三論宗也取意私云二乘發菩提心切難超常沒故具大㔟力能救護也又相宗雖無緣悲無限無無性預化五性各別故性宗悉成佛具悉有佛性大㔟力故經中挾量六十象力等者𣵀槃經中有此挾量謂如十小牛力不如一大牛力十大牛力不如一青牛力如是凡象野象二牙象四牙象雪山白象香象青象黃象赤象白象山象優鉢羅象抅物頭象分𨹔利象人中力士鉢建提此等後後力勝前前十倍乃至十鉢建提力不如一八臂那羅延力十八臂那羅延力不如一十住菩薩一節之力取意三十六卷本第十可見或云此經中從凡象至香象有六十象六十內雖有香象約言云不如一香象力歟私云凡象乃至香象六種象各有十故云六十象歟俱舍二十七云身那羅延力者佛生身力等那羅延此云人種神有餘師佛身支節一一皆具那羅延力象等七十增者明那羅延力量也象等七力十十倍增一十凡象力當一香象力二十香象力當一摩訶諾揵那力此云大覆形神三十摩訶諾揵那力當一鉢羅塞健提力此云勝雲神四十鉢羅塞建提力當一伐浪伽力此云妙攴神五十伐浪伽力當一弩羅力此云執持神六十弩羅力當一那羅延力故象等七十十倍增名那羅延力略抄遁麟記云言凡象者西國凡常受用之象香象者西國別有一類好香象擬戰時用故文準此釋今疏文可讀點經中挾量六云云十象力凡象也不如一香象力者舉初二顯後四故云乃至也又經云十住菩薩一節論或云生身力或云佛身支莭今云生身毛孔論疏少異約佛身論之經云菩薩謂小乘極果不過大乘因位故以菩薩支節同生身力或支節或毛孔歟力㔟同故歟那羅延者寶師𣵀槃疏云天帝釋之力士章安云金剛玄應譯云釣鎖力士真諦三藏為人生本梵王是衆生之祖父故云人生本也文光俱舍記云人種神云云私云既云梵王可色天矣或云天帝釋力士是可欲天也或云人種神人趣攝歟第九大那羅延力等者祕釋云當一道無為心也祕密神通者一乘不思議方便也文又云當他緣覺心能化智文私云三乘教云定性無性不成佛故以此智救療故云爾也又天台談闡提定性成佛故爾配矣問大師問答云一闡提人必死之疾二乘定性已死之人餘教非所救唯此祕密神通力即能救療唯此中義密不共顯之義也略抄相違如何答同釋云雖言救療之義同不共之言一而密有兼顯之義顯不知密意如直丸藥等與讀藥方等遲速淺深豈同日而論略抄私云準此釋者祕釋約讀方經云救療問答就服藥云不共故無過問性靈集第十云若使千年讀誦大素本草四大病何曾得除百嵗讀誦八万法藏三毒之賊寧調伏乎文若爾何讀方經有救療義耶答但讀方經者據勝為論門意歟據實通論分可有服藥義歟故同釋云諸經長行偈頌為顯諸經𨹔羅尼為密淺略趣者如大素本草等經論病源分別藥性𨹔羅尼祕法者依方合藥服食除病文大師於宮中就最勝王經可被修後七日法之由表也一闡提等者鈔第二云言一闡提者是樂欲義樂生死故而斷善根無成佛之壽命故名必死二乘已死者謂二乘之人於空作證入於灰斷故名已死諸佛醫王明見一切衆生皆有如來知見性必定師子吼決定宣一切衆生皆有佛性也略抄師子吼者𣵀槃經云決定也私云一闡提此云燒種樞要上云謂一闡提此有二種一者焚燒一切善根即謗菩薩藏二者憐愍一切衆生作盡一切衆生界願是菩薩也文今當初一矣或有三種一斷善闡提二無性闡提三大悲闡提也第二無性者無佛性即今闡提也師子吼約喻立稱大日如來先現瑞相善調機根後本懷猶如師子先𡚒迅吹呿驚怖群獸然後成事故云爾也大師疏事云闡提定性成佛文文諸菩薩尚不能爾者今此菩薩者下所舉四大菩薩歟第一重第二重有淺深故又下文讚金剛手問云乃至淺行諸菩薩無能於世尊前發如是問者文此菩薩歟或顯乘菩薩歟或自宗修生菩薩歟抄釋瑜祇經諸地菩薩俱不覺知云此菩薩中有顯教菩薩真言未究竟菩薩云云第十妙執金剛等者祕釋云當一道無為心能化智也文又云妙執金剛者一道無為極無自性二心問一道無為配屬既畢何重出乎答上是一乘用也以祕密神通力大作佛事故今是一乘躰也所有所作皆歸此故問若爾何亦為極無自性乎答一如本性之躰空無自性畢竟無相無境界故極無自性心生也所以大師御意以空性離於根境等文證二種住心但初一未極為其差別文私云於醍醐有與二義謂性宗依𣵀槃經以醍醐類妙經簡隔歷三諦之麁明圓融三諦故云融妙又一事因緣義同法華一大事因緣故為一道心也又一乘義同故通極無也融者六相鎔融妙者十玄深妙也又今宗依六度經以醍醐為祕密藏故為能化智矣醍醐者𣵀槃經二十七云雪山有草名為忍辱牛若食者則出醍醐文辨正論第二云牛乳出酪乃至醍醐轉拼轉淨唯香唯美五種具足百味甘濃文一切功德悉皆無比無上者今德未必有別躰取諸德上無比無上義邊為一德歟例如六度中精進矣一事因緣者抄云即一大事因緣也清涼云無二無三故名一佛因佛果故稱大因果幹能令物解並稱為事如來因此緣此故出現爾大事即因緣也文第十一勝迅執等者祕釋云當極無自性心能化智也文又云屬極無自性心問何再出此心乎答上是偏顯空性無境之理當自分義今者依無自性故起進修行當勝進分義證此遍一切處大空其心以極無自性故若遇驚覺因緣能起速疾神通也良以無相理上蒙驚覺時趣祕密莊嚴即身可到法界躰性此如能起速疾神通即是如經不捨於此身逮得神境通也又如瑜伽教五相成身菩薩蒙驚覺忽進是也文私云疏中勝謂等者釋勝義故能等者釋進義也意云前自分位偏著無相空理万行休息名法愛生故上云不可復增今離法愛心生極無自性心云大空無性故蒙驚忽進云神通也為言住此乘者華嚴也初發心時等者依圓教約法圓融也非取終教見性齊義華嚴經云初發心時便成正覺者是也不動生死等者約真妄相攝義也故賢首云真該妄未相無不攝妄徹真源躰無不寂真妄交徹二分雙融無不全攝文即此義也又約能化義者雜問答云勝者大空遍一切處義迅者速疾神通也謂乘此神通乘者初發心時起速疾通不動生死即至𣵀槃所以者何餘乘先歷諸法而後成正覺故今此宗初發心時直住心實際攝諸法故致遲速之異耳文文意顯矣今生死者但分假身歟論中云父母所生身即證大覺位之故彼華嚴宗猶若依圓教不變易但分假身窮於因位文况自宗談乎但疏下釋以字智火燒意生身云云未必變易身歟猶如意生作業等或疏下文如意生身文以變易身譬分假身歟非實變易身歟問已上五種執金剛約十住心能化智義可然所以此智皆舍那三密法門故而又約因分諸乘行者配屬有何故耶答今宗意修行門之諸功德皆是舍那本有之智也為顯能化所化皆是法然不思議三密境界又建立此義也又義九種住心通顯密然為所化邊是顯直為住心邊密故第十二無垢執金剛等者祕釋云三部中蓮華部淨菩提心清淨之理當本來不染之旨若顯無垢之義用何譬無𭁆但云金剛者十九皆是執金剛故云持金剛也而十九皆是金剛部也略抄私云用何譬無𭁆者蓮華部用金譬會之也初質尚與微垢共住者有多意或就修生菩提心約三劫始終論初後云初質有微垢也抄意云斷三妄云離一切障也此中斷於麁妄淨菩提心始顯云初質微垢共住後二細妄未斷故金剛心又微細猶在離前細妄故故釋云是則三劫有初質之實二位遣微垢之妄故曰初質尚與微垢共住文畢竟淨者佛地障未斷智躰淨故猶如金剛純淨也或等覺無垢義歟或初質者直本覺也故抄云初質者謂本覺躰根本名初微垢者即微細無明也問既在纏應與麁惑共住乎答根本無明最相近故略抄或初質者第一空無垢也即本有菩提心也其躰雖無垢尚在纏故云微垢共住也今修生菩提心故云種種練冶矣或云前前住心云初質微細妄執猶未斷故云微垢共住也十三刃迅等者祕釋云表金剛部本有理邊必有智具指此智躰名金剛部文問前離障與今斷道何異耶答抄釋無垢金剛云今為發大心衆金剛道㓛德之相以次刃迅之稱是究竟智也文又義前畢竟淨又佛智猶如佛地云究竟清淨但前約智躰此據智用故二異矣十四如來甲等者祕釋云表佛部理智具足覺道圓滿名為佛部故文私云擐大悲甲攝衆生是自他覺道圓滿義也不為一切等者顯佛果無念義無能降伏等者內無三妄之惑障故外無四魔之障難也十五如來句生等者祕釋云大圓鏡智也文或云如來句者字故為大圓鏡智歟諸佛自證功德者金剛密也三昧耶形歟如來性者字也即種子也加持身者今執金剛尊形羯摩身也是則依種三大轉成義正雖智生約根本云如來句生也結文云以不離字門此意矣私義云諸佛自證功德者字本不生際也空有不生是字三義故謂大空則諸佛自證功德也為言此釋句字也從如來性生者解大空生字即指自證德云如來性也性即當句故如來性生是如來句生之義也此加持身執金剛也下以所生執金剛歸能生自證德也故云以不離阿字等今執金剛從加持力生與無相法身無別之義也十六住無論等者祕釋云平等性智也文私云住八不正觀智遣八迷別執故云住無論也此八不正觀智水不簡情非情彼此同如常住不變故名曰平等性智也謂住大空等者住獨空畢竟理惠也是則四中都名八不義而已抄云住大空惠者即無分別之惠也文又云八不是南宗法門平等性智又南方智故相配歟謂觀緣起等者智論第五云不生不不斷不常不一不異不去不來因緣生法諸論言語道斷深入佛法文又三十一有為法實相即是無為文十七如來十力等者祕釋云成所作智也文私云佛十力是知衆生是處非處等故即權方便智也以此方便權智用故二利應作妙業遂成即成所作智義也十智力者智論二十八云諸佛雖有無量力度人因緣故十力具足成辦其事以是處非處智力分別籌量衆生是可度不可度以業報智力分別籌量是人業障是人報障是人無障乃至以漏盡智力分別籌量衆生得𣵀槃佛曰是十種力度衆生審諦不錯文十八無垢眼等者祕釋云妙觀察智也文私云祕藏記釋妙觀察智云五眼高臨邪正不謬因以為名文故配此智也以菩提心等者釋無垢也以一切等者釋眼歟一切種者能觀智或本一切種智云云一切法者所觀法也了了見聞等者釋眼功德也六根互用故眼有聞覺知用也問若爾五眼俱緣一切法耶答如來五眼可然歟問仁王經云法眼見一切法三眼色空見文又大乘義章第四云肉眼天眼唯見事中一色之麁事餘悉不見菩薩天眼非直見彼色亦見彼色生之相若從是義亦分見法少故不論法眼見於隂界入等一切種事及見於法惠眼見於彼破相空理佛眼見實文又青龍儀䡄上云肉眼見一切色天眼見一切衆生心惠眼見一切衆生諸根境界法眼見一切法如實相佛眼見十方出華嚴五十七也文又嘉祥仁王疏智論第九卷等釋五眼皆所知境有分齊如何答既云觀一切法了了見聞覺知無所罣得何有所限乎况如來五眼若所了有分齊佛智可有淺深彼六根淨位猶見聞覺知無偏頗果位五眼豈有分齊乎依之嘉祥釋云如來以一眼即究竟諸道何須此五將境即智故有此五文此問答意五眼各雖究諸道且以境即智云五異也為言處處釋文論五眼所知異是約因位歟問所知境無分齊者如何分五眼異乎彼六根互用已轉依位隨境有亂故但隨根無亂今五眼約何無亂乎答五眼躰本各別故雖緣一切可無亂矣猶如五智矣以一切種觀一切法等者二本義釋同云一切種智智論第四十佛眼云一切種智又釋云初得無生法忍菩薩未捨完身得菩薩神通無生法忍道種智具足未成佛故無佛眼如是等不名無法不見聞覺識若以佛眼觀諸法是名無所不見無所不聞無所不覺無所不識文今疏同此文當知一切種智是佛眼也上如來五眼者言歟問今本云一切種顯具有五眼歟若爾何云言乎答設依今本佛眼攝諸德故云爾故智論云所謂一切種智十力四無所畏四無量智乃至大慈大悲等諸功德是名為佛眼文私一義云示今宗能知無量故云一切種歟故即身義云不同顯象以一智對一切文又今疏下簡智論一切智釋今宗一切智智云非但一切種遍知一切法文可思之十九金剛手等者祕釋云法界躰性智也文私云祕密者三密即法界義也主者所依義即躰也故祕藏記云三密差別數過𭃯塵名之法界諸法所依故曰躰也文故配法界躰性智也掌持金剛等者此文會執金剛金剛手異也故雜問答云問執金剛金剛手同義云何答手掌持金剛杵故云執金剛金剛杵在手掌故云金剛手取意此釋意掌持釋執金剛手執釋金剛手也為言問疏文似釋執持義何云手執義乎答疏次下云執金剛杵故曰金剛手能持此故云執金剛也云云此文分明矣問若爾上文云云執金剛今謂持金剛文前後相違如何答持兼淺深二義故持云執又執與手同故無違耳或云手持金剛故從所持云金剛手手執金剛故從能持功云執金剛歟此釋違次下疏釋矣問前十八別名下云執金今何變彼乎答或云前十八顯全別作義今一種示全作別旨也西方謂夜等者以上釋名金剛手自下解別名祕密主也於中有二初釋次若淺略下別釋也別中亦二謂淺略深祕也問兩釋結皆名何云別名乎答別相對法故釋別義結名何𭁆依之大師問答淺略結名深祕結別名矣或又西方以下釋別二名以上會手執相違也問別名時祕密主云金剛手今何金剛手為淺略義乎答約同義二名互出也猶如執持二名矣謂夜刃為祕密者雜問答云夜刃祕密身口意隱密難了知故云祕密主者王也文乃至彌勒菩薩等者雜問答云若論密義者言夜叉者即是如來身語意密唯佛與佛乃能知之一生補處猶不能知如來祕密是菩薩即能持佛祕密故亦心密主故曰祕密主文又疏第十四云時金剛手毗舍那如來身語意地法界平等觀者猶此菩薩能知如來身口意密故名祕密主也如來意密之法唯佛與佛乃能究了如意者當知是身口意如是今此菩薩亦能知之當知是位同大覺為欲度衆生故示為菩薩而相起發也文此文金剛手知如來三密故云祕密主云云今疏并大師釋持此故云云又心密之主故曰祕密主云云故知今彌勒是生身眷屬非四大菩薩中慈氏歟疏下舉生身眷屬云彌勒文殊一生補處大師釋今文云一生補處之故况復疏第三釋支分生𭦟荼時內大眷屬俱云十住菩薩故內眷屬既知之大眷屬豈不知彼乎加之大師四重圓壇聖衆判從果向因人疏十四云為欲度衆生故示為菩薩其意懸會或又約竪差別第二重不及第一重故指四菩薩中歟故疏第三云若行因至果則第二重之所引攝成就能通第一重文於二義中前義為勝文證分明故但第三釋者上文云若自本𡸁迹則從第一重一一門各流出第二重云云從本𡸁迹人有不知義矣心密主者三密中心密勝故云爾歟或胎三部配三密時金剛部心密此菩薩金剛部主故云心密主歟又或人云十九中初六如先第七至第十二如次他緣覺心一道極無祕密乘十三至十九如次不動降三世普賢文殊觀音彌勒祕密主也云云問用十九數有何表示耶答有多意也或對顯乘十九無知密教立十九智也故瑜伽論第九引經云無知有十九種謂前際無知後際無知前後際無知內無知我見外無知我所見內外無知於他有情起𭜨親中之執親云內𭜨為外中隨冝業無知見有作者也異熟無知見有受者也業異熟無知於因果起種種邪覺佛無知法無知僧無知苦無知集無知無知道無知因無知計無因因所生諸行無知迷諸行善𢙣等六觸處無知實通達無知增上慢者於所修法顛倒思惟也略十九種無知取意或擬不動十九布字立十九種金剛也不動立䡄十九布字云從頂至足一一身分普布之不過十九數如是畢自身成聖尊一切天素羅等不能動搖取意此即破魔𭜨成金剛身有十九功德也以十九擬十九布字是古來祕義也不動是金剛部教令輪也金剛手院二十一尊可攝此不動一尊也仍配當尤相應也或云十隂滿九陽滿隂陽合論故有十九是理智圓滿義也云云或云八約人法有十六彼加三部為十九歟云云如是上首十佛𭃯等者或云十佛𭃯皆上首也故文點云如是上首之十佛𭃯等云云故疏十五云十佛𭃯土諸執金剛皆是上首也文或云上首者十九種也十佛𭃯是眷屬也文點云如是上首者十佛𭃯等云云故下舉菩薩衆文云以四聖者而為上首如執金剛有十佛𭃯諸菩薩亦有十佛𭃯衆取意此文所顯今上首又可局十九也私云二義中初義違菩薩釋例又違此等上首執金剛文後義背經文如四大菩薩下置等字金剛十佛下置等字并又與俱文違諸經例望教主云與俱今對眷屬上首云與俱故今謂不爾如是為上首可訓矣意云十九為上首十佛𭃯為眷屬與教主俱也為言但至下釋者彼具文云若入字門十佛𭃯土等云云且歸字門不論主伴異故俱云上首也若具存梵本等者上既云然此經梵本闕無通序文何今云梵本耶或云其金剛已下通序梵本有之云云暹義私云指具本歟可曰具存之梵本歟故結云大本當具存耳於宗通之用等者抄云今此絯其大領所要用者上首一十九數枝末眷屬皆悉隨之於此持明宗中通途之用者不以為闕少耳又解宗通之用者然此經宗有通絯法界之用若人若法皆無盡故文疏第三云此領解中文雖簡略而提舉宗通妙旨無所不周文義釋第七云然此經大本一一善知識三密門中各有種種異方便真言數如恆沙不可備載今傳法者為欲攝廣為略故最其宗通要旨義兼用者舉為一品名曰普通真言藏品也文如來十種智力者十智力釋論文如上之又俱舍云世界海世界性等者摩訶衍論抄第十云然彼十佛境界所依有二一國土海圓融自在當不可上證果分下證因分二世界海有三一蓮華藏世界海當是十佛等境界二於三千界外有十重世界一世界性二世界海等當是万子已上輪王境界三無量雜類世界皆遍法界如樹形等世界皆遍空法界互不相得此上三位并是毗舍那十身攝化之處仍此三位圓融無得隨一世界即約麁細有此三故當知與三乘全別不同也文私云三重世界中舉第一第二云世界海世界性歟或第二十重世界中一二歟智論五十云復次三千大千世界名一世界一時起一時如是等十方如恆沙等世界是一佛𭃯世界如是一佛世界數如恆沙等世界是一佛世界海如是佛世界海數如十方恆河沙世界是佛世界種如是世界種十方無量是名一佛世界於一切世界中取如是分名一佛所度之分文又第五十五有釋然此毗舍那內證之德等者內證德者諸智能現本地身也各現執金剛身者所現加持身今經同聞衆也疏第三云從金剛密現第一重金剛手等諸內眷屬文形色性類皆有表像者抄第二云形謂熙怡忿怒色謂青黃赤白蓋分性類差別故表息增降敬餘法門例爾文各隨本緣性欲等者法界宮中雖無實行解門所現善知識引當機衆入法界万荼故云引攝衆生也從此一門得入法界等者抄云從此一門乃至法界門如從一門見王即是遍入千門万戶行人隨從一門即須直入文問當卷下文云行者精勤不久成此仙身更轉方便即成毗那身也文相違如何答疏第四云如華嚴入法界諸善知識各各於一門中所通達法深廣無際然亦互不相知文又下文云然其學者隨於一法明道而得悟入即是普入一切諸持門如從一門見王即是遍入千門万戶文抄第五會前後村違云前約漸修此約頓悟又前是行布此文圓證文準此釋者第卷前後釋又於一機約頓悟漸修歟疏第二云王子初誕育時衆相備具頓悟遍習衆藝統御四洲漸修取意或又約頓漸二機歟疏第六中舉頓漸超三類之故又第四文上明知識互不知下文行者悟入何云一機頓悟漸修乎又疏第三云復次大悲胎藏發生三昧中有種種法界門種種善知識如善戝童子次第詢來或於如是法門已善修行而於餘門未能究習若入普門世界時則能於一念中具足相應是名深行阿闍梨也文此又雖修一門不入普門不能窮盡也又雜問答云若有人入此三昧門而修行者即從一門直至如來所證文此同今疏文矣重意云得入法界者一門法界也即上同於本尊也即是普入等者普門法界也從一門即入普門故云即或一門即普門故云即也意云從此一門得入一門法界則即入普門法界也為言故知從此一門等重牒上意為入普門之由來也又義云得入法界者普門法界也從此一門者指上同於本尊一門也是從一門入普門義也普入法界者又從普門法界為化他出各各一門故云普入一切法界矣或得入法界又一門法界也普入法界者釋成一門義也意云得入法界者十九種金剛等一切一門法界也為言弘長元年七月十三日於醍醐寺報恩院抄畢賴瑜生年三十六𭠍
