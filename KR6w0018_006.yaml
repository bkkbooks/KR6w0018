body:
  text: 疏卷第一之六預測如來等者或云金剛手見瑞相之條末而悟內證之宗本故云測加持深意也故云善哉又能下金剛手以五喻顯一切智功德而作大會生解因緣即測聖心不失機會又云善哉也云云私云測下二句如次結上兩義也此意測聖心不失機會可讀也又義今文次歎宗本條未也謂實智宗本是加持深意故權智瑞相即生解因緣故例如法華藥草喻品善哉善哉文釋歎權實二智矣依此意預測二字貫又能已下文讀之測又爾也二義中前義為勝上既明見未悟本之義畢次金剛手五喻為生解因緣然後如來云善哉善哉豈漏五喻義耶故上釋云金剛手觀知獨一法界加持之相測加持深意義也先喻其㓛德五喻㓛德也發起大會生解之機矣作生解因緣義也文理俱得故前義為勝耳我觀一切等者此下釋第三善哉也三句同攝一切祕深事故復歎也一切天人等者外金剛部八部等淺行諸菩薩者第二重諸菩薩等也金剛手是第一重聖衆也若依深祕門四重聖衆雖無優劣若依淺略門四重圓壇非無淺深仍望第一重而第二重云淺行也又義指加持世界實行人歟然前義為善加持世界人既非會座衆何云無能發問矣問守護經第一云爾時法自在王菩薩而白佛言彼一切智諸佛境界三昧以何法而為其因復以何法而為根本云何修行云何究竟略抄此中根本修行第二句中大悲万行歟既自在王菩薩發三句問若爾何云無能發問者耶答彼經文大旨同今經可謂同本異譯設雖通餘菩薩發問為歎金剛手且作此釋何失金剛手㓛德倍增者實雖久已通達為未來流布準常法得益之義示現此相歟復明於所受法等者此下釋經汝當等文也謂於今經文有二意初釋意諦聼作意者顯令金剛手於受法無漏失也亦為以下釋意真言教自受法樂故法界宮無當機故大日如來為令金剛手諦聼作意為未來衆生流布此教殊明此囑也為言諦聼作意文云此囑也又義以如來已下皆為汝當等釋也意依善哉加持故功德倍增又依此加持故受法無漏失也亦為未來弟子者或云自性會中未來入故云未來弟子也私云今經雖三世常恆且約傳法聖者流傳云未來歟故經云我當來世時等矣深心受法之儀式也者抄云深心曰諦囑耳曰聼聆音察理名善作意矣此意以今文為亦為已下一釋也私云今此句上兩釋結也復明於所受法等約金剛手釋諦聼作意義亦為以下約未來衆生釋諦聼作意義也此等皆深心受法之儀式故云爾也故釋論云等者智論第一云復次如是義者若人心善直信是人可聼法若無是相則不解如所偈𥊸者但觀異本如渴飲一心入於語義中踊躍聞法心悲喜如是之人應為矣私云作意是驚覺義信是心淨義唯善遍行雖異受法聼法義同故引證矣或深心義通作意及信歟抄云疏得深信力者謂深心淨信此信有力得離疑惑矣無盡意經等者抄云疏指無盡意經未見其文如智度論云有人若聞若受阿字教時當得二十種㓛德抄具出二十種德撿可見疏第十六云如大本中有二十種勸令聼法之相佛為執金剛除一切塵垢及修行真言行諸菩薩等法要未具不得成無上菩提今復以滿足前義令法要圓滿若不知解此則前法皆未周悉以此因緣勸令諦持也如此二十種因緣當廣矣金剛手菩提心為因等者守護經第一云善男子此深三昧以菩提心而為其因以大慈悲而為其根本方便修習無上菩提以為究竟矣藉四大衆緣故得生根者今三句配立故種根果次第也若𭔹十心牙莖枝敷花皆根攝三心十心開合異故牙莖等𭔹果實有根義故問若爾四大緣三句中何攝耶答或大悲攝故下釋云大悲地界等根是万行大悲為緣生万行故又義種子四大因緣雖異皆能生故因句攝然以中智觀之等者智論第五云不生不不斷不常不一不異不去不來因緣生法諸論矣嘉祥大乘玄第二云因緣即八不八不即是因緣矣又云因緣相所謂不生不也矣準此釋今不生不因果義成者八不因緣也生斷常論之相是彼八迷論也今中智觀者彼智度所八不中道觀也以彼中道觀離八迷類顯今行者觀心實相出人法論也又準菩提心論中真言機云上智顯教大乘智云中智歟以顯中智觀為譬顯密乘智觀也兩本義釋不生不下有非不生非不之六字也於內證所行得深信力等者疏第三釋信諸佛菩薩文云又此行者於衆緣事相皆以諦信行之以此深心淨心離疑惑故漸得法驗現前復由法驗現前故信解轉增不可殂壞矣私云準此文深信信解似約一人初後歟但至下釋以今文同深信矣又下釋有大信解勤勇深信文云此信解梵音阿毗因底謂明見是理心無疑慮下云深信者此信梵音捨攞馱是依事依人之信與上文信諸佛菩薩義同若人聞如上不思議法界以宿殖善本神情明利故即能忍受其言知衆生心中決有此理名為信解又先世已曾親近善知識故於三寶緣深雖不可比量籌度處即能懸信故曰深信矣或云信解常途信也深信今教信也報恩院僧正云深信者但信也信解者具領解信也二俱雖今教信深信勝歟今教以信為本故故第三上釋云謂此宗初入法門時意尤淺近難識且三乘實相無不離於文字而真言者要須口誦梵文心亦觀之或屈申身分支節猶如弄或修三昧乃觀女人之像忿怒等形或以水灌頂或造火壇若欲以心識籌量則加持之迹又不可見自非具深信者安得不疑慮耶又此行者於此衆緣事相皆以諦信行之矣又木上人義云深信信解如次利鈍二人猶如立解二分機信即悟法故云深信信而解故云信解矣離業壽生成就真性生者抄云謂離如是業壽生故而得真實菩提性生矣又疏上釋云一切薀阿賴耶業壽種子皆悉焚得至空無垢菩提心矣準此釋真性生者菩提心生即因句也行㓛德如次根究竟二句歟或万行即功德也菩提心直生大悲万行故從此增長釋同第二劫漸次滋長文故又義於內證乃至堅固不動菩提心句深信力即白淨信心義故次離業等二句從菩提心種生大悲根也万行等二句從悲根生万行牙莖等義也或又堅固不動本有菩提心真性生修生菩提心也又義得深信力者生死中諦信也真性生菩提心為因也若望生死中等者或云地前三劫分位皆云生死所殖善根也疏第二云此心極無自性心望前二劫住心論云他緣一道猶如蓮華盛敷若望後二心論云根究竟即是果復成種矣又住心論云是因是心望前顯教極果於後祕心初心矣準此等釋一道心已前可云生死善歟私云今住心品意以十地盡修行次位謂以十信三賢行攝十地不立地前位故云信解行地信十信解三賢解行行十地万行也故未發淨菩提心前皆薄地凡夫故云生死中我等未發菩提心前隨分修三密行疑五相觀故指彼云生死所殖善故五祕密經云才見曼荼羅能須臾項淨信以歡喜心瞻覩故則於阿賴耶識中種金剛界種子矣以須臾淨信殖金界種故指此等云生死所殖善也次下釋云四威儀之中作意修習現生證得初地矣四威儀修習今如而行等也證得初地即菩提心為因也又三摩地䡄云晝夜四時精進修現世證得歡喜地矣今經供養行修行從是初發心即此意矣今教意機根雖万差不過一生二生二類然即身成菩提以現世證得歡喜地文證之若地前存位不可云即身三賢又菩薩位故故知若一生若二生從薄地凡夫或至佛果或至初地初心凡夫此生證悟判文無異論者歟爰知初地已前生死中者具縛地也晝夜四時精進修豈非具縛行耶問今宗又立地前次位明文雲披疏中四十二地階次不同矣禪要問法身讃等儀䡄本經等亦立地前位今疏十六重深行三劫六無畏等豈非地前位耶答凡地前立位是鈍機難解故且順常途擬冝外迹而為令人知開㓛德品數例如天台云法在一心必次第也依之疏第三云若觀前人未有深解之機則順常途隨文為釋若已利根智惠則當演暢深密而教授之矣禪要地前三賢得除蓋障者今初地三昧順如常開三賢也法身又以初地金薩開也凡今教意薄地晝夜四時行功積觀行圓滿頓斷三妄得初地淨菩提心也故大師釋云頓越三妄入心真矣心真者真淨菩提心也既云頓越三妄不可有地前斷惑義也若爾實修實證時初地頓斷頓證故無過問三劫六無畏二障惑斷證二空理何無地前斷惑義耶頓越三妄約一類頓機漸機豈非地前斷惑耶答今教意有利鈍故地前凡夫位三密行雖有遲速入初地時不問利鈍皆三妄頓斷得淨菩提心也三劫二障漸斷是如常時分義今以初地所證㓛德寄彼而顯云三劫瑜行也六無畏中以無我無畏同不生愛慢等實非真實行者斷愛慢不生愛著故云爾也猶如不淨觀治貪矣今宗又非無頓漸機彼皆於初地已上十六生論之依之大師釋於十六大生示頓漸利鈍異疏第六卷中從開發淨菩提心入菩薩位至中胎藏出頓漸超三類故知地前開次位順如常教道設地上是頓漸實證位也依之疏第二卷釋初地云從此無有待對矣地前行皆𭔃如常初地已上正真言次位故作此釋也故第三云離垢地以去於自地觀心中修漫荼羅行矣離垢初地空無垢位真言實行次位故云自地也上釋云則雖十地菩薩尚非其境界况餘生死中人矣此乃舉真言修生行者凡聖也又第七云如來知見一切衆生法爾成就不如實覺故名生死中人略抄我等真言躰相雖法爾成就未入初地時不如實覺故為生死人也為言然隨分非無三密五相觀行耳譬中即生諦信如而行等者生死中行也知識詞勤修方便是也漸見前相者初地菩提心也知識語云而開發之是也修勝加行者知識詞周給一國等歟然望根究竟云前相也文永十二年五月上旬於傳法院大會豫始成此義或以覩佛法前相者指生死善根望菩提心果云前相歟如唯識論中云道火前相故亦名燸可讀文點切不已漸見前相也菩提心論云若才見者即名見真勝義諦文此意也此開地前位也爾時下釋菩提心也離疑惑心是白淨信心義也堪能下舉根句顯因勝能也問諦信豈非白淨信心耶答諦信薄地凡夫須臾淨信也非淨菩提心也故疏第三云又行者於衆緣事相皆以諦信行之若勤苦多時未𮐃現益爾時自思惟惑障重故文初地淨信無現益耶又云惑障重乎故知今諦信非淨菩提心也前義爾時以下文釋成見前相之意也譬如有人等者謂以𣵀槃經貧女伏藏譬為今經菩提心之譬歟故𣵀槃經第八云善男子如貧女人舍內多有真金之藏家人大小無有知者時有異人善知方便語貧女人我今雇汝汝可為我藝除草穢女人答言我今不能汝若能示我子金藏然後乃當速為汝作是人答言我知方便能示汝子女人復言我家大小尚自不知况汝能知是人答言我今審能女人復言我亦欲見并示我是人即於其家掘出金藏女人見已心生歡喜生竒特想宗是人善男子衆生佛性亦復如是一切衆生不能得見如彼寶藏貧人不知善𭤧便者即是如來貧女人者即是一切無量衆生真金藏者即佛性也文即是白淨信心義也者釋摩訶衍論釋信云令心性純淨明白文唯識論釋信云心淨為性文故云白淨信心也若依深祕菩提心即白色圓形故云白淨歟問能求菩提心專智惠為體何云信耶答信相應惠是菩提心躰故若與信不俱起惠不淨故若非惠者何有知自心菩提覺知故也若無信豈有心淨義智淨依信故云淨信猶如云念住矣但智論中非由惠等者不與信相應之惠歟故智論云佛法大海信為能入智為能度文或初入專依信故非終無惠矣或疏第三云一切善法以信為首當最初之文或云菩提所求果菩提之心故云菩提心若爾但信歟私云依主持業隨冝準性相釋信不獨起必與惠俱起故法界無差別論疏云菩提此云覺謂佛果大覺於此大覺起心正求從境目心故云菩提心又釋準下自性淨心則是性淨菩提故云菩提心此乃菩提即心故文私云此釋持業約本有依主就修生也今徵云何菩提菩提心論中云菩提為因皆依修生而作持業歟或又依主又名能求故釋論亦云等者智論第一云問曰佛經何以故初稱如是語答曰佛法大海信為能入智為能度如是者即是信也如梵天王請佛初轉法輪受梵天王等諸天請法以偈答曰我今開甘露味門若有信者得歡喜於諸人中得妙法非惱他故而為佛此偈中不布得歡喜亦不多聞持戒忍辱精進禪定智惠人得歡喜獨信人佛意言我法第一甚深微妙無量無數不可思議不動不倚不著無所得法非一切知見則不能解是故法中信力能初入非布施持戒等能初入佛法智證抄云今案言信力者即三句中初菩提心也唯一切智人能解了此心耳文般若寺抄云信義如法華疏又如梵天王請轉法輪時佛偈言又法華經汝舍利弗以信得入文私云法華疏者嘉祥義疏歟彼僧正本意三論故而又彼疏以法華今文為二乘入十信之證今疏白淨信心為十信之意歟次大悲為根者謂於此句有二訓釋一者大悲為根可訓大悲即根也下釋云所修万行即大悲地界所犱持故乃至無量度門開發如芽莖枝次第莊嚴取意今釋云根是能執持義猶如樹根執持莖花果云云前後釋意大悲為能執持根行為所執持芽莖等也問上釋云猶如世間種子藉四大衆緣故得生根文準此釋大悲地界等應是能生緣根既所生何云大悲即根耶答疏第七云淨菩提心以五字門為緣生大悲根文準此釋今四大緣者智門五義非大悲故生大悲根有何失矣但大悲地界等者若望行大悲并四大能執持故文點可讀大悲地界所執持故云云若依實義大悲望万行雖有能持義對智門五義還是所持猶如根望芽莖等雖能持望大地亦為所持矣或又大悲是地界所執持也為言上文所修万行者不分大悲行𢝰云万行歟故下釋云六度等皆入大悲句中文又義上譬種根果次第猶如十地配三句今文十心次第如十地當十心也十心時二地已上芽莖等三句時云根故或云若望因句種子悲句云芽莖等若望究竟句芽莖等𢝰云根也二者疏第三云謂得淨心已去從大悲生根乃至方便究竟文準此釋大悲作根可訓是万行望究竟云根歟故上釋云種殖方便根芽漸生文種殖方便可類大悲歟又今由如芽莖等文兩本義釋云由如芽根莖等文又疏第二云以種種大悲行淨治此地名為根文此大悲万行俱云根準此釋根隨冝兩點皆是問準方便為究竟向上向下義今二點又可上下義耶答此於向上有兩點異彼矣問若爾菩提心為因句可有二點耶答其義何無若約本有菩提心即因也若約修生菩提心作因可訓歟本有菩提心生修生菩提心故慈如廣植嘉苗等者般若寺抄云意慈如植種悲如藝除草穢言也文疏第三云慈悲謂憐愍之心徹於骨髓諸有所作皆為建立衆生必使成就無盡法界之樂度無餘衆生界之苦文祕藏記云與樂為慈苦為悲文私云以苦與樂方便令衆生安立云建立衆生也藥師經云皆以大乘而安立之文發起悲願等者菩提心能起因也悲願所起即根也悲大悲願万行五大願等普賢行願故所謂苦與樂下化有情望無餘有情界生根也妙業皆成上求菩提向一切智地生根也故云皆悉生根也此自利利他行皆三句中根句故云生根也三力中法界力者朝譽云所觀境隨觀心轉云法界力也又真興僧都釋三力頌云意云新佛㓛德力古佛加持力法界平等力故道場莊嚴自然成就以此莊嚴廽向法界故云供養然則安住故云而住也云云或云六大法界力也先師云本覺佛性力也即內因也以我㓛德力者自修行之㓛即自緣也如來加持力者佛菩薩外緣加被即他緣也具如釋論抄私云法界力者一切智性佛種即因也自善及佛加持一切智門五義也即緣也故疏第七云淨菩提心以五字門為緣生大悲根文是即因緣和合生根義也故云即是於一切心法具足因緣之義也謂万行圓極等者初二句向上方便是修顯自利義次二句向下方便𡸁迹利他之義也後二句通二矣祕藏記云從凡位修行六度圓滿成佛故曰以方便為究竟成佛以後以大悲濟度衆生故曰方便為究竟向上向下讀文有異文祕釋云方便有二隨順菩提方便隨順衆生方便異故取意向上點云方便作究竟謂以因位万行方便成果地究竟之義也向下點云方便為究竟謂以𡸁迹利物方便為究竟之義也般若寺抄云方便為究竟者以利他為究竟言也文問準疏第二釋至第八地以去皆名方便地既八地上若爾何今云万行圓極又云醍醐妙果屬妙覺耶答第二卷作長短二釋若約長義八地上約境界同云圓極云妙果歟例如四佛四菩薩雖異云醍醐果德矣若約短義果位是極解道故云爾問三句廢立既不同何無以佛果為究竟十地以還為根之義故次下釋云万行所成一切智智之果名方便文又第二十云次成佛果入中胎即是方便句也况非唯果位何有向下方便義耶爾何答一切智智果者因果義相望不定故對七地前万行八地上約境界同義云智智果也十心時八地云果中之果故又第二十釋第二第三皆是大悲句文第三者第一重也第二第一重為悲句八屬究竟歟若爾何唯云佛果矣凡三心十心各作二釋外更無別義故又八地等位有二利行何無向下義耶或八地上為究竟之中約極位作此釋歟猶如真金等者前以種芽等譬而顯三句淺深今以真金喻示三心優劣譬雖異所成義無別意矣或云上釋明為因為根為究竟之義今文述菩提大悲方便之旨此義不爾前釋菩提大悲等義分明今又為因等意顯矣私案謂於三句各有二菩提心二者前修生今本有故根二者前約万行今就大悲故究竟二者前約究竟今就方便故問前文中釋大悲并方便義今文云一切智智果非究竟耶答前雖舉大悲為顯万行所以所修万行無量度門為要故又万行應物方便又為成圓極究竟義故今文顯智智果即方便也又內具方便豈非果耶規製中權者抄云規矩也製作也中去聲者不失之義也權冝也所有規矩製作不失於權冝爾也文規製中權可讀歟智證抄云阿闍梨云規製之權也未詳私謂中者合也權冝也言規製之妙合的於冝矣文得意之妙者抄云莊子云言者所以在意得意而亡言吾安得夫亡言之人而與之言哉夫以利人順天下之望雖終日常即是亡言故知亡言非扗口而不言但在乎得意可謂妙矣今借用之文如摩訶般若等者此文重釋前根究竟二句也或云為明第三句有二利舉悲句為來由也彼者指般若所明或又指今經大悲句或通二歟由內下釋利他方便已上自利方便也問方便是能成万行何所成果云方便耶答方便之究竟故依主立名歟或方便通所成歟疏第二云更開佛地為上上方便心文若爾持業得稱歟或又依主歟三昧道品者抄云謂三三昧乃百八三昧道即八正道品即三十七品也文疏第十二云謂六度十八空三十七品禪定解百八三昧門五百𨹔羅尼門文持門五百𨹔羅尼門也云何菩提者前云菩提心是能求菩提心今但云菩提所求果歟云開示功德寶所似示所求故次下經云是阿耨菩提等文謂徵釋前菩提心何匆所求矣今菩提者以有戝名能求心故但云菩提故菩提心論引經云菩提為因文又開示者開顯義即知義寶所者自心即如實知自心義也或開義也如來徵釋開功德寶所之義故淨菩提心望生死所殖善是寶所故智證釋云言寶藏者如實知自心也文次經阿耨菩提舉所求菩提顯能求殊勝歟或又釋云離此無相菩提心等文彼又能求歟又義守護經云善男子欲知菩提當了自心若了自心即了菩提文大師彼經釋中合今經云何菩提等文既云即了菩提今菩提所求菩提也戒序云言菩提心者此有二種一能求菩提心二所求菩提心能求心者如狂人解毒忽起歸宅之心求菩提之心亦復如是所求心者所謂無盡莊嚴金剛界身也略抄問能求菩提心八識中何識分齊耶答或云第六意識也故菩提心義不空云若依修進起行願門即發起妄心求菩提心故名菩提心故起信論云則令妄心猒苦欣樂取意釋論云以意識中本覺智分薰意識中無明癡分猒生死苦欣𣵀槃樂文又大師釋云遇內熏外緣之力猒生死樂𣵀槃發始覺日光破無明暗夜文依此等釋無爭第六識發心也義章第三云於六識中所修淨行熏於本識於本識中佛性真心名為解性解性受彼淨法所熏成淨種子淨種成已熏無明無明薄故反起六識於六識中起善轉勝如是展轉乃至究竟文今教發心修行應準此義故金界儀䡄云心為阿賴耶修淨以為因六度熏習故彼心為大心文此文意識依第八起淨用云菩提心也或云凡今教意教力勝故真言行者初發菩提心即第八識也故心要云夫修行者初發信心以表菩提心即大圓鏡智紇里娜野心文今紇里娜者祕藏記云質多亦名于栗多心也文此意也若不爾何云大圓鏡智耶彼第八識寧非緣慮心耶况復今疏自心發菩提等因行證入次第以第八識為因經䡄明文故心自覺心是以第八識知第八識之義故論云法爾應住普賢大菩提心文又略出經云一切衆生所有心堅固菩提名薩文普賢薩同躰異名皆第八識也又金界心為阿賴耶彼心為大心者淨心熏習故有為賴耶轉即作大菩提心也又菩提心義并大師釋約迂回行者云爾歟或順如常非今宗實義歟私更解云淨菩提心已前生死所殖善薄地所起故最初發心意識分齊歟初地淨菩提心是斷人法論無漏位故第八識發心也轉識得智義又爾也例如起信論三發心矣故疏云此菩提心為後二句因若望生死所殖善根則名為果文可思之大乘止觀上云謂以意識能知名義故聞一切諸法自性寂靜本來無相但以妄因緣故有諸法然妄法有即非有唯一真心亦無別真相可取聞此已方便修行知法本寂唯是一心然此意識如此解時念念薰於本識增益解性之力解性增已更起意識轉復明利知法如實久久薰一心故解性圓明自己照己躰本唯真寂意識即息爾時本識轉成無分別智亦名證智文準此今又我等凡夫以意識聞六大四等理發心而修三密行知即事而真之理此意識如此解時念之薰於本識增益解性轉復明利晝夜薰於一心故解性圓明自己照己躰本來不生意識即息爾時本識轉成圓鏡智云初地淨菩提心也淨影南嶽釋雖義㔟相似彼但以意識證果位此以意識為方便本識證理因位證理猶本識歟猶如釋論初地以上正後二智依業識證理耳又心地觀經第八發菩提心品云自覺悟心能發菩提此覺悟心即菩提心無有二相自覺悟心有其四種謂諸凡夫有二種心諸佛菩薩有二種心凡夫二心其相云何一者眼識乃至意識同緣自境名自悟心二者離於五根心心所法和合緣境名自悟心如是二心能發菩提賢聖二心其相云何一者觀真實理智二者觀一切境智如是四種名自悟心文又云凡夫所觀菩提心相猶如清淨圓滿月輪於臆上明朗而住文私案依此文凡夫最初發心是第六識也其故凡夫發心中五俱意識與獨頭意識名自悟心故謂初云眼識乃至意識同緣自境者五同緣意識也同緣邊雖非發心識躰五俱意識同剎那緣十八界諸法故此五俱意識起猒求心邊云自悟心歟五同緣邊與五識同一所緣同一行相故非發心也然今同緣自境者非取五同緣為取五俱意識也其自躰雖同見分是異故又五同緣狹也五俱意識廣故次云離於五根乃至名自悟心者取獨頭意識猒求心云自悟心也謂簡前五同緣云離於五根等當知獨頭意識也不可云第八識耳次賢聖二心云觀真實理智觀一切境智者如次正後二智也正智觀理後智緣事故準起信論中云正後二智依業識者今又應第八識歟或是又應第六識凡夫發心意識外不出第八故况相宗等意以第六識為正後二智所依又為發心修行識故次下又出凡夫所觀識云心月輪是第八識故故知第八識為所觀第六識為能觀能求也問如實知自心意如何答大師二字義云問如實知自心如何耶答阿字本不生故知自心本不生謂之知自心也問阿字本不生故何云如實知自心答阿字本不生之理云實此本不生理為自心性故也問本不生者心性都無故云本不生歟為當雖有心性無變易故云本不生歟答非謂心性都無自性清淨無改性故云本不生文故復言者今此四字結上也謂上如來得一切智雖云菩提心為因未示彼菩提心在處故今重云如實知自心而示所在故彼如實知自心文云故復指言也言如人雖聞寶藏乃至無由所進故復言即此意矣故智證大師釋云私案言寶藏者謂如實知自心也人聞寶名不知在處無由進來故復指言云何菩提謂如實知自心也故復言之四字結釋上句也文又云阿闍梨云復指之字為句頭以行者自心耳之句為句末矣文此法全阿闍梨口決故復指言為句首從自心字返讀之密抄云前福要令生信此間要如實知今疏復指意要信智具足寶藏得現文意云上文菩提心為因者因者釋白淨信心義是即信有菩提也雖信未如實了知故今更示以智惠了知彼菩提之義也為言此釋讀文同法全義但彼釋未別信智異耳三義中初義為勝矣問菩提心唯知自心不知他心耶答疏第三云復次深祕釋者知衆生心即是如實知自心以能知自心故即能明識他心如家有寶藏即善他寶文如上所明等者智證大師抄云如上所明等者疏上文云佛意如是我第一甚深微妙無量無數不可思議不動不倚不著無所得法非一切智人不能解故以信力為初今案言信力者即三句中初菩提心也唯一切智人能解此心耳若𭔃佛意之言於言無妨若言疏師之所指者於事無便若就人師解者可以復指之四字為論結辭也若言佛語者以此四字為句頭以不從他得可為句末耳文私云上佛意如是等是智論第一卷文也何為佛語耶故知如上所明者指菩提心為因等文也此菩提心第一甚深微妙之法故了了證智是名成菩提者或云今成菩提者初地菩提心位故分證也不由他悟不從他得文同華嚴經自悟不由他具足同如來文彼既云即得入初地全同今初地菩提心又具足同如來句同疏下當知行人則是位同大覺也矣加之次下釋信解品窮子譬類今成覺彼既中根聲聞至法華而開初住覺喻窮子知父也能譬既分證所喻豈究竟耶又義既云了了證知又上云非一切智人則不能解可究竟成佛彼華嚴猶云初發心時是因成正覺是果一位即一切位乃至佛果無不圓備故云正覺豈是因中果耶香象釋况今宗乎依之別本即身義以如實知自心為究竟即身成佛但於不由他悟同者彼雖初地此究竟何失初地猶爾况佛果耶故疏上釋云如來自證之智設以神力加持亦不可示人文又位同大覺等釋即順如常之歟又信解品譬喻隨義轉用歟况彼文同上所或有初發心時即得無上菩提之文彼既一生成佛證此何不爾又義可有二意若約頓悟究竟故云了了證知又云一切智人所解若約漸證是分證故取信解品譬又下云然非究竟大牟尼位也故上所引般若經兩菩薩即此意祕藏記十六頓證漸證二類別本即身義大機小機是其證耶又清涼演義抄第二云初發心時便成正覺者正明以初攝後通於二義若住滿成佛即是當位以初攝後若究竟成佛即異位相望以初攝後文可為準據矣又義凡今教意若利若鈍開發初地菩提心一切機皆頓證也譬如開宅中寶藏時珍寶悉滿足也若爾今成菩提何有分證義耶但論利鈍不同是生死凡夫位非菩提心以上也今教意地前不立位也信賢位攝於十地名信解行地故或經䡄中地前開信賢或二地上論漸證皆是教道施設非實證義且為令知㓛德品數開也猶如彼天台云法在一心必次第又華嚴云紙同時讀時前後矣問若爾如實知自心時凡夫業惑貪等轉即為功德歟又不爾歟如何若云轉者與顯乘何異耶若云不轉者生佛何異耶答大師云知名佛不知名衆生云云於法之躰性佛性然德故不可論轉捨矣故異顯乘又如實知自心不如實知自心故生佛自異矣不如實知自心者論云無始間隔是也問凡聖貪等無差別者諸佛又可行欲事耶答不爾諸佛開如實知自心故以貪等作利衆生佛事衆生不開如實知自心故以貪等增三途業矣例如長者宅中雖有毒藥知運用方便受用故無失窮子宅中毒藥不知方便故害其身矣問若爾生佛二界貪等性修不同也何異顯乘耶答彼達摩宗以惠可本無煩惱元是菩提為極頓者是談一有一無故未及顯一乘立性𢙣矣又天台等雖立性𢙣未及此宗全𢙣是𢙣之即事而真故異也問云天台智禮等談修𢙣全躰即性𢙣故指要云煩惱生死既是修𢙣全躰即是性𢙣法門故不須斷除轉也文何答彼雖成全性起修之談不及此宗現覺諸法本初不生之談也所以彼雖煩惱菩提二物相合背面相而談直須當躰全是方名為即云云猶未廢性修二門故彼釋次下云諸家不明性𢙣遂須𢙣為善斷𢙣證善既不能全𢙣是𢙣文是即雖煩惱菩提二物相合即還成性修二物相即今宗不然法法塵塵悉法佛法爾躰無性修二門故然則顯教一乘雖甚深緣起因海修惑歸性德果海談即故也此宗性海所六大本有談故法法塵塵悉本有云即者當躰即也非攝末歸本矣六大相望雖作主伴俱本俱末也彼顯雖俱躰俱用用猶因分不見果海用也故祕藏記云性之處性相然而本有也文所謂愚童凡夫等者愚童凡夫世間三心識性二乘唯薀業也或識性二字屬上句歟點云少有能信識性云云然屬下句文言善二乘云有識薩故發心正覺四箇大乘也又云識性二乘大小乘也如實知自心是天台彼宗云如實知自心故初發心時便成正覺華嚴彼經有此文故又義識性二乘但小乘如實知自心真言四箇大乘通知不知故且略之歟問住心論云如實知自心竪有十重淺深云云今何二乘等云不知心耶答彼一毫善皆知自心之用故云爾今云少有能信又云雖自觀察是也此就正約躰故二乘等云不知也問若爾異生羝羊有此義耶答或云異生又分有其義有知過義故故大師釋云九種心藥文又云十重故或云大師釋云一向行𢙣行不修微少善文又愚童癡暗不信因果之名也文疏云愚童凡夫違理之心文無知心義也先德釋云愚童持齊修善始文但云十重又九種心藥者言歟私云釋論中或覺知前念起𢙣即云十信或未得十信前有猒求云云抄釋云此是根鈍懈惰之流若是利根健勇之者聞法發心即登信位文準此釋異生中若鈍根分有知過未必改若利根知過即必改故第二心也故宗家兩釋無違疏又今文愚童凡夫許信下文云違理此意矣又云知過必改齊賢聖第二心例如釋論中覺前𢙣止後𢙣俱為十信矣彼法少分等者抄云言彼法等者即彼從緣生色最微少法也謂阿耨菩提但是自心若離自心之外更無有似彼七微合成微小之法而可得者也文私待此自心阿耨菩提指衆緣生法云彼也是者此義也故疏云此無相菩提心文彼法言廣通緣生色小分言其中取七微合成也智證抄云言離此心外無有一法若言有者同於外道及小乘也故言此無相菩提心中無有彼法少分矣此乃私謂未聞師判也云云無上正遍知義前已故者上文云梵云三三佛𨹔者三名正三名遍佛𨹔名知故曰正遍知也文此中雖釋正遍知義未解無上義然正遍知義簡二乘菩薩之名故無上義自顯歟或又上文釋妙吉祥云妙謂佛無上惠文又釋妙執金剛云更無過上義文指此等文云前已故歟七微合成等者抄云阿耨之言或云阿拏此云極微謂四方上下及於中間各一極微名為七微謂七極微互相觸著不相離名為合成文惠暉疏釋同之智證抄云入正理疏下云至初成初兩常極微合生第三子微雖躰無常量德合故不越因量名有二實自類衆多各各有彼因因二極微之所生故自此已後初三三合生第七子七七合生第十五子如是展轉生天地皆名有多實有多實實因之所生麟記云言子微名有二實者漢州云子微名能有父母為所有子從所有以立其名名二實也三三合生七七合成等者此中意云孫微也有翰記云最初兩兩極微合生一子子等父母二微能生所生合在一處名麁餘之微亦然今案七微合成者初三三合生第七子子微名能有父母為所有此乃麁塵也則小乘及外道所計三物在無相菩提心外以為所破也文意云疏兩常極微者父母極微也小乘外道極微云常住故云兩常歟子微已下云無常歟初三三合生第七子者父母極微合生第三子微是三微又如此三三此三三合生第七子微即孫微三三合子微所生故此子微云孫微歟此第七孫微位云七微合成也私云此義未詳彼疏文勝論計執何通小乘義故光師釋勝論劫成義云彼執劫壞之時壞麁色事不壞常微各各別住劫將成時衆生業力令常極微兩兩和合生一麁果量等父母所生之麁果復兩兩和合共生一麁果故復量等父母如是展轉兩兩和合成大地等文彼疏文云至初成指成劫也斯則外道計全不通小乘義况復最初生麁果是若約能生但二微若能所合者三微合成何取孫微位合今七微合成義矣當知今七微合成者俱舍論等佛家七微合成義也故麟記云以對向六方及中須七也文故知演密義為勝矣問小乘又三世實有法躰恆有故存極微實躰何不云常耶答小乘意衆微聚集色法過去謝時衆微散雖住法位已謝極微更不為劫成之因有情共業起別風而為成劫之因故俱舍論云由諸有情業所生風能為種子文又現在聚集色法未來藏極微流現在時成質得義矣問若尓大乘又可爾耶答大乘不然不許實極微故麟記云若準大乘無實極微但是覺惠分拆以為極微此是識心所變非積小成大若小乘中有實極微文若依一乘者一心緣起色法何存假立極微矣若依自宗法佛法爾三色不可云緣起而已次因緣等者抄云因緣者所以義也謂次前經阿耨菩提心外更無一法也次徵釋所以云何以故空無相是菩提等此則經中喻顯所以也文無量無邊祕密甚深之事者或云六大四三密等無邊万德云祕密甚深之事也又如空遠離論等者或云前遍一切處畢竟淨等約理空釋之此遠離論無知解相等依智空解之故云金剛惠耳或云前釋經空相是菩提句此解無知解者等二句私云一文二義何切配矣謂唯是心自證心等釋經是菩提文合譬中又如乃至分別故是中無知解等釋經無知下二句合譬中無知等二句也前釋又離一切下釋無知下已上釋經上句也畢竟淨等是菩提義故一切相動相分別等皆知解義開曉義故抄云無分別者無知解相無開曉相故文故下釋云若分別少分能所所知解法能知解者云能所也即取法非法相不離我人衆生壽命等文當知無小分能所分別故云無分別不取法非法相故云離一切相也唯是心自證心等者疏第六云正覺三昧覺諸法本不生故唯是心自證心心自知心文又第九云以此如鏡之心如心之鏡故心自見心心自知心智之與鏡無二無別文慈氏儀䡄云以心置心以心觀心如實知自心即是母地心文抄云謂諸佛自證三菩提在一切衆生相續中法爾成就無有減要由自覺非他傳授等文意自證三菩提自悟不由他故云爾也故疏下釋云唯是心證心不由他悟文私記云心自證心者始覺會本覺心自覺心者始覺智覺真如理文或云疏下釋願識心心勝云初心是自覺之智次心是心之實相意明境智俱妙文準此心言𭇥理智上句是理下句是智也云云意云心自證之心心自覺之心也為言私云二句同初地淨菩提心第八識質多心覺證妙覺究竟第九識干栗𨹔心也五轉中東因中果不二會義也發心即到初心即極之意也此二句中且上句約所證故云證下句就能覺故云覺又案然釋云以第九質多求第九干栗馱文準此能求所求俱第九識故云心自證心等但用二句者謂於一種第九識約能求故云覺約所求故云證也謂第九識中因時為因即第九質多義即能求也東因時為果第九干栗多義即所求也故大師法身三密觀云瑜伽經中臺上佛為第九阿末羅識此宗因果義逆順次第圓融相即重重無盡文私云逆者中因義順者東因義歟無知解法等者先德釋云空相是菩提者字地輪高窮法界頂故空即地無二無別也無知解者離字地輪無別火輪智惠故云無知解者字菩提即智惠故亦無開曉者無風大也法界橫竪皆地輪故不居風輪風風則地故菩提無相者水大也水無定相隨器方圓故無定相故云無相五大即字地輪之別相離字地大菩提無別五大五智故云云或云知解自證實智開曉化他權智也守護經云是故菩提無所證相無能證相亦無能所合之相何以故菩提畢竟無諸相故文私云能所證準疏釋當能所知解矣能所合當亦無開曉句又準疏釋非始開曉等意少異歟我人衆生壽命者抄云執取自躰為我計我展轉趣於餘趣為人計我盛𮕱苦樂種種變異相續為衆生計我一報命根不斷而住為壽者文又云金剛惠者即般若文私云自證智離我等衆相不動不變不可破壞故云金剛惠也下釋論云佛智惠疏云淨菩提心是也譬如空等者此文有多意或云譬如乃至無所依者上文譬合也空無相譬淨心離衆相万像依空喻於一切法無得也合可知矣即此諸法已下釋下諸法無相等文也菩提相釋無相二字餘可知矣或云譬如已下皆釋下經文也上經無空文故或又雖舉上意下來由故為下釋矣誰尋求一切智等者此三問中初問因句志求一切智是菩提心故次二問究竟中初問隨順菩提方便後疑隨順衆生方便也向上文有二點誰為菩提成正覺者云云又中川點云誰為菩提成正覺人云云此點順疏釋歟然前點又無違猶如無知解者句釋矣向下文古點云誰發起彼一切智云云私云誰發起彼一切智釋云令至妙果令字起盡可思之又守護經云若此菩提相同空一切智躰當何所求云何證得菩提現前一切智智當於何生文大師以此文同今經文生同發起何字當彼字門問何不問根句耶答舉初後顯中間歟或又第二問根歟能成是万行故又義初問求菩提心之人次問依菩提心成佛之人後問發起菩提心之人也尋求約加行發起就根本成佛約所期皆依因句起三問也意後問可在第二故疏云誰能發起此心令至妙果者文前既約因句問答今又可然矣或云智月房問菩提一切智自心之三種也初問菩提因次問成覺果後問自心也或云第三問教主也自心尋求菩提及一切智者覺心云自心尋求菩提及一切智可讀也意行者自心是能求也又所求也為言故釋云誰為能求誰為所求文當知今但答初問顯後二也或又尋求言通答三問歟觀心云自心尋求菩提及一切可訓也意行者自心尋求所求菩提一切智也為言道範云自心尋求菩提者遣初二疑問雖二其意同故及一切智者遣第三疑雖一法只順問有三重置及言也私案云自心尋求也菩提也及一切智也云云意自心二字貫下菩提一切智讀之如次答三問也謂誰尋求問答自心尋求誰成菩提問答自心成菩提誰發起一切智問答自心起一切智也但初舉能求心顯所求菩提後二舉所成所發之果顯能成能發之心三答影略互顯故各備能所矣守護經云一切智躰當於心求一切智智及與菩提從心而生文大師彼文同今經彼文既別答三問此何唯答初問矣若一切智智即是菩提心等者牒云何菩提謂如實知自心之文歟次上云薩波若惠唯是自心是也依此文起二問也意云一切智果即菩提心因者誰為能求所求初問誰為能覺所覺第二問耶為言又復離心之外都無一法者前阿耨菩提彼法少分無有可得之文也次上云無有小法出此心者即是也依此文發第三問也意云心外無一法對誰人能發此心可令至妙果者為言或又誰能已下二句逆次釋上後兩句前文唯釋初問歟二義中前義為勝覺者即成正覺義故又能所求能所覺義異故又守護經云若此菩提相同空一切智躰當何所求等文準此文依空相是菩提句似起三問然異疏意歟若法無有因緣等者今此一行餘文反釋前三問意也故守護經釋中自然成佛已上注入問下故佛答言下注入答下也所謂此釋以答文推問意加轉救難也意依誰因緣求一切智依誰因緣起一切智依何因緣為菩提成正覺者耶若法無因緣而得成者一切衆生應不假方便自然成佛為言私更解云若法已下為答來由作此釋歟故下釋答文畢雖復離諸因緣亦非無因而得成就也文即此意也矣不如實自知故即是無明者問守護經中不正思惟為無明因瑜伽論不如理作意為無明因釋論中依不如而生無明云云今何云不如即無明耶答經論設無一準今迷心實相即云無明故無別能生妄法也故不正思惟或華嚴經云無明或𣵀槃經為無明因也華嚴經二十七云不正思惟起於妄行疏云凡夫無明為因造業故𣵀槃經三十七云不善思惟因緣生於貪欲嗔癡文華嚴經疏云不正思惟是行俱無明𣵀槃此為無明因亦無明攝文演義抄云疏初云不正思惟是行俱無明者此有二意一者為無明支通諸煩惱今取正起行時迷於行過即行俱無明非前發業無明支攝言𣵀槃此為無明因亦無明攝者是第二意為無明支要與行俱獨頭起者非無明支則此一句猶是無明文此釋意𣵀槃不正思惟猶云無明攝歟又釋論等約躰用雖分因果實是一種無明故不立六有為守護經等雖出不正思惟不增十二緣起故無相違歟經云如是二法互為因果互相增長不善思惟生於無明無明因緣生不善思惟文清涼釋云既互相生故即無明文或不如實知是遍計所執也菩提心論云無始間隔是也依之下文中為令衆生知自心約方便遣我可思之如蝅出絲等者二譬中初譬顯一乘一心緣起之義後喻示三乘諸識所變之旨或又初顯緣起流轉之意後示心外無法之理故云當知離心之外無有一法也譬如人間等者阿毗達磨經云鬼傍生人天各隨其所應等事心異故故義非真實文又唯識論七云謂於一處鬼人天等隨業差別所見各異文此等釋人所見又非真實今何人間淨水譬心實相耶答人見亦非實今隨義轉用類淨心猶如眼赤見雖誤約明邊譬佛見矣或又云一境應四心或解云於一水四見不同云云今人間淨水者取一水邊譬淨心歟大師釋云天鬼見別文依今疏釋歟若舉人見何但云天鬼耶或又今文未必依彼經以於一水見寶火譬迷自心生苦樂也若出人見則應云隨人之心或以淨水既不爾又依彼經傍生見同可出之况唯識疏中鬼見膿河云云今云火所見既異何云依彼耶若瑜伽行人等者此下正釋成三答意也謂下文以方便三科等令觀心實相是即見心實相也即自心尋求義也心實相者即是無相菩提者自心菩提義也亦名一切智智者自心一切智義也此心求菩提心成覺心起智如是心自證心等義離緣合起緣散三乘生之因緣而依緣合無起緣散無盡不生不之因緣而得成就故云雖復離諸因緣亦非無因而得成就也矣前述問意云若法無因緣而得成者衆生亦應自然成佛云云今答此意故云也正觀三法實相者抄云若瑜伽行者正觀三法心空菩提與實相等豈非因緣耶云云智證抄云三法未定云云或云煩惱業苦三道云三法也或云自心菩提一切智智云三法也私云心空菩提經云三種未云三法三道疏中出未見經文又云心菩提智智不可然若指彼何觀三法實相云即是見心菩提實相耶故知三法實相者觀三科實相也經并疏皆約薀處界觀心實相故云次下復次世尊欲令衆生如實知自心故更以方便分別演文方便者約三科等觀心實相也又下釋云以上廣對五隂次復十八界十二處此三法已攝一切法云云經云若色若受想行識若界若處此文明鏡者歟又經疏中雖舉外道我見等三科為宗故云三法歟心不在內不在外等者今此內外唯十二處歟云但觀內外十二處故薀界下別明故又兩本義釋中牒經文不在內六處不在外及兩中間文或通薀界歟界門六界外十二界內薀又一外四內故如摩訶般若無量門廣故但觀者對所攝一切法云但非薀界歟兩中間者疏十五云外境內心以身心觀照為中間文義釋十一云外境內身以心觀察為中間文私云疏釋少異然疏釋俱心境合緣為中間云云即離相等方便者此三方便前於內外中間各可有此三也相者相在即離合觀兩中間歟中間有二謂表也即離合故亦即亦離是表也合故又非即非離即也內外合觀又爾也西明釋云解云非即非離即是亦即亦離其義如何若表即離成第三句若即離成第四句謂即故非離離故非即文外人所計有三種故能離方便有三也唯識疏云論一者即薀述曰有計我躰即是薀二離薀即躰非薀三者與薀不即不離犢子外道計云云如來應正等覺者心實相也故釋云此宗辨義即以心為如來等文問所謂內心之大我也文非指外道所計真我耶今復約真我明心實相文此意矣答大我者法身大我非外道真我於此無相菩提心大我計青黃等真我也守護經云善男子一切如來此心相非青非黃非赤非白非紅非紫非金色非非男女亦復非是亦男亦女文此經所云心相佛為如來然皆非外我也今水精色云金色不男女者當非男女歟又亦男亦女又不男女攝歟法華云五種不男故謂非男女無形亦男亦女二形歟然此等衆相悉從衆緣生等者問青黃等衆相是外道所計當情現無法何云衆緣生耶答或云不了自心故而作是言云云外道不了菩提心故謂於依他顯形等色妄謂計我故云衆緣生歟如三界同性也若不爾者何云青實相不壞故耶或云直於心法作青黃等計我宗青黃等云緣生法何為常我耶為言問青實相不壞故者即事而真故遍計所執云不壞歟答彼所執我是躰用都無何云實相不壞當知於依他顯形生我相故約所遍計依他作此歟或遍計理無與真如不變一際故云爾歟如有外道阿闍梨等者智證大師疏抄云外道阿闍梨黑月夜等可求本文自餘小乘論等皆可求之文又云外道阿闍梨者大唐有道士法師俗講其處有聽者世許法師禮稱云南無不可思議功德俗人嘲云南無不可聽聞偏徒等所見也云云開發心明道等者疏下文云法明者以覺心本不生際其心淨住生大惠光明普照無量法性見諸佛所行之道故云法明道也文今心明約能見淨心下法明者據所照法性能所雖異俱名淨菩提心也心王如來者內心之大我經云如來應正等覺是也心非欲界同性等者智證抄云心非欲界同性等者疏云此心不與三界同性也讀之者可存意云云讀之者可存意者上牒界及趣文云亦是對諸妄執等前約著處或對真我明之畢今又約妄執故云亦是而其下云此心不與三界同性也似釋上牒文然今文但釋界非趣故有此勸歟或云三界六趣是別異故次下云次廣分別明知廣三界云天龍等也私云三界六趣若約有情開合隨冝有廣略趣中天有三界天故界廣趣略也又界中欲界有六趣故趣廣界狹也若約其躰趣狹但所往故對中有是能往故三性中趣唯無記也然界廣通善染外器中有故光記云然由煩惱界有差別由異熟薀趣有差別文故知三界同性義不釋八部文也亦是諸妄執等三句通界趣句也廣分別者且約欲界諸衆生趣歟守護經云心非欲界性乃至非人等一切同類文私云今文趣又云同性彼經趣云同類同意歟可尋矣謂非想處即是𣵀槃者抄云謂有一類外道得彼非想非非想處定計此最極清淨處以為𣵀槃也文梵王毗紉天等者疏第十云一切衆生因梵天故名一切衆生主能生一切有情故也文又云次毗紉天有衆多別名即是那羅延天別名也亦是佛化身文智論五云如韋紉天𥘿言遍問四臂投貝持輪騎金翅鳥文此中或計𣵀槃或云生諸法未見界趣同性義耶然彼天即計𣵀槃又彼天生諸法即所計我故天趣同我歟問毗紉天何界天乎答𭤩決第十云毗紉天亦云韋紉天亦天此遍勝亦遍問亦遍淨阿𭇥云是𬼜天俱舍云是第三禪頂天淨影云處在欲界之極文又云韋紉是梵王之父母文私云準此釋通欲色二界然今欲天歟所計我標欲色無色舉三天逆次舉三界天歟其下能破云然此三界故八㓛德性不與彼同等者此水性并寶性譬心性隨器殊味遇物同色心性隨緣而成界趣之義也雖隨緣然水性寶性不與彼同是不變義也上文况令心性同於彼性耶文此意心性者理性彼性者界趣事性也復次世尊將欲開示等者或云今此釋通前約外道我明淨菩提心之二假文作復次釋也故云故佛言如來非青等也普門示現六趣身者通四重壇也中臺首𨹔會天形四佛輪王形故云云私云疏第三云第三重一切衆生喜見隨類之身文又云自臍以下現生身釋迦示同人法及二乘六趣文又當卷上云所言等者乃至諸天八部五通神仙文此等外部文也準知今又六趣之身者但第三重聖衆也中臺四佛雖府同人天是皆佛身也十界圓壇寧限六凡無四聖耶今舉六凡顯四聖歟凡今釋意行者不識因緣生故於本尊海會顯形男女等而生論故作此也為言三界六趣者三界經分明也六趣者指八部衆文歟準嘉祥義疏龍是畜生迦樓羅者此云金翅鳥揵撻婆一云屬鬼道一云屬修羅道緊那羅是畜生道攝緊那羅此云疑神亦云人非人其形似人而頭有一角取意又云八部鬼神本悉非人而變作人形來聼法故云人非人也文又仁王疏云藥刃此云威德又傍生文或釋云八部即天鬼畜修羅文準此等釋今八部衆中無人及地獄何云六趣耶然六趣攝故云爾歟或約多分歟又法華經云爾時會中比丘比丘尼優婆塞優婆夷天龍夜刃乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人文嘉祥疏云爾時會中下文為二初辨四衆上四華正表四衆悟入一乘今明四衆覩瑞歡喜及諸天龍者上地六種震動表人天六道普皆成佛故今列六道之衆歡喜也云云此又八部釋六道可為良證矣然經四衆八部中四衆是人也八部中闕六道之中歟法華會座地獄衆不來歟嘉祥法華疏云依𨹔羅尼經有地獄衆今會所無文今經會座有無難知現圖荼無地獄道善無畏所傳荼羅有地獄衆可尋決矣然輪圓具足壇何闕彼矣前不在三處等者或云三處者次上所舉三界同性義也三界處故云三處也故次下釋云若心不與諸趣同性文此意也私云三科云三處歟云已攝一切法故三界不攝無漏無為等故故上釋云但觀內外十二處即攝一切法也文前約根境觀心今六根各別觀心故云復一一歷法分別例如俱舍云愚根樂三故薀處界三也或云內外兩間云三處也今文但舉六根是舉六根界顯餘十二界歟故釋云乃至隂入等今舉十八界例五隂十二入也乃至隂入諸法皆應廣者乃至十八界中今舉六根故六境六識云乃至也隂入廣者如十八界五隂十二入一一歷法可分別故云爾也若不爾則隂入是略何云廣耶又上文內外十二處何重示矣若爾界及薀先文無何今云為未悟一一分別又俱舍云愚根樂三故薀處界三文準此釋設依根不同不亂隂入界上中下根次第而一一分別釋可作此耶答相望不定機根万差今為未悟界是望前十二入故不違俱舍又三科一一分別對前處內外分別故又於前不舉隂界者經中前唯處今偏界互顯而兼隂歟疏探經意云隂入廣也又下文中開薀合處界佛智巧妙前後影略三科開合周備矣問若爾何下文為未悟合處界耶答衆生樂欲不同故又名字數多迷真實故為破邊見聲聞故者謂於不住眼界等文有二意前正釋明約外道計今復次約聲聞邊見也如犢子阿毗曇等者智論第一云是佛法中亦有犢子比丘如四大和合有眼法如是五衆和合有人法犢子阿毗曇中五衆不離人人不離五衆不可五衆是人離五衆是人是五法藏第五不可藏中所攝一切有語道人輩言人一切種一切時一切法門中求不可得譬如兔角龜毛常無復次十八界十二入五隂實有而此中無人方廣道人言一切法不生不空無所有譬如兔角龜毛常無如是等一切論議師自守其法以為實語餘者妄語文今二部釋依智論文歟是人法在不可藏中者三世無為不可藏五法藏中四種是法不可藏即我也何云人法在彼藏耶謂法字增歟故智論但云人又義釋無法字矣或云今人法者非人與法人即法歟猶如云眼法矣故十二門論疏上云犢子部云四大和合有眼法五隂和合有人法今明眼從四大生則無自性人由隂有義亦同之文問此犢子所計我人法二我中何耶答論既云人又嘉祥釋云入真觀故即見我空出於俗諦別有人躰文依之大師并慈恩清涼等皆立六宗時以犢子入我法俱有宗唯識論中以非即非離我出破我文又慈恩宗輪疏云其犢子部謂補特伽羅非即薀離薀謂實有我非有為無為然與薀不即不離佛無我但無即薀離薀如外道等所計之我悉皆是無非無一分可不即薀離薀我既不可亦不可言形量大小等乃至成佛此我常在文又西明釋云問如下所犢子部計非即離我二障之內何障所攝答言煩惱如何羅漢起煩惱障若所知障如何論生空智斷三藏解云是我執故煩惱障攝此部未得羅漢果時所計我相同佛在時犢子外道由斯立名犢子部初談未成羅漢時計故彼部亦計我理實得果已斷我執文私案慈恩釋乃至成佛此我常在者但依等假設我名非實我也歟故彼疏釋彼論依薀處界假設名云謂我非即薀非離薀處界亦爾但依薀等假設此義名我實非薀等文又僧侃釋云依婆娑有二一假名二神我若計神我是外道見若計假名則非邪見犢子但計假名異於外道故不妨是羅漢文西明意未成羅漢時起此計者似依俱生我執若分別我執見道已斷故然今非即非離我依邪思惟等立不可藏歟若非分別惑何有此義彼師釋難決定矣了義燈第二云要集云有解瑜伽四計唯有分別此中第三俱生收任運我執不計即離今謂瑜伽唯分別此論通二此義可爾又彼犢子却談未得聖時計者如何不許異生身中起分別見由此第三通敘通破分別俱生於理為勝今謂不爾若唯分別可順論文彼立五藏我在第五不可藏豈俱生見作是計耶又不得言犢子部計却談昔計非據現計理亦不爾宗輪論中現敘彼等同計我故若爾無學如何更起我執見耶答如前解或可得言唯有學凡作如是計文私云瑜伽四計者唯識三計中加亦即亦離句歟此中第三者唯識三計中第三非即非離我歟今謂下者要集自義也今謂不爾等燈師能破也又犢子立三聚謂有為聚無為聚非二聚也五法藏時開有為聚為三世故非二聚是不可藏也又義犢子所計我又法執也無學執我大失故故住心論云唯薀無我一句攝一切小乘法𥁞文二十部異計皆攝此住心故故大經要義云唯識義燈釋犢子部計云今據情解妄謂為我故敘破之實是法執云云故據情解犢子部為我有宗若不爾無學執我大為失故二乘聖者後得智尚不知自證况有漏心不知自執於自法執謂為我執故雖謂我實是法執如彼瞿波阿羅漢作聖教要實論有我人而實法執也若嘉祥意以有漏心言出俗者其義稍似義燈釋然彼師意難決定故且依燈師可為定量略抄準此意慈恩此我常在者據情解云我實法執故成佛猶在但依薀等假設名者於法執假設我名也又今疏第二卷中以犢子有部兩種計同補特伽羅寧於法執非立我名乎非見非顯現者抄云心躰向外名能見相反似外境名能現相此名非見非顯現也文此心帶妄執能緣所緣云見現也故次下舉因云空相心離諸妄執亦無分別文一切衆生本有佛知見性者或云成實論中云有識𭇥靈是本有佛知見義歟若爾成實論又小乘攝故可屬邊見聲聞也依之上牒文至非顯非顯現為一具文矣或云彼初釋意彼釋各別牒釋何屬邊見就中云今不住諸法是局經不住眼界等文不及非見等句也况約十住心時既就外道二乘等明心不可得義今文專約法相三論可明心無相歟所謂本有佛知見性三論悉有佛性之義如是常理者法相理佛性遍在之謂也天台華嚴同初地淨菩提心故未必為所遣也故大師以今一假經文證第八心可思之或又本有佛知見性者天台四佛知見義如是常理者如先三乘一乘各舉初顯後九種住心皆所遣故但於為第八心證者且無相義一分同故雖證彼意終別彼應佛四言離絶境此法身如義情之故又為能所遣無失又安然云此二人是別教菩薩文又智論中犢子薩婆多次舉方廣道人空無所有之計與今文異也又守護經云於三世中亦不可見文皆以世諦言之耳者或云大乘所立本有佛知見等義望今無相淨菩提心有相世諦也凡有相者皆是妄者即此意歟又經中自因緣者或云心不住已下一假因緣也謂摽為未悟者等云今復結言復字起盡可局當假也私云今此文局當假下所以下文通諸文歟所以然者大師以經疏文注入守護經時祕密主心不住乃至無分別之文為一假故又疏釋皆別假置經云言今不爾故準上文何以故空相是菩提等文明次上文因緣今又可同彼矣又今文為未悟重示故更出因緣歟次下一假雖徵二文兼廣通諸假歟三種無二義同自心尋求菩提及一切智之意故又如上種種入清淨門自心尋求菩提義通上諸假故前述答意云正觀三法實相乃至亦名一切智智對彼故云今復結言空無垢即是心等耳離諸妄執亦無分別者經云離諸分別無分別文守護經云以是義故遠離一切麁細分別文準守護經并疏上分別無分別如次云麁細分別今諸妄執者麁分別無分別者細分別也故疏上釋云以無妄執分別無分別亦無也文依此意離字貫無分別讀之或今疏釋未見麁細二重離字但被妄執讀之然守護經文上疏釋分明故若無分別下細分別歟合譬畢竟淨故句細分別故畢竟淨也文點云若無分別即是離一切相也云云意細無分別離一切相彼離也為言一切分別無能染汙之者者離妄執分別之義也心空界等者界者性義非世間空界色釋中云空無垢是也即法性空理若不爾者何云三種無二故守護經云此空性即心性故如其心性即菩提性如菩提性即𨹔羅尼性文三四雖異其意同耳問上文譬如空界等文彼既譬也此何不爾耶答疏釋上文云以世間易解空譬難解空也文今空界彼難解空也皆為發明自心尋求菩提義等者實範字義第五云皆為發明自心求十四本無求字十本有菩提義究竟不思議中道義也云云空無垢者空界也空界者大空也以喻名法故云空菩提文意三法本來同一實相也即此同一實相名為一切法界心即此一法界心即真而假真故無能所異假故悲為根本方便滿足名中道也云云即此一法界心等者淨菩提心也大師第八住心云一法界心一道無為真理即此意矣雖因緣等者或云今文菩提心為根究竟作因緣也私云上文釋見心實相云雖復離諸因緣亦非無因而得成就也文今釋同彼彼既菩提心因緣此何不爾意云一法界心雖因緣不生而不壞因緣菩提心實相生也以不生故無能所生異以不壞故非只菩提心生亦無非為根方便滿足也為言又上釋云智性種以五義為緣至菩提妙果所謂不生不之因緣也取意準此文依菩提心因緣生根究竟故云亦得悲為根等矣守護經云如是一切皆以大慈大悲而為根本方便波羅蜜之所攝受文彼經約利他方便故云攝受今經約自利究竟故云滿足矣佛已開示淨菩提心等者云何菩提謂如實知自心文也因此文明三句大宗也亦得悲為根本方便波羅蜜滿足等是也又云何菩提已下至此文皆開示淨菩提心也心不在內并非青非黃等開示菩提心故次下云無量方便皆為令知識其心即此意矣如此經者當知一切修多羅等者或云一切修多羅者除大日經其餘顯密諸經也以今經三句攝諸經不可漏顯密經故次如釋迦所者指上一切修多羅也顯密諸經皆釋迦故故以大日金剛頂入釋教録以釋迦例三世佛也但至決了者其中就淺略作此也或云一切修多羅但顯經也顯釋迦密法身談故但不舉金剛頂經等者彼又能開故同今經不別舉也金剛頂部中又三句歟故吽字義云那經金頂經等菩薩人菩提心為因大悲為根方便為究竟文私云金剛頂部因行證入義即三句故歟又指守護經歟或儀䡄等中有文歟又一解云金剛頂部雖有其義無正故皆為所開而入一切修多羅也守護經雖有三句釋迦故又傳宣故猶為所開也如釋迦等者一切經有顯密中於顯中以釋迦而例餘佛也智證指歸云令案橫統之言無所不統十方三世一切修多羅同歸於三句本自無異轍明知在一切經後諸經猶文此經如以三摩地一切諸經為法佛祕藏文私云若準一切經後文能開似𡱈今經若依三摩地似通金剛頂部彼又三摩地教故我諸法如是者智證疏抄云今案諸法如是一切大小諸法無非此無相菩提心故今此經統開演令知同轍故言一切修多羅意皆同在此也可知一代諸經之根源祕藏矣統攝之義明在此文文私云我者大日今開會故云統開演所開是大小乘諸經法故且依此釋我諸法如是可矣或諸法如是云云意我大小乘諸教皆為三句為言又義通大日釋迦歟謂如此經者等以今經開顯經也如釋迦等者守護經傳宣三句而開餘佛顯經也故又下釋中以法華及今經為開會可思之問準上文諸法者十二處三界等法彼明心實相故云諸法如是知識其心若爾何云諸經又今諸文皆明菩提心實相何云三句乎依之守護經云我於此諸菩薩等大衆之中如是法為淨廣大菩提心為令一切了知自心故文爾何答故上文結成此菩提心三種無二與根究竟為因畢云我諸法如是非開會義乎但守護經文字貫下句讀之意云如是大小乘法為淨廣大菩提心也為言又三句者菩提心三句攝故云爾或菩提心又有短三句故又明菩提心三句大宗顯故建治元年六月比於高野山以傳法會談義之次逐月施筆畢以南都中川法泉房令德少年同年八月上旬于醍醐寺中正院加點是則勵初心之勸學為後生之資糧而已
