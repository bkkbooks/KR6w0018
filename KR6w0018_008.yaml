body:
  text: 䟽卷第二之一䟽云此是那羅延等者此是那羅延天者指尊貴躰也外道下釋圍𨹔論師外道計此天為尊貴也點云尊貴者此是那羅延天也外道計云云又下文云是毘紉天外道部類文准此文可云那羅延天外道也古點云那羅延天外道之計也云云此意此外道計那羅延天造萬物故云尒歟抄第三云此有多謂圍𨹔論師計那羅延天能生四姓計梵天能生物提婆云從那羅延天臍中生大蓮華蓮華上有梵天祖翁謂此梵天為萬物之祖從梵天口䏶脚生四姓等又云那羅延天能生梵王梵王為万物之祖復有安荼論師計本際等不煩具引文私云准此釋者外道有三論師異且依初二者輔相者指梵天歟那羅延尊貴故又寳師釋云真諦三藏為人生本梵王是眾生之祖父故云人生本也文又遁麟記云言人種神者那羅為人延那為生本謂人生本即大梵王是也外道謂一切人皆從梵王生故文私云依此釋者梵王即那羅延也若尒輔相是梵輔歟頌䟽云為臣輔翼云云理趣釋云麼度羯羅三兄弟者是梵王那羅延摩𨢸首羅之異名也文南池僧都口决云天三兄弟者二三各治三國梵王天竺那羅延唐土自在天日本取意私云此釋梵王那羅延其躰別然與抄意異此准所列次弟并治國大小梵王勝那羅延劣寧以梵王為輔翼乎故知那羅延有多種歟例如魔𨢸首羅有多種也故䟽笈一云那羅延大那羅延云云又寳師𣵀槃䟽云天帝釋之力士文惠暉䟽云人種神者先是人後作神或父母隨一是人一是非人也文此等欲天攝歟或人趣攝歟當知那羅延在欲色二界故䟽中色界那羅延余師釋𢴃欲界那羅延歟以能造之主等者私云那羅延天云能造主也意云以那羅延天者更無有所尊貴之人故那羅延云尊貴也為言又云能造主非那羅延也意云那羅延天外有能造主更無可尊貴之人故那羅延云尊貴也為言故抄云更有尊貴者即指那羅延天也文尊貴者遍一切地水火風空處者此意明前那羅延天尊貴遍五大之義也前明造成之用今示普遍之德是其別也又義今地水火風空即為尊貴躰也故能破文云彼即地水火風也但今釋可讀爛處字安一切下讀之故下文云遍一切處地水火風空意云尊貴者遍一切處之地水火風空也為言然二義中前義為勝能破文云彼天像身是那羅延天像故指彼云彼即地水火風故彼天像即遍五大故云尒也又密抄舉多中不云五大即尊貴故又下文可長聲連讀豈非遍一切處乃地水火風空界相乎為言以此相入何所不可者且擬外道成反難云真言宗又談六大普遍之義我於六大法身像上座而飲食汝不忿怒耶荅云云又此能破文但破遍義何不破前造義乎今造成物義同下遍嚴義故讓彼破歟或讓前自在天破歟一切法者自然而有者嘉祥三論玄中天竺九十六種舉要為四執一計邪因邪果二執無因有果三立有因無果四弁無因無果此四中今自然第二無因有果攝也釋云無因㩀其因無自然明其果有約義不同猶是一執文清凉演義抄云䟽若以自然為因等者断義也通其兩㔟初即老子意由道生一道是自然故以道為因是邪因也若謂物自然而生下出荘子意則物自然無使之然故曰自然即無因也文私云此中䟽者華嚴䟽也此二中今自然似同荘子意但今云而有彼云而生少異歟又異玄者玄云有果抄云無因故又彼天竺異執此震旦三玄攝也彼玄中四執外別示三玄計故抄老子自然道似玄邪因攝耳又玄云有人言自然有因自然無因化不同皆自然有云云問自然本有義佛家盛談故釋論云非作非造自然意文若尒何彼義乎荅彼不知因緣而立自然義此不壞因緣而明自然故云釋論文熏生緣起六意隨一也可悉之問若尒自宗云遠離於因緣又云遠離因果法然具此等皆同外計乎荅此等離九種迷情妄假因緣離断常一異等邪因邪果故云尒全非無性德輪圎隨緣義也故大師於不二門成法尒隨緣義又四種身各立法尒隨緣之義又䟽第十一釋此因因生空云何而有果文云若於如是緣起法中而言有因有果即是遍計所執墮於断常一異不入中道是故證知如是真言永離因業故即是法界不思議界也文應知自宗法尒隨緣義是顯教一乗等法尒隨緣猶不及外道自然乎故知外約遍計分別論自然內約佛知見談法尒又顯攝相歸性論法尒密性相然明法然又顕於緣起法立自然密於性德法談隨緣也問內道因緣為宗者蓮華鮮㓗𣗥判利端何因緣所染削耶荅外因緣是水土等也內因緣又一切眾生共業也利端鮮㓗又眾生受用依報故又草木等盛𮕱有情善𢙣業增上果故又自宗意鮮㓗顕色利端形色四攝故六大所生若尒因緣所生義無異論者歟有計身中離心之外等者唯識論第一云三者執我躰常至細如一極㣲轉身中作事業故文又破文云後亦非理所以者何我量至小如一極㣲如何能令大身遍動若謂𨿽小而速巡身如火輪似遍動者則所執我非一非常諸有徃來非常一故文私云作事業義𨿽同旋轉身中義與運動此身少異又論云細如極㣲䟽云離心別有是大異也然計義同故證矣若我無常則罪福果報等者智論䟽第四惠影云無常者名為𭁆法若言一向是無常者則無相感義何以性以因無常故則有𭁆因𭁆故不得於果果𭁆故不𮠪於因當知則是無福若有罪福果報者以因不故所以得果以果不無故所以𮠪因若定是無常者定無罪福因果相感也佛法中以罪福果報從因緣起因緣起故則不可一向無常何以故凢因緣生法以因緣聚故不可其無常以緣故不可其常從緣故不可其有緣起故不可其無相續故不断生故不常不同外道常則一向是常若言無常則一向𭁆也文同䟽第九云若我無常者本由我便作罪福若我無常者則我隨身如岸墮水消故作者既無則無作法則無罪福也文私云上文若法是因等者此我為作事業之因故云若法是因又為因法必從因可生故云及從因生也又因生法必無常故云皆無常故也又解云法者惣通我及事業是因者我也從因生者事業也二俱非常故云皆無常也若我下重破我及事業也罪福果報者作事業故前解不順皆字後解無為作能作因然後義順文也挍量等者大師䟽文次第云挍量未明文私記云是指中觀等明外道所計義與佛法差別之文處歟云云若尒唯識等又破外道等彼又可然歟智度云有計神我者論第十二文全同如下出之唯識論第一云二者執我其躰雖常而量不定隨身大小有卷舒故文又能破文云初且非理所以者何執我常遍量同空應不隨身受苦樂等又常遍故應無動轉如何隨身能造諸業文如論中破等者或本如中論云云十二門論云復次若自在者何以故不盡作樂盡作苦人苦者樂者當知從憎愛生故不自在文十二門論或本盡作苦人一句無之此本順理歟智論䟽第四惠影云尒執我云神作自在是於作着破云神若自在自作者應自在作樂何故作苦以欲樂於樂反得苦故當知不自在不自作非作者故又神若自在者不應造𢙣墮三塗亦不應有種種不如意事𭜨憎聚會㤙愛別離等事何以故自在故若有此等事者當知不自在也我是自在相若不自在當知無也文准此釋盡作苦人之論文頗可謂無用矣又今論所引是十二門文也如論中本為勝矣三論玄云問云何名為邪因邪果荅有外道云大自在天能生物物若還歸本天故云自在天若瞋四生皆苦自在若喜則六道咸樂然天非物因物非天果盖是邪心所𦘕故名邪因邪果難曰夫善𭠡樂報𢙣感苦果盖是交謝之宅報應之塲以不達義理故生斯又夫人類生人物類生物人類生人則人還似人物類生物物還似物盖是相生之道也而謂一天之因產類之報豈不哉文今破同初難歟又智論十二云若神常者且應不受苦樂何以故苦來則憂樂至則喜若為憂喜所變者則非常也文此破神常非破自在歟四大草木等皆有壽命者草木等有壽命密宗盛談故大日經有情及非情阿字第一命宗家又判金剛內外壽然與外計異彼六大普遍故識大遍非情故云有壽命等也此或續生或卷合故其意異也合昬木者補特伽羅者𮚌玄䟽第一云補特伽羅即數取趣正當人義謂頻造業徃諸趣故文若有從今世趣於後世等者俱舎頌䟽九云謂外道執於臨命終時能捨此蘊於受生時能續余蘊若無有我誰能續蘊故有我也文勝論外道義也又云蘊𠛴那不可從此轉趣餘世故雖無我但由惑業以為因故諸蘊相續等文論主述有部意也俱舎以有部破外難今䟽以有部義同外計彼此意異彼立有部故此破有部故何者外道云依我相續而未知由惑業相續故為能所破然今䟽意有部雖知惑業相續若諸法躰云恒有猶同神我常義故今也問藥師經云若彼自身卧在本處見㷔魔使引其神識至于焔魔法王之前文又仁王經云識神無形假乗四虵文此等經非許識神從此世轉趣餘世之義耶荅晴邁䟽云言見琰魔使引其神識至王前者若其患人决定令死則受鬼身容可琰魔王別遣鬼為使而引取之如其未决定死則未受鬼身何有鬼身得引生人之識不可別人之識在別鬼身中若不在鬼使身中識心既不孤遊云何可引得至琰魔王前當知此是藥師如來及經之威力令彼患人第六意識見分之上起此三種行解相分一為琰魔王二為王使三為己身為自識神所依隨使而行至琰魔王前其實神識未曾離身若是本識隨所捨處則成死屍不可離身若是六七等識依本識故而得現起若離本識無種子故無由得生是故八識俱無離身孤行之理此盖如人夢中見師僧或復父母遣使來喚夢現見己身隨使而行達師僧或父母前當知師僧或父母使人己身皆是第六意識見分上現此三種相分似有去來實無去來此亦如是藥師如來及經威力令彼患人見如此相似有徃來實無徃來文善珠䟽同之私云斯乃於第六識獨影境作如此寧同外道神我乎又心依身而住故云假乗四大也識神者眾生心識也非外道神我也又藥師經云彼識得還者有為生心既得還未來識相續非永云還非同外道神我常也秘經去識還來可准知之又大䟽第五云阿闍梨言少時甞因重病因絕神識徃詣司文此又准前矣當知藥師經并同䟽等意於本有身被㷔王裁断也探玄記第六又於本有身断罪云云十王經十輪經等意以中有身到炎王廳故則於其身預断罪成實論中隂品亦然矣問若有從今世乃至識神為常文者属能破文乎如何荅重是述前計我義也識神若常下能破文也又義若有已下皆能破文也今文破也謂既云数取趣自今世趣後世則識神為常破也或又若有乃至為常為𤗊識神下破也識神為常者為言或又展轉次第破也意云若有三世流轉義神為常若常則何有死生乎若有死生非神常若無常則無我也為言既置若有言非述上義又云但随事異名耳是計我結釋也例如下知者見者云皆是我計隨事異名也耳犢子道人及一切有者等者有部云三世實有法躰恒有云云犢子又立五法藏謂三世無為不可藏也既云此兩部計有三世法犢子又五中以三世法同今我而非取不可藏歟此三世有法義同從今世趣後世識神常計故但同者相似義歟識神是人我也是法執故或以大乗意小乗法我属人我歟𭁆佛法三種法者抄云義林第一云諸行無常𣵀槃𡧘靜諸法無我若加有漏皆苦成四法今謂彼宗計神我三世法為常則𭁆如來諸行無常諸法無我等法也文意云計三世實有我故非諸法無我又三世法躰恒有故非諸行無常又既𭘧我故非𣵀槃𡧘靜也為言應知以一三世有法為𭁆三法之因也問薩婆多等既立三法印何云𭁆彼印耶荅約用無常雖立諸行無常其躰恒有故𭁆彼印也故光云此宗諸法躰皆本有四相於法但望用文又外道等我故雖云諸法無我犢子有非即非離我又兩部俱有三世實有法我故非諸法無我又有部意断煩𢙉得故其煩𢙉此身不成就故雖得二炎𡧘靜但是偏真理未究竟𣵀槃故失𣵀槃𡧘靜也然異外道等無想等計真𣵀槃故分得彼印也中観論第二云若人我相如犢子部眾不得言色即是我不言離色是我我在第五不可藏中如薩婆多部眾諸法各各相是善是不善是無記有漏無漏有為無為等別異如是等人不得諸法𡧘相以佛語作種種論文西𭤧諸菩薩等者此正舉兩部能破也外道我先既破故亦通無失唯識等論中作種種量破小乗外道等故中觀等論又尒也故知龍樹天親護法清弁等云西𭤧諸菩薩歟此識遍一切處等者問識大普遍真宗實談故大日經云我即同心位一切處自在普遍於種種有情及非情文所以識大遍五大故經䡄中顯五大形色無示識大形色即此意矣若尒何云外計乎荅真宗意於性德海本有六大談普遍無㝵之義此乃佛智所照也而今識大普遍義遍計所執前於無常識大計常遍之義故彼此大異也而今要由根塵和合等者意云要由根塵緣合而識生時見聞覺知故汝遍常識神獨不見聞覺知故汝識神成無用也為言又若識神遍五道中等者智論十二云若我常者不應死不應生何以故汝等法神常一切遍滿五道中云何有死生死名此處失生名彼處出以是故不得言神常文不同佛法第八識義也者問佛家又談頼耶執持𭇥藏之義依之䟽下釋云阿頼耶義云𭇥藏正為室云云唯識論云能藏所藏執藏義故文秘宗專成圎明淨識卷舒觀此乃非同攝舒義乎荅言雖同意是異外𭘧見內不尒故或佛家有為心云頼耶又佛性真心云頼耶外以神我云頼耶故智證大師抄云執持𭇥藏彼此同㫖但計神我故為所破文且約權實二宗弁不同者若依相宗則於業種生第八識約因相果相等分能所藏等義皆是待因緣而成立矣今未見因緣種現等而計執持𭇥藏義也若依性宗則真如合無明成頼耶此識有二種義能攝諸法又能生諸法能所雖異其躰全一也而今能所定別故云不同等歟又自家心月輪等卷舒觀是既破人法上執而開佛知見觀也而今外道攝舒義遍計分別情實見故不可相同耳然世尊密意等者出佛法第八識義也故密嚴經第三云佛如來藏以為阿頼耶𢙣惠不能知藏即頼耶識如來清淨藏世間阿頼耶如金與指展轉無差別文若初學大乗人於自心實相如來藏頼耶生分別執著亦同外道見也為言相宗釋云若執唯識真實有者如執外境亦是法執文今又此意矣五教章下云如解深密經云若菩薩於內於外不見藏住不見熏習不見阿頼耶不見阿頼耶如來齊此逹立一切心意識秘密善巧解云既齊此不見等處為立心意之善巧故是故所立頼耶生等相皆是密意不如言而取故會歸真也文此深密經意密真理以一分生法頼耶也准又今佛隱密圎明淨識自心實相頼耶而真如随緣如來藏頼耶故云密意歟且於然字有然前起後義然前意釋成前佛法中第八識是真如随緣藏識也起後意前佛法中第八識者相宗業種生頼耶也此性宗二分不二頼耶故五教章云又如達麼經頌攝論等云此界等者界謂因義即種子識如是等寳性論約終教釋云此性者謂如來藏性文私云阿毗達麼經頌攝論唯識等云無始時來界寳性論云無始世來性故作此釋耳不觀自心實相等者䟽第一云今真言行者於初心時直觀自心實相了知本不生故即時人法論淨若空文今反此故同我見也復有計能見者等者抄云謂有外道計能見者而為真我是一是常復有外道而於六根随事異名皆生我計文智度云目覩色等者智論卅五云問曰如我乃至知者見者為是一事為各各異荅曰皆是一我但以随事為異於五眾中我我所心起故名為我五眾和合中生故名為眾生命根成就故名為壽者目覩色名為見者五識知名為知者復次用眼見色以五邪見觀五眾用世間出世間正見觀諸法是名見者餘四根所知及意識所知通名為知者但憶想分別強為其名文私案五識知名為知者私記云眼等五識知色聲等五境云知者也云云准智論復次釋余四根及意識釋者除眼識余五云五識歟又随事異名者依智度文外道所計我知者見者等不同故云随事異名也然抄云而於六根随事異名𢙢智論文歟難者云汝言等者鈔云今難云汝言能見是我與彼能聞等五為是我不設尒何𭁆二俱有過若言余五各是我則有六乖是一義汝執見者是一我故此見不可聞覺知故既此六根㸦不相知是故汝執一見為我不可作六也若言餘五同是一我者我則雖一乖六根故以眼見耳聞各別用故既此六根㸦不相知是故六根不可作一也若言有非我者是亦同疑亦徵例云余五根等既是非我其能見我應亦非我為立量云汝言能見是非我六根之中随一攝故如五根等反難可知畧抄或云一不可作六者一眼不可作見聞嗅嘗觸知六用云也六不可作一者六根各不可作一見㓛能云也云云私云能聞能觸知者舉餘五根作能也前計中云見聞覺知是又六根能故筆削記釋起信論見聞覺知云聞謂耳鼻覺謂舌身知即是意攝六畧盡文准今又觸者舌身歟智論文知者見者皆云是一我故知者破又可准之歟又破見者知者随被破歟或並破歟或有言等者此出所執計也問既云能執者何偏云所執計乎荅非前能執云我云但是識心更成所執我義也若不尒者一人計二我乎常一義故又前知者見者復內知外知各二人計也今能執所執豈非二人所計乎然內外身受心法者智證大師釋云四念處者但約內觀何言外耶和上云自身他身為內外也文又准前云內外十二處者身與法通內外身中五根是內也法中無表外法境攝故余皆內也是中所執能執等者依他相見非遍計能取所取也意身受心法中能緣所緣猶緣生無性故不可得何况有遍計能執所執義耶為言或又於此計舉二中所執能執者指第二也彼心為能執境為所執故何况有我者非初也謂計離心別有能執我故若依初義中字讀乃點依後義用仁點矣或本能執下又有執一字依此本無意云執所執能執之執猶不可得何况能執所執我耶為言且准此䟽釋經文所執是未必別人計歟不云或有言而直釋所執故但第二計一執歟大師釋云能所二執文此分為能所兩計若尒今此計中有三類歟能執二計異故猶如顕生二聲也有計內知為我等者私記云彼內知之我是似第七識之緣第八識成自內我執也但今此外道執內識而彼為自我義也此外知我是其以第六識之緣六塵境而於自心成我執也云云社怚梵者未祥𭔹可撿之若摩奴闍者抄云問有唐三藏既成譯悮何故尒時摩奴闍不云人執摩納婆不云勝我還置意生儒童有何異耶荅為順古譯不欲之其間是非從䟽取捨耳文本經云意生儒童故作此釋耳唐三藏者唐代玄三藏也私記云此義名有唯識摳要上卷中也文未那是意等者或云問未那未奴二音同是舌內五音字也其義不可別之例如薄曰羅曰哩曰路同舌內五音轉聲故同金剛尒何荅高祖判文有深意未學輙難弁但或依躰文𦤺同或就轉聲成異又雖金剛名同其義是別謂是男聲即智女聲即理也云云是毗紉天外道等者䟽第十云毘紉天有眾多別名即是那羅延天別名也文又第五云微瑟紉譯謂之毗紉此是那羅延天也文准此釋前所舉計那羅延天而為尊貴之外道部類歟又䟽第十七云韋紉天自在天別名正云毗瑟紉文准此文又前所列自在天外道部類歟若尒何人生云自在天部類今勝我云毗紉天部類乎又雖同天出別名歟若尒何正列時自在天那羅延天為別類矣然人生義似自在天計勝我似尊貴歟或又自在那羅延天雖同天約能計異為二計歟或雖別天毗紉梵通二天歟又胎藏外部毗紉天那羅延天自在天各別三天列之又䟽第四云復有奉事自在毗紉那延日月尊等種種世天文此文又三天別躰也毗紉天智論遍悶百論云勝遍也𭤩决第十云毗紉天亦韋紉天亦韋天此遍勝亦遍悶亦遍淨阿𭇥云是色天俱舎云是第三禪頂淨影云處在欲界之極文智度亦云有計神等者智論第十二云問曰人云何言色是我相荅曰有人言神在心中㣲細如芥子清淨名為淨色身更有人言如麦有言如豆有言半寸有言一寸初受身時㝡在前受譬如象骨及其成身如象已又有言大小随人身死壞時此亦前出如此事皆不尒也何以故一切色四大造因緣生故無常若神是色色無常神亦無常云云私云云此中大小随人身等計前人量計證今䟽文不舉能破者同前人量能破故不示之歟但與智論能破異彼云随身大小即是無常故又自下皆不出能破文准前破與儒童梵云摩拏婆者三論宗賢聖義記第二云摩納縛迦者此云儒童意我猶如少兒其性不定有時高有時下於劣己高慠於勝己生𤰞下言也云云又智論惠影䟽第二釋儒童云西國云摩斯亦云摩納故大本經乃云摩納汝當作佛者此即言儒童也摩納者梵下之辞耳文此釋名菩薩雖非我名為顕梵漢詞之此等皆以摩納儒童何為誤乎彼等皆同唐三藏等未伺今正歟注此二名是菩提闍梨解者二名者人生勝我也菩提闍梨者金剛智歟不動使者法金剛菩提奉譯云云又不空義譯云金剛菩提三藏阿闍梨云云此譯是不空記金剛智口也菩提智義也今畧金剛二字云菩提闍梨也就中金剛智是善無畏同門也而㸦為師資無畏不載彼義乎况彼門弟一行左可依彼也若聲顕者計聲躰本有等者䟽文次第云聲顕與聲生全別文文生顕異者聲本生亦躰雖本有不云本有而云本生故異顕歟例如清淨始又雖本有理常今初故云始覺而異本覺也或本生非本有義元由義也聲生元是待緣生之也為言若不尒者生已常住之釋故唯識論第一云有執一切聲皆是常待緣顕𭤧有詮表文䟽云待緣顕者聲顕也待緣者聲生也是生義聲皆是常然有時聞及不聞者待緣詮故𭤧乃顕文又論能破文云余聲亦應非常聲躰如瓶衣等待眾緣故文䟽云又前破明論聲計今破彼聲外之常聲故云餘聲然彼所計聲性與聲別聲性即是所音響聲之躰故今惣言非常聲躰聲及聲性合名聲躰因云待眾緣者若言待緣顕即聲顕成自生俱不成若言待緣生即自性成顕不成為𭔹二宗自無有過故但惣言待眾緣故若言待眾緣生顯故文繁無用文今䟽如余處廣釋者指此唯識等也畧舉卅事者暹僧都云於㝡初惣我執而加次次廿七種及三類此卅事歟云云此釋未詳住心論云時大相應二建立自在流出計尊貴自然內我執人量遍壽者数取趣識藏知者及見者能所二執內外知怚梵人勝計常定顕生二聲與非聲如是三十大外道各各迷真如輪轉文依此釋於經中聲論開生顕故成卅也但時舉一是經文別故一言𭇥二時歟問若開聲論五大又開可增卅况五大經中既置等言尤可開也荅彼所計同故此生顕異故問若約計異則能執可立二種若約計同則怚梵不可別立何荅能執是識心所執境界者舉所執計歟若不尒者無所執別計故或又䟽意能執分二計所執不為別計歟所執無摽勺故若尒䟽與論㸦顕歟又怚梵雖計同部黨別故五大同計而同部類故問若尒今經開題何云廿九邪計乎荅此依經但云聲未開生顕故或又廿九卅三經文等字等取四大也也然約滿数云卅也若過若减皆存大数故如人㘴得四禪等者此是卅事外舉一兩而示類無邊也其中㘴得四禪者六十二見中計後際中五現𣵀槃見也唯識䟽第六未云一見現在受若人若天五欲樂便謂𣵀槃二猒五欲現住初定以為𣵀槃引在身中名為得樂見他現在住定亦尒下皆准知三猒欲尋伺故現住第二定以為𣵀槃四猒諸欲尋伺喜故現住第三定以為𣵀槃五猒諸欲乃至入出息住第四定以為𣵀槃然於無色不計𣵀槃者以樂怡恱輕㣲不及色界故文准此釋今䟽中五現𣵀槃中但取四禪四禪中唯舉自歟云如人㘴得四禪即計此法等之故真實常理者𣵀槃義也㘴得四禪者得定是端㘴專注一境故起信論云端㘴正意文又䟽下釋云常好端㘴文或生是念我是得禪者者起信論云以修世間諸禪三昧多起味著依於我見繫属三界與外道共若離善知識所護則起外道見故文指此類歟我是得禪者起味著依我見之意也問准唯識等五現𣵀槃是邪見攝也若依唯識論等五見展轉必不相應非一心中有多惠故之道理不可有我分相應之義若依剋性義是邪見攝而非身見何云我分耶荅我分相應者經文如是我分分別相應云云如是我見邪見等與妄分別識相應也為言非謂身見邪見等相應歟但云我分者前卅事等多分我見故云尒也或云執常理邪見剋性故非我相應故非我是法我見攝故云我分也謂今迷法執故法執所攝法執又得法我見之名故云我分也為言問外道𭂫夫何異耶荅筆削記六云三乗人及𭂫夫外道皆修止定然𭂫夫多味著外道𭘧異計所修雖同修定有異故得果各別也文各各自謂有大師薄伽梵者下云梵王猶如佛是也如刧初時獨有一天等者頌䟽第八云問何故梵王梵眾起一因同想荅謂大梵王於刧初時獨一而住更無侍衛遂願言云何當令諸餘有情生我同分時極光淨天見已悲愍從彼處沒生為梵眾王𦆵願見有天生故大梵王起如是想我表能生也彼諸梵眾初見大梵威德特尊又憶念知先因梵王𩔊故我來生此是故梵眾起如是念我等皆是大梵王生文今䟽意同之問俱舎等意同想一因計是非因計因戒禁取也今何云初有我者耶荅光十九釋外道計梵王等為世間因云計我常已𭤧於我常起世因執因執謂戒禁取文准知今又可尒歟但此同初禪彼在下地緣上地故可異歟可尋决矣今䟽文似云初有我者是梵王等僻見謂是梵天王能造世間等異見外道計耳希求順理解者大經要義二云問異生羊心者不曾求出要何希求順理解之文而為證耶荅䟽云今文故知以未求解已上理心正為此心之教證也然引順理文者如上已云明順理八心及淨心生起之由漸也此心無間生種子故云云此釋以順理為順世八心歟私案今順理解者羊心攝何者上舉卅事畢指彼類云如是等我分乃至希求順理解此乃述理心之行相也况出卅事類無量時舉計四禪而為𣵀槃之人以彼𣵀槃云解又云理㐬云常理是也此豈因果之理乎今順彼行求解故云也故䟽云今順彼行希求解故云然也即此意也下順世因果云順理是順即世間八心也文彼此水火何一同矣故寳鑰以此文證第一心矣又義順理者瑜也故釋云順理梵音瑜文此瑜順因果道理之行也下云㝡初順理之心不依此經何文乎但順彼行者等者古昔人㘴得四禪是順理行而誤計此為常理即解義也今順古昔悞順理而為解之行希求解也為言若不尒者希求二字可安順理下故知雖舉順瑜伽計常理還是理心故云已上違理之心也大師又住心論中第一心不此文可悉之愚童𭂫夫類猶如羊者問此二句理心故住心論寳鑰皆證第一心何今次明順理下舉此文乎荅為淨心生起之由故有此文也故寳鑰住心論又第二住心之但寳鑰舉初句心論二句俱有耳問順理者唯局順世八心乎荅破壞內外因果云理心應知順內外因果云順理也若但歸佛教行世善云內因果者可局世間歟若內因果廣世等順世出世之理義也問若尒世與出世同歟荅彼又有寛狡世小乗也故䟽第三云得離順八心證𡧘然界文出世廣通大乗一乗等也寳錀云已上三心皆是世間心唯蘊已後名出世心取意羊是畜生中等者周易第四云羊觸𮊵其角文王篇云丁𬺸反雄羊也云云羊雌羊歟後時欻然自有念生者寳錀上云本覺內薰佛光外射欻尒莭食數數檀那文准此文欻然念是依內本覺熏力外起始覺智用云念生也佛光外射者始覺用也莭食持齊者不思議䟽上云莭量食者莭撿小食名莭量食有人雖受一食法恣意飽噉腹滿眠妨修道法故湏莭量又多食增長煩惱又增長眠令身不安故湏莭量莭量至幾許随己所堪三分留一諸鳥獸餘便自食能少益善取意今莭食者此莭量食也又云一揣食也但今莭食持齊者准智論一日不食云莭食持齊故不同如來所制過中不食持齊也故云然猶未是佛法中八開戒也云云佛法中八開戒者毘尼討要第三名八戒齊或名八開齊前八是開閇八𢙣不起諸過不非時食者是齊也禁止六情不染六塵齊断諸𢙣具修眾善故名齊也又齊戒躰一名別若尋名定義義容少別齊者過中不食為名戒者防非止𢙣為義薩婆多云八箇是戒第九是齊齊戒合數故有九也依俱舎論合九為八文問八戒其躰何荅大乗義章八戒齊義云八戒齊者所謂不𭣦不盜不不語不飲酒不歌舞唱伎不著香薰衣不上高廣床不過中食是其名也此等防禁故名為戒潔清曰齊若依毗曇不著薰衣不上高床此二同是廣嚴處起合之為一故為八若依成實及智論前八是戒後一是齊齊戒合是故名為八戒齊矣文篆象名義云齊側皆反洗心曰齊防患曰戒敬也荘也文問准討要釋者開是戒義也故云八開齋冝然今何云八開戒耶荅齊戒躰一義故齊云戒歟故䟽下云八齊法文又開舉用戒示躰躰用並舉歟於六齊日者太賢釋云六齊日者黑白各三謂第八日十四日十五日廿三日廿九日卅日鬼神得㔟傷人為令勉害故湏制也文黑月白月各取三箇日因緣智論第十三天地本起經委釋撿可見又抄中出矣親戚者玉篇云智度中上代五通仙人等者智論第十三云問曰何以故六齊日受八戒修福德荅曰是日𢙣鬼遂人欲人命病𮕱令人不𠮷是故刧初聖人教持齊修善作福以避𮕱是時齊法不受八戒直以一日不食為齊後佛出世教語之言汝當一日一夜如諸佛持八戒過中不食是㓛德將人至𣵀槃文准此釋前持齊又六齊日可修歟但今者因經文六齊故也或又前持齊忽然所作不依知識故未必六齊歟又戒序云𭂫夫一向𢙣心遇善知議教誘故起愚童持齊心文仙人所勸又可同前歟問前云持齊今云断食何同乎荅正文直以一日不食為齊文外持齊一日不食云齊故又云断食也故不同內過中不食齊矣又淨影釋云以不𭣦等防𢙣禁罪𦔳成齊法𦔳齊法中差別不同故名齊支非断食法故不名為齊不過中食是断食法故名為齊文依此釋內持齊又云断食歟或云律藏中無断食法云云真言家有断食法不動立儀䡄云菜食作念誦断食一晝夜文既以一晝夜不食云断食故問五通仙人者外道歟荅所勸持齊既外八心攝也能化人可外人歟智論中蕳断食持齊佛法不過中食齊今䟽云未是佛法八開戒故但智論云刧初聖人者雖外道從外人所歸云聖人歟猶如孔子等云聖人矣又樸楊釋云增刧未齊得五通道云或處云成劫未鳩留外道出世云云而與六親者抄云六親者一父之親內也二母之親外也三身之親兄弟等也四妻之親妻眷属也五男之親男兄弟也六男妻之親是他內外也又善戒經抄云兄弟姉妹妻子也文太賢釋云言六親者父母伯叔兄弟為六文獲孝義之譽者於六親行惠施則得孝養仁義之名譽也復以此施等者此者施物歟非親識是所施境界故或不尒施物未顕何指此施故知能施心也此目近詞故謂指前芽位施心云此施也故䟽釋云無貪惠捨之心文付中第二云復以此為因指種子此豈不尒乎前但施六親故施心似有偏頗今不蕳親踈故云平等施心也非親識者疎人也然復非親歟若不尒者何云平等施心矣由数習等者已上釋經初句自下釋經後句也初中守齊善法者指種子心也修習無貪惠捨之心者第二心也後中由数習者数数修習義由第二心而起今善心之義也即平等施心是也疱者玉篇云藉此為因者習行惠捨云此斯則指第三平等施心也故云已能等也擇所施之境是今心也已上釋經初句如是下釋經之後句也謂惠性漸開等者惠性漸開是指第四心也復甄別等顕今施心也甄別者蕳擇義智惠㓛能也見其下釋經歓喜已下文也歡喜義通自他施伎人令他歓喜故利他益也施尊宿是自利歓喜歟故云歓喜而施等又為令他歓喜故施之歟若不尒何下云亦令我施時等乎此乃自歓喜故又大師釋云見高德而尊重具伎樂而供養文此釋以伎樂人似為施物文點云授與伎樂人及獻尊宿也然不順䟽釋歟耆者耆年長老久已通達人也是久義也施與尊行之人者釋經而供之句也尊行之人者指前尊宿耆人歟今起親愛心為異矣第二釋云得聞法利又尊宿人學行高尚世所師範云尒也𭂫於經文親愛心有二意初釋未狎近尊重德行而起親愛也後釋狎習親附而供故云親愛也謂能出離欲等者此文釋上尊行人勝德也尊行人者上代五通仙等也或釋云增刧未齊得五通道文外道用六行智故云出離欲等也或又尊行人少欲離大欲故云尒也或釋能施心品也謂出離欲等可讀也故論初釋云少欲之想始生文望初種子等者若約續生次第今果雖從第五而轉生種果相𭔹故望第一種子云成果也如上六心是初一持齊後五施福人趣業滿随冝歟何者論證人乗是專可約因業也彼供舎利福既感天上果此持齊布施行盍成人業心離慳貪命終生天之釋分明者歟問若尒寳鑰中釋以四品五戒為四列業因畢云未有捨此能得文又淨影義章云釋言善趣必由戒得文此等釋唯以戒非定人業乎荅齊施戒行相望時戒行勝故云尒施福非業義歟若不尒者一興供千變生天之明文云何消之故知戒行施福随冝可有滿義歟或又佛世以前施等為業施心𭤽勝故佛世以後五濁轉增故施心劣𭋘以戒行為業故問此六心又可為生天因乎荅住心論等中以六心證人乗以四心成天乗故知約正就勝為人乗業因也故戒序云愚童持齊人乗之法雖云漸信因果行五常五戒等猶是人中之因不得生天之樂文若又依及劣義為天上因也故下釋齊施果云現世安樂命終生天文又云為人天乗行齊施善法文又住心論釋人天十地猶此初開六心文若此六心但𡱈人何云人天十地乎十心云十地也若云十地故六四合云十地者何唯六心文乎故知今六心顕通人天也又論經云五戒資身人天受趣文問若尒護戒生天四心可通人乎荅正准前可知故住心論云十善業道是人天因文問六心五戒為人天因約正者如十𢙣業為五種因歟何荅若約滿果可然若依果正感人果後不可天果歟四列人猶上中下等五戒別况天乎今正者雖別戒多分人故云正也故性相釋云善𢙣二業非皆齊等文問五常五戒釋行同益別又通法釋五常令一生撿束五戒通多世防修云云何今云六心五常等感人中果乎荅五戒等受持求後世故五常等行非求後世意樂故判行同益別也然五常等又善故自人中等果歟故下釋云如㝡初種子心在眾生心終不敗亡未至自心實際中間更無住處取意此意猶遠成佛菩提因况人果乎或云現世安樂名穪等邊云人中因歟問今此六心具五常耶不尒歟荅或云八心是續生為宗然行齊施五常自𬾨歟故云得孝義之譽又云仁義慙愧等故經彼護戒生天等者問今此護戒生天通內外歟荅顕文雖約外密意內歟故䟽雖約文正釋外八心解內八心故或但是外也問若尒䟽中明世八心等論中護戒生天出三類鑰中舉四類聲聞菩薩等十心今文攝耶荅世十心䟽自釋云准例前文文又大師釋因便舉之應知若外若內順世因果今經文及意攝耳或今文持齊護戒等皆明佛世以前行故唯是外也問佛世以前誰人耶荅或云刧初時梵王來下人間四韋𨹔典此乃外道所歸法寳故三學同韋𨹔典所詮歟問以四論名推所詮未見三學義如何荅私云諸未必一同如前又安然云後面所阿闥婆𨹔弁聲明法文此等不同故所詮義未决况壽經䟽乎吠𨹔礼儀云云五常等歟就中䟽釋彼所詮云以能開示出欲之行文䟽第十八釋四韋𨹔典宗云尋究經宗但生梵天而無出世之道文依兩處釋彼典詮護戒生天之義無異論歟又大師釋云諸外道等立三寳三學名文可悉之又義大經要義云既云護戒護戒品行何捨三歸三歸為戒躰大小共許故於此中三歸者梵王如佛圍𨹔如經論師如僧歸此三寳為生天因也云云此意歸外三寳云護戒也為言此義又順䟽矣又義䟽第十七云聲聞緣覺亦有十善戒亦為息世嫌及性善故持之一切外道世天亦有十善戒文俱舎論十二云一切輪王皆無傷害勧他令修十善業道文住心論二云勧導令修十善業道故輪王死定得生天文准此等釋今護戒者佛世以前故指此等十善云護戒生天歟又義章五戒義云成實法中外道亦得阿𭇥經中宣外道得受八戒當知五戒亦應得受𣵀槃經供外道持戒之者得無量報明亦得受文准此釋今護戒可通五戒八戒等歟然今䟽依智度佛世以前不許八戒等故應知護戒但可十善也𣵀槃經外道持戒者十善戒歟阿𭇥經別時意趣歟或又大師釋中輪王受齊戒云云又薩尼揵子經劫初第二時中善根𤎼故受持五戒八戒取意明知佛世以前有受八戒之義歟若尒今生天可𡱈欲天彼散善故又或經云孝養父母報在梵天文准設雖散善何不為上天因乎又論今文畢釋云護戒生天亦有三種今明異生天有廿八種大分為三一欲界二色界三無色界文或云此五戒生天者三界諸天惣句也戒有別解戒是欲界散善也又有定具戒是色界四禪定善也俱舎等意無色界雖無無表色大乗意三界善趣生皆可依戒善也仍今後四心續生次第先護戒心是第七其上求無畏依是第八次住其殊勝修其行是第九次其業决定第十也故通三界有後四心也云云私云受用無畏散善殊勝决定定善歟證空三昧是决定心故受用種子者或云此經文依兩釋文點二樣也依初釋受用於種子可讀也謂種之果實云種子子是果實義也故云種果成已受用其實故也又依後釋受用則種子也可𧦐也謂受用果心為無畏依成種子故受用即種子持業釋也又云從一種子等者有二意一云通經二句文又釋也所謂初釋命終生天云受用種子也後釋為後心種子之義云受用種子也一云由護戒故而得生天者釋經護戒生天句唯於受用種子等一句取二譬為釋為兩釋也今此受用果心等者合前𨐫者譬明來由合但合正用何者從一種子而成百千果實者前六心中舉種子成果為今心起因也是一一果實復生若亍等者今受用種子義也一一果實者指前成果也復生若亍是今種子即護戒心也今此受用果心者此也展轉滋育者無畏心等也故云復成後心種子等也或又從一種子即受用種子也百千果實是第八無畏也是一一下第八心中開殊勝决定義也者與能歸其躰是同耶荅於一人有邪正義歟例如犢子薩婆多攝第一第四也或又一人悟勝歟云今由善根𤎼之故或可別人合異故故寳鑰云問諸外道等所行皆是佛法歟荅此可二種一合二合者合如來所故者佛故文商羯羅是摩醯首羅別名者𭜧曇藏第一安然云摩𨢸首羅亦有三種一四禪主名毘舎此乃金剛頂經佛初成道令不動尊降伏三千界主大我者是也二初禪主名商羯羅此乃大日經中商羯羅天於一世界有大自在非三千界主也三六天主名伊舎那此乃壽命經中佛下湏令降三世降伏強剛難化天王大后是也文准此釋摩醯首羅有三種中商羯羅是初禪主別名故云尒歟故知惣別相𭔹中別名也為言經第一具緣品舉外部眾云商羯羅月天文䟽第五釋云商羯羅天此是摩醯首羅出一世界大㔟力非三千界主也文安然大日經者指此文也䟽第九云如瑜伽所云佛初成正覺有摩醯首羅者即是三千界之主時不動明王以左足蹋其頂尒時大自在天尋便命終文此金剛頂所毗遮舎摩醯首羅也瑜伽者金剛頂經歟故知不動所降第四禪毗舎摩醯首羅降三世所伏第六天伊舎那摩醯首羅也黑天梵音嚕捺羅等者䟽第十云次嚕捺羅亦佛所化身是摩醯首羅之化身也亦名伊舎那文准此釋第六天伊舎那天歟彼天身青黑色故云黑天歟秘藏記云伊舎那天黑青色面上三目繫髑髏瓔珞左手持器盤右手鉾鑞文此乃降三世所伏天故云佛所化身也同壽命經所矣自在天眷属者此黑天前所舉商羯羅天眷属也為言初禪欲天有勝劣故為主伴歟問義釋中嚕捺羅是摩𨢸首羅異名云云又俱舎云嚕捺羅此云暴𢙣自在天有一千名此是一文此等釋意同躰異名何為主伴天乎荅自在天是摩醯首羅漢名故智論二云摩醯首羅天䄅言大自在文故知義釋摩醯首羅俱舎自在天是伊舎那摩醯首羅故云異名也今䟽中或云摩醯首羅之化身云自在天眷属者皆初禪商羯羅摩醯首羅故無矣又䟽第云經中文更有嚕捺羅即是商羯羅忿怒身文伊舎那天黑青色三目二忿怒形故云忿怒身也此又商迦羅之所變忿怒身歟問俱舎塗灰外道於自在天計三身中法身充遍法界報身色界頂摩醯首羅化身随類六道嚕達羅取意准此釋今嚕捺羅化身色界頂摩醯首羅所變歟何云商迦羅之化身耶荅內外異故歟䟽文商羯羅化身義無異論者歟又本經正文云所謂自在天梵天那羅延天商羯羅天黑天自在天子日天月天龍尊等文此中自在天者色界頂三目八大自在天歟梵天那羅延商羯羅初禪天歟遁麟記云那羅為人延那為生本謂人生本即大梵王是也文商羯羅又初禪王故故知一躰異名歟唯識演秘云摩𨢸首羅一躰三分所謂梵天那羅延摩𨢸首羅文又理趣釋云麼度羯羅三兄弟是梵王那羅延摩𨢸首羅之異名也文准此釋今三天是三兄弟歟商羯羅是摩𨢸首羅故若尒別躰三天歟或又捺羅延天第三禪天歟其故䟽第十云毗紉天有眾多別名即是捺羅延天別名也文𭤩决云毘紉天亦韋天此遍淨俱舎云是第三禪頂取意黑天者伊舎那天也如前又大黑天神歟䟽第五是商羯羅忿怒身文又良垻三藏云大黑天神是摩醯首羅變化之身文又大黑天神法云大黑天神大自在天變身也云云又秘藏記云摩訶迦羅大黑色三靣六大𢙣忿怒形文䟽云忿怒身俱舎暴𢙣其義相當矣問大黑天梵摩訶迦羅也何嚕捺羅云彼天乎荅伊舎那天雖梵又有嚕捺羅梵名彼既尒此何不然乎自在天子者問既云自在天可欲天何云第四禪王乎荅自在大自在随冝名何天歟智論中摩首羅大自在故又心地觀經欲界第六天名大自在也又唯識論䟽釋論自在世主云自在者自在天也世主即是大自在天文依此釋自在大自在其名別歟又准秘藏記大自在天紫色持鉾乗黑水牛他化自在天色持弓箭大梵天四面四手色那羅延天三面二青黃色又智論大自在天三目八𮪍白牛云云俱吠羅等者本經正文云及俱吠毘沙門釋迦毗樓博刃毗首羯磨天𨵻魔后梵天后世所宗奉文今等者等取毗沙門已下也梵天后者問次下云然佛法中無有后妃文何今許后乎荅䟽十四云梵天無欲及女人等身云何云后乎此是梵王明妃相也義云妃也文義釋十本云梵天無欲及女人等身云何云后乎此是梵王明妃明妃是三昧義故義云妃也文凢色天有男相而無男根女根故云無女人等然今約瑜伽密意立梵天梵天后為定惠之表示也從波頭摩以下者舉諸龍中初故云從波頭摩以下也故經正文云波頭摩德叉迦羅龍和修𠮷商佉等文䟽第六云𨵻魔但荼大蓮華龍王波頭摩龍王文故知今波頭摩者波頭摩龍王也所謂得叉迦龍等者問龍是三𢙣趣随一十𢙣業所感何為生天所歸躰耶荅彼又五類天攝故合為所歸也都部𨹔羅尼目有五類天上界天住空天遊空天地居天地底天秘藏記上界天色無色界空天夜摩四地居天四王忉利遊空日月星辰地下天龍阿修羅𨵻摩王等天者自在光㓗義故蘓𭜧地經夜叉阿修羅迦樓羅𠃵闥婆緊那羅摩睺羅部多畢舎鳩盤荼等為地居天也准此等釋今自在天乃至商羯羅梵天后四天是上界天也黑天自在天子自在天后是住空天也日天月天是遊空天也毘沙門毗樓博叉等地居天也𨵻摩閻摩后迦樓羅子諸龍等地下天也若依蘓𢘤地是地居天攝也抄云四類天世間勝三寳文此四類又地下天攝地居歟又別義門歟未詳問地下天等何為所歸耶荅義云薩尼𠃵子經九云若不持戒乃至不得疥野干身云云下劣㣲獸尚假如來正戒之力何况高德生勝福龍尊不資自分世禁之㓛乎業雖𢙣滿業善故云云或云此等皆世間宗奉神故為成生天願慿彼神而為𦔳願之緣也非謂生彼趣中歟又住心論云法行龍王者於前世受外道戒行於布施而不清淨以嗔恚心願生龍中憶念福德随順法行等文此戒與施成滿業歟又以一生所持戒行𢙣願樂生龍中者有之智度沙等云云圍𨹔是梵王所演四種明論者𭜧曇藏云刧初梵王亦曰商羯羅天初從四面創出四論亦從頂上以出一論後人更造六論解釋彼四婆𨹔文法華文句八云外道梵志者摩橙伽經云初人名梵天變造一韋𨹔次名白淨變一為四一名誦韋𨹔二名祭礼三名歌詠四名攘災一一各卅二偈合成一百廿八偈有一千七百卷也文又止觀第十云如梵天造四韋𨹔論其後有仙名曰白淨造四韋𨹔文私案安然意從梵王四面創出四圍𨹔云云會䟽文然文句等意梵王造一圍𨹔次白淨仙人變一為四韋𨹔云云違今文然一四雖異白淨又開梵王論故從末云梵王四圍𨹔歟例如云龍猛般若燈論也又䟽第十八舉四圍𨹔釋云此是梵王所但可導行文又今文云梵王如佛四圍𨹔典猶如十二部經文前後文無爭四圍𨹔直梵王造又安然釋從四靣出四論云云頂上一論𨵻浮不𣴑布故今不論也不可云一韋𨹔矣天台釋又依摩撜伽一歟䟽十八云雪山之中有大仙人於四圍𨹔外別有决擇𭰹義名計婆即以此教故此仙為計婆仙文文句白淨仙者計婆仙同異可决又安然後人更造六論解釋四韋𨹔云云推此文六論中二論釋四圍𨹔中三論四論釋一圍𨹔歟文句釋約四韋𨹔随一歟又䟽十九云作梵王時演外韋𨹔之法文此未云四韋𨹔矣以能開示出欲之行者䟽十八釋四韋𨹔典宗云然一一尋究經宗但生梵天而無出世之道文准此文今出欲者出離欲界生天故云出欲行也故寳鑰云外道心願天樂文又觀無量壽經䟽釋四韋𨹔名宗云毘𨹔論者正音吠𨹔有四吠𨹔婆羅門學一壽吠𨹔論謂性繕性二祠吠𨹔論謂享祭祈禱三乎吠𨹔論謂禮議占卜兵法軍陣四術吠𨹔論謂異能伎𮒛禁咒醫𭤧文又䟽十九云外典淨行圍𨹔論中有火祠之法然大乗真言門亦有火法文秘宗護摩是為𭔹治外道火祠法也此火祠法者生天行歟故䟽第四云有諸異學𭰹樂圍𨹔火祠之法願生梵世文此法四種中祠吠𨹔所詮歟猶如十二部經者法華義䟽第四云大乗具足有十二部小乗随分十二所以但明十二者以十二是一數之圎又治眾生十二緣病故也文又云大乗是滿字故具十二部小乗是半字故唯有九部文無𭤧廣授記無問也此第八無畏依中者抄云謂凢夫以十不善感生𢙣趣是怖畏處後遇善友得聞世間三寳修十善不畏三途苦名為無畏十善是𭂫夫所依止故名依也略抄此意護戒後更得聞世間三寳也倍增彼善故云十善欤故受用心釋云由護戒故倍復增廣賢善文又䟽第八心釋云彼聞如是等世間三寳歡喜歸依隨順修行順行十善也是第八𭂫夫無畏依也文十善是凢夫所依止故或云此釋以世間三寳為依無畏心所依故謂生死凢夫無畏心之所依也為言故或云於生死流轉中求無畏依文又云於第八心求生死無畏依時等文此等皆所求三寳云依也例如求解惠生私云生死流轉中者在第七心求第八也於第八心等文點可讀於第八心求生死無畏依時云云意第八心云無畏依也故䟽云彼聞如是心懷慶恱随順修行是名愚童異生生死流轉無畏依第八嬰童心也文此文既指順行心云無畏依故然於第八心等文點不順綴文歟大師又云無畏心未云依然今無畏依中復有殊勝心者抄釋大師住心名為成句歟問嬰童無畏心者約第八心立此名歟荅或云嬰童無畏通四心㧾名也故鑰云小分厄縛故無畏未得𣵀槃樂故嬰童文今䟽㧾即別名但名第八歟鑰䟽㸦顕歟或云殊勝决定開無畏故三心云無畏受用云嬰童也論云嬰童㨿初心得名無畏約縛樹穪文或云受用亦無畏因故云無畏私云隱劣顕勝云無畏心也此諸三寳何者為勝等者抄云謂此愚童𭂫夫於彼前來善友所此是大天與一切樂者遂於四類天等世間三寳随於何類之中随順修行由此趣希求出離解之惠此心殊妙勝過已前依之不動故曰随彼惠生也文要義云此諸三寳等㧾於三寳善者也随彼所等者別随法寳得殊勝也此人前於世間三寳擇善順行此善力後有求智惠生也故前求惠未生時擇善順行此為世間㝡上品心云云私云抄意此勝三寳善知識所故云随彼所也要義意別取法寳故二義是異矣然以未知緣起法故等者抄云此然字義𭇥縱奪縱云雖於随彼等奪云然以未知等謂彼未知因緣有無故雖有觀空智惠故不離於断常又此言智惠但是不分別非是真實智惠取意此意常無常空者前殊勝心示不離断常之過也要義云随彼所中殊勝住者随彼能詮教中安住其所詮殊勝道理也求解惠者悕求所詮道理中空理作證之智惠生也所謂者將求智惠遂得作證而起下語也常無常空者惠所證理也如是者證此空教也随順此教者但随順此教而勤勇學也然此學有二種一求惠生二遂得作證作證名學者觀未究竟故云云此意以常無常空為决㝎心也云云問經文所謂言雖似示求遂得作證䟽中然以等釋唯顕求惠過抄釋䟽文云何荅䟽釋又顕求惠過成空法作證義猶如名相似覺等句結前顕熏俱矣所以常無常雖示断常過空言還示空法作證義也又依前義者或云求解惠生是殊勝心解惠生决㝎心也或云於求字有求已求二義故猶如如菩薩地盡句矣私又云空法者空㝎歟故具緣品由他主空三昧空惠生文䟽云而證空㝎文故知得禪定云作證也故䟽七云修諸禪文問殊勝决㝎二心是善種八心攝故䟽第四云善種八心文然断常二見邊見其躰不善無記性也若尒觀空智與二見不可俱起何云不離断常乎諸相應法必同性故是性相所故荅下釋云謂六十心與善種八心具躰而生文六十心中五見有之既云共躰而生豈不俱起况法相家又許不善無起俱起義歟必同性故是大途文歟或又云不離未必俱起義歟又准唯識論云見非惠俱不異惠故不可論相應俱起觀空智即不分別故云不離断常非別躰歟抄云此言智惠但是不分別文問觀空智即二見二見即可生天因乎荅於一種觀空智有順二義歟證空㝎邊順理也不知緣起空断常邊理歟或又断常有淺𭰹歟邪計断常理也人常為人等計也今觀空不知緣起故云断常猶順理歟故䟽下釋云從断常空退入邪見文此断常非撥因果邪見故又第三住心舉十六異論矣又䟽第七云若行人不解正因緣義而修證諸禪必當計著自心文准此文修證諸禪善故為生天因然起貪計著自心為內我我見故理心也光記釋味㝎云愛能味著淨㝎故文此中復有二種者或云第八無畏依云此中意無畏依中有二故先開殊勝心今開决定心也為言又云第九殊勝心云此中也前既第八中開殊勝故意於殊勝心中求惠生邊云殊勝心空法作證邊云决㝎心求解惠生一句約求已求有二心故云此中復有二種也已於空法等已字可思之又義指随順如是句云此中也此目近詞故前殊勝决定二心随順此教勤修學故此勤修學中有二心故為言若離分之凢有十心者初種子心是持齊牙乃至成果是於施開五也七施上更護戒行也第八見持戒生利故又㼼別勝田至供歸依之誠也此云八心此第八歸依世間三寳中随彼所法中得殊勝住求空理作證惠生云殊勝心空法作證心云决㝎心也以此二心并前八心惣有十心故云凢有十心也此中解者空理也即繫属他主空三昧也非真圎𡧘也故䟽第七云若𭰹求此中至𦣱自然撥除因業唯我性猶存乃至無一法而入心而證空㝎㝡是世間究極之理也文住心論此文成求解義又䟽次下釋云雖復一心精進勤求解非彼能知𣵀槃文可思之出世間觀空智惠者或云續生次第可小乗觀空智也故今䟽下云從此即聲聞菩提初種子心文又初刧釋云㝡初解了唯蘊無我時即名出世間心生文問既云觀自性空法空義也又大師釋云觀有空即法界則得中道觀文有空即法界義全非偏真理中道正觀穪獨𡱈大乗㫖如何荅然佛法中以知因緣有故等文因緣是佛家大宗小乗豈背彼㫖断常專外道所計無我何同彼義但自性空者拆法空非躰法空故䟽第三釋唯蘊無我云五蘊尚從緣生都無自性何况而有我耶文或又觀我自性空歟又即法界者指人空理云法界歟起信䟽云依人空門見於法界文又天台於三藏教立離断常中道又蕳外道邪觀云正觀若尒中道正觀又小乗何無矣故彼釋下結云若聞此理即得羅漢文非指小果耶又義𭔹大乗示外道非也䟽既云真空離於分別妙有真空義大乗不共故况又即法界觀是躰法空之智中道正觀專緣生中道之意續生𭔹明義門異故直𭔹大乗何𭁆又羅漢穪未必小果䟽下住不思議解云真阿羅漢彼釋非真圎𡧘指大𣵀槃欤非彼知解空非空義等者經正文云非彼知解空非空常断非有非無俱彼分別無分別文於此經文古德讀點取義不同也且相傳云非知解彼空非空常断意非彼外道知解觀空智堕二邊二見也為言空非空是二見也断常二邊也或云断常二字属下而讀之䟽釋云了知断常此意經文知解二字被下断常故加了知二字也次句云非有非無云俱彼分別無分別意云雖作非有非無平等觀似絕論還𭘧非有空非無有之見故云然亦不能雙離是見也雙字是顕𭘧二見歟或又非二見非有非無見也香象等起信䟽中出四宗外道計此乃四句見故又地藏占察經䟽云若如外道僧佉執有衛世執無𡰱𠃵𨹔執亦有亦無若提子執非有非無文如次配增益减相論四謗矣其意可知然佛下釋俱彼分別無分別文也意云佛法因緣有自性空離二見故不堕二邊若不達如是空義雖復觀非有非無不著有無離言絕相終是以分別而想無分別也為言故結云以分別想作此無分別心也猶如下例證也長爪事如先弁矣或人知解二字貫非有非無句讀之大䟽釋矣夫真空離於分別等者釋經云何分別空等文也𨗴僧都云是外人伏難辞也私云不尒此重以佛家緣起之空破外道𭘧見之空也妙有真空實教談故故下釋云應了知緣起之空離於断常也若不解至断常也者釋不知諸空至断常之文也彼計空理為𣵀槃是𭘧見故非知真𣵀槃也抄云謂外道只到非想非非想㝎更無歸處以彼計此為𣵀槃故非彼能知佛法大𣵀槃也畧抄已上就經文釋外十心畢由彼初種子心等者𨗴僧都云是明依㝡初欲發莭食持齊一念善心以之為因後九心漸次生起而遂入佛法之所由云也云云覺心云此文有二義一有九心種子心持齊也齊施漸增後五心也則䏻㼼擇等後三心也二十心具有受用心直從齊施生故可攝齊施漸增文也私云齊施漸增者六齊日行施故云齊施或齊上行施有漸增義故舉齊取施增實齊是初種子心非後五心但是施轉增故由此熏習者顕受用心也果還為種故云熏習歟熏習義云種子故求解惠生句已正二求存二心也然其八心種子等者抄云䟽然其八正心等者然其八種正心種子熏在藏識終不能令破敗消亡若聞佛法為緣即入八正心種子之道又釋八正道支也在眾生本覺地中未遇善友因緣起終不敗亡是堅固性故文私云現本無正字但云八心種子此乃外八心善㓛能在頼耶藏中不𭁆終至心實際故云八心種子非云八心中種子心也彼旦以麦種芽等譬善心轉勝也非實種子故唯識論云外麦等非實種子文此八心種不敗亡而有近趣人天遠至佛果之㓛故云命終生天後得𣵀槃斯則全同天台云已𮠪未𮠪善俱為佛因也或云已𮠪未𮠪者人天小善已与果善云已𮠪未與果善云未𮠪此約花報論已未也又云於一善有近遠花報果報故已與果花報邊云已𮠪未與果果報邊云未𮠪也前義為勝若一善何云俱為佛因乎或云抑此八心有遠取佛果之㓛事以真言開會之意也未開時唯順世八心也天台意若未開時人天善唯謂住人天果之情云已𮠪今開𭤧便此小善即緣因佛性也約此佛因云未𮠪也此義已𮠪靣永不成佛因未開故故只於開會前開𡱈情云此是緣因時即成佛因也云云今八心義准又有二意一開弄二開即躰也外八心等成心續生弄故又外八心即大日秘密加持無淺𭰹之殊故云即躰也還從断常空退入邪見者断常是邊見也邪見邊見同五見攝也何論進退乎觀空智求解證空性智故順理心也然末知緣起故云断常空邪見撥無因果理心故云退入也若聞佛法但於断常空者或云從外决定心移內决定心之義從空入空故上以世間觀空智惠𭔹明出世觀空智惠即此意也即入正道即出世故問下釋云思惟觀察生决㝎想從此即聲聞菩提初種子心文內决定猶世種子外决定何移出世决定心乎荅眾生根性不同利鈍非一何必一同猶如從外第八起內第八矣又義內十心是雖順世知因緣故觀緣起空歟若尒即入正道又𭔹外道故云正道非出世也若尒與下文何異此從决定入决定下從無畏入無畏故或此惣外十心入內十心之義也下文各約随一論故異若是末生種子等者未生八心種子義也又如行者於第八心等者𭂫於八心有三種一唯外十心如前文明㝡初順理至離於断常也是也二唯內十心下文也復次行者至生决定想是也三內外合論八心今文也又如行者至餘𭰹事耶是也又更有世十心出世十心等如下文矣且於今文從外入內有二義又於初中有二意或云又如行者於第八心等者從外第八入內第八也信受三寳真歸處是第八心行相故故前釋外第八云復聞佛法殊妙必能信受故文下釋內第八云不起異歸依心文准前後釋定知信受真三寳是可內無畏心矣就中求無畏依時遇知識為真歸依處信受文義所推無爭入內第八也况由復漸識因果故信受三寳之義又外受用心非啻起外第八又示與內第八而為起因之義也故上釋云又見持戒能生善利即是漸識因果等文彼此文義既同不可異求矣私云從外第八入內種子心也內種子心者受八齊是也受齊戒先受三歸故為三寳等者知識授三歸也即能信受者行者受持也故下釋內種子心云復次行者歸依三寳受八齊法文依之住心論中出八戒三歸况外人入佛家不受邪三歸如何入佛家乎故論中釋邪三歸云佛其信邪來久躭著非境今忽善歸投佛法創以三歸其邪倒故名邪也畧抄又為欲異外自誡莭食而顕內八齊師受故舉歸依處也但求生死無畏依者在外求無畏依時遇知識授三歸故入內種子心也為言又漸識因果者外種子心猶有㣲識因果之㓛內種子心無其義乎但此外知因果故云漸也况第七心云命終生天非現在因果也設又許第七心外護戒力非起外第八起內種子故云尒歟復是事者𨗴僧都云是捨彼外道所傳八心而更今信用佛法內八齊行云也云云私云從外第八入內若第八若種子此事且置明從外種子心入內種子心為言如彼齊時等者即此意矣歡喜安樂者如次前憂苦也憂與喜是心受苦與樂即身受故問內外雖異同持齊何轉入耶荅彼但一日不食為齊又自誡也此不過中食故又師受故現世安樂有大名穪等者今此得果是外齊施得益歟以心離慳貪垢故者舉前外齊施德故又次文云今更應受八齊法之故或又云如佛所知識所舉內齊施益令彼欣樂歟况外六心不出後世得樂故若無機之人等者抄云謂未生八心種子無信根之人但世間苦樂乃至以時為因設為八齊少分安靜尚不能信何况佛法甚𭰹之事耶文私記云此人或未殖上所云八心種子故也或亦雖殖八心種子而遇𢙣緣信邪法故作此也云云私云䟽上文未生種子無機之人文抄義依此釋歟問曰如是八心等者𨗴僧都云問荅第一種子心之㝡初生起因也云云私云上文中雖粗明種子心生起末委弁故今更劫初并劫未委弁彼生起也何者上既釋外牙等七心皆以先心為因生內八心以外或第八或持齊為因起義畢外種子心起因未委弁故今重釋也就中劫初劫末無知識緣力故殊舉彼釋起因也中間遇知識緣故如刧初眾生等者住心論二天地本起經云刧初之時人食地𦘺有一眾生頓取五日之食因制盜戒以食地𦘺而生貪欲因制戒以欲故共相欺奪因制皱戒以求欲故語曲因制不語戒以飲酒故昏乱行非因制酒戒計尋五戒之興其来久乎萠於天地之始形於物之先文今䟽又依此文歟起諸過患者皱盜也俱舎論中地味地餅林藤香稻等次第而生初行非梵行也與本起經異矣謂仁義慚愧等者住心論云謂仁義礼智信愍傷不皱曰仁防害不曰義故心禁酒曰礼清察不盜曰智非法不言曰信君子舉之以立身用無暫故曰五常持之為五戒文寳鑰云外五常內名五戒名異義融行同益別文通玄抄云五常令一生撿束五戒通多世防修云云今五常中舉仁義等取餘也慚愧者唯識論第六云崇重賢善為慙輕拒暴意為愧皆止息𢙣行為業取又如小劫終竟時等者𨗴僧都云是彼减劫中小三起時事也小三興畢後其中眾生更起善心即𢙣道生人天二趣云也此義如樓炭經及立世毘曇論也云云此意廿增减中减劫劫末眾生也今小劫者彼中劫也俱舎論十二云此小三中刧末起此三起各經幾時刀兵起極唯七日疫起七月七日飢饉七年七月七日過此便止人壽漸增文此文雖云人壽漸增未出其因光記等又尒樓炭經等可見矣或云指壞劫歟俱舎論云若時人趣此列一人無師法然得初靜慮唱如是言離生喜樂甚樂甚靜餘人聞已皆入靜慮命終並得生梵世中文無師法然文同無知識餘人聞畢入靜慮擬更相勸導義畢自心實相熏習因緣力者抄云自心者本覺真心此心實相能熏眾生無明染心還成淨用起信論云無明染法實無淨業但以真如而熏習故則有淨用此中明義謂由世間自久遠已來有善法之名即是本覺熏令眾生莭食自誡生起種子芽等心及殊勝决定等心厭生死苦求𣵀槃樂故名自心實相熏習等也文問起信論云雖有正因熏習之力若不遇諸佛菩薩善知識等能自断煩惱入於𣵀槃即無是𠁅文准此文今無知識緣何有厭求心起乎荅既云因緣力何為無緣凢於知識有二同行知識教授知識也今雖無教授有同行故無更相勧導是同行知識也或又本覺熏無明起淨用故本覺為因無明為緣也或又於緣有內外雖無外緣內緣有故故通玄抄云馬鳴就顕唯合他緣龍樹㨿隱唯明自緣文又准性相釋今起善心本覺智若第六若第八相應起故六因中除異𤎼遍行二因餘四因所生非異𤎼生故非染汙故無二因也又心心所生詫四緣故故因緣生法也依此等意故云自心實相熏習因緣力也雖云善種子生等者或云㝡初種子離㣲塵許心垢時菩提心實不生性也謂諸法性不生理故也又解未生堅因菩提心故云不生生也云云私云依本覺內熏力起持齊善是始覺用也依實教意今始起德本來有故云不生生又云堅固性也或始本躰一故云尒也或依今宗現覺諸法本初不生之理故彼外種子心等皆不出阿字不生之理故云尒也未至自心實際等者華嚴經云彼如有一人吞服小金剛下至金剛際究竟不可消文玄記云謂遣法中見聞信向此無盡法成金剛種當必得圎融善法如下文吞服金剛喻云云准此文若外若內雖順世善其善躰終不敗亡至自心實際一切智智果譬如小金剛交雜穢在地終不消至金輪際停住故云未至大金剛輪中更無住處也雖果復成種等者從外第八心至內順理種子心內决定心生世種子心等展轉增長皆不出阿字不生理云心續生之相諸佛大秘密等也問外道所十心等為心續生秘密者何云外道不能知耶荅外道修此善生天為極果未知此善展轉終至自心實際故云不能知也約此義二乗又尒故䟽中又立內外道准知極無自性猶尒况餘大乗小乗耶故大師釋九種住心皆云外道矣凢今十心文九句中荅心相續問也然在今文前釋勝上大乗句心續生之相以此文大師成十住心之相續之㫖故住心論十云又云心續生之相諸大秘密我今𢘻開示者即是竪謂從始羊暗心漸次背暗向明求上之次第如是次第畧有十種如上已文然上第二第三心引十心文成義定知十心云諸佛秘密心續生之相也今䟽云雖果復成種乃至不出阿字門者即此意也又具緣品五種三昧道中世間三昧道舉外道空定等然䟽釋云就此經宗則五種三昧皆是開心實相門餘如住心品中廣明文此亦以五乗融會義取外道等行為瑜伽行歟是密中淺畧門義也若依𭰹秘門外道世天等皆毗那己躰故故䟽云若更作𭰹秘密釋者如三重荼羅中五位三昧皆是毗那秘密加持其與相應皆可一生成佛何有淺𭰹之殊文論云若𭰹秘釋一切世間緣起之法若入阿字門𢘻離一切相離相之相無相不具是則法身普賢色身若有眾生能解此義則世天真言與大日真言無二無別若不解𭰹秘則不得出生死證𣵀槃畧抄又義云今經文舉外十心為所𭔃齊顕真言行續生歟例如六無畏等也故䟽第三云今所以廣明三劫六無畏眾多心相者皆是擬儀外迹以明修證之淺𭰹畢文論中於九種心出淺𭰹二意即此義也又䟽第七五種三昧又尒也故䟽釋云若行人不解正因緣義而修證諸禪𡸁盡三有還堕三途若行者入此心時當自覺知也文又云今偈中所就彼等自所傳法教而言耳文故知舉自所流傳法教顕真言行者心續生也問何直不真言行舉所𭔃齊耶荅䟽第三云若觀前人未有𭰹解之機則順常途隨文為釋若已成利根智惠則當演暢𭰹密而教授之文今准之法華藥草喻品等者抄云䟽主指此意者欲顕實之設差別無量覈其定趣終歸一實故彼經云如來知是一相一味之法所謂解初相離相相究竟常𡧘相終歸於空以况此中雖開順世世八心乃至各各求於解究其所歸不出阿字又下䟽云觀畢竟空定得至金剛實際故云法華藥草喻品亦意在於此也文或云三草二木各得生長如八心續生一地所生一雨所潤如不出阿字門法華記云眾生自謂當分增長今順佛意莫非一地一雨文復次行者等者䟽文次第云復次已下明出世八心下明超一劫行中亦明之耳文私云此下明內法異生順世心何云出世乎况所指下文云如前所種子根疱等及歸依三寳為人天乗行齊施善法皆名順世八心若三乗初道意是名超越一劫瑜行文此文又云順世何今云出世耶恐出字悮歟若又云順世者外八心既順也何今至此云順世耶於一日中受八齊法者問俱舎論十四云謂受此戒要日出時此戒要經一晝夜故文又智論十三云汝當一日一夜如諸佛持八戒文何今背大小論釋云於一日中等耶荅智論既云一日一夜今䟽依智論歟若尒合晝夜云一日中歟又智論中又一日受八戒云云又觀經云日日如是授五八戒文例如若一日若二日等矣又住心論齊法經云不如一日受佛齊法文又義章八戒齊義云一日夜者是也因緣明此八戒時分唯在一日一夜不增不减成實不同故彼論言若八戒定一日一夜是事不然随時多少或可半月乃至一月竟有何咎文准成實意可有一日無夜之義歟問今此八齊法可有分受分持義乎荅雖云受八齊法未見分全判文住心論又於五戒智論雖明分受全受義釋八戒全無分受全受文况智論中又無八戒分全文歟故知䟽論意不許分受分持歟又義章云言具足者六因緣明此八戒具足受乃得分受不得成實法中不具亦得故彼論言随力堪能多少不定文又義林章表無表義云既律儀許有小多分時而離故知近住近事二戒有有全受及持一分亦成近事等雜集第八云問若唯修學鄢婆索迦一分學處為成就鄢婆索迦律儀為不成就耶荅應成就而名有犯此具受後便少持故成犯戒非初小受而後小持可名犯戒先既不受後何所犯故知受具受為後具持及小持亦成彼二有義近事初𨿽全受可一分持成近事性既言成就而名犯戒故知可一分持非不全受近住不然以時伇故受持俱全又𣵀槃卅五時迦旃延來至我所作如是言世尊我教眾生令受齊法或一日或一夜或一時或一念如是之人成齊不耶我言比丘是人得善不名持齊我諸第子等聞是已不解我意唱言八戒齊具受乃得前師即以此文為正近事近住皆通具受及不具受一切皆得故唯受一分無全受者名不解意若必全受無一分者亦不解意𭔹法且㨿具受少持非亦有小受小持文兩師釋俱有二義任意取捨但𣵀槃經行八戒亦有分受小持歟成實論外道得受八戒云云異今䟽釋歟又准𣵀槃經是人不得善不得持齊之文今䟽一日中者可盡晝夜歟故章云若但一日無夜若但一夜無日或一時或一念皆不成齊要盡一晝一夜不非時食持成齊故為令此善增長等者私案此善者八齊法種子心也而修諸善者施行也即芽乃至成果也由戒醇淨者者護戒生天即受用種子也問外八心種子心位唯齊無戒第七心初有護戒今種子心位有護戒義何更立耶荅彼齊為本今戒為要歟又云戒醇淨顕勝前歟或又今戒者五戒十善歟五戒十善俱為生天因故復由下釋第八心也前種子心雖信三寳未聞正法利歟今聞彼利故不歸外三寳歸真三寳也又於下殊勝心也於真佛所中殊勝住求真解惠生也近雖示生天遠期佛菩提故云求解歟又生天云解然不計真𣵀槃思惟等二句决定心也遠思惟觀察佛菩提生决定想歟有漏心故非作證云思惟歟皆應准例等者前就經中随文釋外十心就義述內順世畢今更釋世故云准例前文也乃至者聲聞芽莖等及緣覺十心等世等八心也三乗一一地等者准大乗同性經聲緣各立十地住心論引之者聲緣亦有十地故云三乗一一地也故䟽文次第云三乗十地各具八心文文又初刧釋云若三乗初道意迄至業煩惱根本無明種子生十二因緣名世八心或可就見道修道等諸位分之各自有八心也文准此文二乗見修等位亦云一一地也初劫所明三乗第二三劫菩薩佛皆在此三乗也依之䟽釋云故以三乗上中下出世間心合論一僧劫文是乃初劫三乗文也又第九云畧法有四種謂三乗及秘密乗文若菩薩若佛顕乗皆三乗攝故第二第三劫又在此中也迄第十地等者於自家十地舉終顕前地也第九卷云秘密乗是也應知三乗中舉了了種子心秘密乗中舉第十地十心影畧㸦顯甚巧妙者歟當卷下釋十地云若通論信解地則初地為種子乃至十地此心决定若一一地中亦自具此十心文准此釋今文一一地具十心中第十地十心也中舉前後等取中間有求佛智生者第九殊勝心也觀畢竟空等是决定心也故抄云謂於第十地中次第至八心得㝡後無畏依時有求佛地智生得此微細惠時觀畢竟空得到等覺金剛際心文又義今此十心長配十地也點云迄于第十地具種子㸦疱華果等得到金剛際也為言故下釋云九地為有進求佛地惠生文又依大師住心意則前理心第一住心順世第二第三也聲聞第四乃至者第五緣覺三乗一一地等者他緣覺心也第十地者天台也儀䡄中一道清淨云想身證十地故又大師十地不能窺窬文等者舉六心等取四心也有求佛智生者等覺位極無自性也蒙警忽進故云求佛智生也觀畢竟空等者真言佛果也入大空三昧故云畢竟空入大空三昧到自心實際三平等處故云得入金剛際上文云自心實際大金剛輪是也故知今此三句文非殊勝决定心也又義有求佛智生者一道心此心初入一佛乗智故觀畢竟空者極無也觀諸法無性故云畢竟空到金剛際者真言也明三密金剛故云金剛際也
