body:
  text: 疏卷第一之一大毗那成佛經疏者初八字是本經名疏一字即今書題也斯則大日經之疏依主立稱也且於今經釋現行有三本一大師請來二十卷疏二慈覺請來十四卷義釋題曰毗那成佛神變加持經義釋三智證請來十卷義釋題曰毗那加持經義釋此中今本初二十卷疏也故御請來録云大毗那經疏一部二十卷一行禪師撰云云又安然目録出八本遍明德請玄訪等請來亦有之智證大師義釋目録云高雄寺空海和尚本二十卷以世多行更不入藏今記數本題為令後代會事無由及名是非非者此疏也是者義釋也凡疏躰者初以筆語談於大宗次撮略釋題後更開章分科解釋諸家章疏大𮈣如此而今不爾所以題疏與尾不合披而須辨其義釋者直爾釋文無有拆開章假等事以為祕教不同常途對衆講演只會文意潛通佛旨文今謂此破不可然今疏一行草本直記無畏義釋𭁡治別本屢交他人語依之安然云此義釋本三藏一行記智儼溫古𭁡治之間本記外多加人言文濟暹僧都云今二十卷疏是草案本也文當知疏稱作者正名義釋治定謬依之解義釋覺𮏑牒文云疏云釋撰云疏主之諱又龍猛論云準毗那經疏文此文縱雖譯者不空語無畏一行不空皆以疏名恐難破大師請來還成非付法祖師故應云是者疏也非者義釋也耳又不似疏例云事如何智證自云祕教不同常途對衆講演只會文意潛通佛旨文既許別作義若爾疏題例不似常途何失又彼疏躰者是常途三門分別義歟嘉祥法華義疏中破古德三假之釋大師梵網經開題云古德三假釋是淺略意自家一一字字一一句句皆是諸尊法𭦟荼羅身法然而有無人造作故不用彼義文取意沙門一行阿闍梨記者沙門釋子之通名一行疏主之別稱也抄第一云言沙門者是略梵語具足應云沙迦悶曩就此方即云息𢙣謂息塵垢之𢙣故別諱者如前已明述謂敘述記謂記録以我疏主敘述記録諸教及三藏所文之與義成斯疏矣非自作也故云沙門一行述記略抄義釋除阿闍梨加述字歟智證大師記云大日經疏者一行禪師依無畏三藏口傳撰集毗那經大本之要文為今疏也云云準此釋又非三藏之自義歟疏第九卷皆同底里三昧耶經也可悉之問今疏之所造年記何比耶或云大日經疏自開元十二年以來同十五年之前造之歟云云一行者抄第一云一行者疏主之諱夫聖人作名則必不徒然唯一為行故曰一行今之疏主取阿一行是為禪行且以阿字而顯示之文阿闍梨者慈覺釋云阿闍梨者短聲為正行長聲呼云阿闍梨耶䡄範師文或云新云阿梨耶唐云䡄範此有五種剃髮出家羯磨教授依止五中取教授云明解師云云或云一行禪師元禪宗人歟抄第一云準禪門師資承襲圖所示第五祖𭤩仁大師門下有二第子一是惠能即南宗也一是神秀即北宗也北宗弟子名曰普寂即疏主之師也文準此釋者今一行是北宗禪師也以阿字無生為禪行矣入真言門等者今此品題非唱本經之名即是未釋之稱也今疏先不唱經文直牒釋故品在下牒釋故具緣品等又先不唱而直牒釋故問全同經何為疏名耶若舉疏品者具緣品已下何不爾耶通依依主品約有戝例如釋論已立義等依有戝矣具緣品已下無亂故今先釋通名故若不舉品難知何品故大毗那等者不思議疏上云大者即無𨕙義也毗那者是日所謂即惠日也成佛者證正覺正智義也神變加持者神力所持也經者貫穿縫綴能詮在此矣文今此經名梵漢𮦀舉毗那佛五字梵語餘七字漢也抄第一云且名者梵云摩訶毗那悉提三菩提微吃哩𩕳多地瑟姹索怚覽摩訶云大毗那云遍照悉提云成三菩提云正覺微吃哩𩕳多云神變地瑟姹云加持素怚覽云經揔云大遍照成正覺神變加持經文大師開題云大毗那成佛神變加持經因𨹔羅王者此則梵漢和𮦀也大成神變加持經王者唐言餘是梵言若悉漢語者曰大日除暗遍明成正覺者神變加持經帝釋王若具梵本名別本字文祕藏記同之又本云摩訶毗那勃𨹔悉地因𨹔羅羅若文私云成佛梵語頗異抄云悉地三菩提一本開題云勃𨹔悉地抄準漢名云悉地三菩提一本開題梵語法故云佛成也勃𨹔三菩提梵語廣略歟別本祕記等尾三菩提者尾字成梵名歟問大日即佛何更云成佛耶𮦀問云問大日是即法身何故更次云成佛此有三意一大日指今果成佛指昔事謂大日世尊顯昔成佛之初事故云大日正覺二大日者此衆生本覺也今了此本覺故云大日成覺三者大日世尊令衆生成佛故云大日成佛文私云且約行者顯得𨕙論今昔歟意指本有云初事指修顯云今果第二釋反之本覺云大日顯得云成佛故上二約自利後十據利他耳又此題有二意竪約句義者句句含攝四身等橫就字義則字字各含人法喻矣初竪義者開題云大毗那者自性法身即本有本覺理身次成佛者受用身此有二種一自受用二他受用修得始覺智身神變者他受用應身即變化法身加持者等流身即是三界六道隨類身若接四為三者神變加持合為一即法應化三身如次可知又配三大釋者大毗那者躰也成佛者相也神變加持用也文私云此中第三身名他受用者變化身又有含他受用義故或此則報身中他受用也他受用是用大故但第二身中他受用是自證中化他歟故疏指成佛云自證三菩提故五祕密經云毗那自受用身及大普賢金剛薩他受用身智云云今又云始覺智身可思之又三身時神變加持為一者三身時等流又應化攝故故起信論三身章云隨於六道各見不同種種異類非受樂相故為應身文抄第一云且三大者大一字是躰大毗那四字即相大成佛神變加持即用大又大毗那俱屬躰大成佛二字即相大神變加持用大也又或大之一字是𢝰毗那神變等是別躰相用三句皆大故約三身者大毗那即法身成佛即報身神變加持應化身又或大屬法身毗那成佛俱是報身神變加持即應化身或可大之一字即通三身所謂大法身大報身大化身也略抄私云以今釋望前釋三身或同或異初釋同前後二異彼三大與彼異彼如次配三身句故今法身句開躰相報應句合為用大故且準起信論等理法身為躰智身自受為相他受變化為用者抄初釋理智二身為法身他受為報身第二釋開理身別立自他二受合為報歟大師釋自他合為相大者約受用義同且以用大他受屬相大歟或於智身約自證化他歟後橫義者開題云人法具舉法譬圓備所以者何若言人則是人也一一字人種子故言法則悉法也一一字皆法智故言譬則諸名即譬以淺顯深故文私云此中以淺顯深者字相名淺世間所用故字義名深出世所用故是則以世間字相顯出世字義與以喻顯法其義相同故大師云以世間淺名表法性深文可思之問四種身無橫義人法喻無竪義耶有之故抄第一云私又云毗那成佛通自性及受用神變加持俱變化等流也文義大毗那神變加持者通云自性身乃至又通等流身凡四種法身通有自利利他二義付之有二意趣一者云自利四身皆自利也云利他四身皆利他也二教論意二者自性受用自利他受用變化等流利他聲字義意但於後義自性受用中又有四身他受等中又有四身安然意也云云又毗那喻也成佛人也神變法也餘通三歟密嚴院抄云四種法身諸法有重重義各各橫則自利竪則利他自性身能加持自利之位餘三身是所加持利他之身也又互相望有自利利他能加持所加持之義又付法相羕義也文私云四身平等故各各有橫義四身淺深故各各有竪義又申身互法互受法樂故互有能所加持自他利義也又大日金薩等付法相羕又自性受用等次第歟又以今題配三部三點等者智證心目云大是唐梵言摩訶則大一法界之揔躰三部最深之祕處且含三義謂大多勝也正當三部阿字不變為深大理沙字離染為廣多智縛字離壞為殊勝用皆在一心非多非少阿字之故其躰大也沙字之故其相大也縛字之故其用大也斯則三點之祕府五智之幽𨵿矣毗那是阿字理點一切諸法本不生故成佛是沙字智點一切諸法無染著故神變加持者是縛字用點一切諸法離言故不生而生故現法界宮無染而染故具五大離言而言故三三昧耶所謂不生即是寂義離染即蓮華義離言則金剛義躰不生故妙理不極相離染故真智無窮用離言故化道無盡是以摩訶之躰無處不遍摩訶之相無法不圓摩訶之用無行不滿居性寂之極地包法界之躰用即土即身無異無相故題大毗那成佛神變加持經文梵音毗那等者抄云毗云遍那云光明照為順此方云光明遍照云云金剛頂經義決云梵音毗那此最高顯廣眼藏如來先有為遍照王如來也又有為大日如來此并略而名義闕也文開題云毗那者或云日之別名除暗遍照為義或云光明遍照或高顯廣博並是得其義文大經要義云決意曰毗那梵語中含最高顯廣眼藏遍照王大日之義開題意毗那之漢語并出大日除暗遍明除暗遍明即遍照王也且略最高顯廣眼藏耳然疏意大日遍照王為今要也故云是日之別名等云云是日之別名等者義釋云毗那者此是日之別文鈔云如此方呼日為靈曜或云朱明大明陽烏等今亦如是或云普光明大光明等皆日之別名也文意云毗那是除暗遍明義日有數名之中其一故云日之別名也為言日為揔名遍明等為別名也師云日即別名對月星等故毗那又日故云日別名也私云於今題有揔別二名大為揔通日乃至加持故日等為別日成佛等其義別故開題云此大字普被下諸字文抄云此摩訶應流至於下摩訶成佛神變加持等文但成佛等不言別名者以初彰後耳又義日有多梵名毗那阿儞地也等也毗那是其一故云別名歟然世間日等者抄云疏然世間至而無所增等者揔有三喻此之三喻前一是相大次一是用大後一是躰大又初是報身次是化身後是法身思之𮦀問云問日有幾義耶略有三義一除暗遍明之義二能成衆𭄶之義三光無生之義問即以此三比佛德何除暗之義比佛惠光遍一切處作大明照二成務之義比佛日光開發衆生種種善根三常照之義此佛三昧圓明無際常遍法界略抄私云準此兩釋抄意以除暗遍明義為通三義之揔句然已下為別釋故問意以彼句屬別初義名除暗遍明義故故知即除已下為別以上為揔標二義中後義為勝然世間已下文除暗遍明外更無別義故所以遍一切處遍明作大照明除暗釋分明者歟或又初義非無理第二義云如來日光遍照法界等第三釋云猛風吹雲日光顯照俱是除暗遍明義也然字非無起盡但於初文無別義者以揔為別猶如藏識割字中立揔相大識矣以如下三義揔結兼通妨難也或不可為喻結初義故云則不如是少分相似結後二義故云亦復如是也問疏第十四云毗那者如日出于世能除暗能成就一切衆生所有事業大地所生之類無不蒙益此實相自然大惠之日亦復如是若有衆生了知自證如猛風吹雲日月出現亦有如是功力普於法界中而作大利如日光而照世間也文又第十六云毗那義上已釋之今更釋所謂毗那者日也如世間之日能除一切暗而生長一切万物成一切衆生事業今法身如來亦復如是故以為喻也然世間之日則有方分則有照外則不能照內明在一𨕙即不及一𨕙唯能照於晝日而光不及夜今如來日則不如是遍照內外無有方分晝夜之別圓明常住一切衆生若得此日出時能生長一切如來善根行如來事世間之日不可為喻但得少分故加以摩訶之名也文又仁王經𨹔羅尼釋云吠路者那野遍照義亦云大日義如世間日照一𨕙不照一𨕙照晝不照夜照一世界不照餘世界但得名日不得名大日毗那云云依此等文釋毗那或二義或一義若爾何以三義配三大三身况上釋題以毗那句為躰大法身非前後相違乎凡三身三大義非無起盡初釋云如來智惠日光報身自受用智也又起信論中相大㓛德云大智惠光明義故次釋但云如來日光凡如來雖通三身今名化身歟大師釋云去成正覺故云如去來化生故云如來云云又隨其性分各得增長義專當于化身利益歟應身用大釋論判文故後釋云佛心之日心是名理躰日又光所依故法身義分明也起信論中明躰大無增減義依此等意成此廢立歟問釋又不可違此旨矣疏下卷釋真應二身躰用分別意歟智身又第一義諦攝故或復若有衆生乃至日月出現文并圓明常住句顯法身躰大義歟羅尼釋但示法身義歟次至違題釋者配當隨冝不可局定或今三身是大日三身故無違故大師釋云釋迦三身大日三身各各不同文問今次第有何故耶或云大日故除暗遍明為先相是顯了義故相大居初化用從報相起故次有相用終歸法身躰故後舉之又或云大日三身即胎藏三部𭦟荼也佛部為中金部為㔫蓮部為右蓮法身理也金報身智也佛理智合應身也理智相應故云應非隨機應現義也今𭦟荼向西故金佛蓮如次南中北次第也可思之復次日行等者鈔云日行者日之行度也𨵻浮提者正云𨵻浮那提即是林名今就省略但云𨵻浮提也文卉木藂林者法華義疏第八云嘉祥卉是百草之通名木是衆樹之揔稱草藂為藂木藂為林文世間衆務等者世間工巧等衆務又依日光作此事暗中難成故遍照法界者法界是六大法界躰實智所照也故疏第七云法界即諸法之躰文即身義云故佛六大為法界躰性文或十法界境即權智所緣也意云照了十界衆生令開發種種善根也或事理不二法界即不二智所照也疏第三云界有三種所謂法界心界衆生界離法界無別衆生界衆生界即是法界離心界無別法界法界即是心界當知此三無二無別文乃至世間出世間等者順世違世事業云世間出世蕳違理事故云殊勝也上種種善根者即是歟疏第十六云若得此日出時則能生長一切如來善根行如來事文以一切如來善根釋無量衆生種種善根也謂開發衆生善是生長如來善之義也又修世出世殊勝事業即行如來事也疏第七云謂佛菩薩緣覺聲聞四種皆名出世三昧諸天所真言法教道皆屬世間三昧文寶鑰下云已上三心皆世間心第四唯薀已後名出世心取意約五種十心分世出世可知但十心中違理心是前譬中世間衆𭄶故今不取之故論云謂凡夫執著名聞利養資生之具𭄶以安身文是即世間衆𭄶之義也又如重隂昏𮑇等者祕藏記云雲霧日月雲霧披而見日月非日月今更生是密教顯本有之喻也非顯教所六度為因成智身之喻也文疏第十四云此實相自然大惠之日亦復如是若有衆生了知自證如猛風吹雲日月出現文準此文今猛風類自然大惠歟然今取所證理法身躰也無明煩惱戲論重雲者準摩訶衍論無明是智得煩惱即煩惱得也故論疏云根本無明名為智得六染名為染煩惱得文戲論通二故彼論中九種心量云戲論妄識故二得即二障也新譯論普觀記遠疏等分明文究竟諸法實相三昧者疏第十六釋等至三昧云佛入所以此三昧者佛住畢竟無相寂之法以大悲故令無量衆生得見此大悲胎藏微妙之法即是於無相中而現有相雖復有相而從因緣生即不生義同於性淨之法略抄準此釋今實相三昧是等至三昧歟大日入此三昧了知自證法也故大師釋今文云究竟實相正覺圓極文十四卷中云了知自證此意矣智證大師釋云阿闍梨云實相為理三昧為定圓明為智自云此私所推耳文大經要義第一云疏云佛心之日亦復如是究竟諸法實相三昧圓明無際而無所增等云云十四卷本三昧字作證時也當知題首大日是過塵四法身也開題二分明故疏意亦然佛心之言無蕳別故圓明無際顯四法身無𨕙際故故抄以日三喻配報化法三身也何况聲字義四法身皆名大日是即此經之意也文私云此文獨顯法身躰大無增減義抄又配法身躰大大師釋光無生義何引抄釋而成今文通四身義乎加以大名等者𮦀問云問一端如何佛惠光明勝日天光等耶世日光方分有限但如來光遍一切處又日天光增𥁞世間其如來光世出世事莫不成辦乃至是故加摩訶字名曰大日略抄私云三義中初二義加大字起盡顯矣推後義云世間日約隱顯雖無生實是有為法故生躰也佛日不爾故也依問釋名一字屬下句可讀歟又疏第十六云加以摩訶之名也依此文可屬上句矣更一解云以水精向日光取火決定矣佛日應現衆生信水無疑故云大日歟成佛者具足等者鈔云成謂成就佛謂覺者即是成就正覺之者也文開題云即是大成就之成也非小成就之成文或解此文云法爾所成為大成就因緣所生為小成就法爾三世常恆成就時長故云大因緣生無常成就時短故云小成也具足梵音等者問佛𨹔是覺者即人也菩提是智即法也人法既別何為語存略乎故下云約佛𨹔義有持金剛者約菩提義有金剛文如何或云約躰文是一約轉聲即異故上下各據一義歟故大師釋云一字之轉名覺曰知覺知義相涉故文或又覺知義異也故釋論本覺十義中覺知分為二義故今又正覺正知但為三菩提義正是三漢故可悉之或云一一字皆具人法喻故為一語存略何失謂以如實智等者智度論第二云佛𨹔𥘿云智者知何等法知過去未來現在衆生數非衆生數法有常無常等一切諸法菩提樹下了了覺知名為佛文私云今釋依此文歟法應雖異隨義轉用歟例如以大品經文證即身成佛矣或又今教釋迦即為即身成佛之佛故故菩提心論去一切義成就菩薩乃至應於是成就本尊之身文如實智者應通權實二智正覺正知稱無簡別故又菩提攝四智此四智通根本後得故故慈恩釋云三智通真俗成事智非真此解依論理或有真文問若如立名者唯可根本智云實智故若如所緣者可後得智事法故爾者如何後得智又不妄倒故云如實也深教正智又云緣俗故故慈行釋云即根本智亦緣俗也文或云知諸法究竟實際常不壞相歟故下釋一切智云非但遍知一切法亦知是法究竟實際取意又第六執金剛釋云一切諸法入此如實智中究竟平等同一實際文準此釋如實智知諸法究竟平等實際歟若爾唯根本智歟祕釋云隨順菩提方便文可思之神變加持等者開題云神變者不測曰神異常名變即是心之業用文鈔云神是智之用變是智之所了又神即神通變即變化俱屬智也文抄第一云變之神從境得名或神即變當躰立名文私云大師釋神變俱心之用故同抄第二義歟心與智同躰異名故或心廣故兼悲及定歟開題云法佛如來從大悲大定能作難思之事業文又般若寺抄云今神變者三種幻之中不思議幻也如來金剛之幻即智之用自在之業也文私云此又智用也三種幻中等者疏第三所明三種幻中不思議幻也為言故下疏中釋不思議幻云且如行者於瑜伽中以自心為感以佛心為應感應因緣即時毗那現所喜見身所冝聞法文問感應即加持義何為神變證耶抄第一云神變上即有加持用故神變即加持又神變即能發三種神變加持即所發三種表業是神變之加持文般若寺釋依初持業意歟又疏釋似加持為能發神變為所發所以依感應因緣而示現身語故問神變有幾種耶開題云此神變無量大分為四一下轉神變二上轉神變三亦上亦下神變四非上非下神變也文具如開題委辨大經要義云此四種神變通四法身各具四種神變也取意加持者開題云加持者往來涉入為加接而不散為持即入我我入之義是也文即身義云互相加入彼此攝持云云意同也祕藏記云加者諸佛護念持者我自行諸佛以悲願力放光加被衆生是謂諸佛護念云云又云引入諸佛於我身中是曰入我引入吾身於諸佛身中是曰我入云云鈔云言加持者加謂加被持謂任持佛以神力加被任持現前大衆云云記後文佛身行者身為加持物又前文以悲願力等為其物也鈔意能變能化神變通為其物耳問加者往來涉入持者攝而不散入我者彼來入我即來涉入也我入者我往入彼即往涉入也若爾可謂加即入我我入攝而不散之義入我我入之中無有更非持即入我我入何云加持即入我我入耶彼來入我我有攝而不散義我往入彼彼亦具其功焉語約義周故云加持者即入我我入義是也此要義中問也即身義云加持者表如來大悲與衆生信心佛日之影現衆生心水曰加行者心水能感佛日名持文私云此文意又同記能化所化應道交謂之加持也所謂諸佛是能加即所持衆生又所加即能持也理觀啓白云入我我入能加持故云云此則舉能加能持義顯所持所加義耳舊譯或云等者要義云當知疏言舊譯或云神力所持者此出神變加持之古語也神變曰神力加持曰所持然此所持唯所非能唯持闕加次言或云佛所護念者此出加持之古語非謂神變也故開題云加持者古云佛所護念又云加被云云然此護念加被但加非持故此文云加彼衆生是謂護念云云私云神力所持唯有持義無加義佛所護念偏有加義闕持義故祕藏記云加者諸佛護念文故知今加持為勝矣然此自證三菩提等者鈔云然者然前起後之詞私云然前者指上成佛起後者下神變加持也言自證者但是佛之自證不從他得也故下疏云如是自證之境者無言觀者無見文經第一具緣品云爾時執金剛祕密主白佛言希有世尊此諸佛自證三菩提不思議法界超越心地以種種方便道為衆生類如本性信解而演法云云今疏二句文依此經文歟以是故住於自在神力等可釋以種種方便以下文問若爾此諸佛自證等今經會以種種方便乃至而演法者加持世界法歟凡自證三菩提位是菩提實義五言斷無十心寂不行何有法義乎故疏二十云自證之法則不能度人此處微妙寂絶出過心量略抄又云本地之身非有心之境界取意又第六云佛自證之法非思量分別之所能及文當卷下云如來自證之智設以神力加持亦不可示人文又云如抄引上出之當知次下云以方便而斯則今經會也但經文此自證者由方便自證也非謂自證位自證法也故疏第三釋此經文云即金剛手羕佛神力領解上文私云金剛手領解住心品文故矣先歎世尊甚為竒特由具大方便故乃能此諸佛自證三菩提所謂自心自覺心自覺心心自證心如實知自心也即菩提實義謂覺自心從本以來不生義也不可思議法界十慮手口故云不可思五居足斷故云不可議也出過一切心地出過三十二種心地也的無所依也依者心地也依過故云無如世人舉趾動足皆依於地菩薩亦如是依心進行故名此心為地第二十卷者心境者是也以心為地以心尚有所依故未名正遍知如來已度此微細戲論佛地惑微細妄執也進趣都息故名超越心地也雖究竟寂不可言宣而能以種種方便道為衆生類如本性信解而演法即是領解一切智心無盡莊嚴之迹也文此文既云由具方便故乃能此諸佛自證等定知住神力加持此自證法云今經也若自證位有法何云若我但住如是境界不能以是𮐃益乎問今經自受法樂實行隔聞故大師云自性受用佛自受法樂故與自眷屬各三密門文然今經疏文為不知自證三菩提之實行菩薩而住方便法見就中疏釋種種方便等文云即是領解一切智心無盡莊嚴之迹文準無盡莊嚴藏之文以方便法非為瑞相加持乎無盡莊嚴之迹雖依上文其意異矣隨義轉用聖教常習歟所以自性身有本地加持二義以加持身自受法樂而領解本地無相之自證也况復經中鄰此文云次修真言行大悲胎藏生大荼羅王文諸既今經具緣品也領解豈非指住心品乎又三疏次文云不思議法界即喻蓮花臺種種方便道即喻蓮華葉文疏第二十云此是毗那本地之身花臺之躰超八絶方處非有心之境界唯佛與佛乃能知之為念本開示大悲藏普引衆生入佛惠故若離方便如來本地尚不可何况以示人耶不可為諸上首等菩薩何况流入生死中耶以此方便同於大空而現衆像即是金剛身也文準此文自證是本地華臺躰本地身尚為金剛手等不之現八已外方便身作四重圓壇今經也但有心菩薩是舉顯人歟或又自性所成眷屬假示現此儀歟例如瑜祇經遍照如來與自性所成眷屬俱之然至瑜祇成就品一字心之明云會中有一障者匆然而現諸菩薩各如醉人不知所從來處略抄此等皆現不知相歟疏二十卷云為諸上首等諸菩薩又爾也到於實際從果向因人何非境界乎又經文為衆生類者未來衆生也故次下舉具緣品所化云為滿足彼諸未來世無量衆生文具如下辨問自性身非受用等加持身更現加持身文證安在乎疏第三云然以加持力從佛菩提自證之德現八中胎藏身文既云中胎尊恃身非受用等也具如下辨現覺諸法本初不生等者此有二點一云現覺諸法本初不生意云本有始覺顯得本有本覺也一云現覺之諸法本初不生也本覺之覺也意云凡夫見聞覺知諸法即本初不生而法佛法爾四𭦟非始可覺也為言疏第六釋菩提實義云我覺本不生者謂覺自心從本以來不生即是成佛而實無覺無成也文此文有二點一云謂自心覺本來不生即是成佛始覺智身而實無覺無成也本覺理身一云謂覺者自心也本來不生即成佛本覺成佛義而實無覺無成也簡始覺成覺也疏第十二云彼持真言行者如是見心性時即是見正覺兩足尊永離邪倒名之為正以此正知見現覺諸法也文此釋順初文點耳開題云成者不壞不斷不生不無始無終之義此則法爾所成之成非因緣所生之成文云我覺本不生乃至知空等虗空即是大成就成非小成之成私云法尓云大成因緣云小成也次佛者又云三菩提是正覺正知之義非因緣所生之覺是法然所得之覺故文云法佛自然智已離一切暗略抄當知今文明法然成佛之義耳若爾我等本來是佛何流轉生死乎疏六釋菩提實義文云一切衆生不解如是常寂相私云菩提實義也分別妄云有生輪回六趣不能自出今雖聞正法音還於種種有為事迹中疏第四云如來以世間因緣事相擬儀况喻不思議法界文準於世間因緣擇地造壇等事迹之中不思無相菩提為言不知性得果海法然之理於緣起因分有為事迹中也推求挍計遍計所執也望成佛何有得理法然理也耶文疏第七云而但以佛知見示悟衆生若行者於此真言十喻中妄見有為生更增心垢則非如來之本意也云云當知於法無取捨知所執無耳故疏第十一云又復是因本性空寂當知果相亦復如是私云法爾成就常寂相也若於如是緣起法中於有為事迹之中也而言有因有果推求挍計也即是遍計所執墮斷常一異不入中道不得法然理也是故證知如是真言永離因業即是法界也故知迷悟不同遍計有無耳故住心論云迷悟在己無執而到云云遍計捨不捨具如即身義抄是處言語盡竟心行亦寂者疏第六云出過語言道者即是從此已下皆是轉釋阿字門覺本不生即是佛佛自證之法非思量分別之所能及亦不可傳授與人智度謂之言語盡竟不行處也文經第六如來品云成佛十智力故三菩提唯惠害無明自性離言自證之智惠故名如來文疏第十九云此自證境界出過語言道以知自證非可宣而授與人住如此智故得如來名也文心行亦寂上引第三文下引第六文可知之若離如來威神之力等者疏第六云本者即是如來自證之地住大𣵀槃若捨加持神力則一切心量衆生非其境界文若捨已下同今文疏第四云若作深祕釋者如來妙嚴之相法爾無減非造作所成故私云自證三菩提法尓成佛故開題云法尓所成非因緣生云云不以外寶為飾乃至十住諸菩薩當今十地菩薩猶因羕佛神力當于今威神之力文也見加持身其於常寂之躰心行亦寂自證位也如在羅尚非其境界意也故以為也文以外飾事相喻妙嚴相也依此文自宗未究竟修生菩薩歟𮦀問云十地以還者是即從因向果之人所以云不知彼內證境文疏第七云如來無得知見私云自證三菩提唯佛知見故云也在一切衆生相續中法爾成就法尓成佛菩提實義也無有減以於真言躰相不如實覺故名為生死中人文已上約自證菩提而示十地生死不知矣瑜祇經云皆以微細法身祕密心地超過十地身語心金剛各於五智光明峯𪭟出現五億俱胝微細金剛遍滿虗空法界諸地菩薩無有能見俱不覺知文慈覺釋云諸地菩薩顯菩薩云云信證僧正云此菩薩中有顯教菩薩及真言未究竟菩薩云云智論第九云是法性身滿十方虗空相好莊嚴無量音聲聽法衆亦滿虗空此衆亦是法性身非生死人所見云云已上依自受法樂法而顯十地生死不知也又疏第二十云若離方便如來本地尚不可何况以示人耶不可為諸上首等菩薩何况流入生死中耶文準此文久已通達金剛手等假現此相云十地菩薩也疏第三釋支分生云出無量十住諸菩薩此中有二重大眷屬內眷屬也取意生死中者取生死中人耳二教論上云自性受用佛自受法樂故與自眷屬各三密門所謂如來內證智境界也等覺十地私云或顯等覺十地也或華嚴天台也不能入室何况二乘凡夫常二乘凡夫也或大小乘云二乘世間二三云凡夫也誰得堂私云等覺亦第十地滿心攝故今十地菩薩也二乘凡夫同今生死中人也釋論中以二乘接邪定故爾時世尊往昔大悲願故等者經第一具緣品云爾時毗那世尊本昔願成就無盡法界度無餘衆生界故一切如來同共集會漸次證入大悲藏發生三摩地云云疏第三云以如來本行菩薩道時立如是願我當成就一切諸佛法界悉皆度無餘衆生界今所願已滿而應度衆生不盡以衆生界無盡即是法界無盡也以衆生界未得一切解即是法界未得遍滿成就故如來勤修事業無有休息也即以此本願因緣一切如來同共集會今將滿足一切智智法門亦是諸佛大事因緣以同一本同一法界故皆悉集會共以神力加持也云云私云今文同此經疏歟同共集會者今經會座也自性所成內大眷屬皆是到於實際人故亦云一切如來也滿足一切智法門者今經骨目也依事相更問大事因緣良有以也當知𮠪往昔悲願住加持三昧現尊特中臺身今經也故云皆悉集會共以神力加持也心王心數同住加持故云共也依之當卷下文云然以自在神力所加持故即從心王毗那現加持尊特身爾時無量法門眷屬一一皆現執金剛身顯發如來大㔟威猛文第三上文云然以如來加持加持故從佛菩提自證之德現八中胎藏身乃至從普門方便現第三重一切衆生喜見隨類之身文此等明文煥然非謂自證位今經耳問今世尊約本覺門則無始無終之性身也又依顯得𨕙則一生頓證之理佛也俱以不可云往昔悲願如何若約本覺門依本有三身中應化用而義歟故瑜祇經云常於三世不壞化身利樂有情無時暫息文往昔者本有義非約時分前後歟若據修顯𨕙且約一生前後作此歟文云望顯得今果指本有熏習云往昔歟故問云謂大日世尊顯昔成佛之初事故云大日成覺文私云本覺成佛故云昔成佛斯則本初事故云初事也若我但住如是境界等者𮦀問云如來往昔悲願力故住神力加持三昧為諸衆生祕密藏文疏第二十云若如來但住自證之法不能度人何以故此處微妙寂絶出過心量何示人耶故漸次流出漸入第一院次至第二院次至第三院雖作如此流出亦不離普門之身文私云準此文今如是境界者指上自證三菩提也如來與我名異義同如是境界與自證之法文別意一故以不能度人釋則諸等二句以三重流出文配示種種諸趣所喜見身以此處微妙寂靜却當于是處乃至亦寂出過心量是出過一切心地既文言相對分明也故知今此文示今經四重圓壇之儀式也又第六云本者即是如來自證之地住大𣵀槃私云同如是境界已上若捨加持神力則一切心量衆生非其境界文同不能已下文也又二十卷云從法身中臺身也起應次流向外如流出三重聖衆也以度衆生似度未來衆生也猶如荼羅自中臺出至八部世天之位文或云以此文明瑞相加持世界事甚非也所以者何示竒瑞是為今經先瑞也然既自證位今經更住加持瑞瑞相為何乎取意又自證位今經未來利益可足何云住自證則不能𮐃益乎又下文云如是自證之境者無言觀者無見文若自證位今經何云者無言乎又云如來自證之智設以神力加持亦不可示人文彼位有則何云不示人乎當知從菩提自證德現八中胎藏加持身云住神力加持三昧如此為未來衆生示三重荼羅種種諸趣所喜見身為同聞疏第六云三重荼羅所示種種類形皆是如來一種法門身也文或舉第三重喜見隨類身顯初二重歟疏第三云第三重喜見隨類身之故今經云所冝聞法也解門所現知識傳此令末代衆生開悟故云開觀照門也依之𮦀問云如來往昔悲願力故住於神力加持三昧為諸衆生祕密藏發即心菩提淨即心佛國見自心正覺證自心𣵀槃是故云加持等此其大意文問下卷三重流出文中臺為自證外三院為化他何同今經會乎又彼卷下文云為念本開示大悲藏復以神力普現身口意遍滿生死中文此文同今疏文依神力加持現三密遍滿生死豈非對實行加持世界儀乎又今文云普為一切衆生舉實行也又既云種種性欲所冝聞法何自受法樂乎况復疏第十二云遍照佛者以此惠光普照無量法界一切有緣應度者無不普現其前以所喜見之身稱機法咸令得入如是阿字之門也文準此文今所喜見身又加持世界教主耶就中今云然此應化非能主乎凡三重流出是為今經集會儀式也故金剛頂經云自受用佛從心流出無量菩薩對遍照如來受灌頂職位彼等菩薩各三密門乃至此即毗那聖衆集會皆住大悲願廣利有情略抄今又可準之又經第五自性身身土文云法界慓𢡠大蓮華王出現如來法界性身安住其中隨諸衆生種種性欲令得歡喜文疏釋云此即中臺八之華也然生大蓮華如來住彼法界第一隨信解衆生喜恱文準此文今又可今經會座也又以隨諸衆生等文不可云受用等三身文次下別故具如聲義釋矣但至十二卷釋者所喜見身其躰雖一自利利他義異故所謂在自性土為同聞而自受法樂往加持世界隨機法故隨冝釋况復彼釋次下文云隨佛剎即無餘世界也私謂此世界者即此淨心之土常無毀壞金剛之國土也此意無餘世界者指法界宮歟又云金剛國土金剛界義歟又於遍滿生死釋者具釋云此是毗那本地之身華臺之躰超八絶方所非有心之境界唯佛與佛乃能知之私云已上自證三菩提言心絶位也為念本往昔悲願也開示大悲藏普引衆生入佛惠故開發大悲胎藏荼羅而引入未來衆生令入法界今經會也復以加持神力普現身口意遍滿生死中如來以神力普現解門知識於加持世界化實行生死人也當知此即是方便也結上今經會座及加持世界利益也若離方便如來本地尚不可自證境毗那本地身尚不可也者無言故何况以示人耶又不可示人也觀者無見故不可為諸上首等菩薩今經會自性身中加持身故於本地自證為金剛手等不可云也此蕳今經會也何况流入生死中耶云云此又加持世界也當知今文神變加持之方便既二重故異今文歟次普為一切衆生者神力加持元意遠被未來機故云種種性欲等故當卷下釋住心品九句問云時金剛手為令未來衆生具足方便無餘疑故以偈問佛文又經第一具緣品云於當來世時劣惠諸衆生為度彼等故隨順是法文疏第四釋云若我捨於方便直為衆生如是自證之法彼等云何悟解而能進修耶故偈次明設教之意云為度彼等故隨順方便也文此自證者前自證三菩提也方便者今神力加持三昧也既明設今教之意指未來衆生云為度彼等故故知今設教本意專約未來衆生也大師𮦀問釋即此意矣或又準聖位經彼等菩薩各三密門者三重圓壇內大眷屬所歟佛菩薩各入自證三昧各各真言故出普通真言藏品中云種種性欲等各受法樂故云隨種種心行等也然此應化者自性所成所喜見身也非當經教主心王大日也各三密故應化又非不能而非主耳問既所喜見身今經之聽衆也教主文何乎又非從毗那等全同下所舉瑞相文何云非加持世界儀式乎上所舉世尊住加持三昧是即今經教主也疏第十四云以清淨法身離一切相私云菩提實義也已下神力加持三昧也然佛以加持力故用此字輪開示如來祕密內證之德由佛自在神力所加持故因此有相方便能生無相之相也文又第十六云佛住畢竟無相寂之法私云自證位也以大悲故往昔大悲願也住於三昧等至三昧也擬今加持三昧也令一切大會無量衆生指內大眷屬及未來衆生也得見此大悲胎藏万荼羅莊嚴大會微妙之法即是於無相中而現有相文無相自性位有相加持也第六云如內證大甘露味假令種種方便為未嘗者之終不能解私云已上自證位也然佛以方便力以無相法身作種種名相加持令諸衆生以因果法證得非因非果法云云住加持三昧今經也又經第一具緣品云諸佛自證三菩提超越心地已上如文以種種方便道如本性信解而演法文以種種以下同住神力加持隨種種性欲所冝聞法義也依此等文明今經神力加持所非本地自證也加持三昧若加持世界事自證位言語無今經會何處乎但今釋文同瑞相文者瑞相土教主他受用已下三身也彼即自性座席聼衆故其文同何失又云即事而真無有終𥁞顯自性所成眷屬之旨也瑜祇經云常於三世不壞化身利有情事文可思之問疏第三云且行者於瑜伽中以自心為感佛心為應感應因緣即時毗那所喜見身所冝聞法文又大疏抄云今神變者三種幻中不思議幻也準此文加持世界實行逮見義見如何疏第六云然諸行人若深入瑜伽境界三昧自當了了𥊸聞如正時無異文私云行者感見令同今會座故云如正等以文言同勿亂自性加持二處矣然此應化非從毗那等者經下文云非從毗那佛身或語或意生一切處故起𨕙際不可得而毗那一切身業一切語業一切意業一切處一切時於有情界宣真言道句法文今釋依此文而釋今經會座第三重變化身與無相法身無二無別之義也釋迦是第三重外部主故上云諸趣所喜見身疏第三云第三重一切衆生喜見隨類身文第五云釋迦牟尼生身眷屬為第三文第六云第三重一切世天眷屬文大師又今經文注變化身法得益但以加持世界教主成今經同聞者依其躰同故又三重聖衆皆雖同聞舉第三重顯初二重歟例如下文中舉第一重執金剛顯第二三重耳上文世尊住加持三昧示所喜見身等者依經而毗那已下文即是不生而生之謂也今文非從等者生而不生之義也智證大師釋云然此應化非大日身或語或意生者據真如躰性門而也文起者隱顯義非實生歟故下文云顯時無從來隱時亦無所去文如是隱顯遍一切處無相法身故云𨕙際俱不可得也故下釋云所以無盡無𨕙際者以不異如來遍一切處常住不之身也文教王經疏第二云言無始無終者是毗那於三際中無生故故大日經歎毗那三業云於一切處起𨕙際不可得文此意不可得者起歟譬如幻師等者此文上爾時世尊已下譬也幻師譬上世尊也咒術力喻上大悲願力也加持藥草類上住加持三昧也能現種種未曾有事比所喜見身所冝聞法也五情所對擬隨種種心行恱可衆心同開觀照門也若捨加持等二句顯然此應化已下文五情所對恱可衆心者文意云現種種未曾有事是五情所對而令恱可衆心訛或現未曾有事之五情所對而令恱可衆心義也衆心者衆生心歟或衆多心歟五識唯緣實境或通假境西方諸師異義也但護法親光意唯緣實境其故未轉依五識必託第八所變故所變必有實用故疏主未必決斷性相學者隨冝可取義也今且依護法意得文意者幻師依咒術力加持藥草現種種未曾有事時五根五識雖緣本藥草同時意識迷亂而見種種未曾有事想有見色聞聲等作用此五根為門同時意識為執故云五情所對非直五識也恱可者恱喜義喜是意識相應受也可思之如來金剛之幻等者合也緣謝即句以若捨已下合然此應化以下也機興即生文以衆心已上合觀照門以上之意也即事以下二句合於一切以下也或又但於一切已下合而顯餘歟緣機生起義也即事而真等𨕙際不可得義也如來金剛之幻者大疏抄云即如來金剛之幻即智之用自在之業也文密嚴院釋云金剛之幻即事而真不二之一即如而多云云或云約佛躰云金剛法然不變故望機情云應幻興謝隨時故先師義云四身皆法然本有故神變不改自性趣利他門雖用加持自性敢不變然則不異本地應幻故云金剛幻又名不思議幻金剛即幻也勿同如常報應如水月等耳問法然本有何有興謝異耶木幡義云興謝本法然也生即本有也何同如常生義矣故經云生住等諸法常恆如是生文私云生約機見隱顯非開應化矣故相應經云常於三世不壞化身文緣謝即乃至無有終盡者此明應化有法爾隨緣二義也上二句隨緣下二句法爾也或云今宗意約法躰四種法身皆是本有約隱顯語四身俱有因緣生義云云法躰者即身義云故佛六大為法界躰性文問若爾因緣生非法躰乎亦是法躰故疏第七云法界即諸法之躰以是言之因亦法界緣亦是法界因緣所生法亦是法界文良以彼三乘捨煩惱事更得菩提真顯一乘雖不捨煩惱相猶歸菩提躰云真也今宗煩惱事相本是真躰故性相歷然云即事而真求異如常攝相歸性之義耳故祕藏記云顯教之中相常住者據攝相歸性可稱常住依性相差別何稱常住耶密教性之處性相然而本有也取意應具題云大廣博經等者今加因𨹔羅王四字故云具題也大廣博經者大毗那成佛經義歟上具舉故恐文繁今略舉也開題云毗那者或云光明遍照或高顯廣博並皆得其義文義決云梵云毗那此云最高顯廣眼藏如來先有為遍照王如來也文私云經字置中間違諸經例如何云云問因𨹔羅王者帝釋也者梵漢不同歟抄云梵語因𨹔羅此云尊帝釋者帝之一字即是因𨹔羅梵語訛也正云𣵀哩二合略云帝蓋聲勢相近今時帝王順天立猶得梵名耳釋者具足應云釋迦羅主也文開題云唐言帝釋王梵本略抄要義云抄意帝之一字為梵語者既違開題斯難依用耳然開題意釋為漢語其意可思法華玄贊云梵云釋迦提婆因達羅釋迦姓也音訓云剎帝利姓也此為能提婆天也因𨹔羅帝也云云疏第七云因𨹔羅是天帝釋異名文一切如來祕要之藏等者教王經開題云復次一切如來者具顯密二意顯義十方三世一切諸佛名一切如來是則各各衆生修如實道去成正覺來化衆生名如來也密義五智佛名一切如來聚一切諸佛共成五佛身故此五佛則諸佛之本躰諸法之根源故名一切如來文私云依初釋者大乘衆教可通顯密約後釋者應限密藏兩部相望有互為主伴義故疏十四云如來何故處此三昧然亦非無因緣正謂開示如來甚深祕要之事也文猶如千目為釋天之主者鈔云言猶如千日者謂天帝威德光明類千千日如經云帝釋所有光明猶如千日等為釋天之主也文此釋目字為日帝釋光明勝日天子義也最勝王經第七云乃至千眼帝釋王文惠昭釋云猶如帝釋名為千眼非有千眼以能一時見於千法故名千眼文此意目者眼義也教時義云天帝有千名文此又目者名目義也疏文意如帝釋為忉利天之王也為言入真言門住心品者抄云又真言門為所入入為能入能入從所入以得名是真言門之入名入真言門依主釋也住心者住謂安住令菩提等願不動故心者靈明是知見之真實相故又住是三昧於三昧中即見自心住是能住心是所住能所相望作依主釋又上入真言門是因住心是果因果相望亦依主文觀義云真言是能入方便入修義也住心即所入法也意入真言門而住心之品也為言或行者為能入真言為所入門也意行者入三密門而住心也為言範義云真言者梵云荼羅是万德輪圓之壇也即所入果也住心者十住心即能入心也意入荼羅之住心也為言例如入荼羅具緣品也問若住心為能入者釋此心云所謂衆生自心品即是一切智智文非指所入一切智果耶此心有二義若約本有本覺是所入一切智果也若約修生始覺亦能入續生心品也大經要義第二云謂住心者顯能住於所住心故住之一字通能所也緣慮故名心文尋云今此心者可限六大中識大三密中意密乎且依一意通三密六大歟問疏釋此心云所謂衆生自心品即是一切智智文既云心品又云智智豈非三六隨一耶如何今宗意於顯乘一心無相理談六大本有義是當宗超絶之談也顯宗於色心隨一之心論能求所求二菩提心真宗六大本有躰即能求菩提心又所求菩提心也若菩提心𡱈識大者於顯乘一心論六大而彼六大中唯識大者顯乘菩提心寬廣真言菩提心狹少乎故知菩提心通三密六大也問若爾通三六證安在乎戒序釋所求菩提心云三密四𭦟四種法身也云云所求既通三密能求何𡱈識大耶能所一躰故故疏下云唯是心自證心心自覺心文大師指事云心自證心心自覺心文又別本即身義出菩提心躰云本有阿字云云大日經云有情及非情阿字第一命文非情命阿者五大有情命阿者識大也可思之問若爾者五大又可有緣慮義乎云爾何失三摩耶身既有情也身語二密又有斷惑證理功別本即身義又菩提心𡱈識大者違經彼法少分都無可得之文菩提心外無七微合成法故問三界唯心之義顯乘盛談也雖然色法勿為能求躰乎彼緣起色法歸一心本云三界唯心今不爾唯心本源性所色心法然本有也豈同彼矣竊謂入住之義等者般若寺抄云意修行即此心離心無修行之義故舉心省行為一品目也文意云顯發心即到義云兼修行歟修真言門非發心即到故為言中川抄云私案入義兼修入者入修真言門故住義兼行能住其心真言行故文私云今教五轉成佛中修行唯𡱈第二句故即心具万行文入住義廣通五轉故從因至果以無所住而住其心文住既通五轉入亦可尓也故云入住義兼修行也真語如語不妄不異者金剛般若經云如來是真語者實語者如語者不誑語者不異語者文今疏文同此經但四五為異耳上二句約表立名下二依受稱也或上摽下釋謂真語是不妄義如語即不異謂也故唯識論云真謂真實顯非虗妄如謂如常表無變異文龍樹釋論謂之祕密者智論三十八云佛法中有二諦一者世諦二者第一義諦為世諦故有衆生為第一義諦故衆生無所有復有二種有知名字相有不知名字相譬如軍立密有知者有不知者文大師釋此文云所謂密名字相等義真言教中分明之文疏衆又取文意云祕密歟舊譯云咒等者大師字母釋云云何咒𨹔羅尼謂諸菩薩獲得如是持自在由此自在加被能除有情災患諸真言句令彼章句悉皆第一神驗無所唐捐能除種種災患是名菩薩咒𨹔羅尼文此品統論經之大意者鈔云或以此品即為當經之序品如華嚴故疏云經之大意取意或云此經住心品即無相菩提心至極果躰正宗之本也不同常途序品三假即三密也又橫竪無得序正不二也可思之開題云今此經且約三部而釋初如是等序分者當身密即佛部示身無盡藏故次爾時世尊至屬纍終是語密即蓮華部現語無盡藏故信受等文是意密即金剛部示意無盡藏故序正雖異祕妙是一身語不同平等無異文私云如實知自心字本不生云祕妙是一入我我入三三平等云平等不異矣所謂衆生自心品等者疏第七云如來無得知見在一切衆生相續中法爾成就無減以於此真言躰相不如實覺故名為生死中人若能自知自見時即名一切知者一切見者是故如是知見非佛自所造作亦非他所傳授也文又本即身義云謂悟衆生自心即是一切智智而如實覺知自心本有祕密莊嚴藏云究竟即身成佛也取意私云或本有菩提心云自心品即第八識也故摩訶衍論云一切衆生皆有本覺文或指真如云自心品即第九識故起信論云一切衆生悉有真如文且依初義五轉中初引字菩提心義即東因也即是一切智智者中臺第五字具足方便智義也即字顯發心即到義也如實實知兼行證入三字義歟依後義者第九唵摩羅中因義也此識即法界躰性智故云即是一切智智也圓鏡力故實覺智文有二義謂阿閦大圓大日大圓也可思之又或人云六道輪回衆生𪵬爾起善𢙣無記等三性心也煩惱妄心本輪圓具德故又衆生自心品者密嚴院釋接略則八九十三識舒廣則無量心識也如實了知者準大師釋竪有十重淺深橫示塵數廣多矣自心發菩提等者此中自心等四句如次因行證入四字義也發起等二句第五方便具足字也如次又東南西北中次第也所謂自心發菩提者發字不生信智初字菩提心義也發此不生智者一切所作心無著相以此無住心所修慈悲行是不生智上德故云即心具万行第二字菩提行義也即心者指上自心即字皆流下心然見此不生際如實知自心即心成等正覺也第三暗字證菩提義也心合不生性寂靜安樂故即心證大𣵀槃第四𢙣字入𣵀槃義也心具上不生四德故發起方便憐愍心徹骨躰建立衆生也此不生性即智所依所住故即心嚴淨佛國也第五𢙣字方便具足智義也以此五字究竟覺為顯得即身成佛矣於此文又有大事依法更問矣疏十二云此八四方四隅也四方即如來四智初阿字門即是菩提之心次字即是成無上菩提次字是菩提之行次字即是大𣵀槃文東因義也大師三密觀云因行證入方便用此五位相當五佛時臺實為因外花佛為行證入方便以此義可言內實為因外花為果若違此意不得名大悲胎藏妙法蓮華一行禪師以天台義為誠證既違其義寧可依慿乎瑜伽中臺上佛為第九奄摩羅識此宗因果義逆順次第圓融相即重重無盡文大師心云若不許華臺為因花為果之義即不得胎藏蓮華之名謂彼華未敷時名胎藏蓮花然此胎藏位唯有花實是因後開敷時成花是果也意指今時開敷之云果先來本有之臺實為因也為言一行心亦就開敷蓮見其臺與勝劣也問若爾二師終相違歟如何三密觀既云因果逆順重重無盡存東因義歟又疏中從內向外作三句時中臺為菩提心為因句準知五轉時何不中為因矣故知順逆重重因果二師互成耳從因至果等者抄云從因至果皆不離自心因亦是自心果亦是自心心即菩提故云皆以等此因果義通本有修生因果歟二義俱無住著而住阿字不生心故云皆以無所住而住其心也或云從因至果義不同顯乘次第修行而不行而行不到而到故云皆以無所住而住其心也因者初果者第五舉初後顯中間歟或初二因後三果歟抄第二云又此中有六箇心字前二是因後四是果又前一是菩提心第二是大悲後四是方便文大經要義第二云則此文中明能住人及所住心謂能住人者此教菩薩所住心者其人之心下句其心者是上句因果人之心故其迷悟心為所住躰且約十住心者第一迷心第十悟心中間八通二矣取意入真言門略有三事等者問三密同入修要門何但云入真言門耶入理方便教為本故故十住心論云且就語密顯示法𭦟荼羅心文或口業兼餘二餘不爾故故法華玄嘉祥云口業具三業動舌身業發聲口業經意意業身通身意意唯意業文或三業中心為主故故般若寺抄云其三業中以心為主隨心分別身口作業隨心引導伴二業故云入真言門住心品文問一切真言行者必具足三密可成佛耶然也故𮦀問云若三中一闕即不能至平等處如車一闕都無所到是即三平等義也文問菩提心論云住法但觀菩提心文非唯依意密耶又密嚴院釋云顯非智觀不成佛密唯誦咒亦成佛文如何菩提心論文對若無勢力廣增益云但觀菩提心又云佛此中具万行何限意密耶故菩提心論云當須具修三密行文次先德釋者彼會云正成佛之時必定三密相應即身成佛彼依二行一行等成佛者是非正成佛之時亦由修餘二行不思議加持力故匆出生餘二密行等三密具足即身成佛也文一者身密門等者菩提心論云所言三密者一身密者如結契召請聖衆是也二語密者如密誦真言令文句了了分明無謬誤也三意密者如住瑜伽相應白淨月圓滿觀菩提心也文下當廣者指具緣品所歟行者以此三方便等者疏十四云當知真言行者但以方便自淨其心若三業清淨當於是中自得明了而自覺悟也文又第七云謂自持真言手想於本尊以專念故能見本尊本尊者即是真實之理也非但見本尊而已又如實觀我之即同本尊故名真實也文今案行者手結契口誦真言意觀本尊種子三形尊形任心時斷淨身口意煩惱不淨故云自淨三業又以此言等驚覺諸佛故聖衆皆來加持護念行者故云即為如來三密之所加持也凡今教意若別行若大法最前用淨三業言此意以三密便淨行者動之三業成本尊微細三密是三平等義故儀䡄云三業常轉已成三密門文所謂所成三密凡聖別能造六大因果是同六大無得故凡夫動三業成諸佛微細三密也依之檜尾口決云先成就者三密微細我三密礦雖細別同五大所成如來及我五大不離俱遍虗空法性平等故我心佛心衆生心無別也取意能於此生滿足地波羅蜜等者十地修十波羅密行故云地波羅密也故祕藏記云十波羅密者於十地中地地修地地圓滿也文今教一生即身頓證十地㓛德故云此生滿足也不同顯教三僧祇間修十度行故云不復經歷劫數等矣今文以十地盡諸位意歟或十一地十二地四十二位等皆開合異耳故大品云等者大品般若第二往生品云舍利弗有菩薩摩訶薩初發意時行六波羅密上菩薩位得阿毗跋致地舍利弗有菩薩摩訶薩初發心時便得阿耨多羅三䓳三菩提轉法輪與無量阿僧祇衆生作益厚已入無餘𣵀槃是佛般𣵀槃後餘法若住一劫若減一劫舍利弗有菩薩摩訶薩初發意時與般若波羅密相應與無數百千億菩薩從一佛國至一佛國為淨佛國土故文私云以此二菩薩文證上此生滿足人有頓漸二類及成五轉成佛有二機也問此中第一菩薩因位行既六度也何成三密行義第二菩薩果後入𣵀槃也豈順法身常住乎謂於三密行有事理六度六度言六種微供等也又真言菩薩修理六度𮦀問五重結護等其分明者歟文一生成佛者證四種法身故其中變化身有緣謝即德然即事而真故不同如常八相歟此等皆隨義轉用之意矣又智論中此三菩提類神通乘非真宗則何有此理但舉二菩薩為成今宗一生二生義故問中以此二菩薩為一生二生證矣第三菩薩今教無用故且不取之當知今疏此生滿足地波羅密亦二義歟於十度有漸次頓證故故祕藏記云真言菩薩或十六三昧一一次第等證或與得一三昧共十六同時證文又菩提心論云若才見者即名見真勝義諦十地功德漸次證故云見若常見者則入菩薩初地文十地功德同時證故云常見可悉之龍樹以為如人遠行等者智論三十八云所牒經文如上引但終句國土云世界釋曰有三種菩薩利根心堅未發心前久來集諸無量福德智惠是人遇佛聞是大乘法發阿耨多羅三𦴭三菩提心即時行六波羅密入菩薩位得阿鞞致地所以者何先集無量福德利根心堅從佛聞法故譬如遠行或有乘羊而去或有乘馬而去或有神通去者乘羊者久久乃到乘馬速乘神通者發意項便到如是不得言發意間云何得到神通相爾不應生疑菩薩亦如是發阿耨多羅三𦴭三菩提時即入菩薩位有菩薩初發意初雖心堅後𮦀諸𢙣時時生念我求佛道以諸功德回向阿耨多羅三𦴭三菩提是人久久無量阿僧祇劫或至或不至先世福德因緣薄而復鈍根心不堅固如乘羊者有人前世少有福德利根發心漸漸行六波羅密若三若十若百阿僧祇劫得阿耨多羅三𦴭三菩提如乘馬者必有所到第三乘神通者如上是三種發心一者罪多福少二者福多罪少三但行清淨福德清淨有二種一者初發心時即得菩薩道二者小住供養十方諸佛通達菩薩道故入菩薩位即是阿毗致地次復菩薩大厭世間世間已來常好真實𢙣於欺誑是菩薩亦利根堅心久集無量福德智惠初發心時便得阿耨多羅三𦴭三菩提即轉法輪度無量衆生入無餘𣵀槃次復菩薩亦利根心堅久集福發心即與般若波羅密相應等文論中先舉經三菩薩中初菩薩作羊馬神三喻羊馬法經中雖無論中更舉以初菩薩合神通也云如上是也其下三種發心者初二發心類羊馬論所二菩薩第三經所明第一菩薩也此中亦分二種如文可見後𭁡云次復菩薩者如次經中第二第三菩薩也是猶神通中菩薩也論中且約初舉三喻而顯通後二歟問初二菩薩雖云利根猶云久集無量福智非是頓證人又初菩薩云遇佛聞是大乘可大品經若爾何以此二菩薩為即身頓成證乎既云未發心前指宿善云久集福德智也故疏第四云若諸衆生未曾於過去無量佛所久種善根於此祕密乘未曾修習則造次聞之不能信受文次聞是大乘者大品本具顯密神通人聞祕密般若也或又指祕密乘歟猶如楞伽經云我乘大乘無上法矣大師住心論云牛羊等車徐進必經三大無數劫神通寶輅凌虗空速飛一生之間必至所詣文御記云六本七月七日六本文永十一年于高野山文六堂𮒥坊草之八十九代龜山甲戌金剛資賴生年卌九歲
