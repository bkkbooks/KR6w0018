body:
  text: 䟽卷第二之二經唯願世尊彼心者抄云經彼心者即指彼六十心也謂上問云心諸相與時願佛廣開演故文此意今重請但局六十心問也所以文云諦聼心相之故問下釈三劫文云亦是諸心相及心殊異也文此又心相何不通彼文乎此既兼殊異故非今問也若云心相故此問被彼可及六無畏文彼又兼殊異故非鐘谷響也私云既云彼心未云心相此重請兼殊異何𭁆况三劫文無別請問最可此問也若九句中問故無重問者心相何重請及兩度矣又三刧文心相此問者殊異何無今問乎但諦聼心相者問雖廣約六十心先心相也問若尒六無畏又可此問何又問乎三劫二句故𢙢六無畏二句故更問随一也或又復但問心相顕今問通二句也故下問云演心相今云彼心可悉之又義三劫文心相𨕙近前重問殊異𨕙遠九句中也兼二意故無重請也又准十緣生句無重問而直修行句三劫文無重問九句中無失初列六十心名次釈其相者上唱經文中謂貪心至受生心是列名也云何貪心下釈相也問今此二句為釈云何已下經文先在文前明列名釈相義也猶如云次明順理之心故知云何貪心者列名也謂隨順下釋相也餘心亦尒也况前文中名闕一釈闕三於後文依阿闍梨所傳加名釈故非云六十心名等耶凢前問中有列名釈相若此文唯釋云何已下者有不釈受生心已上文之過又問句可属釈相何云列名例如釋論唱章判門耳又雖闕一三依阿闍梨意故云六十心也又約滿數歟謂染著前境等者今此二句釈經染著字也唯識論云云何為貪於有有具染著為性文論䟽云於有者謂後有即唯異熟三有果也有具者即中有并煩𢙉業及噐世等三有具故或無漏法薩婆多師緣無漏貪是善法欲今大乗愛佛貪業皆染汙故與見俱生緣無漏起故無漏法能資長有亦名有具文准此釈前境者通漏無漏善𢙣無記法歟又准下違不染善法無貪今前境可局𢙣無記法歟又依即是染𣲇淨心釈通無漏歟或又貪心起淨心染故云尒非所著境歟若隨順修行此法者釈經隨順法三字也此者指前染著前境也此貪染即法故云此法也行人順行此貪染法云有貪心也餘修行名善今順行染法云修行也修即行義故如云𢙣行耳以心法下委釈順修義也謂貪性內成事業彰于外故云有相也第四慈心釈云上慈字㨿內心下慈字是外相所為事業也文今准此云何貪心是約內心下染法即外相事業歟又或本云謂隨順貪染法者文可云下貪歟多以順修明義者抄云此六十心多分將以隨順修行之者明其心性之義或染汙心或清淨心問云何是清淨貪心真言行者但觀貪心實相自然貪不染心即是清淨貪心如下經明十六大菩薩第三名金剛貪染菩薩文大䟽抄一云諸句以隨順明義云云意何內有其心時其相外彰譬如見烟知火性言也可悉之順者如依義准宗也云云未得出世心等者下文云㝡初解了唯薀無我時即名出世間心生度世間六十心文准此文今出世心者唯薀無我悟也問釈守護心云學聲聞者多生此心也文又釈室宅心云多是聲聞習也文狗心亦同之又具緣品明択地時以毛髮糖糩灰等為除去法此中灰炭䟽釈云謂示小法起二乗心文然今釈六十心云平治心地時亦當一一蕳去也文應知二乗心所除六十心攝也若尒何云今出世心耶六十心但與順世善雜起之心故䟽第四云謂六十心與善種八心共躰而生文何三乗出世心為六十心攝矣但第四卷釈者擇地義廣除去法是多以云除去二乗心不可為攝六十心義彼毛髮者六十心故今平治心地約毛髮彼廣除去三妄故故下釈云百六十種上中下微垢應擇使無餘文今文學聲聞等者約聲聞凢位歟仍無失又云若以淨菩提心為出世間心文准此釈地前三妄位六十心可雜起歟六十心又為百六十心未惑通三重故具如下弁故知初地淨菩提心為出世心歟依之舞心五通餘習神変為除盖障之所治窟心得劫壽見未來佛以法明道為能治除障法明是淨菩提心異名故或又六十心染淨心品相雜水心云洗濯一切不善板心云習行八齊烏心云持戒修善此等非一向不善故若尒出世心隨冝可不定歟或但皆染心也持戒修善時於生死生怖為烏心非取戒善又行八齊更不行餘善為板心非云八齊也與善種種雜起之心者或云雜起者相應俱起義歟故䟽第四云謂六十心等與善種八心共躰而生及已覺察則冝除剪未得出世間心以來雜起紛乱難可條緒文此釈同今文既云共躰而生定知俱起義也又當卷下釈云或一時雜起文此豈非一時俱起義乎或云雜起者染善間雜而生故云尒非俱起義也性相釈云諸相應法必同性故文誰疑之䟽第四釈抄云謂是六十心等與善種八心間雜生例如彼雜修靜慮漏無漏間雜而起也又或一時雜起者六十心中相順心品俱起相違心品次第生為言雜起言雖同彼云一時故異今文矣又義下約六十心故俱起云雜起其性同染故今間雜生云雜起善染異故又義今宗異性相彼云貪與嗔疑定不俱起文今六十心并生故貪嗔疑既俱起若尒何與善不俱生染善雖異同有漏故若准雜修靜慮為所由者可云與出世心雜起既不尒與有漏善俱起歟若行者善識真偽等者抄云謂觀貪之實性善能了知或貪為真而不貪為偽或不貪為真而貪為偽猶如農夫𭄶除穢草以輔嘉苗文今此釈舉第二能治所治為真偽歟故知今此文通六十心𭔹治歟私云此上釈云此等皆是與善種種雜起之心文隣此文述𭔹治行相故知善種八心為嘉苗穢草譬六十心也雜起心中却染取善之義也或云既云輔嘉苗此善輔淨菩提心故淨菩提心應云嘉苗也次下淨心𫝑力漸增者此意也故下釈云當於一切時留心覺察自然得順淨菩提心文今云除穢草嘉苗自增長故云輔又云淨心增長此淨心即善八心也故䟽上釈云淨心㝡初生起文然下文云順淨菩提心今有漏淨心順無漏淨菩提故彼此文義異歟或又下釈云願來世間悉地障出世淨心文准此今淨心似出世矣勿謂是因緣事相等者抄云不可一向謂是因緣事相之迹輕忽如來至覺之言令心沒在於常教之中耳文或云於雜起心能分別真偽者妄執消除淨心增長是時但知因緣事相而不觀不生實相者其心專沒常途淺權教中輕忽如來至實法為言凢佛心相生起者為令知其本不生性也云云私云因緣事相者六十心事業外相也至言者至教即正教異名也意今聖教中以順修明六十心義是即令行者知妄心事相而為令不沒妄心中也而忽緒聖教使心沒妄心中勿不自覺知為言乃至所應進求善處者所進求善人法依正非一故云乃至歟又今善者順世善心出世無漏法云乃至矣又善處者依報欤此外法云乃至歟所以約不示法無貪非一故云俱障善萠也或又貪無貪同障善萠故云俱依此義俱觀貪實相𭔹治可通前貪心歟無染汙心名同事異者今無貪心與䟽下所舉無貪善根及餘教所無貪名同事異也為言唯識論六云云何無貪於有有具無著為性𭔹治貪著作善為業文故知彼不貪三有唯善也此不貪善處妄心也故今無貪還貪心攝也例如正理論中邪信釈是不信攝矣但觀貪心實相等者抄云如經偈云三界極重罪不過於厭離汝於貪欲處莫生厭離心不應如彼二乗厭離眾主也文又經云貪欲是𣵀槃文私云貪心事相即不生生故即堅固性也不出字不生際故云觀貪實相也問觀貪實相可治貪心何為無貪𭔹治乎無貪即貪心故無違或云觀貪實相治貪無貪歟云俱障善萠故或云初句通二心句自然下別句此中初句明貪心𭔹治後二句示無貪𭔹治也經云何嗔心謂隨順怒法者問准性相釈大乗嗔恚為根本忿怒為隨惑小乗中忿小煩𢙉嗔不定地攝若尒何問嗔怒耶六十心皆以順修明義故問嗔怒也以順修怒法顯嗔故故釈云怒謂嗔心發動事彰於外云云又唯識論第六云謂嗔必令身心𤍠𢙉起諸𢙣業不染性故文又云謂懷忿者多發暴𢙣身表業故此即嗔恚一分為躰離嗔無別相用故文謂嗔必令身心𤍠𢙉者嗔心發動之義多發暴𢙣身表業故是事彰於外之義也䟽釈既同彼應知今經約躰同不別立彼論約內外異開二也又顯揚論云忿障無嗔故文此又忿與嗔同也但於此眾緣中等者抄云若行者覺知如是嗔心相起之時但當於此眾多緣生句中而觀察之則不為障也文今此能治可通諸句歟又無所住是字本不生義今經以字為宗故最可為通治也但今兼別故愛見心垢之慈者此數時無嗔也故云與嗔相違與無嗔善名異事同猶如無貪也此貪相應之慈故云愛見心垢等歟非善種所生故善種所生慈無量𭜨親平等故非貪相應故為能所治也慈無量以善無嗔為躰瑜伽云大悲以彼無嗔無癡二法為躰文今所治無嗔實嗔攝歟例如無貪是貪攝也問若尒何與貪相應唯識釈貪與嗔疑定不俱起故顯密分𡵨今宗許俱起歟故下釈云或一時雜起文况六十心與善雜起云云異性既俱起貪嗔何不並故釈論中釈者起貪嗔等能善分別違順境故而許四相俱起此豈非貪嗔俱起義乎或又唯識既云不俱起今又可尒愛見慈者貪攝歟非嗔也善慈既無嗔為躰今何嗔為躰行相相違故但或一時雜起是約相順心也與善種雜起者抄云間雜生文釈論釈四相具起約唯心轉変義分別又依境因識果義故無違矣上慈㨿內等者准云何嗔心謂隨順怒法可知之問內心慈外相慈故云尒也遇便信受者問癡是迷闇為性故唯識云迷闇為性文信是心淨為義故次下云信者能入文又信唯是善癡𢙣無記性躰性既水火何釈癡云信受耶無惠蕳擇善𢙣是非遇便信受是迷闇義歟例如彼性相中雖無貪為唯善今立染汙心也今既信𢙣及非豈淨心乎猶如正理中邪信云是不信攝耳皆以智蕳擇等者以智惠蕳擇所法勝劣而捨劣取勝是勝義菩提心故戒序釈勝義心云須蕳知乗之優劣云云何此云所度妄心乎然能治云觀察世智辨聡依世智徒無義費言語云世智辨聡也故知於世間種種所中蕳擇勝劣也世出世智異故無違耳問若尒以出世智可治世智難何云唯信耶信智相應能入故云信世智與信不相應故云唯也又智論云佛法大海信為能入文又唯有蕳持决定顕勝義今唯信者約顕勝義歟又義第五邪信既正惠所治第六世智淨信所断何失然道人者或本過人云云出過世間義歟或本果人云云智力籌量者世智籌量也經謂尊教命者或本尊字遵字也䟽中二心雙牒釈疑心决定心自顕故先為釈疑心故智度偈云等者抄引智論云如人在𭭛路疑惑無所趣諸法實相中疑亦復如是乃至在世雖有疑當隨妙善法譬如觀𭭛道利好者應遂文䟽所引岐路好𢙣云云或本無𢙣字無本同正文矣又智論正本可撿也抄云謂如人求利須觀岐路利好處應便馳遂若疑惑不進則有異此好字上聲讀之謂利有好弱好利者逐之弱利者之文又决定心等者此下釈前决定心也如法教命等者菩提心論云凢今之人若心决定如教修行不起于座三摩地現前文准此文如教奉行即身成佛䡄則何云所度妄心乎能破既云生正决定心雖云如教奉行猶邪决定義歟故義忠釈云生正决定心離邪决定心也文或云如教奉行起執故為過歟謂如四諦不淨無常等者唯識論六云云何為疑於諸諦理猶豫為性能障不疑善品為業謂猶豫者善不生故有義此疑以惠為躰猶豫蕳擇為疑故文述記六本云此中疑迷於諦理猶豫五十八中依五相別謂他世作用因果諦實此中言諦亦攝彼盡如理應思即緣理事俱是疑也然疑執為人非此疑惑異熟心等文准此釈四諦懷猶豫雖同論疑如夜見株杌是異䟽釈故知今闇心或疑攝或似非疑又見机生臆度之心似論第二師解矣又義章六十使義云所言疑者於境不决猶豫曰疑疑有二種一者疑事如夜觀樹疑為是人為非人等二者疑理疑諸諦等小乗法中唯取疑理為疑使大乗通取皆須断故文准此釈四諦夜杌如次為理事疑若尒今闇心是疑心攝矣問若尒與前疑心何異乎或云前事疑故經云不定等事此理疑故云謂如四諦等但今取夜杌喻是譬迷理也或又前疑理故所引智論正文云諸法實相中疑亦復如是文今疑事義章中如夜觀樹為疑事故但舉四諦事諦亦攝事故又前决定心此𭔹明心故猶豫者或云江乃古作幾太津訓也小大先人行至岐分處生疑不進義也前文如人道行以疑惑故不能前進云云此意矣謂於决定法印等者抄云謂三法印或四法印是决定法若過若不及者過則為增不及為減異於處中之惠也文私云若過者明心故云即能懸信也若不及者闇心故云生疑慮解處中惠是彼兩心能治也但在明心叚述二心能治如七八兩心經文雙牒若不舉過與不及處中義難立故又義懸信通二義謂不及故懸也若過故懸也若尒但明心能治也問經云修行何釈懸信耶信即行歟或互顕歟問前决定心不生疑慮奉行今於决定印無疑慮修行何異耶明心有若過若不及義决定不尒歟經云何𨷖心等者今此𨷖心者𭔹他好論是非故云互相是非下諍心於自己生是非故二心是別猶如慚愧自他別也下無諍心𭔹此二歟並自他故又不立無𨷖心故於六十心下皆合有為性之字者或於初可作此釈若又可在終若因便諍心若𨷖心時可作此釈乎六十心中為性字在於何心隨在何句雖須釈前𨷖心云互相是非為性故今心云是非俱捨彼故就此句作釈歟或先以為是等者或云智禪房謂其心乃至即受行之釈或先已下別釈也云云此意如是見解及更聞異言二句各通是非歟不指其名故以違合理句又通二歟意云異言若是若非以違先習或非或是而理則受行也為言別釈中或言顕不定故舉是捨而顕非捨也或云觀乗房雖先所宗習等捨是也或先已下捨非也云云此意如是見解者是見也異言以違者非也此非受行故捨前是或先以為是者受行非謂是聞他為不善又捨故云捨非也無記無諍心者今無諍心也是非俱捨故云無記或此心有覆無記妄心故實相無諍者實相平等故云無諍也即諍心也如諸天以先世等者今此天准下曾生上界可色界等天也欲天亦五欲境雖隨念或自化或他化非無功力今云若有所須不加功力但可上界也或又可通欲天五欲境非如人間故云不加功力也但上界者舉勝也或望人間云上界歟義章云若依地持所受自然故名為天文阿名為非修羅名天者法花義䟽云婆藪傳云非天亦言非善諸天以善法樂其多作不善樂也文此知有解之利等者修羅雖𨷖戰為本又知解利歟𭂫修羅通天鬼畜三趣今為天趣攝歟云果報似天故義章云修羅有三一天二鬼三者畜生正法念經中唯二種鬼之與畜文思惟少欲知足等者抄云老子云知足不辱注云知足之人絕利去欲不辱於身文某甲曾於我所等者或云㤙者𦤺善報𭜨人懷𢙣報是常人之習也故今報者𢙣報也經文思念利他者舉善報顯𢙣報歟或本思念他利云云或云不分𭜨親懷善報可為人心也太賢古迹引經云以𭜨報𭜨𭜨終不以德報𭜨𭜨乃盡耳文今釈理人利物即此意矣又義理人言通𢙣報歟又𭔹治文不應紛紜思慮他緣者似作善𢙣報矣古迹云世間之孝以𭜨報𭜨如草火勝義之孝以慈報𭜨如水火文今人心是世間報故以𭜨報𭜨歟修此法者等者抄云此法即真言者即行人亦者相似如前外道所事名為自在行者所事即是本尊以此類彼故曰亦常真言行人數數係念如是本尊及悉地事當知亦是自在之心應當觀察悉地之法悉属因緣遠離自心本尊之相則無有自在也文私案此法者指彼宗計也非彼此相望義也謂外道又立三寳故自在天乃至苦樂等事者出彼宗佛法德也修此法等示彼僧寳傳授修行之義故云亦常等本尊者自在天也若真言行人等下示真言行者能行之心也猶如十六心二十一等云若行人等若言起盡無異論者歟是所𭔹治者前文云是彼𭔹治其文可然今何云所耶或云是者今能治所𭔹治者舉所治歟文點云是所治也又狸心無是字但云為所𭔹治如何今心與前天心別者或云前天心思一切如意今自在心別思如自在天也私云前天心思隨念此欲如自在天或前通諸天今局自在故此是世典當如是處用等者佛菩利物以逗機法為本故䟽下卷云差機法為人天𢙣文今何為過今雖逗機思自得利故為過耳即知界入緣起等者十八界十二入十二因緣等歟上諸薀者五薀也意云聞五薀無常等何尋廣聞修行緩怠問今廣聞與前多聞何異耶前多聞擬他用今廣聞充自用故異也三農月者或云五月也此月麥茢苗蒔田殖也或云三四五月也或云三月下種五月田殖八月茢蔵也此心性雙依二𨕙者此句或時下別句也𭂫依二𨕙有二意一修断常二信邪正此中断常雖前後一人心品依二邊故云河依等也如河水下譬也河水漂物譬心品如次配兩釋兩岸譬断常不定係一𨕙比兼邪正也河水譬內心依兩岸類外相也或又水譬內心物喻外事歟是中少欲知足等者問前龍心用此𭔹治二心何異耶彼云思念廣大資財是大欲也於未得資財珍寳而願來故此乃少欲所治也此云渴無猒足即不喜足也於已得名利眷属更多求來集無猒足故故譬云如已得乳糜更渴望餘味云云此乃喜足所治也故光記云不喜足望已得大欲望未得喜足能治不喜足少欲能治大欲文但能治並舉兼正互用故前文無猒足者約兼義歟或又前但約世寳此廣通出世云於所學法等故或又前外財物此內財物故但於𭔹治同者內外世出世雖異彼所治故緣起法門等者真如緣起法界緣起等法門甚深微細難了知故論云無明熏習所起識者非凢夫能知等文故知今緣起者善不善等事相非法性緣起之義歟如龜蔵六者抄云謂此心守護身心六根等如龜蔵護四足頭尾六事不令他故𣵀槃經云龜有頭尾四足名為六處若侵𢙉則蔵入殻中眾生六根馳流外境塵財來侵自守根門如龜蔵六也文宗鏡錄云如龜蔵六善護其命文皆好秘惜不以惠人者唯識論六云何為慳躭著財法不能惠捨秘𠫤為性能障不慳鄙畜為業謂慳𠫤者心多鄙涉畜積財法不能捨故此即貪愛一分為躰離貪無別慳相用故文財法者今䟽財物善法也貪外立慳者本隨二惑異故問若尒嗔外何不立忿乎彼約無別躰故此依假實異故影畧互顕耳猫狸伺捕等者廣云猫獸捕尒雅曰𥨸毛謂之猫云云又云狸野猫云云玉篇云猫眉驕切夏田也食鼠也或作貓狸音离似猫望至度內者度者行度義平讀之到可行度之內也或至字属下文矣又度者度量義入讀之望至度量之內也經謂得少分以為喜足者問前少欲知足為能治德今何為失耶彼於可猒世法生喜足故為德此可欣善法起喜足故為失准樂断樂修立喜足今喜足還似可云不喜足矣經迦樓羅心者法花義䟽一云迦樓羅者此云金翅鳥以其翅頭有金色故故以為名經云兩翅相去三百三十六万里𨵻浮提止容其一足文如見人行善等者此下委辨第二釈意也此意以他行類朋黨羽翼也問三種練磨是菩薩之用心故唯識論云他已證大菩提者練磨自心勇猛不退文何望真言勇健菩提心彼猶属過歟發心已後猶有退故問若尒何下師子心為異乎彼譬勝他心故慢心攝歟今顯菩提心故故下釋云當發釋迦師子心也當念勇健菩提心等者𭔹治文也䟽第一云今此宗明義言師子者即是勇健菩提心從初發意以來得大精進無有怯弱猶如師子隨所執縛必獲無遺文所有繫属等者抄云謂行者見他因緣相繫眷属及他人辨之事憘好離間當知鼠心使然也若𭔹治者行人或見眷属不和冝𭄿令和見他成辦種種善事遞相成是所𭔹治下准此釋文梵本文不釈者今經有問無尺故云尒也泥心又同之多是聲聞宿習者問從他聞法轉為眾生是菩薩利他行相何云二乗自利之宿習耶是聲聞轉教付財義非正悟解歟故抄下釈云謂湏菩提於般若會中猶能羕佛威神人法俱空文又䟽云雖湏菩提等猶能羕佛威神衍人法俱空心生驚疑不知所趣文或又大乗聲聞歟法花云我等今者真是聲聞以佛道聲令一切聞文從他聼聞正法是以佛道聲之義也令此妙音處處聞知即令一切聞之義也小乗聲聞是依聲得道義故大乗聲聞猶未得內證自然之惠故之故鈔云聲聞宿習者以不修自然佛惠故文又義念名利莊嚴文句為他法是不淨法歟此乃昔聞法聲宿習也未必二乗中聲聞也當念我當得內證等者抄云此則𭔹治一類唯政言不修理觀之者也文問䟽下釈云或有言但觀心性無相無為不應種種紛動行菩薩道此非也文相如何今宗三密具修故以偏為失矣不起定者除障三昧云定除五障故非盡空也彼心心所故又非五通所依定故俱舎云五通必依止觀均地文今依除障定起神通成出世利益故治世間小驗也故䟽第一云得除障三昧故發五神通能知一切眾生心行而作佛事取意無㝵辯广者抄云䟽無畏辨才者無畏四無畏此有二種一佛四無畏二菩薩四無畏今取菩薩言辯才者七辨才也文今本云無㝵四無㝵歟辯才所治云擊皷心能治云語言𨹔羅尼法義詞樂四無㝵冝能所當矣例如舞心能所治俱神通也又早證無量語言𨹔羅尼亦法明道所得與五通同故䟽第一云得此三昧故發五神通以神通故獲一切眾生語言𨹔羅𡰱等文經謂隨順自護身法者前守護心常守護身心云云二心何別耶守護義雖同所護法寛狹異前通護身心今但護身故又前彼此相望論是非故云此心實餘心不實此但守自不非他故云自護身法或前約現世此通現未故云何師子心者光顯抄云師子者梵名迦羅此云無畏或云師子無畏義可知師子者此非敵𭔹此獸王形似梵文師字故子者指躰語也文當發釋迦師子心者經具緣品云真言㔟無比能摧彼大力極忿怒魔軍釈迦師子救世文云何鵂鶹心者唯識䟽一末云嗢露迦此云鵂鶹謂即獯猴之異名鳥云優婁佉訛也文釋論四云若迦羅鳩奢那唯見清淨光明之色文釋論梵名畨眼赤鳥是樢也於闇夜中見明故云夜則六情利也六根明利義也昬憒者昬昧憒閙之義歟或時伺求其便者𭔹善心惠養云或𢙣心伺求其便也若不尒何云俱生等矣下云饒益及𨺻誤如次可同今二心歟文點云雖善友欲為饒益及誤者又云雖善友欲為饒益及𨺻誤之者一槩猜阻而懷疑懼云云前二點𨺻誤義不順善友又雖字不一槩等句後點不合前善𢙣所作然後點上下綴文冝歟云何羅𭃯心者抄云梵語羅𭃯此云破壞謂此心好破壞一切功德故名為羅𭃯心文對治中不念彼短者准律家所判殺畜等小乗律是波逸提攝也大乗戒又波羅夷攝也設雖觀造功德不念䖝等短依大乗戒還犯重罪依之䟽四釈擇地云㣲細小䖝皆擇去也若多不可除即是有妨難處不可辨之云云又十七釈十善戒云此中不殺者謂於一切有命之類乃至不一念殺心等文何違此等云不念彼短耶私案菩薩意樂善故憐愍彼等以造功德令彼離生死断彼命非重犯歟故古迹云如是於彼或以善心或無記心知此事已為當來故深生慚愧以憐愍心而断彼命由此因緣於菩薩戒無所違犯生多功德文又瑜伽論云若有勝利性罪現行文又古迹云攝大乗論以言十𢙣見利行故文又䟽下釋者十七卷釈云復次菩薩自有十重戒如前不殺等不在其數乃是偷蘭也若菩薩以正順後十戒故假使行前十事中而不為犯文此中前十事者不殺等十善戒也後十戒者不捨三寳等十重戒也當知造等是崇重三寳故不捨三寳等攝歟若尒既云前十事中而不為犯故云不念彼短歟又擇地是除去弟子煩𢙉等之義故去彼歟或又有開二意故歟故小乗律中為造有䖝等地捨而點餘處歟是故常懷𢙣作等者此通上來追悔慚懼結也動慮不安義通善𢙣𢙣作故故譬令近者不安文又義局下善𢙣作歟懼是慚愧非𢙣作故然慚非𢙣作懼義是𢙣作歟故抄釈𭔹治云謂𭔹治上來追悔慚懼文若有犯速𭄶懺除等者抄云若作𢙣事速𭄶悔除所為善事生慶幸心勿生掉悔文此釈意勿生掉悔一句通善𢙣二悔能治也掉悔是動慮不安義故故抄云掉謂掉舉令心於境不寂靜為性文意𢙣速悔除善生慶幸勿生掉悔為言若悔除言不通善追悔慚懼可非過矣速𭄶懺除者抄云如人身中有刺若不速為害斯甚故以為喻也文追悔懺悔為能所治雖追悔不用懴悔不罪歟懺悔通事理如常也又唯識論五云悔眠唯通見修所断亦邪見等𫝑力起故文准此文善𢙣作亦邪見所起故為所離也如多種子於一切處者上所舉外道天尊三乗行等云多種子歟起彼行譬田中下種也喻取少分故若不尒者以何譬田乎澄之則淨者似不順經文洗濯然澄時垢去故云洗濯歟第二釈文矣發露垢𢙣等者發露𭔹他語我所犯罪懺悔眾僧作羯磨令懺悔彼罪具如律家判但今懺洗理懺悔也故云觀心實相等也猛暴之心等者今此猛暴之心可通善𢙣譬熾盛火故問猛暴𢙣實可離之勇猛善何彼乎所以菩提心之中勇健為三句之源波羅蜜之間精進為六度之本依之師子心𭔹治云當發釈迦師子心商人心能治云修㨗疾智若尒何猛暴善為失又非前後相違耶猛暴善亦有敗傷故為失慈善水𢙣火善事令恒久故若過若皆過故前釈迦師子心等無敗傷故無違耳律云猶如泥團等者埿濘者濘乃定反埿濘水流㒵也淖𭋘者淖女教反埿淖濁若覺有此方便者此下明能治也或云捨前泥及橋之方便也橋𭩮又泥具故離泥時同捨之也善友者彼方便開發人也私云此目近詞故上橋梁也泥心者泥團義所越妄心故云一向無明又云無知也橋梁能越淨心去無知方便也但至橋又捨者如惑品断已智又隨亡或如遇筏逹於彼岸法已應捨也又所治中舉橋梁為顯所治泥濘歟問今泥心前癡心何異耶彼善𢙣是非遇便信受此目前近事不能記憶云云其躰雖同行相別故為二心歟例如貪心無貪心等矣乃至習行八齊等者問六十心與善種八心雜起心也而六十心攝八心有一心並生過大小乗性相不許者歟今板心取取捨心非取八齊也或又雖取善心從多分云尒歟或間雜而生故無失前文羕上以來者上所舉善法業云上謂今八齊等也猶如板上載諸物也以廣大心下明𭔹治也此心與前狗心何別耶釈云此云捨餘善彼云以為喜足故別也經謂所犱異所思異者私云案所犱異者遍計所犱迷西而犱東故云所犱異也所思異者能迷妄心也向西而欲向東故云所思異也所犱能迷同異本方故云異也問既云所思何云能迷乎所字有被處二訓今用處訓為能思歟猶如是所𭔹治或又所犱所思俱名遍計歟或所思者所遍計境歟虵異繩故云所犱異繩異蛇故云所思異也經謂順修無生分法者中川點本云無生之分法順修云云釈中漸入無因無果中者撥無因果也三論玄舉四犱中第四無因無果也唯識五見中邪見攝也而𭔹治中離断空者四犱中第三有因無果出断見之流五見中𨕙見六十二見中七断論断見也似能所治相違然影畧互而顕今心同彼兩計歟三論玄云論西域九十六術別序宗要則四犱盛行一計邪因邪果二犱無因有果三立有因無果四辨無因無果問云何名為有因無果断見之流唯有現在無後世云何名為無因無果既撥無後世受果亦無現在之因文問今心通断見與下立索心墮於断見等何異耶此無生分之義同断彼取縛之義故無失是所治甘露等者或本所謂云云此本冝歟但多本治字也前後皆云所𭔹治矣墮於断見等者經云我縛身𨕙二見是別何云断見我縛耶我言有通別義歟或又經但雖舉我釈兼示断見歟而修定心及觀察法義者問止觀雙修是佛道修行至要也何為所遣心故起信論中唯修於止付過專勸止觀俱行乎𭔹治中云思惟修靜乱無間思惟觀修習定此止觀靜乱不離故云無間故釈論云修習三昧逹寂靜憶修習智惠照散動境在寂靜中常不捨動在散乱中常不捨寂不相捨離俱行俱轉文以能治案所治偏定偏觀故為失歟又義既云寂然住立靜義是定故但修止歟觀察者釈論記云由定亦具觀察用故復云觀義文又義既置及言顯定惠無雜何云定用就中譬既云二足止住何云唯止經中輪闕者譬一足人同分故應知但端坐住立不通四儀六緣故為失云二足止住歟又能治文云於一切時處此意矣故起信論云於一切時於一切處所有修善隨己堪能不捨修學心無懈怠若住若行若卧若起皆應止觀俱行文筆削記云此約四儀六緣之中皆湏止觀雙修定惠俱運文霖雨特甚等者霖力今反霖雨者雨不止久雨三日雨也滯滯又作直例反沉滯乆也滛以針反潤又餘針反滯滛者久雨也蟄又作墊都念反蔵意顯可知矣蔚翳者蔚於謂反茂盛翳於計反隱障意時俗憂喜苦樂思慮之心茂盛互以隱障滋多為言則當行捨心等者五受中以捨受治世間憂喜樂受歟今不舉苦受舉樂受顯苦受歟或又攝憂歟開彼故三受五受開合不同故唯識論第五云或分五謂苦樂憂喜捨三中苦樂各分二者恱身心相各異故由無分別有分別故最重輕微有差別故不苦不樂不分二者非逼非恱相無異故無分別故平等轉故文或又善十一中行捨心歟猶如智心能治出信耳常修治耕墾者墾𢫈佷反訓堀也芸除茢拂也廻此功力修事其心者私案有二意一云廽修事其身之功力修事其心為言其心者以嚴身塗養具供養福田欲成勝𭩮之心也一云廻嚴身功力修事而其廻心以供養具施福田成果為言還復自推求是心等者問觀展轉緣生義字門實義故䟽七釈字實義云一切法無不從眾緣生從緣生者悉皆有始有本今觀此能生之緣亦復從眾因緣生展轉從緣誰為其本如是觀察時則知本不生際文何未見緣生無義觀展轉生無窮盡未知本不生際故異彼義矣當一向安心等者抄云當念一向安心於四諦之理𭄶令貫穿窮徹所謂生無生無量無作從淺之深以盡因果離此之上更生推求則但增心數徒令發狂終無其理故云當一向安心等文私云生等者今諦理示通四教四諦也謂生四諦蔵教乃至無作四諦圓教故但䟽似作二釈抄為一釈歟無明住地三毒之根者抄云謂三毒從無明住地生增長名三毒根若無明住地壞時彼亦隨壞唯識䟽云煩𢙉有二種謂住地煩𢙉及起煩𢙉住地有四謂見一處乃至有愛起煩𢙉者勝無明住地名起煩𢙉取意此意二障相望為能所生也謂無明者所知障四住煩惱障故意所知無明住地生煩𢙉三毒之根本也為言私云不尒由無明生五根本此五根本豈但初刧所度人犱乎五根本通三妄故况淨影釈以勝起煩𢙉未必為無明住地具如釈論愚抄辨𢙢不合䟽家釈義亦䟽第三云為一生補處菩薩擇去心中無明父母極細之垢亦名治地文准此文㣲細妄犱望三妄而為根本故云無明三毒之根歟勝經云無明住地其力㝡大佛菩提智之所能断文又當卷下釈云由有無明生五根本煩𢙉心文准此文似五根本外更有能生無明今文之隔法詞歟又義無明是三毒五根本中隨一癡也雖其中諸煩𢙉生必由癡故云尒非五根本之外有別躰也故法相宗釈云諸煩𢙉生必由癡故文之是𦔳語之詞也若存無明別躰者百六十心可增其數既不尒未別躰也又䟽三云無明三毒名為愚癡文此又三毒似云無明愚癡然實貪嗔生起又必由無明故云尒歟問若尒下文云我倒所生三毒根本文何必由癡耶彼取見所断之見惑𨕙故云尒非必由癡故義此義通見修無蕳別故况我倒五見攝非本惑何云能生根本應知為取三毒見惑𨕙耳妄想不生者指上無明住地云妄想也故菩提心論云迷途之法從妄想生文花嚴經云若離妄想一切智等即得現前云云釈論根本無明又是也常以高舉為性等者唯識論六云云何為恃己於他高舉為性能障不生苦為業謂若有於德有德心不謙下由此生死輪轉無窮受諸苦故文論䟽云於勝德法及有德者心不謙下故文䟽不能下意者論心不謙下之意也不可屈撓者抄云䟽不可屈撓以教切者撓字切注云曲木也即是不可𫼡屈令其曲直也文撓教反如草反擾撓覧曲也常操者常心操歟以忍辱下明𭔹治也前心𭄶高此心𭄶廣者前𢏏心於師僧等勝人生高舉故七中過也俱舎論十九云於勝謂勝名過文今海等心於一切勝事皆歸於己似增上光記云於未證得勝功德中謂已證得名增上文故知今二心於開之故𭔹治釈云不應起大之心也文譬如完堅之器者廣云完全也如是同性者此一句示能同之心也此心亦尒下釈此句也已上釈上二句也文點云謂諸有修習行業彼生心如是同性云云今如是同性一句別顯受生心能同通諸心能似也由黑白業受善𢙣報者此俱舎論等中明四業中白白業黑黑業二種也如次異熟又白黑故云受善𢙣報故頌䟽十六云欲界諸不善業一向名黑染𣲇性故異熟亦黑不可意故色界善業一向名白不雜𢙣故異熟亦白是可意故文問若約四業次第可云黑白何云白黑乎若云黑白乱第三雜業故為顯是善𢙣二種業云白黑也四業中無隨一白黑故故光記云以欲界中𢙣勝善故𢙣名黑黑不名白黑善名白白文故知今白黑者舉欲不善色善業也由所作種種雜故等者第三黑白業也故頌䟽云欲界善業名黑白𢙣所雜故異熟亦黑白非愛果雜故善性是白非是黑黑來陵雜立黑白名約前後間雜不㨿自性也文問異熟云彼彼無量差別身何但云人果耶非果雜故云無量身歟或又大師釈云人及修羅非是純𢙣雜業所感文通二趣故云無量身歟問若尒𢙣果既通三𢙣趣何不云無量乎彼雖三趣皆𢙣果故此雖二趣有善𢙣果故又修羅通天鬼畜三趣故言實有四趣故云無量歟除去不善純修白法者或云前白黑業中除去黑業純修白業故云純白前與黑俱故非純耳應知由所作種種雜故等者釈成上白黑業等也就此善中等者此善有命終生天後得𣵀槃之功故云更去鑛乃至得成醍醐妙果也私云六十心皆所治妄心故黑白俱所治妄心何其中捨黑取白况復今白黑業所似之譬也全非能同之心何云取彼中乎故知今能治白法者無漏業歟所以未得出世以來六十心與善種雜起故四業中有漏三種業為所治無漏業為能治也故俱舎論云佛依業果性類不同所治能治殊黑黑等四文又云能盡彼無漏者彼是所治也無漏能治也謂無漏業能盡彼前黑等三業名非黑非白文問若尒所除既通善𢙣何唯云除去不善又無漏名非黑非白但云純白耶若望無漏有漏善猶属𢙣故故釈論中五趣四生業皆名𢙣業也上行者能同心亦兼善𢙣者可漏無漏若不尒者行者以所修行廽向𢙣趣乎或又除去不善者以無漏除有漏不善就此善中下以無漏去有漏善也又依前義去因劣無漏得果無漏義也又非黑非白者彼論釈此事云此非白言是密意謂佛於彼大空經中告阿難𨹔諸無学法純善純白一向無罪文仍無失第六十心梵本文者或本云第六十云何世心梵本文又經異本釈相終有此四字私案經䟽俱以無本為善所以者何既云梵本文又云少一猨猴心不云世心又經中列名中既不摽釈相中何𦤺此問乎問歌詠心泥心雖列名舉之又釈相中𦤺問䟽中釈梵本文今又可尒耶彼二心釈義是異今釈故二心釈云第卅二歌詠心梵本文不釈阿闍梨言此喻傳法音也文𭰖心釈同之彼二心列名并有問故䟽摽歌詠心𭰖心未釈行相故云文不釈顯闕釈文之義又云阿闍梨言此喻傳法音也出行相而未云少歌詠心然今但云第六十心不摽名又無不釈言應知梵本闕名及釈也又經若有列名及問何云少猨猴心直可釈行相也又設雖有問准前二心應云第六十世心若第六十心外有云何世心句似重言無用就中諸本經皆列名無舉此名何輙𦤺問不然則宿業餘氣能生障㝵也毛髮謂六十心等灰炭謂示小法起二乗心若欲使極淨道塲者百六十種上中微垢皆擇使無餘乃至至灌頂地中非淨土者悉冝蕳去之方名究竟淨也文又第三卷云且如下文云先為弟子擇治平地若論外事自如常釈若為我倒凢夫擇得一念守齊種子心治令平正亦名治地乃至為一生補處菩薩擇去心中無明父母極細之垢亦名治地文准此等釈治毛髮六十心初至出世初心未及治灰炭度百六十心度無明極細歟三刧叚經一二三四五𭁡數等者問法躰未顯由何𭁡數來耶或云由前六十心又此來也問彼文貪心無貪心等專明𭁡數義非全示五根本躰况彼但見惑今通見修義門既異何依彼云明今𭁡數乎貪無貪名異其躰同貪嗔心慈心等亦尒以未推本貪嗔癡等義自顯故䟽云謂貪嗔癡疑也又寛狹雖異貪嗔等義同故或又六十心何局見惑矣故乗前此文來矣或又六十心中𭁡數故百六十心五重𭁡數依彼文而來也私云大本中具出名相今略本故但舉𭁡數也故知依大本而此來矣故䟽云其名相具如十万偈中文例如起信論摩訶衍者句牒大覺經文也問𭁡數局五重有何因耶暹僧都云此根本煩𢙉橫有五種故竪亦有五𭁡數歟私云為𭔹百六十摩訶衍歟或隨冝安立何必責所由矣䟽亦是諸心相等者私記第十云自下明百六十心義也是即前第八問凢夫異熟心義也又出世間心生乃至四分之一度於信解者第九問行者之殊異心之義也文私云此記意以越世間三妄犱句中所越百六十心前第八問云也此義不然第八問前未何云亦是乎故知可第四心諸相句也前六十心彼今復故云亦是也猶如六無畏文云猶是前心相句矣然三處之請心相句兼三意故所以六十心唯顯染心義六無畏偏示淨心義今通染淨心也若尒今文廣通能越所越心何唯云眾生異熟心而配初一句耶䟽中既唱一章不別属故知諸心相問通能所越文心殊異唯在於能越文故不指属也或云心殊異通第八九二句若尒殊異又遍全文歟若約染淨心自位心相若又相望互異故殊異也私云䟽第一云瑜伽行者殊異之心專可淨心又十八釈云殊異者謂如來三三昧耶之身文心身雖異同是淨法因果雖別俱又善躰也何云通染心矣當知心相通染淨殊異唯能越心也問若尒六無畏何不殊異耶彼唯淨心故今文𭔹所度妄心顯能度殊異故又義於三刧淨心有顯密能所𭔃齊心所𭔃齊淨心心相故六無畏云心相而不云殊異今文中第三刧明能𭔃齊真言行故此文瑜伽行者殊異心也問其文既別何不指属耶謂理實為顯三劫皆通密不指属歟問若尒六無畏亦可尒何彼經中偏如常故若依䟽意可尒也故釈云明三刧六無畏眾多心相擬儀外迹而顯修證之深淺云云可悉之䟽由有無明故等者五根本外存無明別躰歟能所生義別故又譬樹根種子別故故䟽上文云無明住地三毒之根文雜問云問此五根本何為種子無明是種文又大師三妄外更出㣲細妄犱䟽下文舉無明父母極細五見百六十心所不攝之義言属見煩𢙉在六十心中云云此意為以五見而為五根本之未惑所由也意属五見之煩𢙉多在六十心未惑之中也為言非謂見惑矣問大小乗經論中皆以五見名根本煩𢙉故百法論云根本六者一貪二嗔三四無明五疑六不正見文又今䟽第九云謂貪嗔癡見疑六根本煩𢙉文論不正見䟽見中攝五見也若尒何違顯密釈義為未惑耶况復十煩𢙉是利鈍水火法何以五利為五鈍未惑乎本未隨冝故唯識中百廿八根本煩𢙉薩迦耶見而為上首者身見為諸惑本又如云諸煩𢙉生必由癡故者以無明為本今䟽又云由無明故等又云我倒所生等准知又利鈍雖異引生義不定何不為末惑矣私記第十云是明於百六十心不攝五見之所以云云又云彼六十心之中貪嗔癡等是属見煩𢙉所引生惑也此百六十心之中五根本煩𢙉是属類也是類別故但此經雖属百六十義而理實於五見煩𢙉亦𭁡數可有百六十心也取意此意属見惑煩𢙉在六十心也為言問五根本中疑唯是見惑何百六十心唯修惑耶又於第一重內有三種三妄六十心既麁妄攝何見修大別乎疑是俱舎唯識等雖判唯見惑義章中於疑分別疑事疑理通見修歟私記云疑是始教中判唯見断今圓密兩教中亦通修断無云云又然就第一重內者五鈍五利各有三妄故見修俱指第一重內無失或人云六十心廣通十煩𢙉故百六十心狹局五鈍故故𨹔羅尼義云問此百六十心十煩𢙉中何煩𢙉耶五根本煩𢙉心謂貪嗔癡慢疑也所謂不五見以属見煩𢙉多在六十心中文私案諸義皆未詳但六十心百六十心可通見修二惑真言行者雜起心何唯局見惑不通修惑多分應是任運起惑未必依邪師等故但下見道所断舉六十心者彼且取見惑𨕙故云我倒所生俱舎云疑及五見唯分別起文今䟽依此意歟言之六十心通見修故今通妨明無明所生之義如抄釈也或又大乗意身𨕙二見通見修故我倒所生義非局見惑之因歟又疑是唯分別起大小乗所判無違何唯云修惑義章釈彼具釈云疑有二種一者疑事二者疑理小乗法中唯取𭼃理大乗通取皆湏断故文此釈意事疑是大乗意歟然彼章釈見修云大乗所一切煩𢙉無不迷理於中麁者判為見惑細為修惑文既於迷理許修断若尒迷事何非見断故唯識論雖判疑唯分別起彼䟽釈云即緣事理俱是疑也文當知不迷事疑亦見断耳具如六十心文弁又般若寺釈五根本雖皆見惑非謂五皆修惑歟當知六十百六十皆通見修故亦各可攝十煩𢙉百六十心又五根本癡攝五見歟故䟽第九列六根本次第異諸論癡次舉見可思之其文如上引故義章六云三毒分別除貪除嗔除疑自餘一切悉是無明文問案六十心文專舉五鈍未見五見名若在六十心故今不示者專今不可舉五鈍耶六十心中雖舉五鈍彼𭁡數未惑非本故五見無名非無其躰謂河心𨕙見自在心等身見歟故云尒歟或云属見煩𢙉者非直取五見躰取見俱生之惑及前後所引之惑云属見煩𢙉歟何者六十心中亦有五鈍故謂見俱生但局五鈍所引廣通十煩𢙉也意云以能属見俱生及前後起之煩𢙉多在六十心中所属五見可攝六十心中也為言䟽上文云或一時雜起或次第而生文可悉之又義属見者属見惑煩𢙉有六中疑及五見唯分別起疑在百六十心中故少也五見在六十心中故云多也或義云私謂五根本煩𢙉中除疑外只是鈍使此之四種自通利鈍又涉見思言不者見惑是初果所断即初重中初重是也今只取二果已上所断故云不也云云私云四種通利鈍依慿何在大乗章第六云依如毘曇前五是利推求性故後五是鈍非推求故前依成實前五唯利後五種中貪嗔疑一向是鈍無明不定大乗法中俱有其相文依此釈今義違三宗矣又百六十心局二果所断未麁妄中三重初六十心何非百六十攝乎䟽初𭁡數為十等者教相抄第三云就此五鈍惑成百六十心時初𭁡數為十者約所緣境貪分二種謂貪心無貪心乃至疑分二謂疑心决定心也故成十此中貪心者貪染法故無貪心者不好善處故乃至疑心者疑善𢙣决定心者一切行隨人教命而正惠觀察也次第二𭁡數成二十者於貪心亦分二謂緣色貪緣心貪也無貪心亦分二不求有漏善不求無漏善乃至疑分二謂緣色疑緣心疑决定心亦分二謂信無理苦行信無理樂行等也故成二十次第三𭁡數成四十者付上所成二十惑色貪分為二謂緣為我所之境色貪緣他所有之色貪也緣我所境時即起身見也如是等即身見云貪之未惑也心貪分二謂愛自持戒心為真道愛他無色界眾生心為𣵀槃如此等即戒取見取云貪未惑也乃至信無理苦行分二信無理樂行亦分二故成四十如是五度數之故成百六十心又義云於五根本煩𢙉五返數之成百六十心取意私云第二義貪貪嗔嗔乃至疑疑等五返數之欤顯密問宝生御房下云問大日經并䟽云五根本煩𢙉五度數成百六十隨煩𢙉今云貪嗔癡開者成百六十乃至八万三毒與五根本本數已不同如何同云成百六十乎五根本五度數之成百六十故貪一煩𢙉起時有百六十乃至疑煩𢙉起時亦有百六十故三毒一一開時云有百六十也問五根本煩𢙉五度數成百六十方如何䟽云此五根本煩𢙉初𭁡數為十第二𭁡數成二十第三𭁡數成四十第四𭁡數成八十第五𭁡數成百六十心故云一二三四五𭁡數成百六十心也問五度𭁡數成百六十意如何一切眾生無明一念心性無始以來根本十煩𢙉隨煩𢙉乃至八万塵勞皆悉具足一一根本隨惑緣起一𫝹貪心起時本來具足相應種類而有貪無嗔無嗔等十煩𢙉故云初𭁡數為十也第二𭁡數成二十者嗔煩𢙉起時嗔具前貪無貪等十無嗔具貪無貪等十故云第二𭁡數成二十也第三𭁡數成四十者癡煩𢙉起時癡具前二十無癡具前二十故云第三𭁡數成四十也第四𭁡數成八十者煩𢙉起時具前四十無具前四十故云第四𭁡數成八十也第五𭁡數成百六十者疑煩𢙉起時疑具前八十無疑具前八十故云第五𭁡數成百六十也又疑為始逆數至貪亦同成百六十也五根本煩𢙉皆同始終次第無定但五中隨起為始為終五度𭁡數成百六十亦復如是故貪具百六十嗔具百六十乃至疑具百六十有五種百六十也此百六十具貪時此百六十皆成貪種類具嗔時此百六十皆成嗔種類如是五種百六十種類義門各別也故摽貪嗔癡云百六十乃至八万意可知文私云今云貪嗔癡開成百六十者大師秘蔵記云三妄犱貪嗔癡開百六十心乃至八万塵勞文此文也𭁡數古德二義中朝譽意開五根本單成百六十問意五根本各各成百六十初度𭁡數二師雖同後後𭁡數二義有殊故也此中前義雖粗順䟽文頗違記文矣後義非啻順䟽文亦記文矣故知䟽家舉五根本是顯𭁡數數五返而成百六十宗家但舉三毒又示一一皆具百六十也又記文舉三毒攝疑歟義章第六云二三毒分別除貪除嗔自餘一切悉是無明故論言除貪除嗔餘之八使從捨生故斯名癡也文准又以疑攝癡也問𭁡數何以知貪無貪等乎大師𨹔羅尼義云問其百六十心者何耶一貪心二無貪心三嗔心四慈心等具如經文云云私云等者等取疑心决定心等也具如經文者今經中六十心文也應知六十心是示𭁡數惑也又等者等取五重𭁡數名相經文者指大本歟故䟽云其名相具如十方偈中文問准大小乗性相無貪無嗔等其性唯善不通𢙣無記何為𭁡數未惑故唯識論釈十一唯善俱舎論判唯是善性何其名雖同其躰全別此不貪善法彼不著三有故又非無依慿大般若經三百一十六初分趣智品云善現復白佛言世尊若菩薩摩訶薩能於如是甚深般若波羅蜜多生信解者何性何相何狀何貌佛言善現是菩薩摩訶薩調伏貪嗔癡性為性遠離貪嗔癡相為相狀貌准之復次善現是菩薩摩訶薩調伏貪無貪嗔無嗔癡無癡性為性遠離貪無貪嗔無嗔癡無癡相為相狀貌准知善現若菩薩摩訶薩成就如是性相狀貌乃於如是甚深般若波羅蜜多能生信解文私案此文既以無貪無嗔等為障信解之惑品又正中但云貪嗔癡復次文云貪無貪等應知𭁡數貪等云貪無貪等也故知無貪無嗔等為𭁡數末惑專出于此經矣常依二法不得中道等者顯密問抄下云二法者貪無貪嗔無嗔乃至疑無疑等也隨事異名者隨六塵境事起心色𢙣色聲𢙣聲亦嗔色喜色嗔聲喜聲如是事有有無𨕙犱不得中道故云隨事異名輙分為二也文私記第十云是為表二障未断時二法之一時有二㝵用故扵五根本煩𢙉𭁡數之云耳文就此二中復更展轉等者此文依𭁡數而成八万乃至無量之所由也合譬中從此復更等文矣若更約下出別義謂於五根本又約九品等開百六十心乃至成無量也故知法有二重譬中唯有一種也又云此義不尒以眾生下出𭁡數所由中以眾生乃至輙分為二者是舉初返𭁡數之所由也意云眾生五根本煩𢙉心中先貪心一種隨所作事業而異二名也依染淨𣲇淨心名貪心不染善法故名無貪心故云常依二法隨事異名也餘又尒也次就此二中乃至偈中者於前貪無貪等展轉隨事四反𭁡數成百六十心也彼等名相如大木也為言復若更約下約九品而明成八万并無量之義也可合譬中從此復更等法譬相順何煩法中分兩重乎若百六十心又約九品者不順𭁡數經文又約九品𭁡數五反𭁡數其數可增百六十矣故知若更前百六十心約九品等數乃至成八万及無量也為言又如劫初時人等者頌䟽第十二云劫初時人皆如色界諸根無𡙇形色端嚴身帯光明騰空自在飲食喜樂長壽久住有如是類地味漸生其味甘美其香欝馥時有一人稟性躭味馥香取食餘人隨学竸取食之尒時方名初受叚食資叚食故身漸堅重光明隱沒黑闇便生日月眾星從茲出現由漸躭味地味便隱從斯復有地皮餅生竸躭食之地餅復隱尒時復有林藤出現竸躭食故林藤復隱尒時有非𥝷種香稻自生眾共取之以充所食此食麁故殘穢在身為欲蠲除便生二道因斯遂復有男女二根生由二根殊故形相亦異宿習力故便相瞻視因此遂生非理作意欲貪鬼魅惑乱身心失意猖狂行非梵行人中欲鬼初生發此時尒時諸人隨取香稻無所貯積後時有人稟性嬾惰長取香稻眝擬所食餘人隨學漸多停貯由此於稻生我心多𠬧無猒隨𠬧處無復𭁡生遂共分田慮遠盡於己分田生恡護心於他分田有懷侵奪劫偷過起始於此時為欲防共取聚評議僉量眾內一有德人各以所𠬧六分之一雇令防護封為田主因斯故立𭃯帝利名大眾欽羕㤙流𠦸土故復名大三未多王此云共許王也自後諸王此王為首時人或有情猒居樂家在空閑精修戒行因斯故得波羅門名此云淨志後時有王貪恡財物不能均給國土人民故貧匱人者多行賊盜王為禁止行輕重罸為殺害業始於此時時有罪人心怖刑罸覆蔵其罪異想發言虗誑語生此時為首文私云頌䟽中地味地餅如次當今䟽地肥地膚歟又䟽中地肥乃至地膚林藤云云乃至言顯何物乎可見阿𭇥經矣問今一叚文法譬中何耶或云法也如者指事義也煩𢙉生起義專是法故知法譬後重出舉法現證也或云譬中有兩重其一也又言顯譬有二重如者譬喻義也合文中為此喻者等者此意矣但以法譬法其例非無嘉祥釈云法性如𣵀槃文所以舉刧初現證顯後煩𢙉生起故為法譬也又義云准法花三周法譬因緣次第歟謂雖上以法譬明𭁡數義而未示無明生起等因緣故又舉如劫初人示彼生起之因緣例如善心生起舉劫初人等矣但所以為此喻者喻者曉義未必譬喻之義也即曉釈義也猶如二教論云喻曰耳
